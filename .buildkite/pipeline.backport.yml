# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json

name: "integrations-backport"

env:
  SETUP_GVM_VERSION: "v0.6.0"
  YQ_VERSION: 'v4.35.2'
  GH_CLI_VERSION: "2.29.0"
  # Agent images used in pipeline steps
  LINUX_AGENT_IMAGE: "golang:${GO_VERSION}"

steps:

  - label: "Check that it runs from UI"
    key: "check-ui"
    command:
      - "buildkite-agent annotate \"The $${BUILDKITE_PIPELINE_SLUG} pipeline can only be triggered from the UI by members of the 'ecosystem' team, or via a trigger step from the 'integrations' pipeline. For the recommended workflow see the [documentation](https://www.elastic.co/guide/en/integrations-developer/current/developer-workflow-support-old-package.html).\" --style 'warning'"
      - "exit 1"
    if: |
      !(
        (build.source == 'ui' && build.creator.teams includes "ecosystem") ||
        (build.source == 'trigger_job' && build.env('BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG') == 'integrations')
      )

  # Ensure that the check-ui step runs before any other step
  - wait: ~

  - input: "Input values for the variables"
    key: "input-variables"
    if: "build.source != 'trigger_job'"
    fields:
    - select: "DRY_RUN"
      key: "DRY_RUN"
      options:
        - label: "True"
          value: "true"
        - label: "False"
          value: "false"
      default: "true"
    - text: "Enter base commit for the backport branch"
      key: "BASE_COMMIT"
      required: true
      default: ""
    - text: "Enter package name (as defined in manifest.yml)"
      key: "PACKAGE_NAME"
      required: true
      default: ""
    - text: "Enter package version (examples: 1.5.7, 1.0.0-beta1)"
      key: "PACKAGE_VERSION"
      required: true
      default: ""
    - select: "Include to backport-branch only one package?"
      key: "REMOVE_OTHER_PACKAGES"
      options:
        - label: "True"
          value: "true"
        - label: "False"
          value: "false"
      default: "true"
    - text: "Backport branch name (optional, defaults to backport-<package>-<major>.<minor>)"
      key: "BACKPORT_BRANCH_NAME"
      required: false
      default: ""
    - text: "PR number to notify on completion (optional)"
      key: "PR_NUMBER"
      required: false
      default: ""

  - label: "Creating the backport branch"
    key: "create-backport-branch"
    command: ".buildkite/scripts/backport_branch.sh"
    agents:
      image: "${LINUX_AGENT_IMAGE}"
    env:
      GITHUB_EMAIL: "elasticmachine@elastic.co"
      GITHUB_USERNAME: "elastic-vault-github-plugin-prod"
    plugins:
      - elastic/vault-github-token#v0.1.0:
    depends_on:
      - step: "input-variables"
        allow_failure: false

  - label: ":github: Notify PR"
    key: "notify-pr"
    command: |
      if ! outcome=$$(buildkite-agent step get "outcome" --step "create-backport-branch"); then
        echo "Failed to retrieve step outcome, skipping PR notification"
        exit 0
      fi
      if [[ "$${outcome}" == "passed" ]]; then
        NOTIFY_STATUS=success .buildkite/scripts/notify_backport_pr.sh
      else
        NOTIFY_STATUS=failure .buildkite/scripts/notify_backport_pr.sh
      fi
    agents:
      image: "${LINUX_AGENT_IMAGE}"
    plugins:
      - elastic/vault-github-token#v0.1.0:
    depends_on:
      - step: "create-backport-branch"
        allow_failure: true
