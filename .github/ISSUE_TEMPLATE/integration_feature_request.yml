    validations:
      required: true
  - type: input
    id: data_stream_dataset_name
    attributes:
      label: Dataset Name
      description: Which [dataset](https://www.elastic.co/guide/en/fleet/current/data-streams.html) in the integration package is the request for? If it is a new data stream, suggest a name.
      placeholder: ex. nginx.access
  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: What version of the integration are you using?
      placeholder: ex. 1.2.3
    validations:
      required: true
  - type: input
    id: agent_version
    attributes:
      label: Agent Version
      description: What version of the Elastic Agent are you using?
      placeholder: ex. 8.7.0
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS Version and Architecture
      description: What operating system and architecture are you using?
      placeholder: ex. Ubuntu 20.04 LTS (x86_64)
    validations:
      required: true
  - type: textarea
    id: user_goal
    attributes:
      label: User Goal
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: user_tried
    attributes:
      label: Existing Features
      description: Why does the current feature set not satisfy your needs?
    validations:
      required: true
  - type: textarea
    id: what_did_you_see
    attributes:
      label: What did you see?
      description: Please provide the ingested document, relevant logging or dashboard screen shot that shows the issue behavior.
      placeholder: Paste the sanitized details here.
    validations:
      required: true
  - type: textarea
    id: anything_else
    attributes:
      label: Anything else?
      description: Anything else that we should know about your request that will help us understand and implement the feature. Links to any relevant documentation are greatly appreciated.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Thanks for completing our form! We'll look into your request and get back to you as soon as possible.
