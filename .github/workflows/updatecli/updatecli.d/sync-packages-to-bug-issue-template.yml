---
name: Update package list in Github bug issue template
pipelineid: sync-packages-to-bug-issue-template

scms:
  default:
    kind: github
    spec:
      owner: '{{ .scm.owner }}'
      repository: '{{ .scm.repository }}'
      user: '{{ requiredEnv "GITHUB_ACTOR" }}'
      username: '{{ requiredEnv "GITHUB_ACTOR" }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      commitusingapi: true
      branch: main

targets:
  integration_issue_templates_yml:
    name: update pkgs in .github/ISSUE_TEMPLATE/integration_*.yml
    kind: shell
    scmid: default
    spec:
      environments:
        - name: PATH
        - name: HOME
      # This script uses `mage listPackages` to collect package paths, then it reads
      # title and name from each manifest.yml. It updates the issue template and uses
      # 'git diff' to satisfy the conditions needed by updatecli to determine
      # if any changes occurred.
      command: |
        #!/usr/bin/env bash
        set -eu

        package_paths=$(mage listPackages)

        pkgs=$(echo "$package_paths" | while IFS= read -r package_path; do
          title=$(yq .title "${package_path}/manifest.yml")
          echo "- $title [$package_path]"
        done | LC_ALL=C sort -s -f | yq -o json .)
        
        yq eval ".body[1].attributes.options = $pkgs" -i '.github/ISSUE_TEMPLATE/integration_bug.yml'
        yq eval ".body[1].attributes.options = $pkgs" -i '.github/ISSUE_TEMPLATE/integration_feature_request.yml'
        
        git diff --name-only HEAD

actions:
  openPullRequest:
    title: '[automation] Update packages in .github/ISSUE_TEMPLATE/integration_*.yml'
    kind: github/pullrequest
    scmid: default
    spec:
      labels:
        - automation
