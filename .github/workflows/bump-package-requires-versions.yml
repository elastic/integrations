---
# Bump pinned versions in package `requires` blocks and update changelogs.
#
# Pipeline (two updatecli stages, run in order):
#   1. bump-requires   — scans every package manifest for `requires` blocks,
#                        resolves the latest compatible version of each pinned
#                        dep, and commits the updated constraints to a branch.
#                        Records each bump (package, dep, old→new, semver level)
#                        to BUMPS_JSON for the next stage.
#   2. add-changelogs  — reads BUMPS_JSON and calls `elastic-package changelog add`
#                        for each affected package. Changelog bump level follows
#                        the highest semver level of any dep bump for that package:
#                          - one or more dep major bumps  → package minor bump
#                            (capped at minor when the package is still at v0.1.0;
#                             major is never used for unreleased packages)
#                          - dep minor bumps only         → package minor bump
#                          - dep patch bumps only         → package patch bump
#                        Multiple dep bumps for the same package are folded into
#                        a single changelog version entry.
#
# Execution mode:
#   pull_request  → updatecli diff  (dry-run, shows what would change; no commits)
#   schedule / workflow_dispatch → updatecli apply  (opens or updates the PR)
name: Bump pinned versions in package requires blocks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5'
  pull_request:
    paths:
      - .github/workflows/updatecli/package-requires.d/**
      - .github/workflows/bump-package-requires-versions.yml

permissions:
  contents: read

jobs:
  bump-package-requires:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Updatecli in the runner
        uses: updatecli/updatecli-action@2c3221bc5f4499a99fec2c87d9de4a83cb30e990 #v3.1.3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Install elastic-package
        run: go install github.com/elastic/elastic-package@$(grep 'github.com/elastic/elastic-package' go.mod | awk '{print $2}')

      - name: Select diff action
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "UPDATECLI_ACTION=diff" >> $GITHUB_ENV

      - name: Select apply action
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "UPDATECLI_ACTION=apply" >> $GITHUB_ENV

      - name: Bump package requires versions
        # --experimental is required for the commitusingapi SCM option.
        run: updatecli --experimental ${{ env.UPDATECLI_ACTION }} --config .github/workflows/updatecli/package-requires.d --values .github/workflows/updatecli/values.d/scm.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMPS_OUTPUT: ${{ runner.temp }}/bumps.json
          BUMPS_JSON: ${{ runner.temp }}/bumps.json
