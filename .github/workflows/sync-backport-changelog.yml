---
name: Sync backport changelog to main

on:
  push:
    branches:
      - 'backport-*'
    paths:
      - '**/changelog.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — zero-SHA check
        id: guard
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: branch-creation push"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.guard.outputs.proceed == 'true'
        with:
          fetch-depth: 0

      - name: Set up Go
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version

      - name: Install mage
        if: steps.guard.outputs.proceed == 'true'
        run: go install github.com/magefile/mage

      - name: Collect changelog changes
        id: collect
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          REPOSITORY: ${{ github.repository }}
        run: mage -d "$GITHUB_WORKSPACE" collectChangelogEntries

      - name: Create changelog sync PR
        id: create
        if: steps.collect.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTRIES_TSV: ${{ steps.collect.outputs.entries_tsv }}
          WORKING_BRANCH: ${{ steps.collect.outputs.working_branch }}
          BACKPORT_PR_NUMBER: ${{ steps.collect.outputs.backport_pr_number }}
          BACKPORT_BRANCH: ${{ github.ref_name }}
          PACKAGES_DIR: ${{ github.workspace }}/packages
          REPOSITORY: ${{ github.repository }}
        run: mage -d "$GITHUB_WORKSPACE" createChangelogSyncPR

      - name: Comment on backport PR
        if: always() && steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKPORT_PR_NUMBER: ${{ steps.collect.outputs.backport_pr_number }}
          WORKING_BRANCH: ${{ steps.collect.outputs.working_branch }}
          NOT_FOUND_PACKAGES: ${{ steps.create.outputs.not_found_packages }}
          CREATE_OUTCOME: ${{ steps.create.outputs.create_outcome }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: mage -d "$GITHUB_WORKSPACE" postBackportComment
