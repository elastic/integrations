---
name: Sync backport changelog to main

on:
  push:
    branches:
      - 'backport-*'
    paths:
      - '**/changelog.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — zero-SHA check
        id: guard
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: branch-creation push"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.guard.outputs.proceed == 'true'
        with:
          fetch-depth: 0

      - name: Collect changelog changes
        id: collect
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 dev/scripts/backport_collect_entries.py \
            --before     "${{ github.event.before }}" \
            --after      "${{ github.event.after }}" \
            --repository "${{ github.repository }}"

      - name: Set up Go
        if: steps.collect.outputs.has_changes == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version

      - name: Install mage
        if: steps.collect.outputs.has_changes == 'true'
        # Required by backport_resolve_package_dir.py, which uses `mage listPackages`.
        run: go install github.com/magefile/mage

      - name: Create changelog sync PR
        id: create
        if: steps.collect.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 dev/scripts/backport_create_sync_pr.py \
            --entries-tsv        "${{ steps.collect.outputs.entries_tsv }}" \
            --working-branch     "${{ steps.collect.outputs.working_branch }}" \
            --backport-pr-number "${{ steps.collect.outputs.backport_pr_number }}" \
            --backport-branch    "${{ github.ref_name }}" \
            --after              "${{ github.event.after }}" \
            --repository         "${{ github.repository }}"

      - name: Comment on backport PR
        if: always() && steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 dev/scripts/backport_comment_result.py \
            --backport-pr-number "${{ steps.collect.outputs.backport_pr_number }}" \
            --working-branch     "${{ steps.collect.outputs.working_branch }}" \
            --not-found-packages "${{ steps.create.outputs.not_found_packages }}" \
            --create-outcome     "${{ steps.create.outcome }}" \
            --run-id             "${{ github.run_id }}" \
            --repository         "${{ github.repository }}"
