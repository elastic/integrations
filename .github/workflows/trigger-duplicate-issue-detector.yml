name: Duplicate Issue Detector
on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-duplicate-issue-detector.lock.yml@v0
    with:
      detect-related-issues: false
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
