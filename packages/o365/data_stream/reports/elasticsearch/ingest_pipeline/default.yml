---
description: Pipeline for processing Microsoft Reports from Graph API.
processors:
  - drop:
      description: Ignore want_more placeholder message.
      if: ctx.message == "want_more"

  # Common processors for all report sources.
  - set:
      field: ecs.version
      value: 8.11.0
  - fail:
      tag: cel_failure
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      message: error message set and no data to process
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      if: ctx.event?.original != null
      field: message
      ignore_missing: true
  - json:
      field: event.original
      target_field: json
  - rename:
      field: json.metadata.name
      target_field: o365.reports.metadata.name
      ignore_missing: true
  - rename:
      field: json.metadata.api_path
      target_field: o365.reports.metadata.api_path
      ignore_missing: true
  - script:
      lang: painless
      description: Sanitize field names
      tag: painless_sanitize_fields
      if: ctx.json instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('_');
        }

        def out = [:];
        for (def item : ctx.json.entrySet()) {
          // Remove control characters from CSV header
          String key = /\p{C}/.matcher(item.getKey()).replaceAll('');
          // Replace spaces and hyphens with underscore
          out[underscore(key)] = item.getValue();
        }
        ctx.json = out;
  # - script:
  #     lang: painless
  #     description: Extract report metadata into o365.reports.metadata.
  #     tag: painless_report_metadata
  #     if: ctx.json?.metadata instanceof Map
  #     source: |
  #       if (ctx.o365 == null) {
  #         ctx.o365 = [:];
  #       }
  #       if (ctx.o365.reports == null) {
  #         ctx.o365.reports = [:];
  #       }
  #       if (ctx.o365.reports.metadata == null) {
  #         ctx.o365.reports.metadata = [:];
  #       }
  #       ctx.o365.reports.metadata.name = ctx.json.metadata.name;
  #       ctx.o365.reports.metadata.api_path = ctx.json.metadata.api_path;

  # Route to the appropriate pipeline based on the report's source API. Refer CEL state variable "type_to_api_map".
  - pipeline:
      name: '{{ IngestPipeline "teams_user_activity_user" }}'
      if: ctx.o365?.reports?.metadata?.name == 'Microsoft Teams User Activity User Detail'
      tag: pipeline_teams_user_activity_user
      description: Route to teams_user_activity_user
      ignore_missing_pipeline: true
  - pipeline:
      name: '{{ IngestPipeline "viva_engage_groups_activity_group" }}'
      if: ctx.o365?.reports?.metadata?.name == 'Viva Engage Groups Activity Group Detail'
      tag: pipeline_viva_engage_groups_activity_group
      description: Route to viva_engage_groups_activity_group
      ignore_missing_pipeline: true

  # Cleanup
  - remove:
      field:
        - json
      tag: remove_temporary_fields
      ignore_missing: true
  - script:
      lang: painless
      tag: script_to_remove_null_values
      description: Drops null/empty values recursively.
      source: |
        boolean drop(Object o) {
          if (o == null || o == "") {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_event_kind_2
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
