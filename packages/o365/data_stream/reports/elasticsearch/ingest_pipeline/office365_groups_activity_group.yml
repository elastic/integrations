  - date:
      field: o365.reports.office365.groups_activity.group.Report_Refresh_Date
      target_field: o365.reports.office365.groups_activity.group.Report_Refresh_Date
      tag: date_o365_reports_office365_groups_activity_group_Report_Refresh_Date
      if: ctx.o365?.reports?.office365?.groups_activity?.group?.Report_Refresh_Date != null && ctx.o365.reports.office365.groups_activity.group.Report_Refresh_Date != ''
      timezone: UTC
      formats:
        - yyyy-MM-dd
      on_failure:
        - remove:
            field: o365.reports.office365.groups_activity.group.Report_Refresh_Date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_timestamp_from_Report_Refresh_Date
      copy_from: o365.reports.office365.groups_activity.group.Report_Refresh_Date
      ignore_empty_value: true
  - date:
      field: o365.reports.office365.groups_activity.group.Last_Activity_Date
      target_field: o365.reports.office365.groups_activity.group.Last_Activity_Date
      tag: date_o365_reports_office365_groups_activity_group_Last_Activity_Date
      if: ctx.o365?.reports?.office365?.groups_activity?.group?.Last_Activity_Date != null && ctx.o365.reports.office365.groups_activity.group.Last_Activity_Date != ''
