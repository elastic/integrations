---
description: Pipeline for processing Microsoft 365 groups activity by group report data.
processors:
  - rename:
      field: json
      target_field: o365.reports.office365.groups_activity.group
      ignore_missing: true
  - fingerprint:
      fields:
        - o365.reports.office365.groups_activity.group.Report_Refresh_Date
        - o365.reports.office365.groups_activity.group.Group_Id
        - o365.reports.office365.groups_activity.group.Group_Display_Name
        - o365.reports.office365.groups_activity.group.Last_Activity_Date
      target_field: _id
  - set:
      field: user.name
      tag: set_user_name
      copy_from: o365.reports.office365.groups_activity.group.Owner_Principal_Name
      if: ctx.o365?.reports?.office365?.groups_activity?.group?.Owner_Principal_Name != null
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_related_user_user_name
      value: "{{{user.name}}}"
      allow_duplicates: false
      if: ctx.user?.name != null
  - set:
      field: group.id
      tag: set_group_name
      copy_from: o365.reports.office365.groups_activity.group.Group_Id
      if: ctx.o365?.reports?.office365?.groups_activity?.group?.Group_Id != null
      ignore_empty_value: true
  - set:
      field: user.group.id
      tag: set_user_group_id
      copy_from: group.id
      ignore_empty_value: true
  - set:
      field: group.name
      tag: set_group_name
      copy_from: o365.reports.office365.groups_activity.group.Group_Display_Name
      if: ctx.o365?.reports?.office365?.groups_activity?.group?.Group_Display_Name != null
