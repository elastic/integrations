---
description: Pipeline for processing Microsoft Teams user activity by user data.
processors:
  - set:
      field: ecs.version
      value: 8.11.0
  - fail:
      tag: cel_failure
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      message: error message set and no data to process
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      if: ctx.event?.original != null
      field: message
      ignore_missing: true
  # The naming is based on the Graph API sectioning.
  - json:
      field: event.original
      target_field: o365.teams.user_activity.user_detail
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365.teams.user_activity.user_detail.
      tag: painless_purge_spaces_and_dashes
      if: ctx.o365?.teams?.user_activity?.user_detail instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('_');
        }
        
        def out = [:];
        for (def item : ctx.o365.teams.user_activity.user_detail.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365.teams.user_activity.user_detail = out;
  - fingerprint:
      fields:
        - o365.teams.user_activity.user_detail.Report_Refresh_Date
        - o365.teams.user_activity.user_detail.User_Id
        - o365.teams.user_activity.user_detail.User_Principal_Name
        - o365.teams.user_activity.user_detail.Last_Activity_Date
      target_field: _id
  - set:
      field: user.id
      tag: set_user_id
      copy_from: o365.teams.user_activity.user_detail.User_Id
      ignore_empty_value: true
  # Depending on report settings, User_Principal_Name can contain user's email or anonymized username.
  - set:
      field: user.email
      tag: set_user_email
      copy_from: o365.teams.user_activity.user_detail.User_Principal_Name
      if: ctx.o365?.teams?.user_activity?.user_detail?.User_Principal_Name != null && ctx.o365.teams.user_activity.user_detail.User_Principal_Name.contains('@')
      ignore_empty_value: true
  - set:
      field: user.name
      tag: set_user_name
      copy_from: o365.teams.user_activity.user_detail.User_Principal_Name
      if: ctx.o365?.teams?.user_activity?.user_detail?.User_Principal_Name != null && !ctx.o365.teams.user_activity.user_detail.User_Principal_Name.contains('@')
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_related_user_user_id
      value: "{{{user.id}}}"
      allow_duplicates: false
      if: ctx.user?.id != null
  - append:
      field: related.user
      tag: append_related_user_user_name
      value: "{{{user.name}}}"
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_related_user_user_email
      value: "{{{user.email}}}"
      allow_duplicates: false
      if: ctx.user?.email != null
  - date:
      field: o365.teams.user_activity.user_detail.Report_Refresh_Date
      target_field: o365.teams.user_activity.user_detail.Report_Refresh_Date
      tag: date_o365_teams_user_activity_user_detail_Report_Refresh_Date
      if: ctx.o365?.teams?.user_activity?.user_detail?.Report_Refresh_Date != null && ctx.o365.teams.user_activity.user_detail.Report_Refresh_Date != ''
      timezone: UTC
      formats:
        - yyyy-MM-dd
      on_failure:
        - remove:
            field: o365.teams.user_activity.user_detail.Report_Refresh_Date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
