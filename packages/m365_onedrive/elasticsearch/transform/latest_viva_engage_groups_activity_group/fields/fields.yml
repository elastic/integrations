- name: o365.reports
  type: group
  fields:
    # Metadata fields
    - name: metadata
      type: group
      fields:
        - name: name
          type: keyword
        - name: api_path
          type: keyword
    # Viva Engage Groups Activity Group Detail
    - name: viva_engage.groups_activity.group
      type: group
      fields:
        - name: Report_Refresh_Date
          type: date
        - name: Last_Activity_Date
          type: date
        - name: Group_Display_Name
          type: keyword
        - name: Group_Type
          type: keyword
        - name: Owner_Principal_Name
          type: keyword
        - name: Is_Deleted
          type: boolean
        - name: Member_Count
          type: long
        - name: Liked_Count
          type: long
        - name: Posted_Count
          type: long
        - name: Read_Count
          type: long
        - name: Office_365_Connected
          type: boolean
        - name: Report_Period
          type: keyword
