- name: m365_onedrive.usage
  type: group
  fields:
    # Metadata fields
    - name: metadata
      type: group
      fields:
        - name: name
          type: keyword
        - name: api_path
          type: keyword
    # OneDrive Usage Account Detail
    - name: account_detail
      type: group
      fields:
        - name: Report_Refresh_Date
          type: date
        - name: Last_Activity_Date
          type: date
        - name: Site_Id
          type: keyword
        - name: Site_URL
          type: keyword
        - name: Owner_Display_Name
          type: keyword
        - name: Owner_Principal_Name
          type: keyword
        - name: Is_Deleted
          type: boolean
        - name: File_Count
          type: long
        - name: Active_File_Count
          type: long
        - name: Storage_Used_Byte
          type: long
        - name: Storage_Allocated_Byte
          type: long
        - name: Report_Period
          type: keyword
