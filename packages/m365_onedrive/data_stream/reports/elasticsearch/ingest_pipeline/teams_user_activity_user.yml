---
description: Pipeline for processing Microsoft Teams user activity by user report data.
processors:
  - rename:
      field: json
      target_field: o365.reports.teams.user_activity.user
      ignore_missing: true
  - fingerprint:
      fields:
        - o365.reports.teams.user_activity.user.Report_Refresh_Date
        - o365.reports.teams.user_activity.user.User_Id
        - o365.reports.teams.user_activity.user.User_Principal_Name
        - o365.reports.teams.user_activity.user.Last_Activity_Date
      target_field: _id
  - set:
      field: user.id
      tag: set_user_id
      copy_from: o365.reports.teams.user_activity.user.User_Id
      ignore_empty_value: true
  - set:
      field: user.name
      tag: set_user_name
      copy_from: o365.reports.teams.user_activity.user.User_Principal_Name
      if: ctx.o365?.reports?.teams?.user_activity?.user?.User_Principal_Name != null
      ignore_empty_value: true
  - set:
      field: user.email
      tag: set_user_email
      copy_from: user.name
      if: ctx.user?.name != null && ctx.user.name.contains('@')
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_related_user_user_id
      value: "{{{user.id}}}"
      allow_duplicates: false
      if: ctx.user?.id != null
  - append:
      field: related.user
      tag: append_related_user_user_name
      value: "{{{user.name}}}"
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_related_user_user_email
      value: "{{{user.email}}}"
      allow_duplicates: false
      if: ctx.user?.email != null
  - date:
      field: o365.reports.teams.user_activity.user.Report_Refresh_Date
      target_field: o365.reports.teams.user_activity.user.Report_Refresh_Date
      tag: date_o365_reports_teams_user_activity_user_Report_Refresh_Date
      if: ctx.o365?.reports?.teams?.user_activity?.user?.Report_Refresh_Date != null && ctx.o365.reports.teams.user_activity.user.Report_Refresh_Date != ''
      timezone: UTC
      formats:
        - yyyy-MM-dd
      on_failure:
        - remove:
            field: o365.reports.teams.user_activity.user.Report_Refresh_Date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
