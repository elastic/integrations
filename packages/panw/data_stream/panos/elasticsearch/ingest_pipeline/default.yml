      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.public.ip
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_e622dfb3
  - convert:
      field: panw.panos.private.ip
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.private.ip
        - append:
