      tag: convert_b2b9abd6
  - convert:
      field: destination.bytes
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: destination.bytes
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_0a242610
  - convert:
      field: destination.packets
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: destination.packets
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_7d192c10
  - convert:
      field: destination.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: destination.port
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_171174d6
  - convert:
      field: panw.panos.destination.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.destination.port
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_aaa32012
  - convert:
      field: panw.panos.destination.nat.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.destination.nat.port
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_f49d8810
  - convert:
      field: network.bytes
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: network.bytes
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_137cfc8c
  - convert:
      field: network.packets
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: network.packets
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_f604bedc
  - convert:
      field: event.duration
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: event.duration
