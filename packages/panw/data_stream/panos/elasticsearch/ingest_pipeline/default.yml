            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_70bae4ad
  - convert:
      field: panw.panos.public.ipv6
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.public.ipv6
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_a4cf5eef
  - convert:
      field: panw.panos.private.ipv6
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.private.ipv6
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_51ac2039
  - convert:
      field: panw.panos.end_ip_address
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.end_ip_address
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_7b4803b9
  - convert:
      field: panw.panos.remote_user.ip
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.remote_user.ip
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_538f2d3f

  # convert integer fields as the output of the CSV processor is always a string.
  - convert:
      field: source.bytes
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: source.bytes
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_895571fa
  - convert:
      field: source.packets
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: source.packets
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_d535b112
  - convert:
      field: source.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: source.port
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_5c60e782
  - convert:
      field: panw.panos.source.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: panw.panos.source.port
        - append:
