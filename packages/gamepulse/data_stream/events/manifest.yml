title: "GamePulse Events"
type: logs
streams:
  - input: filestream
    title: GamePulse Events
    description: GamePulse game lifecycle events (game start/end, settings changes)
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: false
        show_user: true
        default:
          - /var/log/gamepulse/*.log
