# HAProxy OTel — Overview dashboard
# Index: metrics-haproxyreceiver.otel-*

dashboards:
- id: haproxy_otel-overview
  name: '[HAProxy OTel] Overview'
  description: Top-level health across all proxies — error rates, traffic volume, latency summary, session saturation, server availability.
  filters:
  - field: data_stream.dataset
    equals: haproxyreceiver.otel
  time_range:
    from: "now-1h"
    to: "now"
  settings:
    margins: true
    titles: true
    sync:
      cursor: true
      tooltips: false
      colors: false
  controls:
  - type: options
    label: Proxy
    data_view: metrics-*
    field: haproxy.proxy_name
  - type: options
    label: HAProxy Instance
    data_view: metrics-*
    field: haproxy.addr
  panels:
  - title: Navigation
    size: {w: 48, h: 2}
    links:
      layout: horizontal
      items:
      - label: Overview
        dashboard: haproxy_otel-overview
      - label: Frontend
        dashboard: haproxy_otel-frontend
      - label: Backend
        dashboard: haproxy_otel-backend
      - label: Server
        dashboard: haproxy_otel-server

  - hide_title: true
    size: {w: 12, h: 8}
    markdown:
      content: |
        ## [HAProxy OTel] Overview

        Top-level health across all HAProxy proxies:
        - Request rate and traffic volume
        - Error rates (connection, request, response)
        - Latency summary (response time, session time)
        - Session saturation and capacity headroom
        - Backend server availability

  - title: Total Request Rate
    hide_title: true
    size: {w: 12, h: 4}
    esql:
      type: metric
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.service_name == "FRONTEND" AND haproxy.requests.total IS NOT NULL
      - STATS req_rate = SUM(RATE(haproxy.requests.total))
      primary:
        field: req_rate
        label: req/s
        format:
          type: number
          decimals: 1
          suffix: "/s"

  - title: Connection Rate
    hide_title: true
    size: {w: 12, h: 4}
    esql:
      type: metric
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.connections.rate IS NOT NULL
      - STATS conn_rate = AVG(haproxy.connections.rate)
      primary:
        field: conn_rate
        label: conn/s
        format:
          type: number
          decimals: 1
          suffix: "/s"

  - title: Error Rate (Request + Response + Connection)
    hide_title: true
    size: {w: 12, h: 4}
    esql:
      type: metric
      query:
      - TS metrics-haproxyreceiver.otel-*
      - STATS req_e = SUM(RATE(haproxy.requests.errors)), resp_e = SUM(RATE(haproxy.responses.errors)), conn_e = 
        SUM(RATE(haproxy.connections.errors))
      - EVAL err_rate = COALESCE(req_e, 0) + COALESCE(resp_e, 0) + COALESCE(conn_e, 0)
      primary:
        field: err_rate
        label: errors/s
        format:
          type: number
          decimals: 2
          suffix: "/s"

  - title: Avg Response Time
    hide_title: true
    size: {w: 12, h: 4}
    esql:
      type: metric
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.responses.average_time IS NOT NULL
      - STATS avg_rt = AVG(AVG_OVER_TIME(haproxy.responses.average_time))
      primary:
        field: avg_rt
        label: ms
        format:
          type: number
          decimals: 1
          suffix: " ms"

  - title: Active Sessions
    hide_title: true
    size: {w: 12, h: 4}
    esql:
      type: metric
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.sessions.count IS NOT NULL
      - STATS sessions = SUM(LAST_OVER_TIME(haproxy.sessions.count))
      primary:
        field: sessions
        label: sessions
        format:
          type: number
          compact: true

  - title: Active Backend Servers
    hide_title: true
    size: {w: 12, h: 4}
    esql:
      type: metric
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.service_name == "BACKEND" AND haproxy.active IS NOT NULL
      - STATS active = SUM(LAST_OVER_TIME(haproxy.active))
      primary:
        field: active
        label: servers
        format:
          type: number
          decimals: 0

  - title: Requests by Status Code Over Time
    size: {w: 48, h: 12}
    esql:
      type: area
      mode: stacked
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.service_name == "FRONTEND" AND haproxy.requests.total IS NOT NULL AND attributes.status_code IS NOT NULL
      - STATS requests = SUM(RATE(haproxy.requests.total)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.status_code
      - SORT time_bucket ASC
      dimension:
        field: time_bucket
        data_type: date
      metrics:
      - field: requests
        label: Requests/s
        format:
          type: number
          decimals: 1
      breakdown:
        field: attributes.status_code
      color:
        palette: eui_amsterdam_color_blind
        assignments:
        - value: "2xx"
          color: '#54B399'
        - value: "3xx"
          color: '#6DCCB1'
        - value: "4xx"
          color: '#D6BF57'
        - value: "5xx"
          color: '#E7664C'
        - value: "1xx"
          color: '#79AAD9'
        - value: "other"
          color: '#DDDDDD'
      legend:
        visible: show
        position: right

  - title: Error Rates Over Time
    size: {w: 24, h: 12}
    esql:
      type: line
      query:
      - TS metrics-haproxyreceiver.otel-*
      - STATS req_err = SUM(RATE(haproxy.requests.errors)), resp_err = SUM(RATE(haproxy.responses.errors)), conn_err = 
        SUM(RATE(haproxy.connections.errors)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
      - EVAL req_err = COALESCE(req_err, 0)
      - EVAL resp_err = COALESCE(resp_err, 0)
      - EVAL conn_err = COALESCE(conn_err, 0)
      - SORT time_bucket ASC
      dimension:
        field: time_bucket
        data_type: date
      metrics:
      - field: req_err
        label: Request errors/s
        format:
          type: number
          decimals: 2
      - field: resp_err
        label: Response errors/s
        format:
          type: number
          decimals: 2
      - field: conn_err
        label: Connection errors/s
        format:
          type: number
          decimals: 2
      legend:
        visible: show
        position: right

  - title: Session Saturation (Current / Limit)
    size: {w: 24, h: 12}
    esql:
      type: line
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.sessions.count IS NOT NULL
      - STATS sessions = SUM(LAST_OVER_TIME(haproxy.sessions.count)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
      - SORT time_bucket ASC
      dimension:
        field: time_bucket
        data_type: date
      metrics:
      - field: sessions
        label: Active sessions
        format:
          type: number
          decimals: 0
      legend:
        visible: show
        position: right

  - title: Latency Over Time (Response & Session Avg)
    size: {w: 24, h: 12}
    esql:
      type: line
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.responses.average_time IS NOT NULL OR haproxy.sessions.average IS NOT NULL
      - STATS resp_time = AVG(AVG_OVER_TIME(haproxy.responses.average_time)), sess_time = AVG(AVG_OVER_TIME(haproxy.sessions.average)) BY 
        time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
      - SORT time_bucket ASC
      dimension:
        field: time_bucket
        data_type: date
      metrics:
      - field: resp_time
        label: Response avg (ms)
        format:
          type: number
          decimals: 1
      - field: sess_time
        label: Session avg (ms)
        format:
          type: number
          decimals: 1
      legend:
        visible: show
        position: right

  - title: Bytes Throughput Over Time
    size: {w: 24, h: 12}
    esql:
      type: area
      mode: stacked
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.service_name == "FRONTEND" AND (haproxy.bytes.input IS NOT NULL OR haproxy.bytes.output IS NOT NULL)
      - STATS bytes_in = SUM(RATE(haproxy.bytes.input)), bytes_out = SUM(RATE(haproxy.bytes.output)) BY time_bucket = BUCKET(@timestamp, 20,
        ?_tstart, ?_tend)
      - EVAL bytes_in = COALESCE(bytes_in, 0)
      - EVAL bytes_out = COALESCE(bytes_out, 0)
      - SORT time_bucket ASC
      dimension:
        field: time_bucket
        data_type: date
      metrics:
      - field: bytes_in
        label: Bytes in/s
        format:
          type: bytes
      - field: bytes_out
        label: Bytes out/s
        format:
          type: bytes
      legend:
        visible: show
        position: right

  - title: Top Proxies by Request Rate
    size: {w: 24, h: 15}
    esql:
      type: datatable
      query:
      - TS metrics-haproxyreceiver.otel-*
      - WHERE haproxy.requests.total IS NOT NULL
      - STATS req_rate = SUM(RATE(haproxy.requests.total)) BY haproxy.proxy_name, haproxy.service_name
      - WHERE haproxy.service_name == "FRONTEND" OR haproxy.service_name == "BACKEND"
      - SORT req_rate DESC
      - LIMIT 20
      breakdowns:
      - field: haproxy.proxy_name
        label: Proxy
      - field: haproxy.service_name
        label: Type
      metrics:
      - field: req_rate
        label: Requests/s
        format:
          type: number
          decimals: 1
      paging:
        enabled: true
        page_size: 10
