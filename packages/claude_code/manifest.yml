format_version: "3.6.0"
name: claude_code
title: Claude Code
version: "0.1.0"
source:
  license: "Elastic-2.0"
description: Collect Claude Code agentic telemetry via OpenTelemetry.
type: integration
categories:
  - security
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: "basic"
icons:
  - src: /img/claude-logo.svg
    title: Claude logo
    size: 32x32
    type: image/svg+xml
screenshots:
  - src: /img/dashboard-session-timeline.png
    title: Session Timeline
    size: 1024x720
    type: image/png
  - src: /img/dashboard-security-overview.png
    title: Security Overview
    size: 1024x995
    type: image/png
  - src: /img/dashboard-cost-usage.png
    title: Cost & Usage
    size: 1024x780
    type: image/png
  - src: /img/dashboard-tool-call-analysis.png
    title: Tool Call Analysis
    size: 1024x1000
    type: image/png
  - src: /img/dashboard-mcp-server-access.png
    title: MCP Server Access
    size: 1024x810
    type: image/png
  - src: /img/dashboard-permission-decisions.png
    title: Permission Decisions
    size: 1024x810
    type: image/png
policy_templates:
  - name: claude_code
    title: Claude Code events
    description: Collect Claude Code agentic telemetry via OpenTelemetry.
    inputs:
      - type: otelcol
        title: Collect Claude Code events via OpenTelemetry
        description: Receive Claude Code OTLP logs exported by the Claude Code CLI.
owner:
  github: elastic/security-service-integrations
  type: elastic
