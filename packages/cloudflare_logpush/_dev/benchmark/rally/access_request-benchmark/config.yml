fields:
  - name: timestamp
    period: -24h
  - name: action
    enum:
      - login
      - logout
  - name: allowed
    enum:
      - "true"
      - "false"
  - name: app_domain
    enum:
      - partner-zt-logs.cloudflareaccess.com/warp
      - dashboard.cloudflareaccess.com
      - internal-app.cloudflareaccess.com
  - name: app_uuid
    cardinality: 1000
  - name: connection
    enum:
      - onetimepin
      - saml
      - google-apps
      - github
      - okta
  - name: country
    enum:
      - us
      - gb
      - de
      - fr
      - in
      - au
      - jp
      - ca
  - name: email
    cardinality: 10000
  - name: ip_address
    cardinality: 10000
  - name: purpose_justification_prompt
    enum:
      - "Please provide your reason for accessing the application."
      - "Justify your access request."
      - "Why do you need access?"
  - name: purpose_justification_response
    enum:
      - "I need to access the application for work purposes."
      - "Required for project deliverables."
      - "Routine maintenance access."
  - name: ray_id
    cardinality: 100000
  - name: temporary_access_duration
    range:
      min: 3600
      max: 86400
  - name: user_uid
    cardinality: 100000
