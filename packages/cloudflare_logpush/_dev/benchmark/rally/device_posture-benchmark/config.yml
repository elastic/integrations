fields:
  - name: timestamp
    period: -24h
  - name: client_version
    enum:
      - "2023.3.258"
      - "2023.7.100"
      - "2024.1.50"
      - "2024.3.200"
  - name: device_id
    cardinality: 10000
  - name: device_manufacturer
    enum:
      - "Google Compute Engine"
      - "Dell Inc."
      - "Apple Inc."
      - "Lenovo"
      - "HP"
  - name: device_model
    enum:
      - "Google Compute Engine"
      - "XPS 15"
      - "MacBook Pro"
      - "ThinkPad X1 Carbon"
      - "EliteBook 840"
  - name: device_name
    cardinality: 10000
  - name: device_serial_number
    cardinality: 10000
  - name: device_type
    enum:
      - linux
      - windows
      - macos
      - ios
      - android
  - name: email
    cardinality: 5000
  - name: os_version
    enum:
      - "5.15.0"
      - "10.0.19045"
      - "13.4.1"
      - "14.0"
      - "22.04"
  - name: policy_id
    cardinality: 100
  - name: posture_check_name
    enum:
      - Ubuntu
      - Windows Firewall
      - macOS Disk Encryption
      - Antivirus Running
      - OS Version Check
  - name: posture_check_type
    enum:
      - os_version
      - firewall
      - disk_encryption
      - application_check
      - domain_joined
  - name: posture_evaluated_result
    enum:
      - "true"
      - "false"
  - name: user_uid
    cardinality: 5000
