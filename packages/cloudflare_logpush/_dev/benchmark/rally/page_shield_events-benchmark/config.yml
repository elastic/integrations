fields:
  - name: timestamp
    period: -24h
  - name: action
    enum: [log, allow, block]
  - name: csp_directive
    cardinality: 100
  - name: host
    cardinality: 5000
  - name: policy_id
    cardinality: 100
  - name: resource_type
    enum: [script, xhr, fetch, websocket, other]
  - name: url_host
    cardinality: 5000
