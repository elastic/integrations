fields:
  - name: timestamp
    period: -24h
  - name: client_ip_asn
    range:
      min: 1
      max: 65535
  - name: client_ip_asn_description
    cardinality: 1000
  - name: client_ip_country
    enum: [US, GB, DE, FR, IN, AU, JP, CA, BR, CN]
  - name: last_known_good_colo_code
    enum: [SJC, SFO, JFK, LAX, LHR, FRA, NRT, SIN, SYD, GRU, MRS, ORD]
  - name: phase
    enum: [connection, dns, application]
  - name: type
    enum: [network-error, http-error, abandoned, address-unreachable, cache-read-error, dns-address-changed, dns-name-not-resolved, dns-unreachable, tcp-aborted, tcp-address-invalid, tcp-address-unreachable, tcp-failed, tcp-refused, tcp-reset, tcp-timed-out, tls-failed, tls-name-mismatch, tls-version-or-cipher-mismatch]
