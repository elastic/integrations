fields:
  - name: timestamp
    period: -24h
  - name: action
    enum: [allow, block, challenge, jschallenge, log, managedchallenge, skip]
  - name: client_asn
    range:
      min: 1
      max: 65535
  - name: client_asn_description
    cardinality: 1000
  - name: client_country
    enum: [US, GB, DE, FR, IN, AU, JP, CA, BR, CN]
  - name: client_ip
    cardinality: 10000
  - name: client_ip_class
    enum: [unknown, clean, badHost, searchEngine, allowlist, greylist, monitoringService, securityScanner, noRecord, scan, backupDNSResolver, tor]
  - name: client_request_host
    cardinality: 10000
  - name: client_request_method
    enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
  - name: client_request_path
    cardinality: 50000
  - name: client_request_protocol
    enum: [HTTP/1.0, HTTP/1.1, HTTP/2, HTTP/3]
  - name: client_request_scheme
    enum: [http, https]
  - name: client_request_user_agent
    cardinality: 5000
  - name: edge_colo_code
    enum: [SFO, JFK, LAX, LHR, FRA, NRT, SIN, SYD, GRU, MRS]
  - name: edge_response_status
    enum: [200, 301, 302, 304, 400, 401, 403, 404, 500, 502, 503]
  - name: kind
    enum: [firewall]
  - name: match_index
    range:
      min: 0
      max: 10
  - name: origin_response_status
    enum: [200, 301, 302, 304, 400, 401, 403, 404, 500, 502, 503]
  - name: originator_ray_id
    cardinality: 100000
  - name: ray_id
    cardinality: 100000
  - name: rule_id
    cardinality: 1000
  - name: source
    enum: [unknown, asn, country, ip, ipRange, securityLevel, zoneLockdown, waf, firewallRules, uaBlock, rateLimit, bic, hot, l7ddos, sanitycheck, protect]
