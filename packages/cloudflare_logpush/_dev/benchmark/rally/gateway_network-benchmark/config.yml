fields:
  - name: timestamp
    period: -24h
  - name: account_id
    cardinality: 100
  - name: action
    enum: [allowedOnNoRuleMatch, allowedByIpAddress, blockedByIpAddress, allowedRule, blockedRule]
  - name: destination_ip
    cardinality: 5000
  - name: destination_port
    range:
      min: 1
      max: 65535
  - name: device_id
    cardinality: 10000
  - name: device_name
    cardinality: 10000
  - name: email
    cardinality: 5000
  - name: override_ip
    cardinality: 1000
  - name: override_port
    range:
      min: 1
      max: 65535
  - name: policy_id
    cardinality: 100
  - name: policy_name
    cardinality: 100
  - name: sni
    cardinality: 10000
  - name: session_id
    cardinality: 100000
  - name: source_ip
    cardinality: 10000
  - name: source_internal_ip
    cardinality: 5000
  - name: source_port
    range:
      min: 1024
      max: 65535
  - name: transport_protocol
    enum: [tcp, udp, icmp]
  - name: user_id
    cardinality: 5000
