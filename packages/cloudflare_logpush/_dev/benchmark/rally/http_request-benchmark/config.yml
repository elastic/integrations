fields:
  - name: timestamp
    period: -24h
  - name: bot_score
    range:
      min: 0
      max: 100
  - name: bot_score_src
    enum: [Not Computed, Heuristics, Machine Learning, Behavioral Analysis, Verified Bot, JS Fingerprinting]
  - name: cache_cache_status
    enum: [dynamic, hit, miss, expired, stale, bypass, revalidated, updating, unknown]
  - name: cache_response_bytes
    range:
      min: 0
      max: 10000000
  - name: cache_tiered_fill
    enum: ["true", "false"]
  - name: client_asn
    range:
      min: 1
      max: 65535
  - name: client_country
    enum: [US, GB, DE, FR, IN, AU, JP, CA, BR, CN, SA]
  - name: client_device_type
    enum: [desktop, mobile, tablet, other]
  - name: client_ip
    cardinality: 10000
  - name: client_ip_class
    enum: [unknown, clean, badHost, searchEngine, allowlist, greylist, monitoringService, securityScanner, noRecord]
  - name: client_request_bytes
    range:
      min: 0
      max: 100000
  - name: client_request_host
    cardinality: 10000
  - name: client_request_method
    enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
  - name: client_request_path
    cardinality: 50000
  - name: client_request_protocol
    enum: [HTTP/1.0, HTTP/1.1, HTTP/2, HTTP/3]
  - name: client_request_scheme
    enum: [http, https]
  - name: client_request_user_agent
    cardinality: 5000
  - name: client_src_port
    range:
      min: 0
      max: 65535
  - name: client_ssl_protocol
    enum: [none, TLSv1, TLSv1.1, TLSv1.2, TLSv1.3]
  - name: edge_colo_code
    enum: [SFO, JFK, LAX, LHR, FRA, NRT, SIN, SYD, GRU, MRS, RUH, ORD]
  - name: edge_colo_id
    range:
      min: 1
      max: 500
  - name: edge_response_body_bytes
    range:
      min: 0
      max: 10000000
  - name: edge_response_bytes
    range:
      min: 0
      max: 10000000
  - name: edge_response_content_type
    enum: [text/html, application/json, text/css, application/javascript, image/png, image/jpeg]
  - name: edge_response_status
    enum: [200, 301, 302, 304, 400, 401, 403, 404, 500, 502, 503]
  - name: edge_server_ip
    cardinality: 1000
  - name: edge_time_to_first_byte_ms
    range:
      min: 0
      max: 30000
  - name: origin_ip
    cardinality: 5000
  - name: origin_response_duration_ms
    range:
      min: 0
      max: 30000
  - name: origin_response_status
    enum: [200, 301, 302, 304, 400, 401, 403, 404, 500, 502, 503]
  - name: parent_ray_id
    cardinality: 100000
  - name: ray_id
    cardinality: 100000
  - name: security_level
    enum: [off, essentially_off, low, medium, high, under_attack]
  - name: security_action
    enum: [unknown, allow, drop, challenge, jschallenge, log, connectionClose, simulate]
  - name: zone_id
    range:
      min: 1
      max: 999999999
  - name: zone_name
    cardinality: 1000
