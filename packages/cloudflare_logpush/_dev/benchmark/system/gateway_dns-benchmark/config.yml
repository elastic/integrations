fields:
  - name: timestamp
    period: -24h
  - name: application_id
    range:
      min: 0
      max: 1000
  - name: colo_code
    enum: [ORD, SFO, JFK, LAX, LHR, FRA, NRT, SIN, SYD, GRU]
  - name: colo_id
    range:
      min: 1
      max: 300
  - name: device_id
    cardinality: 10000
  - name: device_name
    cardinality: 10000
  - name: dst_ip
    cardinality: 5000
  - name: dst_port
    range:
      min: 1
      max: 65535
  - name: email
    cardinality: 5000
  - name: location
    cardinality: 100
  - name: location_id
    cardinality: 100
  - name: policy_name
    cardinality: 100
  - name: policy_id
    cardinality: 100
  - name: protocol
    enum: [https, http, dns, tls]
  - name: query_name
    cardinality: 50000
  - name: query_name_reversed
    cardinality: 50000
  - name: query_size
    range:
      min: 20
      max: 512
  - name: query_type
    enum: [1, 2, 5, 6, 12, 15, 16, 28, 33]
  - name: query_type_name
    enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, SRV, PTR]
  - name: rcode
    enum: [0, 1, 2, 3, 4, 5]
  - name: resolver_decision
    enum: [allowedOnNoPolicyMatch, allowedByQueryName, blockedByQueryName, allowedRule, blockedRule, safeSearchBlock, allowedOnNoLocation]
  - name: src_ip
    cardinality: 10000
  - name: src_port
    range:
      min: 0
      max: 65535
  - name: user_id
    cardinality: 5000
