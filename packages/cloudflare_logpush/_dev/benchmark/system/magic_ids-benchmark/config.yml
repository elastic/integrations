fields:
  - name: timestamp
    period: -24h
  - name: action
    enum: [pass, block, alert]
  - name: colo_code
    enum: [NRT, SFO, JFK, LAX, LHR, FRA, SIN, SYD, GRU, MRS]
  - name: colo_city
    enum: [Tokyo, San Francisco, New York, Los Angeles, London, Frankfurt, Singapore, Sydney, Sao Paulo, Marseille]
  - name: destination_ip
    cardinality: 5000
  - name: destination_port
    range:
      min: 1
      max: 65535
  - name: protocol
    enum: [tcp, udp, icmp]
  - name: signature_id
    range:
      min: 1000000
      max: 9999999
  - name: signature_message
    cardinality: 5000
  - name: signature_revision
    range:
      min: 1
      max: 10
  - name: source_ip
    cardinality: 10000
  - name: source_port
    range:
      min: 1024
      max: 65535
