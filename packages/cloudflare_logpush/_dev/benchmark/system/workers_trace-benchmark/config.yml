fields:
  - name: event_timestamp_ms
    period: -24h
  - name: event_type
    enum: [fetch, cron, alarm, queue, email, tail, scheduled, trace]
  - name: outcome
    enum: [ok, exception, canceled, exceededCpu, exceededMemory, unknown]
  - name: script_name
    cardinality: 1000
  - name: dispatch_namespace
    cardinality: 100
