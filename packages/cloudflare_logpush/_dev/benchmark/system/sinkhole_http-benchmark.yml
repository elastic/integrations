---
description: Benchmark 10000 sinkhole_http events ingested
input: http_endpoint
vars:
  listen_address: 0.0.0.0
data_stream:
  name: sinkhole_http
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/sinkhole_http
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
warmup_time_period: 10s
corpora:
  input_service:
    name: cloudflare-logpush-sinkhole_http
    signal: SIGHUP
  generator:
    total_events: 10000
    template:
      path: ./sinkhole_http-benchmark/template.ndjson
      type: gotext
    config:
      path: ./sinkhole_http-benchmark/config.yml
    fields:
      path: ./sinkhole_http-benchmark/fields.yml
