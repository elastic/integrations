---
description: Benchmark 10000 network_analytics events ingested
input: http_endpoint
vars:
  listen_address: 0.0.0.0
data_stream:
  name: network_analytics
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/network_analytics
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
warmup_time_period: 10s
corpora:
  input_service:
    name: cloudflare-logpush-network_analytics
    signal: SIGHUP
  generator:
    total_events: 10000
    template:
      path: ./network_analytics-benchmark/template.ndjson
      type: gotext
    config:
      path: ./network_analytics-benchmark/config.yml
    fields:
      path: ./network_analytics-benchmark/fields.yml
