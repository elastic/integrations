fields:
  - name: timestamp
    period: -24h
  - name: account_id
    cardinality: 100
  - name: body_length
    range:
      min: 0
      max: 10000
  - name: dest_addr
    cardinality: 5000
  - name: host
    cardinality: 5000
  - name: method
    enum: [GET, POST, PUT, DELETE, HEAD, OPTIONS, PATCH]
  - name: password
    cardinality: 1000
  - name: r2_path
    cardinality: 100
  - name: sinkhole_id
    cardinality: 100
  - name: src_addr
    cardinality: 10000
  - name: uri
    cardinality: 10000
  - name: user_agent
    cardinality: 5000
  - name: username
    cardinality: 5000
