---
description: Benchmark 10000 dlp_forensic_copies events ingested
input: http_endpoint
vars:
  listen_address: 0.0.0.0
data_stream:
  name: dlp_forensic_copies
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/dlp_forensic_copies
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
warmup_time_period: 10s
corpora:
  input_service:
    name: cloudflare-logpush-dlp-forensic-copies
    signal: SIGHUP
  generator:
    total_events: 10000
    template:
      path: ./dlp_forensic_copies-benchmark/template.ndjson
      type: gotext
    config:
      path: ./dlp_forensic_copies-benchmark/config.yml
    fields:
      path: ./dlp_forensic_copies-benchmark/fields.yml
