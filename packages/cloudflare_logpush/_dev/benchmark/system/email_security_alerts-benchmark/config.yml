fields:
  - name: timestamp
    period: -24h
  - name: alert_id
    cardinality: 100000
  - name: final_disposition
    enum: [unset, malicious, suspicious, spoof, spam, bulk]
  - name: from
    cardinality: 10000
  - name: from_name
    cardinality: 10000
  - name: message_delivery_mode
    enum: [unset, direct, bcc, journaling]
  - name: message_id
    cardinality: 100000
  - name: origin
    enum: [unset, internal, external]
  - name: original_sender
    cardinality: 10000
  - name: reply_to
    cardinality: 10000
  - name: reply_to_name
    cardinality: 10000
  - name: smtp_envelope_from
    cardinality: 10000
  - name: smtp_helo_server_ip
    cardinality: 5000
  - name: smtp_helo_server_ip_as_name
    cardinality: 1000
  - name: smtp_helo_server_ip_as_number
    range:
      min: 1
      max: 65535
  - name: smtp_helo_server_name
    cardinality: 1000
  - name: subject
    cardinality: 50000
