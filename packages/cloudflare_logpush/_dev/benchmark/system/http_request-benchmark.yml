---
description: Benchmark 10000 http_request events ingested
input: http_endpoint
vars:
  listen_address: 0.0.0.0
data_stream:
  name: http_request
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/http_request
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
warmup_time_period: 10s
corpora:
  input_service:
    name: cloudflare-logpush-http_request
    signal: SIGHUP
  generator:
    total_events: 10000
    template:
      path: ./http_request-benchmark/template.ndjson
      type: gotext
    config:
      path: ./http_request-benchmark/config.yml
    fields:
      path: ./http_request-benchmark/fields.yml
