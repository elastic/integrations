fields:
  - name: timestamp
    period: -24h
  - name: account_id
    cardinality: 100
  - name: action
    enum: [allow, block, isolate, bypass, decrypt, safesearch, ytrestricted]
  - name: blocked_file_hash
    cardinality: 1000
  - name: blocked_file_name
    cardinality: 1000
  - name: blocked_file_reason
    enum: [malware, suspicious, unknown, none]
  - name: blocked_file_size
    range:
      min: 0
      max: 100000
  - name: blocked_file_type
    enum: [bin, exe, dll, pdf, doc, zip, none]
  - name: destination_ip
    cardinality: 5000
  - name: destination_port
    range:
      min: 1
      max: 65535
  - name: device_id
    cardinality: 10000
  - name: device_name
    cardinality: 10000
  - name: email
    cardinality: 5000
  - name: http_host
    cardinality: 10000
  - name: http_method
    enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS, CONNECT]
  - name: http_status_code
    enum: [200, 301, 302, 304, 400, 401, 403, 404, 500, 502, 503]
  - name: http_version
    enum: [HTTP/1.0, HTTP/1.1, HTTP/2, HTTP/3]
  - name: is_isolated
    enum: ["true", "false"]
  - name: policy_id
    cardinality: 100
  - name: policy_name
    cardinality: 100
  - name: referer
    cardinality: 10000
  - name: request_id
    cardinality: 100000
  - name: source_internal_ip
    cardinality: 5000
  - name: source_ip
    cardinality: 10000
  - name: source_port
    range:
      min: 1024
      max: 65535
  - name: untrusted_certificate_action
    enum: [none, block, error, passthrough]
  - name: user_agent
    cardinality: 5000
  - name: user_id
    cardinality: 5000
