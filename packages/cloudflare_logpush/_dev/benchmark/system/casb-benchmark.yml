---
description: Benchmark 10000 casb events ingested
input: http_endpoint
vars:
  listen_address: 0.0.0.0
data_stream:
  name: casb
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/casb
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
warmup_time_period: 10s
corpora:
  input_service:
    name: cloudflare-logpush-casb
    signal: SIGHUP
  generator:
    total_events: 10000
    template:
      path: ./casb-benchmark/template.ndjson
      type: gotext
    config:
      path: ./casb-benchmark/config.yml
    fields:
      path: ./casb-benchmark/fields.yml
