---
description: Benchmark 10000 dns_firewall events ingested
input: http_endpoint
vars:
  listen_address: 0.0.0.0
data_stream:
  name: dns_firewall
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/dns_firewall
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
warmup_time_period: 10s
corpora:
  input_service:
    name: cloudflare-logpush-dns-firewall
    signal: SIGHUP
  generator:
    total_events: 10000
    template:
      path: ./dns_firewall-benchmark/template.ndjson
      type: gotext
    config:
      path: ./dns_firewall-benchmark/config.yml
    fields:
      path: ./dns_firewall-benchmark/fields.yml
