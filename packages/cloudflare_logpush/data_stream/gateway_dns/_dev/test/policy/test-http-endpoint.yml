input: http_endpoint
vars:
  listen_address: 0.0.0.0
  secret_header: X-Secret-Header
  secret_value: secret
data_stream:
  vars:
    listen_port: 9560
    url: /cloudflare_logpush/gateway_dns
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
    enable_request_tracer: true
    processors: |
      - decode_json_fields:
          fields: ["message"]
          process_array: true
          max_depth: 10
          target: ""
          overwrite_keys: true
    tags: 
      - forwarded
