---
description: Pipeline for parsing Cloudflare HTTP Request logs.
processors:
  - set:
      tag: set_ecs_version_b777da29
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      tag: json_event_original_to_json_cac66847
      field: event.original
      target_field: json
      if: ctx.event?.original != null
  - set:
      tag: set_event_category_dbab8a4e
      field: event.category
      value: [network]
  - set:
      tag: set_event_kind_de80643c
      field: event.kind
      value: event
  - set:
      tag: set_event_type_ec95f7f2
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      tag: convert_json_EdgeStartTimestamp_3a05abf9
      field: json.EdgeStartTimestamp
      type: long
      if: ctx.json?.EdgeStartTimestamp != null && ctx.json.EdgeStartTimestamp != ''
      ignore_failure: true
  - convert:
      tag: convert_json_EdgeEndTimestamp_56e7554c
      field: json.EdgeEndTimestamp
      type: long
      if: ctx.json?.EdgeEndTimestamp != null && ctx.json.EdgeEndTimestamp != ''
      ignore_failure: true
  - convert:
      tag: convert_json_Datetime_712ea5a9
      field: json.Datetime
      type: long
      if: ctx.json?.Datetime != null && ctx.json.Datetime != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_edge_start_timestamp_to_milli
      source: |
        def convertToMillis(long timestamp) {
          if (timestamp > (long)(1e18)) {
            return timestamp/(long)(1e6)
          } else if (timestamp < (long)(1e10))  {
            return timestamp*(long)(1e3)
          }
          return timestamp
        }
        if (ctx.json?.EdgeStartTimestamp != null && ctx.json.EdgeStartTimestamp instanceof Number) {
          ctx.json.EdgeStartTimestamp = convertToMillis(ctx.json.EdgeStartTimestamp);
        }
        if (ctx.json?.EdgeEndTimestamp != null && ctx.json.EdgeEndTimestamp instanceof Number) {
          ctx.json.EdgeEndTimestamp = convertToMillis(ctx.json.EdgeEndTimestamp);
        }
        if (ctx.json?.Datetime != null && ctx.json.Datetime instanceof Number) {
          ctx.json.Datetime = convertToMillis(ctx.json.Datetime);
        }
      on_failure:
        - append:
            tag: append_error_message_edcb660c
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      tag: date_json_EdgeStartTimestamp_to_cloudflare_logpush_http_request_edge_start_time_6e9e517a
      field: json.EdgeStartTimestamp
      if: ctx.json?.EdgeStartTimestamp != null && ctx.json.EdgeStartTimestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      target_field: cloudflare_logpush.http_request.edge.start_time
      on_failure:
        - append:
            tag: append_error_message_0749b228
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      tag: date_json_EdgeEndTimestamp_to_cloudflare_logpush_http_request_edge_end_time_b977f372
      field: json.EdgeEndTimestamp
      if: ctx.json?.EdgeEndTimestamp != null && ctx.json.EdgeEndTimestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
