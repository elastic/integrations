---
description: Pipeline for parsing Cloudflare DNS Firewall logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
      tag: set_ecs_version
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: json_event_original
      if: ctx.event?.original != null
  - set:
      field: event.kind
      value: event
      tag: set_event_kind
  - set:
      field: event.category
      value: [network]
      tag: set_event_category
  - set:
      field: event.type
      value: [info]
      tag: set_event_type
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  # Timestamp
  - convert:
      tag: convert_json_Timestamp_7242ddce
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_timestamp_to_milli
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
            tag: append_error_message_df40dd8a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      tag: date_event_timestamp
      on_failure:
        - append:
            tag: append_error_message_ccdbdce0
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.dns_firewall.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true
      tag: set_timestamp

  # Handle source IP
  - convert:
      field: json.SourceIP
      tag: convert_sourceip_to_ip
      target_field: cloudflare_logpush.dns_firewall.source.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.SourceIP != null && ctx.json.SourceIP != ''
      on_failure:
        - append:
            tag: append_error_message_83a22c97
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      copy_from: cloudflare_logpush.dns_firewall.source.ip
      ignore_empty_value: true
      tag: set_source_ip
  # Geo enrichment (source IP)
  - geoip:
      field: source.ip
      target_field: source.geo
      tag: geo_source_ip
      ignore_missing: true
      if: ctx.source?.ip != null
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      tag: geo_source_as
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      if: ctx.source?.ip != null
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
      tag: rename_source_as_number
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
      tag: rename_source_as_org

  # Handle destination IP
  - convert:
      field: json.UpstreamIP
      tag: convert_upstreamip_to_ip
      target_field: cloudflare_logpush.dns_firewall.upstream.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.UpstreamIP != null && ctx.json.UpstreamIP != ''
      on_failure:
        - append:
            tag: append_error_message_a33c06b7
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.ip
      copy_from: cloudflare_logpush.dns_firewall.upstream.ip
      ignore_empty_value: true
      tag: set_destination_ip
  # Geo enrichment (destination IP)
  - geoip:
      field: destination.ip
      target_field: destination.geo
      tag: geo_destination_ip
      ignore_missing: true
      if: ctx.destination?.ip != null
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      tag: geo_destination_as
      field: destination.ip
      target_field: destination.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      if: ctx.destination?.ip != null
  - rename:
      field: destination.as.asn
      target_field: destination.as.number
      ignore_missing: true
      tag: rename_destination_as_number
  - rename:
      field: destination.as.organization_name
      target_field: destination.as.organization.name
      ignore_missing: true
      tag: rename_destination_as_org

  # DNS ECS fields
  - rename:
      field: json.QueryName
      target_field: cloudflare_logpush.dns_firewall.question.name
      ignore_missing: true
      tag: rename_question_name
  - set:
      field: dns.question.name
      copy_from: cloudflare_logpush.dns_firewall.question.name
      ignore_empty_value: true
      tag: set_question_name
  - rename:
      field: json.QueryType
      target_field: cloudflare_logpush.dns_firewall.question.type
      ignore_missing: true
      tag: rename_question_type
  - script:
      tag: script_e3625589
      lang: painless
      if: ctx.cloudflare_logpush?.dns_firewall?.question?.type != null
      params:
        "0": Reserved
        "1": A
        "2": NS
        "3": MD
        "4": MF
        "5": CNAME
        "6": SOA
        "7": MB
        "8": MG
        "9": MR
        "10": "NULL"
        "11": WKS
        "12": PTR
        "13": HINFO
        "14": MINFO
        "15": MX
        "16": TXT
        "17": RP
        "18": AFSDB
        "19": X25
        "20": ISDN
        "21": RT
        "22": NSAP
        "23": NSAP-PTR
        "24": SIG
        "25": KEY
        "26": PX
        "27": GPOS
        "28": AAAA
        "29": LOC
        "30": NXT
        "31": EID
        "32": NIMLOC
        "33": SRV
        "34": ATMA
        "35": NAPTR
        "36": KX
        "37": CERT
        "38": A6
        "39": DNAME
        "40": SINK
        "41": OPT
        "42": APL
        "43": DS
        "44": SSHFP
        "45": IPSECKEY
        "46": RRSIG
        "47": NSEC
        "48": DNSKEY
        "49": DHCID
        "50": NSEC3
        "51": NSEC3PARAM
        "52": TLSA
        "53": SMIMEA
        "55": HIP
        "56": NINFO
        "57": RKEY
        "58": TALINK
        "59": CDS
        "60": CDNSKEY
        "61": OPENPGPKEY
        "62": CSYNC
        "63": ZONEMD
        "64": SVCB
        "65": HTTPS
        "66": DSYNC
        "67": HHIT
        "68": BRID
        "99": SPF
        "100": UINFO
        "101": UID
        "102": GID
        "103": UNSPEC
        "104": NID
        "105": L32
        "106": L64
        "107": LP
        "108": EUI48
        "109": EUI64
        "128": NXNAME
        "249": TKEY
        "250": TSIG
        "251": IXFR
        "252": AXFR
        "253": MAILB
        "254": MAILA
        "255": ANY
        "256": URI
        "257": CAA
        "258": AVC
        "259": DOA
        "260": AMTRELAY
        "261": RESINFO
        "262": WALLET
        "263": CLA
        "264": IPN
        "32768": TA
        "32769": DLV
      source: |
        def queryType = String.valueOf(ctx.cloudflare_logpush.dns_firewall.question.type);
        ctx.dns = ctx.dns ?: [:];
        ctx.dns.question = ctx.dns.question ?: [:];
        if (params.containsKey(queryType)) {
          ctx.dns.question.type = params[queryType];
        }
      on_failure:
        - append:
            tag: append_error_message_ad962907
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.ClientResponseCode
      target_field: cloudflare_logpush.dns_firewall.response.code
      if: ctx.json?.ClientResponseCode != ''
      type: string
      ignore_missing: true
      tag: convert_dns_response_code
      on_failure:
        - append:
            tag: append_error_message_d8ae6c3a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.UpstreamResponseCode
      target_field: cloudflare_logpush.dns_firewall.upstream.response_code
      if: ctx.json?.UpstreamResponseCode != ''
      type: string
      ignore_missing: true
      tag: convert_dns_upstream_response_code
      on_failure:
        - append:
            tag: append_error_message_510a49ca
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: dns.response_code
      copy_from: cloudflare_logpush.dns_firewall.response.code
      ignore_empty_value: true
      tag: set_dns_response_code
  - set:
      field: dns.response_code
      copy_from: cloudflare_logpush.dns_firewall.upstream.response_code
      ignore_empty_value: true
      if: ctx.cloudflare_logpush?.dns_firewall?.response?.code == null
      tag: set_dns_upstream_response_code

  # Custom fields
  - rename:
      field: json.ClusterID
      target_field: cloudflare_logpush.dns_firewall.cluster_id
      ignore_missing: true
      tag: rename_cluster_id
  - rename:
      field: json.ColoCode
      target_field: cloudflare_logpush.dns_firewall.colo.code
      ignore_missing: true
      tag: rename_colo_code
  - convert:
      field: json.EDNSSubnet
      tag: convert_ednssubnet_to_ip
      target_field: cloudflare_logpush.dns_firewall.edns.subnet
      type: ip
      ignore_missing: true
      if: ctx.json?.EDNSSubnet != null && ctx.json.EDNSSubnet != ''
      on_failure:
        - append:
            tag: append_error_message_01372df7
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.EDNSSubnetLength
      tag: convert_ednssubnetlength_to_long
      target_field: cloudflare_logpush.dns_firewall.edns.subnet_length
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_84fd5472
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QueryDO
      tag: convert_querydo_to_boolean
      target_field: cloudflare_logpush.dns_firewall.question.dnssec_ok
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_406f267d
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QueryRD
      tag: convert_queryrd_to_boolean
      target_field: cloudflare_logpush.dns_firewall.question.recursion_desired
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_8c6a76fb
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QuerySize
      tag: convert_querysize_to_long
      target_field: cloudflare_logpush.dns_firewall.question.size
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_b8dd0db1
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QueryTCP
      tag: convert_querytcp_to_boolean
      target_field: cloudflare_logpush.dns_firewall.question.tcp
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_13cd5a09
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: network.transport
      value: tcp
      if: ctx.cloudflare_logpush?.dns_firewall?.question?.tcp == true
      tag: set_network_transport_tcp
  - set:
      field: network.transport
      value: udp
      if: ctx.cloudflare_logpush?.dns_firewall?.question?.tcp == false
      tag: set_network_transport_udp
  - convert:
      field: json.ResponseCached
      tag: convert_responsecached_to_boolean
      target_field: cloudflare_logpush.dns_firewall.response.cached
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_d63cfe79
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.ResponseReason
      target_field: cloudflare_logpush.dns_firewall.response.reason
      ignore_missing: true
      tag: rename_dns_response_reason
  - convert:
      field: json.ResponseCachedStale
      tag: convert_responsecachedstale_to_boolean
      target_field: cloudflare_logpush.dns_firewall.response.cached_stale
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_0ce63313
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.UpstreamResponseTimeMs
      tag: convert_upstreamresponsetimems_to_long
      target_field: cloudflare_logpush.dns_firewall.upstream.response_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_f9eca425
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Create related fields
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.dns_firewall.source.ip}}}'
      if: ctx.cloudflare_logpush?.dns_firewall?.source?.ip != null
      allow_duplicates: false
      tag: append_related_source_ip
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.dns_firewall.edns.subnet}}}'
      if: ctx.cloudflare_logpush?.dns_firewall?.edns?.subnet != null
      allow_duplicates: false
      tag: append_related_edns_subnet
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.dns_firewall.upstream.ip}}}'
      if: ctx.cloudflare_logpush?.dns_firewall?.upstream?.ip != null
      allow_duplicates: false
      tag: append_related_upstream_ip

  # Clean resulting event
  - remove:
      tag: remove_json_conf
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.dns_firewall.timestamp
        - cloudflare_logpush.dns_firewall.source.ip
        - cloudflare_logpush.dns_firewall.question.name
        - cloudflare_logpush.dns_firewall.response.code
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
      tag: remove_duplicated_custom_fields
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || v == 'N/A' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false
