---
description: Pipeline for parsing Cloudflare Page Shield Event logs.
processors:
  - set:
      tag: set_ecs_version_b777da29
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      tag: json_event_original_to_json_cac66847
      field: event.original
      target_field: json
      if: ctx.event?.original != null
  - set:
      tag: set_event_category_dbab8a4e
      field: event.category
      value: [network]
  - set:
      tag: set_event_kind_de80643c
      field: event.kind
      value: event
  - set:
      tag: set_event_type_ec95f7f2
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      tag: convert_json_Timestamp_7242ddce
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_Timestamp_to_milli
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
            tag: append_error_message_76b0386a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      tag: date_json_Timestamp_70be028a
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
            tag: append_error_message_d6556db8
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_cloudflare_logpush_page_shield_events_timestamp_15ff66de
      field: cloudflare_logpush.page_shield_events.timestamp
      copy_from: '@timestamp'
      ignore_empty_value: true
  - rename:
      tag: rename_json_Action_to_cloudflare_logpush_page_shield_events_action_249c1317
      field: json.Action
      target_field: cloudflare_logpush.page_shield_events.action
      ignore_missing: true
  - set:
      tag: set_event_action_b99711ae
      field: event.action
      copy_from: cloudflare_logpush.page_shield_events.action
      ignore_empty_value: true
  - lowercase:
      tag: lowercase_event_action_9334b869
      field: event.action
      ignore_missing: true
  - rename:
      tag: rename_json_CSPDirective_to_cloudflare_logpush_page_shield_events_csp_directive_ec50c63e
      field: json.CSPDirective
      target_field: cloudflare_logpush.page_shield_events.csp_directive
      ignore_missing: true
  - rename:
      tag: rename_json_Host_to_cloudflare_logpush_page_shield_events_host_664c8787
      field: json.Host
      target_field: cloudflare_logpush.page_shield_events.host
      ignore_missing: true
  - set:
      tag: set_host_name_122ed077
      field: host.name
      copy_from: cloudflare_logpush.page_shield_events.host
      ignore_empty_value: true
  - append:
      tag: append_related_hosts_555b812b
      field: related.hosts
      value: '{{{cloudflare_logpush.page_shield_events.host}}}'
      if: ctx.cloudflare_logpush?.page_shield_events?.host != null
      allow_duplicates: false
  - rename:
      tag: rename_json_PageURL_to_cloudflare_logpush_page_shield_events_page_url_529399de
      field: json.PageURL
      target_field: cloudflare_logpush.page_shield_events.page_url
      ignore_missing: true
  - rename:
      tag: rename_json_URL_to_cloudflare_logpush_page_shield_events_url_32905bc9
      field: json.URL
      target_field: cloudflare_logpush.page_shield_events.url
      ignore_missing: true
  - uri_parts:
      tag: uri_parts_url
      field: cloudflare_logpush.page_shield_events.url
      target_field: url
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_b6e9755f
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      tag: rename_json_PolicyID_to_cloudflare_logpush_page_shield_events_policy_id_8eed8fc8
      field: json.PolicyID
      target_field: cloudflare_logpush.page_shield_events.policy_id
      ignore_missing: true
  - set:
      tag: set_rule_id_b07ea311
      field: rule.id
      copy_from: cloudflare_logpush.page_shield_events.policy_id
      ignore_empty_value: true
  - rename:
      tag: rename_json_ResourceType_to_cloudflare_logpush_page_shield_events_resource_type_085e4bce
      field: json.ResourceType
      target_field: cloudflare_logpush.page_shield_events.resource_type
      ignore_missing: true
  - convert:
      field: json.URLContainsCDNCGIPath
      target_field: cloudflare_logpush.page_shield_events.url_contains_cdn_cgi_path
      tag: convert_url_contains_cdn_cgi_path_bool
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_888a80d6
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      tag: rename_json_URLHost_to_cloudflare_logpush_page_shield_events_url_host_ed944944
      field: json.URLHost
      target_field: cloudflare_logpush.page_shield_events.url_host
      ignore_missing: true
  - set:
      tag: set_url_domain_086e7313
      field: url.domain
      copy_from: cloudflare_logpush.page_shield_events.url_host
      ignore_empty_value: true
  - append:
      tag: append_url_host_into_related_hosts
      field: related.hosts
      value: '{{{cloudflare_logpush.page_shield_events.url_host}}}'
      if: ctx.cloudflare_logpush?.page_shield_events?.url_host != null
      allow_duplicates: false
  - remove:
      tag: remove_json_conf
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      tag: remove_4c693a8d
      field:
        - cloudflare_logpush.page_shield_events.action
        - cloudflare_logpush.page_shield_events.host
        - cloudflare_logpush.page_shield_events.url
        - cloudflare_logpush.page_shield_events.timestamp
        - cloudflare_logpush.page_shield_events.policy_id
      if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || v == 'N/A' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      tag: set_pipeline_error_into_event_kind
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false
