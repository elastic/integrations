  - script:
      tag: script_218079c2
      lang: painless
      if: ctx.cloudflare_logpush?.email_security_alerts?.attachments instanceof List
      source: |-
        def files = [];
        def emailAttachments = [];
        def hashes = new HashSet();
        for (def a: ctx.cloudflare_logpush.email_security_alerts.attachments) {
          def f = [:];
          def efa = [:];
          if (a.Name != null) {
            f.name = a.Name;
          }
          if (a.ContentTypeComputed != null) {
            f.mime_type = a.ContentTypeComputed;
          }
          def fh = [:];
          if (a.Md5 != null) {
            fh.md5 = a.Md5;
          }
          if (a.Sha1 != null) {
            fh.sha1 = a.Sha1;
          }
          if (a.Sha256 != null) {
            fh.sha256 = a.Sha256;
          }
          if (a.Sha384 != null) {
            fh.sha384 = a.Sha384;
          }
          if (a.Sha512 != null) {
            fh.sha512 = a.Sha512;
          }
          if (a.Ssdeep != null) {
            fh.ssdeep = a.Ssdeep;
          }
          if (fh.size() != 0) {
            f.hash = fh;
          }
          files.add(f);
          efa.put('file', f);
          emailAttachments.add(efa);
          for (def h: fh.entrySet()) {
            hashes.add(h.getValue());
          }
        }
        ctx.file = files;
        if (emailAttachments.size() != 0) {
          if (ctx.email == null) {
            ctx.email = [:];
          }
          ctx.email.attachments = emailAttachments;
        }
        ctx.related = ctx.related ?: [:];
        ctx.related.hash = hashes;
      on_failure:
        - append:
            tag: append_error_message_47c81822
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - remove:
