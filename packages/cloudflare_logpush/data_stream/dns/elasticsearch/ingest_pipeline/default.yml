---
description: Pipeline for parsing Cloudflare DNS logs.
processors:
  - set:
      tag: set_ecs_version_b777da29
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      tag: json_event_original_to_json_cac66847
      field: event.original
      target_field: json
      if: ctx.event?.original != null
  - set:
      tag: set_event_category_dbab8a4e
      field: event.category
      value: [network]
  - set:
      tag: set_event_kind_de80643c
      field: event.kind
      value: event
  - set:
      tag: set_event_type_ec95f7f2
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      tag: convert_json_Timestamp_7242ddce
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_timestamp_to_milli
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
            tag: append_error_message_df40dd8a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      tag: date_json_Timestamp_70be028a
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
            tag: append_error_message_d6556db8
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_cloudflare_logpush_dns_timestamp_9e5e1fac
      field: cloudflare_logpush.dns.timestamp
      copy_from: '@timestamp'
      ignore_empty_value: true
  - convert:
      tag: convert_json_SourceIP_to_cloudflare_logpush_dns_source_ip_75350b07
      field: json.SourceIP
      target_field: cloudflare_logpush.dns.source.ip
      if: ctx.json?.SourceIP != null && ctx.json.SourceIP != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_3471a5da
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_source_ip_a6b54f72
      field: source.ip
      copy_from: cloudflare_logpush.dns.source.ip
      ignore_empty_value: true
  - rename:
      tag: rename_json_QueryName_to_cloudflare_logpush_dns_query_name_c1af2645
      field: json.QueryName
      target_field: cloudflare_logpush.dns.query.name
      ignore_missing: true
  - set:
      tag: set_dns_question_name_2b839091
      field: dns.question.name
      copy_from: cloudflare_logpush.dns.query.name
      ignore_empty_value: true
  - convert:
      tag: convert_json_QueryType_to_cloudflare_logpush_dns_query_type_338b0b66
      field: json.QueryType
      target_field: cloudflare_logpush.dns.query.type
      if: ctx.json?.QueryType != ''
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_bf7aa4b9
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_6a98e439
      lang: painless
      if: ctx.cloudflare_logpush?.dns?.query?.type != null
      params:
        "0": Reserved
        "1": A
        "2": NS
        "3": MD
        "4": MF
        "5": CNAME
        "6": SOA
        "7": MB
        "8": MG
        "9": MR
        "10": "NULL"
        "11": WKS
        "12": PTR
        "13": HINFO
        "14": MINFO
        "15": MX
        "16": TXT
        "17": RP
        "18": AFSDB
        "19": X25
        "20": ISDN
        "21": RT
        "22": NSAP
        "23": NSAP-PTR
        "24": SIG
        "25": KEY
        "26": PX
        "27": GPOS
        "28": AAAA
        "29": LOC
        "30": NXT
        "31": EID
        "32": NIMLOC
        "33": SRV
        "34": ATMA
        "35": NAPTR
        "36": KX
        "37": CERT
        "38": A6
        "39": DNAME
        "40": SINK
        "41": OPT
        "42": APL
        "43": DS
        "44": SSHFP
        "45": IPSECKEY
        "46": RRSIG
        "47": NSEC
        "48": DNSKEY
        "49": DHCID
        "50": NSEC3
        "51": NSEC3PARAM
        "52": TLSA
        "53": SMIMEA
        "55": HIP
        "56": NINFO
        "57": RKEY
        "58": TALINK
        "59": CDS
        "60": CDNSKEY
        "61": OPENPGPKEY
        "62": CSYNC
        "63": ZONEMD
        "64": SVCB
        "65": HTTPS
        "66": DSYNC
        "67": HHIT
        "68": BRID
        "99": SPF
        "100": UINFO
        "101": UID
        "102": GID
        "103": UNSPEC
        "104": NID
        "105": L32
        "106": L64
        "107": LP
        "108": EUI48
        "109": EUI64
        "128": NXNAME
        "249": TKEY
        "250": TSIG
        "251": IXFR
        "252": AXFR
        "253": MAILB
        "254": MAILA
        "255": ANY
        "256": URI
        "257": CAA
        "258": AVC
        "259": DOA
        "260": AMTRELAY
        "261": RESINFO
        "262": WALLET
        "263": CLA
        "264": IPN
        "32768": TA
        "32769": DLV
      source: |
        def queryType = String.valueOf(ctx.cloudflare_logpush.dns.query.type);
        ctx.dns = ctx.dns ?: [:];
        ctx.dns.question = ctx.dns.question ?: [:];
        if (params.containsKey(queryType)) {
          ctx.dns.question.type = params[queryType];
        }
      on_failure:
        - append:
            tag: append_error_message_7bce8507
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      tag: rename_json_ColoCode_to_cloudflare_logpush_dns_colo_code_81807dd5
      field: json.ColoCode
      target_field: cloudflare_logpush.dns.colo.code
      ignore_missing: true
  - convert:
      tag: convert_json_EDNSSubnet_to_cloudflare_logpush_dns_edns_subnet_64443394
      field: json.EDNSSubnet
      target_field: cloudflare_logpush.dns.edns.subnet
      if: ctx.json?.EDNSSubnet != null && ctx.json.EDNSSubnet != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_7eabd1ad
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      tag: convert_json_EDNSSubnetLength_to_cloudflare_logpush_dns_edns_subnet_length_30aeafd8
      field: json.EDNSSubnetLength
      target_field: cloudflare_logpush.dns.edns.subnet_length
      if: ctx.json?.EDNSSubnetLength != ''
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_77bbf26b
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.ResponseCached
      tag: convert_responsecached_to_boolean
      target_field: cloudflare_logpush.dns.response.cached
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_eddf0012
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      tag: convert_json_ResponseCode_to_cloudflare_logpush_dns_response_code_0e3a9a64
      field: json.ResponseCode
      target_field: cloudflare_logpush.dns.response.code
      if: ctx.json?.ResponseCode != ''
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_708e10f1
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_aea5cd56
      lang: painless
      if: ctx.cloudflare_logpush?.dns?.response?.code != null
      params:
        "0": NoError
        "1": FormErr
        "2": ServFail
        "3": NXDomain
        "4": NotImp
        "5": Refused
        "6": YXDomain
        "7": YXRRSet
        "8": NXRRSet
        "9": NotAuth
        "10": NotZone
        "11": DSOTYPENI
        "16": BADVERS
        "17": BADKEY
        "18": BADTIME
        "19": BADMODE
        "20": BADNAME
        "21": BADALG
        "22": BADTRUNC
        "23": BADCOOKIE
      source: |
        def code = String.valueOf(ctx.cloudflare_logpush.dns.response.code);
        ctx.dns = ctx.dns ?: [:];
        if (params.containsKey(code)) {
          ctx.dns.response_code = params[code];
        }
      on_failure:
        - append:
            tag: append_error_message_01640248
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      tag: append_related_hosts_d7e930d8
      field: related.hosts
      value: '{{{cloudflare_logpush.dns.query.name}}}'
      if: ctx.cloudflare_logpush?.dns?.query?.name != null
      allow_duplicates: false
  - append:
      tag: append_related_ip_30d15214
      field: related.ip
      value: '{{{cloudflare_logpush.dns.source.ip}}}'
      if: ctx.cloudflare_logpush?.dns?.source?.ip != null
      allow_duplicates: false
  - append:
      tag: append_related_ip_c1edff72
      field: related.ip
      value: '{{{cloudflare_logpush.dns.edns.subnet}}}'
      if: ctx.cloudflare_logpush?.dns?.edns?.subnet != null
      allow_duplicates: false
  - remove:
      tag: remove_json_conf
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      tag: remove_8d04016b
      field:
        - cloudflare_logpush.dns.timestamp
        - cloudflare_logpush.dns.query.name
        - cloudflare_logpush.dns.source.ip
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || v == 'N/A' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false
