---
description: Pipeline for parsing Cloudflare Sinkhole HTTP logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
      tag: set_ecs_version
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: json_event_original
      if: ctx.event?.original != null
  - set:
      field: event.kind
      value: event
      tag: set_event_kind
  - set:
      field: event.category
      value: [network]
      tag: set_event_category
  - set:
      field: event.type
      value: [info]
      tag: set_event_type
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  # Timestamp
  - convert:
      tag: convert_json_Timestamp_7242ddce
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_timestamp_to_milli
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
            tag: append_error_message_df40dd8a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      tag: date_event_timestamp
      on_failure:
        - append:
            tag: append_error_message_ccdbdce0
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.sinkhole_http.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true
      tag: set_timestamp

  # Handle destination IP
  - convert:
      field: json.DestAddr
      tag: convert_destaddr_to_ip
      target_field: cloudflare_logpush.sinkhole_http.destination.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.DestAddr != null && ctx.json.DestAddr != ''
      on_failure:
        - append:
            tag: append_error_message_9c5ae997
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.ip
      copy_from: cloudflare_logpush.sinkhole_http.destination.ip
      ignore_empty_value: true
      tag: set_destination_ip
  # Geo enrichment (destination IP)
  - geoip:
      field: destination.ip
      target_field: destination.geo
      tag: geo_destination_ip
      ignore_missing: true
      if: ctx.destination?.ip != null
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      tag: geo_destination_as
      field: destination.ip
      target_field: destination.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      if: ctx.destination?.ip != null
  - rename:
      field: destination.as.asn
      target_field: destination.as.number
      ignore_missing: true
      tag: rename_destination_as_number
  - rename:
      field: destination.as.organization_name
      target_field: destination.as.organization.name
      ignore_missing: true
      tag: rename_destination_as_org

  # Handle source IP
  - convert:
      field: json.SrcAddr
      tag: convert_srcaddr_to_ip
      target_field: cloudflare_logpush.sinkhole_http.source.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.SrcAddr != null && ctx.json.SrcAddr != ''
      on_failure:
        - append:
            tag: append_error_message_f9c3eb86
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      copy_from: cloudflare_logpush.sinkhole_http.source.ip
      ignore_empty_value: true
      tag: set_source_ip
  # Geo enrichment (source IP)
  - geoip:
      field: source.ip
      target_field: source.geo
      tag: geo_source_ip
      ignore_missing: true
      if: ctx.source?.ip != null
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      tag: geo_source_as
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      if: ctx.source?.ip != null
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
      tag: rename_source_as_number
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
      tag: rename_source_as_org

  # HTTP fields
  - rename:
      field: json.Body
      target_field: cloudflare_logpush.sinkhole_http.request.body.content
      ignore_missing: true
      tag: rename_http_body
  - set:
      field: http.request.body.content
      copy_from: cloudflare_logpush.sinkhole_http.request.body.content
      ignore_empty_value: true
      tag: set_http_body
  - convert:
      field: json.BodyLength
      tag: convert_bodylength_to_long
      target_field: cloudflare_logpush.sinkhole_http.request.body.bytes
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_cdc179d0
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: http.request.body.bytes
      copy_from: cloudflare_logpush.sinkhole_http.request.body.bytes
      ignore_empty_value: true
      tag: set_http_body_bytes
  - rename:
      field: json.Method
      target_field: cloudflare_logpush.sinkhole_http.request.method
      ignore_missing: true
      tag: rename_http_method
  - set:
      field: http.request.method
      copy_from: cloudflare_logpush.sinkhole_http.request.method
      ignore_empty_value: true
      tag: set_http_method
  - rename:
      field: json.Referrer
      target_field: cloudflare_logpush.sinkhole_http.request.referrer
      ignore_missing: true
      tag: rename_http_referrer
  - set:
      field: http.request.referrer
      copy_from: cloudflare_logpush.sinkhole_http.request.referrer
      ignore_empty_value: true
      tag: set_http_referrer

  - rename:
      field: json.Host
      target_field: cloudflare_logpush.sinkhole_http.host.name
      ignore_missing: true
      tag: rename_http_host
  - set:
      field: host.name
      copy_from: cloudflare_logpush.sinkhole_http.host.name
      ignore_empty_value: true
      tag: set_http_host
  - rename:
      tag: rename_json_URI_to_cloudflare_logpush_sinkhole_http_request_uri_fcb3a925
      field: json.URI
      target_field: cloudflare_logpush.sinkhole_http.request.uri
      ignore_missing: true
  - rename:
      tag: rename_json_URL_to_cloudflare_logpush_sinkhole_http_request_url_44a29715
      field: json.URL
      target_field: cloudflare_logpush.sinkhole_http.request.url
      ignore_missing: true
  - uri_parts:
      tag: uri_parts_cloudflare_logpush_sinkhole_http_request_url_to_url_4d919288
      field: cloudflare_logpush.sinkhole_http.request.url
      target_field: url
      if: ctx.cloudflare_logpush?.sinkhole_http?.request?.url != null && ctx.cloudflare_logpush.sinkhole_http.request.url != ''
  - rename:
      field: json.UserAgent
      target_field: cloudflare_logpush.sinkhole_http.user_agent
      ignore_missing: true
      tag: rename_user_agent
  - user_agent:
      tag: user_agent_cloudflare_logpush_sinkhole_http_user_agent_3af01702
      field: cloudflare_logpush.sinkhole_http.user_agent
      ignore_missing: true
  - rename:
      field: json.Username
      target_field: cloudflare_logpush.sinkhole_http.user.name
      ignore_missing: true
      tag: rename_username
  - set:
      field: user.name
      copy_from: cloudflare_logpush.sinkhole_http.user.name
      ignore_empty_value: true
      tag: set_username

  # Custom fields
  - rename:
      field: json.AccountID
      target_field: cloudflare_logpush.sinkhole_http.account_id
      ignore_missing: true
      tag: rename_account_id
  - rename:
      field: json.Headers
      target_field: cloudflare_logpush.sinkhole_http.request.headers
      ignore_missing: true
      tag: rename_request_headers
  - split:
      field: cloudflare_logpush.sinkhole_http.request.headers
      separator: '\n'
      ignore_missing: true
      tag: split_headers
  - rename:
      field: json.Password
      target_field: cloudflare_logpush.sinkhole_http.request.password
      ignore_missing: true
      tag: rename_request_password
  - rename:
      field: json.R2Path
      target_field: cloudflare_logpush.sinkhole_http.r2path
      ignore_missing: true
      tag: rename_r2path
  - rename:
      field: json.SinkholeID
      target_field: cloudflare_logpush.sinkhole_http.sinkhole_id
      ignore_missing: true
      tag: rename_sinkhole_id

  # Create related fields
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.sinkhole_http.destination.ip}}}'
      if: ctx.cloudflare_logpush?.sinkhole_http?.destination?.ip != null
      allow_duplicates: false
      tag: append_related_destination_ip
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.sinkhole_http.source.ip}}}'
      if: ctx.cloudflare_logpush?.sinkhole_http?.source?.ip != null
      allow_duplicates: false
      tag: append_related_source_ip
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.sinkhole_http.host.name}}}'
      if: ctx.cloudflare_logpush?.sinkhole_http?.host?.name != null
      allow_duplicates: false
      tag: append_related_host
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.sinkhole_http.user.name}}}'
      if: ctx.cloudflare_logpush?.sinkhole_http?.user?.name != null
      allow_duplicates: false
      tag: append_related_user

  # Clean resulting event
  - remove:
      tag: remove_json_conf
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.sinkhole_http.timestamp
        - cloudflare_logpush.sinkhole_http.destination.ip
        - cloudflare_logpush.sinkhole_http.source.ip
        - cloudflare_logpush.sinkhole_http.request.body.content
        - cloudflare_logpush.sinkhole_http.request.body.bytes
        - cloudflare_logpush.sinkhole_http.request.method
        - cloudflare_logpush.sinkhole_http.request.referrer
        - cloudflare_logpush.sinkhole_http.host.name
        - cloudflare_logpush.sinkhole_http.user.name
        - cloudflare_logpush.sinkhole_http.user_agent
        - cloudflare_logpush.sinkhole_http.request.uri
        - cloudflare_logpush.sinkhole_http.request.url
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
      tag: remove_duplicated_custom_fields
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || v == 'N/A' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false
