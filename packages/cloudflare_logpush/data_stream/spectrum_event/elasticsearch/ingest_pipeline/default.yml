---
description: Pipeline for parsing Cloudflare Spectrum Event logs.
processors:
  - set:
      tag: set_ecs_version_b777da29
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      tag: json_event_original_to_json_cac66847
      field: event.original
      target_field: json
      if: ctx.event?.original != null
  - set:
      tag: set_event_category_dbab8a4e
      field: event.category
      value: [network]
  - set:
      tag: set_event_kind_de80643c
      field: event.kind
      value: event
  - set:
      tag: set_event_type_ec95f7f2
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      tag: convert_json_Timestamp_7242ddce
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - convert:
      tag: convert_json_ConnectTimestamp_be5367bc
      field: json.ConnectTimestamp
      type: long
      if: ctx.json?.ConnectTimestamp != null && ctx.json.ConnectTimestamp != ''
      ignore_failure: true
  - convert:
      tag: convert_json_DisconnectTimestamp_84281438
      field: json.DisconnectTimestamp
      type: long
      if: ctx.json?.DisconnectTimestamp != null && ctx.json.DisconnectTimestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_timestamp_to_milli
      source: |
        def convertToMillis(long timestamp) {
          if (timestamp > (long)(1e18)) {
            return timestamp/(long)(1e6)
          } else if (timestamp < (long)(1e10))  {
            return timestamp*(long)(1e3)
          }
          return timestamp
        }
        if (ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number) {
          ctx.json.Timestamp = convertToMillis(ctx.json.Timestamp);
        }
        if (ctx.json?.ConnectTimestamp != null && ctx.json.ConnectTimestamp instanceof Number) {
          if (ctx.json.ConnectTimestamp == 0) {
            ctx.json.ConnectTimestamp = null;
          } else {
            ctx.json.ConnectTimestamp = convertToMillis(ctx.json.ConnectTimestamp);
          }
        }
        if (ctx.json?.DisconnectTimestamp != null && ctx.json.DisconnectTimestamp instanceof Number) {
          if (ctx.json.DisconnectTimestamp == 0) {
            ctx.json.DisconnectTimestamp = null;
          } else {
            ctx.json.DisconnectTimestamp = convertToMillis(ctx.json.DisconnectTimestamp);
          }
        }
      on_failure:
        - append:
            tag: append_error_message_1608873d
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      tag: date_json_Timestamp_70be028a
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
            tag: append_error_message_d6556db8
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_cloudflare_logpush_spectrum_event_timestamp_eb12da0f
      field: cloudflare_logpush.spectrum_event.timestamp
      copy_from: '@timestamp'
      ignore_empty_value: true
  - date:
      tag: date_json_ConnectTimestamp_to_cloudflare_logpush_spectrum_event_connect_time_2d3e71a3
      field: json.ConnectTimestamp
      if: ctx.json?.ConnectTimestamp != null && ctx.json.ConnectTimestamp != ''
      formats:
        - ISO8601
        - uuuu-MM-dd'T'HH:mm:ssX
        - uuuu-MM-dd'T'HH:mm:ss.SSSX
        - yyyy-MM-dd'T'HH:mm:ssZ
        - yyyy-MM-dd'T'HH:mm:ss.SSSZ
        - UNIX_MS
      timezone: UTC
      target_field: cloudflare_logpush.spectrum_event.connect.time
      on_failure:
        - append:
            tag: append_error_message_3ef54342
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_event_start_0859f146
      field: event.start
      copy_from: cloudflare_logpush.spectrum_event.connect.time
      ignore_empty_value: true
  - date:
      tag: date_json_DisconnectTimestamp_to_cloudflare_logpush_spectrum_event_disconnect_time_73e74811
      field: json.DisconnectTimestamp
      if: ctx.json?.DisconnectTimestamp != null && ctx.json.DisconnectTimestamp != ''
      formats:
        - ISO8601
        - uuuu-MM-dd'T'HH:mm:ssX
        - uuuu-MM-dd'T'HH:mm:ss.SSSX
        - yyyy-MM-dd'T'HH:mm:ssZ
        - yyyy-MM-dd'T'HH:mm:ss.SSSZ
        - UNIX_MS
      timezone: UTC
      target_field: cloudflare_logpush.spectrum_event.disconnect.time
      on_failure:
        - append:
            tag: append_error_message_94c41526
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_event_end_74af7957
      field: event.end
      copy_from: cloudflare_logpush.spectrum_event.disconnect.time
      ignore_empty_value: true
  - script:
      tag: script_efba3c4b
      lang: painless
      description: Calculates event.duration from event.start and event.end
      if: ctx.event?.start != null && ctx.event?.end != null && ctx.event?.duration == null
      source: |
        ZonedDateTime start = ZonedDateTime.parse(ctx.event.start);
        ZonedDateTime end = ZonedDateTime.parse(ctx.event.end);
        ctx.event.duration = ChronoUnit.NANOS.between(start, end);
      on_failure:
        - append:
            tag: append_error_message_733370ed
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      tag: rename_json_Event_to_cloudflare_logpush_spectrum_event_action_a1437c14
      field: json.Event
      target_field: cloudflare_logpush.spectrum_event.action
      ignore_missing: true
  - set:
      tag: set_event_action_f87e3943
      field: event.action
      copy_from: cloudflare_logpush.spectrum_event.action
      ignore_empty_value: true
  - lowercase:
      tag: lowercase_event_action_9334b869
      field: event.action
      ignore_missing: true
  - convert:
      tag: convert_json_OriginBytes_to_cloudflare_logpush_spectrum_event_origin_bytes_6396e1ea
      field: json.OriginBytes
