- name: dynatrace.tenant_problems
  type: group
  description: |
    Dynatrace problems for a specific tenant on a Managed cluster.
  fields:
    - name: tenant_id
      type: keyword
      description: ID of the Dynatrace environment (tenant) that produced the problem.
    - name: tenant_name
      type: keyword
      description: Display name of the Dynatrace environment (tenant), if known.
    - name: problem_id
      type: keyword
      description: Unique problem identifier.
    - name: display_id
      type: keyword
      description: Human-readable problem identifier displayed in the Dynatrace UI.
    - name: title
      type: keyword
      description: Title of the problem.
    - name: status
      type: keyword
      description: Current status of the problem (`OPEN`, `CLOSED`).
    - name: severity_level
      type: keyword
      description: Severity level reported by Dynatrace.
    - name: impact_level
      type: keyword
      description: Impact level reported by Dynatrace.
    - name: start_time
      type: date
      description: Start time of the problem (UTC milliseconds).
    - name: end_time
      type: date
      description: End time of the problem (UTC milliseconds). Only set for closed problems.
    - name: management_zones
      type: flattened
      description: Management zones associated with the problem.
    - name: affected_entities
      type: flattened
      description: Entities affected by the problem.
    - name: impacted_entities
      type: flattened
      description: Entities impacted by the problem.
    - name: root_cause_entity
      type: flattened
      description: Root cause entity reported by Davis AI.
