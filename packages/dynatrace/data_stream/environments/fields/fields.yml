- name: dynatrace.environments
  type: group
  description: |
    Dynatrace Managed environments (tenants).
  fields:
    - name: id
      type: keyword
      description: Environment ID.
    - name: name
      type: keyword
      description: Environment display name.
    - name: state
      type: keyword
      description: Whether the environment is `ENABLED` or `DISABLED`.
    - name: trial
      type: boolean
      description: Whether the environment is a trial environment.
    - name: tags
      type: keyword
      description: Tags assigned to this environment.
    - name: creation_date
      type: date
      description: Creation date of the environment.
    - name: quotas
      type: flattened
      description: Environment level consumption and quotas information.
    - name: storage
      type: flattened
      description: Environment level storage usage and limits.
