deployer: docker
input: cel
policy_template: dynatrace_managed
service: dynatrace-mock
wait_for_data_timeout: 30s
vars:
  cluster_url: http://{{Hostname}}:{{Port}}/
  cluster_api_token: testtoken
  ssl:
    verification_mode: none
  http_client_timeout: 60s
  enable_request_tracer: false
data_stream:
  vars:
    interval: 5s
    page_size: 1000
    include_consumption_info: false
    include_storage_info: false
    preserve_original_event: false
assert:
  # Mock returns 2 environments; ingest fingerprints json.id + name → 2 stable documents.
  hit_count: 2
