- name: dynatrace.problems
  type: group
  description: |
    Dynatrace problems detected by Davis AI.
  fields:
    - name: problem_id
      type: keyword
      description: Unique problem identifier.
    - name: display_id
      type: keyword
      description: Human-readable problem identifier displayed in the Dynatrace UI.
    - name: title
      type: keyword
      description: Title of the problem.
    - name: status
      type: keyword
      description: Current status of the problem (`OPEN`, `CLOSED`).
    - name: severity_level
      type: keyword
      description: Severity level reported by Dynatrace (e.g. `AVAILABILITY`, `ERROR`, `PERFORMANCE`).
    - name: impact_level
      type: keyword
      description: Impact level reported by Dynatrace (e.g. `INFRASTRUCTURE`, `SERVICE`, `APPLICATION`).
    - name: start_time
      type: date
      description: Start time of the problem (UTC milliseconds).
    - name: end_time
      type: date
      description: End time of the problem (UTC milliseconds). Only set for closed problems.
    - name: management_zones
      type: flattened
      description: Management zones associated with the problem.
    - name: affected_entities
      type: flattened
      description: Entities affected by the problem.
    - name: impacted_entities
      type: flattened
      description: Entities impacted by the problem.
    - name: root_cause_entity
      type: flattened
      description: Root cause entity reported by Davis AI.
    - name: entity_tags
      type: flattened
      description: Tags applied to entities involved in the problem.
    - name: linked_problem_info
      type: flattened
      description: Information about linked problems.
    - name: recent_comments
      type: flattened
      description: Recent comments made on the problem.
    - name: evidence_details
      type: flattened
      description: Evidence collected by Davis AI to support the problem.
