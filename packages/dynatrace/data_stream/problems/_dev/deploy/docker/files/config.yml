# Mock for SaaS problems only: GET /api/v2/problems → 1 problem → 1 event per collection.
rules:
  - path: /api/v2/problems
    methods: [GET]
    responses:
      - status_code: 200
        body: |-
          {{ minify_json `
          {
            "problems":[
              {"problemId":"saas-problem-1","displayId":"P-S-1","title":"SaaS system test","impactLevel":"SERVICE","severityLevel":"ERROR","status":"OPEN","startTime":1712430000000,"endTime":-1}
            ],
            "nextPageKey":null
          }
          `}}
