deployer: docker
input: cel
policy_template: dynatrace_saas
service: dynatrace-mock
wait_for_data_timeout: 30s
vars:
  url: http://{{Hostname}}:{{Port}}/
  api_token: testtoken
  ssl:
    verification_mode: none
  http_client_timeout: 60s
  enable_request_tracer: false
data_stream:
  vars:
    interval: 5s
    initial_interval: now-24h
    page_size: 500
    preserve_original_event: false
assert:
  # Mock returns 1 problem; ingest fingerprints problemId → 1 stable document.
  hit_count: 1
