title: Collect Dynatrace Audit Logs
type: logs
release: experimental
streams:
  - input: cel
    title: Dynatrace Audit Logs
    description: Collect audit log entries from the Dynatrace audit log API.
    enabled: true
    template_path: cel.yml.hbs
    vars:
      - name: interval
        type: text
        title: Interval
        description: Interval at which to query the Dynatrace audit log API. Go duration syntax (e.g. `5m`).
        multi: false
        required: true
        show_user: true
        default: 5m
      - name: initial_interval
        type: text
        title: Initial lookback
        description: |
          Look back this far on the first run. Dynatrace `from` syntax, for example `now-2w`, `now-1d`.
          On subsequent runs the integration uses the timestamp of the last received entry.
        multi: false
        required: false
        show_user: true
        default: now-1d
      - name: page_size
        type: integer
        title: Page Size
        description: Number of audit log entries per page. Maximum is 5000.
        multi: false
        required: false
        show_user: true
        default: 1000
      - name: max_executions
        type: integer
        title: Maximum Pages Per Interval
        description: Maximum number of pages collected within a single interval.
        multi: false
        required: false
        show_user: false
        default: 1000
      - name: filter
        type: text
        title: Filter
        description: |
          Optional Dynatrace audit log filter, for example `eventType("LOGIN")` or
          `category("CONFIG"),eventType("UPDATE","DELETE")`. See the API docs for syntax.
        multi: false
        required: false
        show_user: true
      - name: tags
        type: text
        title: Tags
        multi: true
        show_user: false
        default:
          - forwarded
          - dynatrace-audit-logs
      - name: preserve_original_event
        title: Preserve original event
        description: Preserves a raw copy of the original event in the field `event.original`.
        type: bool
        multi: false
        required: true
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: |
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
