- name: dynatrace.activegates
  type: group
  description: |
    Dynatrace ActiveGate inventory.
  fields:
    - name: id
      type: keyword
      description: ID of the ActiveGate (hexadecimal node ID).
    - name: hostname
      type: keyword
      description: Hostname of the ActiveGate.
    - name: type
      type: keyword
      description: ActiveGate type (`CLUSTER`, `ENVIRONMENT`, `ENVIRONMENT_MULTI`).
    - name: version
      type: keyword
      description: ActiveGate software version.
    - name: group
      type: keyword
      description: ActiveGate group.
    - name: network_zone
      type: keyword
      description: Network zone of the ActiveGate.
    - name: containerized
      type: boolean
      description: Whether the ActiveGate is deployed in a container.
    - name: fips_mode
      type: boolean
      description: Whether the ActiveGate runs in FIPS-compliant mode.
    - name: os_type
      type: keyword
      description: OS type (`LINUX`, `WINDOWS`).
    - name: os_architecture
      type: keyword
      description: OS architecture (`X86`, `S390`, `ARM`, `PPCLE`).
    - name: os_bitness
      type: keyword
      description: OS bitness (e.g. `64`).
    - name: auto_update_status
      type: keyword
      description: Auto-update status (`UP2DATE`, `OUTDATED`, `UPDATE_PENDING`, etc.).
    - name: auto_update_setting
      type: keyword
      description: Auto-update setting (`ENABLED`, `DISABLED`, `INHERITED`).
    - name: auto_update_effective
      type: keyword
      description: Effective auto-update setting (`ENABLED`, `DISABLED`).
    - name: offline_since
      type: long
      description: Epoch milliseconds since the ActiveGate went offline; omitted when online (`offlineSince` is null in the API).
    - name: connected_hosts
      type: long
      description: Number of hosts currently connected to the ActiveGate.
    - name: network_addresses
      type: keyword
      description: Network addresses of the ActiveGate.
    - name: load_balancer_addresses
      type: keyword
      description: Load Balancer addresses of the ActiveGate.
    - name: environments
      type: keyword
      description: Environment IDs the ActiveGate can connect to.
    - name: main_environment
      type: keyword
      description: Main environment ID for multi-environment ActiveGates.
    - name: modules
      type: flattened
      description: Modules of the ActiveGate (type, enabled, version, attributes).
    - name: tokens
      type: flattened
      description: Tokens registered against the ActiveGate.
