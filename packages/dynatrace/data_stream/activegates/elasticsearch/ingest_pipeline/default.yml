---
description: Pipeline for Dynatrace ActiveGates
processors:
  - set:
      field: ecs.version
      value: 8.11.0
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - fingerprint:
      fields:
        - json.id
      target_field: _id
      ignore_missing: true
  - script:
      lang: painless
      tag: nest_ag_fields
      source: |
        if (ctx.json == null) { return; }
        if (!(ctx.json instanceof Map)) { return; }
        Map src = ctx.json;
        ctx.dynatrace = ctx.dynatrace ?: [:];
        Map ag = new HashMap();
        ag.put('id', src.get('id'));
        ag.put('hostname', src.get('hostname'));
        ag.put('type', src.get('type'));
        ag.put('version', src.get('version'));
        ag.put('group', src.get('group'));
        ag.put('network_zone', src.get('networkZone'));
        ag.put('containerized', src.get('containerized'));
        ag.put('fips_mode', src.get('fipsMode'));
        ag.put('os_type', src.get('osType'));
        ag.put('os_architecture', src.get('osArchitecture'));
        ag.put('os_bitness', src.get('osBitness'));
        ag.put('auto_update_status', src.get('autoUpdateStatus'));
        ag.put('offline_since', src.get('offlineSince'));
        ag.put('network_addresses', src.get('networkAddresses'));
        ag.put('load_balancer_addresses', src.get('loadBalancerAddresses'));
        ag.put('environments', src.get('environments'));
        ag.put('main_environment', src.get('mainEnvironment'));
        ag.put('modules', src.get('modules'));
        ag.put('tokens', src.get('activeGateTokens'));
        def ch = src.get('connectedHosts');
        if (ch instanceof Map && ((Map) ch).get('number') != null) {
          ag.put('connected_hosts', ((Map) ch).get('number'));
        }
        def aus = src.get('autoUpdateSettings');
        if (aus instanceof Map) {
          Map m = (Map) aus;
          ag.put('auto_update_setting', m.get('setting'));
          ag.put('auto_update_effective', m.get('effectiveSetting'));
        }
        ag.entrySet().removeIf(e -> e.getValue() == null);
        ctx.dynatrace.activegates = ag;
        ctx.host = ctx.host ?: [:];
        def hid = src.get('id');
        if (hid != null) { ctx.host.id = hid; }
        def hn = src.get('hostname');
        if (hn != null) { ctx.host.name = hn; }
        def os = src.get('osType');
        if (os != null) {
          ctx.host.os = ctx.host.os ?: [:];
          String ost = os.toString().toLowerCase();
          ctx.host.os.type = ost;
          ctx.host.os.platform = ost;
        }
        def na = src.get('networkAddresses');
        if (na != null) { ctx.host.ip = na; }
  - set:
      field: event.kind
      value: state
  - remove:
      field: json
      ignore_missing: true
  - remove:
      field: event.original
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      ignore_missing: true
on_failure:
  - append:
      field: error.message
      value: |-
        Processor {{ _ingest.on_failure_processor_type }} with tag {{ _ingest.on_failure_processor_tag }} failed: {{ _ingest.on_failure_message }}
  - set:
      field: event.kind
      value: pipeline_error
