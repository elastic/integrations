- name: dynatrace.license_usage
  type: group
  description: |
    Dynatrace cluster license consumption.
  fields:
    - name: account_name
      type: keyword
      description: License account name.
    - name: cluster_id
      type: keyword
      description: Cluster ID.
    - name: contact_email
      type: keyword
      description: Contact email address.
    - name: license_name
      type: keyword
      description: License name.
    - name: license_type
      type: keyword
      description: License type.
    - name: license_status
      type: keyword
      description: License status.
    - name: license_key
      type: keyword
      description: License key.
    - name: license_expiration_time
      type: date
      description: License expiration time from the Dynatrace API (parsed for time-range queries).
    - name: last_billing_time
      type: date
      description: Last time billing data was refreshed (parsed for time-range queries).
    - name: product_version
      type: keyword
      description: Current Dynatrace product version.
    - name: ddu
      type: group
      description: Davis Data Units consumption and quota.
      fields:
        - name: usage
          type: double
          metric_type: gauge
          description: Current usage of quota.
        - name: usage_percent
          type: double
          metric_type: gauge
          description: Current usage of quota as percentage.
        - name: quota
          type: long
          description: License quota.
        - name: remaining
          type: double
          metric_type: gauge
          description: Remaining usage of quota.
        - name: remaining_percent
          type: double
          metric_type: gauge
          description: Remaining usage of quota as percentage.
        - name: status
          type: keyword
          description: Current license usage status.
        - name: overage
          type: flattened
          description: Overage usage details.
    - name: dem
      type: group
      description: DEM unit consumption and quota.
      fields:
        - name: usage
          type: double
          metric_type: gauge
          description: Current usage of quota.
        - name: usage_percent
          type: double
          metric_type: gauge
          description: Current usage of quota as percentage.
        - name: quota
          type: long
          description: License quota.
        - name: remaining
          type: double
          metric_type: gauge
          description: Remaining usage of quota.
        - name: remaining_percent
          type: double
          metric_type: gauge
          description: Remaining usage of quota as percentage.
        - name: status
          type: keyword
          description: Current license usage status.
        - name: overage
          type: flattened
          description: Overage usage details.
    - name: host_units
      type: group
      description: Host unit consumption and quota.
      fields:
        - name: usage
          type: double
          metric_type: gauge
          description: Current usage of quota.
        - name: usage_percent
          type: double
          metric_type: gauge
          description: Current usage of quota as percentage.
        - name: quota
          type: long
          description: License quota.
        - name: remaining
          type: double
          metric_type: gauge
          description: Remaining usage of quota.
        - name: remaining_percent
          type: double
          metric_type: gauge
          description: Remaining usage of quota as percentage.
        - name: status
          type: keyword
          description: Current license usage status.
        - name: overage
          type: flattened
          description: Overage usage details.
