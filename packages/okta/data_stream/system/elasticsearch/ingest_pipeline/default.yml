      ignore_missing: true
      ignore_failure: true
  - rename:
      tag: rename_type
      field: json.actor.type
      target_field: okta.actor.type
      ignore_missing: true
      ignore_failure: true
  - rename:
      tag: rename_device
      field: json.client.device
      target_field: okta.client.device
      ignore_missing: true
      ignore_failure: true
  - rename:
      tag: rename_device_2
      field: json.device
      target_field: okta.device
      ignore_missing: true
      ignore_failure: true
  - json:
