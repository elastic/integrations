      ignore_empty_value: true
  - set:
      tag: set_email
      field: user.email
      copy_from: user.name
      ignore_empty_value: true
      if: ctx.user?.name != null && ctx.user.name.indexOf("@") > 0
  - set:
      tag: set_name_2
      field: source.user.name
      copy_from: user.name
      ignore_empty_value: true
  - set:
      tag: set_email_2
      field: source.user.email
