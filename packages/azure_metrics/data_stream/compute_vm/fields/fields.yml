- name: azure.compute_vm
  type: group
  fields:
    - name: available_memory_bytes.avg
      type: float
      unit: byte
      metric_type: gauge
      description: Amount of physical memory, in bytes, immediately available for allocation to a process or for system use in the Virtual Machine
    - name: available_memory_percentage.avg
      type: float
      unit: percent
      metric_type: gauge
      description: Amount of physical memory, as a percentage, immediately available for allocation to a process or for system use in the Virtual Machine
- name: azure.compute_vm.*.*
  type: object
  object_type: float
  object_type_mapping_type: "*"
  metric_type: gauge
  description: >-
    Returned compute_vm metrics
