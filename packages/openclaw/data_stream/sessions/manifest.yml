type: logs
title: OpenClaw Sessions
release: beta
streams:
  - input: logfile
    title: OpenClaw Session Logs
    description: Collects OpenClaw JSONL session files
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /home/*/.openclaw/agents/*/sessions/*.jsonl*
