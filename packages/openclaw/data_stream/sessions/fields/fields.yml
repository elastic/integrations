- name: openclaw.role
  type: keyword
  description: Role of the message sender (user or assistant).
- name: openclaw.model
  type: keyword
  description: The LLM model used.
- name: openclaw.text
  type: text
  description: Extracted text content of the message.
- name: openclaw.thinking
  type: text
  description: Internal reasoning or thoughts.
- name: openclaw.usage.input_tokens
  type: long
  description: Number of input tokens.
- name: openclaw.usage.output_tokens
  type: long
  description: Number of output tokens.
- name: openclaw.usage.total_tokens
  type: long
  description: Total number of tokens used.
- name: openclaw.cost.usd
  type: double
  description: API cost in USD.
