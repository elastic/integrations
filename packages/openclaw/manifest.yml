name: openclaw
version: 1.0.0
title: OpenClaw
description: Collects and parses OpenClaw AI Assistant sessions for LLM Observability.
type: integration
owner:
  github: elastic/integrations
conditions:
  kibana.version: "^8.12.0 || ^9.0.0"
categories:
  - custom
  - security
policy_templates:
  - name: openclaw
    title: OpenClaw Session Logs
    description: Collect OpenClaw session logs and LLM metrics
    data_streams:
      - sessions
