format_version: "3.0.2"
name: openclaw
version: 1.0.3
title: OpenClaw
description: Collects and parses OpenClaw AI Assistant sessions for LLM Observability.
type: integration
owner:
  github: elastic/ecosystem
  type: community
conditions:
  kibana:
    version: "^8.12.0 || ^9.0.0"
  elastic:
    subscription: basic
categories:
  - custom
  - security
icons:
  - src: /img/openclaw.svg
    title: Openclaw Logo
    size: 32x32
    type: image/svg+xml
screenshots:
  - src: /img/openclaw_usage_dashboard.png
    title: Tencent Cloud Audit Dashboard Screenshot
    size: 600x600
    type: image/png
policy_templates:
  - name: openclaw
    title: OpenClaw Session Logs
    description: Collect OpenClaw session logs and LLM metrics
    icons:
      - src: /img/openclaw.svg
        title: Openclaw Logo
        size: 32x32
        type: image/svg+xml
    inputs:
      - type: logfile
        title: OpenClaw Session Logs
        description: Collects OpenClaw JSONL session files
