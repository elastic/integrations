format_version: "3.0.2"
name: openclaw
version: 1.0.0
title: OpenClaw
description: Collects and parses OpenClaw AI Assistant sessions for LLM Observability.
type: integration
owner:
  github: elastic/integrations
  type: community
conditions:
  kibana:
    version: "^8.12.0 || ^9.0.0"
  elastic:
    subscription: basic
categories:
  - custom
  - security
policy_templates:
  - name: openclaw
    title: OpenClaw Session Logs
    description: Collect OpenClaw session logs and LLM metrics
    inputs:
      - type: logfile
        title: OpenClaw Session Logs
        description: Collects OpenClaw JSONL session files
