input: cel
service: stix-taxii
vars: ~
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/taxii2/root/collections/b4f80a3f-2e68-4f3b-a3f6-1b6e4a0a7c31/objects/
    api_key: abcd1234
    interval: 30s
    initial_interval: 24h
    enable_taxii: true
    enable_request_tracer: true
    preserve_original_event: true
    ioc_expiration_duration: 5d
    feed_name: STIX Provider
    feed_reference: https://stix-example.com
assert:
  hit_count: 1
