# Logging
logging.file.name=app.log

# Spring Security default user name and password
spring.security.user.name=actuator
spring.security.user.password=actuator
spring.security.user.roles=ACTUATOR_ADMIN
server.port=8090

# INFO ENDPOINT CONFIGURATION
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@

# SHUTDOWN ENDPOINT (ShutdownEndpoint)
management.endpoint.shutdown.access=unrestricted

# HEALTH ENDPOINT
management.endpoint.health.show-details=always

# ENDPOINTS WEB CONFIGURATION
management.endpoints.web.exposure.include=*

# HTTP Exchanges (formerly httptrace) recording is disabled by default
# starting in Spring Boot 3.x and must be opted in explicitly.
management.httpexchanges.recording.enabled=true
management.httpexchanges.recording.include=request-headers,response-headers,cookie-headers,authorization-header,principal,remote-address,session-id,time-taken
