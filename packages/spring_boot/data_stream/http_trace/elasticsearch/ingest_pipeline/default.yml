---
description: Pipeline for processing http_trace logs
processors:
  - set:
      field: ecs.version
      value: "8.11.0"
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      if: 'ctx.event?.original == null'
  - json:
      field: event.original
      target_field: json
      ignore_failure: true
  - script:
      description: >-
        Materialize a {@code ctx.json} object from the exchange payload regardless of
        how it arrived: when the agent's httpjson input ships each split exchange as
        root-level fields (newer Filebeat behaviour) rather than as a stringified JSON
        body in {@code message}, copy those root fields into {@code ctx.json} so the
        downstream rename processors work uniformly.

        Then normalize the Spring Boot 3.0+/4.x `/actuator/httpexchanges` shape to the
        legacy `/actuator/httptrace` shape used by Spring Boot 2.x:
          - principal: {name: "x"}      -> principal: "x"
          - session:   {id:   "x"}      -> session:   "x"
          - timeTaken: "PT0.025S" (ISO) -> timeTaken: 25 (milliseconds, long)
      lang: painless
      ignore_failure: true
      source: |
        if (!(ctx.json instanceof Map) || ((Map) ctx.json).isEmpty()) {
          Map synth = new HashMap();
          for (String key : new String[] {'timestamp', 'timeTaken', 'principal', 'session', 'request', 'response'}) {
            def v = ctx.get(key);
            if (v != null) {
              synth.put(key, v);
              ctx.remove(key);
            }
          }
          if (!synth.isEmpty()) {
            ctx.put('json', synth);
          }
        }
        if (ctx.json instanceof Map) {
          def p = ((Map) ctx.json).get('principal');
          if (p instanceof Map && ((Map) p).containsKey('name')) {
            ((Map) ctx.json).put('principal', ((Map) p).get('name'));
          }
          def s = ((Map) ctx.json).get('session');
          if (s instanceof Map && ((Map) s).containsKey('id')) {
            ((Map) ctx.json).put('session', ((Map) s).get('id'));
          }
          def t = ((Map) ctx.json).get('timeTaken');
          if (t instanceof String) {
            try {
              ((Map) ctx.json).put('timeTaken', java.time.Duration.parse((String) t).toMillis());
            } catch (Exception e) {
              // leave value as-is; downstream rename will skip on failure
            }
          }
        }
  - fingerprint:
      fields:
        - json.timestamp
        - json.request.uri
      target_field: _id
      ignore_missing: true
  - set:
      field: event.type
      value: [info]
  - set:
      field: event.kind
      value: event
  - set:
      field: event.category
      value: [web]
  - set:
      field: event.dataset
      value: spring_boot.http_trace
  - set:
      field: event.module
      value: spring_boot     
  - rename:
      field: json.principal
      target_field: spring_boot.http_trace.principal
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: json.session
      target_field: spring_boot.http_trace.session
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: json.timeTaken
      target_field: event.duration
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: json.request.method
      target_field: http.request.method
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: json.request.uri
      target_field: http.request.referrer
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: json.request.remoteAddress
      target_field: host.ip
      ignore_missing: true
      ignore_failure: true
  - set:
      field: host.ip
      value: ["{{{host.ip}}}"]
      ignore_empty_value: true
      ignore_failure: true
  - rename:
      field: json.response.status
      target_field: http.response.status_code
      ignore_missing: true
      ignore_failure: true
  - remove:
      field:
       - json
       - input.type
      ignore_missing: true
      ignore_failure: true
  - script:
      description: Drops null/empty values recursively
      lang: painless
      source: |
        boolean dropEmptyFields(Object object) {
          if (object == null || object == "") {
            return true;
          } else if (object instanceof Map) {
            ((Map) object).values().removeIf(value -> dropEmptyFields(value));
            return (((Map) object).size() == 0);
          } else if (object instanceof List) {
            ((List) object).removeIf(value -> dropEmptyFields(value));
            return (((List) object).length == 0);
          }
          return false;
        }
        dropEmptyFields(ctx);
on_failure:
  - set:
      field: error.message
      value: "{{ _ingest.on_failure_message }}"
