title: HTTP Trace Metrics
type: logs
streams:
  - input: httpjson
    vars:
      - name: period
        type: text
        title: Period
        default: 60s
      - name: path
        type: text
        title: HTTP Exchanges path
        multi: false
        required: true
        show_user: true
        default: /actuator/httpexchanges
        description: >-
          Actuator endpoint path used to collect HTTP request/response exchanges.
          Defaults to `/actuator/httpexchanges` (Spring Boot 3.0+ / 4.x).
          Use `/actuator/httptrace` for Spring Boot 2.x.
      - name: response_split_target
        type: text
        title: Response split target
        multi: false
        required: true
        show_user: true
        default: body.exchanges
        description: >-
          JSON field in the actuator response that contains the array of trace records.
          Defaults to `body.exchanges` (Spring Boot 3.0+ / 4.x).
          Use `body.traces` for Spring Boot 2.x.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - spring_boot.http_trace.metrics
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

    template_path: stream.yml.hbs
    title: Spring Boot HTTP Trace metrics
    description: Collect Spring Boot HTTP Trace metrics.
