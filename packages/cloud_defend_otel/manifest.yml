format_version: 3.6.5
name: cloud_defend_otel
title: "Defend for Containers OTEL input package (BETA)"
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "Elastic Defend for Containers (BETA) provides cloud-native runtime protections for containerized environments."
type: input
categories:
  - security
  - containers
  - kubernetes
conditions:
  kibana:
    version: "^8.19.0 || ^9.3.0"
  elastic:
    subscription: "enterprise"
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: sample
    type: logs
    title: Sample logs
    description: Collect sample logs
    input: logfile
    template_path: input.yml.hbs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        default:
          - /var/log/*.log
elasticsearch:
  index_template:
    mappings:
      subobjects: false
owner:
  github: elastic/cloud-services
  type: elastic
