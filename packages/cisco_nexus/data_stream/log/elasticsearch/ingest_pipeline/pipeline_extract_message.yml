---
processors:
  - grok:
      tag: grok_message_229845cb
      description: Extract IF_DOWN_ADMIN_DOWN, IF_ADMIN_UP, SPEED, IF_DUPLEX, IF_RX_FLOW_CONTROL, IF_TX_FLOW_CONTROL, IF_UP, IF_XCVR_WARNING MNEMONIC.
      field: message
      if: "['IF_DOWN_ADMIN_DOWN','IF_ADMIN_UP','SPEED','IF_DUPLEX','IF_RX_FLOW_CONTROL','IF_TX_FLOW_CONTROL','IF_UP','IF_XCVR_WARNING'].contains(ctx.event?.code.toUpperCase())"
      patterns:
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name} is up in mode %{DATA:cisco_nexus.log.interface.mode}$'
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name} is %{GREEDYDATA}$'
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name}, operational speed changed to %{DATA:cisco_nexus.log.operational.speed}$'
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name}, operational duplex mode changed to %{DATA:cisco_nexus.log.operational.duplex_mode}$'
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name}, operational Receive Flow Control state changed to %{DATA:cisco_nexus.log.operational.receive_flow_control_state}$'
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name}, operational Transmit Flow Control state changed to %{DATA:cisco_nexus.log.operational.transmit_flow_control_state}$'
        - '^(?:%{GREEDYDATA}%{SPACE}(?i)interface)%{SPACE}%{DATA:cisco_nexus.log.interface.name}, %{GREEDYDATA}$'
      ignore_failure: true
  - grok:
      tag: grok_message_2528203a
      description: Extract VSHD_SYSLOG_CONFIG_I, DETECT_MULTIPLE_PEERS, UPDOWN, CFGWRITE_STARTED, LINEPROTO MNEMONIC.
      field: message
      if: "['VSHD_SYSLOG_CONFIG_I','DETECT_MULTIPLE_PEERS','UPDOWN','CFGWRITE_STARTED','LINEPROTO'].contains(ctx.event?.code.toUpperCase())"
      patterns:
        - '^Configured from vty by %{USERNAME:user.name} on %{IP:source.ip}@%{DATA:cisco_nexus.log.terminal}$'
        - '^Multiple peers detected on %{DATA:cisco_nexus.log.interface.name}$'
        - '^Line (?i)protocol on Interface %{DATA:cisco_nexus.log.interface.name}, changed state to %{DATA:cisco_nexus.log.line_protocol_state}$'
        - '^Interface %{DATA:cisco_nexus.log.interface.name}, changed state to %{DATA:cisco_nexus.log.state}$'
        - '^%{DATA}(PID %{NUMBER:process.pid:long})%{GREEDYDATA}$'
      ignore_failure: true
  - grok:
      tag: grok_message_3172da53
      description: Extract SYSTEM_MSG MNEMONIC.
      field: message
      if: "['SYSTEM_MSG'].contains(ctx.event?.code.toUpperCase())"
      patterns:
        - '^%{DATA}authentication failure; %{GREEDYDATA:temp.message} - %{GREEDYDATA}$'
        - '^%{DATA}Authentication failure for %{USERNAME:user.name} from %{IP:source.ip} - %{WORD:network.protocol}\[%{NUMBER:process.pid:long}\]%{GREEDYDATA}$'
        - '^%{DATA}Authentication failed for user %{USERNAME:user.name} from %{IP:source.ip} - %{WORD:network.protocol}\[%{NUMBER:process.pid:long}\]%{GREEDYDATA}$'
        - '^Login failed for user %{USERNAME:user.name} - %{WORD:network.protocol}\[%{NUMBER:process.pid:long}\]%{GREEDYDATA}$'
        - '^%{DATA} : %{GREEDYDATA:temp.message2}$'
      ignore_failure: true
  - grok:
      tag: grok_message_f92a0857
      description: Extract INVAL_IP, L2FM_MAC_MOVE2, DUPLEX_MISMATCH, NATIVE_VLAN_MISMATCH, THRESHOLD_VIOLATION MNEMONIC.
      field: message
      if: "['INVAL_IP','L2FM_MAC_MOVE2','DUPLEX_MISMATCH','NATIVE_VLAN_MISMATCH','THRESHOLD_VIOLATION'].contains(ctx.event?.code.toUpperCase())"
      patterns:
        - '^%{DATA:network.protocol} %{DATA}%{SPACE}Received packet with invalid destination IP address (%{DATA}) from %{CISCOMAC:source.mac} on %{DATA:cisco_nexus.log.interface.name}$'
        - '^Mac %{CISCOMAC:source.mac} in %{DATA:cisco_nexus.log.interface.name} has moved from %{GREEDYDATA}$'
        - '^%{DATA} mismatch discovered on %{DATA:cisco_nexus.log.network.ingress_interface}(?:\(%{DATA}\))?, with %{DATA:cisco_nexus.log.network.egress_interface}(?:\(%{DATA}\))?$'
        - '^%{DATA:cisco_nexus.log.interface.name}: Rx power high warning; Operating value: %{DATA:cisco_nexus.log.operating_value}, Threshold value: %{DATA:cisco_nexus.log.threshold_value}.$'
      ignore_failure: true
  - grok:
      tag: grok_message_a1e9a4a1
      description: Extract LOGIN_SUCCESS, LOGOUT,LOGOUT_C6K MNEMONIC.
      field: message
      if: "['LOGIN_SUCCESS','LOGOUT','LOGOUT_C6K'].contains(ctx.event?.code.toUpperCase())"
      patterns:
        - '^Login Success \[user: %{USERNAME:user.name}\] \[Source: %{IP:source.ip}\] \[localport: %{NUMBER:source.port:long}\] at %{GREEDYDATA}$'
        - '^User %{USERNAME:user.name} %{GREEDYDATA}\(%{IP:source.ip}\)$'
      ignore_failure: true
  - gsub:
      field: source.mac
      tag: 'gsub_sourcemac_remove_dot'
      pattern: '[.]'
      replacement: ''
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_8428fc3c
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - gsub:
      field: source.mac
      tag: 'gsub_sourcemac_add_hyphen'
      pattern: '(..)(?!$)'
      replacement: '$1-'
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_660fea7e
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - uppercase:
      field: source.mac
      ignore_missing: true
      tag: 'uppercase_source_mac'
  - kv:
      tag: kv_temp_message_to_temp_af9c5b5f
      field: temp.message
      target_field: temp
      field_split: '\s+'
      value_split: '='
      ignore_missing: true
      ignore_failure: true
  - kv:
      tag: kv_temp_message2_to_temp_d53f7654
      field: temp.message2
      target_field: temp
      field_split: ' ; '
      value_split: =
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: temp.logname
      target_field: cisco_nexus.log.logname
      tag: 'rename_logname'
      ignore_missing: true
  - rename:
      field: temp.uid
      target_field: cisco_nexus.log.uid
      tag: 'rename_uid'
      ignore_missing: true
  - rename:
      field: temp.euid
      target_field: cisco_nexus.log.euid
      tag: 'rename_euid'
      ignore_missing: true
  - rename:
      field: temp.tty
      target_field: cisco_nexus.log.tty
      tag: 'rename_tty'
      ignore_missing: true
  - rename:
      field: temp.ruser
      target_field: cisco_nexus.log.ruser
      tag: 'rename_ruser'
      ignore_missing: true
  - rename:
      field: temp.rhost
      target_field: cisco_nexus.log.rhost
      tag: 'rename_rhost'
      ignore_missing: true
  - rename:
      field: temp.user
      target_field: user.name
      tag: 'rename_user'
      ignore_missing: true
  - rename:
      field: temp.COMMAND
      target_field: cisco_nexus.log.command
      tag: 'rename_COMMAND'
      ignore_missing: true
  - rename:
      field: temp.PWD
      target_field: cisco_nexus.log.pwd
      tag: 'rename_PWD'
      ignore_missing: true
  - rename:
      field: temp.TTY
      target_field: cisco_nexus.log.tty
      tag: 'rename_TTY'
      ignore_missing: true
  - rename:
      field: temp.USER
      target_field: user.name
      tag: 'rename_USER'
      ignore_missing: true
  - lowercase:
      field: network.protocol
      tag: 'lowercase_network_protocol'
      ignore_missing: true
  - set:
      field: event.category
      value: [network]
      tag: 'set_network_into_event_category'
      if: ctx.cisco_nexus?.log?.interface?.name != null || ctx.cisco_nexus?.log?.network?.ingress_interface != null || ctx.cisco_nexus?.log?.network?.egress_interface != null || ['L2FM_MAC_MOVE2','L3_VPC_UNEQUAL_WEIGHT','AAA_ACCOUNTING_MESSAGE','DUP_HOSTS','NF_PARITY_ERROR','EXCESSIVE_PARITY_ERROR','DETECT_MULTIPLE_PEERS','TACACS_WARNING','SYSLOG_SL_MSG_WARNING'].contains(ctx.event?.code.toUpperCase()) || ctx.message.toLowerCase().contains('kex_exchange_identification')
  - set:
      field: event.type
      value: [info]
      tag: 'set_info_into_event_type'
      if: ctx.cisco_nexus?.log?.interface?.name != null || ctx.cisco_nexus?.log?.network?.ingress_interface != null || ctx.cisco_nexus?.log?.network?.egress_interface != null || ['VSHD_SYSLOG_CONFIG_I','L2FM_MAC_MOVE2','L3_VPC_UNEQUAL_WEIGHT','AAA_ACCOUNTING_MESSAGE','DUP_HOSTS','NF_PARITY_ERROR','EXCESSIVE_PARITY_ERROR','DETECT_MULTIPLE_PEERS','TACACS_WARNING','SYSLOG_SL_MSG_WARNING'].contains(ctx.event?.code.toUpperCase())
  - set:
      field: event.category
      value: [configuration]
      tag: 'set_configuration_into_event_category'
      if: "['VSHD_SYSLOG_CONFIG_I','CFGWRITE_STARTED','CFGWRITE_DONE'].contains(ctx.event?.code)"
  - set:
      field: event.type
      value: [info]
      tag: 'set_info_into_event_type_for_config'
      if: "['CFGWRITE_STARTED','CFGWRITE_DONE'].contains(ctx.event?.code)"
  - set:
      field: event.category
      value: [authentication]
      tag: 'set_authentication_into_event_category'
      if: ctx.event?.code == 'LOGIN_SUCCESS' || (ctx.event?.code == 'SYSTEM_MSG' && (ctx.message.toLowerCase().contains('authentication') || ctx.message.toLowerCase().contains('authentication failure') || ctx.message.toLowerCase().contains('login')))
  - set:
      field: event.type
      value: [end]
      tag: 'set_end_into_event_type'
      if: ctx.event?.code == 'LOGIN_SUCCESS' || (ctx.event?.code == 'SYSTEM_MSG' && (ctx.message.toLowerCase().contains('authentication failed') || ctx.message.toLowerCase().contains('authentication failure') || ctx.message.toLowerCase().contains('login failed')))
  - set:
      field: event.category
      value: [authentication]
      tag: 'set_authentication_into_event_category_for_logout'
      if: "['LOGOUT','LOGOUT_C6K'].contains(ctx.event?.code)"
  - set:
      field: event.type
      value: [end]
      tag: 'set_end_into_event_type_for_logout'
      if: "['LOGOUT','LOGOUT_C6K'].contains(ctx.event?.code)"
  - set:
      field: event.category
      value: [iam, process]
      tag: 'set_iam_process_into_event_category_for_sudo'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.command != null
  - set:
      field: event.type
      value: [start]
      tag: 'set_start_into_event_type_for_sudo'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.command != null
  - set:
      field: event.category
      value: [host]
      tag: 'set_host_into_event_category_for_user_kern'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.category == null && (ctx.cisco_nexus?.log?.facility == 'USER' || ctx.cisco_nexus?.log?.facility == 'KERN')
  - set:
      field: event.type
      value: [info]
      tag: 'set_info_into_event_type_for_user_kern'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.type == null && (ctx.cisco_nexus?.log?.facility == 'USER' || ctx.cisco_nexus?.log?.facility == 'KERN')
  - set:
      field: event.type
      value: [connection]
      tag: 'set_connection_into_event_type'
      if: ctx.message.toLowerCase().contains('kex_exchange_identification')
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_into_event_outcome'
      if: ctx.message.toLowerCase().contains('failed') || ctx.message.toLowerCase().contains('failure')
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_into_event_outcome'
      if: ctx.message.toLowerCase().contains('successful') || ctx.message.toLowerCase().contains('success') || ctx.event?.code == 'IF_ADMIN_UP'
  # Structural outcome processors — set only where keywords don't already apply
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_if_down_admin_down'
      if: ctx.event?.code == 'IF_DOWN_ADMIN_DOWN' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_parity_error'
      if: "['EXCESSIVE_PARITY_ERROR','NF_PARITY_ERROR'].contains(ctx.event?.code) && ctx.event?.outcome == null"
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_inval_ip'
      if: ctx.event?.code == 'INVAL_IP' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_mismatch'
      if: "['DUPLEX_MISMATCH','NATIVE_VLAN_MISMATCH'].contains(ctx.event?.code) && ctx.event?.outcome == null"
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_vpc_mismatch'
      if: ctx.event?.code == 'L3_VPC_UNEQUAL_WEIGHT' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_dup_hosts'
      if: ctx.event?.code == 'DUP_HOSTS' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_tacacs_warning'
      if: ctx.event?.code == 'TACACS_WARNING' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_kern_hw_error'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.facility == 'KERN' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_kex_exchange'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.outcome == null && ctx.message != null && ctx.message.toLowerCase().contains('kex_exchange_identification')
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_if_up'
      if: ctx.event?.code == 'IF_UP' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_logout'
      if: "['LOGOUT','LOGOUT_C6K'].contains(ctx.event?.code) && ctx.event?.outcome == null"
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_config_changed'
      if: ctx.event?.code == 'VSHD_SYSLOG_CONFIG_I' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_aaa_accounting'
      if: ctx.event?.code == 'AAA_ACCOUNTING_MESSAGE' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_sudo_denied'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.command != null && ctx.message.toLowerCase().contains('command not allowed')
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_sudo_command'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.command != null && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: unknown
      tag: 'set_unknown_outcome_cfgwrite_started'
      if: ctx.event?.code == 'CFGWRITE_STARTED' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_cfgwrite_done'
      if: ctx.event?.code == 'CFGWRITE_DONE' && ctx.event?.outcome == null
  - set:
      field: event.outcome
      value: unknown
      tag: 'set_unknown_outcome_detect_multiple_peers'
      if: ctx.event?.code == 'DETECT_MULTIPLE_PEERS' && ctx.event?.outcome == null
  # UPDOWN state-based outcome
  - set:
      field: event.outcome
      value: success
      tag: 'set_success_outcome_updown_up'
      if: ctx.event?.code == 'UPDOWN' && ctx.event?.outcome == null && (ctx.cisco_nexus?.log?.line_protocol_state == 'up' || ctx.cisco_nexus?.log?.state == 'up')
  - set:
      field: event.outcome
      value: failure
      tag: 'set_failure_outcome_updown_down'
      if: ctx.event?.code == 'UPDOWN' && ctx.event?.outcome == null && (ctx.cisco_nexus?.log?.line_protocol_state == 'down' || ctx.cisco_nexus?.log?.state == 'down')
  # event.action processors
  - set:
      field: event.action
      value: interface-down
      tag: 'set_event_action_interface_down'
      if: ctx.event?.code == 'IF_DOWN_ADMIN_DOWN'
  - set:
      field: event.action
      value: interface-up
      tag: 'set_event_action_interface_up'
      if: "['IF_ADMIN_UP','IF_UP'].contains(ctx.event?.code)"
  - set:
      field: event.action
      value: interface-speed-changed
      tag: 'set_event_action_speed'
      if: ctx.event?.code == 'SPEED'
  - set:
      field: event.action
      value: interface-duplex-changed
      tag: 'set_event_action_duplex'
      if: ctx.event?.code == 'IF_DUPLEX'
  - set:
      field: event.action
      value: interface-flow-control-changed
      tag: 'set_event_action_flow_control'
      if: "['IF_RX_FLOW_CONTROL','IF_TX_FLOW_CONTROL'].contains(ctx.event?.code)"
  - set:
      field: event.action
      value: transceiver-warning
      tag: 'set_event_action_xcvr_warning'
      if: ctx.event?.code == 'IF_XCVR_WARNING'
  - set:
      field: event.action
      value: interface-state-changed
      tag: 'set_event_action_updown'
      if: ctx.event?.code == 'UPDOWN'
  - set:
      field: event.action
      value: interface-state-changed
      tag: 'set_event_action_lineproto'
      if: ctx.event?.code == 'LINEPROTO'
  - set:
      field: event.action
      value: configuration-changed
      tag: 'set_event_action_config_changed'
      if: ctx.event?.code == 'VSHD_SYSLOG_CONFIG_I'
  - set:
      field: event.action
      value: config-write-started
      tag: 'set_event_action_cfgwrite_started'
      if: ctx.event?.code == 'CFGWRITE_STARTED'
  - set:
      field: event.action
      value: config-write-completed
      tag: 'set_event_action_cfgwrite_done'
      if: ctx.event?.code == 'CFGWRITE_DONE'
  - set:
      field: event.action
      value: logged-in
      tag: 'set_event_action_login_success'
      if: ctx.event?.code == 'LOGIN_SUCCESS'
  - set:
      field: event.action
      value: logged-out
      tag: 'set_event_action_logout'
      if: "['LOGOUT','LOGOUT_C6K'].contains(ctx.event?.code)"
  - set:
      field: event.action
      value: multiple-peers-detected
      tag: 'set_event_action_multiple_peers'
      if: ctx.event?.code == 'DETECT_MULTIPLE_PEERS'
  - set:
      field: event.action
      value: invalid-packet-received
      tag: 'set_event_action_inval_ip'
      if: ctx.event?.code == 'INVAL_IP'
  - set:
      field: event.action
      value: arp-warning
      tag: 'set_event_action_arp_warning'
      if: ctx.event?.code == 'SYSLOG_SL_MSG_WARNING'
  - set:
      field: event.action
      value: mac-address-moved
      tag: 'set_event_action_mac_move'
      if: ctx.event?.code == 'L2FM_MAC_MOVE2'
  - set:
      field: event.action
      value: hardware-error
      tag: 'set_event_action_hw_error'
      if: "['EXCESSIVE_PARITY_ERROR','NF_PARITY_ERROR'].contains(ctx.event?.code)"
  - set:
      field: event.action
      value: duplex-mismatch-detected
      tag: 'set_event_action_duplex_mismatch'
      if: ctx.event?.code == 'DUPLEX_MISMATCH'
  - set:
      field: event.action
      value: vlan-mismatch-detected
      tag: 'set_event_action_vlan_mismatch'
      if: ctx.event?.code == 'NATIVE_VLAN_MISMATCH'
  - set:
      field: event.action
      value: vpc-config-mismatch
      tag: 'set_event_action_vpc_mismatch'
      if: ctx.event?.code == 'L3_VPC_UNEQUAL_WEIGHT'
  - set:
      field: event.action
      value: session-recorded
      tag: 'set_event_action_aaa_accounting'
      if: ctx.event?.code == 'AAA_ACCOUNTING_MESSAGE'
  - set:
      field: event.action
      value: tacacs-lookup-failed
      tag: 'set_event_action_tacacs_warning'
      if: ctx.event?.code == 'TACACS_WARNING'
  - set:
      field: event.action
      value: duplicate-host-detected
      tag: 'set_event_action_dup_hosts'
      if: ctx.event?.code == 'DUP_HOSTS'
  - set:
      field: event.action
      value: transceiver-threshold-violated
      tag: 'set_event_action_threshold_violation'
      if: ctx.event?.code == 'THRESHOLD_VIOLATION'
  - set:
      field: event.action
      value: command-denied
      tag: 'set_event_action_command_denied'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.command != null && ctx.message.toLowerCase().contains('command not allowed')
  - set:
      field: event.action
      value: command-executed
      tag: 'set_event_action_command_executed'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.cisco_nexus?.log?.command != null && ctx.event?.action == null
  - set:
      field: event.action
      value: authentication-failure
      tag: 'set_event_action_auth_failure'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.action == null && ctx.message != null && (ctx.message.toLowerCase().contains('authentication') || ctx.message.toLowerCase().contains('login failed'))
  - set:
      field: event.action
      value: connection-failed
      tag: 'set_event_action_connection_failed'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.action == null && ctx.message != null && ctx.message.toLowerCase().contains('kex_exchange_identification')
  - set:
      field: event.action
      value: hardware-error
      tag: 'set_event_action_kern_hw_error'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.action == null && ctx.cisco_nexus?.log?.facility == 'KERN'
  - set:
      field: event.action
      value: system-message
      tag: 'set_event_action_system_message'
      if: ctx.event?.code == 'SYSTEM_MSG' && ctx.event?.action == null
  - append:
      field: related.ip
      if: ctx.source?.ip != null
      value: '{{{source.ip}}}'
      tag: 'append_source_ip_into_related_ip'
      allow_duplicates: false
  - append:
      field: related.user
      if: ctx.user?.name != null
      value: '{{{user.name}}}'
      tag: 'append_user_name_into_related_user'
      allow_duplicates: false
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
