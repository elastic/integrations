- name: config_join_key
  type: keyword
  description: Join key for chargeback configuration
- name: conf_chargeable_unit_rate
  type: double
  description: Chargeable unit rate for cost calculation (ECU/ERU)
- name: conf_chargeable_unit_rate_unit
  type: keyword
  description: Currency unit for chargeable unit rate (e.g., EUR, USD)
- name: conf_ecu_rate
  type: alias
  path: conf_chargeable_unit_rate
  description: Deprecated alias of conf_chargeable_unit_rate for dashboard ES|QL compatibility.
- name: conf_ecu_rate_unit
  type: alias
  path: conf_chargeable_unit_rate_unit
  description: Deprecated alias of conf_chargeable_unit_rate_unit for dashboard ES|QL compatibility.
- name: conf_indexing_weight
  type: integer
  description: Weight factor for indexing costs
- name: conf_query_weight
  type: integer
  description: Weight factor for query costs
- name: conf_storage_weight
  type: integer
  description: Weight factor for storage costs
- name: conf_start_date
  type: date
  description: Configuration validity start date (defaults to Elasticsearch birthdate)
- name: conf_end_date
  type: date
  description: Configuration validity end date (defaults to 2046-12-31)
