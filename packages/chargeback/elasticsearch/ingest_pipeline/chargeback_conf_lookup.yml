---
description: Post-process chargeback configuration to extract currency unit from terms aggregation
processors:
  - script:
      description: Extract currency unit key from terms aggregation bucket
      lang: painless
      source: |
        if (ctx.conf_chargeable_unit_rate_unit instanceof Map) {
          def keys = new ArrayList(ctx.conf_chargeable_unit_rate_unit.keySet());
          if (keys.size() > 0) {
            ctx.conf_chargeable_unit_rate_unit = keys[0];
          }
        }
        if (ctx.conf_chargeable_unit_rate != null) {
          ctx.conf_ecu_rate = ctx.conf_chargeable_unit_rate;
        } else if (ctx.conf_ecu_rate != null) {
          ctx.conf_chargeable_unit_rate = ctx.conf_ecu_rate;
        }
        if (ctx.conf_chargeable_unit_rate_unit != null) {
          ctx.conf_ecu_rate_unit = ctx.conf_chargeable_unit_rate_unit;
        } else if (ctx.conf_ecu_rate_unit != null) {
          ctx.conf_chargeable_unit_rate_unit = ctx.conf_ecu_rate_unit;
        }
on_failure:
  - set:
      field: error.message
      value: "Failed to process chargeback config: {{ _ingest.on_failure_message }}"
