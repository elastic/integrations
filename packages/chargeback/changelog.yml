# newer versions go on top
- version: 0.4.0
  changes:
    - description: "Split monolithic dashboard into three focused dashboards: '[Chargeback] Billing Components Overview' (full invoice by deployment group and billing component), '[Chargeback] Usage & Cost Allocation' (usage-based chargeable pool allocation by tier and data stream), and '[Chargeback] Configuration' (rate, weights, and date-window reference). Resolves elasticsearch-chargeback#8."
      type: enhancement
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Dashboard: remove @timestamp:exists filter, set default timepicker to last 3 months. Panels now open with data visible without adjusting the time picker."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Dashboard panel fixes: rename 'Realized chargeable units per deployment' → 'Provisioned versus Realized Pool per Deployment' and fix adHocDataViews/column mismatch that caused 'column invalid: deployment_name' error. Rename 'Realized chargeable units' column in 'Chargeable pool by data tier' table to 'Normalized cost' (column is currency, not ECU). Remove misleading 'Provisioned capacity (ECU)' column from tier table (same value for every tier due to deployment-level lookup join)."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Shorten verbose markdown section headers in 'Cost by component (SKU)' and 'Datatiers / utilization' sections to single-line summaries."
      type: enhancement
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Fix dashboard ES|QL: correct LOOKUP JOIN direction for tier panels (swap source to cluster_tier_contribution_lookup so all tiers are returned, not just one), add COALESCE 1.0 rate fallback, fix vis column UUIDs, remove stale 0.4.0-*.yml versioned pipeline files that caused Fleet install to fail, bump transform fleet_transform_version and pipeline references to 0.4.0."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Realized cost (issue #8): data-tier capacity pool per deployment/day (`billing_realized_pool`), cluster-wide utilization p95 (`cluster_capacity_utilization`), utilization-weighted `chargeable_pool` for tier/data-stream allocation, SKU `cost_type`/`cost_category`/`onprem`, datatiers dashboard section, and FinOps reconciliation docs. Tier/DS ES|QL uses realized pool instead of per-SKU ECU. New conf weights for utilization and allocated memory/storage display. Requires Elasticsearch `node_stats` on data nodes. Bump transforms to 0.4.0."
      type: enhancement
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Fix dashboard ES|QL: remove duplicate `cluster_tier_contribution_lookup` joins in tier-based panels (panels were producing n-tier times inflated values), fix cartesian product between datastream and tier lookups in blended-cost panels 15 and 33 (now use `cluster_tier_and_datastream_contribution_lookup` for correct per-tier weighting), remove spurious joins in panel 16."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Fix `billing.yml` ingest pipeline: content-tier SKUs (`*.es.datacontent.*`) were not renamed to `datahot/datacontent`, causing them to appear as a separate cost_type from hot-tier nodes. Both hot and content nodes now show consistently as `datahot/datacontent`."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Fix 'Realized chargeable units per deployment' panel: it was showing `realized_chargeable_units` (which equals provisioned capacity) twice. Now shows provisioned ECU alongside the utilization-adjusted realized pool (`chargeable_pool = provisioned × utilization_score`)."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Uncollapse 'Data tier and data stream overview' dashboard section: the key blended-cost-per-datastream panels (treemap, table, pie) were hidden by default."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Fix dashboard panel layout: 'Provisioned versus Realized pool per deployment' and 'Chargeable pool by data tier' panels in the Datatiers section were both placed at y=0, causing them to overlap with the section header. Repositioned to render below the header."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
    - description: "Rename auto-generated dashboard panel titles (e.g. 'agg_indexing over @timestamp', 'Bar vertical stacked', 'Treemap', 'Pie') to descriptive names so users can understand each panel without opening it."
      type: enhancement
      link: https://github.com/elastic/elasticsearch-chargeback/issues/8
- version: 0.3.2
  changes:
    - description: "Fix dashboard ES|QL verification errors on 0.3.1 (`Unknown column [total_ecu]` / `[conf_ecu_rate]`) by adding legacy ECU field aliases in lookup mappings (`total_ecu` -> `total_chargeable_units`, `conf_ecu_rate` -> `conf_chargeable_unit_rate`, `conf_ecu_rate_unit` -> `conf_chargeable_unit_rate_unit`)."
      type: bugfix
      link: https://github.com/elastic/elasticsearch-chargeback/issues/99
    - description: "Read Elasticsearch index-pivot usage from index pattern `monitoring-indices*` (and `*:monitoring-indices*` for CCS) so custom pivot destination names remain compatible. Bump transform pipelines and fleet_transform_version to 0.3.2. See elasticsearch-chargeback#90."
      type: enhancement
      link: https://github.com/elastic/elasticsearch-chargeback/issues/90
- version: 0.3.1
  changes:
    - description: "Rename config and billing fields to chargeable-unit terminology (conf_chargeable_unit_rate, conf_chargeable_unit_rate_unit, total_chargeable_units). Fix billing_cluster_cost when ess.billing.deployment_tags is a string. Add dashboard @timestamp exists filter for package validation. Update dashboard ES|QL, ingest pipeline, and documentation. Bump transform pipeline and fleet_transform_version to 0.3.1. Dashboard ES|QL uses COALESCE so 0.3.0 lookup documents remain compatible after in-place upgrade. Bump package format_version to 3.5.0 so kibana/alerting_rule_template assets match package-spec; drop validation.yml SVR00002 override. Keep _dev/build/docs README in sync with rendered docs/README so elastic-package check passes in CI."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18102
- version: 0.3.0
  changes:
    - description: "Chargeable units: dashboard and config wording support both ECU (Elastic Consumption Units) and ERU (Elastic Resource Units). Configuration Information section and consumption unit rates panel updated for ECU/ERU."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17169
- version: 0.2.10
  changes:
    - description: "Fix visualizations not loading by adding TO_DOUBLE type conversion in ESQL queries to prevent integer division returning zero. Add automated chargeback_conf_lookup index creation via transform with default configuration values. Bump transform pipeline versions to 0.2.10."
      type: bugfix
      link: https://github.com/elastic/integrations/pull/16936
- version: 0.2.9
  changes:
    - description: "Updating transforms for CSS support on monitoring data"
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16326
- version: 0.2.8
  changes:
    - description: "Add Kibana alerting rule templates for transform health monitoring, detecting new chargeback groups, and identifying deployments with missing usage data. Templates can be installed directly from the package. All transforms now auto-start on installation."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16229
- version: 0.2.7
  changes:
    - description: "Add observability alerting rule templates and documentation for monitoring new chargeback groups and missing usage data. Update Elasticsearch version requirement to 9.2.0+ for smart lookup join support."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16205
- version: 0.2.6
  changes:
    - description: "Fixing bug around sku based cost allocation"
      type: bugfix
      link: https://github.com/elastic/integrations/pull/16192
- version: 0.2.5
  changes:
    - description: "Add deployment_group field extracted from ESS Billing deployment tags using runtime mappings to enable tag-based cost allocation and filtering. Fix transforms to use correct field type for elasticsearch.cluster.name."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16185
- version: 0.2.4
  changes:
    - description: "Adding sku and cost_type to the billing_cluster_cost_lookup for future utilization"
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16182
- version: 0.2.3
  changes:
    - description: "Adding deployment filter, dataview and moving config portion to bottom of dashboard for better usability."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16153
- version: 0.2.2
  changes:
    - description: "Allow setting the Conversion Rate per time window in the configuration lookup index and adding collapsable sections in the dashboard for better usability."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.2.1
  changes:
    - description: "Fixing the issue of visualisation not displaying values due to integer value division in ESQL. Changed to use `double` values instead."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.2.0
  changes:
    - description: "Make use of the new elastic-package version, which will create the lookup index automatically when installing the package. "
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.1.7
  changes:
    - description: "Swap the use of deployment_id or deployment name to a concatenation of both, to make it easier to identify the deployment in the dashboard."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.1.6
  changes:
    - description: "Remove the use of usage alias, and stick to using `monitoring-indices` as usage sorce. ES Integration transform should be run regardless of wether the ES integration has been installed on an agent or not. This fix will increase performance, when relying on Stack Monitoring data. Also, use `metrics-ess_billing.billing-*` to be able to use not only the default namespace."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.1.5
  changes:
    - description: "Fixing the control error in the dashboard by adding a data view."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.1.4
  changes:
    - description: "Consistent naming of `datastream`. Add `| LIMIT 5000` to ESQL top query to cater for large organisations."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.1.3
  changes:
    - description: "Made sure the colour palette is predictable by using the eui_amsterdam_color_blind palate. Add ECU rate to the dashboard."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545 
- version: 0.1.2
  changes:
    - description: "Added the necessary fields to the billing_cluster_cost_lookup in the Elasticsearch transform to allow for correlation with the ES integration."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545
- version: 0.1.1
  changes:
    - description: "Fixed the dashboard chargeback timeframe calculation for cost and ECU utilization"
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545
- version: 0.1.0
  changes:
    - description: "Initial release of the chargeback integration."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14545
