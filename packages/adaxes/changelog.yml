# newer versions go on top
- version: "0.2.0"
  changes:
    - description: |-
        Body grok rewritten to match Adaxes' real default template
        (description plus Result token) per Softerra support; the labeled
        Operation/Target/Initiator/Initiator-Host shape is kept as a
        customized-template fallback. Action derivation extended to cover
        password change, membership add/remove, unlock, move, rename, copy,
        custom command execution, scheduled task runs, and approve/deny
        requests. Target DN extracted from quoted strings in the description
        when no explicit Target label is present. Suspended normalized to
        Pending. Pipeline test corpus broadened to 31 events.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/3
- version: "0.1.1"
  changes:
    - description: |-
        Pipeline now strips the syslog header itself (PRI/timestamp/host/tag)
        and decodes facility+severity, so events parse cleanly even when the
        agent runtime does not honor the input's syslog parser.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/2
- version: "0.1.0"
  changes:
    - description: Initial release. Adaxes operation logs over syslog (UDP/TCP) with ECS-aligned ingest pipeline.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/1
