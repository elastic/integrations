---
description: "Adaxes operation log enrichment. Strips the syslog header if Filebeat's parser did not, decodes PRI into facility/severity, then parses the Adaxes operation body. Per Softerra support the default body is the operation description plus a Result token; the labeled Target/Initiator/Initiator-Host shape is only emitted when an admin customizes the Adaxes log template."
processors:

  # ---- Bookkeeping ---------------------------------------------------------
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: "8.11.0"
  - set:
      tag: set_event_ingested
      field: event.ingested
      value: "{{{_ingest.timestamp}}}"
      override: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: adaxes.operations
  - set:
      tag: set_event_module
      field: event.module
      value: adaxes
  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: Softerra
  - set:
      tag: set_observer_product
      field: observer.product
      value: Adaxes
  - set:
      tag: set_observer_type
      field: observer.type
      value: iam

  # Preserve the original payload before we mutate the message field.
  - set:
      tag: set_event_original
      field: event.original
      copy_from: message
      ignore_empty_value: true

  - trim:
      tag: trim_message
      field: message
      ignore_missing: true

  # ---- Strip syslog header if present --------------------------------------
  # Filebeat's `parsers: [syslog]` block on the udp/tcp input is silently a
  # no-op in some 9.x agent runtimes. Detect <PRI>HEADER BODY here and split
  # them ourselves so the rest of the pipeline behaves the same either way.
  - grok:
      tag: split_syslog_header
      field: message
      patterns:
        - '^<%{POSINT:_tmp.pri:int}>%{NONNEGINT:log.syslog.version:int} %{TIMESTAMP_ISO8601:_tmp.ts} %{IPORHOST:host.hostname} %{DATA:process.name} %{DATA:process.pid} %{DATA:event.code} (?:-|\[%{DATA:log.syslog.structured_data}\]) %{GREEDYDATA:_tmp.body}$'
        - '^<%{POSINT:_tmp.pri:int}>%{SYSLOGTIMESTAMP:_tmp.ts} %{IPORHOST:host.hostname} %{DATA:process.name}(?:\[%{POSINT:process.pid:int}\])?: %{GREEDYDATA:_tmp.body}$'
        - '^<%{POSINT:_tmp.pri:int}>%{GREEDYDATA:_tmp.body}$'
        - '%{GREEDYDATA:_tmp.body}'
      ignore_failure: true

  - script:
      tag: decode_pri
      if: "ctx._tmp != null && ctx._tmp.pri != null"
      lang: painless
      source: |
        int pri = (int) ctx._tmp.pri;
        if (ctx.log == null) { ctx.log = new HashMap(); }
        if (ctx.log.syslog == null) { ctx.log.syslog = new HashMap(); }
        ctx.log.syslog.priority = pri;
        if (ctx.log.syslog.facility == null) { ctx.log.syslog.facility = new HashMap(); }
        if (ctx.log.syslog.severity == null) { ctx.log.syslog.severity = new HashMap(); }
        if (ctx.log.syslog.facility.code == null) { ctx.log.syslog.facility.code = pri / 8; }
        if (ctx.log.syslog.severity.code == null) { ctx.log.syslog.severity.code = pri % 8; }

  - script:
      tag: name_severity_facility
      if: "ctx.log?.syslog?.severity?.code != null"
      lang: painless
      source: |
        String[] sev = new String[] {"Emergency","Alert","Critical","Error","Warning","Notice","Informational","Debug"};
        int s = (int) ctx.log.syslog.severity.code;
        if (s >= 0 && s < 8 && ctx.log.syslog.severity.name == null) {
          ctx.log.syslog.severity.name = sev[s];
        }
        if (ctx.log.syslog.facility?.code != null && ctx.log.syslog.facility.name == null) {
          int f = (int) ctx.log.syslog.facility.code;
          def fac = new HashMap();
          fac[0]="kernel"; fac[1]="user-level"; fac[2]="mail"; fac[3]="system";
          fac[4]="security/authorization"; fac[5]="syslogd"; fac[6]="line printer";
          fac[7]="network news"; fac[8]="UUCP"; fac[9]="clock"; fac[10]="security/authorization";
          fac[11]="FTP"; fac[12]="NTP"; fac[13]="log audit"; fac[14]="log alert"; fac[15]="clock";
          fac[16]="local0"; fac[17]="local1"; fac[18]="local2"; fac[19]="local3";
          fac[20]="local4"; fac[21]="local5"; fac[22]="local6"; fac[23]="local7";
          if (fac.containsKey(f)) { ctx.log.syslog.facility.name = (String) fac[f]; }
        }

  - set:
      tag: set_message_to_body
      field: message
      copy_from: _tmp.body
      ignore_empty_value: true

  # ---- Parse the Adaxes operation body -------------------------------------
  # Order matters. Most specific first, fallback last.
  #   1) Customized log template using "Operation:/Target:/Initiator:[/Initiator Host:]/Result:" labels.
  #   2) Default Adaxes shape: "<description>. Result: <token>".
  #   3) Default with no explicit Result label: "<description>".
  - grok:
      tag: parse_adaxes_body
      field: message
      patterns:
        - 'Operation:\s*%{DATA:adaxes.operation.description}\.\s*Target:\s*%{DATA:adaxes.target.name}\.\s*Initiator:\s*%{DATA:adaxes.initiator.name}\.\s*(?:Initiator Host:\s*%{DATA:adaxes.initiator.host}\.\s*)?Result:\s*%{GREEDYDATA:adaxes.result.raw}'
        - '%{GREEDYDATA:adaxes.operation.description}\.\s*Result:\s*%{GREEDYDATA:adaxes.result.raw}'
        - '%{GREEDYDATA:adaxes.operation.description}'
      on_failure:
        - append:
            tag: tag_body_unparsed
            field: tags
            value: _adaxes_body_unparsed
        - set:
            tag: copy_message_to_description
            field: adaxes.operation.description
            value: "{{{message}}}"

  # ---- Pull a target DN out of the description. Prefer a DN-shaped quoted
  # string (CN=… / OU=… / DC=…) so that messages like
  #   "Modify the 'description' property of user 'CN=Alice,…'. Result: ..."
  # surface the user DN, not the property name. Fall back to the first
  # quoted token for non-DN targets like 'Daily Cleanup' or a request GUID.
  - grok:
      tag: extract_target_dn
      field: adaxes.operation.description
      patterns:
        - "'(?<adaxes.target.name>(?:CN|OU|DC)=[^']+)'"
      ignore_missing: true
      ignore_failure: true
      if: "ctx.adaxes?.target?.name == null"
  - grok:
      tag: extract_target_quoted_fallback
      field: adaxes.operation.description
      patterns:
        - "'%{DATA:adaxes.target.name}'"
      ignore_missing: true
      ignore_failure: true
      if: "ctx.adaxes?.target?.name == null"

  # ---- Result token -> structured status + reason --------------------------
  - grok:
      tag: parse_adaxes_result
      field: adaxes.result.raw
      patterns:
        - '^(?<adaxes.result.status>Success|Pending|Suspended)\.?$'
        - '^(?<adaxes.result.status>Error|Failed|Failure)\s*[-:]?\s*%{GREEDYDATA:adaxes.result.reason}'
        - '%{GREEDYDATA:adaxes.result.reason}'
      ignore_missing: true
      ignore_failure: true

  - set:
      tag: normalize_suspended_to_pending
      field: adaxes.result.status
      value: Pending
      if: "ctx.adaxes?.result?.status == 'Suspended'"

  - set:
      tag: default_result_status_unknown
      field: adaxes.result.status
      value: Unknown
      if: "ctx.adaxes?.result?.status == null && ctx.adaxes?.result?.raw != null"

  - set:
      tag: outcome_success
      field: event.outcome
      value: success
      if: "ctx.adaxes?.result?.status == 'Success'"
  - set:
      tag: outcome_unknown
      field: event.outcome
      value: unknown
      if: "ctx.adaxes?.result?.status == 'Pending'"
  - set:
      tag: outcome_failure
      field: event.outcome
      value: failure
      if: "ctx.adaxes?.result?.status != null && ctx.adaxes.result.status != 'Success' && ctx.adaxes.result.status != 'Pending'"

  # ---- event.action / event.category from the description ------------------
  # Verb-leading match (default Adaxes templates start with the verb,
  # e.g. "Create user 'CN=...'", "Reset password for user 'CN=...'").
  - script:
      tag: derive_event_action
      lang: painless
      source: |
        if (ctx.adaxes?.operation?.description == null) { return; }
        String d = ctx.adaxes.operation.description.toLowerCase();
        String action;
        if      (d.contains('reset password') || d.contains('password reset')) { action = 'password_reset'; }
        else if (d.contains('change password'))                                  { action = 'password_changed'; }
        else if (d.contains('add') && d.contains('to group'))                    { action = 'membership_added'; }
        else if (d.contains('add member') || d.contains('add members'))          { action = 'membership_added'; }
        else if (d.contains('remove') && d.contains('from group'))               { action = 'membership_removed'; }
        else if (d.contains('remove member'))                                    { action = 'membership_removed'; }
        else if (d.contains('unlock'))                                           { action = 'object_unlocked'; }
        else if (d.contains('disable'))                                          { action = 'object_disabled'; }
        else if (d.contains('enable'))                                           { action = 'object_enabled'; }
        else if (d.contains('move'))                                             { action = 'object_moved'; }
        else if (d.contains('rename'))                                           { action = 'object_renamed'; }
        else if (d.contains('copy'))                                             { action = 'object_copied'; }
        else if (d.contains('create'))                                           { action = 'object_created'; }
        else if (d.contains('delete'))                                           { action = 'object_deleted'; }
        else if (d.contains('execute custom command') || d.contains('custom command')) { action = 'custom_command_executed'; }
        else if (d.contains('scheduled task') || d.startsWith('run '))           { action = 'scheduled_task_executed'; }
        else if (d.contains('approve'))                                          { action = 'request_approved'; }
        else if (d.contains('deny') || d.contains('reject'))                     { action = 'request_denied'; }
        else if (d.contains('view'))                                             { action = 'object_viewed'; }
        else if (d.contains('logon') || d.contains('login') || d.contains('sign in')) { action = 'authentication'; }
        else if (d.contains('modify') || d.contains('update') || d.contains('change') || d.contains('edit') || d.contains('set ')) { action = 'object_modified'; }
        else                                                                      { action = 'other'; }
        if (ctx.event == null) { ctx.event = new HashMap(); }
        ctx.event.action = action;
        if (ctx.event.category == null) { ctx.event.category = new ArrayList(); }
        ctx.event.category.add('iam');
        if (action == 'authentication')                                          { ctx.event.category.add('authentication'); }
        if (action == 'object_created')                                          { ctx.event.type = ['creation']; }
        else if (action == 'object_deleted')                                     { ctx.event.type = ['deletion']; }
        else if (action == 'authentication')                                     { ctx.event.type = ['start']; }
        else if (action == 'object_viewed')                                      { ctx.event.type = ['info']; }
        else if (action == 'other')                                              { ctx.event.type = ['info']; }
        else if (action == 'scheduled_task_executed' || action == 'custom_command_executed') { ctx.event.type = ['info']; }
        else                                                                      { ctx.event.type = ['change']; }

  # ---- ECS user/source + cleanup -------------------------------------------
  - trim:
      tag: trim_operation_description
      field: adaxes.operation.description
      ignore_missing: true
  - trim:
      tag: trim_target_name
      field: adaxes.target.name
      ignore_missing: true
  - trim:
      tag: trim_initiator_name
      field: adaxes.initiator.name
      ignore_missing: true
  - trim:
      tag: trim_initiator_host
      field: adaxes.initiator.host
      ignore_missing: true

  - set:
      tag: set_user_name_from_initiator
      field: user.name
      copy_from: adaxes.initiator.name
      if: "ctx.adaxes?.initiator?.name != null"
  - lowercase:
      tag: lowercase_user_name
      field: user.name
      ignore_missing: true

  - set:
      tag: set_source_address_from_initiator_host
      field: source.address
      copy_from: adaxes.initiator.host
      if: "ctx.adaxes?.initiator?.host != null"

  - fingerprint:
      tag: fingerprint_event_id
      fields:
        - "@timestamp"
        - adaxes.operation.description
        - adaxes.target.name
        - adaxes.initiator.name
      target_field: event.id
      method: SHA-256
      ignore_missing: true

  - remove:
      tag: remove_result_raw
      field: adaxes.result.raw
      ignore_missing: true
  - remove:
      tag: remove_tmp
      field: _tmp
      ignore_missing: true

on_failure:
  - set:
      tag: set_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        with tag '{{{ _ingest.on_failure_processor_tag }}}'
        in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
