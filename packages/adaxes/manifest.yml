format_version: 3.6.2
name: adaxes
title: "Softerra Adaxes"
version: 0.1.0
source:
  license: "Elastic-2.0"
description: "Collect operation logs from Softerra Adaxes via syslog (UDP/TCP)."
type: integration
categories:
  - security
  - custom
conditions:
  kibana:
    version: "^9.3.3"
  elastic:
    subscription: "basic"
icons:
  - src: /img/adaxes-logo.svg
    title: Adaxes
    size: 64x64
    type: image/svg+xml
policy_templates:
  - name: adaxes
    title: Adaxes operation logs
    description: Receive Adaxes operation logs over syslog (UDP/TCP).
    inputs:
      - type: udp
        title: Receive Adaxes operation logs over UDP
        description: Listen for Adaxes syslog messages on UDP.
      - type: tcp
        title: Receive Adaxes operation logs over TCP
        description: Listen for Adaxes syslog messages on TCP.
owner:
  github: c3dn
  type: community
