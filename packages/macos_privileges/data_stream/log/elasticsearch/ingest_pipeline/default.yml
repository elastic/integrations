---
description: Pipeline for processing Privileges logs.
processors:
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - set:
      field: ecs.version
      value: "9.3.0"
  - set:
      field: event.kind
      value: event
  - set:
      field: event.created
      value: "{{{@timestamp}}}"
      if: "ctx.event?.created == null && ctx['@timestamp'] != null"
  - grok:
      field: event.original
      patterns:
        - '^<%{NUMBER:log.syslog.priority:long}>%{NUMBER:log.syslog.version}\s%{TIMESTAMP_ISO8601:event.created}\s%{HOSTNAME:host.hostname}\s%{DATA}\s%{NUMBER:process.pid:int}\s%{DATA:privilege.type}\s%{DATA}(SAPCorp:\s)%{GREEDYDATA:message}'
        - '^%{GREEDYDATA:message}$'
  - grok:
      field: message
      ignore_failure: true
      ignore_missing: true
      patterns:
        - 'User\s%{USERNAME:user.name}%{DATA}(reason:)\s"%{DATA:privilege.reason}"'
        - 'User\s%{USERNAME:user.name}'
  - rename:
      field: _conf.tz_offset
      target_field: event.timezone
      if: ctx._conf?.tz_offset != null && ctx._conf.tz_offset != 'local'
      ignore_missing: true
      ignore_failure: true
  - date:
      field: event.created
      target_field: "event.created"
      formats:
        - ISO8601
      timezone: "{{{event.timezone}}}"
      if: ctx.event?.timezone != null && ctx.event?.created != null
      on_failure:
        - remove:
            field: event.created
            ignore_missing: true
        - append:
            field: error.message
            value: "{{{_ingest.on_failure_message}}}"
  - date:
      field: event.created
      target_field: "event.created"
      formats:
        - ISO8601
      if: ctx.event?.timezone == null && ctx.event?.created != null
      on_failure:
        - remove:
            field: event.created
            ignore_missing: true
        - append:
            field: error.message
            value: "{{{_ingest.on_failure_message}}}"
  - set:
      field: "@timestamp"
      value: "{{{event.created}}}"
      if: "ctx.event?.created != null"
  - remove:
      field:
        - _conf
        - _tmp
      ignore_failure: true
      ignore_missing: true
  # Cleanup
  - script:
      description: This script processor iterates over the whole document to remove fields with null values.
      tag: script_to_drop_null_values
      lang: painless
      source: |
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
                handleMap(v);
            } else if (v instanceof List) {
                handleList(v);
            }
            return v == null || v == '' || v == '<NA>' || v == '-1' ||(v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
                handleMap(v);
            } else if (v instanceof List) {
                handleList(v);
            }
            return v == null || v == '' || v == '<NA>' || v == '-1' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      tag: set_pipeline_error_into_event_kind
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
