    title: Contrast Security logo
    size: 32x32
    type: image/svg+xml
screenshots:
  - src: /img/contrast-security-attack-summary-dashboard.png
    title: Contrast Security Attack Summary Overview dashboard
    size: 1705x1289
    type: image/png
owner:
  github: elastic/security-service-integrations
  type: partner
