format_version: 3.6.0
name: contrast_security
title: Contrast Security
version: 0.1.0
description: >-
  Receive attack events, incidents, and issues from Contrast Security ADR
  (Application Detection and Response).
type: integration
categories:
  - security
conditions:
  kibana:
    version: "^8.19.0 || ^9.1.0"
  elastic:
    subscription: basic
    capabilities:
      - security
icons:
