---
description: Minimal ingest pipeline for Contrast Security attack events.
processors:
  - set:
      field: event.ingested
      value: "{{_ingest.timestamp}}"
  - set:
      field: event.dataset
      value: "contrast_security.attack_event"
      override: false
  - set:
      field: event.module
      value: "contrast_security"
      override: false
  - set:
      field: event.kind
      value: "event"
      override: false
  - date:
      field: "@timestamp"
      target_field: "@timestamp"
      formats:
        - ISO8601
        - UNIX_MS
      ignore_failure: true
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "Ingest pipeline error: {{{_ingest.on_failure_message}}}"
