- name: contrast_security
  type: group
  description: Contrast Security ADR vendor-specific fields not covered by ECS.
  fields:
    - name: event_type
      type: keyword
      description: Contrast event type discriminator (e.g. contrast_security_issuealert).
    - name: status
      type: keyword
      description: Issue lifecycle status as reported by Contrast (e.g. OPEN, CLOSED).
    - name: cvss_vector
      type: keyword
      description: CVSS vector string describing the vulnerability (e.g. CVSS:4.0/AV:N/...).
    - name: last_observed
      type: date
      description: Time the vulnerability was last observed by Contrast.
    - name: emit_time
      type: date
      description: Time the Contrast platform emitted this issue alert.
    - name: environments
      type: keyword
      description: Deployment environments reported by Contrast for the issue (full list; service.environment carries the first, lowercased).
