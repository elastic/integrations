wait_for_data_timeout: 1m
input: cel
service: recordedfuture-identity-cel
vars:
  url: http://{{Hostname}}:{{Port}}
  api_key: xxxx
data_stream:
  vars:
    interval: 2s
    batch_size: 100
    initial_interval: 720h
    preserve_original_event: true
    hash_password: true
    hash_cookies: true
    hashing_key: test-hashing-secret-key
assert:
  hit_count: 3
