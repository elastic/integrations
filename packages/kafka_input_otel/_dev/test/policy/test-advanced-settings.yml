vars:
  brokers:
    - kafka1:9092
    - kafka2:9092
    - kafka3:9092
  group_id: my-consumer-group
  protocol_version: "3.6.0"
  metadata_full: false
  metadata_refresh_interval: 5m
  metadata_retry_max: 5
  metadata_retry_backoff: 500ms
  autocommit_enable: false
  autocommit_interval: 5s
  message_marking_after: true
  message_marking_on_error: true
  header_extraction_extract_headers: true
  header_extraction_headers:
    - X-Custom-Header
    - X-Trace-ID
  telemetry: |
    metrics:
      kafka_receiver_records_delay:
        enabled: true
  error_backoff: |
    initial_interval: 1s
    max_interval: 30s
    max_elapsed_time: 5m
