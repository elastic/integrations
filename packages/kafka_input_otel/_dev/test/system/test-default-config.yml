service: kafka_service
vars:
  brokers:
    - "{{Hostname}}:9092"
  initial_offset: earliest
  logs_encoding: otlp_proto
  logs_topics:
    - otlp_logs
  metrics_encoding: otlp_proto
  metrics_topics:
    - otlp_metrics
  profiles_topics: []
  traces_encoding: otlp_proto
  traces_topics:
    - otlp_spans
assert:
  min_count: 4

# It requires more time to detect all data streams
wait_for_dynamic_streams_stable: 120s
signal_types:
  - logs
  - metrics
  - traces
