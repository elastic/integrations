service: kafka_service
vars:
  brokers:
    - "{{Hostname}}:9092"
  initial_offset: earliest
  traces_encoding: otlp_proto
  traces_topics:
    - otlp_spans
  logs_topics: []
  metrics_topics: []
assert:
  min_count: 4

# wait_for_dynamic_streams_stable: 90s
# It requires more time to detect all data streams
signal_types:
  - logs
  - metrics
  - traces
