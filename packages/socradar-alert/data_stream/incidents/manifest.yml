title: SocRadar Incidents
type: logs
streams:
  - input: cel
    title: SocRadar Incidents
    description: Collect incidents from SocRadar API
    template_path: cel.yml.hbs
    vars:
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        description: Enable HTTP request tracing for debugging
        multi: false
        required: false
        show_user: true
        default: false
