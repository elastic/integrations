format_version: 3.3.2
name: ti_speculus_taxii
title: Speculus Threat Intelligence
version: "0.1.0"
description: Ingest threat intelligence indicators from the Speculus TAXII 2.1 server in STIX 2.1 format with Elastic Agent.
type: integration
categories:
  - security
  - threat_intel
conditions:
  kibana:
    version: "^8.18.0 || ^9.0.0"
  elastic:
    subscription: basic
icons:
  - src: /img/logo.png
    title: Speculus
    size: 512x512
    type: image/png
policy_templates:
  - name: ti_speculus_taxii
    title: Speculus Threat Intelligence
    description: Collect threat intelligence indicators from the Speculus TAXII 2.1 server.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        release: beta
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: cel
        title: Collect Speculus STIX data via TAXII 2.1
        description: Collect STIX 2.1 threat intelligence indicators from the Speculus TAXII 2.1 server.
        vars:
          - name: base_url
            type: text
            title: Speculus TAXII Base URL
            description: >
              Base URL of the Speculus TAXII 2.1 server. Default `https://feed.speculus.co`. Change only if Speculus provides a different host.

            multi: false
            required: true
            show_user: true
            default: "https://feed.speculus.co"
          - name: api_root
            type: text
            title: API Root
            description: >
              The TAXII 2.1 API root path. Default `api1`. Change only if Speculus provides a different API root.

            multi: false
            required: true
            show_user: false
            default: "api1"
          - name: collection_id
            type: text
            title: Collection ID
            description: >
              The ID of the Speculus TAXII collection to poll. Default is the `speculus-ioc-feed` collection. Change only if Speculus provides a different collection.

            multi: false
            required: true
            show_user: true
            default: "f3a1c2d4-5b6e-4a7f-8c9d-0e1f2a3b4c5d"
          - name: api_key
            type: password
            title: API Key
            description: Your Speculus API key, sent as a Bearer token in the `Authorization` header.
            multi: false
            required: true
            show_user: true
            secret: true
          - name: proxy_url
            type: text
            title: Proxy URL
            multi: false
            required: false
            show_user: false
            description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>. Please ensure your username and password are in URL encoded format.
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: SSL configuration options. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html#ssl-common-config) for details.
            multi: false
            required: false
            show_user: false
            default: |
              #certificate_authorities:
              #  - |
              #    -----BEGIN CERTIFICATE-----
              #    ...
              #    -----END CERTIFICATE-----
owner:
  github: SpeculusDevelopers
  type: community
