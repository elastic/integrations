name: wallix_bastion
title: Wallix Bastion
version: "0.1.0"
description: Collect logs from Wallix Bastion with Elastic Agent.
type: integration
icons:
  - src: /img/wallix.svg
    title: wallix_bastion
    size: 300x300
    type: image/svg+xml
format_version: "3.0.3"
categories: [vpn_security, security]
conditions:
  kibana:
    version: "^8.13.0 || ^9.0.0"
policy_templates:
  - name: wallix_bastion
    title: Wallix Bastion logs
    description: Collect logs from Wallix Bastion instances
    inputs:
      - type: udp
        title: "Collect Wallix Bastion logs (input: udp)"
        description: "Collecting logs from Wallix Bastion instances (input: udp)"
      - type: tcp
        title: "Collect Wallix Bastion logs (input: tcp)"
        description: "Collecting logs from Wallix Bastion instances (input: tcp)"
owner:
  github: elastic/integration-experience
  type: community
