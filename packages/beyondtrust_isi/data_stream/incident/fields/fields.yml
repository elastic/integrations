- name: beyondtrust_isi
  type: group
  fields:
    - name: incident
      type: group
      fields:
        - name: definition_id
          type: keyword
          description: The name of the detection or recommendation.
        - name: definition_summary
          type: keyword
          multi_fields:
            - name: text
              type: match_only_text
          description: A high-level summary of the detection or recommendation.
        - name: entity_name
          type: keyword
          description: A comma separated list of all the entity names of the impacted entities.
        - name: entity_type
          type: keyword
          description: A comma separated list of all the entity types of the impacted entities (i.e., Identity or Account).
        - name: incident_id
          type: keyword
          description: The internal ID of the detection or recommendation.
        - name: incident_type
          type: keyword
          description: Whether the incident was a detection or recommendation.
        - name: link
          type: keyword
          description: A deep link to the details page of the specific detection or recommendation.
        - name: location
          type: keyword
          description: A comma separated list of all the locations of the impacted entities.
        - name: severity
          type: keyword
          description: The severity of the detection or recommendation.
        - name: source
          type: keyword
          description: A comma separated list of all the sources of the impacted entities.
        - name: tenant_id
          type: keyword
          description: The ID of the tenant that the detection or recommendation was detected in.
        - name: timestamp
          type: date
          description: The date and time the incident occurred.
