title: Collect Incidents from BeyondTrust ISI.
type: logs
streams:
  - input: http_endpoint
    template_path: http_endpoint.yml.hbs
    enabled: true
    title: Incidents
    description: Collect Incidents from BeyondTrust ISI.
    vars:
      - name: listen_address
        type: text
        title: Listen Address
        description: Bind address for the listener. Use 0.0.0.0 to listen on all interfaces.
        multi: false
        required: true
        show_user: true
        default: localhost
      - name: listen_port
        type: integer
        title: Listen Port
        description: The port number the listener binds to.
        multi: false
        required: true
        show_user: true
        default: 9101
      - name: url
        type: text
        title: URL
        description: This option specifies which URL path to accept requests on. Defaults to /.
        multi: false
        required: false
        show_user: false
        default: /
      - name: basic_auth
        title: Authentication (Basic)
        type: bool
        default: false
        description: |
          Enables or disables HTTP basic auth for each incoming request. If enabled, both the username and password must be configured. This is incompatible with Authentication (Token).
        required: false
        show_user: true
      - name: username
        type: text
        title: Username
        description: If Basic Authentication is enabled, this is the username used for authentication against the HTTP listener. It also requires the password to be set.
        required: false
        show_user: true
      - name: password
        type: password
        title: Password
        description: If Basic Authentication is enabled, this is the password used for authentication against the HTTP listener. It also requires the username to be set.
        required: false
        show_user: true
        secret: true
      - name: token
        type: password
        title: Authentication (Token)
        description: The token value required to authenticate via `Token`. This is incompatible with Authentication (Basic).
        required: false
        show_user: true
        secret: true
      - name: secret_header
        type: text
        title: Secret Header
        description: The header to check for a specific value specified by `secret.value`. Not emitted when Authentication (Token) is configured, because Bearer authentication uses the Authorization header instead.
        required: false
        show_user: false
        secret: false
      - name: secret_value
        type: password
        title: Secret Value
        description: The secret stored in the header name specified by `secret.header`. Not emitted when Authentication (Token) is configured, because Bearer authentication uses the Authorization header instead.
        required: false
        show_user: false
        secret: true
      - name: ssl
        type: yaml
        title: TLS
        description: Options for enabling TLS for the listening webhook endpoint. See the [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html) for a list of all options.
        multi: false
        required: false
        show_user: false
        default: |
          # enabled: true
          # certificate: "/etc/pki/client/cert.pem"
          # key: "/etc/pki/client/cert.key"
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - beyondtrust_isi-incident
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        default: false
        multi: false
        required: false
        show_user: false
        description: >-
          The request tracer logs HTTP requests to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-http_endpoint.html#_tracer_enabled_3) for details.
