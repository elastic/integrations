---
description: Pipeline for processing Cisco Aironet Logs
processors:
  - rename:
      tag: rename_message_to_event_original_86cdcc50
      field: message
      target_field: event.original
      ignore_missing: true
      ignore_failure: true
      if: ctx.event?.original == null
  - set:
      tag: set_ecs_version_f5923549
      field: ecs.version
      value: '8.17.0'
  - grok:
      tag: grok_event_original_506bf986
      field: event.original
      patterns:
        - "%{SYSLOG_HEADER}:\\s%%{GREEDYDATA:_temp_.full_message}"
        - "%{SYSLOGFACILITY}%{INT}: %{DATA:host.name}: %{INT}: %{AIRONET_DATE}: %%{GREEDYDATA:_temp_.full_message}"
        - "%{SYSLOGFACILITY}%{INT}: AP:%{MAC:host.mac}: \\*%{AIRONET_DATE}: %%{GREEDYDATA:_temp_.full_message}"
        - "%{SYSLOGFACILITY}%{INT}: %{AIRONET_DATE}: %%{GREEDYDATA:_temp_.full_message}"
        - "%{SYSLOGFACILITY}%{DATA:host.name}: -%{GREEDYDATA:_temp_.full_message}"
      pattern_definitions:
        SYSLOG_HEADER: "%{SYSLOGFACILITY}%{DATA:host.name}:\\s\\*%{DATA:process.name}:\\s%{AIRONET_DATE}"
        SYSLOGFACILITY: "<%{NONNEGINT:log.syslog.priority:int}>"
        AIRONET_DATE: "%{MONTH:_temp_.raw_date_month}\\s+%{MONTHDAY:_temp_.raw_date_monthday}(\\s+%{YEAR:_temp_.raw_date_year})?\\s+%{TIME:_temp_.raw_date_time}(\\s+%{WORD:_temp_.raw_date_timezone})?"
  - script:
      tag: script_4a9d0c10
      lang: painless
      source: |
        if (ctx.log?.syslog?.priority != null) {
          def severity = new HashMap();
          severity['code'] = ctx.log.syslog.priority&0x7;
          ctx.log.syslog['severity'] = severity;
          def facility = new HashMap();
          facility['code'] = ctx.log.syslog.priority>>3;
          ctx.log.syslog['facility'] = facility;
        }
  - grok:
      tag: grok__temp__full_message_c55451a6
      field: _temp_.full_message
      ignore_failure: true
      patterns:
        - "%{DATA:event.provider}-%{INT:event.severity:long}-%{DATA:event.action}: %{DATA}:%{INT} %{GREEDYDATA:message}"
        - "%{DATA:event.provider}-%{INT:event.severity:long}-%{DATA:event.action}: %{GREEDYDATA:message}"
  - grok:
      tag: grok__temp__full_message_b43730c2
      field: _temp_.full_message
      ignore_failure: true
      patterns:
        - "%{DATA:_temp_.reason}:"

  # Set log.level
  - set:
      tag: set_log_level_679c8d22
      field: "log.level"
      value: unknown
  - set:
      tag: set_log_level_49c2066f
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 1"
      value: alert
  - set:
      tag: set_log_level_f452ca51
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 2"
      value: critical
  - set:
      tag: set_log_level_f9937e3d
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 3"
      value: error
  - set:
      tag: set_log_level_ee362e0c
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 4"
      value: warning
  - set:
      tag: set_log_level_9a61be1a
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 5"
      value: notification
  - set:
      tag: set_log_level_a34d4cf7
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 6"
      value: informational
  - set:
      tag: set_log_level_89fd5cca
      field: "log.level"
      if: "ctx.log?.syslog?.severity?.code == 7"
      value: debug

  # Parse the date included in logs
  - set:
      tag: set__conf_tz_offset_3fab6936
      field: _conf.tz_offset
      if: "ctx._temp_?.raw_date_timezone != null"
      value: "{{{_temp_.raw_date_timezone}}}"
      override: false
  - set:
      tag: set__conf_tz_offset_473d581a
      field: _conf.tz_offset
      value: UTC
      override: false
  - set:
      field: _temp_.raw_date
      if: "ctx._temp_?.raw_date_month != null && ctx._temp_?.raw_date_monthday != null && ctx._temp_?.raw_date_time != null && ctx._temp_?.raw_date_year != null"
      value: "{{{_temp_.raw_date_month}}} {{{_temp_.raw_date_monthday}}} {{{_temp_.raw_date_year}}} {{{_temp_.raw_date_time}}}"
      tag: "set_raw_date_with_year"
      override: false
  - set:
      field: _temp_.raw_date
      if: "ctx._temp_?.raw_date_month != null && ctx._temp_?.raw_date_monthday != null && ctx._temp_?.raw_date_time != null"
      value: "{{{_temp_.raw_date_month}}} {{{_temp_.raw_date_monthday}}} {{{_temp_.raw_date_time}}}"
      tag: "set_raw_date"
      override: false
  - date:
      if: "ctx._temp_?.raw_date != null"
      field: "_temp_.raw_date"
      target_field: "@timestamp"
      tag: "raw_date_processor"
      formats:
        - "MMM d yyyy HH:mm:ss.SSS"
        - "MMM d HH:mm:ss.SSS"
        - "MMM d HH:mm:ss"
      timezone: '{{{_conf.tz_offset}}}'

  # Adding information to event types
  - grok:
      tag: grok_message_c41fbfd3
      description: SISF-6-ENTRY_CREATED, SISF-6-ENTRY_DELETED, SISF-6-ENTRY_CHANGED, LOG-6-Q_IND
      field: message
      if: >-
        ctx._temp_?.reason == 'SISF-6-ENTRY_CREATED' ||
        ctx._temp_?.reason == 'SISF-6-ENTRY_DELETED' ||
        ctx._temp_?.reason == 'SISF-6-ENTRY_CHANGED'||
        ctx._temp_?.reason == 'LOG-6-Q_IND'
      patterns:
        - "A=%{IP:client.ip} V=%{INT} I=%{DATA:cisco.interface.type}:%{INT} P=%{INT} M=((%{MAC:client.mac})|$)"
        - "Username entry \\(%{DATA:user.name}\\)%{DATA}mobile %{MAC:client.mac}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_445c191f
      description: AAA-5-AAA_AUTH_ADMIN_USER
      field: message
      if: ctx._temp_?.reason == 'AAA-5-AAA_AUTH_ADMIN_USER'
      patterns:
        - "for admin user '%{USER:user.name}' on %{IP:client.ip}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_9ebafa07
      description: NIM-3-ADMIN_MODE_DISABLE
      field: message
      if: ctx._temp_?.reason == 'NIM-3-ADMIN_MODE_DISABLE'
      patterns:
        - "Port %{INT:observer.ingress.interface.id}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_31fc3ce1
      description: WPS-4-SIG_ALARM_OFF
      field: message
      if: ctx._temp_?.reason == 'WPS-4-SIG_ALARM_OFF'
      patterns:
        - "AP %{MAC:host.mac}.*?track=%{DATA:cisco.wps.track} preced=%{INT:cisco.wps.preced:int} hits=%{INT:cisco.wps.hits:int} slot=%{INT:cisco.wps.slot:int} channel=%{INT:cisco.wps.channel:int}"
      ignore_failure: false
  - grok:
      tag: grok_message_9845bec0
      description: WPS-4-SIG_ALARM_OFF_CONT
      field: message
      if: ctx._temp_?.reason == 'WPS-4-SIG_ALARM_OFF_CONT'
      patterns:
        - "source mac= %{MAC:client.mac}"
      ignore_failure: false
  - set:
      tag: set_event_kind_bb72e5a7
      description: WPS-4-SIG_ALARM_OFF
      field: event.kind
      if: >-
        ctx._temp_?.reason == 'WPS-4-SIG_ALARM_OFF' ||
        ctx._temp_?.reason == 'WPS-4-SIG_ALARM_OFF_CONT' ||
        ctx._temp_?.reason == 'LWAPP-4-SIG_INFO1'
      value: alert
      ignore_failure: true
  ###
  - grok:
      tag: grok_message_4cba3364
      description: LWAPP-4-SIG_INFO1
      field: message
      if: ctx._temp_?.reason == 'LWAPP-4-SIG_INFO1'
      patterns:
        - "Signature information; AP %{MAC:destination.mac}, alarm ON, %{SIGNATURE:threat.indicator.description}, track %{DATA}precedence %{INT}, hits %{INT}, slot %{INT}, channel %{INT}, most offending MAC %{MAC:source.mac}"
      pattern_definitions:
        SIGNATURE: "%{DATA} sig %{DATA}"
      ignore_failure: true
  - set:
      tag: set_threat_indicator_type_f6a1f26f
      description: LWAPP-4-SIG_INFO1
      field: threat.indicator.type
      if: ctx._temp_?.reason == 'LWAPP-4-SIG_INFO1' && ctx.threat?.indicator?.description != null && ctx.threat.indicator.description != ""
      value: process
      ignore_failure: true
  ###
  - grok:
      tag: grok_message_62397b68
      description: DOT1X-4-MAX_EAPOL_KEY_RETRANS
      field: message
      if: ctx._temp_?.reason == 'DOT1X-4-MAX_EAPOL_KEY_RETRANS'
      patterns:
        - "client %{MAC:client.mac}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_543fd251
      description: RRM-3-RRM_LOGMSG
      field: message
      if: ctx._temp_?.reason == 'RRM-3-RRM_LOGMSG'
      patterns:
        - "Client not found: %{MAC:client.mac}"
        - "AP:\\s+%{MAC:host.mac}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_1b717879
      description: DOT1X-3-ABORT_AUTH
      field: message
      if: ctx._temp_?.reason == 'DOT1X-3-ABORT_AUTH'
      patterns:
        - "client %{MAC:client.mac} Abort Reason:%{DATA:event.reason}$"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_44f233f8
      description: LOG-3-Q_IND, INVALID_WPA_KEY_STATE
      field: message
      if: >-
        ctx._temp_?.reason == 'LOG-3-Q_IND' ||
        ctx._temp_?.reason == 'DOT1X-3-INVALID_WPA_KEY_STATE'
      patterns:
        - "version %{INT:cisco.eapol.version:int}, type %{INT:cisco.eapol.type:int}, descriptor %{INT:cisco.eapol.descriptor:int}, client %{MAC:client.mac}"
        - "client %{MAC:client.mac}"
      ignore_failure: true
  ###
  - grok:
      tag: grok_message_9886858a
      description: APF-6-USER_NAME_CREATED, APF-6-USER_NAME_DELETED
      field: message
      if: >-
        ctx._temp_?.reason == 'APF-6-USER_NAME_CREATED' ||
        ctx._temp_?.reason == 'APF-6-USER_NAME_DELETED'
      patterns:
        - "Username entry \\(%{DATA:user.name}\\)%{DATA}mobile %{MAC:client.mac}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_message_6b8b95f5
      description: DTL-4-ARP_ORPHANPKT_DETECTED, Dot1x_NW_MsgTask_4
      field: message
      if: >-
        ctx._temp_?.reason == 'DTL-4-ARP_ORPHANPKT_DETECTED' ||
        ctx._temp_?.reason == 'LOG-4-Q_IND'
      patterns:
        - "STA\\(Target MAC Address\\) \\[%{MAC:client.mac}.*?\\] %{DATA:event.reason}\\(Source IP Address\\) %{IP:client.ip}%{DATA}\\(Destination IP Address\\) %{IP:server.ip}"
      ignore_failure: false
  - grok:
      tag: grok_message_757b5cf5
      description: CLIENT_ORCH_LOG-6-CLIENT_ADDED_TO_RUN_STATE
      field: message
      if: ctx._temp_?.reason == 'CLIENT_ORCH_LOG-6-CLIENT_ADDED_TO_RUN_STATE'
      patterns:
        - "R%{INT:cisco.wps.slot}/%{INT:cisco.wps.radio}: wncd: Username entry \\(%{DATA:user.name}\\) joined with ssid \\(%{DATA:cisco.ssid}\\) for device with MAC: %{MAC:client.mac}(\\s+on channel \\(%{INT:cisco.wps.channel:int}\\))?"
      ignore_failure: false
  ###
  - grok:
      tag: grok_APMGR_AWIPS_SYSLOG_APMGR_AWIPS_MESSAGE
      description: APMGR_AWIPS_SYSLOG-6-APMGR_AWIPS_MESSAGE
      field: message
      if: ctx._temp_?.reason == 'APMGR_AWIPS_SYSLOG-6-APMGR_AWIPS_MESSAGE'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: AWIPS alarm:\\(%{DATA:cisco.ap_name}\\) %{MAC:client.mac} +Radio MAC %{MAC:destination.mac} +detected %{DATA:cisco.awips.alarm_type} \\(%{INT:cisco.awips.alarm_code:int}\\)"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SESSION_MGR_FAIL
      description: SESSION_MGR-5-FAIL
      field: message
      if: ctx._temp_?.reason == 'SESSION_MGR-5-FAIL'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Authorization failed or unapplied for client \\(%{MAC:client.mac}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{DATA:cisco.audit_session_id}\\. Failure Reason: %{DATA:event.reason}\\. Failed attribute name %{INT}\\."
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Authorization failed or unapplied for client \\(%{MAC:client.mac}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{DATA:cisco.audit_session_id}\\. Failure reason: Authc fail\\. Authc failure reason: %{DATA:event.reason}\\."
        - "R%{INT}/%{INT}: %{WORD}: Authorization failed or unapplied for client \\(%{MAC:client.mac}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{DATA:cisco.audit_session_id}\\. Failure Reason: %{DATA:event.reason}\\. Failed attribute name %{INT}\\."
        - "R%{INT}/%{INT}: %{WORD}: Authorization failed or unapplied for client \\(%{MAC:client.mac}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{DATA:cisco.audit_session_id}\\. Failure reason: Authc fail\\. Authc failure reason: %{DATA:event.reason}\\."
      ignore_failure: false
  ###
  - grok:
      tag: grok_DOT1X_FAIL
      description: DOT1X-5-FAIL
      field: message
      if: ctx._temp_?.reason == 'DOT1X-5-FAIL'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Authentication failed for client \\(%{MAC:client.mac}\\) with reason \\(%{DATA:event.reason}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{NOTSPACE:cisco.audit_session_id} Username: %{GREEDYDATA:user.name}"
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Authentication failed for client \\(%{MAC:client.mac}\\) with reason \\(%{DATA:event.reason}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{NOTSPACE:cisco.audit_session_id}"
        - "R%{INT}/%{INT}: %{WORD}: Authentication failed for client \\(%{MAC:client.mac}\\) with reason \\(%{DATA:event.reason}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{NOTSPACE:cisco.audit_session_id} Username: %{GREEDYDATA:user.name}"
        - "R%{INT}/%{INT}: %{WORD}: Authentication failed for client \\(%{MAC:client.mac}\\) with reason \\(%{DATA:event.reason}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{NOTSPACE:cisco.audit_session_id}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_MAB_FAIL
      description: MAB-5-FAIL
      field: message
      if: ctx._temp_?.reason == 'MAB-5-FAIL'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Authentication failed for client \\(%{MAC:client.mac}\\) with reason \\(%{DATA:event.reason}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{NOTSPACE:cisco.audit_session_id}"
        - "R%{INT}/%{INT}: %{WORD}: Authentication failed for client \\(%{MAC:client.mac}\\) with reason \\(%{DATA:event.reason}\\) on Interface %{DATA:observer.ingress.interface.name} AuditSessionID %{NOTSPACE:cisco.audit_session_id}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_CLIENT_EXCLUSION_SERVER_ADD_TO_EXCLUSIONLIST_REASON_DYNAMIC
      description: CLIENT_EXCLUSION_SERVER-5-ADD_TO_EXCLUSIONLIST_REASON_DYNAMIC
      field: message
      if: ctx._temp_?.reason == 'CLIENT_EXCLUSION_SERVER-5-ADD_TO_EXCLUSIONLIST_REASON_DYNAMIC'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Client MAC: %{MAC:client.mac} was added to exclusion list associated with AP Name:%{DATA:cisco.ap_name}, BSSID:MAC: %{MAC:destination.mac}, reason:%{GREEDYDATA:event.reason}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_CLIENT_ORCH_LOG_ADD_TO_EXCLUSIONLIST_REASON
      description: CLIENT_ORCH_LOG-5-ADD_TO_EXCLUSIONLIST_REASON
      field: message
      if: ctx._temp_?.reason == 'CLIENT_ORCH_LOG-5-ADD_TO_EXCLUSIONLIST_REASON'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Client MAC: %{MAC:client.mac} with IP: %{IP:client.ip} was added to exclusion list, legit Client MAC: %{MAC:destination.mac}, IP: %{IP:server.ip}, reason: %{GREEDYDATA:event.reason}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_CLIENT_ORCH_LOG_ADD_TO_EXCLUSIONLIST_MAC_THEFT_REASON
      description: CLIENT_ORCH_LOG-5-ADD_TO_EXCLUSIONLIST_MAC_THEFT_REASON
      # Parses _temp_.full_message instead of message: IPv6 addresses (containing colons)
      # cause the upstream syslog header grok to truncate the message field prematurely.
      field: _temp_.full_message
      if: ctx._temp_?.reason == 'CLIENT_ORCH_LOG-5-ADD_TO_EXCLUSIONLIST_MAC_THEFT_REASON'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Client MAC: %{MAC:client.mac} with IP: %{IP:client.ip} was added to exclusion list, legit ifid: %{DATA}, current ifid: %{DATA}, reason: %{GREEDYDATA:event.reason}"
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Client MAC: %{MAC:client.mac} with IP: %{DATA:client.ip} was added to exclusion list, legit ifid: %{DATA}, current ifid: %{DATA}, reason: %{GREEDYDATA:event.reason}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_FMANFP_IPACCESSLOGP
      description: FMANFP-6-IPACCESSLOGP
      field: message
      if: ctx._temp_?.reason == 'FMANFP-6-IPACCESSLOGP'
      patterns:
        - "Chassis %{INT} F%{INT}/%{INT}: %{WORD}: list %{DATA:cisco.acl.name} %{WORD:cisco.acl.action} %{WORD:network.transport} %{IP:source.ip}\\(%{INT:source.port:int}\\) -> %{IP:destination.ip}\\(%{INT:destination.port:int}\\), %{INT} packets?"
        - "Chassis %{INT} F%{INT}/%{INT}: %{WORD}: list %{DATA:cisco.acl.name} %{WORD:cisco.acl.action} %{WORD:network.transport} \\[%{DATA}\\] %{IP:source.ip}\\(%{INT:source.port:int}\\) -> %{IP:destination.ip}\\(%{INT:destination.port:int}\\), %{INT} packets?"
      ignore_failure: false
  ###
  - grok:
      tag: grok_FMANFP_IPACCESSLOGNP
      description: FMANFP-6-IPACCESSLOGNP
      field: message
      if: ctx._temp_?.reason == 'FMANFP-6-IPACCESSLOGNP'
      patterns:
        - "Chassis %{INT} F%{INT}/%{INT}: %{WORD}: list %{DATA:cisco.acl.name} %{WORD:cisco.acl.action} %{INT} %{IP:source.ip} -> %{IP:destination.ip}, %{INT} packets?"
      ignore_failure: false
  ###
  - grok:
      tag: grok_FMANFP_IPACCESSLOGDP
      description: FMANFP-6-IPACCESSLOGDP
      field: message
      if: ctx._temp_?.reason == 'FMANFP-6-IPACCESSLOGDP'
      patterns:
        - "Chassis %{INT} F%{INT}/%{INT}: %{WORD}: list %{DATA:cisco.acl.name} %{WORD:cisco.acl.action} icmp %{IP:source.ip} -> %{IP:destination.ip} \\(%{DATA}\\), %{INT} packets"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SEC_LOGIN_SUCCESS
      description: SEC_LOGIN-5-LOGIN_SUCCESS, SEC_LOGIN-5-WEBLOGIN_SUCCESS
      field: _temp_.full_message
      if: >-
        ctx._temp_?.reason == 'SEC_LOGIN-5-LOGIN_SUCCESS' ||
        ctx._temp_?.reason == 'SEC_LOGIN-5-WEBLOGIN_SUCCESS'
      patterns:
        - "SEC_LOGIN-5-LOGIN_SUCCESS: Login Success \\[user: %{DATA:user.name}\\] \\[Source: %{IP:client.ip}\\] \\[localport: +%{INT:source.port:int}\\] at %{GREEDYDATA}"
        - "SEC_LOGIN-5-WEBLOGIN_SUCCESS: Login Success \\[user: %{DATA:user.name}\\] \\[Source: %{IP:client.ip}\\] at %{GREEDYDATA}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_DMI_AUTH_PASSED
      description: DMI-5-AUTH_PASSED
      field: _temp_.full_message
      if: ctx._temp_?.reason == 'DMI-5-AUTH_PASSED'
      patterns:
        - "DMI-5-AUTH_PASSED: Chassis %{INT} R%{INT}/%{INT}: %{WORD}: User '%{DATA:user.name}' authenticated successfully from %{IP:client.ip}:%{INT:source.port:int}  for %{NOTSPACE:cisco.auth.method} over %{WORD}\\. External groups: %{GREEDYDATA}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SSH_SSH2_SESSION_CLOSE_USERAUTH
      description: SSH-5-SSH2_SESSION, SSH-5-SSH2_CLOSE, SSH-5-SSH2_USERAUTH
      field: message
      if: >-
        ctx._temp_?.reason == 'SSH-5-SSH2_SESSION' ||
        ctx._temp_?.reason == 'SSH-5-SSH2_CLOSE' ||
        ctx._temp_?.reason == 'SSH-5-SSH2_USERAUTH'
      patterns:
        - "SSH2 Session request from %{IP:client.ip} \\(tty = %{INT}\\) using crypto cipher '%{DATA:tls.cipher}'"
        - "SSH2 Session from %{IP:client.ip} \\(tty = %{INT}\\) for user '%{DATA:user.name}' using crypto cipher '%{DATA:tls.cipher}'"
        - "User '%{DATA:user.name}' authentication for SSH2 Session from %{IP:client.ip} \\(tty = %{INT}\\) using crypto cipher '%{DATA:tls.cipher}'"
      ignore_failure: false
  ###
  - grok:
      tag: grok_RADIUS_AUDIT_MESSAGE_ALIVE_DEAD
      description: RADIUS_AUDIT_MESSAGE-6-RADIUS_ALIVE, RADIUS_AUDIT_MESSAGE-6-RADIUS_DEAD
      field: message
      if: >-
        ctx._temp_?.reason == 'RADIUS_AUDIT_MESSAGE-6-RADIUS_ALIVE' ||
        ctx._temp_?.reason == 'RADIUS_AUDIT_MESSAGE-6-RADIUS_DEAD'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: RADIUS server %{DATA:cisco.radius.server} is being marked alive\\."
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: RADIUS server %{DATA:cisco.radius.server} is not responding\\."
      ignore_failure: false
  ###
  - grok:
      tag: grok_CAPWAPAC_SMGR_TRACE_MESSAGE_AP_JOIN_DISJOIN
      description: CAPWAPAC_SMGR_TRACE_MESSAGE-5-AP_JOIN_DISJOIN
      field: message
      if: ctx._temp_?.reason == 'CAPWAPAC_SMGR_TRACE_MESSAGE-5-AP_JOIN_DISJOIN'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: AP Event: AP Name: %{DATA:cisco.ap_name} Mac: %{MAC:destination.mac} Session-IP: %{IP:source.ip}\\[%{INT:source.port:int}\\] %{IP:destination.ip}\\[%{INT:destination.port:int}\\] %{GREEDYDATA:event.reason}"
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: AP Event: AP Name: %{DATA:cisco.ap_name} Mac: %{MAC:destination.mac} Session-IP: %{IP:source.ip}\\[%{INT:source.port:int}\\] %{GREEDYDATA:event.reason}"
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: AP Event: AP Name: %{DATA:cisco.ap_name} Mac:\\s*Session-IP: %{IP:source.ip}\\[%{INT:source.port:int}\\] %{IP:destination.ip}\\[%{INT:destination.port:int}\\] %{GREEDYDATA:event.reason}"
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: AP Event: AP Name:\\s*Mac: %{MAC:destination.mac} Session-IP: %{IP:source.ip}\\[%{INT:source.port:int}\\] %{GREEDYDATA:event.reason}"
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: AP Event: AP Name:\\s*Mac:\\s*Session-IP: %{IP:source.ip}\\[%{INT:source.port:int}\\] %{GREEDYDATA:event.reason}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_MM_LOG_RETRIES_FAILED
      description: MM_LOG-4-RETRIES_FAILED
      field: message
      if: ctx._temp_?.reason == 'MM_LOG-4-RETRIES_FAILED'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: MAC: %{MAC:client.mac}: All retries of handoff_end \\(XID: %{INT}\\) to ipv4: %{IP:destination.ip}  have been exhausted"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SISF_EXCESS_ARP_ACTIVITY
      description: SISF-4-EXCESS_ARP_ACTIVITY
      field: message
      if: ctx._temp_?.reason == 'SISF-4-EXCESS_ARP_ACTIVITY'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Excessive ARP activity detected for the client %{MAC:client.mac}\\. client is brought down and added to the exclusion list"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SWPORT_MAC_CONFLICT
      description: SWPORT-4-MAC_CONFLICT
      field: _temp_.full_message
      if: ctx._temp_?.reason == 'SWPORT-4-MAC_CONFLICT'
      patterns:
        - "SWPORT-4-MAC_CONFLICT: Chassis %{INT} F%{INT}: %{WORD}: Dynamic mac %{MAC:client.mac} from %{NOTSPACE} conflict with %{GREEDYDATA}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SYS_CONFIG_P
      description: SYS-5-CONFIG_P
      field: message
      if: ctx._temp_?.reason == 'SYS-5-CONFIG_P'
      patterns:
        - "Configured programmatically by process %{DATA} from console as %{DATA:user.name} on %{DATA}"
      ignore_failure: false
  ###
  - grok:
      tag: grok_SYS_LOGOUT
      description: SYS-6-LOGOUT
      field: message
      if: ctx._temp_?.reason == 'SYS-6-LOGOUT'
      patterns:
        - "User %{DATA:user.name} has exited tty session %{INT}\\(%{IP:client.ip}\\)"
      ignore_failure: false
  ###
  - grok:
      tag: grok_LOADBALANCE_TRACE_MESSAGE_LB_LOG_MSG
      description: LOADBALANCE_TRACE_MESSAGE-5-LB_LOG_MSG
      field: message
      if: ctx._temp_?.reason == 'LOADBALANCE_TRACE_MESSAGE-5-LB_LOG_MSG'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Loadbalancer Log : AP \\( %{IP:source.ip} \\) : Loadbalancer algorithm assigned Instance \\(%{INT:cisco.loadbalance.instance:int}\\) for site tag \\(%{DATA:cisco.site_tag}\\)"
      ignore_failure: false
  ###
  - grok:
      tag: grok_MCAST_ERROR_MESSAGE_MCAST_GRP_JOIN_LEAVE_FAILED
      description: MCAST_ERROR_MESSAGE-3-MCAST_GRP_JOIN_LEAVE_FAILED
      field: message
      if: ctx._temp_?.reason == 'MCAST_ERROR_MESSAGE-3-MCAST_GRP_JOIN_LEAVE_FAILED'
      patterns:
        - "Chassis %{INT} R%{INT}/%{INT}: %{WORD}: Failed to handle IGMP join\\. No MAC address for client IP: %{IP:client.ip}, group IP: %{IP:destination.ip}, vlan: %{INT:network.vlan.id} for client %{MAC:client.mac}  multicast group %{WORD}, mgid %{INT}"
      ignore_failure: false
  ###
  # Client MAC
  - grok:
      tag: grok_message_cf1bf699
      field: message
      ignore_missing: true
      ignore_failure: true
      patterns:
        - "client %{MAC:client.mac}"
  # Mac address cleanup
  - uppercase:
      tag: uppercase_client_mac_230df574
      field: client.mac
      ignore_missing: true
  - gsub:
      tag: gsub_client_mac_36195d46
      field: client.mac
      pattern: '[:.]'
      replacement: '-'
      ignore_missing: true
  - script:
      tag: script_579bcf17
      lang: painless
      if: ctx.client?.mac != null
      description: 'Convert Cisco style mac to standard format (XXXX-XXXX-XXXX to XX-XX-XX-XX-XX-XX)'
      source: |
        def mac = ctx.client.mac;
        def pattern = /^[A-F0-9]{4}(-[A-F0-9]{4}){2}$/;
        def matcher = pattern.matcher(mac);
        if (matcher.matches()) {
           ctx.client.mac = mac.substring(0,2) + "-" + mac.substring(2,4) + "-" + mac.substring(5,7) + "-" + mac.substring(7,9) + "-" + mac.substring(10,12) + "-" + mac.substring(12,14);
        }

  - uppercase:
      tag: uppercase_source_mac_5b4e7be2
      field: source.mac
      ignore_missing: true
  - gsub:
      tag: gsub_source_mac_aba488b3
      field: source.mac
      pattern: '[-:.]'
      replacement: '-'
      ignore_missing: true
  - uppercase:
      tag: uppercase_destination_mac_04de3657
      field: destination.mac
      ignore_missing: true
  - gsub:
      tag: gsub_destination_mac_79f51cb8
      field: destination.mac
      pattern: '[-:.]'
      replacement: '-'
      ignore_missing: true
  - script:
      tag: script_destination_mac_a8b9c0d1
      lang: painless
      if: ctx.destination?.mac != null
      description: 'Convert Cisco style mac to standard format (XXXX-XXXX-XXXX to XX-XX-XX-XX-XX-XX)'
      source: |
        def mac = ctx.destination.mac;
        def pattern = /^[A-F0-9]{4}(-[A-F0-9]{4}){2}$/;
        def matcher = pattern.matcher(mac);
        if (matcher.matches()) {
           ctx.destination.mac = mac.substring(0,2) + "-" + mac.substring(2,4) + "-" + mac.substring(5,7) + "-" + mac.substring(7,9) + "-" + mac.substring(10,12) + "-" + mac.substring(12,14);
        }
  - uppercase:
      tag: uppercase_host_mac_73cd4413
      field: host.mac
      ignore_missing: true
  - gsub:
      tag: gsub_host_mac_a5d14ec9
      field: host.mac
      pattern: '[-:.]'
      replacement: ''
      ignore_missing: true
  - gsub:
      tag: gsub_host_mac_15e1d27e
      field: host.mac
      pattern: '(..)(?!$)'
      replacement: '$1-'
      ignore_missing: true

  # IP Geolocation Lookup
  - geoip:
      tag: geoip_client_ip_to_client_geo_90831252
      field: client.ip
      target_field: client.geo
      ignore_missing: true

  # IP Autonomous System (AS) Lookup
  - geoip:
      tag: geoip_client_ip_to_client_as_f17fb2b3
      database_file: GeoLite2-ASN.mmdb
      field: client.ip
      target_field: client.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      tag: rename_client_as_asn_to_client_as_number_a6e30d01
      field: client.as.asn
      target_field: client.as.number
      ignore_missing: true
  - rename:
      tag: rename_client_as_organization_name_to_client_as_organization_name_817a526f
      field: client.as.organization_name
      target_field: client.as.organization.name
      ignore_missing: true

  # Cleanup fields
  - remove:
      tag: remove__temp__ef8e4353
      field: _temp_
      ignore_failure: true
      ignore_missing: true
  - remove:
      tag: remove__conf_67aec840
      field: _conf
      ignore_failure: true
      ignore_missing: true
  - script:
      tag: script_drop_null_empty_values
      description: Drops null/empty values recursively
      lang: painless
      source: |
        boolean drop(Object o) {
          if (o == null || o == "") {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
  - append:
      tag: append_preserve_original_event_on_error
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null

on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
