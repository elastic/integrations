# newer versions go on top
- version: "0.2.0"
  changes:
    - description: Add a per-service `delay` variable on each policy template (`aws_ec2`, `lambda`, `rds`, `sqs`, `elb`, `ecs`), with a default reflecting the typical CloudWatch publish latency for that AWS service. The receiver uses this value as `metrics.delay`.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/99999
- version: "0.1.0"
  changes:
    - description: Initial release of AWS CloudWatch OpenTelemetry input package.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19468
