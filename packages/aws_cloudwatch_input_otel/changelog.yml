# newer versions go on top
- version: "0.4.0"
  changes:
    - description: Add `recently_active` option to restrict metric discovery to metrics active in the last three hours.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19790
- version: "0.3.2"
  changes:
    - description: Update the integration documentation.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19624
- version: "0.3.1"
  changes:
    - description: Update default collection period and stats.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19665
- version: "0.3.0"
  changes:
    - description: Add support for region specific to a service.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19563
    - description: Authenticate via the `awscredentialsprovider` extension (bundled in EDOT through elastic-agent#14933).
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19563
- version: "0.2.2"
  changes:
    - description: "Move configs to per service"
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19570
    - description: "Allow selecting multiple CloudWatch statistics per service (Aggregation Statistics is now a multi-select rendered as the receiver's `stats` list)."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19570
- version: "0.2.1"
  changes:
    - description: Add a per-service `delay` variable on each policy template (`aws_ec2`, `lambda`, `rds`, `sqs`, `elb`, `ecs`), with a default reflecting the typical CloudWatch publish latency for that AWS service. The receiver uses this value as `metrics.delay`.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19551
- version: "0.2.0"
  changes:
    - description: "Make agentless the default deployment mode (`is_default: true`) while keeping the standard agent mode enabled. Add `release: beta` to the agentless block."
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19547
- version: "0.1.1"
  changes:
    - description: Rename `aws_ec2` policy template to `aws.ec2` so it matches the bare-service-name convention used by the other templates (`lambda`, `rds`, `sqs`, `elb`, `fargate`). Update titles from "AWS X Metrics (OpenTelemetry)" to "AWS X OpenTelemetry Metrics".
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19532
- version: "0.1.0"
  changes:
    - description: Initial release of AWS CloudWatch OpenTelemetry input package.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19468
