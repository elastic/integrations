format_version: 3.4.2
name: cursor
title: "Cursor"
version: "0.2.0"
source:
  license: "Elastic-2.0"
description: "Collect audit logs from Cursor with Elastic Agent."
type: integration
categories:
  - security
  - productivity
conditions:
  kibana:
    version: "^8.19.0 || ^9.1.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Cursor logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: cursor
    title: Cursor Audit Logs
    description: Collect audit logs from Cursor.
    inputs:
      - type: cel
        title: Collect Cursor audit logs via the Admin API
        description: Collecting audit logs from Cursor via the Admin API (REST polling).
      - type: aws-s3
        title: Collect Cursor audit logs via AWS S3 or AWS SQS
        description: Collecting audit logs from Cursor via AWS S3 or AWS SQS.
owner:
  github: elastic/security-service-integrations
  type: elastic
