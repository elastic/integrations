services:
  cursor-audit-mock:
    image: docker.elastic.co/observability/stream:v0.22.0
    hostname: cursor-audit-mock
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-audit.yml
