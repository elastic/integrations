title: Collect Audit Logs from Cursor
type: logs
streams:
  - input: cel
    template_path: cel.yml.hbs
    title: Cursor Audit logs (Admin API)
    description: Collecting Cursor audit logs from the Admin API `/teams/audit-logs` endpoint via CEL.
    vars:
      - name: interval
        type: text
        title: Polling Interval
        description: How frequently to poll for new audit events. Should be greater than 1m to stay within the documented 20 req/min/team rate limit.
        default: 5m
        required: true
        show_user: true
      - name: initial_interval
        type: text
        title: Initial Lookback Interval
        description: How far back to collect events on the first run. The Cursor Admin API only retains audit events for the last 30 days, so values larger than `720h` are silently clamped to a 30-day lookback.
        default: 24h
        required: true
        show_user: true
      - name: page_size
        type: integer
        title: Page Size
        description: Number of events per API page (1–500).
        default: 500
        required: false
        show_user: false
      - name: event_types
        type: text
        title: Event Types
        description: Comma-separated list of event types to collect. Leave empty to collect all event types.
        required: false
        show_user: true
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Timeout for HTTP requests to the Cursor Admin API.
        default: 30s
        required: false
        show_user: false
      - name: resource_rate_limit_limit
        type: text
        title: Resource Rate Limit
        description: >-
          Token bucket refill rate in HTTP requests per second for the Cursor Admin API. Cursor documents 20 requests per minute per team for this endpoint (~0.333/s sustained). Increase only with care; decrease if you see HTTP 429 or share the team quota with other collectors.
        default: "0.35"
        multi: false
        required: true
        show_user: false
      - name: resource_rate_limit_burst
        type: integer
        title: Resource Rate Limit Burst
        description: Maximum requests that can be issued in a burst after an idle period (CEL resource token bucket).
        default: 2
        multi: false
        required: true
        show_user: false
      - name: max_executions
        type: integer
        title: Maximum Pages Per Interval
        description: Maximum number of CEL program executions (API pages) collected per agent interval. Increase when many paginated pages must be read within a single poll.
        default: 10000
        multi: false
        required: false
        show_user: false
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        description: >-
          The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/docs/reference/integrations/inputs/input-cel#_resource_tracer_filename) for details.
        required: false
        show_user: false
        default: false
      - name: proxy_url
        type: text
        title: Proxy URL
        description: HTTP proxy URL for API requests, for example `http://proxy:8080`.
        required: false
        show_user: false
      - name: ssl
        type: yaml
        title: SSL Configuration
        description: SSL configuration options. See [SSL](https://www.elastic.co/docs/reference/elastic-agent/agent-ssl-options) for details.
        required: false
        show_user: false
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - cursor-audit
      - name: preserve_original_event
        type: bool
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        required: false
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
        required: false
        show_user: false
  - input: aws-s3
    template_path: aws-s3.yml.hbs
    title: Cursor Audit logs (S3)
    description: Collecting Cursor audit logs via AWS S3 or SQS input.
    vars:
      - name: collect_s3_logs
        required: true
        show_user: true
        title: Collect logs via S3 Bucket
        description: To collect logs via S3 bucket enable the toggle switch. By default, it will collect logs via SQS Queue.
        type: bool
        multi: false
        default: false
      - name: bucket_arn
        type: text
        title: "[S3] Bucket ARN"
        multi: false
        required: false
        show_user: true
        description: ARN of the AWS S3 bucket that will be polled for list operation. It is a required parameter for collecting logs via the AWS S3 Bucket unless you set an Access Point ARN. In case both configurations are added, this one takes precedence.
      - name: access_point_arn
        type: text
        title: "[S3] Access Point ARN"
        multi: false
        required: false
        show_user: true
        description: ARN of the AWS S3 Access Point that will be polled for list operation. Mandatory if the "Collect logs via S3 Bucket" switch is on. It is a required parameter for collecting logs via the AWS S3 Bucket unless you set a Bucket ARN.
      - name: queue_url
        type: text
        title: "[SQS] Queue URL"
        multi: false
        required: false
        show_user: true
        description: URL of the AWS SQS queue that messages will be received from. It is a required parameter for collecting logs via the AWS SQS.
      - name: access_key_id
        type: password
        title: Access Key ID
        multi: false
        required: false
        show_user: true
        description: First part of access key.
        secret: true
      - name: secret_access_key
        type: password
        title: Secret Access Key
        multi: false
        required: false
        show_user: true
        description: Second part of access key.
        secret: true
      - name: session_token
        type: password
        title: Session Token
        multi: false
        required: false
        show_user: true
        description: Required when using temporary security credentials.
        secret: true
      - name: shared_credential_file
        type: text
        title: Shared Credential File
        multi: false
        required: false
        show_user: false
        description: Directory of the shared credentials file.
      - name: credential_profile_name
        type: text
        title: Credential Profile Name
        multi: false
        required: false
        show_user: false
        description: Profile name in shared credentials file.
      - name: role_arn
        type: text
        title: Role ARN
        multi: false
        required: false
        show_user: false
        description: AWS IAM Role to assume.
      - name: fips_enabled
        type: bool
        title: Enable S3 FIPS
        default: false
        multi: false
        required: false
        show_user: false
        description: Enabling this option changes the service name from `s3` to `s3-fips` for connecting to the correct service endpoint.
      - name: proxy_url
        type: text
        title: Proxy URL
        multi: false
        required: false
        show_user: false
        description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>. Please ensure your username and password are in URL encoded format.
      - name: bucket_list_prefix
        type: text
        title: "[S3] Bucket Prefix"
        multi: false
        required: false
        show_user: true
        description: Prefix to apply for the list request to the S3 bucket.
      - name: interval
        type: text
        title: "[S3] Interval"
        multi: false
        required: false
        show_user: true
        default: 120s
        description: Time interval for polling listing of the S3 bucket. It should be greater than 1m. Supported units are h/m/s.
      - name: number_of_workers
        type: integer
        title: "[S3/SQS] Number of Workers"
        multi: false
        required: false
        show_user: true
        default: 5
        description: Number of workers that will process the S3 objects listed. It is a required parameter for collecting logs via the AWS S3 Bucket.
      - name: start_timestamp
        type: text
        title: "[S3] Start Timestamp"
        multi: false
        required: false
        show_user: false
        description: If set, only read S3 objects with last modified timestamp newer than the given timestamp. Accepts a timestamp in `YYYY-MM-DDTHH:MM:SSZ` format. For example, "2020-10-10T10:30:00Z" (UTC) or "2020-10-10T10:30:00Z+02:30" (with zone offset).
      - name: ignore_older
        type: text
        title: "[S3] Ignore Older Timespan"
        multi: false
        required: false
        show_user: false
        description: If set, ignore S3 objects whose Last-Modified time is before the ignore older timespan. Timespan is checked from the current time to S3 object's Last-Modified time. Accepts a duration like `48h`, `2h30m`.
      - name: visibility_timeout
        type: text
        title: "[SQS] Visibility Timeout"
        multi: false
        required: false
        show_user: true
        default: 300s
        description: The duration that the received messages are hidden from subsequent retrieve requests after being retrieved by a ReceiveMessage request. The maximum is 12 hours. Supported units for this parameter are h/m/s.
      - name: api_timeout
        type: text
        title: "[SQS] API Timeout"
        multi: false
        required: false
        show_user: true
        default: 120s
        description: The maximum duration of AWS API can take. The maximum is half of the visibility timeout value. Supported units for this parameter are h/m/s.
      - name: region
        type: text
        title: "[SQS] Region"
        multi: false
        required: false
        show_user: true
        description: The name of the AWS region of the end point. If this option is given it takes precedence over the region name obtained from the queue_url value. It is a required parameter for collecting logs via the AWS SQS.
      - name: max_number_of_messages
        type: integer
        title: "[SQS] Maximum Concurrent SQS Messages"
        required: false
        show_user: true
        default: 5
        description: Deprecated in agent version 8.16.0, this parameter is ignored if present, use number_of_workers instead. The maximum number of SQS messages that can be inflight at any time.
      - name: preserve_original_event
        required: false
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: file_selectors
        type: yaml
        title: "[SQS] File Selectors"
        multi: false
        required: false
        default: |
          # - regex: "event/"
        show_user: false
        description: >-
          If the SQS queue will have events that correspond to files that this integration shouldn't process, file_selectors can be used to limit the files that are downloaded. This is a list of selectors which are made up of regex and expand_event_list_from_field options. The regex should match the S3 object key in the SQS message, and the optional expand_event_list_from_field is the same as the global setting. If file_selectors is given, then any global expand_event_list_from_field value is ignored in favor of the ones specified in the file_selectors. Regexes use [RE2 syntax](https://pkg.go.dev/regexp/syntax). Files that don't match one of the regexes will not be processed.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - cursor-audit
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
