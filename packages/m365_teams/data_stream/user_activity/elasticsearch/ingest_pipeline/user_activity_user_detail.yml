---
description: Pipeline for processing Microsoft Teams user activity by user detail report data.
processors:
  - rename:
      field: json
      target_field: m365_teams.user_activity.user_detail
      ignore_missing: true
  - fingerprint:
      fields:
        - m365_teams.user_activity.user_detail.Report_Refresh_Date
        - m365_teams.user_activity.user_detail.User_Id
        - m365_teams.user_activity.user_detail.User_Principal_Name
        - m365_teams.user_activity.user_detail.Last_Activity_Date
      target_field: _id
  - set:
      field: user.id
      tag: set_user_id
      copy_from: m365_teams.user_activity.user_detail.User_Id
      ignore_empty_value: true
  - set:
      field: user.name
      tag: set_user_name
      copy_from: m365_teams.user_activity.user_detail.User_Principal_Name
      if: ctx.m365_teams?.user_activity?.user_detail?.User_Principal_Name != null
      ignore_empty_value: true
  - set:
      field: user.email
      tag: set_user_email
      copy_from: user.name
      if: ctx.user?.name != null && ctx.user.name.contains('@')
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_related_user_user_id
      value: "{{{user.id}}}"
      allow_duplicates: false
      if: ctx.user?.id != null
  - append:
      field: related.user
      tag: append_related_user_user_name
      value: "{{{user.name}}}"
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_related_user_user_email
      value: "{{{user.email}}}"
      allow_duplicates: false
      if: ctx.user?.email != null
  - date:
      field: m365_teams.user_activity.user_detail.Report_Refresh_Date
      target_field: m365_teams.user_activity.user_detail.Report_Refresh_Date
      tag: date_m365_teams_user_activity_user_detail_Report_Refresh_Date
      if: ctx.m365_teams?.user_activity?.user_detail?.Report_Refresh_Date != null && ctx.m365_teams.user_activity.user_detail.Report_Refresh_Date != ''
      timezone: UTC
      formats:
        - yyyy-MM-dd
      on_failure:
        - remove:
            field: m365_teams.user_activity.user_detail.Report_Refresh_Date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_timestamp_from_Report_Refresh_Date
      copy_from: m365_teams.user_activity.user_detail.Report_Refresh_Date
      ignore_empty_value: true
  - date:
      field: m365_teams.user_activity.user_detail.Last_Activity_Date
      target_field: m365_teams.user_activity.user_detail.Last_Activity_Date
      tag: date_m365_teams_user_activity_user_detail_Last_Activity_Date
      if: ctx.m365_teams?.user_activity?.user_detail?.Last_Activity_Date != null && ctx.m365_teams.user_activity.user_detail.Last_Activity_Date != ''
