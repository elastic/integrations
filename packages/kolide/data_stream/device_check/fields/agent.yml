- name: aws.s3
  type: group
  description: Metadata added by the AWS S3 input for objects collected from the Kolide Log Pipeline bucket.
  fields:
    - name: bucket
      type: group
      fields:
        - name: name
          type: keyword
          description: The AWS S3 bucket name.
        - name: arn
          type: keyword
          description: The AWS S3 bucket ARN.
    - name: object
      type: group
      fields:
        - name: key
          type: keyword
          description: The AWS S3 object key.
