---
description: >-
  Webhook field extraction for Kolide auth_log deliveries (auth_logs.success /
  auth_logs.failure). Invoked from default.yml when json.event is set.
  Reference: https://www.kolide.com/docs/admins/auth-logs
processors:
  # event.action and event.outcome from webhook event name.
  - rename:
      field: json.event
      target_field: event.action
      tag: rename_event_action_webhook
      ignore_missing: true
      if: ctx.event?.action == null

  # event.outcome from auth_logs.success | auth_logs.failure.
  - set:
      field: event.outcome
      tag: set_outcome_success_webhook
      value: success
      if: ctx.event?.action == 'auth_logs.success'
  - set:
      field: event.outcome
      tag: set_outcome_failure_webhook
      value: failure
      if: ctx.event?.action == 'auth_logs.failure'

  # --- User ---
  - convert:
      field: json.data.person_id
      target_field: user.id
      type: string
      tag: convert_user_id_webhook
      ignore_missing: true

  # --- Host (device) ---
  - rename:
      field: json.data.device_name
      target_field: host.name
      tag: rename_host_name_webhook
      ignore_missing: true
      if: ctx.host?.name == null
  - convert:
      field: json.data.device_id
      target_field: host.id
      type: string
      tag: convert_host_id_webhook
      ignore_missing: true

  # --- User agent ---
  - rename:
      field: json.data.browser_name
      target_field: user_agent.name
      tag: rename_ua_name_webhook
      ignore_missing: true
      if: ctx.user_agent?.name == null
  - rename:
      field: json.data.browser_version
      target_field: user_agent.version
      tag: rename_ua_version_webhook
      ignore_missing: true
      if: ctx.user_agent?.version == null

  # --- Kolide custom fields ---
  - rename:
      field: json.data.launcher_version
      target_field: kolide.auth.agent_version
      tag: rename_agent_version_webhook
      ignore_missing: true
      if: ctx.kolide?.auth?.agent_version == null
  - grok:
      field: json.data.auth_log_url
      tag: grok_auth_log_url
      patterns: 
        - '^%{NOTSPACE}/auth_logs/%{DATA:kolide.auth.session_id}$'
      if: ctx.json?.data?.auth_log_url != null && ctx.json?.data?.auth_log_url != ''
      description: Extract session id from 'auth_log_url' for webhook deliveries.
  - rename:
      field: json.data.auth_log_url
      target_field: kolide.auth.url
      tag: rename_auth_log_url
      ignore_missing: true
      if: ctx.kolide?.auth?.url == null

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
