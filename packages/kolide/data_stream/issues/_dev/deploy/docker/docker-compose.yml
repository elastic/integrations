version: '2.3'
services:
  kolide-issues:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: kolide-issues
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-issues.yml
