---
description: >-
  Parse Kolide issue records from GET /issues (CEL) and webhook deliveries
  (issues.new, issues.resolved). See https://www.kolide.com/docs/ for check
  definitions. Webhook field extraction is delegated to webhook.yml.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'

  # --- CEL input only (Agentless metadata + collector error placeholders) ---
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  # --- end CEL-only ---

  # Webhook envelope: root-level `event` is a string (issues.new / issues.resolved)
  # and would collide with the ECS `event` object. Fold the envelope into `json`
  # so API and webhook inputs share one normalization path.
  - rename:
      field: event
      tag: rename_webhook_event_envelope
      target_field: json.event
      ignore_missing: true
      if: ctx.event instanceof String
      description: Move the webhook envelope `event` (a string) out of the way of the ECS `event` object.
  - script:
      lang: painless
      tag: move_webhook_envelope_to_json
      if: ctx.json?.event != null && ctx.data != null
      description: Move the remaining webhook envelope fields into the working json object. event.original is set by the input when preserve_original_event is enabled.
      source: |-
        if (ctx.containsKey('id')) { ctx.json.id = ctx.remove('id'); }
        if (ctx.containsKey('timestamp')) { ctx.json.timestamp = ctx.remove('timestamp'); }
        if (ctx.containsKey('data')) { ctx.json.data = ctx.remove('data'); }

  # CEL / JSE00001: `message` is a JSON string of one GET /issues record.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: parse_json_cel
      if: ctx.json == null && ctx.event?.original != null
      description: Decode the CEL message (a JSON string of one issue object) into the working json object.

  # Common normalization (`json` is an API issue object or a webhook envelope).
  # @timestamp: webhook `timestamp`, else API `detected_at`.
  - date:
      field: json.timestamp
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_timestamp_webhook
      if: ctx.json?.timestamp != null
  - date:
      field: json.detected_at
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_timestamp_api
      if: ctx.json?.timestamp == null && ctx.json?.detected_at != null

  # event.id: webhook delivery ULID (`json.id`) or API issue id (`json.id`).
  - rename:
      field: json.id
      target_field: event.id
      tag: rename_event_id
      ignore_missing: true

  # Flag webhook deliveries so API-only processors are skipped after webhook.yml
  # renames `json.event` to `event.action`.
  - set:
      field: _tmp.is_webhook
      tag: set_is_webhook
      value: true
      if: ctx.json?.event != null

  # Webhook: field extraction in webhook.yml.
  - pipeline:
      name: '{{ IngestPipeline "webhook" }}'
      tag: dispatch_webhook
      if: ctx.json?.event != null

  # API (CEL) field extraction — skipped for webhook deliveries.
  # event.action: constant `issue` on the API path.
  - set:
      field: event.action
      tag: set_event_action_api
      value: issue
      if: ctx._tmp?.is_webhook == null && ctx.event?.action == null
  
  # set kolide.issues.id for the API path. json.id was renamed to event.id above,
  # and on the API path event.id is the Kolide issue id, so copy it from there.
  - set: 
      field: kolide.issues.id
      tag: set_kolide_issues_id
      copy_from: event.id
      if: ctx._tmp?.is_webhook == null && ctx.kolide?.issues?.id == null && ctx.event?.id != null

  # event.start = detected_at; event.end = resolved_at (when present).
  - date:
      field: json.detected_at
      target_field: event.start
      formats:
        - ISO8601
      tag: date_event_start
      if: ctx.json?.detected_at != null
  - date:
      field: json.resolved_at
      target_field: event.end
      formats:
        - ISO8601
      tag: date_event_end
      if: ctx.json?.resolved_at != null

  # Host (device) — API path.
  - rename:
      field: json.device_information.identifier
      target_field: host.id
      tag: rename_host_id_api
      ignore_missing: true
      if: ctx.host?.id == null

  # Rule (check) — API path.
  - rename:
      field: json.check_information.identifier
      target_field: rule.id
      tag: rename_rule_id_api
      ignore_missing: true
      if: ctx.rule?.id == null
  - rename:
      field: json.title
      target_field: kolide.issues.title
      tag: rename_title_api
      ignore_missing: true
      if: ctx.kolide?.issues?.title == null && ctx.json?.title instanceof String
  - set:
      field: rule.name
      tag: set_rule_name_from_title
      value: '{{{kolide.issues.title}}}'
      if: ctx.kolide?.issues?.title != null && ctx.rule?.name == null
  
  # set rule.reference from json.check_information.link for API and generate from rule.id for webhook
  - set:
      field: rule.reference
      tag: set_rule_reference
      value: '{{{json.check_information.link}}}'
      if: ctx.rule?.reference == null && ctx.json?.check_information?.link != null
  - set:
      field: rule.reference
      tag: set_rule_reference_webhook
      value: 'https://api.kolide.com/checks/{{{rule.id}}}'
      if: ctx.rule?.reference == null && ctx.json?.check_information?.link == null && ctx.rule?.id != null

  # Kolide issue fields — API path.
  - rename:
      field: json.issue_key
      target_field: kolide.issues.issue_key
      tag: rename_issue_key
      ignore_missing: true
  - rename:
      field: json.issue_value
      target_field: kolide.issues.issue_value
      tag: rename_issue_value
      ignore_missing: true
  - rename:
      field: json.value
      target_field: kolide.issues.value
      tag: rename_value
      ignore_missing: true
  - set:
      field: kolide.issues.exempted
      copy_from: json.exempted
      tag: set_exempted
      if: ctx.json?.exempted != null
  - remove:
      field: json.exempted
      tag: remove_exempted
      ignore_missing: true
  - rename:
      field: json.device_information.link
      target_field: kolide.issues.device_information.link
      tag: rename_device_location_api
      ignore_missing: true
  - rename:
      field: json.check_information.link
      target_field: kolide.issues.check_information.link
      tag: rename_check_location_api
      ignore_missing: true
  - date:
      field: json.detected_at
      target_field: kolide.issues.detected_at
      formats:
        - ISO8601
      tag: date_detected_at
      if: ctx.json?.detected_at != null
  - date:
      field: json.resolved_at
      target_field: kolide.issues.resolved_at
      formats:
        - ISO8601
      tag: date_resolved_at
      if: ctx.json?.resolved_at != null
  - date:
      field: json.blocks_device_at
      target_field: kolide.issues.blocks_device_at
      formats:
        - ISO8601
      tag: date_blocks_device_at
      if: ctx.json?.blocks_device_at != null
  - date:
      field: json.last_rechecked_at
      target_field: kolide.issues.last_rechecked_at
      formats:
        - ISO8601
      tag: date_last_rechecked_at
      if: ctx.json?.last_rechecked_at != null

  # ECS promotion from `value` (check-specific payload; API path only).
  - set:
      field: user.name
      tag: set_user_name_from_value
      copy_from: kolide.issues.value.username
      ignore_empty_value: true
      if: ctx.kolide?.issues?.value?.username instanceof String
  - set:
      field: file.path
      tag: set_file_path_from_value
      copy_from: kolide.issues.value.path
      ignore_empty_value: true
      if: ctx.kolide?.issues?.value?.path instanceof String
  - set:
      field: file.hash.md5
      tag: set_file_hash_md5_from_value
      copy_from: kolide.issues.value.md5
      ignore_empty_value: true
      if: ctx.kolide?.issues?.value?.md5 instanceof String
  - set:
      field: file.hash.sha256
      tag: set_file_hash_sha256_from_value
      copy_from: kolide.issues.value.fingerprint_sha256
      ignore_empty_value: true
      if: ctx.kolide?.issues?.value?.fingerprint_sha256 instanceof String

  # host.hostname from host.name (set by API or webhook path).
  - set:
      field: host.hostname
      tag: set_host_hostname
      copy_from: host.name
      if: ctx.host?.name != null

  # message from kolide.issues.title (either path).
  - set:
      field: message
      tag: set_message_from_title
      copy_from: kolide.issues.title
      if: ctx.kolide?.issues?.title != null

  # event.outcome: a detected issue is a failure; a resolved issue is a success.
  # Resolved is signalled by resolved_at (API path) or the issues.resolved action
  # (webhook path); everything else is an open/failing issue.
  - set:
      field: event.outcome
      tag: set_event_outcome_success
      value: success
      if: ctx.kolide?.issues?.resolved_at != null || ctx.event?.action == 'issues.resolved'
  - set:
      field: event.outcome
      tag: set_event_outcome_failure
      value: failure
      if: ctx.event?.outcome == null

  # rule.category from kolide.issues.check.tags (webhook path).
  - set:
      field: rule.category
      tag: set_rule_category
      copy_from: kolide.issues.check.tags
      ignore_empty_value: true
      if: ctx.kolide?.issues?.check?.tags instanceof List

  # related.* enrichment.
  - append:
      field: related.hosts
      tag: append_related_hosts
      value: '{{{host.name}}}'
      allow_duplicates: false
      if: ctx.host?.name != null
  - append:
      field: related.user
      tag: append_related_user_from_value
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null

  # Check-type-specific promotions (extended-mappings.yml).
  - pipeline:
      name: '{{ IngestPipeline "extended-mappings" }}'
      tag: extended_mappings
      ignore_missing_pipeline: true

  # ECS categorization (kind/category/type) from the resolved event.action and
  # issue lifecycle fields.
  - pipeline:
      name: '{{ IngestPipeline "categorize" }}'
      tag: categorize
      ignore_missing_pipeline: true

  # Deduplication: CEL cursor uses an inclusive detected_at boundary, so the last
  # record may be re-collected. Fingerprint event.id to _id so polls upsert state.
  - fingerprint:
      fields:
        - event.id
      target_field: _id
      method: SHA-256
      tag: fingerprint_event_id
      if: ctx.event?.id != null && ctx.event.id != ''

  # Cleanup.
  - remove:
      field:
        - json
        - data
        - _tmp
      tag: remove_temp_fields
      ignore_missing: true
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - script:
      description: Drops null/empty values recursively.
      tag: script_to_drop_null_values
      lang: painless
      source: |-
        boolean drop(Object object) {
          if (object == null || object == '') {
            return true;
          } else if (object instanceof Map) {
            ((Map) object).values().removeIf(v -> drop(v));
            return (((Map) object).size() == 0);
          } else if (object instanceof List) {
            ((List) object).removeIf(v -> drop(v));
            return (((List) object).length == 0);
          }
          return false;
        }
        drop(ctx);

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
