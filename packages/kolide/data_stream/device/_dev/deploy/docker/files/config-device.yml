rules:
  # Page 2: follows pagination.next (cursor=CURSORPAGE2). Listed before the page-1
  # catch-all so the cursored request matches this rule first.
  - path: /devices
    methods: ['GET']
    query_params:
      per_page: '{per_page:.*}'
      cursor: 'CURSORPAGE2'
    request_headers:
      Authorization:
        - 'Bearer k2sk_v1_exampleexampleexample'
      X-Kolide-Api-Version:
        - '2026-04-07'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {
            "data": [
              {
                "id": "2",
                "name": "Bobs-ThinkPad",
                "registered_at": "2023-11-02T09:05:00Z",
                "last_authenticated_at": "2024-03-12T08:15:42Z",
                "last_seen_at": "2024-03-12T08:20:00Z",
                "registered_owner_info": {"identifier": "2", "link": "https://api.example.com/people/2"},
                "operating_system": "Ubuntu 22.04",
                "hardware_model": "ThinkPad X1 Carbon",
                "serial": "PF0EXAMPLE456",
                "hardware_uuid": "11111111-1111-1111-1111-111111111111",
                "note": "",
                "auth_state": "Blocked",
                "will_block_at": "2024-03-15T00:00:00Z",
                "product_image_url": "https://example.com/images/thinkpad.png",
                "device_type": "Linux",
                "form_factor": "Computer",
                "auth_configuration": {"device_id": "2", "authentication_mode": "any_registered_person", "person_groups": []}
              }
            ],
            "pagination": {
              "next": "http://{{ hostname }}:{{ env "PORT" }}/devices?per_page={{ .request.vars.per_page }}&cursor=CURSORPAGE3",
              "current_cursor": "CURSORPAGE2",
              "next_cursor": "CURSORPAGE3",
              "count": 1
            }
          }
  # Page 3 (terminal): cursor=CURSORPAGE3, empty next/next_cursor stops pagination.
  - path: /devices
    methods: ['GET']
    query_params:
      per_page: '{per_page:.*}'
      cursor: 'CURSORPAGE3'
    request_headers:
      Authorization:
        - 'Bearer k2sk_v1_exampleexampleexample'
      X-Kolide-Api-Version:
        - '2026-04-07'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {
            "data": [
              {
                "id": "3",
                "name": "Carols-Surface",
                "registered_at": "2023-11-10T14:22:30Z",
                "last_authenticated_at": "2024-03-13T11:42:09Z",
                "last_seen_at": "2024-03-13T12:00:00Z",
                "registered_owner_info": {"identifier": "3", "link": "https://api.example.com/people/3"},
                "operating_system": "Windows 11",
                "hardware_model": "Surface Laptop 5",
                "serial": "00EXAMPLE789",
                "hardware_uuid": "22222222-2222-2222-2222-222222222222",
                "note": "Field device",
                "auth_state": "Good",
                "will_block_at": null,
                "product_image_url": "https://example.com/images/surface.png",
                "device_type": "Windows",
                "form_factor": "Computer",
                "auth_configuration": {"device_id": "3", "authentication_mode": "only_registered_owner", "person_groups": []}
              }
            ],
            "pagination": {
              "next": "",
              "current_cursor": "CURSORPAGE3",
              "next_cursor": "",
              "count": 1
            }
          }
  # Page 1: every poll starts here (per_page only, no cursor) because the
  # full-snapshot program re-collects the whole inventory each interval. Returns
  # one device and a next-page cursor. Re-collected devices share content-based
  # _ids, so repeated rounds overwrite rather than duplicate.
  - path: /devices
    methods: ['GET']
    query_params:
      per_page: '{per_page:.*}'
    request_headers:
      Authorization:
        - 'Bearer k2sk_v1_exampleexampleexample'
      X-Kolide-Api-Version:
        - '2026-04-07'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {
            "data": [
              {
                "id": "1",
                "name": "Alices-MacBook-Pro",
                "registered_at": "2023-10-28T20:12:14Z",
                "last_authenticated_at": "2024-03-11T21:28:17Z",
                "last_seen_at": "2024-03-11T21:30:00Z",
                "registered_owner_info": {"identifier": "1", "link": "https://api.example.com/people/1"},
                "operating_system": "macOS 14.4.1",
                "hardware_model": "MacBookPro18,1",
                "serial": "C02EXAMPLE123",
                "hardware_uuid": "00000000-0000-0000-0000-000000000000",
                "note": "Loaner device",
                "auth_state": "Good",
                "will_block_at": null,
                "product_image_url": "https://example.com/images/macbookpro.png",
                "device_type": "Mac",
                "form_factor": "Computer",
                "auth_configuration": {"device_id": "1", "authentication_mode": "only_registered_owner", "person_groups": []}
              }
            ],
            "pagination": {
              "next": "http://{{ hostname }}:{{ env "PORT" }}/devices?per_page={{ .request.vars.per_page }}&cursor=CURSORPAGE2",
              "current_cursor": "",
              "next_cursor": "CURSORPAGE2",
              "count": 1
            }
          }
