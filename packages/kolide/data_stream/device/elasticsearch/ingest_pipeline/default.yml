---
description: >-
  Ingest pipeline for Kolide device inventory records from GET /devices (CEL) and
  device lifecycle webhook deliveries. Webhook-specific extraction is delegated to
  webhook.yml.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'

  # --- CEL input only (Agentless metadata + collector error placeholders) ---
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  # --- end CEL-only ---

  # Webhook path: envelope fields arrive at document root. The string `event` key
  # would collide with the ECS event object, so move the envelope into json first.
  - rename:
      field: event
      tag: rename_webhook_event_envelope
      target_field: json.event
      ignore_missing: true
      if: ctx.event instanceof String
      description: Move the webhook envelope `event` (a string) out of the way of the ECS `event` object.
  - script:
      lang: painless
      tag: move_webhook_envelope_to_json
      if: ctx.json?.event != null && ctx.data != null
      description: Move the remaining webhook envelope fields into the working json object. event.original is set by the input when preserve_original_event is enabled.
      source: |-
        if (ctx.containsKey('id')) { ctx.json.id = ctx.remove('id'); }
        if (ctx.containsKey('timestamp')) { ctx.json.timestamp = ctx.remove('timestamp'); }
        if (ctx.containsKey('data')) { ctx.json.data = ctx.remove('data'); }

  # --- CEL path: message holds the JSON of one device object from GET /devices. ---
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: parse_json_cel
      if: ctx.json == null && ctx.event?.original != null
      description: Decode the CEL message (a JSON string of one device object) into the working json object.

  # --- @timestamp ---
  # Webhook: use envelope timestamp. API inventory snapshot: no per-record
  # modified-at field exists, so use ingest time. Device activity timestamps
  # (registered_at, last_seen_at, etc.) are mapped to kolide.device.*.
  - date:
      field: json.timestamp
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_timestamp_webhook
      if: ctx.json?.timestamp != null
  - set:
      field: '@timestamp'
      copy_from: _ingest.timestamp
      tag: set_timestamp_api_ingest
      if: ctx.json?.timestamp == null

  # --- event.start from registered_at when present. ---
  - date:
      field: json.registered_at
      target_field: event.start
      formats:
        - ISO8601
      tag: date_event_start
      if: ctx.json?.registered_at != null

  # --- Webhook: delegate field extraction to webhook.yml. ---
  - pipeline:
      name: '{{ IngestPipeline "webhook" }}'
      tag: dispatch_webhook
      if: ctx.json?.event != null

  # --- API (CEL) field extraction. Skipped when json.event is set (webhook). ---
  # event.action: `device` for the API inventory snapshot path.
  - set:
      field: event.action
      tag: set_event_action_api
      value: device
      if: ctx.json?.event == null

  # --- Host (device) (API) ---
  - rename:
      field: json.name
      target_field: host.name
      tag: rename_host_name_api
      ignore_missing: true
      if: ctx.host?.name == null
  - convert:
      field: json.id
      target_field: host.id
      type: string
      tag: convert_host_id_api
      ignore_missing: true
      if: ctx.host?.id == null

  # --- Host OS (API). operating_system -> host.os.full; device_type -> host.os.platform. ---
  - rename:
      field: json.operating_system
      target_field: host.os.full
      tag: rename_host_os_full
      ignore_missing: true
  - grok:
      field: host.os.full
      patterns:
        - '^%{DATA:host.os.name} %{NOTSPACE:host.os.version}$'
      tag: grok_host_os_split
      ignore_missing: true
      ignore_failure: true
      if: ctx.host?.os?.full != null
  - set:
      field: host.os.platform
      tag: set_host_os_platform
      copy_from: json.device_type
      if: ctx.json?.device_type != null

  # --- host.type from form_factor (phone/tablet/computer). ---
  - set:
      field: host.type
      tag: set_host_type_mobile
      value: mobile
      if: ctx.json?.form_factor == 'phone'
  - set:
      field: host.type
      tag: set_host_type_tablet
      value: tablet
      if: ctx.json?.form_factor == 'tablet'
  - set:
      field: host.type
      tag: set_host_type_desktop
      value: desktop
      if: ctx.json?.form_factor != null && ctx.json.form_factor.equalsIgnoreCase('Computer')

  # --- Owner (registered_owner_info) (API) ---
  - convert:
      field: json.registered_owner_info.identifier
      target_field: user.id
      type: string
      tag: convert_user_id_api
      ignore_missing: true
      if: ctx.user?.id == null

  # --- Kolide custom device fields (API) ---
  - set:
      field: kolide.device.type
      tag: set_kolide_device_type
      copy_from: json.device_type
      if: ctx.json?.device_type != null
  - remove:
      field: json.device_type
      tag: remove_json_device_type
      ignore_missing: true
  - rename:
      field: json.serial
      target_field: kolide.device.serial
      tag: rename_kolide_serial
      ignore_missing: true
      if: ctx.json?.serial != null
  - rename:
      field: json.hardware_uuid
      target_field: kolide.device.hardware_uuid
      tag: rename_kolide_hardware_uuid
      ignore_missing: true
      if: ctx.json?.hardware_uuid != null
  - rename:
      field: json.hardware_model
      target_field: kolide.device.hardware_model
      tag: rename_kolide_hardware_model
      ignore_missing: true
  - rename:
      field: json.note
      target_field: kolide.device.note
      tag: rename_kolide_note
      ignore_missing: true
      if: ctx.json?.note != null
  - rename:
      field: json.form_factor
      target_field: kolide.device.form_factor
      tag: rename_kolide_form_factor
      ignore_missing: true
  - rename:
      field: json.product_image_url
      target_field: kolide.device.product_image_url
      tag: rename_kolide_product_image_url
      ignore_missing: true
  - rename:
      field: json.auth_state
      target_field: kolide.device.auth_state
      tag: rename_kolide_auth_state
      ignore_missing: true

  # --- Kolide device timestamps (API) ---
  - date:
      field: json.registered_at
      target_field: kolide.device.registered_at
      formats:
        - ISO8601
      tag: date_kolide_registered_at
      if: ctx.json?.registered_at != null
  - date:
      field: json.last_authenticated_at
      target_field: kolide.device.last_authenticated_at
      formats:
        - ISO8601
      tag: date_kolide_last_authenticated_at
      if: ctx.json?.last_authenticated_at != null
  - date:
      field: json.last_seen_at
      target_field: kolide.device.last_seen_at
      formats:
        - ISO8601
      tag: date_kolide_last_seen_at
      if: ctx.json?.last_seen_at != null
  - date:
      field: json.will_block_at
      target_field: kolide.device.will_block_at
      formats:
        - ISO8601
      tag: date_kolide_will_block_at
      if: ctx.json?.will_block_at != null

  # registered_owner_info (API) -> kolide.device group.
  - rename:
      field: json.registered_owner_info.identifier
      target_field: kolide.device.registered_owner_info.identifier
      tag: rename_kolide_owner_identifier
      ignore_missing: true
  - rename:
      field: json.registered_owner_info.link
      target_field: kolide.device.registered_owner_info.location
      tag: rename_kolide_owner_location
      ignore_missing: true
      if: ctx.json?.registered_owner_info?.link != null

  # auth_configuration (API) -> kolide.device group; person_groups flattened.
  - rename:
      field: json.auth_configuration.device_id
      target_field: kolide.device.auth_configuration.device_id
      tag: rename_kolide_auth_config_device_id
      ignore_missing: true
  - rename:
      field: json.auth_configuration.authentication_mode
      target_field: kolide.device.auth_configuration.authentication_mode
      tag: rename_kolide_auth_config_mode
      ignore_missing: true
  - rename:
      field: json.auth_configuration.person_groups
      target_field: kolide.device.auth_configuration.person_groups
      tag: rename_kolide_auth_config_person_groups
      ignore_missing: true

  # --- Common: host.hostname derived from host.name set by either path. ---
  - set:
      field: host.hostname
      tag: set_host_hostname
      copy_from: host.name
      if: ctx.host?.name != null

  # --- Normalized status: lowercase device_status (webhook) or auth_state (API). ---
  - set:
      field: kolide.device.status
      tag: set_status_from_device_status
      copy_from: kolide.device.device_status
      if: ctx.kolide?.device?.device_status != null
  - set:
      field: kolide.device.status
      tag: set_status_from_auth_state
      copy_from: kolide.device.auth_state
      if: ctx.kolide?.device?.status == null && ctx.kolide?.device?.auth_state != null
  - lowercase:
      field: kolide.device.status
      tag: lowercase_status
      ignore_missing: true

  # --- related.* enrichment ---
  - append:
      field: related.hosts
      tag: append_related_hosts
      value: '{{{host.name}}}'
      allow_duplicates: false
      if: ctx.host?.name != null
  - append:
      field: related.user
      tag: append_related_user_email
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_related_user_name
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null

  # --- Extended field extraction from message/description ---
  - pipeline:
      name: '{{ IngestPipeline "extended-mappings" }}'
      tag: extended_mappings
      ignore_missing_pipeline: true

  # --- ECS categorization from the resolved event.action ---
  - pipeline:
      name: '{{ IngestPipeline "categorize" }}'
      tag: categorize
      ignore_missing_pipeline: true

  # --- Deduplication ---
  # API: full-inventory re-poll with no modified-since cursor. Fingerprint the full
  # raw record (event.original) minus last_seen_at, which is a heartbeat that advances
  # on every poll and would otherwise defeat dedup. Re-parse event.original into a temp
  # object so every other field is included automatically (new API fields too); only
  # last_seen_at is dropped.
  - json:
      field: event.original
      target_field: _tmp.fingerprint_source
      tag: parse_fingerprint_source
      if: ctx.event?.original != null && ctx.event.original != '' && ctx.json?.event == null
  - remove:
      field: _tmp.fingerprint_source.last_seen_at
      tag: remove_last_seen_at_from_fingerprint
      ignore_missing: true
      if: ctx._tmp?.fingerprint_source != null
  - fingerprint:
      fields:
        - _tmp.fingerprint_source
      target_field: _id
      method: SHA-256
      tag: fingerprint_event_original_no_last_seen
      if: ctx._tmp?.fingerprint_source != null

  # --- Cleanup ---
  - remove:
      field:
        - json
        - data
        - _tmp
      tag: remove_temp_fields
      ignore_missing: true
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - script:
      description: Drops null/empty values recursively.
      tag: script_to_drop_null_values
      lang: painless
      source: |-
        boolean drop(Object object) {
          if (object == null || object == '') {
            return true;
          } else if (object instanceof Map) {
            ((Map) object).values().removeIf(v -> drop(v));
            return (((Map) object).size() == 0);
          } else if (object instanceof List) {
            ((List) object).removeIf(v -> drop(v));
            return (((List) object).length == 0);
          }
          return false;
        }
        drop(ctx);

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
