type: logs
title: Auditd logs
streams:
  - input: logfile
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/audit/audit.log*
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - auditd-log
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        multi: false
        default: false
      - name: use_filebeat_parser
        type: bool
        title: Use Filebeat auditd parser (experimental)
        description: >
          When enabled, Filebeat parses each audit.log line using go-libaudit before
          sending to Elasticsearch, populating auditd.log.* fields on the agent and
          skipping the ingest pipeline grok/KV stages. Defaults to false (ingest
          pipeline parsing) while this feature is being validated. Will become the
          default in a future release and the ingest pipeline path will eventually
          be removed.
        multi: false
        required: true
        show_user: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

    template_path: log.yml.hbs
    title: Auditd logs
    description: Collect Auditd logs using log input
