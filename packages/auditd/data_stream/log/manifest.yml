type: logs
title: Auditd logs
streams:
  - input: logfile
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/audit/audit.log*
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - auditd-log
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        multi: false
        default: false
      - name: use_auditd_parser
        type: bool
        title: Use auditd parser (experimental)
        description: >
          When enabled on supported Elastic Agent versions, the integration parses each audit.log line as an auditd log before sending to Elasticsearch. This populates auditd.log.* fields on the agent and skips the ingest pipeline raw parsing stages. Defaults to false while this experimental feature is being validated.

        multi: false
        required: true
        show_user: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

    template_path: log.yml.hbs
    title: Auditd logs
    description: Collect Auditd logs using log input
