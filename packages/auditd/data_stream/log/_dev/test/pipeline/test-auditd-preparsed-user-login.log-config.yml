# Simulates the pre-parsed document produced by the auditd filestream parser.
# Fields are as auparse.ParseLogLine() + Data() would populate them. Note:
# auparse converts res=success to result="success", so auditd.log.res is absent.
fields:
  "@timestamp": "2017-03-16T04:02:40.072Z"
  tags:
    - preserve_original_event
  auditd:
    log:
      record_type: "USER_LOGIN"
      sequence: "19623791"
      pid: "28281"
      uid: "0"
      auid: "700"
      ses: "6793"
      op: "login"
      acct: "root"
      exe: "/usr/sbin/sshd"
      hostname: "1.2.3.4"
      addr: "127.0.0.1"
      terminal: "sshd"
      result: "success"
