# Simulates the pre-parsed document produced by the auditd filestream parser.
# Fields are as auparse.ParseLogLine() + Data() would populate them:
# arch/syscall resolved to names, sequence as string.
# @timestamp is injected because the pipeline's date processor is guarded and
# will not fire when auditd.log.record_type is already present.
fields:
  "@timestamp": "2017-01-31T20:17:14.891Z"
  tags:
    - preserve_original_event
  auditd:
    log:
      record_type: "SYSCALL"
      sequence: "18877199"
      arch: "x86_64"
      syscall: "execve"
      success: "yes"
      exit: "0"
      a0: "7f095d0a4b88"
      ppid: "1234"
      pid: "5678"
      auid: "1000"
      uid: "0"
      gid: "0"
      comm: "ls"
      exe: "/bin/ls"
