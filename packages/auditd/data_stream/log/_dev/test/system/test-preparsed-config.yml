skip:
  reason: "Requires Elastic Agent >= 9.5.0 with the go-libaudit auditd filestream parser (beats#50791). CI runs the package's minimum supported stack, which has neither the parser nor the Fleet semverSatisfies helper (needs Kibana >= 9.4). Un-skip once the test matrix can boot a >= 9.5 stack."
  link: https://github.com/elastic/beats/pull/50791
data_stream:
  vars:
    use_auditd_parser: true
    paths:
      - "{{SERVICE_LOGS_DIR}}/audit.log"
      - "{{SERVICE_LOGS_DIR}}/audit-cent7-node.log"
      - "{{SERVICE_LOGS_DIR}}/audit-rhel6.log"
      - "{{SERVICE_LOGS_DIR}}/audit-ubuntu1604.log"
      - "{{SERVICE_LOGS_DIR}}/auditd-useradd.log"
      - "{{SERVICE_LOGS_DIR}}/avc.log"
      - "{{SERVICE_LOGS_DIR}}/execve.log"
      - "{{SERVICE_LOGS_DIR}}/rare.log"
      - "{{SERVICE_LOGS_DIR}}/sample.log"
      - "{{SERVICE_LOGS_DIR}}/test.log"
      - "{{SERVICE_LOGS_DIR}}/useradd.log"
