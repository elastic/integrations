# The BeyondTrust EPM API uses dot-notation query parameter keys (e.g.
# "Pagination.PageSize", "Sorts[0].order").  The stream mock server parses its
# config with ucfg.PathSep("."), which interprets dots as nested-path separators,
# so these keys cannot be used in query_params matching rules.
#
# To exercise pagination despite this, the Details rule omits query_params and
# instead uses response cycling: the stream server rotates through the responses
# list on successive requests to the same path (response index = request_count %
# len(responses)).  Page 1 returns pageCount > pageNumber, causing the CEL
# program to set want_more=true and request the next page.  Page 2 returns
# pageNumber == pageCount, ending pagination.
rules:
  - path: /oauth/connect/token
    methods: ['POST']
    query_params:
      grant_type: client_credentials
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |
          {"access_token":"xxxx","expires_in":600,"token_type":"Bearer", "scope":"urn:management:api"}
  - path: /management-api/v3/ActivityAudits/Details
    methods: ['GET']
