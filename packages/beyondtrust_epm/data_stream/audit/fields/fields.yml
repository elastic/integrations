          type: group
          fields:
            - name: new_adapter_version
              type: keyword
              description: Adapter version installed in the computer.
            - name: new_agent_id
              type: keyword
              description: Guid to store the new Agent Id assigned to the computer.
            - name: new_computer_group_id
              type: keyword
              description: The computer group Id that the agent is going to be assigned to.
            - name: new_computer_group_name
              type: keyword
              description: The computer group name that the agent is going to be assigned to.
            - name: new_host_type
              type: keyword
              description: The host type detected for the agent.
            - name: new_os_name
              type: keyword
              description: Os Name assigned detected by the adapter.
            - name: new_timestamp
              type: date
              description: TimeStamp of the audit event.
            - name: old_adapter_version
              type: keyword
              description: Present adapter version, in case of updating, this value can reflect the last adapter version used.
            - name: old_agent_id
              type: keyword
              description: Guid to store the old Agent Id if there is a change in Agent Id.
            - name: old_computer_group_id
              type: keyword
              description: The computer group Id that the agent was assigned to.
            - name: old_computer_group_name
              type: keyword
              description: The computer group name that the agent was assigned to.
            - name: old_host_type
              type: keyword
              description: The present Host type found by the adapter.
            - name: old_os_name
              type: keyword
              description: The present Os Name detected by the adapter.
            - name: old_timestamp
              type: date
              description: TimeStamp of a previous audit event.
