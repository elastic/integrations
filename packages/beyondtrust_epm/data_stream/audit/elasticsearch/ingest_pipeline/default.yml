  # rename to snake case
  - script:
      description: >
        Convert field names from camelCase to snake_case recursively.
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      source: |-
        String camelToSnake(String str) {
          StringBuilder result = new StringBuilder();
          for (int i = 0; i < str.length(); i++) {
            char c = str.charAt(i);
            if (Character.isUpperCase(c)) {
              if (i > 0) {
                char prev = str.charAt(i - 1);
                boolean nextIsLower = (i + 1 < str.length()) && Character.isLowerCase(str.charAt(i + 1));
                boolean prevIsDigit = Character.isDigit(prev);
                if (Character.isLowerCase(prev) || prevIsDigit || (Character.isUpperCase(prev) && nextIsLower)) {
                  result.append('_');
                }
              }
              result.append(Character.toLowerCase(c));
            } else {
              result.append(c);
            }
          }
          return result.toString();
        }
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              String newKey = camelToSnake(entry.getKey());
              newObj[newKey] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }
        ctx.beyondtrust_epm = ctx.beyondtrust_epm ?: [:];
        if (ctx.beyondtrust_epm?.audit != null) {
          ctx.beyondtrust_epm.audit = convertToSnakeCase(ctx.beyondtrust_epm.audit);
        }
