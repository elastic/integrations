---
description: Pipeline for processing audit logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - remove:
      field:
        - organization
        - division
        - team
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      ignore_missing: true
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
  - rename:
      field: message
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
  - remove:
      field:
        - message
      tag: remove_message
      if: ctx.event?.original != null
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
  - json:
      field: event.original
      tag: json_event_original
      target_field: beyondtrust_epm.audit
  - fingerprint:
      tag: fingerprint_with_id
      fields:
        - beyondtrust_epm.audit.id
      target_field: _id
      ignore_missing: true
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.type
      tag: append_change_into_event_type
      value: change
  - append:
      field: event.category
      tag: append_change_into_event_type
      value: configuration
  - date:
      field: beyondtrust_epm.audit.agentDataAuditing.newTimestamp
      tag: date_agentDataAuditing_newTimestamp
      if: ctx.beyondtrust_epm?.audit?.agentDataAuditing?.newTimestamp != null && ctx.beyondtrust_epm.audit.agentDataAuditing.newTimestamp != ''
      target_field: beyondtrust_epm.audit.agentDataAuditing.newTimestamp
      formats:
        - ISO8601
      on_failure:
        - remove:
            field: beyondtrust_epm.audit.agentDataAuditing.newTimestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: beyondtrust_epm.audit.agentDataAuditing.oldTimestamp
      tag: date_agentDataAuditing_oldTimestamp
      if: ctx.beyondtrust_epm?.audit?.agentDataAuditing?.oldTimestamp != null && ctx.beyondtrust_epm.audit.agentDataAuditing.oldTimestamp != ''
