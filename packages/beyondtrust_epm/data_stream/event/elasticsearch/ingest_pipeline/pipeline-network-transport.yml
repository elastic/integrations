  - convert:
      field: beyondtrust_epm.event.client.geo.location.lat
      tag: convert_client_geo_location_lat_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            field: beyondtrust_epm.event.client.geo.location.lat
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: beyondtrust_epm.event.client.geo.location.lon
      tag: convert_client_geo_location_lon_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            field: beyondtrust_epm.event.client.geo.location.lon
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: set_client_geo_location_from_lat_lon
      lang: painless
      description: Combine lat/lon into geo_point.
      if: >-
        ctx.beyondtrust_epm?.event?.client?.geo?.location?.lat != null
        && ctx.beyondtrust_epm?.event?.client?.geo?.location?.lon != null
      source: |-
        def location = new HashMap();
        location.put('lat', ctx.beyondtrust_epm.event.client.geo.location.lat);
        location.put('lon', ctx.beyondtrust_epm.event.client.geo.location.lon);
        ctx.beyondtrust_epm.event.client.geo.location = location;
  - set:
      field: client.geo.location
      tag: set_client_geo_location_from_event
      copy_from: beyondtrust_epm.event.client.geo.location
      ignore_empty_value: true
  - set:
      field: client.geo.name
      tag: set_client_geo_name_from_event_client_geo_name
      copy_from: beyondtrust_epm.event.client.geo.name
      ignore_empty_value: true
  - set:
      field: client.geo.postal_code
