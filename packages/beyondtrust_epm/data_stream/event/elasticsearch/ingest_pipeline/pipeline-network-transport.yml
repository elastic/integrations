  - set:
      field: client.ip
      tag: set_client_ip_from_event_client_ip
      copy_from: beyondtrust_epm.event.client.ip
      ignore_empty_value: true
  - append:
      field: related.ip
      tag: append_event_client_ip_into_related_ip
      if: ctx.beyondtrust_epm?.event?.client?.ip != null
      value: '{{{beyondtrust_epm.event.client.ip}}}'
      allow_duplicates: false
  - gsub:
      field: beyondtrust_epm.event.client.mac
      pattern: '[:.]'
      replacement: '-'
      tag: gsub_client_mac
      ignore_missing: true
  - uppercase:
      field: beyondtrust_epm.event.client.mac
      tag: uppercase_client_mac
      ignore_missing: true
  - set:
