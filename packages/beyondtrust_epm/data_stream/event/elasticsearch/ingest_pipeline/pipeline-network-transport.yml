---
description: Pipeline for processing network and transport fields (client, server, source, destination, network, url, dns, http, tls).
processors:
  - set:
      field: client.address
      tag: set_client_address_from_event_client_address
      copy_from: beyondtrust_epm.event.client.address
      ignore_empty_value: true
  - convert:
      field: beyondtrust_epm.event.client.as.number
      tag: convert_client_as_number_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: beyondtrust_epm.event.client.as.number
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: client.as.number
      tag: set_client_as_number_from_event_client_as_number
      copy_from: beyondtrust_epm.event.client.as.number
      ignore_empty_value: true
  - set:
      field: client.as.organization.name
      tag: set_client_as_organization_name_from_event_client_as_organization_name
      copy_from: beyondtrust_epm.event.client.as.organization.name
      ignore_empty_value: true
  - convert:
      field: beyondtrust_epm.event.client.bytes
      tag: convert_client_bytes_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: beyondtrust_epm.event.client.bytes
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: client.bytes
      tag: set_client_bytes_from_event_client_bytes
      copy_from: beyondtrust_epm.event.client.bytes
      ignore_empty_value: true
  - set:
      field: client.domain
      tag: set_client_domain_from_event_client_domain
      copy_from: beyondtrust_epm.event.client.domain
      ignore_empty_value: true
  - convert:
      field: beyondtrust_epm.event.client.geo.TimezoneOffset
      tag: convert_client_geo_TimezoneOffset_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: beyondtrust_epm.event.client.geo.TimezoneOffset
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
