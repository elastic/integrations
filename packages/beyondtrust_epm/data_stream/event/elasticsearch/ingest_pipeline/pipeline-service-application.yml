  # Seed @timestamp from the event receipt time (ReceivedAt). override:false keeps
  # any value already present on the document. The metadata-observability pipeline
  # later sets @timestamp from the event occurrence time with override enabled, so
  # occurrence time takes precedence over receipt time when both are present.
