  - set:
      field: event.reason
      tag: set_event_reason_from_event_EPMWinMac_Configuration_Message_UserReason
      copy_from: beyondtrust_epm.event.EPMWinMac.Configuration.Message.UserReason
      ignore_empty_value: true
  - set:
      field: event.action
      tag: set_event_action_from_event_EPMWinMac_Event_Action
      copy_from: beyondtrust_epm.event.EPMWinMac.Event.Action
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - set:
      field: event.code
      tag: set_event_code_from_event_EPMWinMac_Event_Type
      copy_from: beyondtrust_epm.event.EPMWinMac.Event.Type
