      copy_from: beyondtrust_epm.event.error.type
      ignore_empty_value: true
  - date:
      field: beyondtrust_epm.event.event.ReceivedAt
      tag: date_event_ReceivedAt
      if: ctx.beyondtrust_epm?.event?.event?.ReceivedAt != null && ctx.beyondtrust_epm.event.event.ReceivedAt != ''
      target_field: beyondtrust_epm.event.event.ReceivedAt
      formats:
        - ISO8601
      on_failure:
        - remove:
            field: beyondtrust_epm.event.event.ReceivedAt
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: event.action
      tag: append_beyondtrust_epm_event_event_action_into_event_action
      if: ctx.beyondtrust_epm?.event?.event?.action != null
      value: '{{{beyondtrust_epm.event.event.action}}}'
      allow_duplicates: false
  - set:
      field: event.agent_id_status
