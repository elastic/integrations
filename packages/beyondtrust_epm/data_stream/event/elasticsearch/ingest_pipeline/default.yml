---
description: Pipeline for processing event logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - remove:
      field:
        - organization
        - division
        - team
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      ignore_missing: true
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
  - rename:
      field: message
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
  - remove:
      field: message
      tag: remove_message
      if: ctx.event?.original != null
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
  - json:
      field: event.original
      tag: json_event_original
      target_field: beyondtrust_epm.event
  - set:
      field: observer.vendor
      tag: set_observer_vendor
      value: BeyondTrust
  - set:
      field: observer.product
      tag: set_observer_product
      value: Endpoint Privilege Management
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_change_into_event_category
      value: ['email', 'file', 'host', 'process', 'threat', 'vulnerability']
  - date:
      field: beyondtrust_epm.event.@timestamp
      tag: date_@timestamp
      if: ctx.beyondtrust_epm?.event != null && ctx.beyondtrust_epm.event['@timestamp'] != null && ctx.beyondtrust_epm.event['@timestamp'] != ''
      target_field: beyondtrust_epm.event.timestamp
      formats:
        - ISO8601
      on_failure:
        - remove:
            field: beyondtrust_epm.event.@timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: beyondtrust_epm.event.threat.indicator.file.owner
      tag: rename_threat_indicator_file_owner
      target_field: beyondtrust_epm.event.threat.indicator.file.owner_keyword
      if: ctx.beyondtrust_epm?.event?.threat?.indicator?.file?.owner instanceof String
  - set:
      field: threat.indicator.file.owner
      tag: set_beyondtrust_epm_event_threat_indicator_file_owner
      value: '{{{beyondtrust_epm.event.threat.indicator.file.owner_keyword}}}'
      ignore_empty_value: true
  - rename:
      field: beyondtrust_epm.event.process.HostedFile.owner
      tag: rename_process_hosted_file_owner
      target_field: beyondtrust_epm.event.process.hosted_file.owner_keyword
      if: ctx.beyondtrust_epm?.event?.process?.HostedFile?.owner instanceof String
  - rename:
      field: beyondtrust_epm.event.file.owner
      tag: rename_file_owner
      target_field: beyondtrust_epm.event.file.owner_keyword
      if: ctx.beyondtrust_epm?.event?.file?.owner instanceof String
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_event_timestamp
      copy_from: beyondtrust_epm.event.timestamp
      ignore_empty_value: true
  - convert:
      field: beyondtrust_epm.event.EPMWinMac.AuthorizationRequest.ControlAuthorization
      tag: convert_EPMWinMac_AuthorizationRequest_ControlAuthorization_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: beyondtrust_epm.event.EPMWinMac.AuthorizationRequest.ControlAuthorization
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.user
      tag: append_event_EPMWinMac_AuthorizingUser_Identifier_into_related_user
      if: ctx.beyondtrust_epm?.event?.EPMWinMac?.AuthorizingUser?.Identifier != null
      value: '{{{beyondtrust_epm.event.EPMWinMac.AuthorizingUser.Identifier}}}'
      allow_duplicates: false
  - append:
      field: related.user
