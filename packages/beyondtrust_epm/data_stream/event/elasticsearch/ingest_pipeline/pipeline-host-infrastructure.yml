      field: beyondtrust_epm.event.container.image.tag
      tag: foreach_container_image_tag
      if: ctx.beyondtrust_epm?.event?.container?.image?.tag instanceof List
      processor:
        append:
          field: container.image.tag
          tag: append_container_image_tag_into_container_image_tag
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
