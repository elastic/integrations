      if: >-
        ctx.beyondtrust_epm?.event?.host?.geo?.location?.lat != null
        && ctx.beyondtrust_epm?.event?.host?.geo?.location?.lon != null
      source: |-
        def location = new HashMap();
        location.put('lat', ctx.beyondtrust_epm.event.host.geo.location.lat);
        location.put('lon', ctx.beyondtrust_epm.event.host.geo.location.lon);
        ctx.beyondtrust_epm.event.host.geo.location = location;
