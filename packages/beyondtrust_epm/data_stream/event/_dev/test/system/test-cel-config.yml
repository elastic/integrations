deployer: docker
input: cel
service: beyondtrust_epm
vars:
  url: http://{{Hostname}}:{{Port}}
  client_id: xxxx
  client_secret: xxxx
data_stream:
  vars:
    interval: 24h
    initial_interval: 24h
    page_size: 2
    operating_system: Windows
    preserve_original_event: true
    preserve_duplicate_custom_fields: true
assert:
  hit_count: 2
