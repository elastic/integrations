- name: proxmox
  type: group
  fields:
    - name: cluster
      type: group
      fields:
        - name: name
          type: keyword
          description: Proxmox cluster name.
    - name: node
      type: group
      fields:
        - name: cpu
          type: double
          metric_type: gauge
          description: CPU usage ratio (0.0 to 1.0).
        - name: wait
          type: double
          metric_type: gauge
          description: IO wait ratio.
        - name: loadavg
          type: group
          fields:
            - name: 1m
              type: double
              metric_type: gauge
              description: 1-minute load average.
            - name: 5m
              type: double
              metric_type: gauge
              description: 5-minute load average.
            - name: 15m
              type: double
              metric_type: gauge
              description: 15-minute load average.
        - name: memory
          type: group
          fields:
            - name: total
              type: long
              metric_type: gauge
              unit: byte
              description: Total memory in bytes.
            - name: used
              type: long
              metric_type: gauge
              unit: byte
              description: Used memory in bytes.
            - name: free
              type: long
              metric_type: gauge
              unit: byte
              description: Free memory in bytes.
            - name: available
              type: long
              metric_type: gauge
              unit: byte
              description: Available memory in bytes.
        - name: swap
          type: group
          fields:
            - name: total
              type: long
              metric_type: gauge
              unit: byte
              description: Total swap in bytes.
            - name: used
              type: long
              metric_type: gauge
              unit: byte
              description: Used swap in bytes.
            - name: free
              type: long
              metric_type: gauge
              unit: byte
              description: Free swap in bytes.
        - name: rootfs
          type: group
          fields:
            - name: total
              type: long
              metric_type: gauge
              unit: byte
              description: Root filesystem total size in bytes.
            - name: used
              type: long
              metric_type: gauge
              unit: byte
              description: Root filesystem used space in bytes.
            - name: avail
              type: long
              metric_type: gauge
              unit: byte
              description: Root filesystem available space in bytes.
        - name: uptime
          type: long
          metric_type: gauge
          unit: s
          description: Node uptime in seconds.
        - name: pveversion
          type: keyword
          description: Proxmox VE version string.
        - name: kversion
          type: keyword
          description: Kernel version string.
        - name: cpuinfo
          type: group
          fields:
            - name: model
              type: keyword
              description: CPU model name.
            - name: cores
              type: long
              metric_type: gauge
              description: Number of CPU cores per socket.
            - name: sockets
              type: long
              metric_type: gauge
              description: Number of CPU sockets.
