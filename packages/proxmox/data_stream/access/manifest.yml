title: Proxmox VE access logs
type: logs
streams:
  - input: logfile
    vars:
      - name: paths
        type: text
        title: Access Log Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/pveproxy/access.log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - proxmox-access
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: false
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
    title: Proxmox VE access logs
    description: Collect pveproxy HTTP access logs
