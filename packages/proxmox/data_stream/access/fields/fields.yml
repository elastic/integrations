- name: proxmox
  type: group
  fields:
    - name: cluster
      type: group
      fields:
        - name: name
          type: keyword
          description: Proxmox cluster name.
    - name: auth
      type: group
      fields:
        - name: realm
          type: keyword
          description: Authentication realm (pam, pve, ldap).
        - name: token_id
          type: keyword
          description: API token ID if request used token auth.
