title: Proxmox VE tasks
type: logs
streams:
  - input: logfile
    vars:
      - name: paths
        type: text
        title: Task Index Path
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/pve/tasks/index
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - proxmox-tasks
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: false
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
    title: Proxmox VE tasks
    description: Collect task completion records from the task index
