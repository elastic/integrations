- name: proxmox
  type: group
  fields:
    - name: cluster
      type: group
      fields:
        - name: name
          type: keyword
          description: Proxmox cluster name.
    - name: task
      type: group
      fields:
        - name: node
          type: keyword
          description: Node that ran the task.
        - name: type
          type: keyword
          description: Task type (vzdump, qmstart, qmstop, vncproxy, and so on).
        - name: vmid
          type: keyword
          description: Target VM or container ID.
        - name: upid
          type: keyword
          description: Unique Process ID (UPID) string.
        - name: duration_seconds
          type: long
          unit: s
          description: Task duration in seconds.
    - name: auth
      type: group
      fields:
        - name: realm
          type: keyword
          description: Authentication realm (pam, pve, and so on).
        - name: token_name
          type: keyword
          description: API token name, if the task was initiated by a token.
