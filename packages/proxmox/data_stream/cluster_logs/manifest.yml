title: Proxmox VE cluster logs
type: logs
streams:
  - input: journald
    vars:
      - name: units
        type: text
        title: Journald Units
        multi: true
        required: true
        show_user: false
        default:
          - corosync.service
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - proxmox-cluster-logs
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: false
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
    title: Proxmox VE cluster logs
    description: Collect Corosync cluster events from systemd journal
