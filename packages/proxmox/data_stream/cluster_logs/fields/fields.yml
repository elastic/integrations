- name: proxmox
  type: group
  fields:
    - name: cluster
      type: group
      fields:
        - name: name
          type: keyword
          description: Proxmox cluster name.
    - name: corosync
      type: group
      fields:
        - name: subsystem
          type: keyword
          description: Corosync subsystem (QUORUM, TOTEM, KNET, MAIN).
        - name: members
          type: long
          metric_type: gauge
          description: Number of cluster members after a membership change.
