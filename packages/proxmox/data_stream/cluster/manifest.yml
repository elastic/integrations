title: Proxmox VE cluster metrics
type: metrics
streams:
  - input: cel
    vars:
      - name: metrics_interval
        type: text
        title: Metrics Collection Interval
        description: How often to poll the Proxmox API for cluster metrics.
        required: true
        show_user: true
        default: 60s
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - proxmox-cluster
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
    title: Proxmox VE cluster metrics
    description: Collect cluster resource metrics from the Proxmox REST API
elasticsearch:
  index_mode: time_series
