title: Proxmox VE firewall logs
type: logs
streams:
  - input: logfile
    vars:
      - name: paths
        type: text
        title: Firewall Log Path
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/pve-firewall.log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - proxmox-firewall
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: false
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
    title: Proxmox VE firewall logs
    description: Collect Proxmox VE firewall logs from pve-firewall.log
