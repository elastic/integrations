- name: proxmox
  type: group
  fields:
    - name: cluster
      type: group
      fields:
        - name: name
          type: keyword
          description: Proxmox cluster name.
    - name: firewall
      type: group
      fields:
        - name: vmid
          type: keyword
          description: VM or container ID from the firewall chain.
        - name: chain
          type: keyword
          description: Firewall chain name (PVEFW-HOST-IN, PVEFW-HOST-OUT, and so on).
