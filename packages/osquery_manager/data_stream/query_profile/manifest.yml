title: Osquery Manager query profiles
dataset: osquery_manager.query_profile
type: logs
release: experimental
streams:
  - input: osquery
    title: Osquery Manager query profile collection
    description: |
      Collects per-query performance profiles from Elastic Agent osquery (scheduled query metrics from osquery_schedule, and live query snapshots).
      Enable this stream when using per-stream `profile: true` in Osquery so profile events are not dropped.
