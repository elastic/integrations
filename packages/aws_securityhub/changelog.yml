# newer versions go on top
- version: "1.1.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18552
- version: "1.0.1"
  changes:
    - description: Change page_size/batch_size variable type from text to integer for Fleet input validation.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19249
- version: "1.0.0"
  changes:
    - description: Promote integration to GA.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18133
- version: "0.3.0"
  changes:
    - description: Add timestamp range filter and storage tier exclusion to latest transform source queries to reduce scan scope and improve performance.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18098
- version: "0.2.1"
  changes:
    - description: Use triple-brace Mustache templating when referencing variables in ingest pipelines.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17623
- version: "0.2.0"
  changes:
    - description: Removed ECS field definitions from CDR transform destinations, now covered by ecs@mappings component template. Renamed overridden ECS fields files to ecs-overridden.yml.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17552
- version: "0.1.0"
  changes:
    - description: Initial release.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15932
