name: ti_misp
title: MISP
version: "1.44.0"
description: Ingest threat intelligence indicators from MISP platform with Elastic Agent.
type: integration
format_version: "3.3.2"
categories:
  - security
  - threat_intel
conditions:
  kibana:
    version: "^8.19.4 || ~9.0.7 || ^9.1.4"
icons:
  - src: /img/misp.svg
    title: MISP
    size: 216x216
    type: image/svg+xml
screenshots:
  - src: /img/ti_misp-threat_attributes_overview.png
    title: MISP Threat Attributes Overview
    size: 600x600
    type: image/png
  - src: /img/ti_misp-threat_overview.png
    title: MISP Threat Overview
    size: 600x600
    type: image/png
policy_templates:
  - name: ti_misp
    title: MISP
    description: Ingest threat intelligence indicators from MISP platform with Elastic Agent.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        release: beta
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: httpjson
        title: "Ingest threat intelligence indicators from MISP platform with Elastic Agent."
        description: "Ingest threat intelligence indicators from MISP platform with Elastic Agent."
owner:
  github: elastic/security-service-integrations
  type: elastic
