---
description: Pipeline for parsing EfficientIP DHCP logs.
processors:
  - set:
      tag: set_network_protocol_dhcp
      field: network.protocol
      value: dhcp
  - grok:
      tag: grok_DHCPDISCOVER_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPDISCOVER')
      patterns:
        - '^%{WORD:event.action} from %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}): %{GREEDYDATA:efficient_ip.log.dhcp.discover.message}$'
        - '^%{WORD:event.action} from %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} from %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}): %{GREEDYDATA:efficient_ip.log.dhcp.discover.message}$'
        - '^%{WORD:event.action} from %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPOFFER_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPOFFER')
      patterns:
        - '^%{WORD:event.action} on %{IP:client.ip} to %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}) \[%{NUMBER:efficient_ip.log.dhcp.lease.duration:long}\]$'
        - '^%{WORD:event.action} on %{IP:client.ip} to %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}) \[%{NUMBER:efficient_ip.log.dhcp.lease.duration:long}\]$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPREQUEST_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPREQUEST')
      patterns:
        - '^%{WORD:event.action} for %{IP:client.ip} \(%{DATA:efficient_ip.log.dhcp.requested_hostname}\) from %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} for %{IP:client.ip} \(%{IP:efficient_ip.log.dhcp.router.ip}\) from %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} for %{IP:client.ip} from %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} for %{IP:client.ip} \(%{IP:efficient_ip.log.dhcp.router.ip}\) from %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} for %{IP:client.ip} from %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPACK_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPACK')
      patterns:
        - '^%{WORD:event.action} on %{IP:client.ip} to %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}) \[%{NUMBER:efficient_ip.log.dhcp.lease.duration:long}\]$'
        - '^%{WORD:event.action} on %{IP:client.ip} to %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}) \[%{NUMBER:efficient_ip.log.dhcp.lease.duration:long}\]$'
        - '^%{WORD:event.action} to %{IP:client.ip} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_RELEASE_message
      field: message
      if: ctx.message != null && ctx.message.contains('RELEASE')
      patterns:
        - '^%{WORD:event.action} of %{IP:client.ip} from %{MAC:client.mac} \(%{DATA:efficient_ip.log.dhcp.client_hostname}\) via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} of %{IP:client.ip} from %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{WORD:event.action} on %{IP:client.ip} to %{MAC:client.mac}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPEXPIRE_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPEXPIRE')
      patterns:
        - '^%{WORD:event.action} on %{IP:client.ip} to %{GREEDYDATA:client.mac}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPINFORM_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPINFORM')
      patterns:
        - '^%{WORD:event.action} from %{IP:client.ip} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPDECLINE_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPDECLINE')
      patterns:
        - '^%{WORD:event.action} of %{IP:client.ip} from %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name}): %{GREEDYDATA:efficient_ip.log.dhcp.decline.message}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPNAK_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPNAK')
      patterns:
        - '^%{WORD:event.action} on %{IP:client.ip} to %{MAC:client.mac} via (%{IP:efficient_ip.log.dhcp.interface.ip}|%{WORD:observer.ingress.interface.name})$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_DHCPLEASEQUERY_message
      field: message
      if: ctx.message != null && ctx.message.contains('DHCPLEASEQUERY')
      patterns:
        - '^%{WORD:event.action} from %{IP:client.ip}: %{GREEDYDATA:efficient_ip.log.dhcp.lease_query.message}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_REFUSED_message
      field: message
      if: ctx.message != null && ctx.message.contains('REFUSED')
      patterns:
        - '^%{REVERSE_UPDATE:event.action} for %{IP:client.ip} abandoned because of non-retryable failure: %{DATA:event.outcome}$'
        - '^Unable to %{ADD_FORWARD:event.action} from %{DATA:efficient_ip.log.dhcp.forward_name} to %{IP:efficient_ip.log.dhcp.ip} by server %{IP:server.ip}#%{NUMBER:server.port:long}: %{DATA:event.outcome}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
      pattern_definitions:
        ADD_FORWARD: (?i:add forward map)
        REVERSE_UPDATE: (?i:reverse map update)
  - set:
      field: event.outcome
      value: failure
      tag: set_refused_outcome
      if: ctx.message != null && ctx.message.contains('REFUSED')
  - grok:
      tag: grok_Encapsulated_Solicit_message
      field: message
      if: ctx.message != null && ctx.message.contains('Encapsulated Solicit')
      patterns:
        - '^%{DATA:event.action} message from %{IP:client.ip} port %{NUMBER:client.port:long} from client DUID %{GREEDYDATA:efficient_ip.log.dhcp.duid}, transaction ID %{GREEDYDATA:efficient_ip.log.dhcp.trans_id}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_Advertise_NA_message
      field: message
      if: ctx.message != null && ctx.message.contains('Advertise NA')
      patterns:
        - '^%{DATA:event.action}: address %{IP:client.ip} to client with duid %{GREEDYDATA:efficient_ip.log.dhcp.duid} iaid = %{GREEDYDATA:efficient_ip.log.dhcp.iaid} valid for %{NUMBER:efficient_ip.log.dhcp.validation_second:long} seconds$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_Relay_forward_message
      field: message
      if: ctx.message != null && ctx.message.contains('Relay-forward')
      patterns:
        - '^%{DATA:event.action} message from %{IP:client.ip} port %{NUMBER:client.port:long}, link address %{IP:efficient_ip.log.dhcp.link_address}, peer address %{IP:efficient_ip.log.dhcp.peer_address}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_Encapsulating_Advertise_message
      field: message
      if: ctx.message != null && ctx.message.contains('Encapsulating Advertise')
      patterns:
        - '^%{DATA:event.action} message to send to %{IP:client.ip} port %{NUMBER:client.port:long}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_Sending_Relay_reply_message
      field: message
      if: ctx.message != null && ctx.message.contains('Sending Relay-reply')
      patterns:
        - '^%{DATA:event.action} message to %{IP:client.ip} port %{NUMBER:client.port:long}$'
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - grok:
      tag: grok_fallback_message
      field: message
      if: ctx.message != null && ctx.event?.action == null
      patterns:
        - '^%{GREEDYDATA:efficient_ip.log.dhcp.message}$'
  - gsub:
      tag: normalize_event_action_spaces
      field: event.action
      pattern: ' '
      replacement: '_'
      ignore_missing: true
      if: ctx.event?.action != null && ctx.event.action.contains(' ')
  - lowercase:
      tag: lowercase_event_action
      field: event.action
      ignore_failure: true
      ignore_missing: true
  - gsub:
      tag: normalize_client_mac_delimiters
      field: client.mac
      ignore_missing: true
      pattern: '[:.]'
      replacement: '-'
  - uppercase:
      tag: uppercase_client_mac
      field: client.mac
      ignore_missing: true
  - convert:
      tag: convert_client_ip
      field: client.ip
      if: ctx.client?.ip != null && ctx.client.ip != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_client_ip_on_convert_failure
            field: client.ip
            ignore_missing: true
        - append:
            tag: append_error_on_convert_client_ip_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_client_ip
      field: related.ip
      value: '{{{client.ip}}}'
      if: ctx.client?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_related_ip_server_ip
      field: related.ip
      value: '{{{server.ip}}}'
      if: ctx.server?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - convert:
      tag: convert_dhcp_link_address
      field: efficient_ip.log.dhcp.link_address
      if: ctx.efficient_ip?.log?.dhcp?.link_address != null && ctx.efficient_ip.log.dhcp.link_address != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_dhcp_link_address_on_convert_failure
            field: efficient_ip.log.dhcp.link_address
            ignore_missing: true
        - append:
            tag: append_error_on_convert_dhcp_link_address_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_dhcp_link_address
      field: related.ip
      value: '{{{efficient_ip.log.dhcp.link_address}}}'
      if: ctx.efficient_ip?.log?.dhcp?.link_address != null
      allow_duplicates: false
      ignore_failure: true
  - convert:
      tag: convert_dhcp_peer_address
      field: efficient_ip.log.dhcp.peer_address
      if: ctx.efficient_ip?.log?.dhcp?.peer_address != null && ctx.efficient_ip.log.dhcp.peer_address != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_dhcp_peer_address_on_convert_failure
            field: efficient_ip.log.dhcp.peer_address
            ignore_missing: true
        - append:
            tag: append_error_on_convert_dhcp_peer_address_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_dhcp_peer_address
      field: related.ip
      value: '{{{efficient_ip.log.dhcp.peer_address}}}'
      if: ctx.efficient_ip?.log?.dhcp?.peer_address != null
      allow_duplicates: false
      ignore_failure: true
  - convert:
      tag: convert_dhcp_router_ip
      field: efficient_ip.log.dhcp.router.ip
      if: ctx.efficient_ip?.log?.dhcp?.router?.ip != null && ctx.efficient_ip.log.dhcp.router.ip != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_dhcp_router_ip_on_convert_failure
            field: efficient_ip.log.dhcp.router.ip
            ignore_missing: true
        - append:
            tag: append_error_on_convert_dhcp_router_ip_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_dhcp_router_ip
      field: related.ip
      value: '{{{efficient_ip.log.dhcp.router.ip}}}'
      if: ctx.efficient_ip?.log?.dhcp?.router?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - convert:
      tag: convert_dhcp_interface_ip
      field: efficient_ip.log.dhcp.interface.ip
      if: ctx.efficient_ip?.log?.dhcp?.interface?.ip != null && ctx.efficient_ip.log.dhcp.interface.ip != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_dhcp_interface_ip_on_convert_failure
            field: efficient_ip.log.dhcp.interface.ip
            ignore_missing: true
        - append:
            tag: append_error_on_convert_dhcp_interface_ip_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_dhcp_interface_ip
      field: related.ip
      value: '{{{efficient_ip.log.dhcp.interface.ip}}}'
      if: ctx.efficient_ip?.log?.dhcp?.interface?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_related_hosts_dhcp_client_hostname
      field: related.hosts
      value: '{{{efficient_ip.log.dhcp.client_hostname}}}'
      if: ctx.efficient_ip?.log?.dhcp?.client_hostname != null
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_related_ip_dhcp_ip
      field: related.ip
      value: '{{{efficient_ip.log.dhcp.ip}}}'
      if: ctx.efficient_ip?.log?.dhcp?.ip != null
      allow_duplicates: false
      ignore_failure: true
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
        failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_event_kind_pipeline_error
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false