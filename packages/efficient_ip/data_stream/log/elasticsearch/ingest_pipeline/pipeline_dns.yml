---
description: Pipeline for parsing EfficientIP DNS logs.
processors:
  - set:
      tag: set_network_protocol_dns
      field: network.protocol
      value: dns
  - grok:
      tag: grok_dns_message
      field: message
      patterns:
        - "^%{CLIENT}\\s*\\(%{GREEDYDATA}.\\)\\:\\s*%{NOTSPACE:efficient_ip.log.dns.category}\\: %{DATA:dns.question.name} %{DATA:dns.question.class} %{WORD:dns.question.type} \\(%{IP:server.ip}\\) -> %{WORD:dns.response_code}(\\s+%{GREEDYDATA:dns_answers_data})?$"
        - "^%{CLIENT}\\s+(\\(%{GREEDYDATA}.\\))?\\s*%{NOTSPACE:efficient_ip.log.dns.category}\\: %{DATA:dns.question.name} %{DATA:dns.question.class} %{WORD:dns.question.type}\\s+\\(%{IP:server.ip}\\)$"
        - "^%{CLIENT}\\s+update '%{DATA:dns.question.name}/%{WORD:dns.question.class}' %{GREEDYDATA:efficient_ip.log.dns.category}$"
        - "^%{CLIENT}\\s+\\(%{DATA}\\):\\s+transfer of '%{DATA:dns.question.name}/%{WORD:dns.question.class}':\\s+%{GREEDYDATA:efficient_ip.log.dns.message}$"
        - "^%{CLIENT}\\s+updating zone '%{DATA:dns.question.name}/%{WORD:dns.question.class}':\\s+%{GREEDYDATA:efficient_ip.log.dns.message}$"
        - "^Last message %{GREEDYDATA:efficient_ip.log.dns.message}$"
        - "^%{GREEDYDATA:efficient_ip.log.dns.message}$"
      pattern_definitions:
        CLIENT: 'client (?:%{DATA} )?%{IP:client.ip}#%{NUMBER:client.port:long}:?'
  - script:
      tag: parse_dns_answers
      lang: painless
      if: "ctx.dns_answers_data != null && ctx.dns_answers_data != ''"
      description: "Parse DNS answer records"
      source: |
        def answers = new ArrayList();
        def text = ctx.dns_answers_data.trim();
        def validTypes = new HashSet(['A','AAAA','CNAME','SOA','SRV','PTR','MX','NS','TXT']);
        // Split by spaces and walk tokens to find TTL TYPE boundaries
        def tokens = text.splitOnToken(' ');
        int i = 0;
        while (i < tokens.length - 1) {
          def tok = tokens[i];
          // Skip empty tokens from multiple spaces
          if (tok.length() == 0) { i++; continue; }
          // Check if token is a number (TTL) followed by a valid type
          boolean isNum = true;
          for (int c = 0; c < tok.length(); c++) {
            if (!Character.isDigit(tok.charAt(c))) { isNum = false; break; }
          }
          if (!isNum) { i++; continue; }
          // Find next non-empty token
          int j = i + 1;
          while (j < tokens.length && tokens[j].length() == 0) { j++; }
          if (j >= tokens.length) break;
          def typeStr = tokens[j];
          boolean isType = validTypes.contains(typeStr) || (typeStr.length() > 4 && typeStr.substring(0, 4).equals('TYPE'));
          if (!isType) { i++; continue; }
          // Collect data tokens until next TTL+TYPE pair or end
          int dataStart = j + 1;
          int dataEnd = dataStart;
          while (dataEnd < tokens.length) {
            def dt = tokens[dataEnd];
            if (dt.length() == 0) { dataEnd++; continue; }
            boolean dtIsNum = true;
            for (int c = 0; c < dt.length(); c++) {
              if (!Character.isDigit(dt.charAt(c))) { dtIsNum = false; break; }
            }
            if (dtIsNum && dataEnd + 1 < tokens.length) {
              int k = dataEnd + 1;
              while (k < tokens.length && tokens[k].length() == 0) { k++; }
              if (k < tokens.length) {
                def nt = tokens[k];
                if (validTypes.contains(nt) || (nt.length() > 4 && nt.substring(0, 4).equals('TYPE'))) {
                  break;
                }
              }
            }
            dataEnd++;
          }
          def dataParts = new ArrayList();
          for (int d = dataStart; d < dataEnd; d++) {
            if (tokens[d].length() > 0) dataParts.add(tokens[d]);
          }
          def answer = new HashMap();
          answer.put('type', typeStr);
          answer.put('data', String.join(' ', dataParts));
          answer.put('ttl', Long.parseLong(tokens[i]));
          answers.add(answer);
          i = dataEnd;
        }
        if (ctx.dns == null) {
          ctx.dns = new HashMap();
        }
        ctx.dns.put('answers', answers);
        ctx.remove('dns_answers_data');
  - convert:
      tag: convert_server_ip
      field: server.ip
      if: ctx.server?.ip != null && ctx.server.ip != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_server_ip_on_convert_failure
            field: server.ip
            ignore_missing: true
        - append:
            tag: append_error_on_convert_server_ip_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_server_ip
      field: related.ip
      value: '{{{server.ip}}}'
      if: ctx.server?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_related_ip_client_ip
      field: related.ip
      value: '{{{client.ip}}}'
      if: ctx.client?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - gsub:
      tag: trim_trailing_dot_dns_question_name
      field: dns.question.name
      pattern: '\.$'
      replacement: ''
      ignore_missing: true
      if: ctx.dns?.question?.name != null      
  - append:
      tag: append_related_hosts_dns_question_name
      field: related.hosts
      value: '{{{dns.question.name}}}'
      if: ctx.dns?.question?.name != null
      allow_duplicates: false
      ignore_failure: true
  - registered_domain:
      tag: parse_registered_domain
      field: "dns.question.name"
      target_field: "dns.question"
      ignore_missing: true
      if: ctx.dns?.question != null
  - remove:
      tag: remove_repeat_message_and_question_domain
      field:
        - repeat_message
        - dns.question.domain
      ignore_missing: true
  - set:
      tag: set_event_outcome_dns_failure
      field: event.outcome
      value: failure
      if: ctx.dns?.response_code != null && ['SERVFAIL','REFUSED','NXDOMAIN'].contains(ctx.dns.response_code)
  - set:
      tag: set_event_outcome_dns_success
      field: event.outcome
      value: success
      if: ctx.dns?.response_code == 'NOERROR'
  - set:
      tag: set_dns_type_query
      field: dns.type
      value: query
      if: ctx.efficient_ip?.log?.dns?.category == 'query'
  - set:
      tag: set_dns_type_answer
      field: dns.type
      value: answer
      if: ctx.efficient_ip?.log?.dns?.category == 'answer'    
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
        failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_event_kind_pipeline_error
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false