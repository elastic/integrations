---
description: Pipeline for parsing EfficientIP DDI logs.
processors:
  - rename:
      tag: rename_message_to_event_original
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '9.4.0'
  - grok:
      tag: grok_syslog_message
      field: event.original
      patterns:
        - "^<%{NUMBER:log.syslog.priority:long}>(?:%{SYSLOGTIMESTAMP:event.created}|%{TIMESTAMP_ISO8601:event.created})\\s+%{WORD:efficient_ip.log.service_name}\\[%{NUMBER:process.pid:long}\\]:\\s+%{GREEDYDATA:message}$"
        - "^<%{NUMBER:log.syslog.priority:long}>(?:%{SYSLOGTIMESTAMP:event.created}|%{TIMESTAMP_ISO8601:event.created})\\s+%{DATA:host.name}\\s+%{DATA:efficient_ip.log.service_name}\\[?%{NUMBER:process.pid:long}?\\]?:\\s+%{GREEDYDATA:message}$"
        - "^<%{NUMBER:log.syslog.priority:long}>(?:%{SYSLOGTIMESTAMP:event.created}|%{TIMESTAMP_ISO8601:event.created})\\s+%{DATA:host.name}\\s+%{GREEDYDATA:message}$"
        - "^%{GREEDYDATA:message}$"
  - rename:
      tag: rename_conf_tz_offset_to_event_timezone
      field: _conf.tz_offset
      target_field: event.timezone
      if: ctx._conf?.tz_offset != null && ctx._conf.tz_offset != 'local'
      ignore_missing: true
      ignore_failure: true
  - date:
      field: event.created
      tag: date_event_created_tz
      timezone: '{{{event.timezone}}}'
      if: ctx.event?.timezone != null && ctx.event.created != null
      target_field: event.created
      formats:
        - MMM  d HH:mm:ss
        - MMM dd HH:mm:ss
        - MMM d HH:mm:ss
        - dd-MMM-yyyy HH:mm:ss.SSS
        - ISO8601
      on_failure:
        - remove:
            tag: remove_event_created_on_date_tz_failure
            field: event.created
            ignore_missing: true
        - append:
            tag: append_error_on_date_tz_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - date:
      field: event.created
      tag: date_event_created_notz
      if: ctx.event?.timezone == null && ctx.event?.created != null
      target_field: event.created
      formats:
        - MMM  d HH:mm:ss
        - MMM dd HH:mm:ss
        - MMM d HH:mm:ss
        - dd-MMM-yyyy HH:mm:ss.SSS
        - ISO8601
      on_failure:
        - remove:
            tag: remove_event_created_on_date_notz_failure
            field: event.created
            ignore_missing: true
        - append:
            tag: append_error_on_date_notz_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_log_type_dhcp
      field: efficient_ip.log.type
      value: 'DHCP'
      if: ctx.efficient_ip?.log?.service_name == 'dhcpd' || ctx.efficient_ip?.log?.service_name == 'dhcpdv6'
  - set:
      tag: set_log_type_dns
      field: efficient_ip.log.type
      value: 'DNS'
      if: ctx.efficient_ip?.log?.service_name == 'named'
  - set:
      tag: set_log_type_audit
      field: efficient_ip.log.type
      value: 'AUDIT'
      if: ctx.efficient_ip?.log?.service_name == 'httpd'
  - set:
      tag: set_event_kind_default_event
      field: event.kind
      value: event
      if: ctx.event?.kind == null
  - append:
      tag: append_event_category_network
      field: event.category
      value: network
      if: ctx.efficient_ip?.log?.type == 'DHCP' || ctx.efficient_ip?.log?.type == 'DNS'
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_event_type_protocol
      field: event.type
      value: protocol
      if: ctx.efficient_ip?.log?.type == 'DHCP' || ctx.efficient_ip?.log?.type == 'DNS'
      allow_duplicates: false
      ignore_failure: true
  - pipeline:
      tag: route_to_pipeline_dhcp
      name: '{{ IngestPipeline "pipeline_dhcp" }}'
      if: ctx.efficient_ip?.log?.type == 'DHCP'
  - pipeline:
      tag: route_to_pipeline_dns
      name: '{{ IngestPipeline "pipeline_dns" }}'
      if: ctx.efficient_ip?.log?.type == 'DNS'
  # Since logstash sets the @timestamp if not present, `override: true` is required to overwrite the value with event timestamp.
  - set:
      tag: set_timestamp_from_event_created
      field: '@timestamp'
      copy_from: event.created
      if: ctx.event?.created != null
      override: true
  # If individual pipelines has timestamp, they should take priority. This makes @timestamp < event.created conforming to ECS.
  - set:
      tag: set_timestamp_from_tmp_timestamp
      field: '@timestamp'
      copy_from: _tmp.timestamp
      if: ctx._tmp?.timestamp != null
      override: true
  - convert:
      tag: convert_tmp_host_ip
      field: _tmp.host.ip
      if: ctx._tmp?.host?.ip != null && ctx._tmp.host.ip != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_tmp_host_ip_on_convert_failure
            field: _tmp.host.ip
            ignore_missing: true
        - append:
            tag: append_error_on_convert_tmp_host_ip_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_from_tmp_host_ip
      field: related.ip
      value: '{{{_tmp.host.ip}}}'
      if: ctx._tmp?.host?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - convert:
      tag: convert_tmp_ip
      field: _tmp.ip
      if: ctx._tmp?.ip != null && ctx._tmp.ip != ''
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_tmp_ip_on_convert_failure
            field: _tmp.ip
            ignore_missing: true
        - append:
            tag: append_error_on_convert_tmp_ip_failure
            field: error.message
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
              {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
              failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      tag: append_related_ip_from_tmp_ip
      field: related.ip
      value: '{{{_tmp.ip}}}'
      if: ctx._tmp?.ip != null
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_related_hosts_from_host_domain
      field: related.hosts
      value: '{{{host.domain}}}'
      if: ctx.host?.domain != null
      allow_duplicates: false
      ignore_failure: true
  - append:
      tag: append_host_ip_from_tmp_host_ip
      field: host.ip
      value: '{{{_tmp.host.ip}}}'
      if: ctx._tmp?.host?.ip != null
      ignore_failure: true
  - append:
      tag: append_host_ip_from_tmp_ip
      field: host.ip
      value: '{{{_tmp.ip}}}'
      if: ctx._tmp?.ip != null
      ignore_failure: true
  - lowercase:
      tag: lowercase_event_action
      field: event.action
      if: ctx.event?.action != null
      ignore_failure: true
  - geoip:
      tag: geoip_client_geo
      field: "client.ip"
      target_field: "client.geo"
      if: ctx.client?.geo == null && ctx.client?.ip != null
      ignore_missing: true
  - geoip:
      tag: geoip_client_as
      database_file: GeoLite2-ASN.mmdb
      field: client.ip
      target_field: client.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      if: ctx.client?.ip != null
  - rename:
      tag: rename_client_as_asn_to_number
      field: client.as.asn
      target_field: client.as.number
      ignore_missing: true
      if: ctx.client?.as?.asn != null
  - rename:
      tag: rename_client_as_org_name
      field: client.as.organization_name
      target_field: client.as.organization.name
      ignore_missing: true
      if: ctx.client?.as?.organization_name != null
  - dissect:
      tag: dissect_network_transport_view
      field: network.transport
      pattern: "view %{}: %{network.transport}"
      if: ctx.network?.transport instanceof String && ctx.network.transport.contains('view')
  - lowercase:
      tag: lowercase_network_transport
      field: network.transport
      ignore_missing: true
  - script:
      tag: script_drop_null_empty_values
      description: Drops null/empty values recursively.
      lang: painless
      source: |
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).size() == 0);
        }
          return false;
        }
        drop(ctx);
  - remove:
      tag: remove_message_after_parsing
      field: message
      ignore_missing: true
      if: ctx.event?.original != null      
  - remove:
      tag: remove_temporary_fields
      field:
        - _conf
        - _tmp
      ignore_failure: true
      ignore_missing: true
on_failure:
  - append:
      tag: append_pipeline_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline {{{_ingest.pipeline}}}
        failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_event_kind_pipeline_error
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_preserve_original_event_tag
      field: tags
      value: preserve_original_event
      allow_duplicates: false