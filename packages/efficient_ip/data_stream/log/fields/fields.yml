- name: efficient_ip.log
  type: group
  fields:
    - name: dhcp
      type: group
      description: Fields parsed from EfficientIP DHCP server log messages.
      fields:
        - name: client_hostname
          type: keyword
          description: Hostname of the DHCP client as reported in the log message.
        - name: decline
          type: group
          description: Details of a DHCPDECLINE message.
          fields:
            - name: message
              type: keyword
              description: Reason or additional information included in a DHCPDECLINE message.
        - name: duid
          type: keyword
          description: DHCP Unique Identifier (DUID) of the client.
        - name: discover
          type: group
          description: Details of a DHCPDISCOVER message.
          fields:
            - name: message
              type: keyword
              description: Additional information included in a DHCPDISCOVER message.
        - name: iaid
          type: keyword
          description: Identity Association Identifier (IAID) of the client.
        - name: inform
          type: group
          description: Details of a DHCPINFORM message.
          fields:
            - name: message
              type: keyword
              description: Additional information included in a DHCPINFORM message.
        - name: interface
          type: group
          description: Interface through which the DHCP request was received.
          fields:
            - name: ip
              type: ip
              description: IP address of the interface that received the DHCP request.
        - name: ip
          type: ip
          description: IP address associated with the DHCP operation.
        - name: forward_name
          type: keyword
          description: Forward DNS name involved in a failed add forward map operation.
        - name: lease
          type: group
          description: Details of the DHCP lease granted to the client.
          fields:
            - name: duration
              type: long
              description: Duration of the DHCP lease, in seconds.
            - name: message
              type: keyword
              description: Additional information related to the DHCP lease.
        - name: lease_query
          type: group
          description: Details of a DHCPLEASEQUERY message.
          fields:
            - name: message
              type: keyword
              description: Additional information included in a DHCPLEASEQUERY message.
        - name: link_address
          type: keyword
          description: Link address of the relay agent in a Relay-forward message.
        - name: message
          type: text
          description: Raw or unparsed DHCP log message.
        - name: network
          type: keyword
          description: Network associated with the DHCP operation.
        - name: offered
          type: group
          description: Details of the lease offered to the client.
          fields:
            - name: duration
              type: long
              description: Duration of the offered DHCP lease, in seconds.
        - name: peer_address
          type: keyword
          description: Peer address of the relay agent in a Relay-forward message.
        - name: relay
          type: group
          description: Details of the DHCP relay agent.
          fields:
            - name: interface
              type: group
              description: Interface of the DHCP relay agent.
              fields:
                - name: ip
                  type: ip
                  description: IP address of the relay agent interface.
                - name: name
                  type: keyword
                  description: Name of the relay agent interface.
        - name: release
          type: group
          description: Details of a DHCPRELEASE message.
          fields:
            - name: info
              type: keyword
              description: Additional information included in a DHCPRELEASE message.
        - name: request
          type: group
          description: Details of a DHCPREQUEST message.
          fields:
            - name: message
              type: keyword
              description: Additional information included in a DHCPREQUEST message.
        - name: router
          type: group
          description: Router associated with the requested lease.
          fields:
            - name: ip
              type: ip
              description: IP address of the router associated with the requested lease.
        - name: trans_id
          type: keyword
          description: Transaction ID of the DHCP exchange.
        - name: uid
          type: keyword
          description: Unique identifier of the DHCP client.
        - name: validation_second
          type: long
          description: Number of seconds for which the assigned address is valid.
    - name: service_name
      type: keyword
      description: Name of the EfficientIP service that generated the log (for example, dhcpd or named).
    - name: type
      type: keyword
      description: Type of EfficientIP log (for example, DHCP or DNS).
    - name: view
      type: keyword
      description: DNS view associated with the log message.
    - name: dns
      type: group
      description: Fields parsed from EfficientIP DNS server log messages.
      fields:
        - name: after_query
          type: text
          description: Information logged after the DNS query was processed.
        - name: answers_policy
          type: text
          description: Response policy applied to the DNS answers.
        - name: before_query
          type: text
          description: Information logged before the DNS query was processed.
        - name: category
          type: text
          description: Category of the DNS log message (for example, query or answer).
        - name: failed_message
          type: text
          description: Details of a failed DNS operation.
        - name: message
          type: text
          description: Raw or unparsed DNS log message.
        - name: view_name
          type: text
          description: Name of the DNS view that handled the query.
        - name: version
          type: text
          description: Version information reported in the DNS log message.
        - name: header_flags
          type: keyword
          description: DNS header flags present in the message.
        - name: rpz
          type: group
          description: Response Policy Zone (RPZ) details applied to the DNS query.
          fields:
            - name: action
              type: keyword
              description: RPZ action taken for the DNS query.
            - name: domain
              type: keyword
              description: Domain matched by the RPZ rule.
            - name: domain_rewrite
              type: keyword
              description: Domain to which the query was rewritten by the RPZ rule.
            - name: query_class
              type: keyword
              description: DNS query class matched by the RPZ rule.
            - name: query_class_rewrite
              type: keyword
              description: DNS query class to which the query was rewritten by the RPZ rule.
            - name: rule_type
              type: keyword
              description: Type of RPZ rule that matched the query.
            - name: type
              type: keyword
              description: Type of RPZ policy applied.
        - name: answers
          type: group
          description: DNS answer records returned in the response.
          fields:
            - name: ancount
              type: long
              description: Number of answer records in the DNS response.
            - name: type
              type: keyword
              description: Resource record type of the DNS answer (for example, A, AAAA, or CNAME).
            - name: data
              type: keyword
              description: Data contained in the DNS answer record.
