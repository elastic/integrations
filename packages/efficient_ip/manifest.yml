format_version: 3.5.7
name: efficient_ip
title: "EfficientIP DDI Logging"
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "EfficientIP DDI integration for DNS and DHCP log ingestion"
type: integration
categories:
  - custom
  - network
  - monitoring
  - security
conditions:
  kibana:
    version: "^9.2.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: sample
    title: Sample logs
    description: Collect sample logs
    inputs:
      - type: logfile
        title: Collect sample logs from instances
        description: Collecting sample logs
owner:
  github: elastic/integrations
  type: community
