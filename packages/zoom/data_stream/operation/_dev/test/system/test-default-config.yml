wait_for_data_timeout: 1m
input: cel
service: zoom-operation
vars:
  url: http://{{Hostname}}:{{Port}}
  token_url: http://{{Hostname}}:{{Port}}
  account_id: test-account-id
  client_id: test-client-id
  client_secret: test-client-secret
data_stream:
  vars:
    interval: 2s
    initial_interval: 24h
    page_size: 300
    tags:
      - forwarded
      - zoom-operation
assert:
  hit_count: 5
