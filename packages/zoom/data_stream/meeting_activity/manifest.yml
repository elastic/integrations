title: Meeting Activity
type: logs
streams:
  - input: cel
    title: Meeting Activity
    description: Collect meeting activity logs report of a Zoom account via the REST API.
    template_path: cel.yml.hbs
    enabled: false
    vars:
      - name: interval
        type: text
        title: Interval
        description: Duration between requests to the Zoom API. Supported units for this parameter are h/m/s.
        required: true
        show_user: true
        default: 24h
      - name: initial_interval
        type: text
        title: Initial Interval
        description: How far back to pull the Meeting Activity logs from Zoom API. Supported units for this parameter are h/m/s.
        required: true
        show_user: true
        default: 720h
      - name: activity_type
        type: text
        title: Activity Type
        description: >-
          The meeting activity category to collect. Available categories are `All Activities`, `Meeting Created`, `Meeting Started`, `User Join`, `User Left`, `Remote Control`, `In-Meeting Chat` and `Meeting Ended`.
        required: true
        show_user: true
        default: All Activities
      - name: page_size
        type: integer
        title: Page Size
        description: Page size for the response of the Zoom API. Maximum is 300.
        required: true
        show_user: false
        default: 100
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        default: false
        multi: false
        required: false
        show_user: false
        description: The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-cel.html#_resource_tracer_enable) for details.
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Supported time units are ns, us, ms, s, m, h.
        multi: false
        required: true
        show_user: false
        default: 30s
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - zoom-meeting-activity
      - name: preserve_original_event
        required: false
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed.
