---
description: Parse Zoom activity report events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '8.11.0'
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: >-
        Renames the original `message` field to `event.original` to store a copy of the original message.
        The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: zoom.activity
      tag: parse_json_from_event_original
      if: ctx.event?.original != null
  - fingerprint:
      tag: fingerprint_event_original
      fields:
        - event.original
      target_field: _id
      ignore_missing: true

  # zoom.activity.*
  - date:
      field: zoom.activity.time
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_activity_time
      if: ctx.zoom?.activity?.time != null && ctx.zoom.activity.time != ''
      on_failure:
        - remove:
            field: zoom.activity.time
            ignore_missing: true
            tag: remove_activity_time_on_date_failure
        - append:
            field: error.message
            value: 'Failed to parse zoom.activity.time: {{{ _ingest.on_failure_message }}}'
            tag: append_date_activity_time_failure
  - rename:
      field: zoom.activity.version
      target_field: zoom.activity.client_version
      ignore_missing: true
      tag: rename_activity_version_to_client_version

  # event.*
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - set:
      field: event.action
      tag: set_event_action_sign_in
      value: sign-in
      if: ctx.zoom?.activity?.type == 'Sign in'
  - set:
      field: event.action
      tag: set_event_action_sign_out
      value: sign-out
      if: ctx.zoom?.activity?.type == 'Sign out'
  - append:
      field: event.category
      tag: append_event_category_auth_session
      value:
        - authentication
        - session
      allow_duplicates: false
      if: ctx.zoom?.activity?.type == 'Sign in' || ctx.zoom?.activity?.type == 'Sign out'
  - append:
      field: event.type
      tag: append_event_type_start
      value: start
      allow_duplicates: false
      if: ctx.zoom?.activity?.type == 'Sign in'
  - append:
      field: event.type
      tag: append_event_type_end
      value: end
      allow_duplicates: false
      if: ctx.zoom?.activity?.type == 'Sign out'
  - set:
      field: event.outcome
      tag: set_event_outcome_success
      value: success
      if: ctx.zoom?.activity?.type == 'Sign in' || ctx.zoom?.activity?.type == 'Sign out'

  # user.*
  - rename:
      field: zoom.activity.email
      target_field: user.email
      ignore_missing: true
      tag: rename_activity_email_to_user_email
  - set:
      field: user.name
      tag: set_user_name_from_email
      copy_from: user.email
      ignore_empty_value: true

  # source.*
  - convert:
      field: zoom.activity.ip_address
      type: ip
      target_field: source.ip
      ignore_missing: true
      tag: convert_activity_ip_address_to_source_ip
      if: ctx.zoom?.activity?.ip_address != null && ctx.zoom.activity.ip_address != ''
      on_failure:
        - remove:
            field: zoom.activity.ip_address
            ignore_missing: true
            tag: remove_invalid_activity_ip_address
        - append:
            field: error.message
            value: 'Failed to convert zoom.activity.ip_address to IP: {{{ _ingest.on_failure_message }}}'
            tag: append_convert_activity_ip_address_failure
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
      tag: geoip_source_geo
      if: ctx.source?.ip != null
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      tag: geoip_source_asn
      if: ctx.source?.ip != null
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
      tag: rename_source_as_asn_to_number
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
      tag: rename_source_as_organization_name

  # related.*
  - append:
      field: related.user
      tag: append_user_email_to_related_user
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.ip
      tag: append_source_ip_to_related_ip
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null

  # cleanup
  - remove:
      field:
        - zoom.activity.time
        - zoom.activity.ip_address
        - zoom.activity.email
      ignore_missing: true
      tag: remove_fields
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || v == 'N/A' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
