format_version: "3.2.0"
name: doppler
title: "Doppler"
version: "0.1.0"
description: "Collect activity and secret-access logs from Doppler via the Generic HTTPS log stream (webhook)."
type: integration
categories:
  - security
  - iam
  - credential_management
conditions:
  kibana:
    version: "^8.16.0 || ^9.0.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/doppler-overview-dashboard.png
    title: Doppler Overview dashboard
    size: 3456x1840
    type: image/png
icons:
  - src: /img/doppler-logo.svg
    title: Doppler logo
    size: 100x100
    type: image/svg+xml
policy_templates:
  - name: doppler
    title: Doppler logs
    description: Collect activity and secret-access logs from Doppler.
    inputs:
      - type: http_endpoint
        title: Collect Doppler logs via webhook
        description: Receive activity and secret-access logs pushed by Doppler's Generic HTTPS log stream.
owner:
  github: elastic/security-service-integrations
  type: elastic
