version: '2.3'
services:
  doppler-webhook-http:
    image: docker.elastic.co/observability/stream:v0.20.0
    volumes:
      - ./sample_logs:/sample_logs:ro
    environment:
      - STREAM_PROTOCOL=webhook
      - STREAM_WEBHOOK_PROBE=false
      - STREAM_ADDR=http://elastic-agent:9080/doppler
      - STREAM_WEBHOOK_HEADER=Authorization=Bearer abc123
    command: log --start-signal=SIGHUP --delay=5s /sample_logs/doppler-ndjson.log
