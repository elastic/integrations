---
description: |
  Ingest pipeline for Doppler security.secret_read events, rerouted from
  doppler.activity (see ../../activity/routing_rules.yml). The shared envelope
  (event.*, user.*, organization.*, observer.*, @timestamp) is already mapped by
  the activity pipeline; this pipeline handles only the secret-read specifics:
  enriching the access session (IP, geo, ASN, user agent) and expanding the list
  of secrets that were read into flat, huntable arrays.
processors:
  ##
  # Access session: promote the Doppler session block to ECS source.* / user_agent.*
  # and enrich the source IP with geo/ASN for location-based hunting.
  ##
  # Convert straight into the ip-typed source.ip rather than renaming first: a
  # non-IP value (e.g. "unknown") then fails the conversion and leaves source.ip
  # unset instead of poisoning an ip field and getting the whole secret-read doc
  # rejected at index time. The raw value stays in doppler.session and is dropped
  # with the rest of the session block below, and every IP-dependent step further
  # down gates on source.ip != null so they cleanly skip when no valid IP exists.
  - convert:
      field: doppler.session.ip
      tag: convert_source_ip
      target_field: source.ip
      type: ip
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: doppler.session.method
      tag: rename_session_method
      target_field: doppler.secret_read.method
      ignore_missing: true
  - rename:
      field: doppler.session.browser
      tag: rename_session_browser
      target_field: user_agent.name
      ignore_missing: true
  - rename:
      field: doppler.session.os
      tag: rename_session_os
      target_field: user_agent.os.name
      ignore_missing: true
  - remove:
      field: doppler.session
      tag: remove_session
      ignore_missing: true
  # Enrich the reader's IP with geo/ASN for impossible-travel, new-country, and
  # datacenter/hosting-exit detections on secret access. The guard skips the
  # lookup when geo is already populated (e.g. a custom pipeline set it); private
  # IPs simply will not resolve, which is expected. ignore_failure keeps the event
  # flowing if the GeoIP database is unavailable.
  - geoip:
      field: source.ip
      tag: geoip_source_ip
      target_field: source.geo
      ignore_missing: true
      ignore_failure: true
      if: ctx.source?.geo == null && ctx.source?.ip != null
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      tag: geoip_source_asn
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      ignore_failure: true
      if: ctx.source?.ip != null
  - rename:
      field: source.as.asn
      tag: rename_source_as_number
      target_field: source.as.number
      ignore_missing: true
  - rename:
      field: source.as.organization_name
      tag: rename_source_as_org
      target_field: source.as.organization.name
      ignore_missing: true
  - set:
      field: network.type
      tag: set_network_type_ipv6
      value: ipv6
      if: ctx.source?.ip != null && ctx.source.ip.contains(':')
  - set:
      field: network.type
      tag: set_network_type_ipv4
      value: ipv4
      if: ctx.network?.type == null && ctx.source?.ip != null
  - append:
      field: related.ip
      tag: append_related_ip
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null
  ##
  # Reshape the read secrets. Doppler uses single-letter keys: p=project,
  # e=environment, c=config, s=secret name, v=version, r=inherited-from
  # reference. Expand them and derive flat arrays so threat hunters can pivot on
  # "which secrets/projects/environments were read in this event".
  ##
  - script:
      lang: painless
      tag: reshape_secrets
      description: Expand the read secrets list and derive hunting arrays.
      if: ctx.doppler?.metadata?.secrets != null
      source: |-
        // Doppler normally sends secrets as a list, but tolerate a single object
        // so the read is never silently dropped before doppler.metadata is removed.
        def raw = ctx.doppler.metadata.secrets;
        ArrayList secrets = new ArrayList();
        if (raw instanceof List) { secrets.addAll(raw); }
        else if (raw instanceof Map) { secrets.add(raw); }
        ArrayList out = new ArrayList();
        ArrayList names = new ArrayList();
        ArrayList projects = new ArrayList();
        ArrayList envs = new ArrayList();
        ArrayList configs = new ArrayList();
        for (def s : secrets) {
          if (!(s instanceof Map)) { continue; }
          HashMap m = new HashMap();
          if (s.p != null) { m.project = s.p; if (!projects.contains(s.p)) { projects.add(s.p); } }
          if (s.e != null) { m.environment = s.e; if (!envs.contains(s.e)) { envs.add(s.e); } }
          if (s.c != null) { m.config = s.c; if (!configs.contains(s.c)) { configs.add(s.c); } }
          if (s.s != null) { m.name = s.s; if (!names.contains(s.s)) { names.add(s.s); } }
          if (s.v != null) { m.version = s.v; }
          if (s.r instanceof Map) {
            HashMap r = new HashMap();
            if (s.r.p != null) { r.project = s.r.p; }
            if (s.r.e != null) { r.environment = s.r.e; }
            if (s.r.c != null) { r.config = s.r.c; }
            m.inherited_from = r;
          }
          out.add(m);
        }
        if (ctx.doppler.secret_read == null) { ctx.doppler.secret_read = new HashMap(); }
        ctx.doppler.secret_read.secrets = out;
        ctx.doppler.secret_read.secret_names = names;
        ctx.doppler.secret_read.projects = projects;
        ctx.doppler.secret_read.environments = envs;
        ctx.doppler.secret_read.configs = configs;
        // Count the secrets actually reshaped (well-formed entries), so the count
        // matches doppler.secret_read.secrets rather than any malformed input.
        ctx.doppler.secret_read.secret_count = out.size();
      on_failure:
        - append:
            field: error.message
            tag: append_reshape_secrets_error
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              with tag '{{{ _ingest.on_failure_processor_tag }}}'
              in pipeline '{{{ _ingest.pipeline }}}'
              failed with message '{{{ _ingest.on_failure_message }}}'
  - remove:
      field: doppler.metadata
      tag: remove_metadata
      ignore_missing: true
  - script:
      lang: painless
      tag: drop_null_values
      description: Drops null/empty values recursively.
      source: |-
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
      on_failure:
        - append:
            field: error.message
            tag: append_drop_null_values_error
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              with tag '{{{ _ingest.on_failure_processor_tag }}}'
              in pipeline '{{{ _ingest.pipeline }}}'
              failed with message '{{{ _ingest.on_failure_message }}}'
  - pipeline:
      name: logs-doppler.secret_read@custom
      ignore_missing_pipeline: true
      tag: pipeline_logs_doppler_secret_read_custom
  # A processor above may have caught its own failure (appending to error.message)
  # and let the document continue. Reflect any such handled error in event.kind and
  # preserve the original event so the failure is still discoverable downstream.
  - append:
      field: tags
      tag: append_preserve_original_event_on_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
on_failure:
  - set:
      field: event.kind
      tag: set_event_kind_pipeline_error
      value: pipeline_error
  - append:
      field: tags
      tag: append_preserve_original_event_on_failure
      value: preserve_original_event
      allow_duplicates: false
  - append:
      field: error.message
      tag: append_pipeline_failure_message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        with tag '{{{ _ingest.on_failure_processor_tag }}}'
        in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
