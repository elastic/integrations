---
description: |
  Ingest pipeline for all Doppler events received on the http_endpoint
  listener. Maps the shared envelope (timestamp, actor, workplace, ECS
  categorization) common to every event type, then defers activity-only
  enrichment to the activity_enrich pipeline. High-volume security.secret_read
  events are rerouted to the doppler.secret_read dataset after this pipeline runs
  (see routing_rules.yml), and the activity_enrich call is guarded so it never
  runs for security.secret_read events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.4.0'
  - set:
      field: observer.vendor
      tag: set_observer_vendor
      value: Doppler
  - set:
      field: observer.product
      tag: set_observer_product
      value: Activity Logs
  - set:
      field: event.provider
      tag: set_event_provider
      copy_from: doppler.source
      ignore_empty_value: true
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - date:
      field: doppler.createdAt
      tag: date_created_at
      target_field: '@timestamp'
      formats:
        - ISO8601
      if: ctx.doppler?.createdAt != null
      on_failure:
        - append:
            field: error.message
            tag: append_date_error
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              with tag '{{{ _ingest.on_failure_processor_tag }}}'
              in pipeline '{{{ _ingest.pipeline }}}'
              failed with message '{{{ _ingest.on_failure_message }}}'
  # Fall back to the agent ingest time when @timestamp is still unset (createdAt
  # was absent or unparseable), so the document always has a sane @timestamp
  # rather than failing data-stream validation. When createdAt was outright
  # missing, error.message also records that the timestamp was synthesized (an
  # unparseable createdAt is already captured by the date processor on_failure).
  - set:
      field: '@timestamp'
      tag: set_timestamp_fallback
      value: '{{{_ingest.timestamp}}}'
      if: ctx['@timestamp'] == null
  - append:
      field: error.message
      tag: append_timestamp_fallback_note
      value: 'doppler.createdAt missing; @timestamp set from ingest time'
      if: ctx.doppler?.createdAt == null
  - set:
      field: event.action
      tag: set_event_action
      copy_from: doppler.type
      ignore_empty_value: true
  - set:
      field: event.id
      tag: set_event_id_from_slug
      copy_from: doppler.slug
      ignore_empty_value: true
  ##
  # Actor mapping. The Doppler "user" object describes whoever performed the
  # action and may be a human (kind=user), an API token, a service account, or
  # the Doppler bot. It is renamed to doppler.actor to avoid clobbering ECS user.*.
  ##
  - rename:
      field: doppler.user
      tag: rename_user_to_actor
      target_field: doppler.actor
      ignore_missing: true
  - rename:
      field: doppler.actor.slug
      tag: rename_actor_slug
      target_field: user.id
      ignore_missing: true
  - rename:
      field: doppler.actor.username
      tag: rename_actor_username
      target_field: user.name
      ignore_missing: true
  # Activity events carry only a display name (no login). Fall back to it so
  # user.name pivots still resolve, before the display name moves to full_name.
  - set:
      field: user.name
      tag: set_user_name_fallback
      copy_from: doppler.actor.name
      ignore_empty_value: true
      if: ctx.user?.name == null
  - rename:
      field: doppler.actor.name
      tag: rename_actor_name
      target_field: user.full_name
      ignore_missing: true
  - rename:
      field: doppler.actor.email
      tag: rename_actor_email
      target_field: user.email
      ignore_missing: true
  # doppler.actor.type is polymorphic: an object {id,name} for API tokens, a
  # string for the bot. Split it into typed fields to avoid a mapping conflict.
  - rename:
      field: doppler.actor.type
      tag: rename_actor_token_type
      target_field: doppler.actor.token_type
      ignore_missing: true
      if: ctx.doppler?.actor?.type instanceof Map
  - rename:
      field: doppler.actor.type
      tag: rename_actor_bot_type
      target_field: doppler.actor.bot_type
      ignore_missing: true
      if: ctx.doppler?.actor?.type instanceof String
  # Last-resort user.name fallback: API-token actors usually have neither a
  # username nor a display name, so use the token type name (the human-readable
  # token label) so user.name resolves for every actor kind.
  - set:
      field: user.name
      tag: set_user_name_from_token_type
      copy_from: doppler.actor.token_type.name
      ignore_empty_value: true
      if: ctx.user?.name == null
  # security.secret_read webhooks omit the top-level slug, so synthesize a stable
  # event.id from the timestamp, the now-mapped actor (user.id), and the secrets
  # read. Placed after actor mapping so user.id is populated; it survives the
  # reroute to doppler.secret_read and gives detections a correlation/dedup key.
  - fingerprint:
      fields:
        - '@timestamp'
        - user.id
        - doppler.metadata.secrets
      tag: fingerprint_secret_read_event_id
      target_field: event.id
      ignore_missing: true
      if: ctx.event?.action == 'security.secret_read' && ctx.event?.id == null
  ##
  # Workplace is the Doppler tenant/organization the event belongs to.
  ##
  - set:
      field: organization.id
      tag: set_organization_id
      copy_from: doppler.workplace.id
      ignore_empty_value: true
  - set:
      field: organization.name
      tag: set_organization_name
      copy_from: doppler.workplace.name
      ignore_empty_value: true
  ##
  # Categorize the event from the Doppler event type. Doppler types are dotted
  # hierarchies (e.g. enclave.project.access.role.update). The domain segment
  # drives event.category and the trailing verb drives event.type.
  ##
  - script:
      lang: painless
      tag: categorize_event
      description: Derive ECS event.category and event.type from the Doppler event type.
      if: ctx.event?.action instanceof String
      source: |-
        def t = ctx.event.action;
        def parts = t.splitOnToken('.');
        def last = parts[parts.length - 1];
        ArrayList cat = new ArrayList();
        ArrayList typ = new ArrayList();
        boolean iam = t == 'security.secret_read' ? false :
          (t.contains('.access.') || t.startsWith('team.group') || t.startsWith('team.seat')
            || t.startsWith('team.service_account') || t.startsWith('custom_roles')
            || t.contains('.service_token'));
        if (iam) { cat.add('iam'); } else { cat.add('configuration'); }
        if (t == 'security.secret_read') {
          typ.add('access');
        } else if (last == 'create') {
          typ.add('creation');
        } else if (last == 'delete' || last == 'revoke' || last == 'remove') {
          typ.add('deletion');
        } else if (last == 'join' || last == 'add') {
          typ.add('creation');
        } else {
          typ.add('change');
        }
        if (iam) {
          if (t.contains('group')) {
            typ.add('group');
          } else if (t.contains('seat') || t.contains('.access.') || t.contains('service_account')) {
            typ.add('user');
          }
        }
        ctx.event.category = cat;
        ctx.event.type = typ;
      on_failure:
        - append:
            field: error.message
            tag: append_categorize_event_error
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              with tag '{{{ _ingest.on_failure_processor_tag }}}'
              in pipeline '{{{ _ingest.pipeline }}}'
              failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.outcome
      tag: set_event_outcome
      value: success
  ##
  # Activity-only enrichment. security.secret_read events are rerouted to the
  # doppler.secret_read dataset (see routing_rules.yml) and shaped by that data
  # stream's pipeline, so the activity-only fields are produced in a dedicated
  # pipeline that is skipped for those security.secret_read events.
  ##
  - pipeline:
      name: '{{ IngestPipeline "activity_enrich" }}'
      tag: pipeline_activity_enrich
      if: ctx.event?.action != 'security.secret_read'
  ##
  # related.* for cross-source correlation. Includes stable IDs (user.id,
  # user.target.id) alongside names/emails so hunts can pivot by UUID too.
  ##
  - append:
      field: related.user
      tag: append_related_user_id
      value: '{{{user.id}}}'
      allow_duplicates: false
      if: ctx.user?.id != null
  - append:
      field: related.user
      tag: append_related_user_name
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_related_user_email
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_related_user_target_id
      value: '{{{user.target.id}}}'
      allow_duplicates: false
      if: ctx.user?.target?.id != null
  - append:
      field: related.user
      tag: append_related_user_target_email
      value: '{{{user.target.email}}}'
      allow_duplicates: false
      if: ctx.user?.target?.email != null
  - append:
      field: related.user
      tag: append_related_user_target_name
      value: '{{{user.target.name}}}'
      allow_duplicates: false
      if: ctx.user?.target?.name != null
  - append:
      field: related.user
      tag: append_related_user_target_full_name
      value: '{{{user.target.full_name}}}'
      allow_duplicates: false
      if: ctx.user?.target?.full_name != null
  ##
  # Clean up the consumed envelope fields and drop empty values.
  ##
  - remove:
      field:
        - doppler.source
        - doppler.title
        - doppler.createdAt
        - doppler.type
        - doppler.actor.profile_image_url
        - doppler.actor.is_bot
      tag: remove_consumed_envelope
      ignore_missing: true
  - script:
      lang: painless
      tag: drop_null_values
      description: Drops null/empty values recursively.
      source: |-
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
      on_failure:
        - append:
            field: error.message
            tag: append_drop_null_values_error
            value: >-
              Processor '{{{ _ingest.on_failure_processor_type }}}'
              with tag '{{{ _ingest.on_failure_processor_tag }}}'
              in pipeline '{{{ _ingest.pipeline }}}'
              failed with message '{{{ _ingest.on_failure_message }}}'
  - pipeline:
      name: logs-doppler.activity@custom
      ignore_missing_pipeline: true
      tag: pipeline_logs_doppler_activity_custom
  # A processor above may have caught its own failure (appending to error.message)
  # and let the document continue. Reflect any such handled error in event.kind and
  # preserve the original event so the failure is still discoverable downstream.
  - append:
      field: tags
      tag: append_preserve_original_event_on_error
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
on_failure:
  - set:
      field: event.kind
      tag: set_event_kind_pipeline_error
      value: pipeline_error
  - append:
      field: tags
      tag: append_preserve_original_event_on_failure
      value: preserve_original_event
      allow_duplicates: false
  - append:
      field: error.message
      tag: append_pipeline_failure_message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        with tag '{{{ _ingest.on_failure_processor_tag }}}'
        in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
