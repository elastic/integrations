title: "Prometheus Metrics"
type: metrics
streams:
  - package: prometheus_input
    enabled: true
    title: Elastic Package Registry metrics
    description: Collect Prometheus metrics from Elastic Package Registry
    vars:
      - name: period
        type: text
        title: Period
        default: 30s
      - name: hosts
        type: text
        title: Hosts
        multi: true
        required: true
        show_user: true
        default:
          - http://localhost:9000
        description: Base URL of the metrics endpoint `/metrics` is automatically appended.
      - name: metrics_filters.exclude
        type: text
        title: Metrics Filters Exclude
        multi: true
        required: false
        show_user: true
        default:
          - "^go_*"
          - "^promhttp_*"
      - name: data_stream.dataset
        type: text
        title: Dataset name
        description: Name of the dataset. Determines the index where data is written (metrics-<dataset>-*).
        default: elastic_package_registry.metrics
        required: true
        show_user: false
      - name: tags
        type: text
        title: Tags
        multi: true
        show_user: false
        default: []
