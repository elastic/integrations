# Define ECS constant fields as constant_keyword
# Workaround for Elasticsearch not mapping ECS nested fields automatically:
# https://github.com/elastic/elasticsearch/issues/150902.
- name: email.attachments
  external: ecs
# Child ECS fields below are only defined to work around elastic-package
# mapping validation: https://github.com/elastic/elastic-package/issues/3639.
- name: email.attachments.file.extension
  external: ecs
- name: email.attachments.file.hash.sha256
  external: ecs
- name: email.attachments.file.name
  external: ecs
- name: observer.vendor
  external: ecs
  type: constant_keyword
  value: Google Workspace
- name: observer.product
  external: ecs
  type: constant_keyword
  value: Gmail
