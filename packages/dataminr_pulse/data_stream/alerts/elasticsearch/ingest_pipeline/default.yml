---
description: Pipeline for processing Dataminr Pulse alerts with ECS mapping
processors:
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  - drop:
      tag: drop_placeholder
      if: ctx.message == 'retry'

  # Set ECS version and initial event fields
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '8.11.0'
  - set:
      field: event.kind
      tag: set_event_kind_default
      value: event
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      if: ctx.event?.original == null
      ignore_missing: true
  
  # Parse JSON first to determine document type
  - json:
      field: event.original
      tag: json_event_original
      target_field: json

  - pipeline:
      name: logs-dataminr_pulse.alerts@custom
      ignore_missing_pipeline: true
      ignore_failure: true

  # Map base alert fields
  - set:
      field: event.id
      tag: set_event_id
      copy_from: json.alertId
      ignore_empty_value: true

  # Map alertTimestamp to @timestamp
  - date:
      field: json.alertTimestamp
      tag: date_alertTimestamp
      target_field: '@timestamp'
      formats:
        - ISO8601
        - epoch_millis
      if: ctx.json?.alertTimestamp != null && ctx.json.alertTimestamp != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Map dataminrAlertUrl to event.url
  - set:
      field: event.url
      tag: set_event_url
      copy_from: json.dataminrAlertUrl
      ignore_empty_value: true

  # Map alertType.name to event.severity and store type
  - script:
      lang: painless
      tag: script_map_alert_severity
      if: ctx.json?.alertType?.name != null
      source: |
        def alertType = ctx.json.alertType.name;
        if (alertType == 'Flash') {
          ctx.event.severity = 90;
        } else if (alertType == 'Urgent') {
          ctx.event.severity = 50;
        } else {
          ctx.event.severity = 30;
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Set event.kind to alert for actual Dataminr alert documents
  - set:
      field: event.kind
      tag: set_event_kind_alert
      value: alert
      override: true
      if: ctx.json?.alertType?.name != null

 # Rename alertType name to custom field
  - rename:
      field: json.alertType.name
      tag: rename_alertType
      target_field: dataminr_pulse.alert_type.name
      ignore_missing: true
  
  # Map headline to message field
  - set:
      field: message
      tag: set_message_from_headline
      copy_from: json.headline
      ignore_empty_value: true
  
  - date:
      field: json.publicPost.timestamp
      tag: date_publicPost_timestamp
      target_field: event.created
      formats:
        - ISO8601
        - epoch_millis
      if: ctx.json?.publicPost?.timestamp != null && ctx.json.publicPost.timestamp != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - rename:
      field: json.publicPost.href
      tag: rename_publicPost_href
      target_field: dataminr_pulse.source.href
      if: ctx.json?.publicPost?.href != null && ctx.json.publicPost.href != ''
      ignore_missing: true

  - rename:
      field: json.publicPost.channels
      tag: rename_publicPost_channels
      target_field: dataminr_pulse.source.channels
      if: ctx.json?.publicPost?.channels != null && ctx.json.publicPost.channels != ''
      ignore_missing: true

  - foreach:
      field: json.publicPost.media
      if: ctx.json?.publicPost?.media != null
      tag: foreach_media_add_href
      processor:
        append:
          field: dataminr_pulse.source.media.href
          tag: add_media_href
          value: '{{{_ingest._value.href}}}'
          allow_duplicates: false
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - foreach:
      field: json.alertTopics
      if: ctx.json?.alertTopics != null
      tag: foreach_topic_add_name
      processor:
        append:
          field: dataminr_pulse.categories.name
          tag: add_topic_name
          value: '{{{_ingest._value.name}}}'
          allow_duplicates: false
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - foreach:
      field: json.alertCompanies
      if: ctx.json?.alertCompanies != null
      tag: foreach_company_add_name
      processor:
        append:
          field: dataminr_pulse.companies.name
          tag: add_company_name
          value: '{{{_ingest._value.name}}}'
          allow_duplicates: false
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - foreach:
      field: json.alertSectors
      if: ctx.json?.alertSectors != null
      tag: foreach_sector_add_name
      processor:
        append:
          field: dataminr_pulse.sectors.name
          tag: add_sector_name
          value: '{{{_ingest._value.name}}}'
          allow_duplicates: false
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Store live brief
  - rename:
      field: json.liveBrief.0.summary
      tag: rename_live_brief_summary
      target_field: dataminr_pulse.live_brief.summary
      ignore_missing: true

  - rename:
      field: json.liveBrief.0.version
      tag: rename_live_brief_version
      target_field: dataminr_pulse.live_brief.version
      ignore_missing: true

  - rename:
      field: json.liveBrief.0.timestamp
      tag: rename_live_brief_timestamp
      target_field: dataminr_pulse.live_brief.timestamp
      ignore_missing: true

  # Map EstimatedEventLocation.coordinates to source.geo.location
  - script:
      lang: painless
      tag: script_map_geo_coordinates
      if: ctx.json?.estimatedEventLocation?.coordinates != null
      source: |
        def coords = ctx.json.estimatedEventLocation.coordinates;
        if (coords instanceof List && coords.size() == 2) {
          if (ctx.source == null) { ctx.source = [:]; }
          if (ctx.source.geo == null) { ctx.source.geo = [:]; }
          if (ctx.source.geo.location == null) { ctx.source.geo.location = [:]; }
          ctx.source.geo.location.lat = coords[0];
          ctx.source.geo.location.lon = coords[1];
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Store location name
  - set:
      field: source.geo.name
      tag: set_location_name
      copy_from: json.estimatedEventLocation.name
      ignore_empty_value: true

  - script:
      lang: painless
      tag: convert_intelAgents_summary
      if: ctx.json?.intelAgents instanceof List && ctx.json.intelAgents.size() > 0 && ctx.json.intelAgents[0].summary != null
      source: |
        def summary = ctx.json.intelAgents[0].summary;
        if (summary instanceof String) {
          if (ctx.dataminr_pulse == null) { ctx.dataminr_pulse = [:]; }
          if (ctx.dataminr_pulse.intel_agents == null) { ctx.dataminr_pulse.intel_agents = [:]; }
          ctx.dataminr_pulse.intel_agents.summary = summary;
        } else if (summary instanceof List) {
          def parts = [];
          for (item in summary) {
            if (item instanceof Map) {
              def title = item.containsKey('title') ? item.title : '';
              def content = '';
              if (item.containsKey('content') && item.content instanceof List) {
                content = String.join(' ', item.content);
              }
              if (title != '' && content != '') {
                parts.add(title + ': ' + content);
              } else if (content != '') {
                parts.add(content);
              } else if (title != '') {
                parts.add(title);
              }
            } else if (item instanceof String) {
              parts.add(item);
            }
          }
          if (parts.size() > 0) {
            if (ctx.dataminr_pulse == null) { ctx.dataminr_pulse = [:]; }
            if (ctx.dataminr_pulse.intel_agents == null) { ctx.dataminr_pulse.intel_agents = [:]; }
            ctx.dataminr_pulse.intel_agents.summary = String.join(' | ', parts);
          }
        }
      on_failure:
        - append:
            field: error.message
            value: >-
              Processor {{{_ingest.on_failure_processor_type}}}
              with tag '{{{_ingest.on_failure_processor_tag}}}'
              in pipeline {{{_ingest.pipeline}}}
              failed with message: {{{_ingest.on_failure_message}}}

  - foreach:
      field: json.listsMatched
      if: ctx.json?.listsMatched != null
      tag: foreach_listmatched_add_name
      processor:
        append:
          field: dataminr_pulse.watchlists_matched_by_type.name
          tag: add_watchlist_name
          value: '{{{_ingest._value.name}}}'
          allow_duplicates: false
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Single-pass extraction of all entity types from intelAgents,
  # plus ECS mapping for the first entity of each type.
  - script:
      lang: painless
      tag: extract_entities_and_map_ecs
      if: ctx.json?.intelAgents instanceof List
      source: |
        def threatActorNames = [];
        def threatActorAliases = [];
        def threatActorCountries = [];
        def vulnerabilityNames = [];
        def malwareList = [];
        def platformsSet = new LinkedHashSet();
        def urlList = [];
        def ipList = [];
        def enrichments = [];
        def firstVulnCvss = null;
        def firstVulnDescription = null;

        for (intelAgent in ctx.json.intelAgents) {
          if (!(intelAgent.discoveredEntities instanceof List)) { continue; }
          for (entity in intelAgent.discoveredEntities) {
            if (entity.type == 'threatActor' && entity.name != null && entity.name != '') {
              if (!threatActorNames.contains(entity.name)) {
                threatActorNames.add(entity.name);
              }
              if (entity.aliases instanceof List) {
                for (alias in entity.aliases) {
                  if (!threatActorAliases.contains(alias)) {
                    threatActorAliases.add(alias);
                  }
                }
              }
              if (entity.countryOfOrigin != null) {
                def countries = entity.countryOfOrigin instanceof List ? entity.countryOfOrigin : [entity.countryOfOrigin];
                for (country in countries) {
                  if (country instanceof String && !threatActorCountries.contains(country)) {
                    threatActorCountries.add(country);
                  }
                }
              }
            } else if (entity.type == 'vulnerability') {
              def vulnName = entity.cve != null && entity.cve != '' ? entity.cve
                           : entity.name != null && entity.name != '' ? entity.name
                           : entity.id != null && entity.id != '' ? entity.id
                           : null;
              if (vulnName != null && !vulnerabilityNames.contains(vulnName)) {
                vulnerabilityNames.add(vulnName);
              }
              if (firstVulnCvss == null && entity.cvss != null) {
                firstVulnCvss = entity.cvss;
              }
              if (firstVulnDescription == null && entity.summary != null && entity.summary != '') {
                firstVulnDescription = entity.summary;
              }
            } else if (entity.type == 'malware' && entity.name != null && entity.name != '') {
              if (!malwareList.contains(entity.name)) {
                malwareList.add(entity.name);
              }
              if (entity.affectedOperatingSystems instanceof List) {
                def osMapping = [
                  'Windows': ['win', 'windows', 'win32', 'win64', 'microsoft windows'],
                  'Linux': ['elf', 'linux', 'unix'],
                  'macOS': ['mac', 'macos', 'osx', 'os x', 'darwin', 'mac os', 'mac os x'],
                  'AWS': ['aws', 'amazon web services'],
                  'Azure': ['azure', 'microsoft azure'],
                  'Azure AD': ['azure ad', 'azure active directory', 'azuread'],
                  'GCP': ['gcp', 'google cloud', 'google cloud platform'],
                  'Network': ['network'],
                  'Office 365': ['office 365', 'o365', 'office365', 'microsoft 365', 'm365'],
                  'SaaS': ['saas', 'software as a service']
                  ];
                for (os in entity.affectedOperatingSystems) {
                  if (os == null) continue;
        
                  def osLower = os.toLowerCase();
                  def normalized = null;
                
                  for (entry in osMapping.entrySet()) {
                    if (entry.getValue().contains(osLower)) {
                    normalized = entry.getKey();
                    break;
                    }
                  }
                  platformsSet.add(normalized);
              }
            }

            } else if (entity.type == 'url' && entity.name != null && entity.name != '') {
              def refanged = entity.name.replace('[.]', '.');
              if (!urlList.contains(refanged)) {
                urlList.add(refanged);
              }
              def e = [:];
              e.indicator = [:];
              e.indicator.type = 'url';
              e.indicator.name = entity.name;
              e.indicator.url = ['original': refanged];
              enrichments.add(e);
            } else if (entity.type == 'ipAddress' && entity.ip != null && entity.ip != '') {
              def refanged = entity.ip.replace('[.]', '.');
              if (!ipList.contains(refanged)) {
                ipList.add(refanged);
              }
              def e = [:];
              e.indicator = [:];
              e.indicator.name = entity.ip;
              e.indicator.ip = refanged;
              e.indicator.type = refanged.contains(':') ? 'ipv6-addr' : 'ipv4-addr';
              if (entity.ports instanceof List && entity.ports.size() > 0) {
                e.indicator.port = entity.ports;
              }
              enrichments.add(e);
            }
          }
        }

        if (ctx.dataminr_pulse == null) { ctx.dataminr_pulse = [:]; }

        if (threatActorNames.size() > 0) {
          ctx.dataminr_pulse.threatactor = [:];
          ctx.dataminr_pulse.threatactor.name = threatActorNames;
          if (threatActorAliases.size() > 0) { ctx.dataminr_pulse.threatactor.alias = threatActorAliases; }
          if (threatActorCountries.size() > 0) { ctx.dataminr_pulse.threatactor.country_of_origin = threatActorCountries; }
          if (ctx.threat == null) { ctx.threat = [:]; }
          ctx.threat.group = [:];
          ctx.threat.group.name = threatActorNames[0];
          if (threatActorAliases.size() > 0) { ctx.threat.group.alias = threatActorAliases; }
          if (threatActorCountries.size() > 0) {
            ctx.threat.indicator = [:];
            ctx.threat.indicator.geo = [:];
            ctx.threat.indicator.geo.country_iso_code = threatActorCountries;
          }
          ctx.threat.framework = 'MITRE ATT&CK';
        }

        if (vulnerabilityNames.size() > 0) {
          ctx.dataminr_pulse.vulnerability = [:];
          ctx.dataminr_pulse.vulnerability.name = vulnerabilityNames;
          ctx.vulnerability = [:];
          ctx.vulnerability.id = vulnerabilityNames[0];
          if (firstVulnCvss != null) {
            ctx.vulnerability.score = [:];
            ctx.vulnerability.score.base = firstVulnCvss;
          }
          if (firstVulnDescription != null) {
            ctx.vulnerability.description = firstVulnDescription;
          }
        }

        if (malwareList.size() > 0) {
          ctx.dataminr_pulse.malware = malwareList;
          if (ctx.threat == null) { ctx.threat = [:]; }
          ctx.threat.software = [:];
          ctx.threat.software.name = malwareList[0];
          ctx.threat.software.type = 'Malware';
          if (platformsSet.size() > 0) {
            ctx.dataminr_pulse.platforms = new ArrayList(platformsSet);
            ctx.threat.software.platforms = new ArrayList(platformsSet);
          }
        }

        if (urlList.size() > 0) { ctx.dataminr_pulse.url = urlList; }

        if (ipList.size() > 0) {
          ctx.dataminr_pulse.ip = ipList;
          if (ctx.related == null) { ctx.related = [:]; }
          ctx.related.ip = ipList;
        }

        if (enrichments.size() > 0) {
          if (ctx.threat == null) { ctx.threat = [:]; }
          ctx.threat.enrichments = enrichments;
        }
      on_failure:
        - append:
            field: error.message
            value: >-
              Processor {{{_ingest.on_failure_processor_type}}}
              with tag '{{{_ingest.on_failure_processor_tag}}}'
              in pipeline {{{_ingest.pipeline}}}
              failed with message: {{{_ingest.on_failure_message}}}

  # Dynamically set event.category and event.type based on discovered entities
  - script:
      lang: painless
      tag: set_event_category_based_on_entities
      source: |
        // Initialize event.category as array if not exists
        if (ctx.event == null) { ctx.event = [:]; }
        if (ctx.event.category == null) { ctx.event.category = []; }
        if (ctx.event.type == null) { ctx.event.type = []; }
        
        boolean hasEntities = false;
        
        // Check for vulnerability
        if (ctx.dataminr_pulse?.vulnerability?.name != null && ctx.dataminr_pulse.vulnerability.name.size() > 0) {
          if (!ctx.event.category.contains('vulnerability')) {
            ctx.event.category.add('vulnerability');
          }
          if (!ctx.event.type.contains('info')) {
            ctx.event.type.add('info');
          }
          hasEntities = true;
        }
        
        // Check for threat actor
        if (ctx.dataminr_pulse?.threatactor?.name != null && ctx.dataminr_pulse.threatactor.name.size() > 0) {
          if (!ctx.event.category.contains('threat')) {
            ctx.event.category.add('threat');
          }
          if (!ctx.event.type.contains('indicator')) {
            ctx.event.type.add('indicator');
          }
          hasEntities = true;
        }
        
        // Check for malware
        if (ctx.dataminr_pulse?.malware != null && ctx.dataminr_pulse.malware.size() > 0) {
          if (!ctx.event.category.contains('malware')) {
            ctx.event.category.add('malware');
          }
          if (!ctx.event.type.contains('info')) {
            ctx.event.type.add('info');
          }
          hasEntities = true;
        }
        
        // Check for network indicators (IPs or URLs)
        if ((ctx.dataminr_pulse?.ip != null && ctx.dataminr_pulse.ip.size() > 0) ||
            (ctx.dataminr_pulse?.url != null && ctx.dataminr_pulse.url.size() > 0)) {
          if (!ctx.event.category.contains('threat')) {
            ctx.event.category.add('threat');
          }
          if (!ctx.event.type.contains('indicator')) {
            ctx.event.type.add('indicator');
          }
          hasEntities = true;
        }
        
        // Fallback to 'web' and 'info' if no specific entities found
        if (!hasEntities) {
          ctx.event.category.add('web');
          if (!ctx.event.type.contains('info')) {
            ctx.event.type.add('info');
          }
        }
      on_failure:
        - append:
            field: error.message
            value: >-
              Processor {{{_ingest.on_failure_processor_type}}}
              with tag '{{{_ingest.on_failure_processor_tag}}}'
              in pipeline {{{_ingest.pipeline}}}
              failed with message: {{{_ingest.on_failure_message}}}

  # Map metadata.cyber.hashValues to file.hash fields
  - script:
      lang: painless
      tag: script_map_hash_values
      if: ctx.json?.metadata?.cyber?.hashValues != null
      source: |
        def hashes = ctx.json.metadata.cyber.hashValues;
        if (hashes instanceof List && hashes.size() > 0) {
          if (ctx.file == null) { ctx.file = [:]; }
          if (ctx.file.hash == null) { ctx.file.hash = [:]; }
          if (ctx.related == null) { ctx.related = [:]; }
          if (ctx.related.hash == null) { ctx.related.hash = []; }
        
          for (hash in hashes) {
            if (hash.type != null && hash.value != null) {
              def hashType = hash.type.toLowerCase();
              if (hashType == 'md5') {
                ctx.file.hash.md5 = hash.value;
                if (!ctx.related.hash.contains(hash.value)) {
                  ctx.related.hash.add(hash.value);
                }
              } else if (hashType == 'sha1') {
                ctx.file.hash.sha1 = hash.value;
                if (!ctx.related.hash.contains(hash.value)) {
                  ctx.related.hash.add(hash.value);
                }
              } else if (hashType == 'sha256') {
                ctx.file.hash.sha256 = hash.value;
                if (!ctx.related.hash.contains(hash.value)) {
                  ctx.related.hash.add(hash.value);
                }
              } else if (hashType == 'sha512') {
                ctx.file.hash.sha512 = hash.value;
                if (!ctx.related.hash.contains(hash.value)) {
                  ctx.related.hash.add(hash.value);
                }
              }
            }
          }
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - fingerprint:
      fields:
        - json.alertId
      tag: fingerprint_alert
      target_field: _id
      ignore_missing: true
      if: ctx.json?.alertId != null

  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - remove:
      field: event.original
      tag: remove_event_original
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      ignore_failure: true
      ignore_missing: true

  - remove:
      field: message
      tag: remove_message_after_rename
      if: ctx.event?.original != null
      ignore_missing: true

  - set:
      field: message
      tag: set_message_from_headline
      copy_from: json.headline
      ignore_empty_value: true

  # Clean up temporary processing fields
  - remove:
      field:
        - json
      tag: remove_temp_fields
      ignore_missing: true

  # Drop null/empty values
  - script:
      tag: script_drop_null_values
      lang: painless
      description: Drops null/empty values recursively
      source: |
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).size() == 0);
          }
          return false;
        }
        drop(ctx);

  - set:
      field: event.kind
      value: pipeline_error
      tag: set_pipeline_error_into_event_kind
      if: ctx.error?.message != null

on_failure:
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor {{{_ingest.on_failure_processor_type}}}
        with tag '{{{_ingest.on_failure_processor_tag}}}'
        in pipeline {{{_ingest.pipeline}}}
        failed with message: {{{_ingest.on_failure_message}}}
