vars: ~
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/pulse/v1/alerts
    base_url: http://{{Hostname}}:{{Port}}/pulse
    auth_url: http://{{Hostname}}:{{Port}}/auth/2/token
