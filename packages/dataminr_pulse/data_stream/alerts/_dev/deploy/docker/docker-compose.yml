version: "2.3"
services:
  dataminr_pulse:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: dataminr_pulse
    ports:
      - 8080
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8080'
    command:
      - http-server
      - --addr=:8080
      - --config=/files/config.yml
