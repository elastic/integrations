format_version: 3.5.8
name: gdacs
title: "Global Disaster Alert and Coordination System (GDACS)"
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "Ingest Global Disaster Alert and Coordination System (GDACS) events — earthquakes, tropical cyclones, floods, volcanoes, droughts, and wildfires."
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^9.3.1"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/dashboard-map.png
    title: Dashboard Map Overview
    size: 600x600
    type: image/png
  - src: /img/dashboard-viz.png
    title: Dashboard Visualization Overview
    size: 600x600
    type: image/png
icons:
  - src: /img/gdacs-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: gdacs
    title: GDACS Events
    description: Collect natural disaster events from the GDACS API.
    inputs:
      - type: cel
        title: Collect GDACS events via API
        description: Polls the GDACS Search API for natural disaster alerts and events.
owner:
  github: elastic/integrations
  type: elastic
