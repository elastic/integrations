---
description: Pipeline for processing STIX 2.1 IOCs from SOCRadar TAXII
processors:
  # Fail if error during the CEL program evaluation
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.

  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '8.17.0'
  - set:
      tag: set_event_kind
      field: event.kind
      value: enrichment
  - append:
      tag: append_event_category
      field: event.category
      value: threat
  - append:
      tag: append_event_type
      field: event.type
      value: indicator

  - set:
      tag: set_feed_name
      field: threat.feed.name
      value: SOCRadar TAXII
  - set:
      tag: set_feed_reference
      field: threat.feed.reference
      value: https://platform.socradar.com
  - rename:
      tag: rename_message_to_original
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      tag: remove_message
      field: message
      if: ctx.event?.original != null
      ignore_missing: true

  - json:
      tag: parse_stix_json
      field: event.original
      target_field: ti_socradar_taxii.stix
  - drop:
      tag: drop_non_indicator
      if: >-
        ctx.ti_socradar_taxii.stix.type != 'indicator'
  - drop:
      tag: drop_non_stix_21
      if: >-
        ctx.ti_socradar_taxii.stix.spec_version != null && ctx.ti_socradar_taxii.stix.spec_version != '2.1'

  - set:
      tag: set_event_id
      field: event.id
      copy_from: ti_socradar_taxii.stix.id
      ignore_empty_value: true
  - fingerprint:
      tag: fingerprint_dedup
      fields:
        - ti_socradar_taxii.stix.id
        - ti_socradar_taxii.stix.modified
      target_field: "_id"
      ignore_missing: true

  - date:
      tag: date_modified_timestamp
      field: ti_socradar_taxii.stix.modified
      target_field: "@timestamp"
      formats:
        - "ISO8601"
      if: ctx.ti_socradar_taxii.stix.modified != null
  - date:
      tag: date_created_fallback
      field: ti_socradar_taxii.stix.created
      target_field: "@timestamp"
      formats:
        - "ISO8601"
      if: ctx.ti_socradar_taxii.stix.modified == null && ctx.ti_socradar_taxii.stix.created != null
  - date:
      tag: date_modified
      field: ti_socradar_taxii.stix.modified
      target_field: threat.indicator.last_seen
      formats:
        - ISO8601
      if: ctx.ti_socradar_taxii.stix.modified != null
  - set:
      tag: set_modified_at
      field: threat.indicator.modified_at
      copy_from: threat.indicator.last_seen
      if: ctx.threat?.indicator?.last_seen != null
  - date:
      tag: date_valid_from
      field: ti_socradar_taxii.stix.valid_from
      target_field: threat.indicator.first_seen
      formats:
        - "ISO8601"
      if: ctx.ti_socradar_taxii.stix.valid_from != null
  - rename:
      tag: rename_name
      field: ti_socradar_taxii.stix.name
      target_field: threat.indicator.name
      ignore_missing: true

  # Set event.dataset for consistency
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: ti_socradar_taxii.indicator
  - rename:
      tag: rename_description
      field: ti_socradar_taxii.stix.description
      target_field: threat.indicator.description
      ignore_missing: true
  - set:
      tag: set_provider
      field: threat.indicator.provider
      value: SOCRadar
  - script:
      tag: script_normalize_confidence
      lang: painless
      description: Normalize confidence level, fallback to Low when absent.
      source: >
        if (ctx.ti_socradar_taxii.stix?.confidence == null) {
          ctx.threat.indicator.confidence = "Low";
        } else {
          def value = ctx.ti_socradar_taxii.stix.confidence;
          if (value == 0) {
            ctx.threat.indicator.confidence = "None";
          } else if (value >= 1 && value <= 25) {
            ctx.threat.indicator.confidence = "Low";
          } else if (value >= 26 && value <= 49) {
            ctx.threat.indicator.confidence = "Medium";
          } else if (value >= 50 && value <= 100) {
            ctx.threat.indicator.confidence = "High";
          } else {
            ctx.threat.indicator.confidence = "Not Specified";
          }
        }
  - foreach:
      tag: foreach_labels
      field: ti_socradar_taxii.stix.labels
      if: ctx.ti_socradar_taxii.stix.labels != null
      processor:
        append:
          field: tags
          value: '{{{ _ingest._value }}}'
          tag: append_tags
      ignore_missing: true
      ignore_failure: true
  - remove:
      tag: remove_labels
      field: ti_socradar_taxii.stix.labels
      ignore_missing: true

  ## TLP mapping from STIX marking-definition references
  # TLP marking-definition IDs are defined by the OASIS STIX 2.1 specification.
  # See: https://docs.oasis-open.org/cti/stix/v2.1/os/stix-v2.1-os.html#_yd3ar14ekwrs
  - script:
      tag: script_tlp_mapping
      lang: painless
      if: ctx.ti_socradar_taxii.stix?.object_marking_refs != null
      description: Map STIX TLP marking-definition IDs to TLP levels.
      params:
        tlp_map:
          'marking-definition--613f2e26-407d-48c7-9eca-b8e91df99dc9': 'WHITE'
          'marking-definition--34098fce-860f-48ae-8e50-ebd3cc5e41da': 'GREEN'
          'marking-definition--f88d31f6-486f-44da-b317-01333bde0b82': 'AMBER'
          'marking-definition--5e57c739-391a-4eb3-b6be-7d15ca92d5ed': 'RED'
      source: >
        for (def ref : ctx.ti_socradar_taxii.stix.object_marking_refs) {
          if (params.tlp_map.containsKey(ref)) {
            if (ctx.threat.indicator.marking == null) {
              ctx.threat.indicator.marking = new HashMap();
            }
            ctx.threat.indicator.marking.tlp = params.tlp_map[ref];
            break;
          }
        }

  ## IOC expiration
  - date:
      tag: date_ioc_expiration_valid_until
      field: ti_socradar_taxii.stix.valid_until
      target_field: ti_socradar_taxii.stix.ioc_expiration_date
      formats:
        - ISO8601
      if: ctx.ti_socradar_taxii.stix.valid_until != null
  - set:
      tag: set_ioc_expiration_revoked
      field: ti_socradar_taxii.stix.ioc_expiration_date
      copy_from: threat.indicator.modified_at
      ignore_empty_value: true
      if: >-
        ctx.ti_socradar_taxii.stix.ioc_expiration_date == null &&
        ctx.ti_socradar_taxii.stix.revoked != null &&
        ctx.ti_socradar_taxii.stix.revoked == true

  - script:
      tag: script_conf_ioc_expiration
      lang: painless
      description: Calculate the IOC expiration date from the configured duration when STIX valid_until is absent.
      if: >-
        ctx.ti_socradar_taxii.stix.ioc_expiration_date == null &&
        ctx._conf?.ioc_expiration_duration != null &&
        ctx._conf.ioc_expiration_duration != '' &&
        (ctx.threat?.indicator?.last_seen != null || ctx.threat?.indicator?.first_seen != null)
      source: >
        ZonedDateTime ioc_expiration_date;
        ZonedDateTime updated_at;
        def dur = ctx._conf.ioc_expiration_duration;

        if (ctx.threat.indicator.last_seen != null) {
          updated_at = ZonedDateTime.parse(ctx.threat.indicator.last_seen);
        } else {
          updated_at = ZonedDateTime.parse(ctx.threat.indicator.first_seen);
        }

        if (dur instanceof String){
          String time_unit = dur.substring(dur.length() -  1, dur.length());
          String time_value = dur.substring(0, dur.length() - 1);
          if (time_unit == 'd') {
            ioc_expiration_date = updated_at.plusDays(Long.parseLong(time_value));
          } else if (time_unit == 'h') {
            ioc_expiration_date = updated_at.plusHours(Long.parseLong(time_value));
          } else if (time_unit == 'm') {
            ioc_expiration_date = updated_at.plusMinutes(Long.parseLong(time_value));
          } else {
            if (ctx.error == null) {
              ctx.error = new HashMap();
            }
            if (ctx.error.message == null) {
              ctx.error.message = new ArrayList();
            }
            ctx.error.message.add('invalid ioc_expiration_duration: using default 90 days');
            ioc_expiration_date = updated_at.plusDays(90L);
          }
        } else {
            ioc_expiration_date = updated_at.plusDays(90L);
        }

        ctx.ti_socradar_taxii.stix.ioc_expiration_date = ioc_expiration_date;
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - script:
      tag: script_set_ioc_expiration_reason
      lang: painless
      description: Record which rule (valid_until, revoked, or configured duration) set the IOC expiration date.
      if: ctx.ti_socradar_taxii.stix.ioc_expiration_date != null
      params:
        valid_until: "Expiration set from valid_until field"
        revoked: "Expiration set from revoked field"
        default: "Expiration set by Elastic from the integration's parameter `IOC Expiration Duration`"
      source: >
        if (ctx.ti_socradar_taxii.stix.valid_until != null) {
          ctx.ti_socradar_taxii.stix.ioc_expiration_reason = params.valid_until;
        } else if (ctx.ti_socradar_taxii.stix.revoked != null && ctx.ti_socradar_taxii.stix.revoked == true) {
          ctx.ti_socradar_taxii.stix.ioc_expiration_reason = params.revoked;
        } else {
          ctx.ti_socradar_taxii.stix.ioc_expiration_reason = params.default;
        }

  - date:
      tag: date_ioc_expiration_date
      field: ti_socradar_taxii.stix.ioc_expiration_date
      target_field: ti_socradar_taxii.stix.ioc_expiration_date
      formats:
        - ISO8601
        - UNIX
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
        - fail:
            description: 'If this date processor fails, it leads to transform errors, hence failing the document for investigation.'
            message: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed'
  - rename:
      tag: rename_conf_ioc_expiration_duration
      field: _conf.ioc_expiration_duration
      target_field: ti_socradar_taxii.stix.ioc_expiration_duration
      ignore_missing: true

  ## IOC type detection from STIX pattern
  - set:
      tag: set_type_domain
      field: threat.indicator.type
      value: domain-name
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[domain-name') == true
  - set:
      tag: set_type_email_addr
      field: threat.indicator.type
      value: email-addr
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[email-addr') == true || ctx.ti_socradar_taxii.stix.pattern?.startsWith('[email-message') == true
  - set:
      tag: set_type_file
      field: threat.indicator.type
      value: file
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[file') == true
  - set:
      tag: set_type_ipv4
      field: threat.indicator.type
      value: ipv4-addr
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[ipv4-addr') == true
  - set:
      tag: set_type_ipv6
      field: threat.indicator.type
      value: ipv6-addr
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[ipv6-addr') == true
  - set:
      tag: set_type_url
      field: threat.indicator.type
      value: url
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[url') == true
  - set:
      tag: set_type_asn
      field: threat.indicator.type
      value: autonomous-system
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[autonomous-system') == true
  - set:
      tag: set_type_windows_registry
      field: threat.indicator.type
      value: windows-registry-key
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[windows-registry-key') == true
  - set:
      tag: set_type_x509
      field: threat.indicator.type
      value: x509-certificate
      if: ctx.ti_socradar_taxii.stix.pattern?.startsWith('[x509') == true

  - split:
      tag: split_pattern
      field: ti_socradar_taxii.stix.pattern
      target_field: ti_socradar_taxii.stix._patterns
      separator: '\s+AND\s+|\s+OR\s+'
      if: ctx.threat?.indicator?.type != null && ctx.ti_socradar_taxii.stix.pattern != null

  - foreach:
      tag: foreach_domain
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'domain-name'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-domain-name" }}'

  - foreach:
      tag: foreach_email
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'email-addr'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-email" }}'

  - foreach:
      tag: foreach_file
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'file'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-file" }}'

  - foreach:
      tag: foreach_ip
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type?.startsWith('ip') == true
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-ip" }}'

  - foreach:
      tag: foreach_url
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'url'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-url" }}'

  - foreach:
      tag: foreach_asn
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'autonomous-system'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-asn" }}'
  - foreach:
      tag: foreach_asn_convert
      field: threat.indicator.as.number
      if: ctx.threat?.indicator?.type == 'autonomous-system'
      ignore_missing: true
      processor:
        convert:
          field: _ingest._value
          type: long
          ignore_missing: true

  - foreach:
      tag: foreach_windows_registry
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'windows-registry-key'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-windows-registry" }}'

  - foreach:
      tag: foreach_x509
      field: ti_socradar_taxii.stix._patterns
      if: ctx.threat?.indicator?.type == 'x509-certificate'
      ignore_missing: true
      processor:
        pipeline:
          name: '{{ IngestPipeline "indicator-x509" }}'

  - remove:
      tag: remove_internal
      field:
        - _conf
        - ti_socradar_taxii.stix._patterns
      ignore_missing: true

  - script:
      tag: script_unescape_values
      lang: painless
      description: Unescape backslash-escaped values across all string fields, preserving event.original.
      source: >
        String saved_original = ctx.event?.original;
        if (ctx.event != null) ctx.event.remove('original');
        ArrayList stack = new ArrayList();
        stack.add(ctx);
        while (!stack.isEmpty()) {
          Object obj = stack.remove(stack.size() - 1);
          if (obj instanceof Map) {
            for (entry in ((Map)obj).entrySet()) {
              Object value = entry.getValue();
              if (value instanceof String) {
                entry.setValue(((String)value).replace('\\\\', '\\'));
              } else if (value instanceof Map || value instanceof List) {
                stack.add(value);
              }
            }
          } else if (obj instanceof List) {
            for (int i = 0; i < ((List)obj).size(); i++) {
              Object value = ((List)obj).get(i);
              if (value instanceof String) {
                ((List)obj).set(i, ((String)value).replace('\\\\', '\\'));
              } else if (value instanceof Map || value instanceof List) {
                stack.add(value);
              }
            }
          }
        }
        if (ctx.event != null && saved_original != null) ctx.event['original'] = saved_original;

  - remove:
      field: event.original
      tag: remove_event_original
      if: ctx.tags == null || !ctx.tags.contains('preserve_original_event')
      ignore_missing: true

  - script:
      tag: drop_null_empty_values
      lang: painless
      description: Drops null/empty values recursively.
      source: >
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).size() == 0);
          }
          return false;
        }
        drop(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >
        Processor "{{{ _ingest.on_failure_processor_type }}}" with tag "{{{ _ingest.on_failure_processor_tag }}}" in pipeline "{{{ _ingest.on_failure_pipeline }}}" failed with message "{{{ _ingest.on_failure_message }}}"
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
