type: logs
title: STIX 2.1 indicators from SOCRadar TAXII
ilm_policy: logs-ti_socradar_taxii.indicator-default_policy
streams:
  - input: cel
    enabled: true
    template_path: cel.yml.hbs
    title: Collects STIX 2.1 indicators from SOCRadar TAXII 2.1 server
    description: Collects threat intelligence indicators in STIX 2.1 format from SOCRadar's TAXII 2.1 server via CEL input.
    vars:
      - name: interval
        type: text
        title: Interval
        multi: false
        required: true
        show_user: true
        default: 5m
        description: Duration between requests to the SOCRadar TAXII server. Supported units for this parameter are h/m/s.
      - name: initial_interval
        type: text
        title: Initial Interval
        description: How far back to look for indicators the first time the agent is started. Supported units for this parameter are h/m/s.
        multi: false
        required: false
        show_user: true
        default: 10h
      - name: ioc_expiration_duration
        type: text
        title: IOC Expiration Duration
        multi: false
        required: true
        show_user: true
        default: "90d"
        description: >
          Indicator is expired after this duration since its last seen timestamp. Use [Elasticsearch time units](https://www.elastic.co/guide/en/elasticsearch/reference/current/api-conventions.html#time-units) in days, hours, or minutes (e.g 10d). Default `90d`.
      - name: limit
        type: integer
        title: Limit
        description: The maximum number of STIX objects to return per TAXII request. It must be a positive number.
        multi: false
        required: false
        show_user: false
        default: 1000
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Supported time units are ns, us, ms, s, m, h.
        multi: false
        required: false
        show_user: false
        default: 60s
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        multi: false
        required: false
        show_user: false
        default: false
        description: >
          The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-httpjson.html#_request_tracer_filename) for details.
      - name: preserve_original_event
        type: bool
        title: Preserve original event
        multi: false
        required: true
        show_user: false
        default: false
        description: Preserves a raw copy of the original event, added to the field `event.original`.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - ti_socradar_taxii-indicator
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
