    type: image/png
  - src: /img/overview.png
    title: Ticura Threat Intelligence overview dashboard
    size: 1920x1024
    type: image/png
  - src: /img/triage.png
    title: Ticura Threat Intelligence triage dashboard
    size: 1920x1024
    type: image/png
  - src: /img/trend.png
    title: Ticura Threat Intelligence trends dashboard
    size: 1920x1024
    type: image/png
icons:
  - src: /img/logo.svg
    title: Ticura logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: ticura_api
    title: Indicator
    description: Collect threat intelligence indicators from Ticura curated feeds.
    inputs:
      - type: cel
        title: Collect threat intelligence indicators from Ticura curated feeds via API.
        description: Collect threat intelligence indicators from Ticura curated feeds via the Ticura API.
