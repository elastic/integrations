    version: "^8.19.0 || ^9.0.0"
  elastic:
    subscription: "basic"
    capabilities:
      - security
owner:
  github: elastic/security-service-integrations
  type: partner
screenshots:
  - src: /img/homepage.png
    title: Ticura Threat Intelligence
