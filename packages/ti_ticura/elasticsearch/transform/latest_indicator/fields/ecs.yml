# ECS field mappings for the transform destination index. The destination is a
# plain index (not a Fleet data stream), so it does not automatically receive the
# stack-managed ecs@mappings; these fields must be declared explicitly so the
# deduplicated _latest index matches the source mappings. Only fields that Ticura
# actually delivers (ECSV1 feed) or the pipeline derives are declared.
- external: ecs
  name: ecs.version
- external: ecs
  name: error.message
- external: ecs
  name: tags
# event.* (event.module/event.dataset are constant_keyword in base-fields.yml)
- external: ecs
  name: event.action
- external: ecs
  name: event.agent_id_status
- external: ecs
  name: event.category
- external: ecs
  name: event.ingested
- external: ecs
  name: event.kind
- external: ecs
  name: event.original
- external: ecs
  name: event.provider
- external: ecs
  name: event.risk_score
- external: ecs
  name: event.severity
- external: ecs
  name: event.type
- external: ecs
  name: observer.product
- external: ecs
  name: observer.vendor
- external: ecs
  name: related.hash
- external: ecs
  name: related.hosts
- external: ecs
  name: related.ip
# dns.* — delivered by the ECSV1 feed for DNS/domain indicators (dns.resolved_ip
# must be the ip type, which dynamic mapping would not infer).
- external: ecs
  name: dns.answers.class
- external: ecs
  name: dns.answers.data
- external: ecs
  name: dns.answers.name
- external: ecs
  name: dns.answers.type
- external: ecs
  name: dns.op_code
- external: ecs
  name: dns.question.class
- external: ecs
  name: dns.question.name
- external: ecs
  name: dns.question.registered_domain
- external: ecs
  name: dns.question.top_level_domain
- external: ecs
  name: dns.resolved_ip
- external: ecs
  name: dns.response_code
- external: ecs
  name: dns.type
