input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/malformed/full?targetFormat=ECSV1
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: false
wait_for_data_timeout: 90s
# Feed delivers 12 lines: 10 valid indicators + 2 malformed events:
#   - One line with no ticura block at all
#   - One line with ticura.indicator present but uuid absent
# Both are silently dropped by the pipeline's `drop if ticura.indicator.uuid == null`
# processor. Expected count is 10, not 12.
assert:
  hit_count: 10
  fields_present:
    - ticura.indicator.uuid
