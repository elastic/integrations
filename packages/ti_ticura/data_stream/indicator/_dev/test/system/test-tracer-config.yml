input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/download/full?targetFormat=ECSV1&mode=url
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: false
    enable_request_tracer: true
wait_for_data_timeout: 90s
assert:
  hit_count: 11
