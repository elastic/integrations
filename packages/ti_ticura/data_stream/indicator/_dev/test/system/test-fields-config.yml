input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/download/full?targetFormat=ECSV1
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: false
wait_for_data_timeout: 90s
# Asserts that the pipeline-added ECS-canonical fields are present across the
# ingested documents — covers provenance, severity, and type. Uses the standard
# 10-indicator feed.
assert:
  hit_count: 11
  fields_present:
    - event.module
    - event.provider
    - event.severity
    - event.action
    - observer.vendor
    - observer.product
    - ticura.indicator.feed_ingest_timestamp
    - ticura.indicator.uuid
