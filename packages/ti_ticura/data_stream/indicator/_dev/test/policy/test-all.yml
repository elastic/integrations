data_stream:
  vars:
    url: http://host.tld
    api_token: test_api_token
    interval: 30m
    http_client_timeout: 60s
    proxy_url: http://proxy.tld
    ssl: |
      verification_mode: full
      supported_protocols:
        - TLSv1.2
        - TLSv1.3
    tags:
      - forwarded
      - ti_ticura-indicator
      - test-policy
    preserve_original_event: true
    enable_request_tracer: true
    processors: |
      - add_fields:
          target: project
          fields:
            name: myproject
            id: '574734885120952459'
