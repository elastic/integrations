fields:
  tags:
    - preserve_original_event
dynamic_fields:
  "ticura.feed_ingest_timestamp": "^.*$"
  "event.ingested": "^.*$"
  # GeoIP-derived values depend on the GeoLite2 database bundled with the
  # elastic-package version running the test, so match them by presence rather
  # than exact value to keep the test portable across stack/tooling versions.
  "threat.indicator.geo.city_name": "^.*$"
  "threat.indicator.geo.continent_name": "^.*$"
  "threat.indicator.geo.country_iso_code": "^.*$"
  "threat.indicator.geo.country_name": "^.*$"
  "threat.indicator.geo.region_iso_code": "^.*$"
  "threat.indicator.geo.region_name": "^.*$"
  "threat.indicator.geo.location.lat": "^.*$"
  "threat.indicator.geo.location.lon": "^.*$"
