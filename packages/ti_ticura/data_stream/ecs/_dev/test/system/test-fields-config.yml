input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/download/full?targetFormat=ECSV1
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: false

wait_for_data_timeout: 90s
# Asserts that all pipeline-added ECS-canonical fields are present across
# the ingested documents — covers provenance, severity, expiry, and type.
# Uses the standard 10-indicator feed.
assert:
  hit_count: 10
  fields_present:
    - event.module
    - event.provider
    - event.severity
    - event.action
    - observer.vendor
    - observer.product
    - threat.indicator.expired
    - ticura.feed_ingest_timestamp
    - ticura.uuid
