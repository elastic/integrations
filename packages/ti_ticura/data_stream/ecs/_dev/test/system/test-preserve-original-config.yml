input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/download/full?targetFormat=ECSV1
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: true

wait_for_data_timeout: 90s
# Exercises the preserve_original_event=true path end-to-end against the real
# (mock) feed, whose lines carry their own top-level `event` object. This is a
# regression guard: the json add_to_root "replace" step will delete a
# pre-written event.original, so we assert event.original actually survives to
# _source — not just that the doc count is right.
assert:
  hit_count: 10
  fields_present:
    - event.original
