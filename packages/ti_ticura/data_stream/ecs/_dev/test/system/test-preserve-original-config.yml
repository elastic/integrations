input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/download/full?targetFormat=ECSV1
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: true

wait_for_data_timeout: 90s
# Exercises the preserve_original_event=true path.
# The pipeline-level test already verifies event.original is set correctly;
# here we verify the integration remains stable (no crashes, correct doc count)
# when the flag is enabled.
assert:
  hit_count: 10
