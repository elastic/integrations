input: cel
service: cel
data_stream:
  vars:
    url: http://{{Hostname}}:{{Port}}/v1/feeds/expired/full?targetFormat=ECSV1
    api_token: test-token
    interval: 1m
    http_client_timeout: 5m
    preserve_original_event: false
wait_for_data_timeout: 90s
# Feed delivers 11 indicators (10 normal + 1 already-expired).
# The pipeline sets threat.indicator.expired:true for the indicator whose
# ticura.ages_out is in the past. All 11 are indexed — expiry is a flag,
# not a drop condition.
assert:
  hit_count: 11
  fields_present:
    - threat.indicator.expired
