type: logs
title: Elastic Common Schema API
ilm_policy: logs-ti_ticura.ecs-default_policy
streams:
  - input: httpjson
    vars:
      - name: url
        type: text
        title: Ticura URL
        multi: false
        required: true
        show_user: true
        default: https://api.ticura.io/v1/feeds/download/full?targetFormat=ECSV1
        description: URL or hostname of the Ticura API instance
      - name: api_token
        type: password
        title: Ticura API key
        multi: false
        required: true
        show_user: true
        secret: true
        description: API key used to access the Ticura API instance
      - name: interval
        type: text
        title: Download Interval
        multi: false
        required: true
        show_user: true
        default: 15m
      - name: preserve_original_event
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        default: false
        multi: false
        required: true
        show_user: true
      - name: enable_request_tracer
        title: Enable request tracing
        description: The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-httpjson.html#_request_tracer_filename) for details.
        type: bool
        default: false
        multi: false
        required: false
        show_user: false

    template_path: httpjson.yml.hbs
    title: Ticura ECS API
    description: Collect data from Ticura curated ti feeds (ECS compatible).