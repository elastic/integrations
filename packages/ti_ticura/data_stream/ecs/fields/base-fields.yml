- name: data_stream.type
  external: ecs
- name: data_stream.dataset
  external: ecs
- name: data_stream.namespace
  external: ecs
- name: '@timestamp'
  external: ecs
# Declare threat.feed as a group so it can hold multiple feed entries per indicator
# (the Ticura source may attach one or more feed entries to a single IOC).
- name: threat.feed
  type: group
  fields:
    - name: name
      external: ecs
    - name: description
      external: ecs
    - name: reference
      external: ecs
    - name: dashboard_id
      external: ecs
# threat.indicator.expired is set by the pipeline (true when ticura.ages_out < now).
- name: threat.indicator.expired
  type: boolean
  description: >-
    True when the indicator has passed its scheduled Ticura expiry (`ticura.ages_out`) at the time of ingest. Detection rules and dashboards should filter on this field to exclude stale indicators.
