format_version: 3.3.0
name: beyondinsight_password_safe
title: BeyondInsight and Password Safe
version: 0.0.1
source:
  license: "Elastic-2.0"
description: It enables real-time monitoring of privileged account access, session recordings, and password checkout patterns to help security teams maintain compliance and quickly identify potential privilege abuse.
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^8.15.3"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/overview.png
    title: Sample screenshot
    size: 3024x1640
    type: image/png
icons:
  - src: /img/logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: beyondinsight
    title: BeyondInsight and Password Safe Events
    description: Collect events from BeyondInsight and Password Safe Events Reporting
    inputs:
      - type: cel
        title: Collect events from BeyondInsight and Password Safe Events API
        description: Collect sign-in attempt, item usages, and audit events from BeyondInsight and Password Safe via API
        vars:
          - name: url
            type: text
            title: URL of BeyondInsight and Password Safe Events API Server
            description: URL of BeyondInsight and Password Safe Events API Server. eg.https://server/BeyondTrust/api/public/v3.1
            show_user: true
            required: true
          - name: apikeytoken
            type: text
            title: API Key token of BeyondInsight and Password Safe Events API Server
            description: "This is the API key token you have created on BeyondInsight password safe."
            show_user: true
            required: true
            secret: true
          - name: username
            type: text
            title: Username of BeyondInsight and Password Safe Events API Server
            description: "This is the username you have."
            show_user: true
            required: true
          - name: password
            type: text
            title: User password of BeyondInsight and Password Safe Events API Server
            description: "This is the password of user you have"
            show_user: true
            required: true
            secret: true
          - name: enable_request_tracer
            type: bool
            title: Enable request tracing
            multi: false
            required: false
            show_user: false
            description: The request tracer logs requests and responses to the agent's local filesystem for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-httpjson.html#_request_tracer_filename) for details.
          - name: http_client_timeout
            type: text
            title: HTTP Client Timeout
            description: Duration before declaring that the HTTP client connection has timed out. Valid time units are ns, us, ms, s, m, h.
            multi: false
            required: false
            show_user: true
          - name: proxy_url
            type: text
            title: Proxy URL
            description: URL to proxy connections in the form of http\[s\]://<user>:<password>@<server name/ip>:<port>
            multi: false
            required: false
            show_user: false
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: i.e. certificate_authorities, supported_protocols, verification_mode etc.
            multi: false
            required: false
            show_user: false
owner:
  github: elastic/security-service-integrations
  type: elastic
