- name: prometheus
  type: group
  description: Prometheus metadata and labels.
  fields:
    - name: labels
      type: group
      description: Prometheus target labels.
      fields:
        - name: instance
          type: keyword
          dimension: true
          description: Prometheus target instance label.
        - name: job
          type: keyword
          dimension: true
          description: Prometheus target job label.
        - name: proxy
          type: keyword
          dimension: true
          description: HAProxy proxy label exported with metrics.
        - name: state
          type: keyword
          dimension: true
          description: HAProxy state label exported with metrics.

- name: haproxy.metrics
  type: group
  fields:
    - name: haproxy_backend_active_servers
      type: double
      metric_type: gauge
      description: >-
        Total number of active UP servers with a non-zero weight
    - name: haproxy_backend_agg_check_status
      type: double
      metric_type: gauge
      description: >-
        Backend's aggregated gauge of servers' state check status
    - name: haproxy_backend_agg_server_check_status
      type: double
      metric_type: gauge
      description: >-
        [DEPRECATED] Backend's aggregated gauge of servers' status
    - name: haproxy_backend_agg_server_status
      type: double
      metric_type: gauge
      description: >-
        Backend's aggregated gauge of servers' status
    - name: haproxy_backend_backup_servers
      type: double
      metric_type: gauge
      description: >-
        Total number of backup UP servers with a non-zero weight
    - name: haproxy_backend_bytes_in_total
      type: long
      metric_type: counter
      description: >-
        Total number of request bytes since process started
    - name: haproxy_backend_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Total number of response bytes since process started
    - name: haproxy_backend_check_last_change_seconds
      type: double
      metric_type: gauge
      description: >-
        How long ago the last server state changed, in seconds
    - name: haproxy_backend_check_up_down_total
      type: long
      metric_type: counter
      description: >-
        Total number of failed checks causing UP to DOWN server transitions, per server/backend, since the worker process started
    - name: haproxy_backend_client_aborts_total
      type: long
      metric_type: counter
      description: >-
        Total number of requests or connections aborted by the client since the worker process started
    - name: haproxy_backend_connect_time_average_seconds
      type: double
      metric_type: gauge
      description: >-
        Avg. connect time for last 1024 successful connections.
    - name: haproxy_backend_connection_attempts_total
      type: long
      metric_type: counter
      description: >-
        Total number of outgoing connection attempts on this backend/server since the worker process started
    - name: haproxy_backend_connection_errors_total
      type: long
      metric_type: counter
      description: >-
        Total number of failed connections to server since the worker process started
    - name: haproxy_backend_connection_reuses_total
      type: long
      metric_type: counter
      description: >-
        Total number of reused connection on this backend/server since the worker process started
    - name: haproxy_backend_current_queue
      type: double
      metric_type: gauge
      description: >-
        Number of current queued connections
    - name: haproxy_backend_current_session_rate
      type: double
      metric_type: gauge
      description: >-
        Total number of sessions processed by this object over the last second (sessions for listeners/frontends, requests for backends/servers)
    - name: haproxy_backend_current_sessions
      type: double
      metric_type: gauge
      description: >-
        Number of current sessions on the frontend, backend or server
    - name: haproxy_backend_downtime_seconds_total
      type: double
      metric_type: gauge
      description: >-
        Total time spent in DOWN state, for server or backend
    - name: haproxy_backend_failed_header_rewriting_total
      type: long
      metric_type: counter
      description: >-
        Total number of failed HTTP header rewrites since the worker process started
    - name: haproxy_backend_http_cache_hits_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests not found in the cache on this frontend/backend since the worker process started
    - name: haproxy_backend_http_cache_lookups_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests looked up in the cache on this frontend/backend since the worker process started
    - name: haproxy_backend_http_comp_bytes_bypassed_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes that bypassed HTTP compression for this object since the worker process started (CPU/memory/bandwidth limitation)
    - name: haproxy_backend_http_comp_bytes_in_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes submitted to the HTTP compressor for this object since the worker process started
    - name: haproxy_backend_http_comp_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes emitted by the HTTP compressor for this object since the worker process started
    - name: haproxy_backend_http_comp_responses_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP responses that were compressed for this object since the worker process started
    - name: haproxy_backend_http_requests_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests processed by this object since the worker process started
    - name: haproxy_backend_http_responses_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP responses with status 100-199 returned by this object since the worker process started
    - name: haproxy_backend_internal_errors_total
      type: long
      metric_type: counter
      description: >-
        Total number of internal errors since process started
    - name: haproxy_backend_last_session_seconds
      type: double
      metric_type: gauge
      description: >-
        How long ago some traffic was seen on this object on this worker process, in seconds
    - name: haproxy_backend_limit_sessions
      type: double
      metric_type: gauge
      description: >-
        Frontend/listener/server's maxconn, backend's fullconn
    - name: haproxy_backend_loadbalanced_total
      type: long
      metric_type: counter
      description: >-
        Total number of requests routed by load balancing since the worker process started (ignores queue pop and stickiness)
    - name: haproxy_backend_max_connect_time_seconds
      type: double
      metric_type: gauge
      description: >-
        Maximum observed time spent waiting for a connection to complete
    - name: haproxy_backend_max_queue
      type: double
      metric_type: gauge
      description: >-
        Highest value of queued connections encountered since process started
    - name: haproxy_backend_max_queue_time_seconds
      type: double
      metric_type: gauge
      description: >-
        Maximum observed time spent in the queue
    - name: haproxy_backend_max_response_time_seconds
      type: double
      metric_type: gauge
      description: >-
        Maximum observed time spent waiting for a server response
    - name: haproxy_backend_max_session_rate
      type: double
      metric_type: gauge
      description: >-
        Highest value of sessions per second observed since the worker process started
    - name: haproxy_backend_max_sessions
      type: double
      metric_type: gauge
      description: >-
        Highest value of current sessions encountered since process started
    - name: haproxy_backend_max_total_time_seconds
      type: double
      metric_type: gauge
      description: >-
        Maximum observed total request+response time (request+queue+connect+response+processing)
    - name: haproxy_backend_queue_time_average_seconds
      type: double
      metric_type: gauge
      description: >-
        Avg. queue time for last 1024 successful connections.
    - name: haproxy_backend_redispatch_warnings_total
      type: long
      metric_type: counter
      description: >-
        Total number of server redispatches due to connection failures since the worker process started
    - name: haproxy_backend_requests_denied_total
      type: long
      metric_type: counter
      description: >-
        Total number of denied requests since process started
    - name: haproxy_backend_response_errors_total
      type: long
      metric_type: counter
      description: >-
        Total number of invalid responses since the worker process started
    - name: haproxy_backend_response_time_average_seconds
      type: double
      metric_type: gauge
      description: >-
        Avg. response time for last 1024 successful connections.
    - name: haproxy_backend_responses_denied_total
      type: long
      metric_type: counter
      description: >-
        Total number of denied responses since process started
    - name: haproxy_backend_retry_warnings_total
      type: long
      metric_type: counter
      description: >-
        Total number of server connection retries since the worker process started
    - name: haproxy_backend_server_aborts_total
      type: long
      metric_type: counter
      description: >-
        Total number of requests or connections aborted by the server since the worker process started
    - name: haproxy_backend_sessions_total
      type: long
      metric_type: counter
      description: >-
        Total number of sessions since process started
    - name: haproxy_backend_status
      type: double
      metric_type: gauge
      description: >-
        Current status of the service, per state label value.
    - name: haproxy_backend_total_time_average_seconds
      type: double
      metric_type: gauge
      description: >-
        Avg. total time for last 1024 successful connections.
    - name: haproxy_backend_uweight
      type: double
      metric_type: gauge
      description: >-
        Server's user weight, or sum of active servers' user weights for a backend
    - name: haproxy_backend_weight
      type: double
      metric_type: gauge
      description: >-
        Server's effective weight, or sum of active servers' effective weights for a backend
    - name: haproxy_frontend_bytes_in_total
      type: long
      metric_type: counter
      description: >-
        Total number of request bytes since process started
    - name: haproxy_frontend_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Total number of response bytes since process started
    - name: haproxy_frontend_connections_rate_max
      type: double
      metric_type: gauge
      description: >-
        Highest value of connections per second observed since the worker process started
    - name: haproxy_frontend_connections_total
      type: long
      metric_type: counter
      description: >-
        Total number of new connections accepted on this frontend since the worker process started
    - name: haproxy_frontend_current_session_rate
      type: double
      metric_type: gauge
      description: >-
        Total number of sessions processed by this object over the last second (sessions for listeners/frontends, requests for backends/servers)
    - name: haproxy_frontend_current_sessions
      type: double
      metric_type: gauge
      description: >-
        Number of current sessions on the frontend, backend or server
    - name: haproxy_frontend_denied_connections_total
      type: long
      metric_type: counter
      description: >-
        Total number of incoming connections blocked on a listener/frontend by a tcp-request connection rule since the worker process started
    - name: haproxy_frontend_denied_sessions_total
      type: long
      metric_type: counter
      description: >-
        Total number of incoming sessions blocked on a listener/frontend by a tcp-request connection rule since the worker process started
    - name: haproxy_frontend_failed_header_rewriting_total
      type: long
      metric_type: counter
      description: >-
        Total number of failed HTTP header rewrites since the worker process started
    - name: haproxy_frontend_http_cache_hits_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests not found in the cache on this frontend/backend since the worker process started
    - name: haproxy_frontend_http_cache_lookups_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests looked up in the cache on this frontend/backend since the worker process started
    - name: haproxy_frontend_http_comp_bytes_bypassed_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes that bypassed HTTP compression for this object since the worker process started (CPU/memory/bandwidth limitation)
    - name: haproxy_frontend_http_comp_bytes_in_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes submitted to the HTTP compressor for this object since the worker process started
    - name: haproxy_frontend_http_comp_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes emitted by the HTTP compressor for this object since the worker process started
    - name: haproxy_frontend_http_comp_responses_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP responses that were compressed for this object since the worker process started
    - name: haproxy_frontend_http_requests_rate_max
      type: double
      metric_type: gauge
      description: >-
        Highest value of http requests observed since the worker process started
    - name: haproxy_frontend_http_requests_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests processed by this object since the worker process started
    - name: haproxy_frontend_http_responses_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP responses with status 100-199 returned by this object since the worker process started
    - name: haproxy_frontend_intercepted_requests_total
      type: long
      metric_type: counter
      description: >-
        Total number of HTTP requests intercepted on the frontend (redirects/stats/services) since the worker process started
    - name: haproxy_frontend_internal_errors_total
      type: long
      metric_type: counter
      description: >-
        Total number of internal errors since process started
    - name: haproxy_frontend_limit_session_rate
      type: double
      metric_type: gauge
      description: >-
        Limit on the number of sessions accepted in a second (frontend only, 'rate-limit sessions' setting)
    - name: haproxy_frontend_limit_sessions
      type: double
      metric_type: gauge
      description: >-
        Frontend/listener/server's maxconn, backend's fullconn
    - name: haproxy_frontend_max_session_rate
      type: double
      metric_type: gauge
      description: >-
        Highest value of sessions per second observed since the worker process started
    - name: haproxy_frontend_max_sessions
      type: double
      metric_type: gauge
      description: >-
        Highest value of current sessions encountered since process started
    - name: haproxy_frontend_request_errors_total
      type: long
      metric_type: counter
      description: >-
        Total number of invalid requests since process started
    - name: haproxy_frontend_requests_denied_total
      type: long
      metric_type: counter
      description: >-
        Total number of denied requests since process started
    - name: haproxy_frontend_responses_denied_total
      type: long
      metric_type: counter
      description: >-
        Total number of denied responses since process started
    - name: haproxy_frontend_sessions_total
      type: long
      metric_type: counter
      description: >-
        Total number of sessions since process started
    - name: haproxy_frontend_status
      type: double
      metric_type: gauge
      description: >-
        Current status of the service, per state label value.
    - name: haproxy_process_active_peers
      type: double
      metric_type: gauge
      description: >-
        Current number of verified active peers connections on the current worker process
    - name: haproxy_process_build_info
      type: double
      metric_type: gauge
      description: >-
        Build info
    - name: haproxy_process_busy_polling_enabled
      type: double
      metric_type: gauge
      description: >-
        1 if busy-polling is currently in use on the worker process, otherwise zero (config.busy-polling)
    - name: haproxy_process_bytes_out_rate
      type: double
      metric_type: gauge
      description: >-
        Number of bytes emitted by current worker process over the last second
    - name: haproxy_process_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes emitted by current worker process since started
    - name: haproxy_process_connected_peers
      type: double
      metric_type: gauge
      description: >-
        Current number of peers having passed the connection step on the current worker process
    - name: haproxy_process_connections_total
      type: long
      metric_type: counter
      description: >-
        Total number of connections on this worker process since started
    - name: haproxy_process_current_backend_ssl_key_rate
      type: double
      metric_type: gauge
      description: >-
        Number of SSL keys created on backends in this worker process over the last second
    - name: haproxy_process_current_connection_rate
      type: double
      metric_type: gauge
      description: >-
        Number of front connections created on this worker process over the last second
    - name: haproxy_process_current_connections
      type: double
      metric_type: gauge
      description: >-
        Current number of connections on this worker process
    - name: haproxy_process_current_frontend_ssl_key_rate
      type: double
      metric_type: gauge
      description: >-
        Number of SSL keys created on frontends in this worker process over the last second
    - name: haproxy_process_current_run_queue
      type: double
      metric_type: gauge
      description: >-
        Total number of active tasks+tasklets in the current worker process
    - name: haproxy_process_current_session_rate
      type: double
      metric_type: gauge
      description: >-
        Number of sessions created on this worker process over the last second
    - name: haproxy_process_current_ssl_connections
      type: double
      metric_type: gauge
      description: >-
        Current number of SSL endpoints on this worker process (front+back)
    - name: haproxy_process_current_ssl_rate
      type: double
      metric_type: gauge
      description: >-
        Number of SSL connections created on this worker process over the last second
    - name: haproxy_process_current_tasks
      type: double
      metric_type: gauge
      description: >-
        Total number of tasks in the current worker process (active + sleeping)
    - name: haproxy_process_current_zlib_memory
      type: double
      metric_type: gauge
      description: >-
        Amount of memory currently used by HTTP compression on the current worker process (in bytes)
    - name: haproxy_process_dropped_logs_total
      type: long
      metric_type: counter
      description: >-
        Total number of dropped logs for current worker process since started
    - name: haproxy_process_failed_resolutions
      type: long
      metric_type: counter
      description: >-
        Total number of failed DNS resolutions in current worker process since started
    - name: haproxy_process_frontend_ssl_reuse
      type: double
      metric_type: gauge
      description: >-
        Percent of frontend SSL connections which did not require a new key
    - name: haproxy_process_hard_max_connections
      type: double
      metric_type: gauge
      description: >-
        Hard limit on the number of per-process connections (imposed by Memmax_MB or Ulimit-n)
    - name: haproxy_process_http_comp_bytes_in_total
      type: long
      metric_type: counter
      description: >-
        Number of bytes submitted to the HTTP compressor in this worker process over the last second
    - name: haproxy_process_http_comp_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Number of bytes emitted by the HTTP compressor in this worker process over the last second
    - name: haproxy_process_idle_time_percent
      type: double
      metric_type: gauge
      description: >-
        Percentage of last second spent waiting in the current worker thread
    - name: haproxy_process_jobs
      type: double
      metric_type: gauge
      description: >-
        Current number of active jobs on the current worker process (frontend connections, master connections, listeners)
    - name: haproxy_process_limit_connection_rate
      type: double
      metric_type: gauge
      description: >-
        Hard limit for ConnRate (global.maxconnrate)
    - name: haproxy_process_limit_http_comp
      type: double
      metric_type: gauge
      description: >-
        Limit of CompressBpsOut beyond which HTTP compression is automatically disabled
    - name: haproxy_process_limit_session_rate
      type: double
      metric_type: gauge
      description: >-
        Hard limit for SessRate (global.maxsessrate)
    - name: haproxy_process_limit_ssl_rate
      type: double
      metric_type: gauge
      description: >-
        Hard limit for SslRate (global.maxsslrate)
    - name: haproxy_process_listeners
      type: double
      metric_type: gauge
      description: >-
        Current number of active listeners on the current worker process
    - name: haproxy_process_max_backend_ssl_key_rate
      type: double
      metric_type: gauge
      description: >-
        Highest SslBackendKeyRate reached on this worker process since started (in SSL keys per second)
    - name: haproxy_process_max_connection_rate
      type: double
      metric_type: gauge
      description: >-
        Highest ConnRate reached on this worker process since started (in connections per second)
    - name: haproxy_process_max_connections
      type: double
      metric_type: gauge
      description: >-
        Hard limit on the number of per-process connections (configured or imposed by Ulimit-n)
    - name: haproxy_process_max_fds
      type: double
      metric_type: gauge
      description: >-
        Hard limit on the number of per-process file descriptors
    - name: haproxy_process_max_frontend_ssl_key_rate
      type: double
      metric_type: gauge
      description: >-
        Highest SslFrontendKeyRate reached on this worker process since started (in SSL keys per second)
    - name: haproxy_process_max_memory_bytes
      type: double
      metric_type: gauge
      description: >-
        Worker process's hard limit on memory usage in byes (-m on command line)
    - name: haproxy_process_max_pipes
      type: double
      metric_type: gauge
      description: >-
        Hard limit on the number of pipes for splicing, 0=unlimited
    - name: haproxy_process_max_session_rate
      type: double
      metric_type: gauge
      description: >-
        Highest SessRate reached on this worker process since started (in sessions per second)
    - name: haproxy_process_max_sockets
      type: double
      metric_type: gauge
      description: >-
        Hard limit on the number of per-process sockets
    - name: haproxy_process_max_ssl_connections
      type: double
      metric_type: gauge
      description: >-
        Hard limit on the number of per-process SSL endpoints (front+back), 0=unlimited
    - name: haproxy_process_max_ssl_rate
      type: double
      metric_type: gauge
      description: >-
        Highest SslRate reached on this worker process since started (in connections per second)
    - name: haproxy_process_max_zlib_memory
      type: double
      metric_type: gauge
      description: >-
        Limit on the amount of memory used by HTTP compression above which it is automatically disabled (in bytes, see global.maxzlibmem)
    - name: haproxy_process_nbproc
      type: double
      metric_type: gauge
      description: >-
        Number of started worker processes (historical, always 1)
    - name: haproxy_process_nbthread
      type: double
      metric_type: gauge
      description: >-
        Number of started threads (global.nbthread)
    - name: haproxy_process_node
      type: double
      metric_type: gauge
      description: >-
        Node name (global.node)
    - name: haproxy_process_pipes_free_total
      type: long
      metric_type: counter
      description: >-
        Current number of allocated and available pipes in this worker process
    - name: haproxy_process_pipes_used_total
      type: long
      metric_type: counter
      description: >-
        Current number of pipes in use in this worker process
    - name: haproxy_process_pool_allocated_bytes
      type: double
      metric_type: gauge
      description: >-
        Amount of memory allocated in pools (in bytes)
    - name: haproxy_process_pool_failures_total
      type: long
      metric_type: counter
      description: >-
        Number of failed pool allocations since this worker was started
    - name: haproxy_process_pool_used_bytes
      type: double
      metric_type: gauge
      description: >-
        Amount of pool memory currently used (in bytes)
    - name: haproxy_process_recv_logs_total
      type: long
      metric_type: counter
      description: >-
        Total number of log messages received by log-forwarding listeners on this worker process since started
    - name: haproxy_process_relative_process_id
      type: double
      metric_type: gauge
      description: >-
        Relative worker process number (1)
    - name: haproxy_process_requests_total
      type: long
      metric_type: counter
      description: >-
        Total number of requests on this worker process since started
    - name: haproxy_process_spliced_bytes_out_total
      type: long
      metric_type: counter
      description: >-
        Total number of bytes emitted by current worker process through a kernel pipe since started
    - name: haproxy_process_ssl_cache_lookups_total
      type: long
      metric_type: counter
      description: >-
        Total number of SSL session ID lookups in the SSL session cache on this worker since started
    - name: haproxy_process_ssl_cache_misses_total
      type: long
      metric_type: counter
      description: >-
        Total number of SSL session ID lookups that didn't find a session in the SSL session cache on this worker since started
    - name: haproxy_process_ssl_connections_total
      type: long
      metric_type: counter
      description: >-
        Total number of SSL endpoints on this worker process since started (front+back)
    - name: haproxy_process_start_time_seconds
      type: double
      metric_type: gauge
      description: >-
        Start time in seconds
    - name: haproxy_process_stopping
      type: double
      metric_type: gauge
      description: >-
        1 if the worker process is currently stopping, otherwise zero
    - name: haproxy_process_total_warnings
      type: long
      metric_type: counter
      description: >-
        Total warnings issued
    - name: haproxy_process_unstoppable_jobs
      type: double
      metric_type: gauge
      description: >-
        Current number of unstoppable jobs on the current worker process (master connections)
    - name: haproxy_process_uptime_seconds
      type: double
      metric_type: gauge
      description: >-
        How long ago this worker process was started (seconds)
    - name: haproxy_resolver_any_err
      type: double
      metric_type: gauge
      description: >-
        Any errors
    - name: haproxy_resolver_cname
      type: double
      metric_type: gauge
      description: >-
        CNAME
    - name: haproxy_resolver_cname_error
      type: double
      metric_type: gauge
      description: >-
        CNAME error
    - name: haproxy_resolver_invalid
      type: double
      metric_type: gauge
      description: >-
        Invalid
    - name: haproxy_resolver_nx
      type: double
      metric_type: gauge
      description: >-
        NX
