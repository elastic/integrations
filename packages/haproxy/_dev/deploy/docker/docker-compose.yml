services:
  haproxy-logfile:
    image: alpine
    volumes:
      - ./sample_logs:/sample_logs:ro
      - ${SERVICE_LOGS_DIR}:/var/log
    command: /bin/sh -c "cp /sample_logs/haproxy${SERVICE_VERSION:-3.2}.log /var/log/haproxy.log"
  haproxy:
    build:
      context: .
      args:
        HAPROXY_VERSION: ${SERVICE_VERSION:-3.2}
    ports:
      - 14567:14567
