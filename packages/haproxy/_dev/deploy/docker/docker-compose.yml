services:
  haproxy-logfile:
    image: alpine
    volumes:
      - ./sample_logs${SERVICE_VERSION:-3.2}:/sample_logs:ro
      - ${SERVICE_LOGS_DIR}:/var/log
    command: /bin/sh -c "cp /sample_logs/* /var/log/"
  haproxy:
    build:
      context: .
      args:
        HAPROXY_VERSION: ${SERVICE_VERSION:-3.2}
    ports:
      - 14567:14567
      - 8405:8405
