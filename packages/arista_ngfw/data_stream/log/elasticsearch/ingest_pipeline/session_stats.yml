---
description: Pipeline for processing Arista NG Firewall session stats
processors:
  ########################
  ## Session Statistics ##
  ########################
  - rename:
      field: arista.endTime
      target_field: event.end
      ignore_missing: true
      tag: rename_f17d936f
  - rename:
      field: arista.sessionEvent.timeStamp
      target_field: event.start
      ignore_missing: true
      tag: rename_8d0ccb7c

  ##############
  ## Clean Up ##
  ##############
  - remove:
      description: Remove Arista fields that are not necessary after parsing to ECS
      field:
        - arista.p2cBytes
        - arista.p2sBytes
        - arista.sessionEvent.sessionId
      ignore_missing: true
      tag: remove_e048e5f1
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
      tag: on_failure-set-event-kind
  - append:
      field: error.message
      tag: on_failure-set-error-message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}failed with message '{{{ _ingest.on_failure_message }}}'

