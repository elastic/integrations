# newer versions go on top
- version: "1.1.0"
  changes:
    - description: Rename detection rules section to avoid confusion with data enrichment.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19411
- version: "1.0.0"
  changes:
    - description: Fix IOC stream correlation pipeline field mappings for indicator enrichment.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19397
    - description: Sync CEL User-Agent version with package version.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19397
    - description: Update threat list setup documentation to describe availability delay and hourly package collection.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19397
    - description: Promote Google Threat Intelligence integration to GA.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19397
- version: "0.12.2"
  changes:
    - description: Guard against null IOC arrays in CEL programs to prevent runtime failures.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19436
- version: "0.12.1"
  changes:
    - description: Use the ECS definition for threat.enrichments.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19435
- version: "0.12.0"
  changes:
    - description: Remove unused fields from the transform.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19383
- version: "0.11.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18552
- version: "0.10.1"
  changes:
    - description: Make security rules discoverable in the Add Elastic rules UI.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19312
- version: "0.10.0"
  changes:
    - description: Prevent threat list data streams from requesting hourly packages before they are available.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19097
    - description: Add configurable availability delay for threat list data streams.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19097
- version: "0.9.0"
  changes:
    - description: Use num_failure_retries instead of unattended mode for transform failure recovery.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18404
- version: "0.8.1"
  changes:
    - description: Remove duplicate security-solution-default tag references
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17020
- version: "0.8.0"
  changes:
    - description: Update default initial interval for threat list data streams to account for the API's 2-hour delay in data availability.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16145
- version: "0.7.0"
  changes:
    - description: Add ingest pipeline references to the transforms.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16175
- version: "0.6.2"
  changes:
    - description: Downgrade the `format_version` to the minimum version that supports all the necessary features for the package.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/15602
- version: 0.6.1
  changes:
    - description: Fix the sizes of the metric panels on the two IOC-related dashboards.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/14763
- version: 0.6.0
  changes:
    - description: Add data streams - IOC Stream.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13449
- version: 0.5.0
  changes:
    - description: Add data streams - phishing, ransomware, threat_actor, trending and vulnerability_weaponization.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13236
- version: 0.4.0
  changes:
    - description: Enable Agentless deployment.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14511
- version: 0.3.0
  changes:
    - description: Add data streams - linux, malicious_network_infrastructure, malware, mobile, osx.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13190
- version: 0.2.0
  changes:
    - description: Use `terminate` processor instead of `fail` processor to handle agent errors.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14393
- version: 0.1.0
  changes:
    - description: Google Threat Intelligence integration package with "cryptominer", "first_stage_delivery_vectors", "infostealer" and "iot" data streams.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13189
