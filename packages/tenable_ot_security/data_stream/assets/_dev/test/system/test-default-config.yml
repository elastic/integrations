# The assets stream uses time-based incremental fetching with a filter
# on lastUpdate/firstSeen to select modified assets, and Relay cursor
# pagination (after/endCursor) to advance through pages within a result
# set. initial_interval must be large enough that the mock server's
# hardcoded timestamps (2024-2025) fall within the fetch window when the
# test runs; 87600h (~10 years) ensures this. The mock returns 9 assets
# across 3 pages of 3 (limit: 3).
input: cel
service: assets
vars:
  api_host: http://{{Hostname}}:{{Port}}
  key: test_api_key
data_stream:
  vars:
    interval: 10m
    initial_interval: 87600h
    limit: 3
    preserve_original_event: true
assert:
  hit_count: 9
