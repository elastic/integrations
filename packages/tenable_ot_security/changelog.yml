- version: "1.1.0"
  changes:
    - description: >-
        Fix assets data stream to use time-based incremental fetching instead of
        cursor-based pagination, preventing stale cursor errors after max_executions
        interruptions. Change @timestamp from firstSeen to ingest time so assets
        appear in recent dashboard time ranges. Guard max_executions template variable
        across all data streams.
        Upgrade note: a follow-up release will change the document fingerprint from
        a full-body hash to an id plus timestamps hash. To avoid duplicate asset documents,
        upgrade to this version first and allow at least one successful asset collection
        interval before upgrading to the fingerprint release. Do not skip this version.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17669
- version: "1.0.1"
  changes:
    - description: Use triple-brace Mustache templating when referencing variables in ingest pipelines.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17623
