- version: "2.0.0"
  changes:
    - description: >-
        Change assets document fingerprint from full-body hash to id plus
        timestamps. Assets now produce a new document only when a timestamp
        field changes, preserving update history without creating duplicates
        from non-temporal field noise.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17670
    - description: >-
        Change assets risk.total_risk field type from keyword to double.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17670
    - description: >-
        The _id scheme change means every existing asset document will be
        duplicated until lifecycle policy removes the old versions. Where
        possible, upgrade to 1.1.0 first and allow at least one successful
        asset collection interval before upgrading to this version. Where
        this is not possible, the risk.total_risk field type change triggers
        an automatic data stream rollover on upgrade, so the old backing
        index begins aging out immediately without manual intervention.
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/17670
- version: "1.1.1"
  changes:
    - description: >-
        Fix pagination loop across all data streams when multiple records share
        the same timestamp.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/18020
- version: "1.1.0"
  changes:
    - description: >-
        Fix assets data stream to use time-based incremental fetching instead of
        cursor-based pagination, preventing stale cursor errors after max_executions
        interruptions. Change @timestamp from firstSeen to ingest time so assets
        appear in recent dashboard time ranges. Guard max_executions template variable
        across all data streams.
        Upgrade note: a follow-up release will change the document fingerprint from
        a full-body hash to an id plus timestamps hash. To avoid duplicate asset documents,
        upgrade to this version first and allow at least one successful asset collection
        interval before upgrading to the fingerprint release. Do not skip this version.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17669
- version: "1.0.1"
  changes:
    - description: Use triple-brace Mustache templating when referencing variables in ingest pipelines.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17623
- version: "1.0.0"
  changes:
    - description: Release package as GA.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15298
    - description: ECS version updated to 8.17.0.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15298
    - description: Fix dashboard link for Serverless Project.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/15298
- version: "0.4.0"
  changes:
    - description: Update Kibana constraint to support 9.0.0.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14197
- version: "0.3.0"
  changes:
    - description: Breaking change to correct the field type and eliminate the use of the ECS message field in the visualization.
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/13723
- version: "0.2.1"
  changes:
