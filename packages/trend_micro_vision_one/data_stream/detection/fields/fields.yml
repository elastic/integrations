- name: trend_micro_vision_one
  type: group
  fields:
    - name: detection
      type: group
      fields:
        - name: action
          type: keyword
          description: Action by detect product.
        - name: action_result
          type: keyword
          description: Action result by detect product.
        - name: aggregated_count
          type: long
          description: Aggregated count.
        - name: attachment
          type: group
          description: Email attachment details.
          fields:
            - name: attachment_file_hash
              type: keyword
            - name: attachment_file_name
              type: keyword
            - name: attachment_file_size
              type: long
            - name: attachment_file_tlsh
              type: keyword
        - name: attachment_file_hashes
          type: keyword
        - name: attachment_file_hashs
          type: keyword
        - name: attachment_file_name
          type: keyword
        - name: attachment_file_sizes
          type: long
        - name: attachment_file_tlshes
          type: keyword
        - name: attachment_file_tlshs
          type: keyword
        - name: behavior_category
          type: keyword
          description: The matched policy category (policy section) in the BM patterns, which will always Grey-Detection here.
        - name: block
          type: keyword
          description: blocking Reason.
        - name: client_flag
          type: keyword
          description: 0:Unknown 1:src 2:dst.
        - name: client_ip
          type: ip
          description: Client IP.
        - name: component_version
          type: keyword
          description: Product component version.
        - name: compressed_file_size
          type: long
          description: File size after compressed.
        - name: data_type
          type: keyword
        - name: dce_hash1
          type: keyword
        - name: dce_hash2
          type: keyword
        - name: description
          type: keyword
        - name: destination
          type: group
          fields:
            - name: ip
              type: ip
              description: Destination IP address.
            - name: ip_group
              type: keyword
              description: Destination IP address group.
            - name: mac
              type: keyword
            - name: port
              type: long
              description: Destination port.
            - name: user
              type: keyword
            - name: zone
              type: keyword
        - name: detection
          type: keyword
          description: Yes (Tag it when it appears and the value is 1).
        - name: detection_source
          type: keyword
          description: Detection source use by Deep Discovery Inspector.
        - name: detection_type
          type: keyword
          description: Product detection type.
        - name: device
          type: group
          fields:
            - name: direction
              type: keyword
              description: '0: inbound 1: outbound 2: unknown (If cannot be parsed correctly, 2 is assigned).'
            - name: guid
              type: keyword
              description: Device GUID.
            - name: host
              type: keyword
              description: device host.
            - name: id
              type: keyword
              description: Device identity.
            - name: ip
              type: ip
              description: Devices ip list.
            - name: mac
              type: keyword
              description: Mac address.
            - name: payload_id
              type: keyword
            - name: process_name
              type: keyword
              description: Process name in device.
            - name: risk_confidence_level
              type: long
        - name: domain
          type: group
          fields:
            - name: name
              type: keyword
              description: Domain name.
        - name: dvc
          type: ip
        - name: dvchost
          type: keyword
        - name: end_time
          type: date
          description: End time.
        - name: endpoint
          type: group
          fields:
            - name: guid
              type: keyword
              description: endpoint GUID for identity.
            - name: hostname
              type: keyword
              description: Hostname of the endpoint on which the event was generated.
            - name: ip
              type: ip
              description: Endpoint IP address list.
            - name: mac
              type: keyword
              description: Endpoint Mac address.
        - name: engine_type
          type: keyword
          description: Product scan engine type.
        - name: engine_version
          type: keyword
          description: Product scan engine version.
        - name: event_id
          type: keyword
          description: Event ID.
        - name: event_name
          type: keyword
          description: Predefined event enumerator.
        - name: event_source_type
          type: keyword
        - name: event_time
          type: date
          description: Detect time.
        - name: event_time_dt
          type: date
          description: Detect time.
        - name: file_hash
          type: keyword
          description: Detect file hash value.
        - name: file_name
          type: keyword
          description: Detect file name.
        - name: file_operation
          type: keyword
          description: Operation for detect file.
        - name: file_path
          type: keyword
          description: Full file path without file name.
        - name: file_path_name
          type: keyword
          description: Full file path.
        - name: file_size
          type: long
          description: Detect file size.
        - name: file_type
          type: keyword
          description: Detect file type.
        - name: filter_risk_level
          type: keyword
        - name: first_action
          type: keyword
          description: First action.
        - name: first_action_result
          type: keyword
          description: First action result.
        - name: full_path
          type: keyword
          description: File full path.
        - name: group_id
          type: keyword
        - name: group_id_corr_key
          type: keyword
        - name: group_id_corr_values
          type: keyword
        - name: hasdtasres
          type: keyword
        - name: hostname
          type: keyword
          description: host name.
        - name: http_referer
          type: keyword
          description: http referer url.
        - name: interested
          type: group
          fields:
            - name: group
              type: keyword
            - name: host
              type: keyword
              description: Highlighted indicator for incident response members.
            - name: ip
              type: ip
              description: Highlighted indicator for incident response members.
            - name: mac
              type: keyword
              description: Highlighted indicator for incident response members.
        - name: is_hidden
          type: keyword
        - name: log_received_time
          type: date
        - name: mail_msg_direction
          type: long
        - name: mail_msg_subject
          type: keyword
        - name: mailbox
          type: keyword
        - name: malware_name
          type: keyword
          description: Malware name.
        - name: malware_type
          type: keyword
          description: Malware type.
        - name: malware_type_group
          type: keyword
        - name: mime_type
          type: keyword
          description: Mime type.
        - name: mproduct
          type: group
          fields:
            - name: name
              type: keyword
              description: Product name.
            - name: version
              type: keyword
              description: Product Version.
        - name: msg_id
          type: keyword
        - name: msg_uuid
          type: keyword
        - name: object
          type: group
          fields:
            - name: cmd
              type: keyword
              description: The command line that a process detected by Attack Discovery uses to execute other processes.
            - name: file
              type: group
              fields:
                - name: hash
                  type: group
                  fields:
                    - name: md5
                      type: keyword
                      description: File Hash Md5 value.
                    - name: sha1
                      type: keyword
                      description: File Hash Sha1 value.
                    - name: sha256
                      type: keyword
                      description: File Hash Sha256 value.
                - name: name
                  type: keyword
                  description: File name.
                - name: path
                  type: keyword
                  description: File path.
            - name: name
              type: keyword
              description: Detect object name.
            - name: pid
              type: long
              description: Detect object Pid.
            - name: signer
              type: keyword
              description: Signer.
        - name: org_id
          type: keyword
        - name: os
          type: group
          fields:
            - name: name
              type: keyword
              description: 'Supported values: Linux, Windows, macOS, macOSX.'
        - name: over_ssl
          type: keyword
        - name: p_comp
          type: keyword
        - name: parent
          type: group
          fields:
            - name: cmd
              type: keyword
              description: The command line that parent process.
            - name: file
              type: group
              fields:
                - name: hash
                  type: group
                  fields:
                    - name: sha1
                      type: keyword
                      description: Parent file sha1.
                    - name: sha256
                      type: keyword
                      description: Parent file sha256.
                - name: path
                  type: keyword
                  description: Parent file path.
        - name: peer
          type: group
          fields:
            - name: group
              type: keyword
            - name: host
              type: keyword
              description: Peer host name.
            - name: ip
              type: ip
              description: Peer ip list.
        - name: policy
          type: group
          fields:
            - name: logkey
              type: keyword
              description: Policy logkey.
            - name: name
              type: keyword
              description: Policy name.
            - name: uuid
              type: keyword
              description: Policy uuid.
        - name: potential_risk
          type: long
        - name: principal_name
          type: keyword
          description: Principal name.
        - name: process
          type: group
          fields:
            - name: cmd
              type: keyword
              description: The command line used to launch this process.
            - name: file
              type: group
              fields:
                - name: hash
                  type: group
                  fields:
                    - name: md5
                      type: keyword
                      description: Process file hash MD5 value.
                    - name: sha1
                      type: keyword
                      description: Process file hash Sha1 value.
                    - name: sha256
                      type: keyword
                      description: Process file hash Sha256 value.
                - name: path
                  type: keyword
                  description: The process file path.
            - name: name
              type: keyword
              description: Process name.
            - name: pid
              type: long
              description: Process Pid.
            - name: signer
              type: keyword
              description: Process signer.
        - name: product
          type: group
          fields:
            - name: code
              type: keyword
              description: Product code name.
            - name: name
              type: keyword
              description: product name.
            - name: version
              type: keyword
              description: Product version.
        - name: profile
          type: keyword
          description: Profile
        - name: protocol
          type: keyword
          description: Protocol detect by Deep Discovery Inspector.
        - name: protocol_group
          type: keyword
          description: Protocol group detect by Deep Discovery Inspector.
        - name: related_apt
          type: boolean
          description: 0:False, 1:True.
        - name: remarks
          type: keyword
        - name: request
          type: keyword
          description: URL.
        - name: request_base
          type: keyword
          description: Request base.
        - name: request_client_application
          type: keyword
          description: Browser user agent.
        - name: risk_level
          type: long
          description: SLF_CCCA_RISKLEVEL_UNKNOWN (0) SLF_CCCA_RISKLEVEL_LOW (1) SLF_CCCA_RISKLEVEL_MEDIUM (2) SLF_CCCA_RISKLEVEL_HIGH (3).
        - name: risk_level_value
          type: keyword
        - name: rt
          type: date
          description: Detect time.
        - name: rt_date
          type: date
        - name: rt_hour
          type: long
        - name: rt_utc
          type: date
          description: Detect utc time.
        - name: rt_week_day
          type: keyword
        - name: rule_id
          type: keyword
        - name: rule_name
          type: keyword
        - name: sam_user
          type: keyword
        - name: scan_type
          type: keyword
        - name: search_data_lake
          type: keyword
          description: Datalake name.
        - name: security_analytics
          type: group
          fields:
            - name: engine
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Security Analytics Engine.
                - name: version
                  type: keyword
                  description: Security Analytics Engine version.
        - name: sender
          type: keyword
          description: Sender.
        - name: sender_guid
          type: keyword
        - name: sender_ip
          type: ip
        - name: severity
          type: long
        - name: severity_level
          type: long
          description: severity score.
        - name: source
          type: group
          fields:
            - name: group
              type: keyword
              description: Source IP address group.
            - name: host
              type: keyword
            - name: ip
              type: ip
              description: Source IP address.
            - name: mac
              type: keyword
            - name: port
              type: long
              description: Source port.
            - name: user
              type: keyword
            - name: zone
              type: keyword
        - name: sub_name
          type: keyword
          description: Detect event subscribe name.
        - name: sub_rule_name
          type: keyword
        - name: suid
          type: keyword
          description: Suid.
        - name: tactic_id
          type: keyword
          description: Security Agent or product policy.
        - name: tags
          type: keyword
          description: Detected by Security Analytics Engine filters.
        - name: threat_name
          type: keyword
          description: Threat name.
        - name: threat_type
          type: keyword
        - name: total_count
          type: long
          description: total count.
        - name: url_cat
          type: keyword
          description: URL cat.
        - name: user
          type: group
          fields:
            - name: domain
              type: keyword
              description: User domain.
        - name: uuid
          type: keyword
          description: Log unique id.
        - name: v_lanid
          type: keyword
