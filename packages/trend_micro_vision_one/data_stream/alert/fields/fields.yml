- name: trend_micro_vision_one
  type: group
  fields:
    - name: alert
      type: group
      fields:
        - name: alert_provider
          type: keyword
          description: Alert provider.
        - name: campaign
          type: keyword
          description: An object-ref to a campaign object.
        - name: case_id
          type: keyword
          description: The unique identifier of a case.
        - name: created_by
          type: keyword
          description: Created by.
        - name: created_date
          type: date
          description: Datetime in ISO 8601 format (yyyy-MM-ddThh:mm:ssZ in UTC) that indicates the created date time of the alert.
        - name: description
          type: keyword
          description: Description of the detection model that triggered the alert.
        - name: first_investigated_date
          type: date
          description: The date and time the case status was changed to 'In progress' in ISO 8601 format (yyyy-MM-ddThh:mm:ssZ, UTC).
        - name: id
          type: keyword
          description: Workbench ID.
        - name: impact_scope
          type: group
          fields:
            - name: account_count
              type: long
              description: Count of affected account.
            - name: cloud_identity_count
              type: long
              description: The number of affected cloud resources (cloud identity).
            - name: cloud_workload_count
              type: long
              description: The number of affected cloud resources (cloud workload).
            - name: container_count
              type: long
              description: The number of affected containers.
            - name: desktop_count
              type: long
              description: Count of affected desktop.
            - name: email_address_count
              type: long
              description: Count of affected email address.
            - name: entities
              type: group
              fields:
                - name: id
                  type: keyword
                - name: management_scope_group_id
                  type: keyword
                  description: Group ID for management scope.
                - name: management_scope_instance_id
                  type: keyword
                  description: The instance ID for asset visibility scope.
                - name: management_scope_partition_key
                  type: keyword
                  description: The partition key for asset visibility scope.
                - name: provenance
                  type: keyword
                - name: related_entities
                  type: keyword
                - name: related_indicator_id
                  type: keyword
                - name: type
                  type: keyword
                - name: value
                  type: group
                  fields:
                    - name: account_value
                      type: keyword
                      description: Account or emailAddress.
                    - name: guid
                      type: keyword
                      description: GUID.
                    - name: ips
                      type: ip
                      description: Set of IPs.
                    - name: name
                      type: keyword
                      description: Host name.
            - name: server_count
              type: long
              description: Count of affected server.
        - name: incident_id
          type: keyword
          description: The incident ID which is the resource ID returned from the insight API.
        - name: indicators
          type: group
          fields:
            - name: field
              type: keyword
              description: Detailed description of the indicator.
            - name: fields
              type: keyword
              description: Detailed description of the indicator.
            - name: filter_id
              type: keyword
              description: Related matched filter ids.
            - name: first_seen_date
              type: date
              description: First seen date times from related entities, datetime in ISO 8601 format (yyyy-MM-ddThh:mm:ssZ in UTC).
            - name: id
              type: keyword
              description: Indicator ID.
            - name: last_seen_date
              type: date
              description: Last seen date times from related entities, datetime in ISO 8601 format (yyyy-MM-ddThh:mm:ssZ in UTC).
            - name: matched_indicator
              type: group
              fields:
                - name: pattern_id
                  type: keyword
                  description: Matched indicator pattern ids.
            - name: provenance
              type: keyword
              description: Provenance.
            - name: related_entities
              type: keyword
              description: Related entities.
            - name: type
              type: keyword
              description: Indicator type.
            - name: value
              type: keyword
              description: Indicator value.
            - name: value_object
              type: group
              fields:
                - name: guid
                  type: keyword
                  description: GUID.
                - name: ips
                  type: ip
                  description: Set of IPs.
                - name: name
                  type: keyword
                  description: Host name.
        - name: industry
          type: keyword
          description: Industry.
        - name: investigation_result
          type: keyword
          description: The findings of a case or investigation.
        - name: investigation_status
          type: keyword
          description: Workbench alert status.
        - name: matched_indicator_count
          type: long
          description: Matched indicator pattern count.
        - name: matched_indicators_pattern
          type: group
          fields:
            - name: id
              type: keyword
              description: Pattern ID.
            - name: matched_log
              type: keyword
              description: Pattern matched log.
            - name: pattern
              type: keyword
              description: STIX indicator will be a pattern.
            - name: tags
              type: keyword
              description: Tags defined by STIX.
        - name: matched_rule
          type: group
          fields:
            - name: filter
              type: group
              fields:
                - name: date
                  type: date
                  description: Datetime in ISO 8601 format (yyyy-MM-ddThh:mm:ssZ in UTC).
                - name: events
                  type: group
                  fields:
                    - name: date
                      type: date
                      description: Matched event date.
                    - name: type
                      type: keyword
                      description: Matched event type.
                    - name: uuid
                      type: keyword
                      description: Matched event uuid.
                - name: id
                  type: keyword
                  description: Matched filter id.
                - name: mitre_technique_id
                  type: keyword
                  description: Mitre technique id.
                - name: name
                  type: keyword
                  description: Filter name.
            - name: id
              type: keyword
              description: The rules are triggered.
            - name: name
              type: keyword
              description: Matched rule name.
        - name: model
          type: keyword
          description: Name of the detection model that triggered the alert.
        - name: model_id
          type: keyword
          description: ID of the detection model that triggered the alert.
        - name: model_type
          type: keyword
          description: Type of the detection model that triggered the alert.
        - name: owner_ids
          type: keyword
          description: The owners of the Workbench alert.
        - name: region_and_country
          type: keyword
          description: region/country.
        - name: report_link
          type: keyword
          description: A refrerence url which links to the report details analysis. For TrendMico research report, the link would link to trend blog.
        - name: schema_version
          type: keyword
          description: The version of the JSON schema, not the version of alert trigger content.
        - name: score
          type: long
          description: Overall severity assigned to the alert based on the severity of the matched detection model and the impact scope.
        - name: severity
          type: keyword
          description: Workbench alert severity.
        - name: status
          type: keyword
          description: The status of a case or investigation.
        - name: total_indicator_count
          type: long
          description: Total indicator pattern count.
        - name: updated_date
          type: date
          description: The date and time the alert was last updated in ISO 8601 format (yyyy-MM-ddThh:mm:ssZ, UTC).
        - name: workbench_link
          type: keyword
          description: Workbench URL.
