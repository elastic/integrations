                    value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: trend_micro_vision_one.alert.indicators
      tag: foreach_indicators_last_seen_date
      if: ctx.trend_micro_vision_one?.alert?.indicators instanceof List
      processor:
        foreach:
          field: _ingest._value.last_seen_date
          tag: foreach_last_seen_date
          ignore_missing: true
          processor:
            date:
              field: _ingest._value
              tag: date_last_seen_date
              target_field: _ingest._value
              formats:
                - ISO8601
              on_failure:
                - append:
                    field: error.message
                    value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: trend_micro_vision_one.alert.matched_rule
      tag: foreach_matched_rule_filter_date
      if: ctx.trend_micro_vision_one?.alert?.matched_rule instanceof List
      processor:
        foreach:
          field: _ingest._value.filter
          tag: foreach_filter_date
          ignore_missing: true
          processor:
            date:
              field: _ingest._value.date
              tag: date_filter_date
              target_field: _ingest._value.date
              formats:
                - ISO8601
              on_failure:
                - append:
                    field: error.message
                    value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: trend_micro_vision_one.alert.matched_rule
      tag: foreach_matched_rule_events_date
      if: ctx.trend_micro_vision_one?.alert?.matched_rule instanceof List
      processor:
        foreach:
          field: _ingest._value.filter
          tag: foreach_filter_events_date
          ignore_missing: true
          processor:
            foreach:
              field: _ingest._value.events
              tag: foreach_events_date
              ignore_missing: true
              processor:
                date:
                  field: _ingest._value.date
                  tag: date_event_date
                  target_field: _ingest._value.date
                  formats:
                    - ISO8601
                  on_failure:
                    - append:
                        field: error.message
                        value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # parse URI
  - uri_parts:
      field: trend_micro_vision_one.alert.workbench_link
      tag: uri_parts_workbench_link
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_4b13c5a5
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # populate ECS fields
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_updated_date
      copy_from: trend_micro_vision_one.alert.updated_date
      ignore_empty_value: true
  - set:
      field: message
      tag: set_message_from_model
      copy_from: trend_micro_vision_one.alert.model
      ignore_empty_value: true

  # event.*
  - set:
      field: event.kind
      tag: set_event_kind
      value: alert
  - script:
      tag: script_set_event_category_and_type
      lang: painless
      description: Set event.category and event.type based on description.
      if: ctx.trend_micro_vision_one?.alert?.description != null && ctx.trend_micro_vision_one.alert.description != ''
      source: |
        def eventCategory = new HashSet();
        def eventType = new HashSet();
        def description = ctx.trend_micro_vision_one.alert.description.toLowerCase();
        if (description.contains('logon')) {
          eventCategory.add('authentication');
          eventCategory.add('host');
          eventType.add('info');
        } else if (description.contains('email')) {
          eventCategory.add('email');
          eventType.add('info');
        } else if (description.contains('network')) {
          eventCategory.add('network');
          eventType.add('info');
        } else {
          eventCategory.add('malware');
          eventType.add('info');
        }
        if (!eventCategory.isEmpty()) {
          ctx.event.category = eventCategory;
        }
        if (!eventType.isEmpty()) {
          ctx.event.type = eventType;
        }
      on_failure:
        - append:
            tag: append_error_message_a708ad59
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.id
      tag: set_event_id
      copy_from: trend_micro_vision_one.alert.id
      ignore_empty_value: true
  - set:
      field: event.created
      tag: set_event_created
      copy_from: trend_micro_vision_one.alert.created_date
      ignore_empty_value: true
  - script:
      lang: painless
      description: Set event.severity from alert severity.
      tag: set_event_severity
      if: ctx.trend_micro_vision_one?.alert?.severity != null
      source: |-
        ctx.event = ctx.event ?: [:];
        String severity_value = ctx.trend_micro_vision_one.alert.severity;
        if (severity_value.equalsIgnoreCase("low")) {
          ctx.event.severity = 21;
        } else if (severity_value.equalsIgnoreCase("medium")) {
          ctx.event.severity = 47;
        } else if (severity_value.equalsIgnoreCase("high")) {
          ctx.event.severity = 73;
        } else if (severity_value.equalsIgnoreCase("critical")) {
          ctx.event.severity = 99;
        }
      on_failure:
        - append:
            tag: append_error_message_17103309
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # log.*
  - set:
      field: log.level
      tag: set_log_level
      copy_from: trend_micro_vision_one.alert.severity
      ignore_empty_value: true
  - lowercase:
      field: log.level
      tag: lowercase_log_level
      ignore_missing: true

  # threat.*
  - foreach:
      field: trend_micro_vision_one.alert.matched_rule
      tag: foreach_matched_rule_collect_technique_id
      if: ctx.trend_micro_vision_one?.alert?.matched_rule instanceof List
      processor:
        foreach:
          field: _ingest._value.filter
          tag: foreach_filter_collect_technique_id
          ignore_missing: true
          processor:
            foreach:
              field: _ingest._value.mitre_technique_id
              tag: foreach_mitre_technique_id
              ignore_missing: true
              processor:
                append:
                  field: threat.technique.id
                  tag: append_threat_technique_id
                  value: '{{{_ingest._value}}}'
                  allow_duplicates: false
  - set:
      field: threat.framework
      tag: set_threat_framework
      value: MITRE ATT&CK
      if: ctx.threat?.technique?.id != null

  # related.*
  - foreach:
      field: trend_micro_vision_one.alert.impact_scope.entities
      tag: foreach_entities_collect_related_ip
      if: ctx.trend_micro_vision_one?.alert?.impact_scope?.entities instanceof List
      processor:
        foreach:
          field: _ingest._value.value.ips
          tag: foreach_entity_value_ips
          ignore_missing: true
          processor:
            append:
              field: related.ip
              tag: append_related_ip
              value: '{{{_ingest._value}}}'
              allow_duplicates: false
  - foreach:
      field: trend_micro_vision_one.alert.indicators
      tag: foreach_trend_micro_vision_one_alert_indicators_bc9487ee
      if: ctx.trend_micro_vision_one?.alert?.indicators instanceof List
      processor:
        foreach:
          field: _ingest._value.value_object.ips
          tag: foreach_value_object_ips
          ignore_missing: true
          processor:
            append:
              field: related.ip
              tag: append_indicators_value_object_ips_to_related_ip
              value: '{{{_ingest._value}}}'
              allow_duplicates: false

  # cleanup
  - remove:
      field:
        - trend_micro_vision_one.alert.id
        - trend_micro_vision_one.alert.severity
        - trend_micro_vision_one.alert.created_date
        - trend_micro_vision_one.alert.updated_date
        - trend_micro_vision_one.alert.first_investigated_date_time
      tag: remove_custom_duplicate_fields
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
  - remove:
      field:
        - json
        - trend_micro_vision_one.alert.created_date_time
        - trend_micro_vision_one.alert.updated_date_time
      tag: remove_json
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
