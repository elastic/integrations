      lang: painless
      description: Map indicator value to value_object when value is a Map.
      if: ctx.trend_micro_vision_one?.alert?.indicators instanceof List
      source: |
        for (def indicator : ctx.trend_micro_vision_one.alert.indicators) {
          if (indicator.containsKey('value') && indicator.get('value') instanceof Map) {
            indicator.put('value_object', indicator.remove('value'));
          }
        }
      on_failure:
        - append:
            tag: append_error_message_bc5d901d
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
