---
description: Pipeline for processing alert logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'

  # parse the event JSON
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
  - drop:
      tag: drop_json_items_if_empty
      if: ctx.json?.items != null && ctx.json.items.isEmpty()
  - fingerprint:
      fields:
        - json.updatedDateTime
        - json.createdDateTime
        - json.id
      target_field: _id
      tag: fingerprint_alert
      ignore_missing: true

  # rename to snake case
  - script:
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      description: Convert camelCase to snake_case.
      if: ctx.json != null
      source: |
        String camelToSnake(String str) {
          def result = "";
          def lastCharWasUpperCase = false;
          for (int i = 0; i < str.length(); i++) {
            char c = str.charAt(i);
            if (Character.isUpperCase(c)) {
              if (i > 0 && !lastCharWasUpperCase) {
                result += "_";
              }
              result += Character.toLowerCase(c);
              lastCharWasUpperCase = true;
            } else {
              result += c;
              lastCharWasUpperCase = false;
            }
          }
          return result;
        }
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              newObj[camelToSnake(entry.getKey())] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            if (obj == "") {
              return null;
            }
            return obj;
          }
        }
        ctx.trend_micro_vision_one = ctx.trend_micro_vision_one ?: [:];
        ctx.trend_micro_vision_one.alert = convertToSnakeCase(ctx.json);

  # restructure impact_scope.entities to match previous schema
  - foreach:
      field: trend_micro_vision_one.alert.impact_scope.entities
      tag: foreach_entities_rename_entity_type
      if: ctx.trend_micro_vision_one?.alert?.impact_scope?.entities instanceof List
      processor:
        rename:
          field: _ingest._value.entity_type
          tag: rename_entity_type_to_type
          target_field: _ingest._value.type
          ignore_missing: true
  - foreach:
      field: trend_micro_vision_one.alert.impact_scope.entities
      tag: foreach_entities_rename_entity_id
      if: ctx.trend_micro_vision_one?.alert?.impact_scope?.entities instanceof List
      processor:
        rename:
          field: _ingest._value.entity_id
          tag: rename_entity_id_to_id
          target_field: _ingest._value.id
          ignore_missing: true
  - script:
      tag: script_handle_entity_value
      lang: painless
      description: Map entity_value to value object, handling both Map and non-Map values.
      if: ctx.trend_micro_vision_one?.alert?.impact_scope?.entities instanceof List
      source: |
        for (def entity : ctx.trend_micro_vision_one.alert.impact_scope.entities) {
          if (entity.containsKey('entity_value')) {
            def ev = entity.remove('entity_value');
            if (ev instanceof Map) {
              entity.put('value', ev);
            } else {
              entity.put('value', ['account_value': ev]);
            }
          }
        }
      on_failure:
        - append:
            tag: append_error_message_b9fc3e58
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: trend_micro_vision_one.alert.impact_scope.entities
      tag: foreach_entities_rename_related_indicator_ids
      if: ctx.trend_micro_vision_one?.alert?.impact_scope?.entities instanceof List
      processor:
        rename:
          field: _ingest._value.related_indicator_ids
          tag: rename_related_indicator_ids_to_related_indicator_id
          target_field: _ingest._value.related_indicator_id
          ignore_missing: true

  # restructure indicators to match previous schema
  - script:
