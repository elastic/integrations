  - script:
      tag: script_flatten_indicator_fields
      lang: painless
      description: Flatten arrays of arrays in indicator fields.
      if: ctx.trend_micro_vision_one?.alert?.indicators instanceof List
      source: |
        for (def indicator : ctx.trend_micro_vision_one.alert.indicators) {
          if (indicator.fields == null) {
            continue;
          }
          def fields = indicator.get('fields');
          if (fields instanceof String) {
            continue;
          }
          if (!(fields instanceof List)) {
            indicator.fields = null;
            continue;
          }
          if (fields.size() > 0 && fields[0] instanceof List) {
            if (fields.size() == 1) {
              Collections.sort(fields[0]);
              indicator.put('fields', fields[0]);
            } else {
              def set = new HashSet();
              for (def a : fields) {
                if (a instanceof List) {
                  for (def e : a) {
                    set.add(e);
                  }
                }
              }
              def list = new ArrayList(set);
              Collections.sort(list);
              indicator.put('fields', list);
            }
          }
        }
      on_failure:
        - append:
            tag: append_error_message_7aaeded1
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

