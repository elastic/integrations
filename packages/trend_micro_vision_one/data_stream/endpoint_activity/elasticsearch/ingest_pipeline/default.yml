      params:
        eventId:
          '1': EVENT_PROCESS
          '2': EVENT_FILE
          '3': EVENT_CONNECTIO
          '4': EVENT_DNS
          '5': EVENT_REGISTRY
          '6': EVENT_ACCOUNT
          '7': EVENT_INTERNET
          '8': XDR_EVENT_MODIFIED_PROCESS
          '9': EVENT_WINDOWS_HOOK
