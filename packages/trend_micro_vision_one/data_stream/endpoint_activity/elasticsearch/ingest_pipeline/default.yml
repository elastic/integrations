          '104': XDR_FILE_SET_SECURITY
          '105': XDR_FILE_COPY
          '106': XDR_FILE_MOVE
          '107': XDR_FILE_CLOSE
          '108': TELEMETRY_FILE_MODIFY_TIMESTAMP
          '109': TELEMETRY_FILE_MODIFY
          '201': XDR_CONNECTION_CONNECT
          '202': XDR_CONNECTION_LISTEN
          '203': XDR_CONNECTION_CONNECT_INBOUND
          '204': XDR_CONNECTION_CONNECT_OUTBOUND
          '301': XDR_DNS_QUERY
          '401': XDR_REGISTRY_CREATE
          '402': XDR_REGISTRY_SET
          '403': XDR_REGISTRY_DELETE
          '404': XDR_REGISTRY_RENAME
          '501': XDR_ACCOUNT_ADD
          '502': XDR_ACCOUNT_DELETE
          '503': XDR_ACCOUNT_IMPERSONATE
          '504': XDR_ACCOUNT_MODIFY
          '601': XDR_INTERNET_OPEN
