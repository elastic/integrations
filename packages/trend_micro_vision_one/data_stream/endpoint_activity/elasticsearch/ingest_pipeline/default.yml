      if: ctx.trend_micro_vision_one?.endpoint_activity != null
      source: |-
        def eventId = ctx.trend_micro_vision_one.endpoint_activity.event?.id;
        if (eventId != null && params.eventId.containsKey(eventId.toString())) {
          ctx.trend_micro_vision_one.endpoint_activity.event.id_value = params.eventId[eventId.toString()];
        }
        def eventSubId = ctx.trend_micro_vision_one.endpoint_activity.event?.sub_id;
        if (eventSubId != null && params.eventSubId.containsKey(eventSubId.toString())) {
          ctx.trend_micro_vision_one.endpoint_activity.event.sub_id_value = params.eventSubId[eventSubId.toString()];
        }
        def objectIntegrityLevel = ctx.trend_micro_vision_one.endpoint_activity.object?.integrity_level;
        if (objectIntegrityLevel != null && params.objectIntegrityLevel.containsKey(objectIntegrityLevel.toString())) {
          ctx.trend_micro_vision_one.endpoint_activity.object.integrity_level_value = params.objectIntegrityLevel[objectIntegrityLevel.toString()];
        }
        def objectTrueType = ctx.trend_micro_vision_one.endpoint_activity.object?.true_type;
        if (objectTrueType != null && params.objectTrueType.containsKey(objectTrueType.toString())) {
          ctx.trend_micro_vision_one.endpoint_activity.object.true_type_value = params.objectTrueType[objectTrueType.toString()];
        }
        def objectSubTrueType = ctx.trend_micro_vision_one.endpoint_activity.object?.sub_true_type;
        if (objectSubTrueType != null && params.objectSubTrueType.containsKey(objectSubTrueType.toString())) {
          ctx.trend_micro_vision_one.endpoint_activity.object.sub_true_type_value = params.objectSubTrueType[objectSubTrueType.toString()];
        }
        def winEventId = ctx.trend_micro_vision_one.endpoint_activity.win_event_id;
        if (winEventId != null && params.winEventId.containsKey(winEventId.toString())) {
          ctx.trend_micro_vision_one.endpoint_activity.win_event_id_value = params.winEventId[winEventId.toString()];
        }
      on_failure:
        - append:
            tag: append_error_message_2f2b55cf
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # populate ECS fields
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_event_time_dt
      copy_from: trend_micro_vision_one.endpoint_activity.event.time_dt
      ignore_empty_value: true

  # event.*
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - set:
      field: event.id
      tag: set_event_id_from_event_id
      copy_from: trend_micro_vision_one.endpoint_activity.event.id
      ignore_empty_value: true
  - convert:
      field: trend_micro_vision_one.endpoint_activity.win_event_id
      tag: convert_win_event_id_to_string
      target_field: event.code
      type: string
      ignore_missing: true

  # destination.*
  - set:
      field: destination.address
      tag: set_destination_address_from_destination_address
      copy_from: trend_micro_vision_one.endpoint_activity.destination.address
      ignore_empty_value: true
  - set:
      field: destination.ip
      tag: set_destination_ip_from_destination_address
      copy_from: trend_micro_vision_one.endpoint_activity.destination.address
      ignore_empty_value: true
  - geoip:
      field: destination.ip
      target_field: destination.geo
