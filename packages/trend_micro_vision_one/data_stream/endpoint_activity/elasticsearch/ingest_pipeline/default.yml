          '11': EVENT_AMSI
          '12': EVENT_WMI
          '13': TELEMETRY_MEMORY
          '14': TELEMETRY_BM
        eventSubId:
          '0': TELEMETRY_NONE
          '1': XDR_PROCESS_OPEN
          '2': XDR_PROCESS_CREATE
          '3': XDR_PROCESS_TERMINATE
          '4': XDR_PROCESS_LOAD_IMAGE
          '5': TELEMETRY_PROCESS_EXECUTE
