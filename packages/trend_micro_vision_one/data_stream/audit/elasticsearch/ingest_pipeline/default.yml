---
description: Pipeline for processing audit logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'

  # parse the event JSON
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
  - drop:
      tag: drop_json_items_if_empty
      if: ctx.json?.items != null && ctx.json.items.isEmpty()
  - fingerprint:
      fields:
        - json.loggedDateTime
        - json.loggedUser
        - json.loggedRole
        - json.category
        - json.activity
        - json.details
      target_field: _id
      tag: fingerprint_audit
      ignore_missing: true

  # rename to snake case
  - script:
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      description: Convert camelCase to snake_case.
      if: ctx.json != null
      source: |
        String camelToSnake(String str) {
          def result = "";
          def lastCharWasUpperCase = false;
          for (int i = 0; i < str.length(); i++) {
            char c = str.charAt(i);
            if (Character.isUpperCase(c)) {
              if (i > 0 && !lastCharWasUpperCase) {
                result += "_";
              }
              result += Character.toLowerCase(c);
              lastCharWasUpperCase = true;
            } else {
              result += c;
              lastCharWasUpperCase = false;
            }
          }
          return result;
        }
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              newObj[camelToSnake(entry.getKey())] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            if (obj == "") {
              return null;
            }
            return obj;
          }
        }
        ctx.trend_micro_vision_one = ctx.trend_micro_vision_one ?: [:];
        ctx.trend_micro_vision_one.audit = convertToSnakeCase(ctx.json);

  # convert values
  - date:
      field: trend_micro_vision_one.audit.logged_date_time
      tag: date_logged_date_time
      target_field: trend_micro_vision_one.audit.logged_date_time
      formats:
        - ISO8601
        - yyyy-MM-dd HH:mm:ss
      if: ctx.trend_micro_vision_one?.audit?.logged_date_time != null && ctx.trend_micro_vision_one.audit.logged_date_time != ''
      on_failure:
        - remove:
            tag: remove_trend_micro_vision_one_audit_logged_date_time_fde6e1dd
            field: trend_micro_vision_one.audit.logged_date_time
            ignore_missing: true
        - append:
            tag: append_error_message_9e16d520
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: trend_micro_vision_one.audit.ingested_date_time
      tag: date_ingested_date_time
      target_field: trend_micro_vision_one.audit.ingested_date_time
      formats:
        - ISO8601
        - yyyy-MM-dd HH:mm:ss
      if: ctx.trend_micro_vision_one?.audit?.ingested_date_time != null && ctx.trend_micro_vision_one.audit.ingested_date_time != ''
      on_failure:
        - remove:
            tag: remove_trend_micro_vision_one_audit_ingested_date_time_9b8eb306
            field: trend_micro_vision_one.audit.ingested_date_time
            ignore_missing: true
        - append:
            tag: append_error_message_c081f942
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # populate ECS fields
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_logged_date_time
      copy_from: trend_micro_vision_one.audit.logged_date_time
      ignore_empty_value: true

  # event.*
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - script:
      tag: script_set_event_category_and_type
      lang: painless
      description: Set event.category and event.type based on category and activity.
      if: ctx.trend_micro_vision_one?.audit?.category != null && ctx.trend_micro_vision_one.audit.category != '' && ctx.trend_micro_vision_one?.audit?.activity != null && ctx.trend_micro_vision_one.audit.activity != ''
      source: |
        def eventCategory = new HashSet();
        def eventType = new HashSet();
        def category = ctx.trend_micro_vision_one.audit.category.toLowerCase();
        def activity = ctx.trend_micro_vision_one.audit.activity.toLowerCase();
        if (['logon and logoff', 'saml single sign-on'].contains(category)) {
          eventCategory.add('authentication');
          if (['log on', 'enable single sign-on'].contains(activity)) {
            eventType.add('start');
          }
          if (['log off', 'disable single sign-on'].contains(activity)) {
            eventType.add('end');
          } else {
            eventType.add('info');
          }
        }
        if (['account management', 'product connector', 'Notifications', 'detection model management', 'workbench', 'response management', 'search', 'managed xdr', 'third-party integration', 'service gateway inventory', 'endpoint inventory', 'endpoint security policies', 'zero trust secure access', 'sandbox analysis', 'oat', 'security playbooks'].contains(category)) {
          eventCategory.add('authentication');
          eventType.add('info');
        }
        if (category == 'network inventory') {
          eventCategory.add('network');
          eventType.add('info');
        }
        if (category == 'threat intelligence') {
          eventCategory.add('threat');
          eventType.add('indicator');
        }
        if (activity == 'email') {
          eventCategory.add('email');
        }
        if (activity == 'file') {
          eventCategory.add('file');
        }
        if (activity == 'threat') {
          eventCategory.add('threat');
        }
        if (!eventCategory.isEmpty()) {
          ctx.event.category = eventCategory;
        }
        if (!eventType.isEmpty()) {
          ctx.event.type = eventType;
        }
      on_failure:
        - append:
            tag: append_error_message_c79475b9
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.outcome
      tag: set_event_outcome_success
      value: 'success'
      if: ctx.trend_micro_vision_one?.audit?.result == 'Successful'
  - set:
      field: event.outcome
      tag: set_event_outcome_failure
      value: 'failure'
      if: ctx.trend_micro_vision_one?.audit?.result == 'Unsuccessful'

  # source.*
  - set:
      field: source.user.name
      tag: set_source_user_name
      copy_from: trend_micro_vision_one.audit.logged_user
      ignore_empty_value: true
  - append:
      field: source.user.roles
      tag: append_logged_role_into_source_user_roles
      value: '{{{trend_micro_vision_one.audit.logged_role}}}'
      allow_duplicates: false
      if: ctx.trend_micro_vision_one?.audit?.logged_role != null

  # related.*
  - append:
      field: related.user
      tag: append_logged_user_into_related_user
      value: '{{{trend_micro_vision_one.audit.logged_user}}}'
      allow_duplicates: false
      if: ctx.trend_micro_vision_one?.audit?.logged_user != null

  # cleanup
  - remove:
      field:
        - json
      tag: remove_json
      ignore_missing: true
  - remove:
      field:
        - trend_micro_vision_one.audit.logged_date_time
        - trend_micro_vision_one.audit.logged_user
        - trend_micro_vision_one.audit.logged_role
      tag: remove_custom_duplicate_fields
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
