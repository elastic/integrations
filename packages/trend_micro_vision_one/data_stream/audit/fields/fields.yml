- name: trend_micro_vision_one
  type: group
  fields:
    - name: audit
      type: group
      fields:
        - name: access_type
          type: keyword
          description: Source of the activity.
        - name: activity
          type: keyword
          description: The activity that was performed.
        - name: category
          type: keyword
          description: The category that the performed activity belongs to.
        - name: details
          type: flattened
          description: Object that contains a list of elements to be retrieved from the "details" field.
        - name: ingested_date_time
          type: date
          description: Timestamp that indicates when the audit log was ingested.
        - name: logged_date_time
          type: date
          description: Timestamp that indicates when an activity occured.
        - name: logged_role
          type: keyword
          description: Role of the account.
        - name: logged_user
          type: keyword
          description: The account that was used to perform the activity.
        - name: result
          type: keyword
          description: Result.
