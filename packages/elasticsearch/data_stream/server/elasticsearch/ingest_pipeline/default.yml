---
description: Pipeline for parsing elasticsearch server logs
processors:
  - set:
      field: event.ingested
      value: "{{_ingest.timestamp}}"
  - grok:
      field: message
      patterns:
        - ^%{CHAR:first_char}
      pattern_definitions:
        CHAR: .
  - drop:
      if: ctx.first_char != '{'
  - pipeline:
      if: ctx.first_char == '{'
      name: '{{ IngestPipeline "pipeline-json" }}'
  - set:
      copy_from: "@timestamp"
      field: event.created
  - script:
      lang: painless
      source: >-
        def gc = ctx?.elasticsearch?.server?.gc;
        def observationDuration = gc?.observation_duration;
        if (observationDuration != null) {
          if (observationDuration.unit == params.seconds_unit) {
            observationDuration.ms = observationDuration.time * params.ms_in_one_s;
          }
          if (observationDuration.unit == params.milliseconds_unit) {
            observationDuration.ms = observationDuration.time;
          }
          if (observationDuration.unit == params.minutes_unit) {
            observationDuration.ms = observationDuration.time * params.ms_in_one_m;
          }
        }
        def collectionDuration = gc?.collection_duration;
        if (collectionDuration != null) {
          if (collectionDuration.unit == params.seconds_unit) {
            collectionDuration.ms = collectionDuration.time * params.ms_in_one_s;
          }
          if (collectionDuration.unit == params.milliseconds_unit) {
            collectionDuration.ms = collectionDuration.time;
          }
          if (collectionDuration.unit == params.minutes_unit) {
            collectionDuration.ms = collectionDuration.time * params.ms_in_one_m;
          }
        }
      params:
        minutes_unit: m
        seconds_unit: s
        milliseconds_unit: ms
        ms_in_one_s: 1000
        ms_in_one_m: 60000

  - set:
      field: event.kind
      value: event
  - set:
      field: event.category
      value: [database]
  - script:
      lang: painless
      source: >-
        def errorLevels = ['FATAL', 'ERROR'];
        if (ctx?.log?.level != null) {
          if (errorLevels.contains(ctx.log.level)) {
            ctx.event.type = ['error'];
          } else {
            ctx.event.type = ['info'];
          }
        }
  - set:
      field: host.name
      value: "{{elasticsearch.node.name}}"
      ignore_empty_value: true
  - set:
      field: host.id
      value: "{{elasticsearch.node.id}}"
      ignore_empty_value: true
  - rename:
      field: tags
      target_field: elasticsearch.server.tags
      ignore_missing: true
  - remove:
      field:
        - elasticsearch.server.gc.collection_duration.time
        - elasticsearch.server.gc.collection_duration.unit
        - elasticsearch.server.gc.observation_duration.time
        - elasticsearch.server.gc.observation_duration.unit
      ignore_missing: true
  - remove:
      field:
        - first_char
on_failure:
  - set:
      field: error.message
      value: "{{ _ingest.on_failure_message }}"
