- name: input.type
  type: keyword
- name: log.offset
  type: long
- name: auth
  type: group
  fields:
    - name: type
      type: keyword
      description: Authentication type for the query request
- name: user.realm
  type: keyword
  description: User authentication realm when present in query logs
- name: http.request.headers.x_opaque_id
  type: keyword
  description: X-Opaque-Id header from the HTTP request when present
- name: elasticsearch
  type: group
  fields:
    - name: component
      type: keyword
      description: Elasticsearch component from where the log event originated
    - name: cluster.uuid
      type: keyword
      description: UUID of the cluster
    - name: cluster.name
      type: keyword
      description: Name of the cluster
    - name: node.id
      type: keyword
      description: ID of the node
    - name: node.name
      type: keyword
      description: Name of the node
    - name: index.name
      type: keyword
      description: Index name
    - name: index.id
      type: keyword
      description: Index id
    - name: shard.id
      type: keyword
      description: Id of the shard
    - name: task
      type: group
      fields:
        - name: id
          type: keyword
          description: Task id for the query task
    - name: parent
      type: group
      fields:
        - name: task
          type: group
          fields:
            - name: id
              type: keyword
              description: Parent task id when the task has a parent
        - name: node
          type: group
          fields:
            - name: id
              type: keyword
              description: Parent node id, present together with parent task id
