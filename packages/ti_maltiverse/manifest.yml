name: ti_maltiverse
title: Maltiverse
version: "1.8.0"
description: Ingest threat intelligence indicators from Maltiverse feeds with Elastic Agent
type: integration
format_version: 3.3.2
categories:
  - security
  - threat_intel
conditions:
  kibana:
    version: "^8.19.2 || ^9.0.5"
icons:
  - src: /img/logo-maltiverse.svg
    title: Maltiverse
    size: 678x566
    type: image/svg+xml
policy_templates:
  - name: ti_maltiverse
    title: Maltiverse
    description: Ingest threat intelligence indicators from Maltiverse feeds with Elastic Agent
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        release: beta
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: httpjson
        title: "Collect threat intelligence feeds from Maltiverse API."
        description: "Use Maltiverse API to fetch a feed"
owner:
  github: elastic/security-service-integrations
  type: partner
