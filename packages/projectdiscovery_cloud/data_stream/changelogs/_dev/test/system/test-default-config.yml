service: projectdiscovery-changelogs
vars: ~
input: cel
data_stream:
  vars:
    base_url: http://{{Hostname}}:{{Port}}
    api_key: "${NUCLEI_API_KEY}"
    team_id: "${NUCLEI_TEAM_ID}"
    interval: 1s
    batch_size: 2
    time_window: ""
    http_client_timeout: 5s
    enable_request_tracer: false
    preserve_original_event: true
    preserve_duplicate_custom_fields: false

assert:
  hit_count: 4
