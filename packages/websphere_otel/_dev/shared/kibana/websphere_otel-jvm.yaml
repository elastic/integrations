dashboards:
  - id: websphere_otel-jvm
    name: '[WebSphere OTel] JVM Health'
    minimum_kibana_version: '8.18.0'
    description: >-
      JVM runtime health for WebSphere Application Server: memory usage,
      CPU utilisation, transactions, and session management.
    time_range:
      from: "now-1h"
      to: "now"
    settings:
      margins: true
      sync:
        cursor: true
        tooltips: false
    filters:
      - field: data_stream.dataset
        equals: websphere.otel
    controls:
      - type: options
        label: Host
        data_view: metrics-*
        field: host.name

    panels:
      # ─── Navigation ─────────────────────────────────────────────────────
      - title: Navigation
        size: {w: 48, h: 2}
        links:
          layout: horizontal
          items:
            - label: Overview
              dashboard: websphere_otel-overview
            - label: Servlet Performance
              dashboard: websphere_otel-servlet-performance
            - label: Resource Pools
              dashboard: websphere_otel-resource-pools
            - label: JVM Health
              dashboard: websphere_otel-jvm

      # ─── Overview + KPIs ───────────────────────────────────────────────
      - hide_title: true
        size: {w: 16, h: 12}
        markdown:
          content: |
            ## [WebSphere OTel] JVM Health

            JVM runtime health and application-level metrics:
            - Memory usage and utilisation
            - CPU utilisation (process and system)
            - Transaction commit/rollback/timeout rates
            - HTTP session lifecycle

      - title: Process CPU
        hide_title: true
        size: {w: 16, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.process_cpu_utilization IS NOT NULL
            - STATS cpu = AVG(metrics.process_cpu_utilization)
          primary:
            field: cpu
            label: Process CPU
            format:
              type: percent
              decimals: 1

      - title: Memory Used
        hide_title: true
        size: {w: 16, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.jvm_memory_used_bytes IS NOT NULL
            - STATS mem_used = MAX(LAST_OVER_TIME(metrics.jvm_memory_used_bytes))
          primary:
            field: mem_used
            label: JVM Memory Used
            format:
              type: bytes

      - title: Memory Max
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.jvm_memory_max_bytes IS NOT NULL
            - STATS mem_max = MAX(LAST_OVER_TIME(metrics.jvm_memory_max_bytes))
          primary:
            field: mem_max
            label: Memory Max
            format:
              type: bytes

      - title: System CPU
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.system_cpu_utilization IS NOT NULL
            - STATS sys_cpu = AVG(metrics.system_cpu_utilization)
          primary:
            field: sys_cpu
            label: System CPU
            format:
              type: percent
              decimals: 1

      # ─── JVM Memory ────────────────────────────────────────────────────
      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## JVM Memory'

      - title: Memory Usage Over Time
        size: {w: 32, h: 12}
        esql:
          type: line
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.jvm_memory_used_bytes IS NOT NULL
            - STATS used = MAX(LAST_OVER_TIME(metrics.jvm_memory_used_bytes)), committed = MAX(LAST_OVER_TIME(metrics.jvm_memory_committed_bytes)), mem_max = MAX(LAST_OVER_TIME(metrics.jvm_memory_max_bytes)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: used
              label: Used
              format:
                type: bytes
            - field: committed
              label: Committed
              format:
                type: bytes
            - field: mem_max
              label: Max
              format:
                type: bytes
          color:
            assignments:
              - value: "Used"
                color: '#54b399'
              - value: "Committed"
                color: '#d6bf57'
              - value: "Max"
                color: '#cc5642'

      - title: Memory Utilisation
        size: {w: 16, h: 12}
        esql:
          type: gauge
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.jvm_memory_used_bytes IS NOT NULL
            - STATS used = MAX(LAST_OVER_TIME(metrics.jvm_memory_used_bytes)), mem_max = MAX(LAST_OVER_TIME(metrics.jvm_memory_max_bytes))
            - EVAL mem_pct = CASE(mem_max > 0, used / mem_max, 0), min_val = 0, max_val = 1, goal_val = 0.7
          metric:
            field: mem_pct
            label: Memory
            format:
              type: percent
              decimals: 1
          minimum:
            field: min_val
          maximum:
            field: max_val
          goal:
            field: goal_val
          color:
            range_min: 0
            range_max: 1
            thresholds:
              - up_to: 0.7
                color: '#54b399'
              - up_to: 0.85
                color: '#d6bf57'
              - up_to: 1
                color: '#cc5642'
          appearance:
            shape: arc
            ticks_position: bands

      # ─── JVM CPU ───────────────────────────────────────────────────────
      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## CPU Utilisation'

      - title: CPU Utilisation Over Time
        size: {w: 48, h: 12}
        esql:
          type: line
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.process_cpu_utilization IS NOT NULL
            - STATS process_cpu = AVG(metrics.process_cpu_utilization), system_cpu = AVG(metrics.system_cpu_utilization) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: process_cpu
              label: Process CPU
              format:
                type: percent
                decimals: 1
            - field: system_cpu
              label: System CPU
              format:
                type: percent
                decimals: 1

      # ─── Transactions ──────────────────────────────────────────────────
      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Transactions'

      - title: Transaction Throughput Over Time
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.was_transactionmanager_committed_total IS NOT NULL
            - STATS committed = SUM(RATE(metrics.was_transactionmanager_committed_total)), rolledback = SUM(RATE(metrics.was_transactionmanager_rolledback_total)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: committed
              label: Committed/s
              format:
                type: number
                decimals: 2
            - field: rolledback
              label: Rolled Back/s
              format:
                type: number
                decimals: 2
          color:
            assignments:
              - value: "Committed/s"
                color: '#54b399'
              - value: "Rolled Back/s"
                color: '#cc5642'

      - title: Transaction Failures Over Time
        size: {w: 24, h: 12}
        esql:
          type: area
          mode: stacked
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.was_transactionmanager_rolledback_total IS NOT NULL
            - STATS rolledback = SUM(RATE(metrics.was_transactionmanager_rolledback_total)), timedout = SUM(RATE(metrics.was_transactionmanager_timedout_total)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: rolledback
              label: Rolled Back/s
              format:
                type: number
                decimals: 2
            - field: timedout
              label: Timed Out/s
              format:
                type: number
                decimals: 2
          color:
            assignments:
              - value: "Rolled Back/s"
                color: '#E7664C'
              - value: "Timed Out/s"
                color: '#cc5642'

      # ─── Sessions ──────────────────────────────────────────────────────
      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## HTTP Sessions'

      - title: Active Sessions Over Time
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.was_session_active_sessions IS NOT NULL
            - STATS active = SUM(LAST_OVER_TIME(metrics.was_session_active_sessions)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.appname
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: active
              label: Active Sessions
              format:
                type: number
                decimals: 0
          breakdown:
            field: attributes.appname
          legend:
            visible: show
            position: right

      - title: Session Lifecycle Over Time
        size: {w: 24, h: 12}
        esql:
          type: bar
          mode: stacked
          query:
            - TS metrics-websphere.otel-default
            - WHERE metrics.was_session_create_total IS NOT NULL
            - STATS created = SUM(RATE(metrics.was_session_create_total)), invalidated = SUM(RATE(metrics.was_session_invalidated_total)), no_room = SUM(RATE(metrics.was_session_noRoomForNewSession_total)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: created
              label: Created/s
              format:
                type: number
                decimals: 2
            - field: invalidated
              label: Invalidated/s
              format:
                type: number
                decimals: 2
            - field: no_room
              label: No Room/s
              format:
                type: number
                decimals: 2
          color:
            assignments:
              - value: "Created/s"
                color: '#54b399'
              - value: "Invalidated/s"
                color: '#d6bf57'
              - value: "No Room/s"
                color: '#cc5642'
