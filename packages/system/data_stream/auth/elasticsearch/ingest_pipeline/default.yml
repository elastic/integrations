---
description: Entrypoint pipeline for system integration auth data stream
processors:
  - rename:
      tag: rename_message
      if: ctx.event?.original == null
      field: message
      target_field: event.original
      ignore_missing: true
  - pipeline:
      if: ctx?.input.type == "journald"
      name: '{{ IngestPipeline "journald" }}'
  - pipeline:
      if: ctx?.input.type == "log" # the pipeline tests do not have this property set
      name: '{{ IngestPipeline "log" }}'
  - remove:
      tag: remove_event-original
      field: event.original
      if: "ctx?.tags == null || !(ctx.tags.contains('preserve_original_event'))"
      ignore_failure: true
      ignore_missing: true
on_failure:
  - set:
      field: error.message
      value: '{{ _ingest.on_failure_message }}'
