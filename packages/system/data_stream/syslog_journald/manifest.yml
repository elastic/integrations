title: System syslog logs (journald)
type: logs
streams:
  - input: journald
    template_path: journald.yml.hbs
    title: System syslog logs (journald)
    description: Collect System syslog logs using journald input
    vars:
      - name: condition
        title: Condition
        description: Condition to filter when to apply this datastream. Refer to [Host provider](https://www.elastic.co/guide/en/fleet/current/host-provider.html) to find the available keys and to [Conditions](https://www.elastic.co/guide/en/fleet/current/dynamic-input-configuration.html#conditions) on how to use the available keys in conditions.
        type: text
        multi: false
        required: false
        show_user: true
        default: ${host.os_version} == "12 (bookworm)"

      - name: include_matches
        type: text
        title: Include Matches
        multi: true
        show_user: false
        description: >
          A list of filter expressions used to select the logs to read (e.g. `_SYSTEMD_UNIT=vault.service`). Defaults to all logs. See [include_matches](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-journald.html#filebeat-input-journald-include-matches) for details.

      - name: paths
        type: text
        title: Journal paths
        multi: true
        show_user: false
        description: >
          List of journals to read from. Defaults to the system journal.

      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata.  This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

      - name: tags
        type: text
        title: Tags
        description: >
          Tags to include in the published event.
        multi: true
        required: true
        show_user: false
        default:
          - journald-syslog

agent:
  privileges:
    root: true
