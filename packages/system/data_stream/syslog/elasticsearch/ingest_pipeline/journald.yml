---
description: Journald pipeline for system integration syslog data stream
processors:
  - set:
      field: event.ingested
      copy_from: _ingest.timestamp
  - set:
      if: ctx.event?.message == null && ctx.event?.original != null
      field: message
      copy_from: event.original
      description: Ensure we have the 'message' field
  - set:
      field: "process.pid"
      copy_from: "journald.pid"
  - set:
      field: "process.name"
      value: "{{ journald.process.name }}"
      ignore_failure: true
  - set:
      field: event.kind
      value: event
  - append:
      field: related.hosts
      value: "{{host.hostname}}"
      if: "ctx.host?.hostname != null && ctx.host?.hostname != ''"
      allow_duplicates: false
  - remove:
      description: Remove the extra fields added by the Journald input
      ignore_missing: true
      field:
        - journald
        - process.thread
        - syslog
        - systemd
        - message_id
on_failure:
  - set:
      field: error.message
      value: '{{ _ingest.on_failure_message }}'
