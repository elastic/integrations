title: System auth logs
type: logs
streams:
  - input: journald
    template_path: journald.yml.hbs
    title: System auth logs (journald)
    description: Collect System auth logs using journald input
    vars:
      - name: condition
        title: Condition
        description: Condition to filter when to apply this datastream. Refer to [Kubernetes provider](http://localhost:8000/guide/providers.html#kubernetes-provider) to find the available keys and to [Conditions](https://www.elastic.co/guide/en/fleet/current/dynamic-input-configuration.html#conditions) on how to use the available keys in conditions.
        type: text
        multi: false
        required: false
        show_user: true
        default: ${host.os_version} == "12 (bookworm)"

      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false

      - name: include_matches
        type: text
        title: Include Matches
        multi: true
        show_user: false
        description: >
          A list of filter expressions used to select the logs to read (e.g. `_SYSTEMD_UNIT=vault.service`). Defaults to all logs. See [include_matches](https://www.elastic.co/guide/en/beats/filebeat/7.x/filebeat-input-journald.html#filebeat-input-journald-include-matches) for details.

      - name: paths
        type: text
        title: Journal paths
        multi: true
        show_user: false
        description: >
          List of journals to read from. Defaults to the system journal.

      - name: tags
        type: text
        title: Tags
        description: >
          Tags to include in the published event.

        multi: true
        required: true
        show_user: false
        default:
          - journald-log
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata.  This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.

