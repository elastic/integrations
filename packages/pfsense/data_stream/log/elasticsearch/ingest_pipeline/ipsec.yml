---
description: Pipeline for PFsense IPSEC logs
processors:
  - grok:
      field: message
      patterns:
        - '%{PREFIX}%{GREEDYDATA}%{SOURCE} to %{DEST} \(%{NONNEGINT:network.bytes:long} bytes\)'
        - '%{GREEDYDATA}'
      pattern_definitions:
        PREFIX: '\d+\[%{WORD}\]'
        SOURCE: '%{IP:source.address}\[%{NONNEGINT:source.port:long}\]'
        DEST: '%{IP:destination.address}\[%{NONNEGINT:destination.port:long}\]'
      tag: grok_d7d9a2d7
  - append:
      field: event.type
      value: connection
      allow_duplicates: false
      if: ctx.source?.address != null
      tag: append_ac4d9a80
  - append:
      field: event.type
      value: end
      allow_duplicates: false
      if: ctx.message.toLowerCase().contains('disconnected')
      tag: append_6887ab9d
  - set:
      field: source.ip
      value: "{{{source.address}}}"
      ignore_empty_value: true
      tag: set_0313ebc9
  - set:
      field: destination.ip
      value: "{{{destination.address}}}"
      ignore_empty_value: true
      tag: set_ca415005
  - set:
      field: network.protocol
      value: ipsec
      tag: set_2d8e203a
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}failed with message '{{{ _ingest.on_failure_message }}}'
