- name: microsoft_intune
  type: group
  fields:
    - name: managed_device
      type: group
      fields:
        - name: category
          type: keyword
          description: Diagnostic category indicating the type of Intune data (Devices).
        - name: operation_name
          type: keyword
          description: Name of the operation producing the device record.
        - name: properties
          type: group
          fields:
            - name: aad_tenant_id
              type: keyword
              description: Azure Active Directory tenant identifier associated with the device.
            - name: android_patch_level
              type: keyword
              description: Android security patch level installed on the device.
            - name: batch_id
              type: keyword
              description: Identifier of the batch in which the device record was exported.
            - name: category_name
              type: keyword
              description: Category name assigned to the device in Intune.
            - name: compliant_state
              type: keyword
              description: Compliance status of the device as evaluated by Intune.
            - name: created_date
              type: date
              description: Date and time when the device object was created in Intune.
            - name: device_id
              type: keyword
              description: Unique identifier of the managed device in Intune.
            - name: device_name
              type: keyword
              description: Human-readable name assigned to the device.
            - name: device_registration_state
              type: keyword
              description: Registration state of the device with Intune.
            - name: device_state
              type: keyword
              description: Current management state of the device.
            - name: eas_id
              type: keyword
              description: Exchange ActiveSync identifier associated with the device.
            - name: encryption_status_string
              type: keyword
              description: Indicates whether the device storage is encrypted.
            - name: graph_device_is_managed
              type: boolean
              description: Indicates whether the device is managed according to Microsoft Graph.
            - name: imei
              type: keyword
              description: International Mobile Equipment Identity of the device, if applicable.
            - name: in_grace_period_until
              type: date
              description: Date and time until which the device remains in compliance grace period.
            - name: intune_account_id
              type: keyword
              description: Identifier of the Intune account managing the device.
            - name: jail_broken
              type: keyword
              description: Indicates whether the device is jail-broken or rooted.
            - name: join_type
              type: keyword
              description: Join type indicating how the device is joined to Azure AD.
            - name: last_contact
              type: date
              description: Date and time when the device last communicated with Intune.
            - name: managed_by
              type: keyword
              description: Management authority responsible for the device.
            - name: managed_device_name
              type: keyword
              description: Managed device name generated by Intune.
            - name: manufacturer
              type: keyword
              description: Name of the device manufacturer.
            - name: meid
              type: keyword
              description: Mobile Equipment Identifier of the device, if applicable.
            - name: model
              type: keyword
              description: Hardware model identifier reported by the device.
            - name: os
              type: keyword
              description: Operating system platform of the device.
            - name: os_version
              type: keyword
              description: Version of the operating system installed on the device.
            - name: ownership
              type: keyword
              description: Ownership type of the device (Corporate or Personal).
            - name: phone_number
              type: keyword
              description: Phone number associated with the device, if available.
            - name: primary_user
              type: keyword
              description: Identifier of the primary user object linked to the device.
            - name: reference_id
              type: keyword
              description: Azure Active Directory device identifier.
            - name: serial_number
              type: keyword
              description: Serial number assigned by the device manufacturer.
            - name: sku_family
              type: keyword
              description: Stock-keeping unit family associated with the device.
            - name: storage_free
              type: long
              description: Available free storage capacity on the device.
            - name: storage_total
              type: long
              description: Total storage capacity available on the device.
            - name: subscriber_carrier_network
              type: keyword
              description: Subscriber carrier network information for cellular devices.
            - name: supervised_status_string
              type: keyword
              description: Indicates whether the device is supervised.
            - name: upn
              type: keyword
              description: User Principal Name of the user associated with the device.
            - name: user_email
              type: keyword
              description: Email address of the primary user associated with the device.
            - name: user_name
              type: keyword
              description: Display name of the primary user associated with the device.
            - name: wifi_mac_address
              type: keyword
              description: Wi-Fi MAC address of the device network interface.
        - name: result_type
          type: keyword
          description: Result of the operation associated with the device record.
        - name: tenant_id
          type: keyword
          description: Unique identifier of the Microsoft Entra tenant associated with the device.
        - name: time
          type: date
          description: Timestamp when the device record was emitted to Azure Event Hub.
