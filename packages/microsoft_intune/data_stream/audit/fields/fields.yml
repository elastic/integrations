- name: microsoft_intune
  type: group
  fields:
    - name: audit
      type: group
      fields:
        - name: category
          type: keyword
          description: Log category indicating the type of diagnostic data (always AuditLogs for Intune audit events).
        - name: correlation_id
          type: keyword
          description: Correlation identifier used to link related operations across services.
        - name: identity
          type: keyword
          description: Identity (UPN or app identity) that initiated the Intune operation.
        - name: operation_name
          type: keyword
          description: Name of the Intune operation that was performed.
        - name: properties
          type: group
          fields:
            - name: activity_date
              type: date
              description: Date and time when the audited Intune activity occurred.
            - name: activity_result_status
              type: keyword
              description: Numeric status code representing the outcome of the activity.
            - name: activity_type
              type: keyword
              description: Numeric code representing the type of activity performed.
            - name: actor
              type: group
              fields:
                - name: actor_type
                  type: keyword
                  description: Numeric code indicating the type of actor that initiated the action (user or application).
                - name: application
                  type: keyword
                  description: Application (client) identifier used when the action was initiated by an app.
                - name: application_name
                  type: keyword
                  description: Human-readable name of the application that initiated the action.
                - name: is_delegated_admin
                  type: boolean
                  description: Indicates whether the action was performed by a delegated administrator.
                - name: name
                  type: keyword
                  description: Display name of the actor who initiated the operation, if available.
                - name: object_id
                  type: keyword
                  description: Object ID of the user or application that initiated the action.
                - name: partner_tenant_id
                  type: keyword
                  description: Tenant ID of the partner tenant if the action was performed by a delegated partner.
                - name: upn
                  type: keyword
                  description: User Principal Name (UPN) of the user who initiated the operation.
                - name: user_permissions
                  type: keyword
                  description: List of permissions associated with the actor at the time of the operation.
            - name: additional_detail
              type: group
              fields:
                - name: original
                  type: keyword
                  description: Additional descriptive details related to the audit event provided as a formatted string.
                - name: parsed
                  type: flattened
            - name: additional_details
              type: group
              fields:
                - name: key
                  type: keyword
                  description: Key name of additional contextual information associated with the audit event.
                - name: value
                  type: keyword
                  description: Value corresponding to the additional contextual information key.
            - name: audit_event_id
              type: keyword
              description: Unique identifier of the audit event generated by Intune.
            - name: category
              type: keyword
              description: Numeric category code used internally by Intune for audit classification.
            - name: logged_by_service
              type: keyword
              description: Name of the Microsoft service that generated the audit log entry.
            - name: relation_id
              type: keyword
              description: Identifier used to relate multiple audit events generated as part of a single operation.
            - name: target_display_names
              type: keyword
              description: Display names of the Intune resources that were targeted by the operation.
            - name: target_object_ids
              type: keyword
              description: Object IDs of the Intune resources that were targeted by the operation.
            - name: targets
              type: group
              fields:
                - name: modified_properties
                  type: group
                  fields:
                    - name: name
                      type: keyword
                      description: Name of the property that was modified on the target resource.
                    - name: new
                      type: keyword
                      description: New value of the modified property after the change.
                    - name: old
                      type: keyword
                      description: Previous value of the modified property before the change.
                - name: name
                  type: keyword
                  description: Name of the individual target resource affected by the operation.
        - name: result_description
          type: keyword
          description: Textual description of the operation result, if available.
        - name: result_type
          type: keyword
          description: High-level result status of the operation (Success or Failure).
        - name: tenant_id
          type: keyword
          description: Unique identifier of the Microsoft Entra tenant where the Intune action occurred.
        - name: time
          type: date
          description: Timestamp when the audit event was generated and emitted to Azure Monitor / Event Hub.
