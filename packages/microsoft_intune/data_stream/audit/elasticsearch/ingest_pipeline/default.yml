---
description: Pipeline for processing audit logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
      if: ctx.event?.original == null
  - remove:
      field:
        - message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.type
      tag: append_change_into_event_type
      value: change
  - append:
      field: event.category
      tag: append_configuration_into_event_category
      value: configuration
  - fingerprint:
      fields:
        - json.time
        - json.tenantId
        - json.properties.AuditEventId
      tag: fingerprint_audit
      target_field: _id
      ignore_missing: true
  - rename:
      field: json.category
      tag: rename_category
      target_field: microsoft_intune.audit.category
      ignore_missing: true
  - rename:
      field: json.correlationId
      tag: rename_correlationId
      target_field: microsoft_intune.audit.correlation_id
      ignore_missing: true
  - rename:
      field: json.identity
      tag: rename_identity
      target_field: microsoft_intune.audit.identity
      ignore_missing: true
  - set:
      field: user.email
      tag: set_user_email_from_audit_identity
      copy_from: microsoft_intune.audit.identity
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_audit_identity_into_related_user
      value: '{{{microsoft_intune.audit.identity}}}'
      allow_duplicates: false
      if: ctx.microsoft_intune?.audit?.identity != null
  - rename:
      field: json.operationName
      tag: rename_operationName
      target_field: microsoft_intune.audit.operation_name
      ignore_missing: true
  - set:
      field: event.action
      tag: set_event_action_from_audit_operationName
      copy_from: microsoft_intune.audit.operation_name
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - split:
      field: event.action
      tag: split_event_action
      separator: \s+
      ignore_missing: true
      if: ctx.event?.action != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - join:
      field: event.action
      tag: join_event_action
      separator: '-'
      if: ctx.event?.action != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.properties.ActivityDate
      tag: date_properties_ActivityDate
      target_field: microsoft_intune.audit.properties.activity_date
      formats:
        - M/d/yyyy h:mm:ss a
      if: ctx.json?.properties?.ActivityDate != null && ctx.json.properties.ActivityDate != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.properties.ActivityResultStatus
      tag: convert_properties_ActivityResultStatus_to_string
      target_field: microsoft_intune.audit.properties.activity_result_status
      type: string
      ignore_missing: true
  - convert:
      field: json.properties.ActivityType
      tag: convert_properties_ActivityType_to_string
      target_field: microsoft_intune.audit.properties.activity_type
      type: string
      ignore_missing: true
  - convert:
      field: json.properties.Actor.ActorType
      tag: convert_properties_Actor_ActorType_to_string
      target_field: microsoft_intune.audit.properties.actor.actor_type
      type: string
      ignore_missing: true
  - rename:
      field: json.properties.Actor.Application
      tag: rename_properties_Actor_Application
      target_field: microsoft_intune.audit.properties.actor.application
      ignore_missing: true
  - rename:
      field: json.properties.Actor.ApplicationName
      tag: rename_properties_Actor_ApplicationName
      target_field: microsoft_intune.audit.properties.actor.application_name
      ignore_missing: true
  - set:
      field: service.name
      tag: set_service_name_from_audit_properties_Actor_ApplicationName
      copy_from: microsoft_intune.audit.properties.actor.application_name
      ignore_empty_value: true
  - convert:
      field: json.properties.Actor.IsDelegatedAdmin
      tag: convert_properties_Actor_IsDelegatedAdmin_to_boolean
      target_field: microsoft_intune.audit.properties.actor.is_delegated_admin
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.properties.Actor.Name
      tag: rename_properties_Actor_Name
      target_field: microsoft_intune.audit.properties.actor.name
      ignore_missing: true
  - set:
      field: user.name
      tag: set_user_name_from_audit_properties_Actor_Name
      copy_from: microsoft_intune.audit.properties.actor.name
      ignore_empty_value: true
  - rename:
      field: json.properties.Actor.ObjectId
      tag: rename_properties_Actor_ObjectId
      target_field: microsoft_intune.audit.properties.actor.object_id
      ignore_missing: true
  - set:
      field: user.id
      tag: set_user_id_from_audit_properties_Actor_ObjectId
      copy_from: microsoft_intune.audit.properties.actor.object_id
      ignore_empty_value: true
  - rename:
      field: json.properties.Actor.PartnerTenantId
      tag: rename_properties_Actor_PartnerTenantId
      target_field: microsoft_intune.audit.properties.actor.partner_tenant_id
      ignore_missing: true
  - rename:
      field: json.properties.Actor.UPN
      tag: rename_properties_Actor_UPN
      target_field: microsoft_intune.audit.properties.actor.upn
      ignore_missing: true
  - append:
      field: related.user
      tag: append_audit_properties_Actor_UPN_into_related_user
      value: '{{{microsoft_intune.audit.properties.actor.upn}}}'
      allow_duplicates: false
      if: ctx.microsoft_intune?.audit?.properties?.actor?.upn != null
  - rename:
      field: json.properties.Actor.UserPermissions
      tag: rename_properties_Actor_UserPermissions
      target_field: microsoft_intune.audit.properties.actor.user_permissions
      ignore_missing: true
  - rename:
      field: json.properties.AdditionalDetails
      tag: rename_properties_AdditionalDetails
      target_field: microsoft_intune.audit.properties.additional_detail
      ignore_missing: true
  - script:
      if: ctx.microsoft_intune?.audit?.properties?.additional_detail != null
      tag: script_parse_additional_detail
      description: Parse additional details from the audit event.
      source: |
        def content = ctx.microsoft_intune.audit.properties.additional_detail;
        def parsed = new HashMap();
        def lines = /\r\n/.split(content);
        for (int i = 0; i < lines.length; i++) {
          def line = lines[i];
          if (line.contains('Key = ') && line.contains('Value = ')) {
            def parts = /Value = /.split(line, 2);
            if (parts.length == 2) {
              def key = parts[0].replace('Key = ', '').trim();
              def value = parts[1].trim();
              parsed.put(key, value);
            }
          }
        }
        if (ctx.microsoft_intune.audit.properties.additional_detail instanceof String) {
          def temp = new HashMap();
          temp.put('original', ctx.microsoft_intune.audit.properties.additional_detail);
          temp.put('parsed', parsed);
          ctx.microsoft_intune.audit.properties.additional_detail = temp;
        } else {
          ctx.microsoft_intune.audit.properties.additional_detail.parsed = parsed;
        }
  - rename:
      field: json.properties.AuditEventId
      tag: rename_properties_AuditEventId
      target_field: microsoft_intune.audit.properties.audit_event_id
      ignore_missing: true
  - set:
      field: event.id
      tag: set_event_id_from_audit_properties_AuditEventId
      copy_from: microsoft_intune.audit.properties.audit_event_id
      ignore_empty_value: true
  - convert:
      field: json.properties.Category
      tag: convert_properties_Category_to_string
      target_field: microsoft_intune.audit.properties.category
      type: string
      ignore_missing: true
  - rename:
      field: json.properties.RelationId
      tag: rename_properties_RelationId
      target_field: microsoft_intune.audit.properties.relation_id
      ignore_missing: true
  - rename:
      field: json.properties.TargetDisplayNames
      tag: rename_properties_TargetDisplayNames
      target_field: microsoft_intune.audit.properties.target_display_names
      ignore_missing: true
  - rename:
      field: json.properties.TargetObjectIds
      tag: rename_properties_TargetObjectIds
      target_field: microsoft_intune.audit.properties.target_object_ids
      ignore_missing: true
  - foreach:
      field: json.properties.Targets
      tag: foreach_properties_Targets_Name
      if: ctx.json?.properties?.Targets instanceof List
      processor:
        append:
          field: destination.domain
          tag: append_properties_Targets_Name_into_destination_domain
          value: '{{{_ingest._value.Name}}}'
          allow_duplicates: false
  - foreach:
      field: json.properties.Targets
      if: ctx.json?.properties?.Targets instanceof List
      processor:
        rename:
          field: _ingest._value.Name
          tag: rename_properties_Targets_Name
          target_field: _ingest._value.name
          ignore_missing: true
  - foreach:
      field: json.properties.Targets
      if: ctx.json?.properties?.Targets instanceof List
      processor:
        foreach:
          field: _ingest._value.ModifiedProperties
          ignore_missing: true
          processor:
            rename:
              field: _ingest._value.Name
              tag: rename_properties_Targets_ModifiedProperties_Name
              target_field: _ingest._value.name
              ignore_missing: true
  - foreach:
      field: json.properties.Targets
      if: ctx.json?.properties?.Targets instanceof List
      processor:
        foreach:
          field: _ingest._value.ModifiedProperties
          ignore_missing: true
          processor:
            rename:
              field: _ingest._value.Old
              tag: rename_properties_Targets_ModifiedProperties_Old
              target_field: _ingest._value.old
              ignore_missing: true
  - foreach:
      field: json.properties.Targets
      if: ctx.json?.properties?.Targets instanceof List
      processor:
        foreach:
          field: _ingest._value.ModifiedProperties
          ignore_missing: true
          processor:
            rename:
              field: _ingest._value.New
              tag: rename_properties_Targets_ModifiedProperties_New
              target_field: _ingest._value.new
              ignore_missing: true
  - foreach:
      field: json.properties.Targets
      if: ctx.json?.properties?.Targets instanceof List
      processor:
        rename:
          field: _ingest._value.ModifiedProperties
          tag: rename_properties_Targets_ModifiedProperties
          target_field: _ingest._value.modified_properties
          ignore_missing: true
  - rename:
      field: json.properties.Targets
      tag: rename_properties_Targets
      target_field: microsoft_intune.audit.properties.targets
      ignore_missing: true
  - rename:
      field: json.properties.additionalDetails
      tag: rename_properties_additionalDetails
      target_field: microsoft_intune.audit.properties.additional_details
      ignore_missing: true
  - rename:
      field: json.properties.loggedByService
      tag: rename_properties_loggedByService
      target_field: microsoft_intune.audit.properties.logged_by_service
      ignore_missing: true
  - set:
      field: event.provider
      tag: set_event_provider_from_audit_properties_loggedByService
      copy_from: microsoft_intune.audit.properties.logged_by_service
      ignore_empty_value: true
  - rename:
      field: json.resultDescription
      tag: rename_resultDescription
      target_field: microsoft_intune.audit.result_description
      ignore_missing: true
  - set:
      field: event.reason
      tag: set_event_reason_from_audit_resultDescription
      copy_from: microsoft_intune.audit.result_description
      ignore_empty_value: true
  - rename:
      field: json.resultType
      tag: rename_resultType
      target_field: microsoft_intune.audit.result_type
      ignore_missing: true
  - set:
      field: event.outcome
      tag: set_event_outcome_from_audit_resultType
      copy_from: microsoft_intune.audit.result_type
      ignore_empty_value: true
  - lowercase:
      field: event.outcome
      tag: lowercase_event_outcome
      ignore_missing: true
  - rename:
      field: json.tenantId
      tag: rename_tenantId
      target_field: microsoft_intune.audit.tenant_id
      ignore_missing: true
  - set:
      field: cloud.account.id
      tag: set_cloud_account_id_from_audit_tenantId
      copy_from: microsoft_intune.audit.tenant_id
      ignore_empty_value: true
  - date:
      field: json.time
      tag: date_time
      target_field: microsoft_intune.audit.time
      formats:
        - ISO8601
      if: ctx.json?.time != null && ctx.json.time != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_audit_time
      copy_from: microsoft_intune.audit.time
      ignore_empty_value: true
  - foreach:
      field: microsoft_intune.audit.properties.targets
      tag: foreach_microsoft_intune_audit_properties_targets
      if: ctx.microsoft_intune?.audit?.properties?.targets instanceof List
      processor:
        remove:
          field:
            - _ingest._value.name
          tag: remove_custom_duplicate_fields_from_microsoft_intune_audit_properties_targets
          ignore_missing: true
          if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
  - remove:
      field:
        - microsoft_intune.audit.identity
        - microsoft_intune.audit.operation_name
        - microsoft_intune.audit.properties.actor.application_name
        - microsoft_intune.audit.properties.actor.name
        - microsoft_intune.audit.properties.actor.object_id
        - microsoft_intune.audit.properties.audit_event_id
        - microsoft_intune.audit.properties.logged_by_service
        - microsoft_intune.audit.result_description
        - microsoft_intune.audit.result_type
        - microsoft_intune.audit.tenant_id
        - microsoft_intune.audit.time
      tag: remove_custom_duplicate_fields
      ignore_missing: true
      if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
  - remove:
      field:
        - json
      tag: remove_json
      ignore_missing: true
  - script:
      tag: remove_null_values
      lang: painless
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      tag: append_tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{_ingest.on_failure_processor_type}}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{_ingest.on_failure_processor_tag}}}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      tag: append_tags
      value: preserve_original_event
      allow_duplicates: false
