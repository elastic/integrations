format_version: 3.5.4
name: microsoft_intune
title: Microsoft Intune
version: 0.1.0
description: Collect logs from Microsoft Intune with Elastic Agent.
type: integration
categories:
  - security
  - azure
conditions:
  kibana:
    version: '^8.18.0 || ^9.0.0'
  elastic:
    subscription: basic
screenshots:
  - src: /img/microsoft-intune-managed-device-dashboard.png
    title: Managed Device Dashboard
    size: 600x600
    type: image/png
  - src: /img/microsoft-intune-audit-dashboard.png
    title: Audit Dashboard
    size: 600x600
    type: image/png
icons:
  - src: /img/microsoft-intune-logo.svg
    title: Microsoft Intune logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: microsoft_intune
    title: Microsoft Intune Logs
    description: Collect logs from Microsoft Intune.
    inputs:
      - type: azure-eventhub
        title: Collect Microsoft Intune events via Azure Event Hub
        description: Collect Microsoft Intune events via Azure Event Hub.
owner:
  github: elastic/security-service-integrations
  type: elastic
