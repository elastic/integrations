rules:
  # ----- Authentication -----
  - path: /api/auth
    methods: ['POST']
    request_headers:
      X-Api-Key: "mock-api-key"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-vuln",
            "refreshToken": "mock-refresh-token-vuln"
          }
          `}}

  # ----- Refresh-token -----
  - path: /api/refresh-token
    methods: ['POST']
    request_headers:
      Content-Type:
        - 'application/json'
    request_body: /.*"refreshToken".*/
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-vuln-refreshed",
            "refreshToken": "mock-refresh-token-vuln-refreshed"
          }
          `}}

  - path: /api/v2/vrm/public/devices
    methods: ['GET']
    query_params:
      pageSize: '2'
    request_headers:
      Authorization: "Bearer mock-access-token-vuln"
