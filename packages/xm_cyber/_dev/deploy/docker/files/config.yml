rules:
  # ----- Authentication -----
  - path: /api/auth
    methods: ['POST']
    request_headers:
      X-Api-Key: "mock-api-key"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-vuln",
            "refreshToken": "mock-refresh-token-vuln"
          }
          `}}

  # ----- Refresh-token -----
  - path: /api/refresh-token
    methods: ['POST']
    request_headers:
      Content-Type:
        - 'application/json'
    request_body: /.*"refreshToken".*/
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-vuln-refreshed",
            "refreshToken": "mock-refresh-token-vuln-refreshed"
          }
          `}}

  - path: /api/v2/vrm/public/vulnerabilities
    methods: ['GET']
    query_params:
      pageSize: '2'
    request_headers:
      Authorization: "Bearer mock-access-token-vuln"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "data": [
              {
                "cve": "CVE-2009-0316",
                "status": "Active",
                "description": "Untrusted search path vulnerability in src/if_python.c in the Python interface in Vim before 7.2.045 allows local users to execute arbitrary code via a Trojan horse Python file in the current working directory, related to a vulnerability in the PySys_SetArgv function (CVE-2008-5983), as demonstrated by an erroneous search path for plugin/bike.vim in bicyclerepair.",
                "severity": 20,
                "severityLevel": "Medium",
                "cvss2": 6.9,
                "cvss2Vector": "AV:L/AC:M/Au:N/C:C/I:C/A:C",
                "cvss30": null,
                "cvss3Vector": null,
                "cvss31": null,
                "cvss31Vector": null,
                "cvss4": null,
                "cvss4Vector": null,
                "epssPercentile": 0.41737,
                "epssProbability": 0.00199,
                "epssScore": 0.00199,
                "inCisaKev": false,
                "inExploitDb": false,
                "exploitKitExist": false,
                "isExploitedInTheWild": false,
                "hasAttackTechnique": false,
                "techniqueId": null,
                "deviceFoundOn": 2,
                "products": 2,
                "criticalAssetsFoundOn": 2,
                "criticalAssetsAtRisk": 0,
                "chokePointFoundOn": 0,
                "firstDetected": "2026-04-29T00:00:00.000Z",
