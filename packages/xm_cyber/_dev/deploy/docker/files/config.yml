rules:
  # Phase 1 — authenticate with X-Api-Key, return access + refresh tokens
  - path: /api/auth
    methods: ['POST']
    request_headers:
      X-Api-Key: "mock-api-key"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {"accessToken":"mock-access-token","refreshToken":"mock-refresh-token"}

  # Phase 2 — fetch risk score report, return 4 scenarios
  - path: /api/systemReport/riskScoreV2
    methods: ['GET']
    request_headers:
      Authorization: "Bearer mock-access-token"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
