rules:
  # Auth — X-Api-Key header
  - path: /api/auth
    methods: ['POST']
    request_headers:
      X-Api-Key: "mock-api-key"
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-abc123",
            "refreshToken": "mock-refresh-token-xyz789"
          }
          `}}
  # Token refresh
  - path: /api/refresh-token
    methods: ['POST']
    request_headers:
      Content-Type:
        - 'application/json'
    request_body: /.*"refreshToken".*/
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "mock-access-token-refreshed-abc123",
            "refreshToken": "mock-refresh-token-refreshed-xyz789"
          }
          `}}
