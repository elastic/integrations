            ],
            "paging": {
              "page": 0,
              "pageSize": 100,
              "total": 3,
              "totalPages": 2,
              "nextLink": "/api/audit-trail/auditRecords?cursor=page2"
            },
            "metadata": {}
          }
          `}}

