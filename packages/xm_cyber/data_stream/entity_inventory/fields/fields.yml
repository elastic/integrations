- name: xm_cyber
  type: group
  fields:
    - name: entity_inventory
      type: group
      fields:
        - name: account_id
          type: keyword
          description: AWS account identifier associated with the entity.
        - name: account_name
          type: keyword
          description: AWS account name associated with the entity.
        - name: agent_type
          type: keyword
          description: Type of XM Cyber agent reporting the entity (when applicable).
        - name: agent_version_str
          type: keyword
          description: XM Cyber agent version reported as a single string (e.g. 1.8.210).
        - name: agent_version
          type: group
          fields:
            - name: major
              type: long
              description: Agent version major component.
            - name: minor
              type: long
              description: Agent version minor component.
            - name: patch
              type: long
              description: Agent version patch component.
        - name: arch
          type: keyword
          description: Hardware architecture reported for the entity.
        - name: arn
          type: keyword
          description: AWS resource ARN associated with the entity.
        - name: aws_tags
          type: flattened
          description: AWS tags attached to the entity (array of key/value pairs).
        - name: category
          type: keyword
          description: Vendor category classification for the entity.
        - name: cm_id
          type: keyword
          description: Configuration management identifier for the entity.
        - name: connection_counter
          type: long
          description: Number of times the entity has connected to XM Cyber.
        - name: custom_properties
          type: group
          fields:
            - name: custom_labels
              type: flattened
              description: User-defined labels attached to the entity.
            - name: domain_workgroup
              type: group
              fields:
                - name: data
                  type: keyword
                  description: Domain or workgroup name.
                - name: type
                  type: keyword
                  description: Discriminator (e.g., domain, workgroup).
            - name: hardware_info
              type: group
              fields:
                - name: cpu_core_count
                  type: long
                  description: Number of CPU cores reported for the host.
                - name: cpu_count
                  type: long
                  description: Number of CPUs reported for the host.
                - name: cpu_manufacturer
                  type: keyword
                  description: CPU manufacturer string.
                - name: cpu_processor_type
                  type: keyword
                  description: CPU processor type string.
                - name: cpu_speed_mhz
                  type: long
                  description: CPU speed in MHz.
                - name: system_manufacturer
                  type: keyword
                  description: System manufacturer string.
                - name: system_model
                  type: keyword
                  description: System model string.
                - name: total_ram_mb
                  type: keyword
                  description: Total RAM in MB as reported by the vendor (string).
            - name: labels
              type: flattened
              description: Vendor-managed labels attached to the entity.
            - name: mac_addresses
              type: keyword
              description: MAC addresses reported for the entity.
            - name: ou_computer
              type: keyword
              description: Organisational unit path for the computer object.
            - name: ou_user
              type: keyword
              description: Organisational unit path for the user object.
            - name: sniffer_status
              type: keyword
              description: Current sniffer status string.
            - name: sniffer_status_changeable
              type: boolean
              description: Whether the sniffer status is user-changeable.
            - name: sniffer_status_configuration
              type: keyword
              description: Sniffer status configuration string.
            - name: subnet_info
              type: keyword
              description: Subnet information string when reported.
        - name: customer_id
          type: keyword
          description: XM Cyber customer identifier.
        - name: disabled
          type: boolean
          description: Whether the entity is disabled.
        - name: disabled_changed_at
          type: date
          description: Time at which the disabled state last changed.
        - name: disabled_reason
          type: keyword
          description: Reason the entity was disabled.
        - name: display_name
          type: keyword
          description: Human-readable display name for the entity.
        - name: domain_name
          type: keyword
          description: Domain name associated with the entity when reported.
        - name: entity_details
          type: group
          fields:
            - name: id
              type: keyword
              description: Inner entity details identifier.
            - name: is_asset
              type: boolean
              description: Whether the inner entity is marked as a critical asset.
            - name: name
              type: keyword
              description: Inner entity details name.
            - name: sub_type
              type: keyword
              description: Inner entity details subtype value.
            - name: sub_type_display_name
              type: keyword
              description: Inner entity details subtype display label.
        - name: entity_type
          type: keyword
          description: Entity type discriminator (e.g., agent, azureUser, awsSsmParameter).
        - name: first_seen
          type: date
          description: First observation time reported for the entity.
        - name: has_matching_sid
          type: boolean
          description: Whether the entity has a matching SID in another directory source.
        - name: has_update_available
          type: boolean
          description: Whether an update is available for the entity (e.g., agent upgrade).
        - name: id
          type: keyword
          description: Vendor-provided unique identifier for the entity record.
        - name: imported_labels
          type: keyword
          description: Imported labels associated with the entity.
        - name: installation_id
          type: keyword
          description: Installation identifier reported for the entity.
        - name: ipv4
          type: keyword
          description: IPv4 addresses reported for the entity as strings.
        - name: ipv4_buffer
          type: group
          fields:
            - name: data
              type: long
              description: IPv4 address data as an array of integers.
            - name: type
              type: keyword
              description: Buffer indicator value, typically "Buffer".
        - name: ipv4num
          type: long
          description: IPv4 addresses reported for the entity as 32-bit integers.
        - name: ipv4str
          type: ip
          description: IPv4 addresses reported for the entity as strings.
        - name: ipv6
          type: keyword
          description: IPv6 addresses reported for the entity.
        - name: ipv6_buffer
          type: group
          fields:
            - name: data
              type: long
              description: IPv6 address data as an array of integers.
            - name: type
              type: keyword
              description: Buffer indicator value, typically "Buffer".
        - name: ipv6str
          type: ip
          description: IPv6 addresses reported for the entity as strings.
        - name: kms_key_aliases
          type: keyword
          description: KMS key alias names associated with the entity.
        - name: kms_key_creation_date
          type: date
          description: Time at which the KMS key was created.
        - name: kms_key_description
          type: keyword
          description: KMS key description string.
        - name: kms_key_manager
          type: keyword
          description: KMS key manager (e.g., AWS, CUSTOMER).
        - name: kms_key_origin
          type: keyword
          description: KMS key origin (e.g., AWS_KMS, EXTERNAL).
        - name: kms_key_state
          type: keyword
          description: Current KMS key state.
        - name: kms_key_usage
          type: keyword
          description: KMS key usage (e.g., ENCRYPT_DECRYPT, SIGN_VERIFY).
        - name: labels
          type: flattened
          description: Vendor labels attached to the entity (array of id/type pairs).
        - name: last_connection_time
          type: date
          description: Last time the entity (typically a managed device) connected to XM Cyber.
        - name: last_disconnection_reason
          type: keyword
          description: Reason the entity last disconnected.
        - name: last_reboot_time
          type: date
          description: Last reboot time reported for the entity.
        - name: last_status_change
          type: date
          description: Time of the most recent status change for the entity.
        - name: last_updated_at
          type: date
          description: Time at which the entity record was last updated by XM Cyber.
        - name: latest_possible_agent_version_str
          type: keyword
          description: Latest agent version available for the entity as a string.
        - name: latest_possible_agent_version
          type: group
          fields:
            - name: major
              type: long
              description: Latest possible agent version major component.
            - name: minor
              type: long
              description: Latest possible agent version minor component.
            - name: patch
              type: long
              description: Latest possible agent version patch component.
            - name: build
              type: long
              description: Build (e.g. 0).
        - name: machine_id
          type: keyword
          description: Vendor machine identifier when reported.
        - name: metadata
          type: flattened
          description: Metadata associated with the entity.
        - name: name
          type: keyword
          description: Vendor name of the entity (hostname for devices, principal name for identities, etc.).
        - name: name_uppercase
          type: keyword
          description: Entity name normalised to uppercase for case-insensitive matching.
        - name: not_included_in_attacks
          type: boolean
          description: Whether the entity is excluded from attack-path simulations.
        - name: organization_id
          type: keyword
          description: XM Cyber organization identifier.
        - name: os
          type: group
          fields:
            - name: distribution_name
              type: keyword
              description: OS distribution name (e.g., centos, ubuntu).
            - name: distribution_version
              type: keyword
              description: OS distribution version string.
            - name: name
              type: keyword
              description: Full OS name string as reported by XM Cyber.
            - name: service_pack
              type: group
              fields:
                - name: build
                  type: long
                  description: OS service pack build component.
                - name: major
                  type: long
                  description: OS service pack major component.
                - name: minor
                  type: long
                  description: OS service pack minor component.
                - name: patch
                  type: long
                  description: OS service pack patch component.
            - name: version
              type: group
              fields:
                - name: build
                  type: long
                  description: OS version build component.
                - name: major
                  type: long
                  description: OS version major component.
                - name: minor
                  type: long
                  description: OS version minor component.
                - name: patch
                  type: long
                  description: OS version patch component.
        - name: os_type
          type: keyword
          description: Top-level OS type discriminator string.
        - name: product_type
          type: keyword
          description: Vendor product type string.
        - name: region
          type: keyword
          description: Cloud region associated with the entity.
        - name: remote_address
          type: keyword
          description: Remote address reported for the entity.
        - name: rule_display_name
          type: keyword
          description: Display name of the matching rule when reported.
        - name: secret_description
          type: keyword
          description: Description of the AWS Secrets Manager secret.
        - name: secret_kms_key_id
          type: keyword
          description: KMS key identifier protecting the secret.
        - name: security_flags
          type: flattened
          description: Security flags reported for the entity.
        - name: security_flags_for_display
          type: group
          fields:
            - name: expires
              type: keyword
              description: Expiration value of the security flag, if any.
            - name: key
              type: keyword
              description: Security flag key.
            - name: reason
              type: keyword
              description: Security flag reason.
        - name: south_owner
          type: keyword
          description: South component owner identifier when reported.
        - name: ssm_parameter_data_type
          type: keyword
          description: SSM parameter data type.
        - name: ssm_parameter_description
          type: keyword
          description: SSM parameter description.
        - name: ssm_parameter_key_id
          type: keyword
          description: KMS key id used to encrypt the SSM parameter.
        - name: ssm_parameter_last_modified_date
          type: date
          description: Last modification time of the SSM parameter.
        - name: ssm_parameter_last_modified_user
          type: keyword
          description: User who last modified the SSM parameter.
        - name: ssm_parameter_name
          type: keyword
          description: SSM parameter name.
        - name: ssm_parameter_tier
          type: keyword
          description: SSM parameter tier.
        - name: ssm_parameter_type
          type: keyword
          description: SSM parameter type (String, StringList, SecureString).
        - name: ssm_parameter_version
          type: long
          description: SSM parameter version number.
        - name: status
          type: keyword
          description: Entity operational status string when reported.
        - name: tags_str
          type: keyword
          description: Vendor-provided tags reported as plain strings.
        - name: time_to_revive_at
          type: date
          description: Time at which the entity is scheduled to be revived.
        - name: type
          type: keyword
          description: Vendor type discriminator returned alongside `entity_type`.
        - name: type_display_name
          type: keyword
          description: Human-readable label for `type`.
        - name: use_type
          type: keyword
          description: Vendor `useType` discriminator.
        - name: xm_labels
          type: flattened
          description: XM Cyber managed labels attached to the entity.
        - name: xm_provider_account
          type: keyword
          description: XM Cyber provider account identifier.
        - name: xm_update_time
          type: date
          description: Time at which XM Cyber last updated the entity record.
        - name: access_key_creation_date
          type: date
          description: Access key creation date (e.g. 2024-10-01T10:06:58.000Z).
        - name: activity_period
          type: keyword
          description: 'Activity period (e.g. Inactive: Never Used).'
        - name: architecture
          type: keyword
          description: Architecture (e.g. amd64).
        - name: availability_zone
          type: keyword
          description: Availability zone (e.g. us-east-1b).
        - name: aws_user_name
          type: keyword
          description: Aws user name (e.g. xmcyber-eldar-arn-iam-user-sts-QRc9n12OTGiq).
        - name: behavior_version
          type: keyword
          description: Behavior version (e.g. 7).
        - name: boot_id
          type: keyword
          description: Boot id (e.g. 004c6ece-9317-40e7-9a15-d24df7709df0).
        - name: canonical_name
          type: keyword
          description: Canonical name (e.g. vpn.Corporate.xm/).
        - name: cloud_provider
          type: keyword
          description: Cloud provider (e.g. UNSUPPORTED_CLOUD_PROVIDER).
        - name: cluster_name
          type: keyword
          description: Cluster name (e.g. udoawsk8s).
        - name: cluster_role_rules
          type: group
          fields:
            - name: api_groups
              type: keyword
              description: Api groups (e.g. ["authorization.k8s.io"]).
            - name: non_resource_urls
              type: keyword
              description: Non resource urls (e.g. ["/version/", "/apis/*", "/openapi", "/api", "/version", "/livez", "/apis", "/re).
            - name: resource_names
              type: keyword
              description: Resource names (e.g. ["kubernetes.io/kube-apiserver-client"]).
            - name: resources
              type: keyword
              description: Resources (e.g. ["localsubjectaccessreviews"]).
            - name: verbs
              type: keyword
              description: Verbs (e.g. ["create"]).
        - name: cluster_role_rules_to_display
          type: keyword
          description: 'Cluster role rules to display (e.g. [   {     "apiGroups": [       "authorization.k8s.io"     ],     "resources": [ ).'
        - name: cluster_unique_id
          type: keyword
          description: Cluster unique id (e.g. 0617e36e156eacec443c98be905fb028ff739448fb763421528f2034ea3058a8).
        - name: comments
          type: flattened
          description: Comments (e.g. []).
        - name: container_runtime_version
          type: keyword
          description: Container runtime version (e.g. containerd://2.1.5-k3s1.33).
        - name: create_time
          type: date
          description: Create time (e.g. 2026-03-02T18:36:07.000Z).
        - name: created
          type: date
          description: Created (e.g. 2025-09-24T10:10:32.413Z).
        - name: created_by
          type: keyword
          description: Created by (e.g. arn:aws:sts::908522078858:assumed-role/AWSReservedSSO_AdministratorAccess_a84c80).
        - name: created_date
          type: date
