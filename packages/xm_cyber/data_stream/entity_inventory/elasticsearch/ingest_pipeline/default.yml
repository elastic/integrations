  - script:
      tag: script_split_xm_cyber_entity_inventory_ipv4_by_shape
      description: >
        Splits xm_cyber.entity_inventory.ipv4 by element shape so that each shape
        lands at a field path with a compatible mapping. String elements (e.g.
        "wKgByw==") stay in xm_cyber.entity_inventory.ipv4 (keyword). Object
        elements (e.g. {"data":[192,168,1,203],"type":"Buffer"}) move to
        xm_cyber.entity_inventory.ipv4_buffer with their original "data" and
        "type" keys preserved.
      if: ctx.xm_cyber?.entity_inventory?.ipv4 instanceof List
      lang: painless
      source: |-
        def src = ctx.xm_cyber.entity_inventory.ipv4;
        def strings = [];
        def objects = [];
        for (def v : src) {
          if (v == null) { continue; }
          if (v instanceof String) {
            strings.add((String) v);
          } else if (v instanceof Map) {
            objects.add(v);
          }
        }
        if (strings.isEmpty()) {
          ctx.xm_cyber.entity_inventory.remove('ipv4');
        } else {
          ctx.xm_cyber.entity_inventory.ipv4 = strings;
        }
        if (!objects.isEmpty()) {
          ctx.xm_cyber.entity_inventory.ipv4_buffer = objects;
        }
      on_failure:
        - append:
            tag: append_error_message_script_split_ipv4_by_shape
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
