      tag: remove_fields_mapped_to_ecs
      ignore_missing: true
      field:
        # ----- host.* sources -----
        - xm_cyber.entity_inventory.arch
        - xm_cyber.entity_inventory.domain_name
        - xm_cyber.entity_inventory.machine_id
        - xm_cyber.entity_inventory.os_type
        - xm_cyber.entity_inventory.os.distribution_name
        - xm_cyber.entity_inventory.os.distribution_version
        - xm_cyber.entity_inventory.os.name
        - xm_cyber.entity_inventory.kernel_version
        - xm_cyber.entity_inventory.os_image
        - xm_cyber.entity_inventory.dns_host_name
        - xm_cyber.entity_inventory.fqdn
        - xm_cyber.entity_inventory.host_ip
        - xm_cyber.entity_inventory.pod_ip
        - xm_cyber.entity_inventory.ec2private_ip_address
        - xm_cyber.entity_inventory.ec2public_ip_address
        - xm_cyber.entity_inventory.redshift_cluster_private_ipaddress
        - xm_cyber.entity_inventory.redshift_cluster_public_ipaddress
        - xm_cyber.entity_inventory.ipv4str
        - xm_cyber.entity_inventory.entity_details.mac_addresses
        # ----- cloud.* sources -----
        - xm_cyber.entity_inventory.account_id
        - xm_cyber.entity_inventory.account_name
        - xm_cyber.entity_inventory.region
        - xm_cyber.entity_inventory.availability_zone
        - xm_cyber.entity_inventory.cloud_provider
        - xm_cyber.entity_inventory.ec2instance_id
        - xm_cyber.entity_inventory.instance_id
        # ----- orchestrator.* sources -----
        - xm_cyber.entity_inventory.cluster_name
        - xm_cyber.entity_inventory.cluster_unique_id
        - xm_cyber.entity_inventory.namespace
        # ----- user.* sources -----
        - xm_cyber.entity_inventory.aws_user_name
        - xm_cyber.entity_inventory.user_name
        - xm_cyber.entity_inventory.iam_unique_id
        - xm_cyber.entity_inventory.sid
        - xm_cyber.entity_inventory.distinguished_name
        # ----- service.* sources -----
        - xm_cyber.entity_inventory.engine
        - xm_cyber.entity_inventory.lambda_runtime
