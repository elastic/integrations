        - xm_cyber.entity_inventory.password_hash
        # ----- tags source -----
        - xm_cyber.entity_inventory.tags_str

  # ----- Drop null/empty leaf values from the document -----
  - script:
      tag: script_to_drop_null_values
      description: Drop null/empty leaf values from the document.
      lang: painless
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);

  - append:
      tag: append_preserve_on_collector_error
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null

on_failure:
  - append:
      tag: pipeline_on_failure_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: pipeline_on_failure_preserve_original
      field: tags
      value: preserve_original_event
      allow_duplicates: false
