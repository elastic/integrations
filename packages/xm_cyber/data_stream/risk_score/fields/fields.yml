- name: labels
  type: group
  fields:
    - name: risk_grade
      type: keyword
      description: The risk grade of the scenario.
    - name: risk_score
      type: keyword
      description: The risk score of the scenario as a keyword label.
    - name: scenario_name
      type: keyword
      description: The name of the scenario.
- name: xm_cyber.risk_score
  type: group
  fields:
    - name: avg_graph_data
      type: group
      fields:
        - name: date
          type: date
          description: The date of the average graph data point.
        - name: grade
          type: keyword
          description: The risk grade for the average graph data point.
        - name: score
          type: float
          description: The average risk score for the given date.
    - name: graph_data
      type: group
      fields:
        - name: campaigns
          type: keyword
          description: The campaigns associated with the risk score graph data.
        - name: from_date
          type: date
          description: The start date of the time window for the graph data.
        - name: grade
          type: keyword
          description: The risk grade for the scenario within the given time window.
        - name: score
          type: float
          description: The risk score for the scenario within the given time window.
        - name: to_date
          type: date
          description: The end date of the time window for the graph data.
    - name: resolution
      type: integer
      description: The resolution (granularity in days) of the risk score graph data.
    - name: scenario
      type: group
      fields:
        - name: grade
          type: keyword
          description: The risk grade of the attack scenario.
        - name: id
          type: keyword
          description: The unique identifier of the attack scenario.
        - name: name
          type: keyword
          description: The name of the attack scenario.
        - name: score
          type: keyword
          description: The risk score of the scenario as a keyword label.
        - name: score_float
          type: float
          description: The risk score of the scenario as a floating-point number.
    - name: stats
      type: group
      fields:
        - name: grade
          type: keyword
          description: The overall risk grade across all scenarios.
        - name: score
          type: float
          description: The overall risk score across all scenarios.
        - name: trend
          type: long
          description: The trend of the risk score compared to the previous period (positive means improving, negative means worsening).
    - name: time_id
      type: keyword
      description: The time window for the risk score report.
