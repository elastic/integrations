- name: labels
  type: group
  fields:
    - name: risk_score
      type: keyword
      description: The risk score of the scenario as a keyword label.
    - name: risk_grade
      type: keyword
      description: The risk grade of the scenario.
    - name: scenario_name
      type: keyword
      description: The name of the scenario.
- name: xm_cyber.risk_score
  type: group
  fields:
    - name: resolution
      type: integer
    - name: time_id
      type: keyword
      description: The time window for the risk score report.
    - name: avg_graph_data
      type: group
      fields:
        - name: date
          type: date
        - name: grade
          type: keyword
        - name: score
          type: float
    - name: scenario
      type: group
      fields:
        - name: grade
          type: keyword
        - name: graph_data
          type: group
          fields:
            - name: campaigns
              type: flattened
            - name: from_date
              type: date
            - name: grade
              type: keyword
            - name: score
              type: float
            - name: to_date
              type: date
        - name: id
          type: keyword
        - name: name
          type: keyword
        - name: score
          type: keyword
    - name: stats
      type: group
      fields:
        - name: grade
          type: keyword
        - name: score
          type: float
        - name: trend
          type: long
