      tag: convert_is_critical_asset_boolean
      field: xm_cyber.device.is_critical_asset
      type: boolean
      ignore_missing: true
      if: ctx.xm_cyber?.device?.is_critical_asset != ''
      on_failure:
        - remove:
            tag: remove_is_critical_asset_on_failure
            field: xm_cyber.device.is_critical_asset
            ignore_missing: true
        - append:
            tag: append_error_message_is_critical_asset
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # ----- ECS vulnerability.* (device aggregate max CVSS; not a single CVE record) -----
  # Priority matches per-CVE pipeline: max_cvss_v4 > max_cvss_v31 > max_cvss_v3 > max_cvss_v2
  - set:
      tag: set_vulnerability_score_base_from_max_cvss_v4
      field: vulnerability.score.base
      copy_from: xm_cyber.device.max_cvss_v4
      ignore_empty_value: true
  - set:
      tag: set_vulnerability_score_version_from_max_cvss_v4
      field: vulnerability.score.version
      value: '4.0'
      if: ctx.xm_cyber?.device?.max_cvss_v4 != null
  - set:
      tag: set_vulnerability_score_base_from_max_cvss_v31
      field: vulnerability.score.base
      copy_from: xm_cyber.device.max_cvss_v31
      ignore_empty_value: true
      if: ctx.vulnerability?.score?.base == null
  - set:
      tag: set_vulnerability_score_version_from_max_cvss_v31
      field: vulnerability.score.version
      value: '3.1'
      if: ctx.vulnerability?.score?.version == null && ctx.xm_cyber?.device?.max_cvss_v31 != null
  - set:
      tag: set_vulnerability_score_base_from_max_cvss_v3
      field: vulnerability.score.base
      copy_from: xm_cyber.device.max_cvss_v3
      ignore_empty_value: true
      if: ctx.vulnerability?.score?.base == null
  - set:
      tag: set_vulnerability_score_version_from_max_cvss_v3
      field: vulnerability.score.version
      value: '3.0'
      if: ctx.vulnerability?.score?.version == null && ctx.xm_cyber?.device?.max_cvss_v3 != null
  - set:
      tag: set_vulnerability_score_base_from_max_cvss_v2
      field: vulnerability.score.base
      copy_from: xm_cyber.device.max_cvss_v2
      ignore_empty_value: true
      if: ctx.vulnerability?.score?.base == null
  - set:
      tag: set_vulnerability_score_version_from_max_cvss_v2
      field: vulnerability.score.version
      value: '2.0'
      if: ctx.vulnerability?.score?.version == null && ctx.xm_cyber?.device?.max_cvss_v2 != null
  - set:
      tag: set_vulnerability_classification_cvss
      field: vulnerability.classification
      value: CVSS
      if: ctx.vulnerability?.score?.base != null

  # ----- ECS host.* / device.* (inventory; device.* is beta per ECS) -----
  - set:
      tag: set_host_name_from_fqdn
      field: host.name
      copy_from: xm_cyber.device.fqdn
      ignore_empty_value: true
  - set:
      tag: set_host_hostname_from_device_name
      field: host.hostname
      copy_from: xm_cyber.device.device_name
      ignore_empty_value: true
  - set:
      tag: set_host_id_from_device_id
      field: host.id
      copy_from: xm_cyber.device.device_id
      ignore_empty_value: true
  - set:
      tag: set_host_domain_from_domain
      field: host.domain
      copy_from: xm_cyber.device.domain
      ignore_empty_value: true
  - set:
      tag: set_host_os_full_from_os
      field: host.os.full
      copy_from: xm_cyber.device.os
      ignore_empty_value: true
  - set:
      tag: set_host_type_from_device_type
      field: host.type
      copy_from: xm_cyber.device.device_type
      ignore_empty_value: true
  - convert:
      tag: convert_ip_address_to_ip
      field: xm_cyber.device.ip_address
      type: ip
      ignore_missing: true
      if: ctx.xm_cyber?.device?.ip_address != ''
      on_failure:
        - remove:
            field: xm_cyber.device.ip_address
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      tag: append_host_ip_from_ip_address
      field: host.ip
      value: '{{{xm_cyber.device.ip_address}}}'
      allow_duplicates: false
      if: ctx.xm_cyber?.device?.ip_address != null && ctx.xm_cyber.device.ip_address != ''
  - set:
      tag: set_device_id_from_device_id
      field: device.id
      copy_from: xm_cyber.device.device_id
      ignore_empty_value: true
  - set:
      tag: set_device_type_from_device_type
      field: device.type
      copy_from: xm_cyber.device.device_type
      ignore_empty_value: true

  # ----- @timestamp from last_scan -----
  - set:
      tag: set_at_timestamp_from_last_scan
      field: '@timestamp'
      copy_from: xm_cyber.device.last_scan
      ignore_empty_value: true

  # ----- apps[]: normalize numeric counters (choke_point_found_on stays keyword per fields.yml) -----
  - foreach:
      tag: foreach_apps_device_found_on_long
      field: xm_cyber.device.apps
      if: ctx.xm_cyber?.device?.apps instanceof List
      processor:
        convert:
          field: _ingest._value.device_found_on
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.device_found_on
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      tag: foreach_apps_affected_critical_assets_long
      field: xm_cyber.device.apps
      if: ctx.xm_cyber?.device?.apps instanceof List
      processor:
        convert:
          field: _ingest._value.affected_critical_assets
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.affected_critical_assets
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      tag: foreach_apps_products_critical_assets_at_risk_long
      field: xm_cyber.device.apps
      if: ctx.xm_cyber?.device?.apps instanceof List
      processor:
        convert:
          field: _ingest._value.products_critical_assets_at_risk
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.products_critical_assets_at_risk
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      tag: foreach_apps_product_vulnerabilities_long
      field: xm_cyber.device.apps
      if: ctx.xm_cyber?.device?.apps instanceof List
      processor:
        convert:
          field: _ingest._value.product_vulnerabilities
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.product_vulnerabilities
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # ----- Remove duplicate vendor fields that have been mapped to ECS -----
  - remove:
      description: Remove vendor-specific fields that are duplicated to ECS.
      tag: remove_fields_mapped_to_ecs
      ignore_missing: true
      field:
        - xm_cyber.device.device_id
        - xm_cyber.device.device_name
        - xm_cyber.device.fqdn
        - xm_cyber.device.domain
        - xm_cyber.device.os
        - xm_cyber.device.device_type
        - xm_cyber.device.ip_address
        - xm_cyber.device.last_scan

  # ----- Drop null/empty leaf values from the document -----
  - script:
      tag: script_to_drop_null_values
      description: Drop null/empty leaf values from the document.
      lang: painless
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - append:
      tag: append_preserve_on_collector_error
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      tag: pipeline_on_failure_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: pipeline_on_failure_preserve_original
      field: tags
      value: preserve_original_event
      allow_duplicates: false
