---
description: Pipeline for processing XM Cyber device inventory events.
processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: 9.3.0
  - terminate:
      description: Error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # drop CEL token-refresh placeholder before JSON parsing
  - drop:
      description: Drop the CEL token-refresh placeholder event before JSON parsing.
      tag: drop_cel_retry_placeholder
      if: ctx.message instanceof String && ctx.message == 'retry'

  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  # parse the event JSON
  - rename:
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      field: message
      target_field: event.original
      ignore_missing: true
  - remove:
      description: The `message` field is no longer required if the document has an `event.original` field.
      tag: remove_message
      if: ctx.event?.original != null
      field: message
      ignore_missing: true
  - json:
      tag: json_event_original_into_xm_cyber_device
      field: event.original
      target_field: xm_cyber.device
      if: ctx.event?.original != null

  # ----- event.kind / event.category / event.type (ECS-oriented; detailed ECS host.* mapping deferred) -----
  - set:
      tag: set_event_kind_event
      field: event.kind
      value: event
  - append:
      tag: append_event_category_host
      field: event.category
      value: host
  - append:
      tag: append_event_type_info
      field: event.type
      value: info
  - script:
      description: >
        Convert field names from camelCase to snake_case recursively under xm_cyber.device (including nested apps and active_cves_safe_version entries).
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      source: |-
        String camelToSnake(String str) {
            def result = "";
            for (int i = 0; i < str.length(); i++) {
                char c = str.charAt(i);
                if (Character.isUpperCase(c)) {
                    if (i > 0 && Character.isLowerCase(str.charAt(i - 1))) {
                        result += "_";
                    }
                    result += Character.toLowerCase(c);
                } else {
                    result += c;
                }
            }
            return result;
        }
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              String newKey = camelToSnake(entry.getKey());
              newObj[newKey] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }
        if (ctx.xm_cyber?.device != null) {
          ctx.xm_cyber.device = convertToSnakeCase(ctx.xm_cyber.device);
        }
      on_failure:
        - append:
            tag: append_error_message_script_camel_to_snake
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # ----- _id fingerprint from device_id (after snake_case normalization) -----
  - fingerprint:
      tag: fingerprint_with_device_id
      fields:
        - xm_cyber.device.device_id
      target_field: _id
      ignore_missing: true

  # ----- Date fields (ISO8601) -----
  - date:
      tag: date_last_scan
      field: xm_cyber.device.last_scan
      target_field: xm_cyber.device.last_scan
      formats:
        - ISO8601
      if: ctx.xm_cyber?.device?.last_scan != null && ctx.xm_cyber.device.last_scan != ''
      on_failure:
        - remove:
            tag: remove_last_scan_on_failure
            field: xm_cyber.device.last_scan
            ignore_missing: true
        - append:
            tag: append_error_message_last_scan
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      tag: date_last_compromised
      field: xm_cyber.device.last_compromised
      target_field: xm_cyber.device.last_compromised
      formats:
        - ISO8601
      if: ctx.xm_cyber?.device?.last_compromised != null && ctx.xm_cyber.device.last_compromised != ''
      on_failure:
        - remove:
            tag: remove_last_compromised_on_failure
            field: xm_cyber.device.last_compromised
            ignore_missing: true
        - append:
            tag: append_error_message_last_compromised
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # ----- Convert: long (top-level) -----
  - convert:
      tag: convert_choke_point_score_long
      field: xm_cyber.device.choke_point_score
      type: long
      ignore_missing: true
      if: ctx.xm_cyber?.device?.choke_point_score != ''
