- name: xm_cyber.product
  type: group
  fields:
    - name: product_name
      type: keyword
      description: Product display name from the API.
    - name: vendor
      type: keyword
      description: Software vendor when present.
    - name: devices_found_on
      type: long
      description: Number of devices where this product is installed.
    - name: choke_points_found_on
      type: long
      description: Count of choke-point contexts where this product appears.
    - name: affected_critical_assets
      type: long
      description: Affected critical assets count for this product.
    - name: products_critical_assets_at_risk
      type: long
      description: Critical assets at risk attributed to this product.
    - name: product_vulnerabilities
      type: long
      description: Vulnerability count associated with this product.
    - name: product_operating_systems
      type: keyword
      description: OS strings where the product is reported
