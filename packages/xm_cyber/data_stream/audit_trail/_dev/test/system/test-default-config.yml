wait_for_data_timeout: 1m
input: cel
service: xm_cyber
vars:
  url: http://{{Hostname}}:{{Port}}
  api_key: mock-api-key
data_stream:
  vars:
    interval: 2s
    initial_interval: 24h
    page_size: 100
    preserve_original_event: true
    preserve_duplicate_custom_fields: false
assert:
  min_count: 3
