---
description: Pipeline for processing XM Cyber Audit Trail logs.
processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: 9.3.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # drop CEL informational refresh-token messages
  - drop:
      description: Drops CEL retry messages from the ingest stream.
      tag: drop_cel_retry_message
      if: ctx.message instanceof String && ctx.message == 'retry'
  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  # parse the event JSON
  - rename:
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      field: message
      target_field: event.original
      ignore_missing: true
  - remove:
      description: The `message` field is no longer required if the document has an `event.original` field.
      tag: remove_message
      if: ctx.event?.original != null
      field: message
      ignore_missing: true
  - json:
      tag: json_event_original_into_xm_cyber_audit_trail
      if: ctx.event?.original != null
      field: event.original
      target_field: xm_cyber.audit_trail

  # Set event.* fields
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - fingerprint:
      tag: fingerprint_with_id
      fields:
        - xm_cyber.audit_trail._id
      target_field: _id
      ignore_missing: true
  - date:
      tag: date_audit_trail_timestamp
      if: ctx.xm_cyber?.audit_trail?.timestamp != null && ctx.xm_cyber.audit_trail.timestamp != ''
      field: xm_cyber.audit_trail.timestamp
      target_field: xm_cyber.audit_trail.timestamp
      formats:
        - ISO8601
      on_failure:
        - remove:
            tag: remove_audit_trail_timestamp_on_failure
            field: xm_cyber.audit_trail.timestamp
            ignore_missing: true
        - append:
            tag: append_error_message_timestamp
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_at_timestamp_from_audit_trail_timestamp
      field: '@timestamp'
      copy_from: xm_cyber.audit_trail.timestamp
      ignore_empty_value: true

  - convert:
      tag: convert_source_ip_to_ip_type
      field: xm_cyber.audit_trail.terminalId.ip
      type: ip
      ignore_missing: true
      on_failure:
        - rename:
            tag: rename_source_ip_to_source_ip_string
            field: xm_cyber.audit_trail.terminalId.ip
            target_field: xm_cyber.audit_trail.terminalId.ip_string
            ignore_missing: true
  - set:
      tag: set_event_id_from_audit_id
      field: event.id
      copy_from: xm_cyber.audit_trail._id
      ignore_empty_value: true
  - set:
      tag: set_event_action_from_audit_event_sub_type
      field: event.action
      copy_from: xm_cyber.audit_trail.eventSubType
      ignore_empty_value: true
  - lowercase:
      tag: lowercase_event_action
      field: event.action
      ignore_missing: true
  - split:
      tag: split_event_action
      field: event.action
      separator: '[\s_]+'
      ignore_missing: true
      if: ctx.event?.action != ''
      on_failure:
        - append:
            tag: append_error_message_split_event_action
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - join:
      tag: join_event_action
      field: event.action
      separator: '-'
      if: ctx.event?.action instanceof List
      on_failure:
        - append:
            tag: append_error_message_join_event_action
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Map vendor fields to ECS user.* / source.*
  - set:
      tag: set_user_name_from_audit_user_name
      field: user.name
      copy_from: xm_cyber.audit_trail.userId.name
      ignore_empty_value: true
  - set:
      tag: set_message_from_audit_details
      field: message
      copy_from: xm_cyber.audit_trail.details
      ignore_empty_value: true
  - set:
      tag: set_user_email_from_audit_user_email
      field: user.email
      copy_from: xm_cyber.audit_trail.userId.email
      ignore_empty_value: true
  - dissect:
      tag: dissect_user_email_into_user_domain
      if: ctx.user?.email != null && ctx.user.email.contains('@')
      field: user.email
      pattern: '%{}@%{user.domain}'
      on_failure:
        - append:
            tag: append_error_message_dissect_user_email
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_source_domain_from_audit_terminal_hostname
      field: source.domain
      copy_from: xm_cyber.audit_trail.terminalId.hostname
      ignore_empty_value: true
  - set:
      tag: set_source_ip_from_audit_terminal_ip
      field: source.ip
      copy_from: xm_cyber.audit_trail.terminalId.ip
      ignore_empty_value: true
  # Normalise vendor field names to snake_case recursively under xm_cyber.audit_trail.*
  - script:
      description: >
        Convert field names from camelCase to snake_case recursively.
        NOTE: This processor reassigns the normalized output back to
        ctx.xm_cyber.audit_trail.
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      source: |-
        // Helper function to convert camelCase to snake_case
        String camelToSnake(String str) {
            def result = "";
            for (int i = 0; i < str.length(); i++) {
                char c = str.charAt(i);
                if (Character.isUpperCase(c)) {
                    if (i > 0 && Character.isLowerCase(str.charAt(i - 1))) {
                        result += "_";
                    }
                    result += Character.toLowerCase(c);
                } else {
                    result += c;
                }
            }
            return result;
        }
        // Recursive function to handle nested fields
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            def newObj = [:];
            for (entry in obj.entrySet()) {
              String newKey = camelToSnake(entry.getKey());
              newObj[newKey] = convertToSnakeCase(entry.getValue());
            }
            return newObj;
          } else if (obj instanceof List) {
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }
        // Apply the conversion
        if (ctx.xm_cyber?.audit_trail != null) {
          ctx.xm_cyber.audit_trail = convertToSnakeCase(ctx.xm_cyber.audit_trail);
        }

  # GeoIP enrichment for source.ip
  - geoip:
      tag: geoip_source_ip_location
      if: ctx.source?.ip != null
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  - geoip:
      tag: geoip_source_ip_asn
      if: ctx.source?.ip != null
      field: source.ip
      target_field: source.as
      database_file: GeoLite2-ASN.mmdb
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      tag: rename_source_as_asn_to_source_as_number
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      tag: rename_source_as_organization_name
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true

  # Populate related.* for cross-event correlation
  - append:
      tag: append_source_ip_to_related_ip
      if: ctx.source?.ip != null
      field: related.ip
      value: '{{{source.ip}}}'
      allow_duplicates: false
  - append:
      tag: append_user_name_to_related_user
      if: ctx.user?.name != null
      field: related.user
      value: '{{{user.name}}}'
      allow_duplicates: false
  - append:
      tag: append_user_email_to_related_user
      if: ctx.user?.email != null
      field: related.user
      value: '{{{user.email}}}'
      allow_duplicates: false
  - append:
      tag: append_source_domain_to_related_hosts
      if: ctx.source?.domain != null
      field: related.hosts
      value: '{{{source.domain}}}'
      allow_duplicates: false

  - remove:
      tag: remove_custom_duplicate_fields
      field:
        - xm_cyber.audit_trail._id
        - xm_cyber.audit_trail.timestamp
        - xm_cyber.audit_trail.user_id
        - xm_cyber.audit_trail.terminal_id.ip
        - xm_cyber.audit_trail.terminal_id.hostname
      ignore_missing: true

  # Drop null/empty values from the document
  - script:
      tag: script_to_drop_null_values
      description: This script processor iterates over the whole document to remove fields with null values.
      lang: painless
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);

  - set:
      tag: set_pipeline_error_into_event_kind
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_preserve_original_event_on_error
      if: ctx.error?.message != null
      field: tags
      value: preserve_original_event
      allow_duplicates: false
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      tag: set_pipeline_error_to_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_tags
      field: tags
      value: preserve_original_event
      allow_duplicates: false
