format_version: 3.3.2
name: xm_cyber
title: XM Cyber
version: 0.1.0
description: Collect logs from XM Cyber with Elastic Agent.
type: integration
categories:
  - security
conditions:
  kibana:
    version: ^8.18.0 || ^9.0.0
  elastic:
    subscription: basic
screenshots:
  - src: /img/xm_cyber-risk_score.png
    title: Risk Score Dashboard
    size: 600x600
    type: image/png
icons:
  - src: /img/xm_cyber-logo.svg
    title: XM Cyber logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: xm_cyber
    title: XM Cyber
    description: Collect logs from XM Cyber.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: cel
        title: Collect logs from XM Cyber API
        description: Collecting logs via XM Cyber API.
        vars:
          - name: url
            type: url
            title: XM Cyber Base URL
            description: 'Full URL of your XM Cyber instance (e.g. https://myorg.clients.xmcyber.com). Do not include /api.'
            show_user: true
            required: true
          - name: api_key
            type: password
            title: API Key
            description: 'API key for XM Cyber authentication.'
            show_user: true
            required: true
            secret: true
          - name: proxy_url
            type: url
            title: Proxy URL
            description: 'URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>. Please ensure your username and password are in URL encoded format.'
            show_user: false
            required: false
          - name: ssl
            type: yaml
            title: TLS Configuration
            description: 'i.e. certificate_authorities, supported_protocols, verification_mode etc, more examples found in the [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html#ssl-common-config-reference).'
            show_user: false
            required: false
            multi: false
owner:
  github: elastic/security-service-integrations
  type: elastic
