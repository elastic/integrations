---
description: Parse Atlassian Cloud organization audit events from the events-stream API.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: >-
        Renames the original `message` field to `event.original` to store a copy of the original message.
        The `event.original` field is not touched if the document already has one.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: parse_event_original_json
      if: ctx.event?.original != null
      on_failure:
        - append:
            field: error.message
            tag: append_json_parse_failure
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      lang: painless
      tag: clean_empty_location_strings
      description: Treat empty location strings as missing before geo field mapping.
      if: ctx.json?.attributes?.location != null
      source: |-
        def loc = ctx.json.attributes.location;
        for (def key : new ArrayList(loc.keySet())) {
          def val = loc.get(key);
          if (val instanceof String && val.isEmpty()) {
            loc.remove(key);
          }
        }
  - rename:
      field: json.id
      target_field: event.id
      ignore_missing: true
      tag: rename_event_id
  - rename:
      field: json.attributes.action
      target_field: event.action
      ignore_missing: true
      tag: rename_event_action
  - date:
      field: json.attributes.time
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_timestamp
      if: ctx.json?.attributes?.time != null
  - date:
      field: json.attributes.processedAt
      target_field: event.created
      formats:
        - ISO8601
      tag: date_event_created
      if: ctx.json?.attributes?.processedAt != null
  - rename:
      field: json.attributes.context
      target_field: atlassian_cloud.audit.context
      ignore_missing: true
      tag: rename_context
  - rename:
      field: json.attributes.container
      target_field: atlassian_cloud.audit.container
      ignore_missing: true
      tag: rename_container
  - rename:
      field: json.attributes.location.ip
      target_field: source.ip
      ignore_missing: true
      tag: rename_source_ip
  - rename:
      field: json.attributes.location.countryName
      target_field: source.geo.country_name
      ignore_missing: true
      tag: rename_source_geo_country
  - rename:
      field: json.attributes.location.regionName
      target_field: source.geo.region_name
      ignore_missing: true
      tag: rename_source_geo_region
  - rename:
      field: json.attributes.location.city
      target_field: source.geo.city_name
      ignore_missing: true
      tag: rename_source_geo_city
  - rename:
      field: json.attributes.location.geo
      target_field: atlassian_cloud.audit.location.geo
      ignore_missing: true
      tag: rename_location_geo_label
  - geoip:
      field: source.ip
      target_field: source.as
      database_file: GeoLite2-ASN.mmdb
      tag: geoip_source_asn
      if: ctx.source?.ip != null
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
      tag: rename_as_number
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
      tag: rename_as_org_name
  - remove:
      field:
        - source.as.ip
        - source.as.network
      ignore_missing: true
      tag: remove_as_metadata
  - rename:
      field: json.message.content
      target_field: message
      ignore_missing: true
      tag: rename_audit_message_content
  - rename:
      field: json.message.format
      target_field: atlassian_cloud.audit.message.format
      ignore_missing: true
      tag: rename_audit_message_format
  - rename:
      field: json.attributes.actor.auth.authType
      target_field: atlassian_cloud.audit.actor.auth.auth_type
      ignore_missing: true
      tag: rename_actor_auth_type
  - rename:
      field: json.attributes.actor.auth.tokenId
      target_field: atlassian_cloud.audit.actor.auth.token_id
      ignore_missing: true
      tag: rename_actor_auth_token_id
  - rename:
      field: json.attributes.actor.auth.tokenLabel
      target_field: atlassian_cloud.audit.actor.auth.token_label
      ignore_missing: true
      tag: rename_actor_auth_token_label
  - rename:
      field: json.attributes.actor.onBehalfOf.id
      target_field: atlassian_cloud.audit.actor.on_behalf_of.id
      ignore_missing: true
      tag: rename_actor_on_behalf_of_id
  - rename:
      field: json.attributes.actor.onBehalfOf.name
      target_field: atlassian_cloud.audit.actor.on_behalf_of.name
      ignore_missing: true
      tag: rename_actor_on_behalf_of_name
  - rename:
      field: json.attributes.actor.onBehalfOf.email
      target_field: atlassian_cloud.audit.actor.on_behalf_of.email
      ignore_missing: true
      tag: rename_actor_on_behalf_of_email
  - rename:
      field: json.attributes.actor.app.id
      target_field: atlassian_cloud.audit.actor.app.id
      ignore_missing: true
      tag: rename_actor_app_id
  - rename:
      field: json.attributes.actor.app.type
      target_field: atlassian_cloud.audit.actor.app.type
      ignore_missing: true
      tag: rename_actor_app_type
  - rename:
      field: json.attributes.actor.app.attributes
      target_field: atlassian_cloud.audit.actor.app.attributes
      ignore_missing: true
      tag: rename_actor_app_attributes
  - script:
      lang: painless
      tag: map_actor_to_user_or_app
      description: >-
        Map human actors to ECS user fields when the actor id looks like an account id or email is present.
        System and app actors are stored under atlassian_cloud.audit.actor.app instead of user.*.
      if: ctx.json?.attributes?.actor != null
      source: |-
        def actor = ctx.json.attributes.actor;
        boolean isUser = false;
        if (actor.email instanceof String && actor.email.indexOf('@') >= 0) {
          isUser = true;
        } else if (actor.id instanceof String) {
          String id = actor.id;
          if (id.contains(':') || id ==~ /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/) {
            isUser = true;
          }
        }
        if (isUser) {
          ctx.user = ctx.user != null ? ctx.user : new HashMap();
          if (actor.id != null) {
            ctx.user.id = actor.id;
          }
          if (actor.name != null) {
            ctx.user.name = actor.name;
          }
          if (actor.email instanceof String && actor.email.indexOf('@') >= 0) {
            ctx.user.email = actor.email;
          }
        } else {
          ctx.atlassian_cloud = ctx.atlassian_cloud != null ? ctx.atlassian_cloud : new HashMap();
          ctx.atlassian_cloud.audit = ctx.atlassian_cloud.audit != null ? ctx.atlassian_cloud.audit : new HashMap();
          ctx.atlassian_cloud.audit.actor = ctx.atlassian_cloud.audit.actor != null ? ctx.atlassian_cloud.audit.actor : new HashMap();
          def app = ctx.atlassian_cloud.audit.actor.app != null ? ctx.atlassian_cloud.audit.actor.app : new HashMap();
          if (actor.id != null) {
            app.id = actor.id;
          }
          if (actor.name != null) {
            app.name = actor.name;
          }
          ctx.atlassian_cloud.audit.actor.app = app;
        }
  - set:
      field: observer.vendor
      tag: set_observer_vendor
      value: Atlassian
  - set:
      field: observer.product
      tag: set_observer_product
      value: Atlassian Cloud
  - set:
      field: observer.type
      tag: set_observer_type
      value: saas
  - script:
      lang: painless
      tag: set_ecs_categorization
      description: Map Atlassian audit action identifiers to ECS categorization fields using prefix and exact lookups.
      if: ctx.event?.action != null
      params:
        exact:
          user_login:
            category: [authentication]
            type: [info]
            outcome: success
          user_logout:
            category: [authentication]
            type: [info]
            outcome: success
          user_login_failed:
            category: [authentication]
            type: [info]
            outcome: failure
          org_settings_update:
            category: [iam, configuration]
            type: [change]
            outcome: success
        prefixes:
          - prefix: user_login_failed
            category: [authentication]
            type: [info]
            outcome: failure
          - prefix: user_login
            category: [authentication]
            type: [info]
            outcome: success
          - prefix: user_logout
            category: [authentication]
            type: [info]
            outcome: success
          - prefix: organization_users_
            category: [iam]
            type: [info]
            outcome: success
          - prefix: user_profile_
            category: [iam]
            type: [user]
            outcome: success
          - prefix: user_invitation_
            category: [iam]
            type: [user, creation]
            outcome: success
          - prefix: user_invit
            category: [iam]
            type: [user, creation]
            outcome: success
          - prefix: user_deactiv
            category: [iam]
            type: [user, change]
            outcome: success
          - prefix: user_reactiv
            category: [iam]
            type: [user, change]
            outcome: success
          - prefix: user_remov
            category: [iam]
            type: [user, deletion]
            outcome: success
          - prefix: marketplace_app_install
            category: [configuration, package]
            type: [installation]
            outcome: success
          - prefix: marketplace_app_uninstall
            category: [configuration, package]
            type: [deletion]
            outcome: success
          - prefix: api_token_creat
            category: [iam]
            type: [creation]
            outcome: success
          - prefix: api_token_revok
            category: [iam]
            type: [deletion]
            outcome: success
          - prefix: group_member
            category: [iam]
            type: [group, change]
            outcome: success
          - prefix: confluence_
            category: [configuration]
            type: [info]
            outcome: success
          - prefix: jira_
            category: [configuration]
            type: [info]
            outcome: success
          - prefix: bitbucket_
            category: [configuration]
            type: [info]
            outcome: success
        default:
          category: [configuration]
          type: [info]
          outcome: success
        policy_suffix: _policy_update
        policy:
          category: [iam, configuration]
          type: [change]
          outcome: success
      source: |-
        def action = ctx.event.action;
        ctx.event.kind = 'event';
        def mapping = null;
        if (params.exact.containsKey(action)) {
          mapping = params.exact[action];
        }
        if (mapping == null && params.prefixes instanceof List) {
          for (def entry : params.prefixes) {
            if (action.startsWith(entry.prefix)) {
              mapping = entry;
              break;
            }
          }
        }
        if (mapping == null && action.endsWith(params.policy_suffix)) {
          mapping = params.policy;
        }
        if (mapping == null) {
          mapping = params.default;
        }
        ctx.event.category = mapping.category;
        ctx.event.type = mapping.type;
        if (mapping.containsKey('outcome')) {
          ctx.event.outcome = mapping.outcome;
        }
  - append:
      field: related.ip
      tag: append_source_ip_to_related
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null
  - append:
      field: related.user
      tag: append_user_name_to_related
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.user
      tag: append_user_email_to_related
      value: '{{{user.email}}}'
      allow_duplicates: false
      if: ctx.user?.email != null
  - append:
      field: related.user
      tag: append_on_behalf_of_name_to_related
      value: '{{{atlassian_cloud.audit.actor.on_behalf_of.name}}}'
      allow_duplicates: false
      if: ctx.atlassian_cloud?.audit?.actor?.on_behalf_of?.name != null
  - append:
      field: related.user
      tag: append_on_behalf_of_email_to_related
      value: '{{{atlassian_cloud.audit.actor.on_behalf_of.email}}}'
      allow_duplicates: false
      if: ctx.atlassian_cloud?.audit?.actor?.on_behalf_of?.email != null
  - remove:
      field: json
      ignore_missing: true
      tag: remove_json_temp
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
