source:
  index: "logs-*"
  query:
    bool:
      filter:
        - range:
              '@timestamp':
                gte: now-1M
        - exists:
            field: okta.event_type
        - term:
            'data_stream.dataset': "okta.system"
        - term:
            'okta.outcome.result': "SUCCESS"
        - terms:
            'okta.event_type': ["user.session.start","user.session.end"]
      must_not:
        - terms:
            '_tier': [ "data_cold", "data_frozen" ]
dest:
  index: ml_okta_multiple_user_sessions_pad_euid-2.0.0
  aliases:
    - alias: ml_okta_multiple_user_sessions_pad_euid.latest
      move_on_creation: true
    - alias: ml_okta_multiple_user_sessions_pad_euid.all
      move_on_creation: false
description: This transform runs hourly and collects user session information for Okta events for the Privileged Access Detection package.
frequency: 1h
pivot:
  aggregations:
    okta_distinct_ips:
      cardinality:
        field: client.ip
    okta_distinct_countries:
      cardinality:
        field: client.geo.country_name
    'okta_session_info.has_end_event':
      filter:
        term:
          'okta.event_type': "user.session.end"
  group_by:
    'user.entity.id_computed':
      terms:
        script:
          id: euid_user_entity
    'agent.name':
      terms:
        field: agent.name
    'source.user.full_name':
      terms:
        field: source.user.full_name
    '@timestamp':
      date_histogram:
        field: '@timestamp'
        fixed_interval: 30m
settings:
  # This is required to prevent the transform from clobbering the Fleet-managed mappings.
  deduce_mappings: false
  unattended: true
sync:
  time:
    delay: 60s
    field: '@timestamp'
_meta:
  fleet_transform_version: 2.0.0
  run_as_kibana_system: false