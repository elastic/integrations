format_version: 3.4.1
name: privileges
title: "SAP Privileges"
version: 0.1.0
source:
  license: "Elastic-2.0"
description: "Collect logs from SAP Privileges for macOS admin rights management."
type: integration
categories:
  - custom
  - os_system
  - security
conditions:
  kibana:
    version: "^9.0.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/sample-screenshot.png
    title: SAP Privileges logs in Kibana
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: SAP Privileges logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: SAP Privileces
    title: SAP Privileges logs
    description: Collect logs from SAP Privileges
    inputs:
      - type: logfile
        title: Collect SAP Privileges logs from file
        description: Collect logs from SAP Privileges application logs
        vars:
          - name: paths
            type: text
            title: Paths
            multi: true
            required: true
            show_user: true
      - type: tcp
        title: Collect SAP Privileges logs via TCP
        description: Collect logs from SAP Privileges via TCP syslog
        vars:
          - name: listen_address
            type: text
            title: Listen Address
            description: The bind address to listen for TCP connections. Set to `0.0.0.0` to bind to all available interfaces.
            multi: false
            required: true
            show_user: true
            default: localhost
          - name: listen_port
            type: integer
            title: Listen Port
            description: The TCP port number to listen on.
            multi: false
            required: true
            show_user: true
            default: 9040
          - name: ssl
