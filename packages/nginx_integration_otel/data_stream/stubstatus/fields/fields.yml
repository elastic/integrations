- name: nginx
  type: group
  fields:
    - name: connections_accepted
      type: long
      metric_type: counter
      description: The total number of accepted client connections.
    - name: connections_handled
      type: long
      metric_type: counter
      description: The total number of handled client connections.
    - name: connections_current
      type: long
      metric_type: gauge
      description: The current number of connections. Broken down by state via the `state` attribute.
    - name: requests
      type: long
      metric_type: counter
      description: The total number of client requests.
- name: state
  type: keyword
  description: The state of the connection (active, reading, writing, waiting). Present only on nginx.connections_current datapoints.
