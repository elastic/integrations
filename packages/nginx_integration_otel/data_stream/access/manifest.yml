title: Nginx access logs
type: logs
dataset: nginx.access
streams:
  - package: filelog_otel
    title: Nginx access logs via filelog OTel receiver
    description: Collect Nginx access log files using the OTel filelog receiver.
    vars:
      - name: include
        type: text
        title: Include paths
        description: Glob patterns for Nginx access log files.
        multi: true
        required: false
        show_user: true
        default:
          - /var/log/nginx/access.log*
      - name: multiline_line_start_pattern
        show_user: false

