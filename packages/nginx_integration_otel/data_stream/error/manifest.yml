title: Nginx error logs
type: logs
dataset: nginx.error
streams:
  - package: filelog_otel
    title: Nginx error logs via filelog OTel receiver
    description: Collect Nginx error log files using the OTel filelog receiver.
    vars:
      - name: include
        type: text
        title: Include paths
        description: Glob patterns for Nginx error log files.
        multi: true
        required: false
        show_user: true
        default:
          - /var/log/nginx/error.log*
      - name: multiline_line_start_pattern  
        show_user: false 
