dashboards:
  - id: apache_tomcat_otel-request-processing
    name: '[Tomcat OTel] Request Processing'
    description: >-
      Detailed request processing pipeline metrics including per-connector
      throughput, latency, error rates, and per-servlet performance.

    filters:
      - field: data_stream.dataset
        equals: tomcat.otel

    settings:
      margins: true
      sync:
        cursor: true
        tooltips: false
        colors: false

    controls:
      - type: options
        label: Host
        data_view: metrics-*
        field: resource.attributes.host.name

    panels:
      # ─── Navigation ───────────────────────────────────────────────────
      - title: Navigation
        size: {w: 48, h: 2}
        links:
          layout: horizontal
          items:
            - label: Overview
              dashboard: apache_tomcat_otel-overview
            - label: Request Processing
              dashboard: apache_tomcat_otel-request-processing
            - label: Thread Pool & Connections
              dashboard: apache_tomcat_otel-thread-pool-connections
            - label: JVM Memory & GC
              dashboard: apache_tomcat_otel-jvm-memory-gc
            - label: Sessions & Applications
              dashboard: apache_tomcat_otel-sessions-servlets
            - label: JVM & OS Resources
              dashboard: apache_tomcat_otel-jvm-os-resources

      # ─── Dashboard Overview + KPIs ─────────────────────────────────────
      - hide_title: true
        size: {w: 16, h: 12}
        markdown:
          content: |
            ## [Tomcat OTel] Request Processing

            This dashboard provides detailed request processing pipeline metrics:
            - Per-connector request rates and throughput
            - Bytes sent and received over time
            - Request latency and maximum processing time
            - Per-servlet and per-web-module performance breakdown

      # KPI Row 1 (w:8 × 4 = 32)
      - title: Total Requests
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_requestCount IS NOT NULL
            - STATS total_requests = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_requestCount))
          primary:
            field: total_requests
            label: Total Requests
            format:
              type: number
              compact: true

      - title: Total Errors
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_errorCount IS NOT NULL
            - STATS total_errors = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_errorCount))
          primary:
            field: total_errors
            label: Total Errors
            format:
              type: number
              compact: true

      - title: Bytes Sent
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_bytesSent IS NOT NULL
            - STATS total_sent = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_bytesSent))
          primary:
            field: total_sent
            label: Bytes Sent
            format:
              type: bytes

      - title: Bytes Received
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_bytesReceived IS NOT NULL
            - STATS total_recv = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_bytesReceived))
          primary:
            field: total_recv
            label: Bytes Received
            format:
              type: bytes

      # KPI Row 2 (w:8 × 4 = 32)
      - title: Error Rate
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_requestCount IS NOT NULL
            - STATS requests = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_requestCount)), errors = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_errorCount))
            - EVAL error_rate = CASE(requests > 0, errors / requests, 0)
          primary:
            field: error_rate
            label: Error Rate
            format:
              type: percent
              decimals: 2

      - title: Max Processing Time
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_maxTime IS NOT NULL
            - STATS max_time = MAX(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_maxTime))
          primary:
            field: max_time
            label: Max Processing Time
            format:
              type: number
              decimals: 0
              suffix: " ms"

      - title: Avg Latency
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_processingTime IS NOT NULL
            - STATS proc_time = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_processingTime)), req_count = SUM(LAST_OVER_TIME(Catalina_GlobalRequestProcessor_requestCount))
            - EVAL avg_latency = CASE(req_count > 0, ROUND(proc_time / req_count, 1), 0)
          primary:
            field: avg_latency
            label: Avg Latency
            format:
              type: number
              decimals: 1
              suffix: " ms"

      - title: Active Connectors
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - FROM metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_requestCount IS NOT NULL
            - STATS active_connectors = COUNT_DISTINCT(attributes.name)
          primary:
            field: active_connectors
            label: Active Connectors
            format:
              type: number

      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Request Throughput'

      - title: Request Rate by Connector
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_requestCount IS NOT NULL
            - STATS requests = SUM(DELTA(Catalina_GlobalRequestProcessor_requestCount)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.name
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: requests
              label: Requests
              format:
                type: number
                decimals: 0
          breakdown:
            field: attributes.name
          legend:
            visible: show
            position: right

      - title: Bytes Transferred Over Time
        size: {w: 24, h: 12}
        esql:
          type: area
          mode: stacked
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_bytesSent IS NOT NULL
            - STATS bytes_sent = SUM(DELTA(Catalina_GlobalRequestProcessor_bytesSent)), bytes_recv = SUM(DELTA(Catalina_GlobalRequestProcessor_bytesReceived)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: bytes_sent
              label: Bytes Sent
              format:
                type: bytes
            - field: bytes_recv
              label: Bytes Received
              format:
                type: bytes
          legend:
            visible: show
            position: right

      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Request Latency'

      - title: Average Latency Over Time
        description: Derived from cumulative processingTime / requestCount delta per bucket.
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_processingTime IS NOT NULL
            - STATS proc_delta = SUM(DELTA(Catalina_GlobalRequestProcessor_processingTime)), req_delta = SUM(DELTA(Catalina_GlobalRequestProcessor_requestCount)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.name
            - EVAL avg_latency = CASE(req_delta > 0, ROUND(proc_delta / req_delta, 1), 0)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: avg_latency
              label: Avg Latency (ms)
              format:
                type: number
                decimals: 1
                suffix: " ms"
          breakdown:
            field: attributes.name
          legend:
            visible: show
            position: right

      - title: Max Request Processing Time Over Time
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_maxTime IS NOT NULL
            - STATS max_time = MAX(MAX_OVER_TIME(Catalina_GlobalRequestProcessor_maxTime)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.name
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: max_time
              label: Max Time (ms)
              format:
                type: number
                decimals: 0
                suffix: " ms"
          breakdown:
            field: attributes.name
          legend:
            visible: show
            position: right

      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Error Analysis'

      - title: Error Count Over Time by Connector
        size: {w: 24, h: 12}
        esql:
          type: bar
          mode: stacked
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_errorCount IS NOT NULL
            - STATS errors = SUM(DELTA(Catalina_GlobalRequestProcessor_errorCount)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.name
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: errors
              label: Errors
              format:
                type: number
                decimals: 0
          breakdown:
            field: attributes.name
          color:
            palette: eui_amsterdam_color_blind
          legend:
            visible: show
            position: right

      - title: Error Rate % Over Time
        description: Percentage of requests resulting in errors per time bucket.
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_GlobalRequestProcessor_requestCount IS NOT NULL
            - STATS req_delta = SUM(DELTA(Catalina_GlobalRequestProcessor_requestCount)), err_delta = SUM(DELTA(Catalina_GlobalRequestProcessor_errorCount)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), attributes.name
            - EVAL error_pct = CASE(req_delta > 0, ROUND(err_delta / req_delta * 100, 2), 0)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: error_pct
              label: Error Rate %
              format:
                type: number
                decimals: 2
                suffix: "%"
          breakdown:
            field: attributes.name
          legend:
            visible: show
            position: right

      - hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Servlet & Application Detail'

      - title: Servlet Performance Summary
        size: {w: 24, h: 15}
        esql:
          type: datatable
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_Servlet_requestCount IS NOT NULL
            - STATS requests = MAX(LAST_OVER_TIME(Catalina_Servlet_requestCount)), errors = MAX(LAST_OVER_TIME(Catalina_Servlet_errorCount)), proc_time = MAX(LAST_OVER_TIME(Catalina_Servlet_processingTime)), max_time = MAX(LAST_OVER_TIME(Catalina_Servlet_maxTime)), min_time = MAX(LAST_OVER_TIME(Catalina_Servlet_minTime)) BY attributes.name, attributes.WebModule
            - EVAL min_time_display = CASE(min_time > 9.0E18, null, min_time)
            - EVAL avg_latency = CASE(requests > 0, ROUND(proc_time / requests, 1), 0)
            - EVAL error_pct = CASE(requests > 0, ROUND(errors / requests * 100, 2), 0)
            - SORT requests DESC
          breakdowns:
            - field: attributes.name
              label: Servlet
            - field: attributes.WebModule
              label: Web Module
          metrics:
            - field: requests
              label: Requests
              format:
                type: number
            - field: errors
              label: Errors
              format:
                type: number
            - field: error_pct
              label: Error %
              format:
                type: number
                decimals: 2
                suffix: "%"
            - field: avg_latency
              label: Avg Latency (ms)
              format:
                type: number
                decimals: 1
            - field: max_time
              label: Max Time (ms)
              format:
                type: number
                decimals: 0

      - title: Web Module Performance Summary
        size: {w: 24, h: 15}
        esql:
          type: datatable
          query:
            - TS metrics-tomcat.otel-*
            - WHERE Catalina_WebModule_requestCount IS NOT NULL
            - STATS requests = MAX(LAST_OVER_TIME(Catalina_WebModule_requestCount)), errors = MAX(LAST_OVER_TIME(Catalina_WebModule_errorCount)), proc_time = MAX(LAST_OVER_TIME(Catalina_WebModule_processingTime)), max_time = MAX(LAST_OVER_TIME(Catalina_WebModule_maxTime)), startup_time = MAX(LAST_OVER_TIME(Catalina_WebModule_startupTime)) BY attributes.name
            - EVAL avg_latency = CASE(requests > 0, ROUND(proc_time / requests, 1), 0)
            - EVAL error_pct = CASE(requests > 0, ROUND(errors / requests * 100, 2), 0)
            - SORT requests DESC
          breakdowns:
            - field: attributes.name
              label: Web Module
          metrics:
            - field: requests
              label: Requests
              format:
                type: number
            - field: errors
              label: Errors
              format:
                type: number
            - field: error_pct
              label: Error %
              format:
                type: number
                decimals: 2
                suffix: "%"
            - field: avg_latency
              label: Avg Latency (ms)
              format:
                type: number
                decimals: 1
            - field: max_time
              label: Max Time (ms)
              format:
                type: number
                decimals: 0
            - field: startup_time
              label: Startup Time (ms)
              format:
                type: number
                decimals: 0
