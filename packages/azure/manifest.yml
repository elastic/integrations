name: azure
title: Azure Logs
version: 1.19.4
description: This Elastic integration collects logs from Azure
type: integration
icons:
  - src: /img/azure_logs_logo.png
    title: logo azure
    size: 32x32
    type: image/svg+xml
format_version: "3.0.2"
categories:
  - azure
  - observability
conditions:
  kibana:
    version: "^8.13.0"
  elastic:
    subscription: basic
screenshots:
  - src: /img/azure_user_activity_dashboard.png
    title: Azure User Activity Dashboard
    size: 3024x3162
    type: image/png
policy_templates:
  - name: azure_logs
    title: Azure Logs
    description: Collect logs from Azure services.
    inputs:
      - type: azure-eventhub
        title: Collect Azure logs from Event Hub
        description: Collect Azure logs from Event Hub
owner:
  github: elastic/obs-ds-hosted-services
  type: elastic
