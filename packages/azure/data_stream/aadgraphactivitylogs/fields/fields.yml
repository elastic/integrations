- name: azure.aadgraphactivitylogs
  type: group
  fields:
    - name: category
      type: keyword
      description: |
        Azure Event Category. For Azure AD Graph Activity Logs, this is `AzureADGraphActivityLogs`.
    - name: operation_name
      type: keyword
      description: |
        Operation name. For this category the value is always the literal string `AAD Graph Activity`; rely on the derived `event.action` (HTTP method + directory collection from `requestUri`) for detection.
    - name: properties
      type: group
      description: |
        Event properties.
      fields:
        - name: api_version
          type: keyword
          description: |
            The API version of the event.
        - name: app_id
          type: keyword
          description: |
            The identifier for the application.
        - name: billed_size
          type: double
          description: |
            The record size in bytes.
        - name: actor_type
          type: keyword
          description: |
            Type of identity that issued the request, for example `User`, `ServicePrincipal`.
        - name: device_id
          type: keyword
          description: |
            The identifier of the device from which the authentication request originated.
        - name: session_id
          type: keyword
          description: |
            The unique identifier for the authentication session.
        - name: client_auth_method
          type: integer
          description: |
            Indicates how the client was authenticated. For a public client, the value is 0. If client ID and client secret are used, the value is 1. If a client certificate was used for authentication, the value is 2.
        - name: direct_access_source
          type: keyword
          description: |
            The path through which the request reached the AAD Graph service (for example, `Gateway`).
        - name: env_cloud_role
          type: keyword
          description: |
            The Microsoft cloud role identifier for the service handling the request (for example, `restdirectoryservice`). Useful for distinguishing first-party Microsoft service traffic from third-party callers.
        - name: identity_provider
          type: keyword
          description: |
            The identity provider that authenticated the subject of the token.
        - name: is_billable
          type: boolean
          description: |
            Specifies whether ingesting the data is billable. When _IsBillable is false ingestion isn't billed to your Azure account.
        - name: request_uri
          type: keyword
          description: |
            The URI of the request.
        - name: roles
          type: keyword
          description: |
            The roles in token claims.
        - name: scopes
          type: keyword
          description: |
            The scopes in token claims.
        - name: service_principal_id
          type: keyword
          description: |
            The identifier of the servicePrincipal making the request.
        - name: sign_in_activity_id
          type: keyword
          description: |
            Identifier of the Microsoft Entra ID sign-in event that established the authentication context for this AAD Graph request. Correlates this request with an entry in Entra ID Sign-In Logs.
        - name: source_system
          type: keyword
          description: |
            The type of agent the event was collected by. For example, OpsManager for Windows agent, either direct connect or Operations Manager, Linux for all Linux agents, or Azure for Azure Diagnostics.
        - name: time_generated
          type: date
          description: |
            The date and time the request was received.
        - name: token_issued_at
          type: date
          description: |
            The timestamp the token was issued at.
        - name: type
          type: keyword
          description: |
            The name of the table.
        - name: user_agent
          type: keyword
          description: |
            The user agent information related to request.
        - name: wids
          type: keyword
          description: |
            Denotes the tenant-wide roles assigned to this user.
