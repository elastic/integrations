# newer versions go on top
- version: "1.1.1"
  changes:
    - description: Fix missing Content-Type header in API requests.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19486
- version: "1.1.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18552
- version: "1.0.4"
  changes:
    - description: Fix CEL response `events` field for evaluations with no work to do.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19195
- version: "1.0.3"
  changes:
    - description: Fix CEL handling for nullable API response arrays.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19147
- version: "1.0.2"
  changes:
    - description: Remove the recommendations field from vulnerabilities requests.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/17907
- version: "1.0.1"
  changes:
    - description: Downgrade the `format_version` to the minimum version that supports all the necessary features for the package.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/15602
- version: "1.0.0"
  changes:
    - description: Release package as GA.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15298
    - description: Fix dashboard link for Serverless Project.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/15298
- version: "0.3.0"
  changes:
    - description: Use `terminate` processor instead of `fail` processor to handle agent errors.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14393
- version: "0.2.0"
  changes:
    - description: Remove duplicated installation instructions from the documentation.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14376
- version: "0.1.1"
  changes:
    - description: Add temporary processor to remove the fields added by the Agentless policy.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/14172
- version: "0.1.0"
  changes:
    - description: Initial release.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13388
