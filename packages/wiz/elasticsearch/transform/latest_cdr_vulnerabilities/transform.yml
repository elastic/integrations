source:
  index:
    - "logs-wiz.vulnerability-*"
  query:
    bool:
      must:
        - range:
            "@timestamp":
              gte: "now-90d"
      must_not:
        - exists:
            field: error.message
        - terms:
            _tier:
              - data_frozen
              - data_cold
dest:
  index: "security_solution-wiz.vulnerability_latest-v2"
  aliases:
    - alias: "security_solution-wiz.vulnerability_latest"
      move_on_creation: true
latest:
  unique_key:
    - vulnerability.id
    - resource.id
    - vulnerability.package.name
    - vulnerability.package.version
    - data_stream.namespace
  sort: "@timestamp"
description: Latest Cloud Vulnerabilities Findings from Wiz
settings:
  unattended: true
frequency: 5m
sync:
  time:
    field: event.ingested
retention_policy:
  time:
    field: "@timestamp"
    max_age: 90d
_meta:
  managed: true
  # Bump this version to delete, reinstall, and restart the transform during package.
  # Version bump is needed if there is any code change in transform.
  fleet_transform_version: 0.3.0
