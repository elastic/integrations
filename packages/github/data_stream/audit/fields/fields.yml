- name: github
  type: group
  description: >-
    GitHub Audit log fields
  fields:
    - name: active
      type: boolean
    - name: actor_id
      type: keyword
      description: >-
        The id of the actor who performed the action.
    - name: actor_ip
      type: ip
      description: >-
        The IP address of the entity performing the action.
    - name: actor_is_bot
      type: boolean
    - name: actor_location
      type: group
      fields:
        - name: country_name
          type: keyword
        - name: ip
          type: ip
    - name: audit_log_stream_enabled
      type: boolean
    - name: audit_log_stream_id
      type: keyword
    - name: audit_log_stream_sink
      type: keyword
    - name: audit_log_stream_sink_details
      type: keyword
    - name: blocked_user
      type: keyword
      description: >-
        The username of the account being blocked.
    - name: business
      type: keyword
    - name: business_id
      type: keyword
    - name: category
      type: keyword
      description: >-
        GitHub action category.
    - name: changes
      type: group
      fields:
        - name: billing_plan
          type: keyword
        - name: roles
          type: keyword
    - name: commit_id
      type: keyword
    - name: data
      type: group
      fields:
        - name: event
          type: keyword
        - name: head_branch
          type: keyword
        - name: head_sha
          type: keyword
        - name: started_at
          type: date
        - name: trigger_id
          type: keyword
        - name: workflow_id
          type: keyword
        - name: workflow_run_id
          type: keyword
    - name: device
      type: keyword
    - name: events
      type: keyword
    - name: events_object
      type: object
      object_type: keyword
      object_type_mapping_type: "*"
    - name: forked_repository
      type: keyword
    - name: hashed_token
      type: keyword
      description: >-
        SHA-256 hash of the token used for authentication.
    - name: hook_id
      type: keyword
    - name: integration
      type: keyword
      description: >-
        The GitHub App that triggered the event.
    - name: login_method
      type: keyword
    - name: logout_reason
      type: keyword
    - name: message
      type: keyword
    - name: multi_repo
      type: boolean
    - name: name
      type: keyword
    - name: new_role
      type: keyword
    - name: number
      type: long
    - name: old_role
      type: keyword
    - name: operation_type
      type: keyword
    - name: org
      type: keyword
      description: >-
        GitHub organization name.
    - name: org_id
      type: keyword
    - name: permission
      type: keyword
      description: >-
        GitHub user permissions for the event.
    - name: programmatic_access_type
      type: keyword
      description: >-
        Type of authentication used.
    - name: public_repo
      type: boolean
    - name: publicly_leaked
      type: boolean
    - name: pull_request_id
      type: keyword
    - name: pull_request_title
      type: keyword
    - name: pull_request_url
      type: keyword
    - name: reason
      type: keyword
    - name: repo
      type: keyword
      description: >-
        GitHub repository name.
    - name: repo_id
      type: keyword
    - name: repositories_added
      type: keyword
    - name: repositories_added_names
      type: keyword
      description: >-
        The name of the repository added to a GitHub App installation.
    - name: repositories_removed
      type: keyword
    - name: repositories_removed_names
      type: keyword
      description: >-
        The name of the repository removed from a GitHub App installation.
    - name: repository_public
      type: boolean
      description: >-
        Whether the GitHub repository is publicly visible.
    - name: repository_selection
      type: keyword
      description: >-
        Whether all repositories have been selected or there's a selection involved.
    - name: repository
      type: keyword
      description: >-
        The name of the repository.
    - name: request_category
      type: keyword
    - name: ruleset_enforcement
      type: keyword
      description: >-
        Enforcement state of the ruleset (active, disabled, evaluate).
    - name: ruleset_id
      type: keyword
      description: >-
        Unique identifier of the ruleset.
    - name: ruleset_name
      type: keyword
      description: >-
        Name of the ruleset.
    - name: ruleset_old_enforcement
      type: keyword
      description: >-
        Previous enforcement state of the ruleset on update (active, disabled, evaluate).
    - name: ruleset_old_name
      type: keyword
      description: >-
        Previous name of the ruleset, emitted on rename.
    - name: ruleset_source_type
      type: keyword
      description: >-
        Source type of the ruleset (Organization, Repository).
    - name: ruleset_bypass_actors
      type: group
      description: >-
        Bypass actors configured on the ruleset at create time.
      fields:
        - name: actor_id
          type: long
        - name: actor_type
          type: keyword
        - name: bypass_mode
          type: keyword
        - name: id
          type: long
    - name: ruleset_bypass_actors_added
      type: group
      description: >-
        Bypass actors added to the ruleset on update.
      fields:
        - name: actor_id
          type: long
        - name: actor_type
          type: keyword
        - name: bypass_mode
          type: keyword
        - name: id
          type: long
    - name: ruleset_bypass_actors_deleted
      type: group
      description: >-
        Bypass actors removed from the ruleset on update.
      fields:
        - name: actor_id
          type: long
        - name: actor_type
          type: keyword
        - name: bypass_mode
          type: keyword
        - name: id
          type: long
    - name: ruleset_bypass_actors_updated
      type: group
      description: >-
        Bypass actors whose mode changed on update.
      fields:
        - name: actor_id
          type: long
        - name: actor_type
          type: keyword
        - name: bypass_mode
          type: keyword
        - name: id
          type: long
    - name: ruleset_conditions
      type: group
      description: >-
        Conditions defining which repositories the ruleset applies to, at create time.
      fields:
        - name: id
          type: long
        - name: target
          type: keyword
        - name: parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
        - name: old_parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
    - name: ruleset_conditions_added
      type: group
      description: >-
        Conditions added to the ruleset on update.
      fields:
        - name: id
          type: long
        - name: target
          type: keyword
        - name: parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
        - name: old_parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
    - name: ruleset_conditions_deleted
      type: group
      description: >-
        Conditions removed from the ruleset on update.
      fields:
        - name: id
          type: long
        - name: target
          type: keyword
        - name: parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
        - name: old_parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
    - name: ruleset_conditions_updated
      type: group
      description: >-
        Conditions whose parameters changed on update.
      fields:
        - name: id
          type: long
        - name: target
          type: keyword
        - name: parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
        - name: old_parameters
          type: group
          fields:
            - name: exclude
              type: keyword
            - name: include
              type: keyword
            - name: repository_ids
              type: keyword
    - name: secret_type
      type: keyword
    - name: secret_type_display_name
      type: keyword
    - name: secrets_updated
      type: keyword
    - name: source_branch
      type: keyword
    - name: target_branch
      type: keyword
    - name: team
      type: keyword
      description: >-
        GitHub team name.
    - name: token_id
      type: keyword
    - name: token_scopes
      type: keyword
    - name: topic
      type: keyword
    - name: transport_protocol
      type: long
      description: >-
        The type of protocol (for example, HTTP or SSH) used to transfer Git data.
    - name: transport_protocol_name
      type: keyword
      description: >-
        A human readable name for the protocol (for example, HTTP or SSH) used to transfer Git data.
    - name: user_agent
      type: keyword
      description: >-
        The user agent of the entity performing the action.
    - name: user_id
      type: keyword
    - name: version
      type: keyword
    - name: visibility
      type: keyword
      description: >-
        The repository visibility, for example `public` or `private`.
