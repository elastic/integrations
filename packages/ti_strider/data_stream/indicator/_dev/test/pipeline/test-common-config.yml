dynamic_fields:
  # expires_at is set by pipeline script; format may vary by Elasticsearch version
  "ti_strider.indicator.expires_at": "^[0-9]{4}(-[0-9]{2}){2}T[0-9]{2}(:[0-9]{2}){2}.*"
fields:
  # Required by ingest pipeline script for ZonedDateTime.parse(ctx['@timestamp'])
  '@timestamp': '2021-11-11T01:02:03.123Z'
  tags:
    - preserve_original_event
