- name: freeipa.kdc.client_principal
  type: keyword
  description: Kerberos client principal (user@REALM).
- name: freeipa.kdc.service_principal
  type: keyword
  description: Service principal requested.
- name: freeipa.kdc.error_code
  type: keyword
  description: KDC error code for failed requests.
- name: freeipa.kdc.request_type
  type: keyword
  description: AS_REQ or TGS_REQ.
- name: freeipa.kdc.encryption_type
  type: keyword
  description: Encryption type used.
