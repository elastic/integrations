- name: freeipa.directory.connection_id
  type: long
  description: 389DS connection identifier.
- name: freeipa.directory.operation_id
  type: long
  description: Operation identifier within the connection.
- name: freeipa.directory.bind_dn
  type: keyword
  description: Distinguished name used in the BIND request.
- name: freeipa.directory.bind_method
  type: keyword
  description: Authentication method (SIMPLE or SASL/mechanism).
- name: freeipa.directory.operation
  type: keyword
  description: LDAP operation type.
