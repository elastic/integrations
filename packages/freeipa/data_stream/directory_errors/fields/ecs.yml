- name: ecs.version
  type: keyword
  description: ECS version this event conforms to.
- name: error.message
  type: match_only_text
  description: Error message.
- name: event.kind
  type: keyword
  description: The kind of event.
- name: event.category
  type: keyword
  description: Event category for ECS compatibility.
- name: event.type
  type: keyword
  description: Event type for ECS compatibility.
- name: log.level
  type: keyword
  description: Log level of the event.
- name: event.action
  type: keyword
  description: The action captured by the event.
- name: event.outcome
  type: keyword
  description: The outcome of the event.
- name: event.reason
  type: keyword
  description: Reason for the event outcome.
- name: observer.vendor
  type: keyword
  description: Vendor of the observer.
- name: observer.product
  type: keyword
  description: Product name of the observer.
- name: observer.type
  type: keyword
  description: Type of the observer component.
- name: observer.hostname
  type: keyword
  description: Hostname of the observer.
- name: service.type
  type: keyword
  description: Service type identifier.
- name: error.code
  type: keyword
  description: LDAP error code from replication failures.
- name: related.hosts
  type: keyword
  description: All hostnames or FQDNs related to the event.
- name: tags
  type: keyword
  description: List of keywords used to tag each event.
