- name: freeipa.directory_error
  type: group
  description: 389 Directory Server error log fields.
  fields:
    - name: message
      type: match_only_text
      description: Full log message text after the subsystem prefix.
    - name: subsystem
      type: keyword
      description: Directory Server subsystem that produced the log entry.
    - name: agreement
      type: keyword
      description: Replication agreement name.
    - name: remote_host
      type: keyword
      description: Remote host in a replication agreement.
    - name: ldap_error_code
      type: integer
      description: LDAP error code from a replication operation.
