- name: freeipa.directory
  type: group
  description: 389DS directory server access log fields.
  fields:
    - name: connection_id
      type: long
      description: LDAP connection number (conn=N).
    - name: operation_id
      type: long
      description: LDAP operation number within the connection (op=N).
    - name: operation
      type: keyword
      description: LDAP operation type (BIND, SRCH, MOD, ADD, DEL, CMP, RESULT, CONNECTION, DISCONNECT).
    - name: base_dn
      type: keyword
      description: Base DN for search operations.
    - name: scope
      type: keyword
      description: Search scope (base, one, sub).
    - name: filter
      type: keyword
      description: LDAP search filter.
    - name: target_dn
      type: keyword
      description: Target DN for modify, add, delete, or compare operations.
    - name: bind_dn
      type: keyword
      description: DN used for BIND authentication.
    - name: bind_method
      type: keyword
      description: BIND method (SIMPLE or SASL/mechanism).
    - name: result_code
      type: integer
      description: LDAP result code (0 = success).
    - name: entries_returned
      type: long
      description: Number of entries returned by the operation.
    - name: elapsed_time
      type: float
      description: Elapsed time for the operation in seconds.
    - name: unindexed
      type: boolean
      description: Whether the operation required an unindexed search.
    - name: ssl
      type: boolean
      description: Whether the connection uses SSL/TLS.
    - name: tag_number
      type: long
      description: LDAP protocol tag number from RESULT.
    - name: notes
      type: keyword
      description: Notes field from RESULT lines (P for paged, U for unindexed, A for all-ids threshold).
    - name: new_superior
      type: keyword
      description: New parent DN in MODRDN operations.
    - name: new_rdn
      type: keyword
      description: New relative distinguished name in MODRDN operations.
    - name: target_op
      type: long
      description: Target operation ID being abandoned (ABANDON events only).
    - name: ext_oid
      type: keyword
      description: OID of the LDAP extended operation.
    - name: ext_name
      type: keyword
      description: Human-readable name of the LDAP extended operation.
