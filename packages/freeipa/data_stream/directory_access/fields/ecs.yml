- name: ecs.version
  type: keyword
  description: ECS version this event conforms to.
- name: error.message
  type: match_only_text
  description: Error message.
- name: event.kind
  type: keyword
  description: The kind of event.
- name: event.category
  type: keyword
  description: Event category for ECS compatibility.
- name: event.type
  type: keyword
  description: Event type for ECS compatibility.
- name: event.action
  type: keyword
  description: The action captured by the event.
- name: event.outcome
  type: keyword
  description: The outcome of the event (success or failure).
- name: event.reason
  type: keyword
  description: Reason for the event outcome, typically an LDAP error description.
- name: event.duration
  type: long
  description: Duration of the LDAP operation in nanoseconds.
- name: service.type
  type: keyword
  description: Service type identifier.
- name: network.protocol
  type: keyword
  description: Application protocol (ldap or ldaps).
- name: network.transport
  type: keyword
  description: Transport protocol (tcp).
- name: client.ip
  type: ip
  description: IP address of the LDAP client.
- name: server.ip
  type: ip
  description: IP address of the directory server.
- name: source.ip
  type: ip
  description: IP address of the LDAP client.
- name: destination.ip
  type: ip
  description: IP address of the directory server.
- name: destination.port
  type: long
  description: Listening port of the directory server (389 or 636).
- name: tls.version_protocol
  type: keyword
  description: TLS version protocol component (tls).
- name: observer.vendor
  type: keyword
  description: Vendor of the observer.
- name: observer.product
  type: keyword
  description: Product name of the observer.
- name: observer.type
  type: keyword
  description: Type of the observer component.
- name: observer.hostname
  type: keyword
  description: Hostname of the observer.
- name: user.name
  type: keyword
  description: Username extracted from the bind DN.
- name: user.id
  type: keyword
  description: Full bind DN.
- name: related.user
  type: keyword
  description: All user identifiers seen in this event.
- name: related.ip
  type: ip
  description: All IP addresses seen in this event.
- name: tls.version
  type: keyword
  description: TLS version negotiated.
- name: tls.cipher
  type: keyword
  description: TLS cipher suite used.
- name: tls.client.x509.subject.distinguished_name
  type: keyword
  description: Subject DN of the client certificate.
- name: tls.client.x509.issuer.distinguished_name
  type: keyword
  description: Issuer DN of the client certificate.
- name: source.geo.city_name
  type: keyword
  description: City name from GeoIP lookup.
- name: source.geo.continent_name
  type: keyword
  description: Continent name from GeoIP lookup.
- name: source.geo.country_iso_code
  type: keyword
  description: Country ISO code from GeoIP lookup.
- name: source.geo.country_name
  type: keyword
  description: Country name from GeoIP lookup.
- name: source.geo.location
  type: geo_point
  description: Longitude and latitude from GeoIP lookup.
- name: source.geo.region_iso_code
  type: keyword
  description: Region ISO code from GeoIP lookup.
- name: source.geo.region_name
  type: keyword
  description: Region name from GeoIP lookup.
- name: source.as.number
  type: long
  description: Autonomous System Number from GeoIP ASN lookup.
- name: source.as.organization.name
  type: keyword
  description: Organization name from GeoIP ASN lookup.
- name: tags
  type: keyword
  description: List of keywords used to tag each event.
