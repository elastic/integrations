- name: ecs.version
  type: keyword
  description: ECS version this event conforms to.
- name: error.message
  type: match_only_text
  description: Error message.
- name: event.kind
  type: keyword
  description: The kind of event.
- name: event.category
  type: keyword
  description: Event category for ECS compatibility.
- name: event.type
  type: keyword
  description: Event type for ECS compatibility.
- name: event.action
  type: keyword
  description: The action captured by the event.
- name: event.outcome
  type: keyword
  description: The outcome of the event (success or failure).
- name: event.reason
  type: keyword
  description: Reason for the event outcome, typically an LDAP error description.
- name: event.duration
  type: long
  description: Duration of the LDAP operation in nanoseconds.
- name: source.ip
  type: ip
  description: IP address of the LDAP client.
- name: user.name
  type: keyword
  description: Username extracted from the bind DN.
- name: user.id
  type: keyword
  description: Full bind DN.
- name: related.user
  type: keyword
  description: All user identifiers seen in this event.
- name: related.ip
  type: ip
  description: All IP addresses seen in this event.
- name: tags
  type: keyword
  description: List of keywords used to tag each event.
