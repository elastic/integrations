title: Directory Server Access Log
type: logs
streams:
  - input: filestream
    title: Directory Server Access Log
    description: Collect 389DS LDAP access log events from the FreeIPA directory server.
    vars:
      - name: paths
        type: text
        title: Log File Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/dirsrv/slapd-*/access
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - freeipa-directory-access
      - name: ignore_older
        type: text
        title: Ignore Older
        description: Ignore log lines older than this duration.
        required: false
        show_user: false
        default: 72h
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        description: Preserve the raw log line in event.original.
        required: false
        show_user: true
        default: false
