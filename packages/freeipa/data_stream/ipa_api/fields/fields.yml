- name: freeipa.api
  type: group
  description: FreeIPA JSON-RPC API call fields.
  fields:
    - name: command
      type: keyword
      description: IPA API command name (user_add, group_add_member, and others).
    - name: parameters
      type: match_only_text
      description: Command parameters from the API call (can contain long values like CSRs).
    - name: server_class
      type: keyword
      description: IPA server handler class (jsonserver_session, jsonserver_kerb).
    - name: result
      type: keyword
      description: Raw result string from the API call (SUCCESS or error text).
    - name: version
      type: keyword
      description: IPA API version used for the call.
