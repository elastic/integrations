- name: ecs.version
  type: keyword
  description: ECS version this event conforms to.
- name: log.level
  type: keyword
  description: Log level of the IPA API message.
- name: error.message
  type: match_only_text
  description: Error message.
- name: event.kind
  type: keyword
  description: The kind of event.
- name: event.category
  type: keyword
  description: Event category for ECS compatibility.
- name: event.type
  type: keyword
  description: Event type for ECS compatibility.
- name: event.action
  type: keyword
  description: The action captured by the event.
- name: event.outcome
  type: keyword
  description: The outcome of the event (success or failure).
- name: event.reason
  type: keyword
  description: Reason for the event outcome when not SUCCESS.
- name: event.duration
  type: long
  description: Duration of the API call in nanoseconds.
- name: observer.vendor
  type: keyword
  description: Vendor of the observer.
- name: observer.product
  type: keyword
  description: Product name of the observer.
- name: observer.type
  type: keyword
  description: Type of the observer component.
- name: observer.hostname
  type: keyword
  description: Hostname of the observer.
- name: service.type
  type: keyword
  description: Service type identifier.
- name: network.protocol
  type: keyword
  description: Application protocol (https).
- name: network.transport
  type: keyword
  description: Transport protocol (tcp).
- name: http.request.method
  type: keyword
  description: HTTP request method (POST).
- name: url.path
  type: keyword
  description: URL path of the IPA API endpoint.
- name: client.ip
  type: ip
  description: IP address of the API client.
- name: source.ip
  type: ip
  description: IP address of the API client.
- name: source.port
  type: long
  description: Source port of the API client.
- name: user.name
  type: keyword
  description: Short principal name (without realm).
- name: user.domain
  type: keyword
  description: Kerberos realm of the principal.
- name: user.id
  type: keyword
  description: Full Kerberos principal (user@REALM).
- name: process.pid
  type: long
  description: Process ID of the httpd worker.
- name: process.thread.id
  type: long
  description: Thread ID of the httpd worker.
- name: user.target.name
  type: keyword
  description: Target user of the API command (the user being created, modified, or deleted).
- name: group.name
  type: keyword
  description: Target group name for group commands.
- name: host.name
  type: keyword
  description: Target host for host commands.
- name: rule.name
  type: keyword
  description: Target HBAC or sudo rule name.
- name: related.user
  type: keyword
  description: All user identifiers seen in this event.
- name: related.ip
  type: ip
  description: All IP addresses seen in this event.
- name: related.hosts
  type: keyword
  description: All hostnames seen in this event.
- name: source.geo.city_name
  type: keyword
  description: City name from GeoIP lookup.
- name: source.geo.continent_name
  type: keyword
  description: Continent name from GeoIP lookup.
- name: source.geo.country_iso_code
  type: keyword
  description: Country ISO code from GeoIP lookup.
- name: source.geo.country_name
  type: keyword
  description: Country name from GeoIP lookup.
- name: source.geo.location
  type: geo_point
  description: Longitude and latitude from GeoIP lookup.
- name: source.geo.region_iso_code
  type: keyword
  description: Region ISO code from GeoIP lookup.
- name: source.geo.region_name
  type: keyword
  description: Region name from GeoIP lookup.
- name: source.as.number
  type: long
  description: Autonomous System Number from GeoIP ASN lookup.
- name: source.as.organization.name
  type: keyword
  description: Organization name from GeoIP ASN lookup.
- name: tags
  type: keyword
  description: List of keywords used to tag each event.
