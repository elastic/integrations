title: IPA API Audit Events
type: logs
streams:
  - input: filestream
    title: IPA API Audit Events
    description: Collect FreeIPA JSON-RPC API calls from the httpd error log.
    vars:
      - name: paths
        type: text
        title: Log File Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/httpd/error_log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - freeipa-ipa-api
      - name: ignore_older
        type: text
        title: Ignore Older
        description: Ignore log lines older than this duration.
        required: false
        show_user: false
        default: 72h
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        description: Preserve the raw log line in event.original.
        required: false
        show_user: true
        default: false
