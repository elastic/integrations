- name: freeipa.ca
  type: group
  description: Dogtag CA signed audit event fields.
  fields:
    - name: event_type
      type: keyword
      description: CA audit event type (for example, CLIENT_ACCESS_SESSION_ESTABLISH, CERT_REQUEST_PROCESSED).
    - name: request_id
      type: keyword
      description: Certificate request ID.
    - name: serial_number
      type: keyword
      description: Certificate serial number.
    - name: subject_dn
      type: keyword
      description: Certificate subject distinguished name.
    - name: profile
      type: keyword
      description: Certificate profile ID used for the request.
    - name: request_type
      type: keyword
      description: Certificate request type (for example, enrollment, renewal).
    - name: revocation_reason
      type: keyword
      description: Reason code for certificate revocation.
    - name: auth_manager
      type: keyword
      description: Authentication manager used for the request.
    - name: thread
      type: keyword
      description: Thread name from the CA audit log.
    - name: server_host
      type: keyword
      description: Server hostname or IP from the audit event.
    - name: server_port
      type: integer
      description: Server port from the audit event.
    - name: info
      type: match_only_text
      description: Additional information from the audit event (can contain stack traces or long error messages).
    - name: issuer_dn
      type: keyword
      description: Certificate issuer distinguished name.
    - name: acl_resource
      type: keyword
      description: ACL resource name from authorization events.
    - name: acl_op
      type: keyword
      description: ACL operation from authorization events.
    - name: role
      type: keyword
      description: Role assumed in ROLE_ASSUME events.
    - name: scope
      type: keyword
      description: Scope of the configuration change.
    - name: approval
      type: keyword
      description: Approval status of certificate status change requests.
