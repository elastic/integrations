title: CA Signed Audit Log
type: logs
streams:
  - input: filestream
    title: CA Signed Audit Log
    description: Collect Dogtag CA signed audit events from pki-tomcat.
    vars:
      - name: paths
        type: text
        title: Log File Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/pki/pki-tomcat/ca/signedAudit/ca_audit
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - freeipa-ca-audit
      - name: ignore_older
        type: text
        title: Ignore Older
        description: Ignore log lines older than this duration.
        required: false
        show_user: false
        default: 72h
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        description: Preserve the raw log line in event.original.
        required: false
        show_user: true
        default: false
