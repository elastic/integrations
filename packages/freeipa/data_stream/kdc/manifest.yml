title: KDC Authentication Events
type: logs
streams:
  - input: filestream
    title: KDC Authentication Events
    description: Collect Kerberos KDC authentication events from krb5kdc.log
    vars:
      - name: paths
        type: text
        title: Log File Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/krb5kdc.log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - freeipa-kdc
      - name: ignore_older
        type: text
        title: Ignore Older
        description: Ignore log lines older than this duration.
        required: false
        show_user: false
        default: 72h
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        description: Preserve the raw log line in event.original.
        required: false
        show_user: true
        default: false
