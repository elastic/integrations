- name: ecs.version
  type: keyword
  description: ECS version this event conforms to.
- name: error.message
  type: match_only_text
  description: Error message.
- name: event.kind
  type: keyword
  description: The kind of event.
- name: event.category
  type: keyword
  description: Event category for ECS compatibility.
- name: event.type
  type: keyword
  description: Event type for ECS compatibility.
- name: event.action
  type: keyword
  description: The action captured by the event.
- name: event.outcome
  type: keyword
  description: The outcome of the event (success or failure).
- name: event.reason
  type: keyword
  description: Reason for the event outcome, typically an error message.
- name: log.level
  type: keyword
  description: Log level of the event.
- name: observer.vendor
  type: keyword
  description: Vendor of the observer.
- name: observer.product
  type: keyword
  description: Product name of the observer.
- name: observer.type
  type: keyword
  description: Type of the observer component.
- name: observer.hostname
  type: keyword
  description: Hostname of the FreeIPA server.
- name: process.pid
  type: long
  description: Process ID of the KDC daemon.
- name: service.type
  type: keyword
  description: Service type identifier.
- name: network.protocol
  type: keyword
  description: Application protocol (kerberos).
- name: network.transport
  type: keyword
  description: Transport protocol (udp).
- name: client.ip
  type: ip
  description: IP address of the Kerberos client.
- name: source.ip
  type: ip
  description: IP address of the Kerberos client.
- name: user.name
  type: keyword
  description: Short principal name (or target user for non-delegation events).
- name: user.domain
  type: keyword
  description: Kerberos realm.
- name: user.id
  type: keyword
  description: Full Kerberos principal.
- name: user.target.name
  type: keyword
  description: Impersonated user in constrained delegation (S4U2Proxy).
- name: user.target.domain
  type: keyword
  description: Realm of the impersonated user in constrained delegation.
- name: user.target.id
  type: keyword
  description: Full principal of the impersonated user in constrained delegation.
- name: source.user.name
  type: keyword
  description: Acting service principal name in constrained delegation.
- name: source.user.domain
  type: keyword
  description: Realm of the acting service in constrained delegation.
- name: source.user.id
  type: keyword
  description: Full acting service principal in constrained delegation.
- name: related.user
  type: keyword
  description: All user identifiers seen in this event.
- name: related.ip
  type: ip
  description: All IP addresses seen in this event.
- name: source.geo.city_name
  type: keyword
  description: City name from GeoIP lookup.
- name: source.geo.continent_name
  type: keyword
  description: Continent name from GeoIP lookup.
- name: source.geo.country_iso_code
  type: keyword
  description: Country ISO code from GeoIP lookup.
- name: source.geo.country_name
  type: keyword
  description: Country name from GeoIP lookup.
- name: source.geo.location
  type: geo_point
  description: Longitude and latitude from GeoIP lookup.
- name: source.geo.region_iso_code
  type: keyword
  description: Region ISO code from GeoIP lookup.
- name: source.geo.region_name
  type: keyword
  description: Region name from GeoIP lookup.
- name: source.as.number
  type: long
  description: Autonomous System Number from GeoIP ASN lookup.
- name: source.as.organization.name
  type: keyword
  description: Organization name from GeoIP ASN lookup.
- name: tags
  type: keyword
  description: List of keywords used to tag each event.
