- name: freeipa.kdc
  type: group
  description: Kerberos KDC authentication event fields.
  fields:
    - name: request_type
      type: keyword
      description: Kerberos request type (AS_REQ or TGS_REQ).
    - name: client_principal
      type: keyword
      description: Full client Kerberos principal (user@REALM).
    - name: service_principal
      type: keyword
      description: Full service principal being requested.
    - name: encryption_type
      type: keyword
      description: Reply encryption type used for the ticket.
    - name: error_code
      type: keyword
      description: >-
        KDC status code for non-ISSUE responses. Set for all statuses except ISSUE,
        including NEEDED_PREAUTH which has event.outcome=success because it is a
        normal pre-authentication negotiation step, not a failure.
    - name: realm
      type: keyword
      description: Kerberos realm.
    - name: authtime
      type: date
      description: Authentication timestamp from the ticket.
    - name: s4u_client
      type: keyword
      description: S4U2Proxy delegated client principal (constrained delegation).
