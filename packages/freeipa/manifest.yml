format_version: "3.4.0"
name: freeipa
title: FreeIPA
version: "0.1.0"
description: Collect security logs from FreeIPA identity management servers.
type: integration
categories:
  - security
  - iam
conditions:
  kibana:
    version: "^8.16.0 || ^9.0.0"
  elastic:
    subscription: basic
icons:
  - src: /img/logo.svg
    title: FreeIPA
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: freeipa
    title: FreeIPA
    description: Collect security logs from FreeIPA servers
    inputs:
      - type: filestream
        title: FreeIPA Logs
        description: Collect logs from FreeIPA components (KDC, 389ds, Dogtag CA, IPA API)
        vars:
          - name: preserve_original_event
            type: bool
            title: Preserve Original Event
            description: Preserve the raw log line in event.original.
            required: false
            show_user: true
            default: false
owner:
  github: elastic/obs-infraobs-integrations
  type: community
