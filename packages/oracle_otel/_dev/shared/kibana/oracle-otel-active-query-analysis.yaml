dashboards:
- id: oracle_otel-active-query-analysis
  minimum_kibana_version: '8.14.0'
  name: '[Logs Oracle] Active Query Analysis'
  description: Real-time view of active database sessions. What is running right now? What are sessions waiting on?
  controls:
  - type: options
    label: Oracle Instance
    data_view: logs-*
    field: oracledb.instance.name
  filters:
  - field: data_stream.dataset
    equals: oracledbreceiver.otel
  - field: event_name
    equals: db.server.query_sample
  panels:
  - title: Navigation Links
    description: Links to all Oracle Database OTel dashboards.
    size:
      w: 48
      h: 2
    links:
      layout: horizontal
      items:
      - label: Overview
        dashboard: oracle_otel-overview
        with_filters: false
        with_time: false
      - label: Resource Capacity, Sessions & Locking
        dashboard: oracle_otel-resource-capacity
        with_filters: false
        with_time: false
      - label: SQL Execution, I/O & Cache Performance
        dashboard: oracle_otel-sql-execution
        with_filters: false
        with_time: false
      - label: Transaction Health & Storage Management
        dashboard: oracle_otel-transaction-health
        with_filters: false
        with_time: false
      - label: Active Query Analysis
        dashboard: oracle_otel-active-query-analysis
        with_filters: false
        with_time: false
      - label: Query Performance & Plans
        dashboard: oracle_otel-query-performance
        with_filters: false
        with_time: false
  - title: Dashboard Introduction
    size:
      w: 48
      h: 6
    description: Requires db.server.query_sample events enabled in oracledbreceiver. Requires Oracle grants for V_$SQL, V_$SQLAREA,
      V_$SQL_PLAN, etc.
    markdown:
      content: |
        ## Active Query Analysis

        This dashboard offers an ASH-equivalent view of active database sessions, including

        - Active session count, distinct SQL IDs in flight, and maximum query duration
        - Wait class distribution as a pie chart and stacked area trend over time
        - Top queries ranked by execution duration with SQL text, schema, and program details
        - Session breakdown by schema, program, and client address to identify load sources
        - Detailed wait event analysis showing event frequency and average duration per wait class
        - Query sample volume over time to monitor collection health
        - Longest-running queries with SID, serial, user, and wait event context for targeted investigation

  - title: Sampled Active Sessions
    description: Count of db.server.query_sample events in the selected time range, representing the number of active session samples captured.
    size:
      w: 8
      h: 5
    esql:
      type: metric
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample"

        | STATS count = COUNT(*)

        '
      primary:
        field: count
        label: Active Sessions
        format:
          type: number
          decimals: 0
  - title: Distinct Active SQL IDs
    description: Number of unique SQL IDs (oracledb.sql_id) observed in active session samples during the selected time range.
    size:
      w: 8
      h: 5
    esql:
      type: metric
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.sql_id IS NOT NULL

        | STATS distinct_sql = COUNT_DISTINCT(oracledb.sql_id)

        '
      primary:
        field: distinct_sql
        label: Distinct SQL IDs
        format:
          type: number
          decimals: 0
  - title: Max Query Duration
    description: Longest query execution duration in seconds (MAX of oracledb.duration_sec) observed in active session samples.
    size:
      w: 8
      h: 5
    esql:
      type: metric
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.duration_sec IS NOT NULL

        | STATS max_duration = MAX(oracledb.duration_sec)

        '
      primary:
        field: max_duration
        label: Max Duration (sec)
        format:
          type: number
          decimals: 2
  - title: Sessions by Wait Class
    description: Distribution of sampled active sessions by Oracle wait class (CPU, User I/O, Concurrency, Application, etc.). Each slice represents the count of samples in that wait class.
    size:
      w: 16
      h: 8
    esql:
      type: pie
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.wait_class IS NOT NULL

        | STATS count = COUNT(*) BY wait_class = oracledb.wait_class

        | SORT count DESC

        | LIMIT 10

        '
      metrics:
      - field: count
        label: Count
      breakdowns:
      - field: wait_class
        label: Wait Class
  - title: Wait Class Distribution Over Time
    description: Stacked area showing the count of active session samples per wait class over time.
    size:
      w: 32
      h: 8
    esql:
      type: area
      mode: stacked
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.wait_class IS NOT NULL

        | STATS count = COUNT(*) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend), wait_class = oracledb.wait_class

        | SORT time_bucket ASC

        '
      dimension:
        field: time_bucket
        label: Time
        data_type: date
      metrics:
      - field: count
        label: Sessions
      breakdown:
        field: wait_class
  - title: Top Queries by Duration
    description: Top 20 active queries ranked by execution duration, showing SQL ID, SQL text, wait class, schema, program, and duration in seconds.
    size:
      w: 48
      h: 12
    esql:
      type: datatable
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample"

        | KEEP oracledb.sql_id, db.query.text, oracledb.duration_sec, oracledb.wait_class, oracledb.schemaname, oracledb.program

        | SORT oracledb.duration_sec DESC

        | LIMIT 20

        '
      breakdowns:
      - field: oracledb.sql_id
        label: SQL ID
      - field: db.query.text
        label: SQL Text
      - field: oracledb.wait_class
        label: Wait Class
      - field: oracledb.schemaname
        label: Schema
      - field: oracledb.program
        label: Program
      metrics:
      - field: oracledb.duration_sec
        label: Duration (sec)
        format:
          type: number
          decimals: 2
  - title: Active Sessions by Schema
    description: Count of active session samples grouped by Oracle schema (oracledb.schemaname). Shows which schemas are running the most queries.
    size:
      w: 24
      h: 8
    esql:
      type: bar
      mode: stacked
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.schemaname IS NOT NULL

        | STATS count = COUNT(*) BY schemaname = oracledb.schemaname

        | SORT count DESC

        | LIMIT 10

        '
      dimension:
        field: schemaname
        label: Schema
      metrics:
      - field: count
        label: Sessions
  - title: Active Sessions by Program
    description: Count of active session samples grouped by client program (oracledb.program). Shows which client applications are generating load.
    size:
      w: 24
      h: 8
    esql:
      type: bar
      mode: stacked
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.program IS NOT NULL

        | STATS count = COUNT(*) BY program = oracledb.program

        | SORT count DESC

        | LIMIT 10

        '
      dimension:
        field: program
        label: Program
      metrics:
      - field: count
        label: Sessions
  - title: Wait Event Detail
    description: Wait events with their parent wait class, occurrence count, and average duration in seconds. Sorted by event count descending.
    size:
      w: 48
      h: 10
    esql:
      type: datatable
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND oracledb.event IS NOT NULL

        | STATS event_count = COUNT(*), avg_duration = AVG(oracledb.duration_sec) BY wait_event = oracledb.event, wait_class
        = oracledb.wait_class

        | SORT event_count DESC

        | LIMIT 20

        '
      breakdowns:
      - field: wait_event
        label: Wait Event
      - field: wait_class
        label: Wait Class
      metrics:
      - field: event_count
        label: Count
        format:
          type: number
          decimals: 0
      - field: avg_duration
        label: Avg Duration (sec)
        format:
          type: number
          decimals: 2
  - title: Sessions by Client Address
    description: Count of active session samples grouped by client host address (client.address). Shows which client hosts are generating the most queries.
    size:
      w: 24
      h: 8
    esql:
      type: bar
      mode: stacked
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample" AND client.address IS NOT NULL

        | STATS count = COUNT(*) BY client_addr = client.address

        | SORT count DESC

        | LIMIT 10

        '
      dimension:
        field: client_addr
        label: Client Address
      metrics:
      - field: count
        label: Sessions
  - title: Query Sample Volume Over Time
    description: Number of db.server.query_sample events collected per time bucket. Shows the volume of active session samples over time.
    size:
      w: 24
      h: 8
    esql:
      type: line
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample"

        | STATS count = COUNT(*) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)

        | SORT time_bucket ASC

        '
      dimension:
        field: time_bucket
        label: Time
        data_type: date
      metrics:
      - field: count
        label: Sample Count
  - title: Longest-Running Queries
    description: Top 20 longest-running queries showing SQL text, SID, serial number, schema, user, wait class, wait event, and duration in seconds.
    size:
      w: 48
      h: 12
    esql:
      type: datatable
      query: 'FROM logs-oracledbreceiver.otel-*

        | WHERE event_name == "db.server.query_sample"

        | KEEP db.query.text, oracledb.sid, oracledb.serial, oracledb.schemaname, user.name, oracledb.wait_class, oracledb.event,
        oracledb.duration_sec

        | SORT oracledb.duration_sec DESC

        | LIMIT 20

        '
      breakdowns:
      - field: db.query.text
        label: SQL Text
      - field: oracledb.sid
        label: SID
      - field: oracledb.serial
        label: Serial
      - field: oracledb.schemaname
        label: Schema
      - field: user.name
        label: User
      - field: oracledb.wait_class
        label: Wait Class
      - field: oracledb.event
        label: Wait Event
      metrics:
      - field: oracledb.duration_sec
        label: Duration (sec)
        format:
          type: number
          decimals: 2
