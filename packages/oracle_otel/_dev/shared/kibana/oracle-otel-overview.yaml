---
# Oracle Database OTel Overview Dashboard
# Dashboard 1 of 6 - First-stop health assessment
# Data source: metrics-oracledbreceiver.otel-*
#
# Metrics reference: Oracle Database OTel Content Pack Spec
dashboards:
  - id: oracle_otel-overview
    minimum_kibana_version: '8.14.0'
    name: '[Metrics Oracle] Overview'
    description: First-stop health assessment for Oracle Database. Answers "Is the instance healthy?" using key KPIs and trends.
    controls:
      - type: options
        label: Oracle Instance
        data_view: metrics-*
        field: oracledb.instance.name
    filters:
      - field: data_stream.dataset
        equals: oracledbreceiver.otel
    panels:
      # 1. Navigation links
      - title: Navigation Links
        description: Links to all Oracle Database OTel dashboards.
        size: {w: 48, h: 2}
        links:
          layout: horizontal
          items:
            - label: Overview
              dashboard: oracle_otel-overview
            - label: Resource Capacity, Sessions & Locking
              dashboard: oracle_otel-resource-capacity
            - label: SQL Execution, I/O & Cache Performance
              dashboard: oracle_otel-sql-execution
            - label: Transaction Health & Storage Management
              dashboard: oracle_otel-transaction-health
            - label: Active Query Analysis
              dashboard: oracle_otel-active-query-analysis
            - label: Query Performance & Plans
              dashboard: oracle_otel-query-performance

      # 2. Dashboard introduction
      - title: Dashboard Introduction
        size: {w: 48, h: 3}
        markdown:
          content: |
            # Oracle Database

            This dashboard offers a first-stop health assessment for your Oracle Database instance, including

            - Process and session utilisation against configured limits
            - Buffer cache hit ratio effectiveness
            - Commit and rollback throughput trends
            - SQL execution rate over time
            - Deadlock occurrence and rate monitoring
            - Tablespace capacity and headroom per tablespace
            - Resource capacity summary for processes, sessions, and transactions

      # 3. Process utilisation %
      - title: Process Utilisation
        hide_title: true
        description: Active OS process count as a percentage of the configured PROCESSES limit.
        size: {w: 8, h: 5}
        esql:
          type: metric
          query: |
            FROM metrics-oracledbreceiver.otel-*
            | WHERE oracledb.processes.usage IS NOT NULL OR oracledb.processes.limit IS NOT NULL
            | EVAL ts_sec = DATE_TRUNC(1 second, @timestamp)
            | STATS usage = MAX(oracledb.processes.usage), limit_val = MAX(oracledb.processes.limit) BY ts_sec
            | WHERE usage IS NOT NULL AND limit_val IS NOT NULL AND limit_val > 0
            | SORT ts_sec DESC
            | LIMIT 1
            | EVAL utilisation_pct = ROUND(TO_DOUBLE(usage) / TO_DOUBLE(limit_val), 3)
          primary:
            field: utilisation_pct
            label: Process Utilisation
            format:
              type: percent
              decimals: 1

      # 4. Session utilisation %
      - title: Session Utilisation
        hide_title: true
        description: Total active session count across all types as a percentage of the configured session limit.
        size: {w: 8, h: 5}
        esql:
          type: metric
          query: |
            FROM metrics-oracledbreceiver.otel-*
            | WHERE oracledb.sessions.usage IS NOT NULL OR oracledb.sessions.limit IS NOT NULL
            | EVAL ts_sec = DATE_TRUNC(1 second, @timestamp)
            | STATS total_usage = SUM(oracledb.sessions.usage), limit_val = MAX(oracledb.sessions.limit) BY ts_sec
            | WHERE limit_val IS NOT NULL AND total_usage IS NOT NULL AND limit_val > 0
            | SORT ts_sec DESC
            | LIMIT 1
            | EVAL utilisation_pct = ROUND(TO_DOUBLE(total_usage) / TO_DOUBLE(limit_val), 3)
          primary:
            field: utilisation_pct
            label: Session Utilisation
            format:
              type: percent
              decimals: 1

      # 5. Buffer cache hit ratio %
      - title: Buffer Cache Hit Ratio
        hide_title: true
        description: Proportion of data block reads served from the SGA buffer cache versus disk.
        size: {w: 8, h: 5}
        esql:
          type: metric
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.physical_reads IS NOT NULL AND oracledb.logical_reads IS NOT NULL
            | STATS physical_rate = SUM(RATE(oracledb.physical_reads)), logical_rate = SUM(RATE(oracledb.logical_reads))
            | EVAL hit_ratio_pct = CASE(logical_rate > 0, ROUND(1 - physical_rate / logical_rate, 3), 0)
          primary:
            field: hit_ratio_pct
            label: Buffer Cache Hit Ratio
            format:
              type: percent
              decimals: 1

      # 6. Commit rate
      - title: Commit Rate
        description: User-initiated transaction commits per second.
        size: {w: 8, h: 5}
        esql:
          type: metric
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.user_commits IS NOT NULL
            | STATS commit_rate = SUM(RATE(oracledb.user_commits))
          primary:
            field: commit_rate
            label: Commits/sec
            format:
              type: number
              decimals: 1

      # 7. Deadlocks in time range
      - title: Deadlocks in Time Range
        description: Approximate count of enqueue deadlocks (ORA-00060) in the selected time range.
        size: {w: 8, h: 5}
        esql:
          type: metric
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.enqueue_deadlocks IS NOT NULL
            | STATS deadlock_delta = SUM(INCREASE(oracledb.enqueue_deadlocks))
          primary:
            field: deadlock_delta
            label: Deadlocks
            format:
              type: number
              decimals: 0

      # 8. Max tablespace utilisation %
      - title: Max Tablespace Utilisation
        description: Highest utilisation percentage across all tablespaces. Unlimited tablespaces are excluded.
        size: {w: 8, h: 5}
        esql:
          type: metric
          query: |
            FROM metrics-oracledbreceiver.otel-*
            | WHERE oracledb.tablespace_size.usage IS NOT NULL AND oracledb.tablespace_size.limit IS NOT NULL AND oracledb.tablespace_size.limit > 0
            | STATS usage = MAX(oracledb.tablespace_size.usage), limit_val = MAX(oracledb.tablespace_size.limit) BY tablespace_name = attributes.tablespace_name
            | EVAL pct = TO_DOUBLE(usage) / TO_DOUBLE(limit_val)
            | STATS max_pct = MAX(pct)
            | EVAL max_utilisation_pct = ROUND(max_pct, 3)
          primary:
            field: max_utilisation_pct
            label: Max Tablespace %
            format:
              type: percent
              decimals: 1

      # 9. Execution rate over time
      - title: Execution Rate Over Time
        description: SQL execution rate (user and recursive calls) per second over time.
        size: {w: 24, h: 8}
        esql:
          type: line
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.executions IS NOT NULL
            | STATS exec_rate = SUM(RATE(oracledb.executions)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            | SORT time_bucket ASC
          dimension:
            field: time_bucket
            label: Time
            data_type: date
          metrics:
            - field: exec_rate
              label: Executions/sec

      # 10. Deadlock rate over time
      - title: Deadlock Rate Over Time
        description: Enqueue deadlock rate per second over time.
        size: {w: 24, h: 8}
        esql:
          type: line
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.enqueue_deadlocks IS NOT NULL
            | STATS deadlock_rate = SUM(RATE(oracledb.enqueue_deadlocks)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            | SORT time_bucket ASC
          dimension:
            field: time_bucket
            label: Time
            data_type: date
          metrics:
            - field: deadlock_rate
              label: Deadlocks/sec

      # 11. Commit rate over time
      - title: Commit Rate Over Time
        description: User commit rate per second over time.
        size: {w: 24, h: 8}
        esql:
          type: line
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.user_commits IS NOT NULL
            | STATS commit_rate = SUM(RATE(oracledb.user_commits)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            | SORT time_bucket ASC
          dimension:
            field: time_bucket
            label: Time
            data_type: date
          metrics:
            - field: commit_rate
              label: Commits/sec

      # 12. Rollback rate over time
      - title: Rollback Rate Over Time
        description: User rollback rate per second over time.
        size: {w: 24, h: 8}
        esql:
          type: line
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.user_rollbacks IS NOT NULL
            | STATS rollback_rate = SUM(RATE(oracledb.user_rollbacks)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            | SORT time_bucket ASC
          dimension:
            field: time_bucket
            label: Time
            data_type: date
          metrics:
            - field: rollback_rate
              label: Rollbacks/sec

      # 13. Resource capacity summary (processes, sessions, transactions - usage vs limit)
      - title: Resource Capacity Summary
        description: Current usage and configured limit for processes, sessions, and transactions. A limit value of -1 indicates the resource is configured as unlimited.
        size: {w: 48, h: 10}
        esql:
          type: datatable
          query: |
            FROM metrics-oracledbreceiver.otel-*
            | WHERE oracledb.processes.usage IS NOT NULL OR oracledb.processes.limit IS NOT NULL OR oracledb.sessions.usage IS NOT NULL OR oracledb.sessions.limit IS NOT NULL OR oracledb.transactions.usage IS NOT NULL OR oracledb.transactions.limit IS NOT NULL
            | EVAL ts_sec = DATE_TRUNC(1 second, @timestamp)
            | STATS p_usage = MAX(oracledb.processes.usage), p_limit = MAX(oracledb.processes.limit), s_usage = SUM(oracledb.sessions.usage), s_limit = MAX(oracledb.sessions.limit), t_usage = MAX(oracledb.transactions.usage), t_limit = MAX(oracledb.transactions.limit) BY ts_sec
            | SORT ts_sec DESC
            | LIMIT 1
            | FORK (
                EVAL resource = "Processes", usage = COALESCE(p_usage, 0), limit_val = COALESCE(p_limit, -1)
                | KEEP resource, usage, limit_val
              )
              (
                EVAL resource = "Sessions", usage = COALESCE(s_usage, 0), limit_val = COALESCE(s_limit, -1)
                | KEEP resource, usage, limit_val
              )
              (
                EVAL resource = "Transactions", usage = COALESCE(t_usage, 0), limit_val = COALESCE(t_limit, -1)
                | KEEP resource, usage, limit_val
              )
          breakdowns:
            - field: resource
              label: Resource
          metrics:
            - field: usage
              label: Usage
              format:
                type: number
                decimals: 0
            - field: limit_val
              label: Limit
              format:
                type: number
                decimals: 0

      # 14. Tablespace utilisation table
      - title: Tablespace Utilisation
        description: Per-tablespace breakdown showing used bytes, limit bytes, and utilisation percentage, sorted by utilisation descending.
        size: {w: 48, h: 12}
        esql:
          type: datatable
          query: |
            FROM metrics-oracledbreceiver.otel-*
            | WHERE oracledb.tablespace_size.usage IS NOT NULL AND oracledb.tablespace_size.limit IS NOT NULL
            | STATS usage_bytes = MAX(oracledb.tablespace_size.usage), limit_bytes = MAX(oracledb.tablespace_size.limit) BY tablespace_name = attributes.tablespace_name
            | EVAL utilisation_pct = CASE(limit_bytes > 0, ROUND(TO_DOUBLE(usage_bytes) / TO_DOUBLE(limit_bytes), 3), 0)
            | SORT utilisation_pct DESC
            | LIMIT 50
          breakdowns:
            - field: tablespace_name
              label: Tablespace
          metrics:
            - field: usage_bytes
              label: Used (bytes)
              format:
                type: bytes
            - field: limit_bytes
              label: Limit (bytes)
              format:
                type: bytes
            - field: utilisation_pct
              label: Utilisation %
              format:
                type: percent

      # 15. Buffer cache hit ratio over time
      - title: Buffer Cache Hit Ratio Over Time
        description: Buffer cache hit ratio trend over time.
        size: {w: 48, h: 10}
        esql:
          type: line
          query: |
            TS metrics-oracledbreceiver.otel-*
            | WHERE oracledb.physical_reads IS NOT NULL AND oracledb.logical_reads IS NOT NULL
            | STATS physical_rate = SUM(RATE(oracledb.physical_reads)), logical_rate = SUM(RATE(oracledb.logical_reads)) BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            | EVAL hit_ratio_pct = CASE(logical_rate > 0, ROUND(1 - physical_rate / logical_rate, 3), 0)
            | SORT time_bucket ASC
          dimension:
            field: time_bucket
            label: Time
            data_type: date
          metrics:
            - field: hit_ratio_pct
              label: Hit Ratio %
              format:
                type: percent
