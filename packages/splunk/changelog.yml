# newer versions go on top
- version: "1.1.1"
  changes:
    - description: Prevent `@timestamp` from becoming an array when a `_time` key embedded in `_raw` collides with the top-level `_time` in the alert data stream.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19727
- version: "1.1.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18552
- version: "1.0.2"
  changes:
    - description: Change page_size/batch_size variable type from text to integer for Fleet input validation.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19257
- version: "1.0.1"
  changes:
    - description: Downgrade the `format_version` to the minimum version that supports all the necessary features for the package.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/15602
- version: "1.0.0"
  changes:
    - description: Release package as GA.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15298
- version: "0.7.0"
  changes:
    - description: Add `search` data stream.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15041
- version: "0.6.0"
  changes:
    - description: Use more secure Basic Authentication mechanism in agent collector.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/15000
- version: "0.5.1"
  changes:
    - description: Generalize install instructions.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/14818
- version: "0.5.0"
  changes:
    - description: Use `terminate` processor instead of `fail` processor to handle agent errors.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14393
- version: "0.4.0"
  changes:
    - description: Remove duplicated installation instructions from the documentation
      type: enhancement
      link: https://github.com/elastic/integrations/pull/14014
- version: "0.3.2"
  changes:
    - description: Add temporary processor to remove the fields added by the Agentless policy.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/14172
- version: "0.3.1"
  changes:
    - description: Fix default request trace enabled behavior.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/13712
- version: "0.3.0"
  changes:
    - description: Updated logo.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13655
- version: "0.2.0"
  changes:
    - description: Updated SIEM categorization.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/13533
- version: "0.1.0"
  changes:
