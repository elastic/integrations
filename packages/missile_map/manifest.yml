format_version: 3.3.0
name: missile_map
title: "Missile Map"
version: 0.1.0
source:
  license: "Elastic-2.0"
description: "This integration ships a missile map, a custom visualization to analyze network traffic for Elasticsearch data."
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^8.10.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/missile-map.png
    title: Missile map default view
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: sample
    title: Sample logs
    description: Collect sample logs
    inputs:
      - type: logfile
        title: Collect sample logs from instances
        description: Collecting sample logs
owner:
  github: elastic/integrations
  type: elastic
