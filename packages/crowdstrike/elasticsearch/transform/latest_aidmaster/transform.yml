# Use of "*" to use all namespaces defined.
source:
  index:
    - "logs-crowdstrike.fdr-*"
  query:
    bool:
      minimum_should_match: 1
      should:
        - wildcard:
            log.file.path: "*aidmaster*"
        - wildcard:
            aws.s3.object.key: "*aidmaster*"
dest:
  index: "logs-crowdstrike_lookup.dest_aidmaster-1"
  pipeline: '{{ ingestPipelineName "aidmaster_lookup_namespaced" }}'
  aliases:
    - alias: "logs-crowdstrike_lookup.aidmaster"
      move_on_creation: true
latest:
  unique_key:
    - host.id
  sort: "@timestamp"
description: >-
  Latest host metadata from CrowdStrike FDR aidmaster objects for lookup joins.
frequency: 30s
settings:
  # This is required to prevent the transform from clobbering Fleet-managed mappings.
  deduce_mappings: false
  unattended: true
sync:
  time:
    field: "event.ingested"
    # Updated to 120s because of refresh delay in Serverless. With default 60s,
    # sometimes transform wouldn't process all documents.
    delay: 120s
retention_policy:
  time:
    field: "@timestamp"
    max_age: 30d
_meta:
  managed: true
  # Bump this version to delete, reinstall, and restart the transform during
  # package installation.
  fleet_transform_version: 0.1.1
  run_as_kibana_system: false
