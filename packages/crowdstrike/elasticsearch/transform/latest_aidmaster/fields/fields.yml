- name: crowdstrike
  type: group
  fields:
    - name: info
      type: group
      fields:
        - name: host
          type: group
          description: Host metadata mirrored from aidmaster enrichment records.
          fields:
            - name: AgentLoadFlags
              type: keyword
              description: Whether the sensor loaded during or after the Windows host's boot process.
            - name: AgentLocalTime
              type: date
              description: The local time for the sensor.
            - name: AgentTimeOffset
              type: float
              description: The time since the last reboot.
            - name: BiosManufacturer
              type: keyword
              description: The manufacturer of the host's BIOS.
            - name: BiosVersion
              type: keyword
              description: The version of the host's BIOS.
            - name: ChassisType
              type: keyword
              description: The type of system chassis, as defined in SMBIOS Standard.
            - name: ConfigBuild
              type: keyword
            - name: ConfigIDBuild
              type: keyword
              description: The build number used as part of the ConfigID.
            - name: FalconGroupingTags
              type: keyword
              description: The host tags that were added by using the UI or API.
            - name: FirstSeen
              type: date
              description: The first time the sensor was seen by the CrowdStrike cloud.
            - name: HostHiddenStatus
              type: keyword
            - name: OU
              type: keyword
              description: The organizational unit of the host as seen by the sensor.
            - name: PointerSize
              type: keyword
              description: The processor architecture.
            - name: ProductType
              type: keyword
              description: The type of product.
            - name: SensorGroupingTags
              type: keyword
              description: The host tags that were added during installation.
            - name: ServicePackMajor
              type: keyword
              description: The major version number of the OS Service Pack.
            - name: SiteName
              type: keyword
              description: The site name of the domain to which the host is joined.
            - name: SystemManufacturer
              type: keyword
              description: The host's system manufacturer.
            - name: SystemProductName
              type: keyword
              description: The host's product name.
            - name: Version
              type: keyword
              description: The host's system version.
            - name: cid
              type: keyword
              description: The customer ID.
            - name: domain
              type: keyword
              description: The Windows domain name to which the host is currently joined.
            - name: event_platform
              type: keyword
            - name: geo_city_name
              type: keyword
              description: The system's city of origin.
            - name: geo_continent_name
              type: keyword
              description: The sensor's continent, as seen from the CrowdStrike cloud.
            - name: geo_country_name
              type: keyword
              description: The system's country of origin.
            - name: geo_timezone
              type: keyword
              description: The sensor's time zone, as seen from the CrowdStrike cloud.
            - name: hostname
              type: keyword
              description: The name of the host.
            - name: ip
              type: ip
              description: The sensor's IP, as seen from the CrowdStrike cloud.
            - name: name
              type: keyword
              description: The name of the host.
            - name: os_type
              type: keyword
            - name: os_version
              type: keyword
              description: The host's system version.
