fields:
  - name: timestamp
    period: -24h
  - name: domain
    cardinality: 100000
  - name: security_assessment.assessmentFactors.likelihood
    enum:
      - LOW
      - MEDIUM
      - HIGH
  - name: security_assessment.assessmentFactors.riskFactorType
    enum:
      - WEAK_PASSWORD_POLICY
      - EXCESSIVE_USER_PRIVILEGES
      - STALE_ACCOUNTS
      - GUEST_ACCOUNTS_ENABLED
      - MFA_NOT_CONFIGURED
      - STALE_ACCOUNT
      - PASSWORD_NEVER_EXPIRES
  - name: security_assessment.assessmentFactors.severity
    enum:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
  - name: security_assessment.overallScore
    range:
      min: 0.05
      max: 0.95
  - name: security_assessment.overallScoreLevel
    enum:
      - LOW
      - MEDIUM
      - HIGH
      - NEUTRAL
