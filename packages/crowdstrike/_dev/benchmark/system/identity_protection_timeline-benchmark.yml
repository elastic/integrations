---
description: Benchmark 1000 identity_protection_timeline events ingested
input: cel
deployer: docker
vars:
  url: http://{{Hostname}}:{{Port}}
  client_id: xxxx
  client_secret: yyyy
  token_url: http://{{Hostname}}:{{Port}}/oauth2/token
data_stream:
  name: identity_protection_timeline
  vars:
    enable_request_tracer: true
    initial_interval: 720h
    batch_size: 100
    preserve_original_event: true
warmup_time_period: 2s
corpora:
  input_service:
    name: crowdstrike
  generator:
    total_events: 1000
    template:
      path: ./identity_protection_timeline-benchmark/template.ndjson
      type: gotext
    config:
      path: ./identity_protection_timeline-benchmark/config.yml
    fields:
      path: ./identity_protection_timeline-benchmark/fields.yml
