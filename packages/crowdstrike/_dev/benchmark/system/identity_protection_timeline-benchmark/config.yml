fields:
  - name: timestamp
    period: -24h
  - name: start_time
    period: -24h
  - name: end_time
    period: -24h
  - name: event_id
    cardinality: 100000
  - name: event_type
    enum:
      - SUCCESSFUL_AUTHENTICATION
      - FAILED_AUTHENTICATION
      - SERVICE_ACCESS
      - LDAP_SEARCH
      - ACCOUNT_CREATED
      - PASSWORD_CHANGE
      - ACCOUNT_ENABLED
      - ACCOUNT_DISABLED
      - ACCOUNT_LOCKED
      - PRIVILEGE_ESCALATION
  - name: event_label
    cardinality: 1000
  - name: event_severity
    enum:
      - NEUTRAL
      - MODERATE
      - IMPORTANT
  - name: active_directory_site_name
    cardinality: 1000
  - name: authentication_type
    enum:
      - DOMAIN_LOGIN
      - LDAP_AUTHENTICATION
      - KERBEROS_AUTHENTICATION
  - name: data_source_vendor_name
    enum:
      - Active Directory
      - Azure AD
      - CrowdStrike
  - name: endpoint_display_name
    cardinality: 10000
  - name: endpoint_entity.primary_display_name
    cardinality: 10000
  - name: entity.primary_display_name
    cardinality: 10000
  - name: entity.secondary_display_name
    cardinality: 10000
  - name: entity.type
    enum:
      - USER
      - ENDPOINT
      - CLOUD_SERVICE
      - ENTITY_CONTAINER
  - name: entity.accounts.object_sid
    cardinality: 100000
  - name: entity.accounts.sam_account_name
    cardinality: 10000
  - name: entity.accounts.service_principal_names
    cardinality: 10000
  - name: geo_location.city
    cardinality: 5000
  - name: geo_location.country
    enum:
      - US
      - GB
      - DE
      - FR
      - CA
      - AU
      - JP
  - name: host_name
    cardinality: 10000
  - name: ip_address
    cardinality: 100000
  - name: ip_address_reputations
    enum:
      - ANONYMOUS_ACTIVE
      - ANONYMOUS_SUSPECT
      - ANONYMOUS_INACTIVE
      - ANONYMOUS_PRIVATE
      - DICTIONARY_ATTACK
      - DDOS_ATTACK
      - SPAM
      - HOSTING_FACILITY
      - INTEL_MALICIOUS_HIGH
      - PROXY
      - VPN
      - RESIDENTIAL
      - ANONYMOUS
      - DATACENTER
  - name: isp_classification
    enum:
      - COM
      - ORG
      - GOV
      - MIL
      - EDU
      - LIB
      - CDN
      - ISP
      - MOB
      - DCH
      - SES
      - RSV
      - ISP_MOB
      - NONE
  - name: isp_domain
    cardinality: 10000
  - name: kerberos_encryption_types
    enum:
      - DES_CBC_CRC
      - DES_CBC_MD4
      - DES_CBC_MD5
      - DES_CBC_RAW
      - DES3_CBC_SHA
      - DES3_CBC_RAW
      - DES_HMAC_SHA1
      - DSA_SHA1_CMS
      - MD5_RSA_CMS
      - SHA1_RSA_CMS
      - RC2_CBC_ENV
      - RSA_ENV
      - RSA_ES_OAEP_ENV
      - DES3_CBC_ENV
      - DES3_CBC_SHA1
      - AES128_CTS_HMAC_SHA1_96
      - AES256_CTS_HMAC_SHA1_96
      - AES128_CTS_HMAC_SHA256_128
      - DES_CBC_MD5_NT
      - RC4_HMAC_NT
  - name: ldap_search_attributes
    cardinality: 1000
  - name: ldap_search_filter_sample
    cardinality: 1000
  - name: ldap_search_query_signatures
    cardinality: 1000
  - name: ldap_search_scope
    enum:
      - BASE
      - ONE
      - SUB
  - name: ldap_search_size_limit
    range:
      min: 0
      max: 10000
  - name: ldap_security_type
    enum:
      - UNKNOWN
      - TLS
      - SASL_INTEGRITY
      - SASL_CONFIDENTIALITY
      - START_TLS
  - name: network_tag
    cardinality: 1000
  - name: network_type
    enum:
      - UNKNOWN
      - VPN
      - PUBLIC
      - WIRELESS
      - INTERNAL
      - NAT
  - name: protocol_type
    enum:
      - KERBEROS
      - LDAP
      - NTLM
      - DCE_RPC
      - SSL
      - UNKNOWN
  - name: protocol_version
    enum:
      - "1.0"
      - "1.1"
      - "1.2"
      - "1.3"
  - name: smb_dialect
    enum:
      - UNKNOWN_SMB
      - SMB_1
      - SMB_2_0_2
      - SMB_2_1
      - SMB_3_0
      - SMB_3_0_2
      - SMB_3_1_1
  - name: target_endpoint_entity.primary_display_name
    cardinality: 10000
  - name: target_service_description
    cardinality: 1000
  - name: target_service_display_name
    cardinality: 1000
  - name: target_service_identifier
    cardinality: 10000
  - name: target_service_type
    enum:
      - LDAP
      - WEB
      - FILE_SHARE
      - DB
      - RPCSS
      - REMOTE_DESKTOP
      - SCCM
      - SIP
      - DNS
      - MAIL
      - NTLM
      - COMPUTER_ACCESS
      - GENERIC_CLOUD
      - SERVICE_ACCOUNT
      - UNKNOWN
  - name: tls_version
    enum:
      - TLSv1
      - TLSv1.1
      - TLSv1.2
      - TLSv1.3
  - name: user_display_name
    cardinality: 10000
  - name: user_entity.primary_display_name
    cardinality: 10000
  - name: user_entity.email_addresses
    cardinality: 10000
