wait_for_data_timeout: 1m
input: cel
service: crowdstrike-identity-protection-timeline
vars:
  url: http://{{Hostname}}:{{Port}}
  client_id: xxxx
  client_secret: xxxx
  token_url: http://{{Hostname}}:{{Port}}/oauth2/token
data_stream:
  vars:
    interval: 10s
    initial_interval: 720h
    batch_size: 100
    preserve_original_event: true
assert:
  hit_count: 3
