---
description: Pipeline for processing CrowdStrike Falcon Identity Protection security assessment events.
processors:
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 8.17.0
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
      on_failure:
        - append:
            tag: append_error_message_json_parse
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_identity_protection_assessment
      target_field: _id
      ignore_missing: true
  - rename:
      field: json
      tag: rename_json_to_crowdstrike
      target_field: crowdstrike.idp
      ignore_missing: true

  # Event categorization
  - set:
      field: event.kind
      tag: set_event_kind_to_event
      value: state
      if: ctx.crowdstrike?.idp != null
  - append:
      field: event.category
      tag: append_event_category_threat
      value: configuration
      allow_duplicates: false
      if: ctx.crowdstrike?.idp != null
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
      allow_duplicates: false
      if: ctx.crowdstrike?.idp != null
  - set:
      field: event.action
      tag: set_event_action_identity_protection_assessment
      value: identity_protection_assessment
      if: ctx.crowdstrike?.idp?.security_assessment != null

  # Normalize API field names to snake_case under crowdstrike.idp.security_assessment
  - rename:
      field: crowdstrike.idp.security_assessment.overallScore
      tag: rename_overallScore_to_overall_score
      target_field: crowdstrike.idp.security_assessment.overall_score
      ignore_missing: true
  - rename:
      field: crowdstrike.idp.security_assessment.overallScoreLevel
      tag: rename_overallScoreLevel_to_overall_score_level
      target_field: crowdstrike.idp.security_assessment.overall_score_level
      ignore_missing: true
  - convert:
      field: crowdstrike.idp.security_assessment.overall_score
      tag: convert_overall_score_to_double
      type: double
      target_field: event.risk_score
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_invalid_overall_score
            field: crowdstrike.idp.security_assessment.overall_score
            ignore_missing: true
        - append:
            tag: append_error_message_convert_overall_score
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - script:
      description: Map risk_score (0-1) to ECS event.risk_score_norm (0-100).
      tag: script_set_event_risk_score_norm_from_risk_score
      lang: painless
      if: ctx.event?.risk_score != null
      source: |-
        ctx.event = ctx.event ?: [:];
        double v = ((Number) ctx.event.risk_score).doubleValue();
        ctx.event.risk_score_norm = (long) Math.round(v * 100.0);
      on_failure:
        - append:
            tag: append_error_message_risk_score_script
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - script:
      description: Map overallScoreLevel to ECS event.severity.
      tag: script_set_event_severity_from_overall_score_level
      lang: painless
      if: ctx.crowdstrike?.idp?.security_assessment?.overall_score_level != null
      source: |-
        ctx.event = ctx.event ?: [:];
        def level = ctx.crowdstrike.idp.security_assessment.overall_score_level;
        if (level instanceof String) {
          def u = level.toUpperCase();
          if (u == 'LOW' || u == 'NEUTRAL') {
            ctx.event.severity = 21;
          } else if (u == 'MEDIUM') {
            ctx.event.severity = 47;
          } else if (u == 'HIGH') {
            ctx.event.severity = 73;
          } else if (u == 'CRITICAL') {
            ctx.event.severity = 99;
          }
        }
      on_failure:
        - append:
            tag: append_error_message_severity_script
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - script:
      description: Normalize assessmentFactors array keys to snake_case.
      tag: script_normalize_assessment_factors
      lang: painless
      if: ctx.crowdstrike?.idp?.security_assessment?.assessmentFactors != null
      source: |-
        def sa = ctx.crowdstrike.idp.security_assessment;
        def factors = sa.remove('assessmentFactors');
        if (!(factors instanceof List)) {
          return;
        }
        def out = new ArrayList();
        for (def f : factors) {
          if (!(f instanceof Map)) {
            continue;
          }
          def m = new HashMap();
          if (f.containsKey('riskFactorType')) {
            m.put('risk_factor_type', f.get('riskFactorType'));
          }
          if (f.containsKey('likelihood')) {
            m.put('likelihood', f.get('likelihood'));
          }
          if (f.containsKey('severity')) {
            m.put('severity', f.get('severity'));
          }
          out.add(m);
        }
        sa.put('assessment_factors', out);
      on_failure:
        - append:
            tag: append_error_message_assessment_factors_script
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # ECS copies
  - set:
      field: user.domain
      tag: set_user_domain_from_crowdstrike_idp_domain
      copy_from: crowdstrike.idp.domain
      ignore_empty_value: true
      if: ctx.crowdstrike?.idp?.domain != null
  - append:
      field: related.hosts
      tag: append_domain_into_related_hosts
      value: '{{{crowdstrike.idp.domain}}}'
      allow_duplicates: false
      if: ctx.crowdstrike?.idp?.domain != null

  - script:
      description: This script processor iterates over the whole document to remove fields with null values.
      tag: script_to_drop_null_values
      lang: painless
      source: |
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
                handleMap(v);
            } else if (v instanceof List) {
                handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
                handleMap(v);
            } else if (v instanceof List) {
                handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: crowdstrike.idp.security_assessment.assessment_factors_nested
      tag: set_assessment_factors_nested_from_assessment_factors
      copy_from: crowdstrike.idp.security_assessment.assessment_factors
      ignore_empty_value: true
      if: ctx._conf?.enable_nested_assessment_factors == true && ctx.crowdstrike?.idp?.security_assessment?.assessment_factors != null
      description: Duplicates assessment factors into a nested field to enable correlated queries on risk_factor_type, likelihood, and severity.
  - remove:
      field: _conf
      tag: remove_conf
      ignore_missing: true
  - remove:
      field:
        - crowdstrike.idp.domain
        - crowdstrike.idp.security_assessment.overall_score
      tag: remove_custom_duplicate_fields
      ignore_missing: true
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_preserve_original_on_error
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
