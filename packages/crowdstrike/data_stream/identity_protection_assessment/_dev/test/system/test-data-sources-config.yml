input: cel
service: crowdstrike-identity-protection-assessment
vars:
  url: http://{{Hostname}}:{{Port}}
  client_id: xxxx
  client_secret: xxxx
  token_url: http://{{Hostname}}:{{Port}}/oauth2/token
data_stream:
  vars:
    interval: 10s
    preserve_original_event: true
    data_sources:
      - ACTIVE_DIRECTORY
      - ADFS
      - AZURE
assert:
  hit_count: 2
