  - script:
      description: Set threat.framework from threat.* fields using prefix matching and preference order.
      lang: painless
      tag: script_threat_framework
      if: ctx.threat != null
      params:
        framework_preference:
          - MITRE ATT&CK
          - CrowdStrike Falcon Detections Framework
        framework_cs: 'CrowdStrike Falcon Detections Framework'
        framework_ma: 'MITRE ATT&CK'
        falcon_tactic_names:
          - malware
          - exploit
          - post-exploit
          - machine learning
          - custom intelligence
          - falcon overwatch
          - falcon intel
          - ai powered ioa
          - insecure security posture
      source: |
        def tid = ctx.threat.tactic?.id;
        def nid = ctx.threat.technique?.id;
        def tname = ctx.threat.tactic?.name;
        if ((tid == null || tid.isEmpty()) && (nid == null || nid.isEmpty()) && (tname == null || tname.isEmpty())) {
          return;
        }
        Set frameworks = new HashSet();
        // Handling tactics prefixed with "CS" or "TA".
        if (tid != null && !tid.isEmpty()) {
          for (String t: tid) {
            if (t.startsWith("CS")) {
              frameworks.add(params.framework_cs);
            }
            else if (t.startsWith("TA")) {
              frameworks.add(params.framework_ma);
            }
          }
        }
        // Handling techniques prefixed with "CS".
        if (nid != null && !nid.isEmpty()) {
          for (String t: nid) {
            if (t.startsWith("CS")) {
              frameworks.add(params.framework_cs);
            }
          }
        }
        // Handling falcon specific tactics.
        if (tname != null && !tname.isEmpty()) {
          for (String t: tname) {
            if (params.falcon_tactic_names.contains(t.toLowerCase())) {
              frameworks.add(params.framework_cs);
            }
          }
        }
        if (frameworks.isEmpty()) {
          return;
        }
        if (frameworks.size() == 1) {
          ctx.threat.framework = frameworks.iterator().next();
          return;
        }

        for (def preferred : params.framework_preference) {
          if (frameworks.contains(preferred)) {
            ctx.threat.framework = preferred;
            return;
          }
        }

        // fallback when new frameworks are added and not yet in preference list
        ctx.threat.framework = frameworks.iterator().next();
      on_failure:
        - append:
            tag: append_error_message_f73582d4
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
