---
description: Pipeline for processing Alert logs.
processors:
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 8.17.0
  - set:
      field: event.kind
      tag: set_event_kind
      value: alert
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - json:
      field: event.original
      tag: json_event_original
      target_field: crowdstrike.alert
      on_failure:
        - append:
            tag: append_error_message_cea45f41
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.category
      tag: set_event_category_process
      value: ['process']
      if: ctx.crowdstrike?.alert?.process_id != null || ctx.crowdstrike?.alert?.triggering_process_graph_id != null
  - set:
      field: event.type
      tag: set_event_type_start
      value: ['start']
      if: ctx.crowdstrike?.alert?.process_start_time != null
  - convert:
      field: crowdstrike.alert.active_directory_authentication_method
      tag: convert_active_directory_authentication_method_to_long
      type: long
      if: ctx.crowdstrike?.alert?.active_directory_authentication_method != ""
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_66658c56
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: crowdstrike.alert.activity_browser
      tag: rename_activity_browser
      target_field: crowdstrike.alert.activity.browser
      ignore_missing: true
  - rename:
      field: crowdstrike.alert.activity_device
      tag: rename_activity_device
      target_field: crowdstrike.alert.activity.device
      ignore_missing: true
  - rename:
      field: crowdstrike.alert.activity_id
      tag: rename_activity_id
      target_field: crowdstrike.alert.activity.id
      ignore_missing: true
  - rename:
      field: crowdstrike.alert.activity_os
      tag: rename_activity_os
      target_field: crowdstrike.alert.activity.os
      ignore_missing: true
  - set:
      field: host.id
      tag: set_host_id_from_alert_agent_id
      copy_from: crowdstrike.alert.agent_id
      ignore_empty_value: true
  - convert:
      field: crowdstrike.alert.alert_attributes
      tag: convert_alert_attributes_to_long
      type: long
      if: ctx.crowdstrike?.alert?.alert_attributes != ""
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_70221132
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: crowdstrike.alert.assigned_to_name
      tag: rename_assigned_to_name
      target_field: crowdstrike.alert.assigned_to.name
      ignore_missing: true
  - rename:
      field: crowdstrike.alert.assigned_to_uid
      tag: rename_assigned_to_uid
      target_field: crowdstrike.alert.assigned_to.uid
      ignore_missing: true
  - append:
      field: related.user
      tag: append_crowdstrike_alert_assigned_to_uid_into_related_user
      value: '{{{crowdstrike.alert.assigned_to.uid}}}'
      allow_duplicates: false
      if: ctx.crowdstrike?.alert?.assigned_to?.uid != null
  - rename:
      field: crowdstrike.alert.assigned_to_uuid
      tag: rename_assigned_to_uuid
      target_field: crowdstrike.alert.assigned_to.uuid
      ignore_missing: true
  - foreach:
      tag: foreach_crowdstrike_alert_associated_files_875aefc3
      field: crowdstrike.alert.associated_files
      if: ctx.crowdstrike?.alert?.associated_files instanceof List
      processor:
        append:
          field: related.hash
          tag: append_associated_files_sha256_into_related_hash
          value: '{{{_ingest._value.sha256}}}'
          allow_duplicates: false
  - convert:
      field: crowdstrike.alert.cloud_indicator
      tag: convert_cloud_indicator_to_boolean
      type: boolean
      if: ctx.crowdstrike?.alert?.cloud_indicator != ""
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_3388312c
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: crowdstrike.alert.prevented
      tag: convert_prevented_to_boolean
      type: boolean
      if: ctx.crowdstrike?.alert?.prevented != ""
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_fd4efaf4
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: process.command_line
      tag: set_process_command_line
      copy_from: crowdstrike.alert.command_line
      ignore_empty_value: true
  - convert:
      field: crowdstrike.alert.confidence
      tag: convert_confidence_to_long
      type: long
      if: ctx.crowdstrike?.alert?.confidence != ""
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_message_056ec0de
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: crowdstrike.alert.context_timestamp
      tag: date_context_timestamp
      target_field: crowdstrike.alert.context_timestamp
      formats:
        - ISO8601
      if: ctx.crowdstrike?.alert?.context_timestamp != null && ctx.crowdstrike.alert.context_timestamp != ''
