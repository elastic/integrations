# Default FDR aws-s3 uses keep_metadata=false, so aidmaster/userinfo events are
# dropped after cache enrichment (see agent/stream/aws-s3.yml.hbs). The
# latest_aidmaster transform only has source documents when those blobs are
# indexed; transform validation is covered by test-keep-metadata-config.yml.
skip_transform_validation: true
input: aws-s3
skip_ignored_fields:
  - crowdstrike.ConfigStateData
  - crowdstrike.FeatureVector
  - crowdstrike.OSVersionFileData
  - process.command_line
data_stream:
  vars:
    access_key_id: "{{AWS_ACCESS_KEY_ID}}"
    secret_access_key: "{{AWS_SECRET_ACCESS_KEY}}"
    session_token: "{{AWS_SESSION_TOKEN}}"
    queue_url: "{{TF_OUTPUT_queue_url}}"
    preserve_original_event: true
    enable_deduplication: true
assert:
  hit_count: 127
