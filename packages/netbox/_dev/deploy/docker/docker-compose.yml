version: '3.0'
services:
  netbox_mock:
    image: docker.elastic.co/observability/stream:v0.18.0
    hostname: netbox_mock
    ports:
      - 8080
    volumes:
      - ./config.yml:/config.yml
    environment:
      PORT: "8080"
    command:
      - http-server
      - --addr=:8080
      - --config=/config.yml
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
