- name: squid
  type: group
  fields:
    - name: peer_status
      type: keyword
      description: A code explaining how the request was handled, by forwarding it to a peer or going straight to the source.
    - name: result_code
      type: keyword
      description: The outcome of the request.
    - name: status_code
      type: long
      description: The status of the result.
    - name: content_type
      type: keyword
      description: The content type as seen in the HTTP reply header.
    - name: reply_header_size
      type: long
      description: Size of the HTTP reply headers in bytes.
    - name: request_header_size
      type: long
      description: Size of the HTTP request headers in bytes.
    - name: server_time
      type: long
      description: Total server-side time in milliseconds (DNS + connect + server response).
    - name: error_detail
      type: keyword
      description: Squid error detail or sub-error code.
    - name: note
      type: keyword
      description: Squid annotations and notes attached to the transaction.
    - name: host_header
      type: keyword
      description: The Host header value from the client request.
