- name: workday
  type: group
  fields:
    - name: activity
      type: group
      fields:
        - name: activity_action
          type: keyword
          description: The type of action that was executed.
        - name: device_type
          type: keyword
          description: The device type from the user signon used to make the request.
        - name: ip_address
          type: ip
          description: The user's IP Address from the user signon used to make the request.
        - name: request_time
          type: date
          description: The request time of the action.
        - name: session_id
          type: keyword
          description: The system ID for tracking signons from the user signon used to make the request.
        - name: system_account
          type: keyword
          description: The system account that initiated the request.
        - name: target
          type: group
          fields:
            - name: descriptor
              type: keyword
              description: The display name of the instance.
            - name: href
              type: keyword
              description: A link to the instance.
            - name: id
              type: keyword
              description: Workday Id or Reference Id of the instance.
        - name: task_display_name
          type: keyword
          description: The action executed in the transaction.
        - name: task_id
          type: keyword
          description: The Workday ID of the task executed in the transaction.
        - name: user_activity_entry_count
          type: long
          description: Returns the User Activity Count for the inputted filter parameters.
        - name: user_agent
          type: keyword
          description: The client browser and operating system information from the user signon used to make this request.
