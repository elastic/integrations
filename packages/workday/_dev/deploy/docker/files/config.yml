rules:
  - path: /ccx/oauth2/tenant/token
    methods: ['POST']
    query_params:
      grant_type: ['refresh_token']
      refresh_token: ['refresh_token']
      client_id: ['client_id']
      client_secret: ['client_secret']
    responses:
      - status_code: 200
        headers:
          Content-Type: application/json
        body: |
          {{ minify_json `
          {
            "access_token": "xxxx",
            "token_type": "Bearer",
            "refresh_token": "refresh_token"
          }
          `}}
