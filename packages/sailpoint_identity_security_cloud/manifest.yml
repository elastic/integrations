format_version: 3.3.0
name: sailpoint_identity_security_cloud
title: "Sailpoint Identity Security Cloud"
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "Sailpoint Identity Security Cloud provides enterprise identity governance and security capabilities. The integration is designed to provide users the ability to extract audit information from their Identity Security Cloud tenant using ISC's AuditEvent API."
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^8.16.1"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: sample
    title: Sample logs
    description: Collect sample logs
    inputs:
      - type: logfile
        title: Collect sample logs from instances
        description: Collecting sample logs
owner:
  github: elastic/integrations
  type: elastic
