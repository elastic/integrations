title: "This data stream supports admin creating/deleting applications, successful authentications, provisioning failures, etc. This data enables monitoring of identity security and its governance data."
type: logs
streams:
  - input: logfile
    title: Sample logs
    description: Collect sample logs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        default:
          - /var/log/*.log
