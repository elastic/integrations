- name: rubrik.monitoring_jobs
  type: group
  fields:
    - name: archive_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all archive jobs.
    - name: backup_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all backup jobs.
    - name: conversion_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all conversion jobs.
    - name: log_backup_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all log backup jobs
    - name: recovery_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all recovery jobs.
    - name: replication_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all replication jobs.
    - name: all_jobs_count
      type: long
      metric_type: gauge
      description: The total count of all jobs.

