- name: rubrik.unmanaged_objects
  type: group
  fields:
    - name: archive_storage.bytes
      type: long
      metric_type: gauge
      unit: byte
      description: The amount of storage on the archival location used by unmanaged snapshots, in bytes.
    - name: local_storage.bytes
      type: long
      metric_type: gauge
      unit: byte
      description: The amount of storage on the local cluster used by unmanaged snapshots, in bytes.
    - name: snapshot.count
      type: long
      metric_type: gauge
      description: Total number of snapshots to for the specified object.
    - name: unmanaged_status
      type: keyword
      dimension: true
      description: Unmanaged status for the specified object.
    - name: cluster
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The Rubrik cluster id where this object originated.
        - name: name
          type: keyword
          dimension: true
          description: The Rubrik cluster name where this object originated.
    - name: effective_sla_domain
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The ID of the SLA domain.
        - name: name
          type: keyword
          dimension: true
          description: The name of the SLA domain.
