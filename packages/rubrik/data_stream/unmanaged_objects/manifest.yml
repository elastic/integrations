type: metrics
title: Rubrik Storage Unmanaged Objects Metrics
streams:
  - input: cel
    title: Rubrik Storage Unmanaged Objects
    description: Collect Rubrik Storage unmanaged objects data via the RSC GraphQL API
    enabled: true
    template_path: cel.yml.hbs
    vars:
      - name: resource_timeout
        type: text
        title: Resource Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Valid time units are ns, us, ms, s, m, h. Default is "30"s.
        show_user: false
        multi: false
        required: false
        default: 60s
      - name: interval
        type: text
        title: Interval
        description: The interval at which the API is polled, supported in seconds, minutes, and hours.
        show_user: true
        required: true
        default: 5m
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata.  This executes in the agent before the logs are parsed.  See [Processors](https://www.elastic.co/guide/en/fleet/current/elastic-agent-processor-configuration.html) for details.

      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - rubrik.unmanaged_objects
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        multi: false
        default: false
      - name: first
        type: integer
        title: First
        multi: false
        required: false
        show_user: false
        description: Returns the first n elements from the list.
      - name: cluster_uuid
        type: text
        title: Cluster UUID
        multi: false
        required: true
        show_user: true
        description: Workload cluster UUID.
      - name: unmanaged_statuses
        type: text
        title: Unmanaged Statuses
        multi: true
        required: true
        show_user: true
        description: Unmanaged statuses to filter. Please check the [Rubrik documentation](https://rubrikinc.github.io/rubrik-api-documentation/schema/reference/unmanagedobjectavailabilityfilter.doc.html) for the list of unmanaged statuses.
      - name: object_types
        type: text
        title: Object Types
        multi: true
        required: true
        show_user: true
        description: Object types to filter. Please check the [Rubrik documentation](https://rubrikinc.github.io/rubrik-api-documentation/schema/reference/managedobjecttype.doc.html) for the list of object types.
      - name: retention_sla_domain_ids
        type: text
        title: Retention SLA Domain IDs
        multi: true
        required: false
        show_user: true
        description: Retention SLAs to filter.
