type: logs
title: Rubrik Storage Unmanaged Objects Metrics
streams:
  - input: httpjson
    vars:
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Valid time units are ns, us, ms, s, m, h.
        multi: false
        required: false
        show_user: true
        default: 60s
      - name: interval
        type: text
        title: Interval
        multi: false
        required: true
        show_user: true
        description: Interval at which the alerts will be pulled. The value must be between 2m and 1h. Supported units for this parameter are h/m/s.
        default: 10m
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: true
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata.  This executes in the agent before the logs are parsed.  See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
      - name: first
        type: integer
        title: First
        multi: false
        required: false
        show_user: false
        description: Returns the first n elements from the list.
      - name: after
        type: text
        title: After
        multi: false
        required: false
        show_user: false
        description: Returns the elements in the list that occur after the specified cursor.
      - name: last
        type: integer
        title: Last
        multi: false
        required: false
        show_user: false
        description: Returns the last n elements from the list.
      - name: before
        type: text
        title: Before
        multi: false
        required: false
        show_user: false
        description: Returns the elements in the list that occur before the specified cursor.
      - name: cluster_uuid
        type: text
        title: Cluster UUID
        multi: false
        required: true
        show_user: true
        description: Workload cluster UUID.
      - name: unmanaged_statuses
        type: text
        title: Unmanaged Statuses
        multi: true
        required: true
        show_user: true
        description: Unmanaged statuses to filter. Please check the [Rubrik documentation](https://rubrikinc.github.io/rubrik-api-documentation/schema/reference/unmanagedobjectavailabilityfilter.doc.html) for the list of unmanaged statuses.
      - name: object_types
        type: text
        title: Object Types
        multi: true
        required: true
        show_user: true
        description: Object types to filter. Please check the [Rubrik documentation](https://rubrikinc.github.io/rubrik-api-documentation/schema/reference/managedobjecttype.doc.html) for the list of object types.
      - name: retention_sla_domain_ids
        type: text
        title: Retention SLA Domain IDs
        multi: true
        required: true
        show_user: true
        description: Retention SLAs to filter.

    template_path: httpjson.yml.hbs
    title: Rubrik Storage Unmanaged Objects
    description: Collect Rubrik Storage unmanaged objects data via the RSC GraphQL API
