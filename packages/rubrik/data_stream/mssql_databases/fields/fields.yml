- name: rubrik.mssql_databases
  type: group
  fields:
    - name: id
      type: keyword
      dimension: true
      description: FID of the hierarchy object.
    - name: name
      type: keyword
      dimension: true
      description: The name of the hierarchy object.
    - name: is_online
      type: boolean
      description: Specifies if the SQL Server database is online.
    - name: cluster
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The Rubrik cluster id where this object originated.
        - name: name
          type: keyword
          dimension: true
          description: The Rubrik cluster name where this object originated.
    - name: object_type
      type: keyword
      dimension: true
      description: Type of this object.
    - name: missed_snapshots.count
      type: long
      description: Number of missed snapshots.
