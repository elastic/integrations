- name: rubrik.physical_hosts
  type: group
  fields:
    - name: id
      type: keyword
      dimension: true
      description: ID of the physical host.
    - name: name
      type: keyword
      dimension: true
      description: Name of the physical host.
    - name: connectivity_status
      type: keyword
      dimension: true
      description: Connectivity status of host.
    - name: cluster
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The cluster uuid.
        - name: name
          type: keyword
          dimension: true
          description: The cluster name.
    - name: effective_sla_domain
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The ID of the SLA domain.
        - name: name
          type: keyword
          dimension: true
          description: The name of the SLA domain.
    - name: os_type
      type: keyword
      dimension: true
      description: The operating system type of the physical host.
