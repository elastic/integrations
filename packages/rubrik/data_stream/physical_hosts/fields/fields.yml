- name: rubrik.physical_hosts
  type: group
  fields:
    - name: id
      type: keyword
      dimension: true
      description: FID of the hierarchy object.
    - name: name
      type: keyword
      dimension: true
      description: Name of the hierarchy object.
    - name: connection_status
      type: group
      fields:
        - name: connectivity
          type: keyword
          dimension: true
          description: Connectivity status of host.
    - name: cluster
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The cluster uuid.
        - name: name
          type: keyword
          dimension: true
          description: The cluster name.
    - name: os_type
      type: keyword
      dimension: true
      description: The operating system type of the physical host.
