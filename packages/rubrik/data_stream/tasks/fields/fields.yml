- name: rubrik.tasks
  type: group
  fields:
    - name: sla_domain
      type: group
      fields:
        - name: id
          type: keyword
          dimension: true
          description: The Rubrik cluster id where this object originated.
        - name: name
          type: keyword
          dimension: true
          description: The Rubrik cluster name where this object originated.
    - name: succeeded_tasks.count
      type: long
      metric_type: gauge
      description: The number of tasks that have succeeded.
    - name: failed_tasks.count
      type: long
      metric_type: gauge
      description: The number of tasks that have failed.
    - name: canceled_tasks.count
      type: long
      metric_type: gauge
      description: The number of tasks that have been canceled.
    - name: missed_tasks.count
      type: long
      metric_type: gauge
      description: The number of tasks that have missed.
