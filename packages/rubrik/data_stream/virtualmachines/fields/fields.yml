- name: rubrik.virtualmachines
  type: group
  fields:
    - name: power_status
      type: keyword
      description: The power status of VM (ON,OFF,SLEEP etc.). Supported in v5.0+.
    - name: agent_status
      type: keyword
      description: The status of the Rubrik Backup Service agent for virtual machines. Supported in v5.0+.
    - name: replication_enabled
      type: boolean
      description: The replication status of the virtual machine. Supported in v5.0+.