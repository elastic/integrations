- name: rubrik.fileset
  type: group
  fields:
    - name: id
      type: keyword
      description: The ID of the Fileset.
    - name: name
      type: keyword
      description: The name of the Fileset.
    - name: compliance_status
      type: keyword
      description: The current compliance status of the workload.
    - name: archive_storage
      type: long
      unit: byte
      metric_type: gauge
      description: The amount of storage used by archived snapshots.
    - name: local_storage
      type: long
      unit: byte
      metric_type: gauge
      description: The local storage size in bytes.
    - name: total_snapshots
      type: long
      metric_type: gauge
      description: The total number of snapshots present for the workload.
    - name: archive_snapshots
      type: long
      metric_type: gauge
      description: The number of snapshots that have been archived.
    - name: host.os_type
      type: keyword
      dimension: true
      description: The operating system type of the host.
    - name: cluster
      type: group
      description: Details of the Rubrik cluster associated with the workload.
      fields:
        - name: id
          type: keyword
          description: The unique identifier of the cluster.
        - name: name
          type: keyword
          description: The name of the cluster.
        - name: system_status
          type: keyword
          description: The system status of the cluster.
        - name: type
          type: keyword
          description: The type of the cluster, such as OnPrem or Cloud.
