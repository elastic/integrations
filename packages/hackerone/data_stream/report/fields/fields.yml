- name: hackerone
  type: group
  fields:
    - name: report
      type: group
      description: >-
        Raw HackerOne report resource document parsed from the JSON:API response. The structure mirrors the upstream payload — `id`, `type`, `attributes`, and `relationships` — without further field renames inside `hackerone.report`.
      fields:
        - name: id
          type: keyword
          description: JSON:API resource identifier for the report.
        - name: type
          type: keyword
          description: JSON:API resource type discriminator (typically `report`).
        - name: attributes
          type: group
          fields:
            - name: title
              type: keyword
              description: Report title mirrored alongside ECS message.
            - name: main_state
              type: keyword
              description: High-level workflow state (draft/open/closed).
            - name: state
              type: keyword
              description: Operational report state consumed for ECS categorization.
            - name: source
              type: keyword
              description: Source label for the submission when present.
            - name: vulnerability_information
              type: match_only_text
              description: Raw Markdown narrative mirrored from the reporter submission.
            - name: severity_metrics
              type: match_only_text
              description: Free-form supplemental severity commentary when captured on attributes.
            - name: cve_ids
              type: keyword
              description: Full CVE identifiers when present beyond the ECS vulnerability.id primary.
            - name: weaknesses
              type: keyword
              description: Alternate weakness identifiers as delivered on certain payloads.
            - name: created_at
              type: date
              description: Report creation time mirrored from attributes.
            - name: submitted_at
              type: date
              description: Submission acceptance time when present.
            - name: triaged_at
              type: date
            - name: closed_at
              type: date
            - name: disclosed_at
              type: date
              description: Public disclosure timestamp.
            - name: bounty_awarded_at
              type: date
              description: Timestamp when a bounty award was recorded.
            - name: swag_awarded_at
              type: date
              description: Timestamp when swag was recorded as awarded.
            - name: reporter_agreed_on_going_public_at
              type: date
              description: When the researcher agreed to going public.
            - name: bug_reporter_agreed_on_going_public
              type: boolean
              description: Whether the researcher agreed to go public where provided on the payload.
            - name: submitted_by_team_member
              type: boolean
              description: Whether the submission was filed by a program team member when present.
            - name: cloned_from
              type: keyword
              description: Source report reference when cloning is indicated.
            - name: first_program_activity_at
              type: date
              description: First program-side activity time.
            - name: last_program_activity_at
              type: date
              description: Last program activity time.
            - name: last_reporter_activity_at
              type: date
              description: Last reporter activity time.
            - name: last_activity_at
              type: date
              description: Last activity time on the report (primary polling cursor).
            - name: last_public_activity_at
              type: date
              description: Last public activity time.
            - name: hai_is_priority
              type: boolean
            - name: hai_is_priority_reason
              type: keyword
            - name: timer_bounty_awarded_miss_at
              type: date
            - name: timer_bounty_awarded_elapsed_time
              type: long
            - name: timer_first_program_response_miss_at
              type: date
            - name: timer_first_program_response_elapsed_time
              type: long
            - name: timer_report_resolved_miss_at
              type: date
            - name: timer_report_resolved_elapsed_time
              type: long
            - name: timer_report_triage_miss_at
              type: date
            - name: timer_report_triage_elapsed_time
              type: long
            - name: attachment_ids
              type: keyword
              description: Optional attachment identifiers on the raw report resource attributes when provided.
            - name: original_report_id
              type: keyword
            - name: issue_tracker_reference_id
              type: keyword
            - name: issue_tracker_reference_url
              type: keyword
        - name: relationships
          type: group
          fields:
            - name: severity
