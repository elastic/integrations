                          type: keyword
                        - name: author_type
                          type: keyword
                        - name: user_id
                          type: long
                        - name: created_at
                          type: date
                        - name: calculation_method
                          type: keyword
                        - name: cvss_vector_string
                          type: keyword
                        - name: attack_vector
                          type: keyword
                        - name: attack_complexity
                          type: keyword
                        - name: privileges_required
                          type: keyword
                        - name: user_interaction
                          type: keyword
                        - name: scope
                          type: keyword
                        - name: confidentiality
                          type: keyword
                        - name: integrity
                          type: keyword
                        - name: availability
                          type: keyword
                        - name: cvss_4_point_0_metrics
                          type: group
                          description: >-
                            CVSS v4 metric set forwarded as-is from the upstream payload.
                          fields:
