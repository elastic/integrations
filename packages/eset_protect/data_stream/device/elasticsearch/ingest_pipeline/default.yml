---
description: Pipeline for processing device logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 8.11.0
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_host_into_event_category
      value: host
      allow_duplicates: false
  - append:
      field: event.type
      tag: append_info_into_event_type
      value: info
      allow_duplicates: false
  - date:
      field: json.lastSyncTime
      tag: date_last_sync_time
      target_field: "@timestamp"
      formats:
        - ISO8601
      ignore_failure: true
  - set:
      field: host.id
      tag: set_host_id_from_uuid
      copy_from: json.uuid
      ignore_empty_value: true
  - rename:
      field: json.displayName
      tag: rename_displayName
      target_field: host.name
      ignore_missing: true
  - append:
      field: related.hosts
      tag: append_uuid_into_related_hosts
      value: "{{{json.uuid}}}"
      allow_duplicates: false
      if: ctx.json?.uuid != null
  - append:
      field: related.hosts
      tag: append_host_name_into_related_hosts
      value: "{{{host.name}}}"
      allow_duplicates: false
      if: ctx.host?.name != null
  - convert:
      field: json.primaryLocalIpAddress
      tag: convert_primary_local_ip_to_ip
      type: ip
      target_field: json.primaryLocalIpAddress
      ignore_missing: true
      on_failure:
        - remove:
            field: json.primaryLocalIpAddress
            ignore_missing: true
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - append:
      field: host.ip
      tag: append_primary_local_ip_into_host_ip
      value: "{{{json.primaryLocalIpAddress}}}"
      allow_duplicates: false
      if: ctx.json?.primaryLocalIpAddress != null
  - append:
      field: related.ip
      tag: append_primary_local_ip_into_related_ip
      value: "{{{json.primaryLocalIpAddress}}}"
      allow_duplicates: false
      if: ctx.json?.primaryLocalIpAddress != null
  - convert:
      field: json.publicIpAddress
      tag: convert_public_ip_to_ip
      type: ip
      target_field: json.publicIpAddress
      ignore_missing: true
      on_failure:
        - remove:
            field: json.publicIpAddress
            ignore_missing: true
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - append:
      field: host.ip
      tag: append_public_ip_into_host_ip
      value: "{{{json.publicIpAddress}}}"
      allow_duplicates: false
      if: ctx.json?.publicIpAddress != null
  - append:
      field: related.ip
      tag: append_public_ip_into_related_ip
      value: "{{{json.publicIpAddress}}}"
      allow_duplicates: false
      if: ctx.json?.publicIpAddress != null
  - rename:
      field: json.operatingSystem.displayName
      tag: rename_os_displayName
      target_field: host.os.full
      ignore_missing: true
  - rename:
      field: json.operatingSystem.version.name
      tag: rename_os_version_name
      target_field: host.os.version
      ignore_missing: true
  - set:
      field: host.os.type
      tag: set_os_type_windows
      value: windows
      if: ctx.host?.os?.full != null && ctx.host.os.full.toLowerCase().contains('windows')
  - set:
      field: host.os.type
      tag: set_os_type_linux
      value: linux
      if: ctx.host?.os?.full != null && ctx.host.os.full.toLowerCase().contains('linux')
  - set:
      field: host.os.type
      tag: set_os_type_macos
      value: macos
      if: ctx.host?.os?.full != null && (ctx.host.os.full.toLowerCase().contains('mac os') || ctx.host.os.full.toLowerCase().contains('macos'))
  - set:
      field: host.os.name
      tag: set_os_name_from_os_full
      copy_from: host.os.full
      ignore_empty_value: true
  - set:
      field: host.os.platform
      tag: set_os_platform_windows
      value: windows
      if: ctx.host?.os?.type == 'windows'
  - set:
      field: host.os.platform
      tag: set_os_platform_linux
      value: linux
      if: ctx.host?.os?.type == 'linux'
  - set:
      field: host.os.platform
      tag: set_os_platform_macos
      value: darwin
      if: ctx.host?.os?.type == 'macos'
  - set:
      field: host.os.family
      tag: set_os_family_windows
      value: windows
      if: ctx.host?.os?.type == 'windows'
  - set:
      field: host.os.family
      tag: set_os_family_linux
      value: linux
      if: ctx.host?.os?.type == 'linux'
  - set:
      field: host.os.family
      tag: set_os_family_macos
      value: darwin
      if: ctx.host?.os?.type == 'macos'
  - script:
      tag: script_extract_mac_addresses
      lang: painless
      description: Extracts MAC addresses from hardwareProfiles network adapters into host.mac.
      source: |-
        if (!(ctx.json?.hardwareProfiles instanceof List)) return;
        def macs = new ArrayList();
        for (def profile : (List) ctx.json.hardwareProfiles) {
          if (!(profile.networkAdapters instanceof List)) continue;
          for (def adapter : (List) profile.networkAdapters) {
            if (adapter.macAddress instanceof String && adapter.macAddress != '') {
              macs.add(adapter.macAddress);
            }
          }
        }
        if (!macs.isEmpty()) {
          if (ctx.host == null) ctx.host = [:];
          if (ctx.host.mac == null) {
            ctx.host.mac = macs;
          } else {
            ctx.host.mac.addAll(macs);
          }
        }
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - script:
      tag: script_rename_nested_fields
      lang: painless
      description: Renames camelCase fields in deployedComponents and hardwareProfiles arrays to snake_case.
      source: |-
        if (ctx.json?.deployedComponents instanceof List) {
          for (def comp : (List) ctx.json.deployedComponents) {
            if (comp.containsKey('displayName')) { comp.display_name = comp.remove('displayName'); }
          }
        }
        if (ctx.json?.hardwareProfiles instanceof List) {
          for (def profile : (List) ctx.json.hardwareProfiles) {
            if (profile.bios instanceof Map) {
              if (profile.bios.containsKey('serialNumber')) { profile.bios.serial_number = profile.bios.remove('serialNumber'); }
            }
            if (profile.hardDrives instanceof List) {
              for (def drive : (List) profile.hardDrives) {
                if (drive.containsKey('serialNumber')) { drive.serial_number = drive.remove('serialNumber'); }
                if (drive.containsKey('capacityBytes')) { drive.capacity_bytes = drive.remove('capacityBytes'); }
                if (drive.containsKey('hardwareEncryptionSupported')) { drive.hardware_encryption_supported = drive.remove('hardwareEncryptionSupported'); }
                if (drive.containsKey('manufacturerName')) { drive.manufacturer_name = drive.remove('manufacturerName'); }
                if (drive.containsKey('displayName')) { drive.display_name = drive.remove('displayName'); }
                if (drive.containsKey('driveType')) { drive.drive_type = drive.remove('driveType'); }
              }
              profile.hard_drives = profile.remove('hardDrives');
            }
            if (profile.networkAdapters instanceof List) {
              for (def adapter : (List) profile.networkAdapters) {
                if (adapter.containsKey('macAddress')) { adapter.mac_address = adapter.remove('macAddress'); }
              }
              profile.network_adapters = profile.remove('networkAdapters');
            }
          }
        }
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - fingerprint:
      fields:
        - json.uuid
      tag: fingerprint_uuid
      target_field: _id
      method: MD5
      ignore_missing: true
  - rename:
      field: json.uuid
      tag: rename_uuid
      target_field: eset_protect.device.uuid
      ignore_missing: true
  - set:
      field: eset_protect.device.display_name
      tag: set_display_name_from_host_name
      copy_from: host.name
      ignore_empty_value: true
  - rename:
      field: json.etag
      tag: rename_etag
      target_field: eset_protect.device.etag
      ignore_missing: true
  - rename:
      field: json.ownerUuid
      tag: rename_ownerUuid
      target_field: eset_protect.device.owner_uuid
      ignore_missing: true
  - rename:
      field: json.description
      tag: rename_description
      target_field: eset_protect.device.description
      ignore_missing: true
  - rename:
      field: json.tags
      tag: rename_device_tags
      target_field: eset_protect.device.labels
      ignore_missing: true
  - rename:
      field: json.deployedComponents
      tag: rename_deployedComponents
      target_field: eset_protect.device.deployed_components
      ignore_missing: true
  - date:
      field: json.lastSyncTime
      tag: date_last_sync_time_custom
      target_field: eset_protect.device.last_sync_time
      formats:
        - ISO8601
      ignore_failure: true
  - rename:
      field: json.originalDisplayName
      tag: rename_originalDisplayName
      target_field: eset_protect.device.original_display_name
      ignore_missing: true
  - rename:
      field: json.parentGroupUuid
      tag: rename_parentGroupUuid
      target_field: eset_protect.device.parent_group_uuid
      ignore_missing: true
  - convert:
      field: json.isMobile
      tag: convert_isMobile_to_boolean
      target_field: eset_protect.device.is_mobile
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - rename:
      field: json.enrollmentStatus
      tag: rename_enrollmentStatus
      target_field: eset_protect.device.enrollment_status
      ignore_missing: true
  - rename:
      field: json.functionalityStatus
      tag: rename_functionalityStatus
      target_field: eset_protect.device.functionality_status
      ignore_missing: true
  - convert:
      field: json.isMuted
      tag: convert_isMuted_to_boolean
      target_field: eset_protect.device.is_muted
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - convert:
      field: json.functionalityProblemCount
      tag: convert_functionalityProblemCount_to_long
      target_field: eset_protect.device.functionality_problem_count
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - convert:
      field: json.isMaster
      tag: convert_isMaster_to_boolean
      target_field: eset_protect.device.is_master
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - rename:
      field: json.activeProducts
      tag: rename_activeProducts
      target_field: eset_protect.device.active_products
      ignore_missing: true
  - rename:
      field: json.deviceType
      tag: rename_deviceType
      target_field: eset_protect.device.type
      ignore_missing: true
  - rename:
      field: json.primaryLocalIpAddress
      tag: rename_primaryLocalIpAddress
      target_field: eset_protect.device.primary_local_ip_address
      ignore_missing: true
  - rename:
      field: json.publicIpAddress
      tag: rename_publicIpAddress
      target_field: eset_protect.device.public_ip_address
      ignore_missing: true
  - rename:
      field: json.hardwareProfiles
      tag: rename_hardwareProfiles
      target_field: eset_protect.device.hardware_profiles
      ignore_missing: true
  - rename:
      field: json.operatingSystem
      tag: rename_operatingSystem
      target_field: eset_protect.device.operating_system
      ignore_missing: true
  - rename:
      field: json.managementDomain
      tag: rename_managementDomain
      target_field: eset_protect.device.management_domain
      ignore_missing: true
  - remove:
      field:
        - eset_protect.device.display_name
        - eset_protect.device.uuid
      tag: remove_custom_duplicate_fields
      ignore_missing: true
  - remove:
      field: json
      tag: remove_json
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: Drops null/empty values recursively.
      source: |-
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
