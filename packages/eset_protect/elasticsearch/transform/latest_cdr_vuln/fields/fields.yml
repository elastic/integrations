- name: host
  type: group
  fields:
    - name: id
      type: keyword
    - name: name
      type: keyword
- name: eset_protect
  type: group
  fields:
    - name: device_vulnerability
      type: group
      fields:
        - name: application
          type: group
          fields:
            - name: developer_display_name
              type: keyword
            - name: display_name
              type: keyword
            - name: uuid
              type: keyword
            - name: version
              type: group
              fields:
                - name: id
                  type: keyword
                - name: major
                  type: long
                - name: minor
                  type: long
                - name: name
                  type: keyword
                - name: patch
                  type: long
        - name: available_patch_uuids
          type: keyword
        - name: cve_number
          type: keyword
        - name: device_group_uuid
          type: keyword
        - name: device_uuid
          type: keyword
        - name: first_detect_time
          type: date
        - name: last_detect_time
          type: date
        - name: os_family_id
          type: long
        - name: package
          type: group
          fields:
            - name: display_name
              type: keyword
            - name: name
              type: keyword
            - name: package_manager_type
              type: keyword
            - name: version_name
              type: keyword
        - name: patch_available
          type: boolean
        - name: risk_score
          type: long
        - name: severity
          type: keyword
        - name: type
          type: keyword
        - name: vulnerability_id
          type: long
