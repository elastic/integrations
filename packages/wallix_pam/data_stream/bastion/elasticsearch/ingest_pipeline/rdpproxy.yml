---
description: Parse Wallix PAM RDP proxy events
processors:
  - grok:
      field: message
      patterns:
        - '^\[rdpproxy\] %{GREEDYDATA:_tmp.kv}$'
        - '^\[RDP Session\] %{GREEDYDATA:_tmp.kv}$'
      ignore_failure: true
  - kv:
      field: _tmp.kv
      field_split: ' (?=(?:[^"]*"[^"]*")*[^"]*$)(?=[A-Za-z_][A-Za-z0-9_]*=)'
      value_split: '='
      target_field: wallix_pam
      trim_value: '"'
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.size
      type: long
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.primary_authentication
      type: double
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.fetch_rights
      type: double
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.checkout_target
      type: double
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.target_connection
      type: double
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.primary_connection
      type: double
      ignore_missing: true
      ignore_failure: true
  - convert:
      field: wallix_pam.total
      type: double
      ignore_missing: true
      ignore_failure: true
  - set:
      field: user.name
      copy_from: wallix_pam.user
      if: ctx.wallix_pam?.user != null && ctx.user?.name == null
  - set:
      field: user.target.name
      copy_from: wallix_pam.account
      if: ctx.wallix_pam?.account != null && ctx.user?.target?.name == null
  - set:
      field: source.address
      copy_from: wallix_pam.client_ip
      if: ctx.wallix_pam?.client_ip != null && ctx.source?.address == null
  - set:
      field: destination.address
      copy_from: wallix_pam.target_ip
      if: ctx.wallix_pam?.target_ip != null && ctx.destination?.address == null
  - grok:
      field: source.address
      patterns:
        - '^%{IP:source.ip}$'
      ignore_failure: true
      if: ctx.source?.address != null
  - grok:
      field: destination.address
      patterns:
        - '^%{IP:destination.ip}$'
      ignore_failure: true
      if: ctx.destination?.address != null
  - set:
      field: service.type
      copy_from: wallix_pam.service
      if: ctx.wallix_pam?.service != null && ctx.service?.type == null
  - lowercase:
      field: service.type
      ignore_missing: true
  - set:
      field: network.protocol
      copy_from: service.type
      if: ctx.service?.type != null && ctx.network?.protocol == null
  - script:
      lang: painless
      if: ctx.wallix_pam?.command_line instanceof String
      source: |
        String value = ctx.wallix_pam.command_line;
        value = value.replace("\\\\", "\\").replace("\\\"", "\"");
        ctx.process = ctx.process instanceof Map ? ctx.process : new HashMap();
        ctx.process.command_line = value;
  - set:
      field: file.name
      copy_from: wallix_pam.file_name
      if: ctx.wallix_pam?.file_name != null && ctx.file?.name == null
  - set:
      field: file.size
      copy_from: wallix_pam.size
      if: ctx.wallix_pam?.size != null && ctx.file?.size == null
  - set:
      field: file.hash.sha256
      copy_from: wallix_pam.sha256
      if: ctx.wallix_pam?.sha256 != null && ctx.file?.hash?.sha256 == null
  - script:
      lang: painless
      if: ctx.wallix_pam?.duration instanceof String || ctx.wallix_pam?.total != null
      ignore_failure: true
      source: |
        if (ctx.wallix_pam.duration instanceof String) {
          String[] parts = ctx.wallix_pam.duration.splitOnToken(':');
          if (parts.length == 3) {
            long hours = Long.parseLong(parts[0]);
            long minutes = Long.parseLong(parts[1]);
            long seconds = Long.parseLong(parts[2]);
            ctx.event = ctx.event instanceof Map ? ctx.event : new HashMap();
            ctx.event.duration = ((hours * 3600L) + (minutes * 60L) + seconds) * 1000000000L;
          }
        } else if (ctx.wallix_pam.total != null) {
          ctx.event = ctx.event instanceof Map ? ctx.event : new HashMap();
          ctx.event.duration = (long)(ctx.wallix_pam.total * 1000000000L);
        }
  - append:
      field: event.category
      value: session
      allow_duplicates: false
  - append:
      field: event.category
      value: process
      allow_duplicates: false
      if: ctx.wallix_pam?.type == 'NEW_PROCESS' || ctx.wallix_pam?.type == 'COMPLETED_PROCESS'
  - append:
      field: event.category
      value: file
      allow_duplicates: false
      if: ctx.wallix_pam?.type == 'CB_COPYING_PASTING_FILE_FROM_REMOTE_SESSION'
  - set:
      field: event.action
      copy_from: wallix_pam.type
      if: ctx.wallix_pam?.type != null && ctx.event?.action == null
  - append:
      field: event.type
      value: start
      allow_duplicates: false
      if: >-
        ctx.wallix_pam?.type == 'SESSION_ESTABLISHED_SUCCESSFULLY' ||
        ctx.wallix_pam?.type == 'NEW_PROCESS'
  - append:
      field: event.type
      value: end
      allow_duplicates: false
      if: >-
        ctx.wallix_pam?.type == 'SESSION_DISCONNECTION' ||
        ctx.wallix_pam?.type == 'DISCONNECT' ||
        ctx.wallix_pam?.type == 'LOGOUT' ||
        ctx.wallix_pam?.type == 'COMPLETED_PROCESS'
  - append:
      field: event.type
      value: access
      allow_duplicates: false
      if: ctx.wallix_pam?.type == 'CB_COPYING_PASTING_FILE_FROM_REMOTE_SESSION'
  - append:
      field: event.type
      value: info
      allow_duplicates: false
      if: ctx.event?.type == null
  - set:
      field: event.outcome
      value: success
      if: >-
        ctx.wallix_pam?.type == 'SESSION_ESTABLISHED_SUCCESSFULLY' ||
        ctx.wallix_pam?.type == 'CERTIFICATE_CHECK_SUCCESS' ||
        ctx.wallix_pam?.type == 'DYNAMIC_CHANNEL_CREATION_ALLOWED'
  - set:
      field: event.reason
      copy_from: wallix_pam.description
      if: ctx.wallix_pam?.description != null && ctx.event?.reason == null
  - remove:
      field:
        - _tmp
        - wallix_pam.account
        - wallix_pam.client_ip
        - wallix_pam.command_line
        - wallix_pam.file_name
        - wallix_pam.service
        - wallix_pam.sha256
        - wallix_pam.size
        - wallix_pam.target_ip
        - wallix_pam.user
      ignore_missing: true