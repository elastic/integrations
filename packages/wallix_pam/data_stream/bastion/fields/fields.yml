- name: wallix_pam
  type: group
  fields:
    - name: begin
      type: keyword
      description: |
        Raw start time extracted from the Wallix PAM event.
    - name: by_uid
      type: long
      description: |
        UID of the user that initiated the PAM session change.
    - name: channel_name
      type: keyword
      description: |
        RDP dynamic channel name.
    - name: checkout_target
      type: double
      description: |
        Time in seconds spent checking out a target.
    - name: class_name
      type: keyword
      description: |
        Window class name reported by the RDP proxy.
    - name: client_name
      type: keyword
      description: |
        Kerberos client principal name.
    - name: data
      type: wildcard
      description: |
        Free-form Wallix PAM payload data.
    - name: description
      type: wildcard
      description: |
        Descriptive text emitted by Wallix PAM.
    - name: device
      type: keyword
      description: |
        Device or host value reported by the Wallix PAM event.
    - name: diagnostic
      type: wildcard
      description: |
        Parsed diagnostic message from a Wallix authentication event.
    - name: display_name
      type: keyword
      description: |
        Display name reported by Wallix PAM.
    - name: duration
      type: keyword
      description: |
        Raw Wallix PAM duration string.
    - name: encryption_type
      type: keyword
      description: |
        Encryption type reported by Wallix PAM.
    - name: end
      type: keyword
      description: |
        Raw end time extracted from the Wallix PAM event.
    - name: end_time
      type: keyword
      description: |
        Raw Kerberos ticket end time.
    - name: fetch_rights
      type: double
      description: |
        Time in seconds spent fetching rights.
    - name: files
      type: wildcard
      description: |
        Raw file list reported by Wallix session integrity.
    - name: flags
      type: keyword
      description: |
        Flags emitted by Wallix PAM.
    - name: infos
      type: wildcard
      description: |
        Free-form details reported by Wallix PAM.
    - name: identifier
      type: keyword
      description: |
        Identifier associated with the Wallix PAM event.
    - name: method
      type: keyword
      description: |
        Authentication or access method reported by Wallix PAM.
    - name: module
      type: keyword
      description: |
        PAM module name.
    - name: object
      type: wildcard
      description: |
        Object referenced by a Wallix audit event.
    - name: pam_state
      type: keyword
      description: |
        PAM session state reported by Wallix PAM.
    - name: primary_authentication
      type: double
      description: |
        Time in seconds spent on primary authentication.
    - name: primary_connection
      type: double
      description: |
        Time in seconds spent establishing the primary connection.
    - name: psid
      type: keyword
      description: |
        Wallix PAM proxy session identifier.
    - name: renew_time
      type: keyword
      description: |
        Raw Kerberos ticket renew time.
    - name: result
      type: wildcard
      description: |
        Result text emitted by Wallix PAM.
    - name: server_name
      type: keyword
      description: |
        Kerberos server principal name.
    - name: service
      type: keyword
      description: |
        Service reported by Wallix PAM.
    - name: session
      type: boolean
      description: |
        Indicates whether a vault operation is session-based.
    - name: session_id
      type: keyword
      description: |
        Wallix PAM session identifier.
    - name: session_uid
      type: keyword
      description: |
        Session UID used by Wallix session integrity events.
    - name: source
      type: keyword
      description: |
        Event source value reported by Wallix PAM.
    - name: start_time
      type: keyword
      description: |
        Raw Kerberos ticket start time.
    - name: status
      type: keyword
      description: |
        Original Wallix PAM status value.
    - name: subcomponent
      type: keyword
      description: |
        Source Wallix PAM subcomponent extracted from the syslog header.
    - name: target
      type: wildcard
      description: |
        Target value reported by Wallix PAM.
    - name: target_connection
      type: double
      description: |
        Time in seconds spent establishing the target connection.
    - name: text
      type: wildcard
      description: |
        Free-form text reported by Wallix PAM.
    - name: total
      type: double
      description: |
        Total time in seconds reported by Wallix PAM.
    - name: tty
      type: keyword
      description: |
        TTY value reported by Wallix PAM.
    - name: type
      type: keyword
      description: |
        Original Wallix PAM event type.
    - name: uid
      type: long
      description: |
        UID reported by PAM.
    - name: vault
      type: keyword
      description: |
        Vault name referenced by the event.
    - name: window
      type: keyword
      description: |
        Window title reported by the RDP proxy.
