name: wallix_pam
title: Wallix PAM
version: "0.1.2"
description: Collect logs from Wallix PAM with Elastic Agent.
type: integration
icons:
  - src: /img/wallix.svg
    title: wallix_pam
    size: 300x300
    type: image/svg+xml
format_version: "3.0.3"
categories: [vpn_security, security]
conditions:
  kibana:
    version: "^8.13.0 || ^9.0.0"
policy_templates:
  - name: wallix_pam
    title: Wallix PAM logs
    description: Collect logs from Wallix PAM instances
    inputs:
      - type: udp
        title: "Collect Wallix PAM logs (input: udp)"
        description: "Collecting logs from Wallix PAM instances (input: udp)"
      - type: tcp
        title: "Collect Wallix PAM logs (input: tcp)"
        description: "Collecting logs from Wallix PAM instances (input: tcp)"
owner:
  github: elastic/integration-experience
  type: community
