        ctx._temp?.internal_interfaces != null &&
        ctx.observer?.ingress?.interface?.name != null &&
        ctx.observer?.egress?.interface?.name != null &&
        ctx._temp.internal_interfaces.contains(ctx.observer.egress.interface.name) &&
