title: Gigamon Application Metadata Intelligence (AMI) Logs
type: logs
streams:
  - input: http_endpoint
    template_path: http_endpoint.yml.hbs
    title: Gigamon Application Metadata Intelligence (AMI) Logs
    description: Collect the Gigamon Application Metadata Attributes which is in json format via HTTP endpoint.
    vars:
      - name: listen_port
        type: integer
        title: Listen Port
        description: The port number to listen on.
        multi: false
        required: true
        show_user: true
        default: 9559
      - name: secret_header
        type: text
        title: Secret Header
        description: The header to check for a specific value specified by `secret.value`.
        required: false
        show_user: false
        secret: false
      - name: secret_value
        type: password
        title: Secret Value
        description: The secret stored in the header name specified by `secret.header`.
        required: false
        show_user: false
        secret: true
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - gigamon-ami
      - name: preserve_original_event
        type: bool
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original.
        multi: false
        default: false
      - name: preserve_duplicate_custom_fields
        required: true
        show_user: true
        title: Preserve duplicate custom fields
        description: Preserve custom fields for all ECS mappings.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
  - title: Gigamon CEF logs
    description: Collect Gigamon CEF logs using udp input
    input: udp
    template_path: udp.yml.hbs
    vars:
      - name: listen_port
        title: Listen Port
        type: integer
        description: The UDP port to listen for traffic.
        required: true
        show_user: true
        multi: false
        default: 9560
      - name: decode_cef_timezone
        title: CEF Timezone
        type: text
        description: IANA time zone or time offset (e.g. `+0200`) to use when interpreting timestamps without a time zone in the CEF message.
        required: false
        show_user: false
        multi: false
      - name: tags
        title: Tags
        type: text
        description: A list of tags to include in events. Including `forwarded` indicates that the events did not originate on this host and causes `host.name` to not be added to events.
        required: true
        show_user: false
        multi: true
        default:
          - cef
          - forwarded
      - name: preserve_original_event
        type: bool
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original.
        multi: false
        default: false
      - name: preserve_duplicate_custom_fields
        required: true
        show_user: true
        title: Preserve duplicate custom fields
        description: Preserve custom fields for all ECS mappings.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
      - name: udp_options
        title: Custom UDP Options
        type: yaml
        description: Specify custom configuration options for the UDP input.
        required: false
        show_user: false
        multi: false
        default: |
          #read_buffer: 100MiB
          #max_message_size: 50KiB
          #timeout: 300s
      - name: preprocessors
        title: Pre-Processors
        type: yaml
        description: >
          Pre-processors are run before the CEF message is decoded. They can be used to correct CEF formatting inconsistencies that may exist from some sources. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
        required: false
        show_user: false
        multi: false
      - name: ignore_empty_values
        title: Ignore Empty Values
        type: bool
        description: Ignore CEF fields that are empty. The alternative behavior is to treat an empty field as an error.
        required: true
        show_user: true
        multi: false
        default: false
