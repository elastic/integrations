type: logs
title: Doppel Alerts
streams:
  - input: httpjson
    title: Doppel API Poller
    description: Periodically polls the Doppel API for new alerts.
    vars:
      - name: api_key
        type: password
        title: Doppel API Key
        description: Doppel API Key for authentication
        required: true
        secret: true
      - name: x_user_api_key
        type: password
        title: Doppel User API Key
        description: Doppel User API Key for authentication
        show_user: true
        required: false
        secret: true
      - name: organization_code
        type: text
        title: Organization Code
        description: Organisation Code for authentication if the user is part of multiple organisations
        show_user: true
        required: false
      - name: lookback_days
        type: integer
        title: Historical Polling Days
        description: Specifies how many days into the past the app should fetch alerts during the initial data sync
        required: false
        show_user: true
        default: 30
      - name: interval
        type: integer
        title: Incremental Polling Interval
        description: Defines how frequently the app should poll the Doppel platform for new or updated alerts after the initial sync. (In Minutes)
        required: false
        show_user: true
        default: 5
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        multi: false
        required: false
        show_user: false
        description: The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-httpjson.html#_request_tracer_filename) for details.
