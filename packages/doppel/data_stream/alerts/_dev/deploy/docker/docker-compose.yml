version: '2.3'
services:
  doppel-mock:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: doppel-mock
    ports:
      - 8080
    volumes:
      - ./files:/files:ro
    environment:
      PORT: "8080"
    command:
      - http-server
      - --addr=:8080
      - --config=/files/config.yml
