- name: thor.exe_group
  type: keyword
  description: Group owner of an executable file (Linux/Unix systems).
- name: thor.exe_magic
  type: keyword
  description: Detected file type based on magic bytes.
- name: thor.exe_mode
  type: keyword
  description: File permissions mode of an executable (Linux/Unix systems).
- name: thor.exe_owner
  type: keyword
  description: Owner of an executable file.
- name: thor.executable
  type: keyword
  description: Path to an executable file.
- name: thor.file
  type: group
  description: Group of file objects associated with a detection or system object.
  fields:
    - name: exists
      type: keyword
      description: Whether the file exists on the filesystem.
    - name: company
      type: keyword
      description: Company name from PE file metadata.
    - name: created
      type: date
      description: creation time of the file
    - name: description
      type: keyword
      description: File description from PE file metadata.
    - name: ext
      type: keyword
      description: File extension of a detected file.
    - name: first_bytes
      type: keyword
      description: First bytes of a file in hexadecimal format, often with ASCII representation.
    - name: imphash
      type: keyword
      description: Import hash (imphash) of a PE file, used for malware classification.
    - name: internal_name
      type: keyword
      description: Internal name from PE file metadata.
    - name: legal_copyright
      type: keyword
      description: Legal copyright information from PE file metadata.
    - name: original_name
      type: keyword
      description: Original filename from PE file metadata.
    - name: permissions
      type: keyword
      description: File permissions or access control list (ACL) information.
    - name: product
      type: keyword
      description: Product name from PE file metadata.
    - name: type
      type: keyword
      description: File type classification (e.g., EXE, DLL, UNKNOWN, Import).
    - name: target
      type: keyword
      description: Link target path for shortcut (LNK) files.
- name: thor.files
  type: group
  description: Nested array of file objects associated with a detection or system object.
  fields:
    - name: accessed
      type: date
      description: Last access time of a file in a files array.
    - name: modified
      type: date
      description: Modification time of a file in a files array.
    - name: permissions
      type: keyword
      description: File permissions of a file in a files array.
    - name: company
      type: keyword
      description: Company name from PE file metadata in a files array.
    - name: created
      type: date
      description: creation time of the file
    - name: description
      type: keyword
      description: File description from PE file metadata in a files array.
    - name: exists
      type: keyword
      description: Whether a file exists on the filesystem (e.g., "yes", "no").
    - name: first_bytes
      type: keyword
      description: First bytes of a file in hexadecimal format in a files array.
    - name: imphash
      type: keyword
      description: Import hash (imphash) of a PE file in a files array.
    - name: internal_name
      type: keyword
      description: Internal name from PE file metadata in a files array.
    - name: legal_copyright
      type: keyword
      description: Legal copyright information from PE file metadata in a files array.
    - name: md5
      type: keyword
      description: MD5 hash of a file in a files array.
    - name: original_name
      type: keyword
      description: Original filename from PE file metadata in a files array.
    - name: owner
      type: keyword
      description: Owner of a file in a files array.
    - name: path
      type: keyword
      description: Full path to a file in a files array.
    - name: product
      type: keyword
      description: Product name from PE file metadata in a files array.
    - name: sha1
      type: keyword
      description: SHA1 hash of a file in a files array.
    - name: sha256
      type: keyword
      description: SHA256 hash of a file in a files array.
    - name: size
      type: long
      description: Size of a file in bytes in a files array.
    - name: type
      type: keyword
      description: File type classification in a files array (e.g., EXE, Windows At Job).
- name: thor.filter_type
