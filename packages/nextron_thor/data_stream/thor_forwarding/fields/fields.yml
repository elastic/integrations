- name: thor.errors
  type: float
  description: Number of errors encountered during the THOR scan.
- name: thor.event_consumer_name
  type: keyword
  description: Name of a WMI event consumer used for persistence.
- name: thor.event_consumer
  type: keyword
  description: WMI event consumer configuration or command.
- name: thor.event_filter_name
  type: keyword
  description: Name of a WMI event filter used for persistence.
- name: thor.event_filter
  type: keyword
