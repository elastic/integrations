---
description: Pipeline for parsing Thor logs.
processors:
  - set:
      field: ecs.version
      value: 9.2.0
      tag: set_ecs_version
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
  - rename:
      ignore_missing: true
      field: message
      target_field: event.original
      if: ctx.event?.original == null
      tag: rename_message_to_event_original
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      if: ctx.event?.original != null
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - json:
      field: event.original
      target_field: thor
      tag: parse_event_original_json
  # Categorization
  - pipeline:
      tag: pipeline_20a0e7f1
      name: '{{ IngestPipeline "categorize" }}'
      ignore_missing_pipeline: true
  # Cached event category for category-dependent processors.
  - set:
      tag: set__temp_isProcess_279add73
      if: ctx.event?.category?.contains('process') == true
      field: _temp.isProcess
      value: true
  - set:
      tag: set__temp_isNetwork_70f64bff
      if: ctx.event?.category?.contains('network') == true
      field: _temp.isNetwork
      value: true
  - set:
      tag: set__temp_isRegistry_1ecc0df5
      if: ctx.event?.category?.contains('registry') == true
      field: _temp.isRegistry
      value: true
  - rename:
      field: thor.scanid
      target_field: thor.scan_id
      tag: rename_thor_scanid_to_thor_scan_id
      ignore_missing: true
  - fingerprint:
      ignore_missing: true
      target_field: _id
      fields:
        - event.original
        - log_line
      method: SHA-256
      tag: fingerprint_event_original_and_log_line
  - remove:
      field: log_line
      tag: remove_log_line
      ignore_missing: true
  - rename:
      ignore_missing: true
      field: thor.file
      target_field: file.path
      if: ctx.thor?.file != null && ctx.thor.file instanceof String
      tag: rename_thor_file_to_file_path_if_string
  - date:
      formats:
      - ISO8601
      field: thor.time
      target_field: "@timestamp"
      tag: parse_thor_time
      on_failure:
        - append:
            tag: append_error_message_8357ea02
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - remove:
      ignore_missing: true
      field: thor.time
      if: ctx['@timestamp'] != null
      tag: remove_thor_time_if_timestamp_set
  - rename:
      ignore_missing: true
      field: thor.end_time
      target_field: event.end
      tag: rename_thor_end_time_to_event_end
  - rename:
      ignore_missing: true
      field: thor.level
      target_field: log.level
      tag: rename_thor_level_to_log_level
  - rename:
      ignore_missing: true
      field: thor.message
      target_field: message
      tag: rename_thor_message_to_message
  - rename:
      ignore_missing: true
      field: thor.module
      target_field: event.module
      tag: rename_thor_module_to_event_module
  # Field name normalization
  - set:
      field: thor.image.path
      copy_from: thor.image_path
      if: ctx.thor?.image_path != null && ctx.thor?.image?.path == null
      tag: set_thor_image_path_from_image_path
  - remove:
      field: thor.image_path
      ignore_missing: true
      if: ctx.thor?.image?.path != null
      tag: remove_thor_image_path_after_normalization
  # Data type normalization
  - convert:
      field: thor.exec_flag
      type: boolean
      ignore_missing: true
      tag: convert_thor_exec_flag_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_exec_flag_9e9f17fa
            field: thor.exec_flag
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
            tag: append_error_message_convert_thor_exec_flag_to_boolean
  - convert:
      field: thor.enabled
      type: boolean
      ignore_missing: true
      tag: convert_thor_enabled_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_enabled_f499f627
            field: thor.enabled
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
            tag: append_error_message_convert_thor_enabled_to_boolean
  - convert:
      field: thor.is_admin
      type: boolean
      ignore_missing: true
      tag: convert_thor_is_admin_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_is_admin_b9a2e54d
            field: thor.is_admin
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
            tag: append_error_message_0ee4eab3
  - convert:
      field: thor.no_expire
      type: boolean
      ignore_missing: true
      tag: convert_thor_no_expire_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_no_expire_401acd0f
            field: thor.no_expire
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
            tag: append_error_message_6a99b434
  - convert:
      field: thor.active
      type: boolean
      ignore_missing: true
      tag: convert_thor_active_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_active_0a6828cd
            field: thor.active
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
            tag: append_error_message_389e044d
  - convert:
      field: thor.locked
      type: boolean
      ignore_missing: true
      tag: convert_thor_locked_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_locked_edceea37
            field: thor.locked
            ignore_missing: true
        - append:
            tag: append_error_message_85ffaa0d
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.valid
      type: boolean
      ignore_missing: true
      tag: convert_thor_valid_to_boolean
      on_failure:
        - remove:
            tag: remove_thor_valid_deae5b8d
            field: thor.valid
            ignore_missing: true
        - append:
            tag: append_error_message_aec15d4b
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.badpwcount
      type: long
      ignore_missing: true
      tag: convert_thor_badpwcount_to_long
      on_failure:
        - remove:
            tag: remove_thor_badpwcount_28d0760d
            field: thor.badpwcount
            ignore_missing: true
        - append:
            tag: append_error_message_aa5128c6
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.entries
      type: long
      ignore_missing: true
      tag: convert_thor_entries_to_long
      on_failure:
        - remove:
            tag: remove_thor_entries_68f2d69d
            field: thor.entries
            ignore_missing: true
        - append:
            tag: append_error_message_c544e739
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.event_id
      type: long
      ignore_missing: true
      tag: convert_thor_event_id_to_long
      on_failure:
        - remove:
            tag: remove_thor_event_id_aaad9f9b
            field: thor.event_id
            ignore_missing: true
        - append:
            tag: append_error_message_5c6bc027
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.num_logons
      type: long
      ignore_missing: true
      tag: convert_thor_num_logons_to_long
      on_failure:
        - remove:
            tag: remove_thor_num_logons_5b40ded1
            field: thor.num_logons
            ignore_missing: true
        - append:
            tag: append_error_message_8525825a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.scanned
      type: long
      ignore_missing: true
      tag: convert_thor_scanned_to_long
      on_failure:
        - remove:
            tag: remove_thor_scanned_22822ef5
            field: thor.scanned
            ignore_missing: true
        - append:
            tag: append_error_message_b77bc345
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: thor.pass_age
      type: double
      ignore_missing: true
      tag: convert_thor_pass_age_to_double
      on_failure:
        - remove:
            tag: remove_thor_pass_age_99759a09
            field: thor.pass_age
            ignore_missing: true
        - append:
            tag: append_error_message_f81a8f3e
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  # Process fields
  - rename:
      ignore_missing: true
      field: thor.pid
      target_field: process.pid
      if: ctx._temp?.isProcess == true
      tag: rename_thor_pid_to_process_pid
  - rename:
      ignore_missing: true
      field: thor.ppid
      target_field: process.parent.pid
      if: ctx._temp?.isProcess == true
      tag: rename_thor_ppid_to_process_parent_pid
  - rename:
      ignore_missing: true
      field: thor.process_name
      target_field: process.name
      if: ctx._temp?.isProcess == true
      tag: rename_thor_process_name_to_process_name
  - rename:
      ignore_missing: true
      field: thor.command
      target_field: process.command_line
      if: ctx._temp?.isProcess == true
      tag: rename_thor_command_to_process_command_line
  - rename:
      ignore_missing: true
      field: thor.parent
      target_field: process.parent.executable
      if: ctx._temp?.isProcess == true
      tag: rename_thor_parent_to_process_parent_executable
  - rename:
      ignore_missing: true
      field: thor.image.path
      target_field: process.executable
      if: ctx._temp?.isProcess == true
      tag: rename_thor_image_path_to_process_executable
  # Network fields
  - rename:
      ignore_missing: true
      field: thor.protocol
      target_field: network.transport
      if: ctx._temp?.isNetwork == true
      tag: rename_thor_protocol_to_network_transport
  - lowercase:
      field: network.transport
      ignore_missing: true
      tag: lowercase_network_transport
  - remove:
      field: thor.ip
      ignore_missing: true
      if: ctx.thor?.ip == '*'
      tag: remove_thor_ip_wildcard
  - remove:
      field: thor.rip
      ignore_missing: true
      if: ctx.thor?.rip == '*'
      tag: remove_thor_rip_wildcard
  - convert:
      tag: convert_thor_ip_24095cde
      field: thor.ip
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_thor_ip_90e30997
            field: thor.ip
            ignore_missing: true
        - append:
            tag: append_error_message_3de1e5e8
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: thor.ip
      target_field: source.ip
      tag: rename_thor_ip_to_source_ip
      if: ctx._temp?.isNetwork == true
      ignore_missing: true
  - convert:
      tag: convert_thor_port_8044a21e
      field: thor.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_thor_port_61d2db41
            field: thor.port
            ignore_missing: true
        - append:
            tag: append_error_message_593b04d0
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: thor.port
      target_field: source.port
      tag: rename_thor_port_to_source_port
      if: ctx._temp?.isNetwork == true
      ignore_missing: true
  - convert:
      tag: convert_thor_rip_061cd984
      field: thor.rip
      type: ip
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_thor_rip_323b2117
            field: thor.rip
            ignore_missing: true
        - append:
            tag: append_error_message_c0b7206e
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: thor.rip
      target_field: destination.ip
      tag: rename_thor_rip_to_destination_ip
      if: ctx._temp?.isNetwork == true
      ignore_missing: true
  - convert:
      tag: convert_thor_rport_08e203a6
      field: thor.rport
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            tag: remove_thor_rport_51a5edcb
            field: thor.rport
            ignore_missing: true
        - append:
            tag: append_error_message_c2acd798
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: thor.rport
      target_field: destination.port
      tag: rename_thor_rport_to_destination_port
      if: ctx._temp?.isNetwork == true
      ignore_missing: true
  - append:
      field: event.type
      value: connection
      if: ctx.event?.module == 'ProcessConnections'
      allow_duplicates: false
      tag: append_event_type_connection
  - append:
      field: related.ip
      value: '{{{source.ip}}}'
      ignore_empty_values: true
      allow_duplicates: false
      tag: append_source_ip_to_related_ip
  - append:
      field: related.ip
      value: '{{{destination.ip}}}'
      ignore_empty_values: true
      allow_duplicates: false
      tag: append_destination_ip_to_related_ip
  # Registry fields
  - rename:
      ignore_missing: true
      field: thor.key
      target_field: registry.key
      if: ctx._temp?.isRegistry == true
      tag: rename_thor_key_to_registry_key
  - rename:
      ignore_missing: true
      field: thor.entry
      target_field: registry.value
      if: ctx._temp?.isRegistry == true
      tag: rename_thor_entry_to_registry_value
  - rename:
      ignore_missing: true
      field: thor.hive
      target_field: registry.path
      if: ctx._temp?.isRegistry == true
      tag: rename_thor_hive_to_registry_path
  # Rule fields
  - set:
      field: rule.name
      copy_from: thor.reasons.0.name
      ignore_empty_value: true
      if: ctx.thor?.reasons instanceof List && ctx.thor.reasons.size() > 0
      tag: set_rule_name_from_thor_reasons
  - set:
      field: rule.id
      copy_from: thor.reasons.0.signature.rulename
      ignore_empty_value: true
      if: ctx.thor?.reasons instanceof List && ctx.thor.reasons.size() > 0 && ctx.thor.reasons[0]?.signature?.rulename != null
      tag: set_rule_id_from_thor_reasons_signature
  - set:
      field: rule.author
      value: ['{{{thor.reasons.0.signature.author}}}']
      ignore_empty_value: true
      if: ctx.thor?.reasons instanceof List && ctx.thor.reasons.size() > 0 && ctx.thor.reasons[0]?.signature?.author != null
      tag: set_rule_author_from_thor_reasons_signature
  - set:
      field: rule.description
      copy_from: thor.reasons.0.name
      ignore_empty_value: true
      if: ctx.thor?.reasons instanceof List && ctx.thor.reasons.size() > 0
      tag: set_rule_description_from_thor_reasons
  - set:
      field: rule.ruleset
      copy_from: thor.reasons.0.signature.ref
      ignore_empty_value: true
      if: ctx.thor?.reasons instanceof List && ctx.thor.reasons.size() > 0 && ctx.thor.reasons[0]?.signature?.ref != null
      tag: set_rule_ruleset_from_thor_reasons_signature
  - rename:
      ignore_missing: true
      field: thor.log_version
      target_field: event.version
      tag: rename_thor_log_version_to_event_version
  - rename:
      ignore_missing: true
      field: thor.user
      target_field: user.name
      tag: rename_thor_user_to_user_name
  - append:
      field: related.user
      tag: append_user_name_to_related_user
      value: '{{{user.name}}}'
      allow_duplicates: false
      ignore_empty_values: true
      if: ctx.user?.name != null
  - rename:
      ignore_missing: true
      field: thor.userid
      target_field: user.id
      tag: rename_thor_userid_to_user_id
  - rename:
      ignore_missing: true
      field: thor.full_name
      target_field: user.full_name
      tag: rename_thor_full_name_to_user_full_name
      if: ctx.event?.module == 'Users'
  - rename:
      ignore_missing: true
      field: thor.domain
      target_field: user.domain
      tag: rename_thor_domain_to_user_domain
  - rename:
      ignore_missing: true
      field: thor.hostname
      target_field: host.name
      tag: rename_thor_hostname_to_host_name
  - append:
      field: related.hosts
      tag: append_host_name_to_related_hosts
      value: '{{{host.name}}}'
      allow_duplicates: false
      ignore_empty_values: true
      if: ctx.host?.name != null
  - rename:
      ignore_missing: true
      field: thor.file.group
      target_field: file.group
      tag: rename_thor_file_group_to_file_group
  - rename:
      ignore_missing: true
      field: thor.file.md5
      target_field: file.hash.md5
      tag: rename_thor_file_md5_to_file_hash_md5
  - rename:
      ignore_missing: true
      field: thor.file.owner
      target_field: file.owner
      tag: rename_thor_file_owner_to_file_owner
  - rename:
      ignore_missing: true
      field: thor.file.path
      target_field: file.path
      tag: rename_thor_file_path_to_file_path
      if: ctx.file?.path == null
  - grok:
      ignore_missing: true
      field: file.path
      pattern_definitions:
        FILENAME: '[^/]+'
        WINFILENAME: '[^\\]+'
      patterns:
      - '^(?:[A-Za-z]:\\|\\)(?:.*\\)?%{WINFILENAME:file.name}$'
      - '^/(?:.*/)?%{FILENAME:file.name}$'
      tag: extract_file_name_from_path
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
            tag: append_error_message_extract_file_name_from_path
  - rename:
      ignore_missing: true
      field: thor.file.sha1
      target_field: file.hash.sha1
      tag: rename_thor_file_sha1_to_file_hash_sha1
  - rename:
      ignore_missing: true
      field: thor.file.sha256
      target_field: file.hash.sha256
      tag: rename_thor_file_sha256_to_file_hash_sha256
  - rename:
      ignore_missing: true
      field: thor.file.size
      target_field: file.size
      tag: rename_thor_file_size_to_file_size
  - rename:
      ignore_missing: true
      field: thor.lastrun
      target_field: thor.last_run
      tag: rename_thor_lastrun_to_thor_last_run
  - rename:
      ignore_missing: true
      field: thor.nextrun
      target_field: thor.next_run
      tag: rename_thor_nextrun_to_thor_next_run
  - rename:
      ignore_missing: true
      field: thor.firstbytes
      target_field: thor.first_bytes
      tag: rename_thor_firstbytes_to_thor_first_bytes
  - rename:
      ignore_missing: true
      field: thor.file.firstbytes
      target_field: thor.file.first_bytes
      tag: rename_thor_file_firstbytes_to_thor_file_first_bytes
  - foreach:
      field: thor.files
      if: ctx.thor?.files instanceof List
      ignore_missing: true
      tag: rename_thor_files_desc_to_thor_files_description
      processor:
        rename:
          field: _ingest._value.firstbytes
          target_field: _ingest._value.first_bytes
          ignore_missing: true
          tag: rename_thor_files_firstbytes_to_thor_files_first_bytes
  - rename:
      ignore_missing: true
      field: thor.eventconsumername
      target_field: thor.event_consumer_name
      tag: rename_thor_eventconsumername_to_thor_event_consumer_name
  - rename:
      ignore_missing: true
      field: thor.eventconsumer
      target_field: thor.event_consumer
      tag: rename_thor_eventconsumer_to_thor_event_consumer
  - rename:
      ignore_missing: true
      field: thor.eventfiltername
      target_field: thor.event_filter_name
      tag: rename_thor_eventfiltername_to_thor_event_filter_name
  - rename:
      ignore_missing: true
      field: thor.eventfilter
      target_field: thor.event_filter
      tag: rename_thor_eventfilter_to_thor_event_filter
  - rename:
      ignore_missing: true
      field: thor.filtertype
      target_field: thor.filter_type
      tag: rename_thor_filtertype_to_thor_filter_type
  - rename:
      ignore_missing: true
      field: thor.file.desc
      target_field: thor.file.description
      tag: rename_thor_file_desc_to_thor_file_description
  - foreach:
      field: thor.files
      if: ctx.thor?.files instanceof List
      ignore_missing: true
      tag: foreach_thor_files_1b06416b
      processor:
        rename:
          field: _ingest._value.desc
          target_field: _ingest._value.description
          ignore_missing: true
          tag: rename_thor_files_desc_to_thor_files_description
  - rename:
      ignore_missing: true
      field: thor.image.desc
      target_field: thor.image.description
      tag: rename_thor_image_desc_to_thor_image_description
  - rename:
