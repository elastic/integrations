  - script:
      tag: script_compute_duration_string_to_secons
      lang: painless
      description: Computes duration string into seconds
      if: ctx.thor?.duration != null
      source: |-
          String s = ctx.thor.duration.toString().trim();
          if (s.length() == 0) return;

          long hours = 0L;
          long mins  = 0L;
          long secs  = 0L;

          String[] parts = s.splitOnToken(" ");
          for (int i = 0; i < parts.length - 1; i++) {
            String v = parts[i];
            String u = parts[i + 1].toLowerCase(Locale.ROOT);

            long n;
            try {
              n = Long.parseLong(v);
            } catch (Exception e) {
              continue;  // skip non-numeric tokens safely
            }

            if (u.startsWith("hour")) {
              hours = n;
            } else if (u.startsWith("min")) {
              mins = n;
            } else if (u.startsWith("sec")) {
              secs = n;
            }
          }

          ctx.thor.duration = hours * 3600L + mins * 60L + secs;
