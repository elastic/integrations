# newer versions go on top
- version: "0.5.0"
  changes:
    - description: Revise the integration overview for THOR Cloud accuracy, and document the encrypted report limitation.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19880
    - description: Improve the [Nextron Thor] Overview dashboard for accuracy, coverage, and control.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19880
- version: "0.4.0"
  changes:
    - description: Fix CEL cursor advancement when scans produce no events, improve deduplication and file path parsing, handle AtJobs multi-value start timestamps, and terminate processing on API error responses.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19713
    - description: Map event.category and event.type per THOR module, map process, registry, and rule fields to ECS, and set event.kind to alert for Alert-level findings.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19713
    - description: "Renames and retypes several `thor.*` fields and removes the default `event.category: file`; saved searches, dashboards, and detection rules that use the previous field names, keyword mappings, or blanket file category must be updated."
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/19713
- version: "0.3.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19439
- version: "0.2.0"
  changes:
    - description: Enable Agentless deployment.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19315
- version: "0.1.0"
  changes:
    - description: Include campaign_id in logs to enable filtering and correlation by scan campaign.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19259
- version: "0.0.2"
  changes:
    - description: Fix file.name extraction from file.path for lowercase Windows drive-letter paths and root-level POSIX paths.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/18641
- version: "0.0.1"
  changes:
    - description: Initial draft of the package
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16917
