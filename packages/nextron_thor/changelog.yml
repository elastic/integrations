# newer versions go on top
- version: "0.3.1"
  changes:
    - description: Fix CEL cursor advancement when scans produce no events, improve deduplication and file path parsing, handle AtJobs multi-value start timestamps, and drop API error responses from the index.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/1
- version: "0.3.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19439
- version: "0.2.0"
  changes:
    - description: Enable Agentless deployment.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19315
- version: "0.1.0"
  changes:
    - description: Include campaign_id in logs to enable filtering and correlation by scan campaign.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19259
- version: "0.0.2"
  changes:
    - description: Fix file.name extraction from file.path for lowercase Windows drive-letter paths and root-level POSIX paths.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/18641
- version: "0.0.1"
  changes:
    - description: Initial draft of the package
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16917
