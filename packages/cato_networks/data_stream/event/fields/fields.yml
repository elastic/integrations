- name: cato_networks
  type: group
  fields:
    - name: event
      type: group
      fields:
        - name: account_id
          type: keyword
          description: Unique identifier for the account.
        - name: account_name
          type: keyword
          description: Name of the account.
        - name: action
          type: keyword
          description: Action taken or performed.
        - name: ad_name
          type: keyword
          description: Active Directory name.
        - name: api_name
          type: keyword
          description: Name of the API.
        - name: api_type
          type: keyword
          description: Type of the API.
        - name: app_stack
          type: keyword
          description: Application stack information.
        - name: application_id
          type: keyword
          description: Unique identifier for the application.
        - name: application_name
          type: keyword
          description: Name of the application.
        - name: application_risk
          type: long
          description: Risk level associated with the application.
        - name: application_type
          type: keyword
          description: Type of the application.
        - name: authentication_type
          type: keyword
          description: Type of authentication used.
        - name: categories
          type: keyword
          description: Categories associated with the event.
        - name: cato_app
          type: keyword
          description: Cato application identifier.
        - name: client_class
          type: keyword
          description: Classification of the client.
        - name: client_ip
          type: ip
          description: IP address of the client.
        - name: client_version
          type: keyword
          description: Version of the client software.
        - name: configured_host_name
          type: keyword
          description: Configured hostname.
        - name: congestion_algorithm
          type: keyword
          description: Congestion control algorithm used.
        - name: connection_origin
          type: keyword
          description: Origin of the connection.
        - name: custom_category_id
          type: keyword
          description: Unique identifier for the custom category.
        - name: custom_category_name
          type: keyword
          description: Name of the custom category.
        - name: dest_country
          type: keyword
          description: Destination country.
        - name: dest_country_code
          type: keyword
          description: Destination country code.
        - name: dest_ip
          type: ip
          description: Destination IP address.
        - name: dest_port
          type: long
          description: Destination port number.
        - name: device_categories
          type: keyword
          description: Categories associated with the device.
        - name: device_id
          type: keyword
          description: Unique identifier for the device.
        - name: device_name
          type: keyword
          description: Name of the device.
        - name: device_os_type
          type: keyword
          description: Operating system type of the device.
        - name: device_posture_profile
          type: keyword
          description: Security posture profile of the device.
        - name: device_type
          type: keyword
          description: Type of the device.
        - name: dns_protection_category
          type: keyword
          description: DNS protection category.
        - name: dns_query
          type: keyword
          description: DNS query string.
        - name: dns_record_type
          type: keyword
          description: Type of DNS record.
        - name: domain_name
          type: keyword
          description: Domain name.
        - name: egress_pop_name
          type: keyword
          description: Name of the egress point of presence.
        - name: event_count
          type: long
          description: Count of events.
        - name: event_id
          type: keyword
          description: Unique identifier for the event.
        - name: event_message
          type: match_only_text
          description: Event message content.
        - name: event_sub_type
          type: keyword
          description: Sub-type of the event.
        - name: event_type
          type: keyword
          description: Type of the event.
        - name: flow_id
          type: keyword
          description: Unique identifier for the network flow.
        - name: full_path_url
          type: wildcard
          description: Full path URL.
        - name: host_ip
          type: ip
          description: IP address of the host.
        - name: host_mac
          type: keyword
          description: MAC address of the host.
        - name: http_request_method
          type: keyword
          description: HTTP request method.
        - name: http_response_code
          type: long
          description: HTTP response status code.
        - name: internal_id
          type: keyword
          description: Internal identifier.
        - name: internalid
          type: keyword
          description: Internal identifier.
        - name: ip_protocol
          type: keyword
          description: IP protocol used.
        - name: is_sanctioned_app
          type: boolean
          description: Indicates whether the application is sanctioned.
        - name: is_sinkhole
          type: boolean
          description: Indicates whether the destination is a sinkhole.
        - name: isp_name
          type: keyword
          description: Name of the Internet Service Provider.
        - name: key_name
          type: keyword
          description: Name of the key.
        - name: login_type
          type: keyword
          description: Type of login.
        - name: mitre_attack_subtechniques
          type: keyword
          description: MITRE ATT&CK sub-techniques.
        - name: mitre_attack_tactics
          type: keyword
          description: MITRE ATT&CK tactics.
        - name: mitre_attack_techniques
          type: keyword
          description: MITRE ATT&CK techniques.
        - name: network_rule
          type: keyword
          description: Network rule applied.
        - name: os_type
          type: keyword
          description: Operating system type.
        - name: os_version
          type: keyword
          description: Operating system version.
        - name: pop_name
          type: keyword
          description: Name of the point of presence.
        - name: prompt_action
          type: keyword
          description: Action prompted to the user.
        - name: public_ip
          type: ip
          description: Public IP address.
        - name: qos_priority
          type: long
          description: Quality of Service priority level.
        - name: request_size
          type: long
          description: Size of the request in bytes.
        - name: response_size
          type: long
          description: Size of the response in bytes.
        - name: risk_level
          type: keyword
          description: Risk level assessment.
        - name: rule_id
          type: keyword
          description: Unique identifier for the rule.
        - name: rule_name
          type: keyword
          description: Name of the rule.
        - name: server_ip
          type: ip
          description: IP address of the server.
        - name: signature_id
          type: keyword
          description: Unique identifier for the signature.
        - name: socket_version
          type: keyword
          description: Version of the socket.
        - name: src_country
          type: keyword
          description: Source country.
        - name: src_country_code
          type: keyword
          description: Source country code.
        - name: src_ip
          type: ip
          description: Source IP address.
        - name: src_is_site_or_vpn
          type: keyword
          description: Indicates whether the source is a site or VPN.
        - name: src_isp_ip
          type: ip
          description: Source ISP IP address.
        - name: src_port
          type: long
          description: Source port number.
        - name: src_site_id
          type: keyword
          description: Unique identifier for the source site.
        - name: src_site_name
          type: keyword
          description: Name of the source site.
        - name: static_host
          type: boolean
          description: Indicates whether the host is static.
        - name: subnet_name
          type: keyword
          description: Name of the subnet.
        - name: tcp_acceleration
          type: boolean
          description: Indicates whether TCP acceleration is enabled.
        - name: threat_name
          type: keyword
          description: Name of the threat.
        - name: threat_reference
          type: keyword
          description: Reference identifier for the threat.
        - name: threat_type
          type: keyword
          description: Type of threat.
        - name: time
          type: date
          description: Timestamp of the event.
        - name: time_str
          type: date
          description: Timestamp of the event as a string.
        - name: tls_inspection
          type: boolean
          description: Indicates whether TLS inspection is enabled.
        - name: traffic_direction
          type: keyword
          description: Direction of the traffic.
        - name: transaction_size
          type: long
          description: Size of the transaction in bytes.
        - name: url
          type: wildcard
          description: URL accessed.
        - name: user_agent
          type: keyword
          description: User agent string.
        - name: user_id
          type: keyword
          description: Unique identifier for the user.
        - name: user_name
          type: keyword
          description: Name of the user.
        - name: user_reference_id
          type: keyword
          description: Reference identifier for the user.
        - name: visible_device_id
          type: keyword
          description: Visible identifier for the device.
        - name: vpn_user_email
          type: keyword
          description: Email address of the VPN user.
