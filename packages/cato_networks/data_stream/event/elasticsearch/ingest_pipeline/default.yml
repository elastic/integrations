  - script:
      description: Dynamically set host.os.type values.
      tag: script_map_host_os_type
      lang: painless
      if: ctx.cato_networks?.event?.os_type != null
      params:
        os_type:
          - linux
          - macos
          - unix
          - windows
          - ios
          - android
      source: |
        String os_type = ctx.cato_networks.event.os_type.toLowerCase();
        ctx.host = ctx.host ?: [:];
        ctx.host.os = ctx.host.os ?: [:];
        for (String os: params.os_type) {
          if (os_type.contains(os)) {
            ctx.host.os.put('type', os);
            return;
          }
        }
        if (os_type.contains('centos') || os_type.contains('ubuntu')) {
          ctx.host.os.put('type', 'linux');
        }
