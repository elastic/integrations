---
description: Pipeline for processing event logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      tag: data_collection_error
      description: error message set and no data to process.
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
  - fingerprint:
      fields:
        - json.event_id
        - json.time
      tag: fingerprint_event_id_time
      target_field: _id
      ignore_missing: true
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.type
      tag: append_info_into_event_type
      value: info
  - rename:
      field: json.account_id
      tag: rename_account_id
      target_field: cato_networks.event.account_id
      ignore_missing: true
  - rename:
      field: json.account_name
      tag: rename_account_name
      target_field: cato_networks.event.account_name
      ignore_missing: true
  - rename:
      field: json.action
      tag: rename_action
      target_field: cato_networks.event.action
      ignore_missing: true
  - set:
      field: event.action
      tag: set_event_action_from_event_action
      copy_from: cato_networks.event.action
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - rename:
      field: json.ad_name
      tag: rename_ad_name
      target_field: cato_networks.event.ad_name
      ignore_missing: true
  - append:
      field: related.user
      tag: append_event_ad_name_into_related_user
      value: '{{{cato_networks.event.ad_name}}}'
      allow_duplicates: false
      if: ctx.cato_networks?.event?.ad_name != null
  - rename:
      field: json.api_name
      tag: rename_api_name
      target_field: cato_networks.event.api_name
      ignore_missing: true
  - rename:
      field: json.api_type
      tag: rename_api_type
      target_field: cato_networks.event.api_type
      ignore_missing: true
  - rename:
      field: json.app_stack
