---
description: Pipeline for processing audit logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      tag: data_collection_error
      description: error message set and no data to process.
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags_44eed408
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: _id
      ignore_missing: true
  - json:
      field: event.original
      tag: json_event_original
      target_field: cato_networks.audit
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.type
      tag: append_info_into_event_type
      value: info
  - dot_expander:
      tag: dot_expander_cato_networks_audit
      field: '*'
      path: cato_networks.audit
  
  # Type Conflicting fields
  - rename:
      field: cato_networks.audit.change.After.adminRoles
      tag: rename_change_After_adminRoles
      target_field: cato_networks.audit.change.After.adminRolesKeyword
      if: ctx.cato_networks?.audit?.change?.After?.adminRoles instanceof String
  - rename:
      field: cato_networks.audit.change.After.allowedItems
      tag: rename_change_After_allowedItems
      target_field: cato_networks.audit.change.After.allowedItemsKeyword
      if: ctx.cato_networks?.audit?.change?.After?.allowedItems instanceof String
  - rename:
      field: cato_networks.audit.change.After.allowedUpdatableItems
