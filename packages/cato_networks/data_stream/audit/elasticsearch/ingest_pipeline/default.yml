      if: ctx.cato_networks?.audit?.change?.After?.from instanceof String && ctx.cato_networks.audit.change.After.from != ''
      target_field: cato_networks.audit.change.After.fromDate
      formats:
        - UNIX_MS
        - MMM d, yyyy h:mm:ss a
        - ISO8601
      ignore_failure: true
  - rename:
      field: cato_networks.audit.change.After.from
      tag: rename_change_After_from
      target_field: cato_networks.audit.change.After.fromKeyword
      if: ctx.cato_networks?.audit?.change?.After?.from instanceof String && ctx.cato_networks.audit.change.After.fromDate == null
  - remove:
      field: cato_networks.audit.change.After.from
      tag: remove_change_After_from
      if: ctx.cato_networks?.audit?.change?.After?.from instanceof String && (ctx.cato_networks?.audit?.change?.After?.fromDate != null  || ctx.cato_networks?.audit?.change?.After?.fromKeyword != null)
