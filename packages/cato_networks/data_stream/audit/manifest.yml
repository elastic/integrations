title: Cato Networks Audit
type: logs
streams:
  - input: cel
    title: Audit
    enabled: true
    description: Collect audit logs from Cato Networks via API.
    template_path: cel.yml.hbs
    vars:
      - name: initial_interval
        type: text
        title: Initial interval
        description: >-
          How far back to pull the logs from Cato Networks API. Supported units for this parameter are h/m. The maximum allowed value is 2160h (90 days) or 129600m. Any value exceeding this limit will automatically be capped to the maximum allowed duration.
        default: 24h
        multi: false
        required: true
        show_user: true
      - name: interval
        type: text
        title: Interval
        description: >-
          Duration between requests to the Cato Networks API. Supported units for this parameter are h/m/s. It is recommended to use interval value less than 2160h (90days) to avoid any data loss.
        default: 5m
        multi: false
        required: true
        show_user: true
      - name: account_ids
        type: text
        title: Account IDs
        description: Account IDs of Cato Networks to collect data from.
        multi: true
        required: true
        show_user: true
      - name: resource_rate_limit_limit
        type: text
        title: Resource Rate Limit
        description: Maximum request rate per second. The Cato Networks API has a limit of 5 requests per minute (~0.083 req/sec).
        default: '0.080'
        show_user: false
        multi: false
        required: true
      - name: resource_rate_limit_burst
        type: integer
        title: Resource Rate Limit Burst
        default: 1
        description: In requests. The maximum number of requests that can be immediately made following an idle period.
        show_user: false
        multi: false
        required: true
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Valid time units are ns, us, ms, s, m, h.
        multi: false
        required: true
        show_user: false
        default: 30s
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        default: false
        multi: false
        required: false
        show_user: false
        description: >-
          The request tracer logs requests and responses to the agent's local file-system for debugging configurations.
          Enabling this request tracing compromises security and should only be used for debugging. Disabling the request
          tracer will delete any stored traces.
          See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-cel.html#_resource_tracer_enable)
          for details.
      - name: tags
        type: text
        title: Tags
        description: Tags for the data-stream.
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - cato_networks-audit
      - name: preserve_original_event
        required: false
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: preserve_duplicate_custom_fields
        required: false
        show_user: false
        title: Preserve duplicate custom fields
        description: Preserve cato_networks.audit.* fields that were copied to Elastic Common Schema (ECS) fields.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
