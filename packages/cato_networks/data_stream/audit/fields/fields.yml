- name: cato_networks
  type: group
  fields:
    - name: audit
      type: group
      fields:
        - name: account_id
          type: keyword
          description: Unique identifier of the Cato Networks tenant account in which the audited change occurred.
        - name: admin
          type: keyword
          description: Display name of the administrator who performed the audited change.
        - name: admin_id
          type: keyword
          description: Unique identifier of the administrator who performed the audited change.
        - name: change
          type: group
          fields:
            - name: after
              type: group
              fields:
                - name: action
                  type: keyword
                  description: Action recorded for the entity after the change (for example, allow, block).
                - name: address
                  type: keyword
                  description: Network or physical address of the entity after the change.
                - name: admin_creation_type
                  type: keyword
                  description: Method by which the administrator account was created after the change (for example, manual, SSO-provisioned).
                - name: admin_roles
                  type: group
                  fields:
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the administrator role assignment in epoch milliseconds.
                    - name: id
                      type: keyword
                      description: Unique identifier of the administrator role assignment.
                    - name: name
                      type: keyword
                      description: Name of the administrator role assignment.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the role assignment was persisted using the new save method.
                    - name: role
                      type: group
                      fields:
                        - name: account_type
                          type: keyword
                          description: Type of account scope to which the role applies (for example, reseller, customer).
                        - name: creation_date_milliseconds
                          type: date
                          description: Creation timestamp of the role definition in epoch milliseconds.
                        - name: description
                          type: keyword
                          description: Human-readable description of the role.
                        - name: id
                          type: keyword
                          description: Unique identifier of the role definition.
                        - name: is_for_token
                          type: boolean
                          description: Indicates whether the role is intended for API token use.
                        - name: is_predefined
                          type: boolean
                          description: Indicates whether the role is a built-in (predefined) Cato role.
                        - name: is_used_on_external_access
                          type: boolean
                          description: Indicates whether the role is used for external access scenarios.
                        - name: name
                          type: keyword
                          description: Name of the role definition.
                        - name: new_save_method
                          type: boolean
                          description: Indicates whether the role definition was persisted using the new save method.
                        - name: type
                          type: keyword
                          description: Type classification of the role.
                        - name: visible
                          type: boolean
                          description: Indicates whether the role is visible in the management console.
                    - name: type
                      type: keyword
                      description: Type classification of the administrator role assignment.
                - name: admin_roles_keyword
                  type: keyword
                  description: Flattened keyword representation of the administrator roles for filtering and aggregation.
                - name: allowed_items
                  type: group
                  fields:
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the allowed item in epoch milliseconds.
                    - name: display_name
                      type: keyword
                      description: Display name of the allowed item.
                    - name: entity_type
                      type: keyword
                      description: Entity type of the allowed item (for example, site, user, group).
                    - name: id
                      type: keyword
                      description: Unique identifier of the allowed item.
                    - name: name
                      type: keyword
                      description: Name of the allowed item.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the allowed item was persisted using the new save method.
                    - name: type
                      type: keyword
                      description: Type classification of the allowed item.
                - name: allowed_items_keyword
                  type: keyword
                  description: Flattened keyword representation of the allowed items for filtering and aggregation.
                - name: allowed_updatable_items
                  type: group
                  fields:
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the allowed updatable item in epoch milliseconds.
                    - name: display_name
                      type: keyword
                      description: Display name of the allowed updatable item.
                    - name: entity_type
                      type: keyword
                      description: Entity type of the allowed updatable item.
                    - name: id
                      type: keyword
                      description: Unique identifier of the allowed updatable item.
                    - name: name
                      type: keyword
                      description: Name of the allowed updatable item.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the allowed updatable item was persisted using the new save method.
                    - name: type
                      type: keyword
                      description: Type classification of the allowed updatable item.
                - name: allowed_updatable_items_keyword
                  type: keyword
                  description: Flattened keyword representation of allowed updatable items for filtering and aggregation.
                - name: backhauling_enabled
                  type: boolean
                  description: Indicates whether internet traffic backhauling is enabled for the site after the change.
                - name: bandwidth_usage_type
                  type: keyword
                  description: Bandwidth usage type configured for the site (for example, dedicated, regional, pooled).
                - name: city_raw
                  type: keyword
                  description: Raw city name configured for the site or entity.
                - name: country_raw
                  type: keyword
                  description: Raw country name configured for the site or entity.
                - name: description
                  type: keyword
                  description: Free-form description of the entity after the change.
                - name: dest_type
                  type: group
                  fields:
                    - name: dest_type
                      type: keyword
                      description: Destination type identifier for the link (for example, internet, IPSec).
                    - name: name
                      type: keyword
                      description: Display name of the destination type.
                    - name: value
                      type: keyword
                      description: Underlying value of the destination type enumeration.
                - name: dest_type_keyword
                  type: keyword
                  description: Flattened keyword representation of the destination type for filtering and aggregation.
                - name: disable_acl_for_sip
                  type: boolean
                  description: Indicates whether ACL enforcement is turned off for SIP traffic.
                - name: downstream_bandwidth
                  type: double
                  description: Configured downstream bandwidth for the link in Mbps.
                - name: downstream_bandwidth_mbps_precision
                  type: double
                  description: High-precision downstream bandwidth value in Mbps.
                - name: enabled
                  type: keyword
                  description: Indicates whether the entity is enabled after the change.
                - name: exceeded_thresholds_duration_enabled
                  type: boolean
                  description: Indicates whether duration tracking for exceeded thresholds is enabled.
                - name: expire_in_days_alert
                  type: double
                  description: Number of days before expiration at which an alert is generated.
                - name: force_selected_locations
                  type: boolean
                  description: Indicates whether traffic is forced through the selected PoP locations.
                - name: from
                  type: group
                  fields:
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the source entity in epoch milliseconds.
                    - name: display_name
                      type: keyword
                      description: Display name of the source entity.
                    - name: entity_type
                      type: keyword
                      description: Entity type of the source.
                    - name: id
                      type: keyword
                      description: Unique identifier of the source entity.
                    - name: name
                      type: keyword
                      description: Name of the source entity.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the source entity was persisted using the new save method.
                    - name: type
                      type: keyword
                      description: Type classification of the source entity.
                - name: from_date
                  type: date
                  description: Start date of the validity range for the configuration.
                - name: from_keyword
                  type: keyword
                  description: Flattened keyword representation of the source entity for filtering and aggregation.
                - name: interface_id
                  type: keyword
                  description: Unique identifier of the network interface affected by the change.
                - name: is_mac_auth_override
                  type: boolean
                  description: Indicates whether MAC-based authentication override is configured.
                - name: is_nat_policy_enabled
                  type: boolean
                  description: Indicates whether the NAT policy is enabled for the entity.
                - name: is_primary
                  type: boolean
                  description: Indicates whether this entity is configured as the primary instance.
                - name: keep_alive_enabled
                  type: boolean
                  description: Indicates whether keep-alive is enabled for the connection.
                - name: l7_lan_fw_enforcement
                  type: boolean
                  description: Indicates whether Layer 7 LAN firewall enforcement is enabled.
                - name: lan_firewall_rules_enabled
                  type: boolean
                  description: Indicates whether LAN firewall rules are enabled for the site.
                - name: latitude
                  type: double
                  description: Geographic latitude configured for the site.
                - name: longitude
                  type: double
                  description: Geographic longitude configured for the site.
                - name: max_bandwidth
                  type: double
                  description: Maximum bandwidth allowed for the site or link in Mbps.
                - name: model
                  type: group
                  fields:
                    - name: automatically_managed
                      type: boolean
                      description: Indicates whether the model configuration is automatically managed by Cato.
                    - name: links
                      type: keyword
                      description: Link types supported by the device model.
                    - name: name
                      type: keyword
                      description: Name of the device model.
                    - name: possible_platform
                      type: keyword
                      description: Hardware platforms compatible with the device model.
                    - name: value
                      type: keyword
                      description: Underlying value of the device model enumeration.
                - name: multi_tunnel_mode
                  type: keyword
                  description: Multi-tunnel mode configured for the site connection.
                - name: name
                  type: keyword
                  description: Name of the entity after the change.
                - name: natural_order
                  type: double
                  description: Numeric ordering value used to sort the entity within its collection.
                - name: off_cloud_transport_enabled
                  type: boolean
                  description: Indicates whether off-cloud transport is enabled for the link.
                - name: override_primary_settings
                  type: boolean
                  description: Indicates whether the secondary configuration overrides primary socket settings.
                - name: permissions
                  type: group
                  fields:
                    - name: actions
                      type: keyword
                      description: Allowed actions granted by the permission (for example, read, write).
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the permission in epoch milliseconds.
                    - name: id
                      type: keyword
                      description: Unique identifier of the permission.
                    - name: name
                      type: keyword
                      description: Name of the permission.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the permission was persisted using the new save method.
                    - name: resource
                      type: keyword
                      description: Resource to which the permission applies.
                    - name: type
                      type: keyword
                      description: Type classification of the permission.
                - name: permissions_keyword
                  type: keyword
                  description: Flattened keyword representation of permissions for filtering and aggregation.
                - name: physical_port
                  type: double
                  description: Physical port number on the Cato Socket associated with the link.
                - name: prefer_higher_natural_order
                  type: boolean
                  description: Indicates whether links with higher natural order are preferred.
                - name: prefer_primary_wan
                  type: boolean
                  description: Indicates whether the primary WAN link is preferred over the secondary.
                - name: primary_bw_downstream
                  type: double
                  description: Downstream bandwidth configured on the primary link in Mbps.
                - name: primary_bw_downstream_mbps_precision
                  type: double
                  description: High-precision downstream bandwidth on the primary link in Mbps.
                - name: primary_bw_upstream
                  type: double
                  description: Upstream bandwidth configured on the primary link in Mbps.
                - name: primary_bw_upstream_mbps_precision
                  type: double
                  description: High-precision upstream bandwidth on the primary link in Mbps.
                - name: publish
                  type: boolean
                  description: Indicates whether the configuration has been published to production.
                - name: pw
                  type: keyword
                  description: Pre-shared key or password value associated with the configuration (typically masked).
                - name: pwk
                  type: double
                  description: Numeric password-key version or rotation counter.
                - name: region
                  type: keyword
                  description: Cato region in which the site or entity is provisioned.
                - name: regional_bandwidth
                  type: double
                  description: Bandwidth allocated for the regional bandwidth pool in Mbps.
                - name: role
                  type: group
                  fields:
                    - name: account_type
                      type: keyword
                      description: Type of account scope to which the role applies.
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the role in epoch milliseconds.
                    - name: description
                      type: keyword
                      description: Human-readable description of the role.
                    - name: id
                      type: keyword
                      description: Unique identifier of the role.
                    - name: is_for_token
                      type: boolean
                      description: Indicates whether the role is intended for API token use.
                    - name: is_predefined
                      type: boolean
                      description: Indicates whether the role is a built-in (predefined) Cato role.
                    - name: is_used_on_external_access
                      type: boolean
                      description: Indicates whether the role is used for external access scenarios.
                    - name: name
                      type: keyword
                      description: Name of the role.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the role was persisted using the new save method.
                    - name: type
                      type: keyword
                      description: Type classification of the role.
                    - name: visible
                      type: boolean
                      description: Indicates whether the role is visible in the management console.
                - name: role_keyword
                  type: keyword
                  description: Flattened keyword representation of the role for filtering and aggregation.
                - name: rule_type
                  type: keyword
                  description: Type of policy rule to which the change applies.
                - name: rules_migration_state
                  type: keyword
                  description: Migration state of the policy rule set.
                - name: s2s_enabled
                  type: boolean
                  description: Indicates whether site-to-site connectivity is enabled on the link.
                - name: sec_pwk
                  type: double
                  description: Numeric secondary password-key version or rotation counter.
                - name: secondary_bw_downstream
                  type: double
                  description: Downstream bandwidth configured on the secondary link in Mbps.
                - name: secondary_bw_downstream_mbps_precision
                  type: double
                  description: High-precision downstream bandwidth on the secondary link in Mbps.
                - name: secondary_bw_upstream
                  type: double
                  description: Upstream bandwidth configured on the secondary link in Mbps.
                - name: secondary_bw_upstream_mbps_precision
                  type: double
                  description: High-precision upstream bandwidth on the secondary link in Mbps.
                - name: shipping_status
                  type: keyword
                  description: Shipping status of the Cato Socket associated with the site.
                - name: single_wan_qos_policy
                  type: boolean
                  description: Indicates whether a single WAN QoS policy is applied across links.
                - name: site_bandwidth_type
                  type: keyword
                  description: Bandwidth allocation type configured for the site.
                - name: site_conn_type
                  type: group
                  fields:
                    - name: connection_type_families
                      type: keyword
                      description: Families of connection types supported by the site connection.
                    - name: name
                      type: keyword
                      description: Name of the site connection type.
                    - name: proto_type
                      type: keyword
                      description: Protocol type used by the site connection.
                    - name: require_password
                      type: boolean
                      description: Indicates whether the site connection requires a password.
                    - name: require_primary_bandwidth
                      type: boolean
                      description: Indicates whether a primary bandwidth value is required.
                    - name: socket_model_type_configuration
                      type: group
                      fields:
                        - name: automatically_managed
                          type: boolean
                          description: Indicates whether the socket model configuration is automatically managed by Cato.
                        - name: links
                          type: keyword
                          description: Link types supported by the socket model.
                        - name: name
                          type: keyword
                          description: Name of the socket model.
                        - name: possible_platform
                          type: keyword
                          description: Hardware platforms compatible with the socket model.
                        - name: value
                          type: keyword
                          description: Underlying value of the socket model enumeration.
                    - name: support_bgp
                      type: boolean
                      description: Indicates whether the connection type supports BGP.
                    - name: support_keep_alive
                      type: boolean
                      description: Indicates whether the connection type supports keep-alive.
                    - name: support_multi_tunnel_mode
                      type: boolean
                      description: Indicates whether the connection type supports multi-tunnel mode.
                    - name: support_site_recovery
                      type: boolean
                      description: Indicates whether the connection type supports site recovery.
                    - name: value
                      type: keyword
                      description: Underlying value of the connection type enumeration.
                - name: site_id
                  type: keyword
                  description: Unique identifier of the site affected by the change.
                - name: site_life_cycle_status
                  type: keyword
                  description: Lifecycle status of the site (for example, active, deleted, pending).
                - name: site_profile
                  type: group
                  fields:
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the site profile in epoch milliseconds.
                    - name: name
                      type: keyword
                      description: Name of the site profile.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the site profile was persisted using the new save method.
                    - name: profile
                      type: keyword
                      description: Profile identifier applied to the site.
                    - name: type
                      type: keyword
                      description: Type classification of the site profile.
                - name: site_type
                  type: keyword
                  description: Type of site (for example, branch, datacenter, cloud).
                - name: site_usage
                  type: group
                  fields:
                    - name: bandwidth_usage_type
                      type: keyword
                      description: Bandwidth usage type configured for the site usage record.
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the site usage record in epoch milliseconds.
                    - name: id
                      type: keyword
                      description: Unique identifier of the site usage record.
                    - name: max_bandwidth
                      type: double
                      description: Maximum bandwidth allowed by the site usage record in Mbps.
                    - name: name
                      type: keyword
                      description: Name of the site usage record.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the site usage record was persisted using the new save method.
                    - name: region
                      type: keyword
                      description: Region associated with the site usage record.
                    - name: regional_bandwidth
                      type: double
                      description: Regional bandwidth allocation associated with the site usage record in Mbps.
                    - name: site_bandwidth_type
                      type: keyword
                      description: Site bandwidth type associated with the usage record.
                    - name: site_id
                      type: keyword
                      description: Unique identifier of the site associated with the usage record.
                    - name: site_life_cycle_status
                      type: keyword
                      description: Lifecycle status of the site associated with the usage record.
                    - name: start_date
                      type: date
                      description: Start date from which the site usage record is effective.
                    - name: type
                      type: keyword
                      description: Type classification of the site usage record.
                - name: site_usage_keyword
                  type: keyword
                  description: Flattened keyword representation of the site usage record for filtering and aggregation.
                - name: socket_connection_configuration
                  type: group
                  fields:
                    - name: creation_date
                      type: date
                      description: Creation timestamp of the socket connection configuration.
                    - name: creation_date_milliseconds
                      type: date
                      description: Creation timestamp of the socket connection configuration in epoch milliseconds.
                    - name: id
                      type: keyword
                      description: Unique identifier of the socket connection configuration.
                    - name: is_mac_auth_override
                      type: boolean
                      description: Indicates whether MAC-based authentication override is configured for the socket.
                    - name: last_modified
                      type: date
                      description: Last modification timestamp of the socket connection configuration.
                    - name: mac_address_authentication_enabled_on_account
                      type: boolean
                      description: Indicates whether MAC address authentication is enabled at the account level.
                    - name: name
                      type: keyword
                      description: Name of the socket connection configuration.
                    - name: new_save_method
                      type: boolean
                      description: Indicates whether the socket connection configuration was persisted using the new save method.
                    - name: off_cloud_transport_enabled
                      type: boolean
                      description: Indicates whether off-cloud transport is enabled for the socket.
                    - name: prefer_higher_natural_order
                      type: boolean
                      description: Indicates whether links with higher natural order are preferred for the socket.
                    - name: proto_id
                      type: keyword
                      description: Protocol identifier configured on the socket.
                    - name: rules_migration_state
                      type: keyword
                      description: Migration state of the rule set associated with the socket configuration.
                    - name: socket_interfaces
                      type: group
                      fields:
                        - name: creation_date
                          type: date
                          description: Creation timestamp of the socket interface.
                        - name: creation_date_milliseconds
                          type: date
                          description: Creation timestamp of the socket interface in epoch milliseconds.
                        - name: dest_type
                          type: group
                          fields:
                            - name: dest_type
                              type: keyword
                              description: Destination type identifier for the socket interface.
                            - name: name
                              type: keyword
                              description: Display name of the destination type.
                            - name: value
                              type: keyword
                              description: Underlying value of the destination type enumeration.
                        - name: downstream_bandwidth
                          type: double
                          description: Configured downstream bandwidth on the socket interface in Mbps.
                        - name: downstream_bandwidth_mbps_precision
                          type: double
                          description: High-precision downstream bandwidth on the socket interface in Mbps.
                        - name: id
                          type: keyword
                          description: Unique identifier of the socket interface.
                        - name: interface_id
                          type: keyword
                          description: Interface identifier on the socket.
                        - name: last_modified
                          type: date
                          description: Last modification timestamp of the socket interface.
                        - name: metadata
                          type: group
                          fields:
                            - name: disabled_dest_type
                              type: boolean
                              description: Indicates whether the destination type is turned off for the interface.
                            - name: link_order
                              type: double
                              description: Numeric ordering value of the link within its socket.
                            - name: physical_name
                              type: group
                              fields:
                                - name: caption
                                  type: keyword
                                  description: Display caption for the physical port name.
                                - name: name
                                  type: keyword
                                  description: Physical port name on the socket.
                            - name: physical_position
                              type: keyword
                              description: Physical position of the port on the socket chassis.
                            - name: speed
                              type: keyword
                              description: Maximum negotiated speed of the physical port.
                            - name: supported_destinations
                              type: group
                              fields:
                                - name: dest_type
                                  type: keyword
                                  description: Supported destination type identifier.
                                - name: name
                                  type: keyword
                                  description: Display name of the supported destination type.
                                - name: value
                                  type: keyword
                                  description: Underlying value of the supported destination type enumeration.
                            - name: type
                              type: keyword
                              description: Type classification of the interface metadata.
                        - name: name
                          type: keyword
                          description: Name of the socket interface.
                        - name: natural_order
                          type: double
                          description: Numeric ordering value used to sort the socket interface.
                        - name: new_save_method
                          type: boolean
                          description: Indicates whether the socket interface was persisted using the new save method.
                        - name: off_cloud_transport_enabled
                          type: boolean
                          description: Indicates whether off-cloud transport is enabled on the socket interface.
                        - name: physical_port
                          type: double
                          description: Physical port number associated with the socket interface.
                        - name: proto_id
                          type: keyword
                          description: Protocol identifier configured on the socket interface.
                        - name: role
                          type: keyword
                          description: Role assigned to the socket interface (for example, primary, secondary, LAN).
                        - name: s2s_enabled
                          type: boolean
                          description: Indicates whether site-to-site connectivity is enabled on the socket interface.
                        - name: type
                          type: keyword
                          description: Type classification of the socket interface.
                        - name: upstream_bandwidth
                          type: double
                          description: Configured upstream bandwidth on the socket interface in Mbps.
                        - name: upstream_bandwidth_mbps_precision
                          type: double
                          description: High-precision upstream bandwidth on the socket interface in Mbps.
                    - name: sockets_settings
                      type: group
                      fields:
                        - name: primary
                          type: group
                          fields:
                            - name: id
                              type: keyword
                              description: Unique identifier of the primary socket settings entry.
                            - name: is_primary
                              type: boolean
                              description: Indicates whether this socket is configured as the primary socket.
                            - name: links
                              type: group
                              fields:
                                - name: creation_date
                                  type: date
                                  description: Creation timestamp of the primary socket link.
                                - name: creation_date_milliseconds
                                  type: date
                                  description: Creation timestamp of the primary socket link in epoch milliseconds.
                                - name: dest_type
                                  type: group
                                  fields:
                                    - name: dest_type
                                      type: keyword
                                      description: Destination type identifier for the primary socket link.
                                    - name: name
                                      type: keyword
                                      description: Display name of the destination type.
                                    - name: value
                                      type: keyword
                                      description: Underlying value of the destination type enumeration.
                                - name: downstream_bandwidth
                                  type: double
                                  description: Downstream bandwidth on the primary socket link in Mbps.
                                - name: downstream_bandwidth_mbps_precision
                                  type: double
                                  description: High-precision downstream bandwidth on the primary socket link in Mbps.
                                - name: id
                                  type: keyword
                                  description: Unique identifier of the primary socket link.
                                - name: interface_id
                                  type: keyword
                                  description: Interface identifier on the primary socket.
                                - name: last_modified
                                  type: date
                                  description: Last modification timestamp of the primary socket link.
                                - name: metadata
                                  type: group
                                  fields:
                                    - name: disabled_dest_type
                                      type: boolean
                                      description: Indicates whether the destination type is turned off on the primary socket link.
                                    - name: link_order
                                      type: double
                                      description: Numeric ordering value of the primary socket link.
                                    - name: physical_name
                                      type: group
                                      fields:
                                        - name: caption
                                          type: keyword
                                          description: Display caption for the physical port name.
                                        - name: name
                                          type: keyword
                                          description: Physical port name on the primary socket.
                                    - name: physical_position
                                      type: keyword
                                      description: Physical position of the port on the primary socket chassis.
                                    - name: speed
                                      type: keyword
                                      description: Maximum negotiated speed of the physical port.
                                    - name: supported_destinations
                                      type: group
                                      fields:
                                        - name: dest_type
                                          type: keyword
                                          description: Supported destination type identifier.
                                        - name: name
                                          type: keyword
                                          description: Display name of the supported destination type.
                                        - name: value
                                          type: keyword
                                          description: Underlying value of the supported destination type enumeration.
                                    - name: type
                                      type: keyword
                                      description: Type classification of the primary socket link metadata.
                                - name: name
                                  type: keyword
                                  description: Name of the primary socket link.
                                - name: natural_order
                                  type: double
                                  description: Numeric ordering value used to sort the primary socket link.
                                - name: new_save_method
                                  type: boolean
                                  description: Indicates whether the primary socket link was persisted using the new save method.
                                - name: off_cloud_transport_enabled
                                  type: boolean
                                  description: Indicates whether off-cloud transport is enabled on the primary socket link.
                                - name: physical_port
                                  type: double
                                  description: Physical port number on the primary socket link.
                                - name: proto_id
                                  type: keyword
                                  description: Protocol identifier configured on the primary socket link.
                                - name: role
                                  type: keyword
                                  description: Role assigned to the primary socket link.
