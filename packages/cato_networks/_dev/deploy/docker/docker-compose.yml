version: '3.0'
services:
  cato_networks:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: cato_networks
    ports:
      - 8080
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8080'
    command:
      - http-server
      - --addr=:8080
      - --config=/files/config.yml
