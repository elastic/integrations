format_version: 3.3.2
name: macos
title: macOS Security Events
version: 1.0.0
description: Collect logs from macOS with Elastic Agent.
type: integration
categories:
  - security
conditions:
  kibana:
    version: ^8.18.0 || ^9.0.0
  elastic:
    subscription: basic
icons:
  - src: /img/macos-logo.svg
    title: macOS Security Events logo
    size: 32x32
    type: image/svg+xml
screenshots:
  - src: /img/macos-unified-logs-overview-dashboard.png
    title: macOS Security Events Unified Logs Overview Dashboard
    size: 600x600
    type: image/png
  - src: /img/macos-unified-logs-network-dashboard.png
    title: macOS Security Events Unified Logs Network Dashboard
    size: 600x600
    type: image/png
policy_templates:
  - name: macos
    title: macOS Security Events
    description: Collect logs from macOS Security Events.
    inputs:
      - type: unifiedlogs
        title: Collect unified logs from macOS Security Events
        description: Collecting unified logs from macOS Security Events.
owner:
  github: elastic/sec-windows-platform
  type: elastic
