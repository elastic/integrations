format_version: 3.5.0
name: kubernetes_otel
title: "Kubernetes OpenTelemetry Assets"
version: 2.3.0
description: "Utilise the pre-built dashboard for OTel-native metrics and events collected from a Kubernetes cluster"
type: content
categories:
  - kubernetes
  # Observability is a parent category for kubernetes
  - observability
  - opentelemetry
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: "basic"
discovery:
  fields: []
  datasets:
    - name: kubeletstatsreceiver.otel
    - name: k8sobjectsreceiver.otel
    - name: k8seventsreceiver.otel
    - name: k8sclusterreceiver.otel
screenshots:
  - src: /img/kubernetes_overview.png
    title: Kubernetes Overview Dashboard
    size: 1720x2360
    type: image/png
  - src: /img/kubernetes_clusters.png
    title: Kubernetes Clusters Dashboard
    size: 1158x809
    type: image/png
  - src: /img/kubernetes_cluster_details.png
    title: Kubernetes Cluster Details Dashboard
    size: 1836x2358
    type: image/png
  - src: /img/kubernetes_nodes.png
    title: Kubernetes Nodes Dashboard
    size: 4334x2272
    type: image/png
  - src: /img/kubernetes_node_details.png
    title: Kubernetes Node Details Dashboard
    size: 3314x2320
    type: image/png
  - src: /img/kubernetes_namespaces.png
    title: Kubernetes Namespaces Dashboard
    size: 4342x2290
    type: image/png
  - src: /img/kubernetes_namespace_details.png
    title: Kubernetes Namespace Details Dashboard
    size: 2304x2328
    type: image/png
  - src: /img/kubernetes_pods.png
    title: Kubernetes Pods Dashboard
    size: 3586x2288
    type: image/png
  - src: /img/kubernetes_pod_details.png
    title: Kubernetes Pod Details Dashboard
    size: 2874x2296
    type: image/png
icons:
  - src: /img/kubernetes-otel-logo.svg
    title: Sample logo
    type: image/svg+xml
owner:
  github: elastic/obs-infraobs-integrations
  type: elastic
