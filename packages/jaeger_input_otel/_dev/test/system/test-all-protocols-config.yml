service: jaeger_trace_sender
service_notify_signal: SIGHUP
vars:
  grpc_enabled: true
  grpc_endpoint: "0.0.0.0:14250"
  # enable all variants to verify all are working
  thrift_http_enabled: true
  thrift_http_endpoint: "0.0.0.0:14268"
  thrift_compact_enabled: true
  thrift_compact_endpoint: "0.0.0.0:6831"
  thrift_binary_enabled: true
  thrift_binary_endpoint: "0.0.0.0:6832"
assert:
  min_count: 10
