vars: ~
data_stream:
  vars:
    singleInput: true
    data_stream.dataset: kubernetes.container_logs
    containerParserStream: all
    containerParserFormat: auto
    useFingerprint: true
    pathsSingleInput: 
      - /var/log/containers/*.log
    indexerYaml:
      - container
    matcherYaml:
      - fields:
          lookup_fields: ['container.id']

