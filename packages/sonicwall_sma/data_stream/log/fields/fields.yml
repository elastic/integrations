- name: sonicwall_sma
  type: group
  fields:
    - name: log
      type: group
      fields:
        - name: application_name
          type: keyword
          description: |
            Application name reported by the SonicWall SMA audit event.
        - name: context_id
          type: keyword
          description: |
            SonicWall SMA context identifier used to correlate related log entries.
        - name: assigned_domain
          type: keyword
          description: |
            Domain or realm assigned to the authenticated user.
        - name: category
          type: keyword
          description: |
            SonicWall SMA event family.
        - name: component
          type: keyword
          description: |
            SonicWall SMA component code from the log header.
        - name: component_name
          type: keyword
          description: |
            Human-readable SonicWall SMA application name derived from the component code.
        - name: crypto
          type: keyword
          description: |
            Tunnel cryptographic algorithm reported by the client tunnel.
        - name: equipment_id
          type: keyword
          description: |
            Equipment identifier reported by the SonicWall SMA appliance.
        - name: message_type
          type: keyword
          description: |
            Kernel message type reported in incomplete-message events.
        - name: platform_prefix
          type: keyword
          description: |
            Platform prefix reported by the SonicWall SMA appliance.
        - name: realm
          type: keyword
          description: |
            Realm referenced by the SonicWall SMA authentication message.
        - name: thread_id
          type: keyword
          description: |
            SonicWall SMA thread or worker identifier from the log header.
        - name: user_identity
          type: keyword
          description: |
            Raw SonicWall SMA user identity string before ECS normalization.
        - name: zone
          type: keyword
          description: |
            Zone classification assigned by the SonicWall SMA EPC process.
        - name: api
          type: group
          fields:
            - name: session_id
              type: keyword
              description: |
                API correlation identifier reported in verbose EPC log entries.
        - name: auth
          type: group
          fields:
            - name: cert_status
              type: long
              description: |
                Certificate verification status reported by SonicWall SMA.
            - name: mechanism
              type: keyword
              description: |
                Authentication mechanism extracted from the SonicWall SMA message.
        - name: epc
          type: group
          fields:
            - name: details
              type: keyword
              description: |
                EPC evaluation details reported by SonicWall SMA.
            - name: id
              type: keyword
              description: |
                EPC evaluation identifier.
            - name: result
              type: keyword
              description: |
                EPC evaluation result.
            - name: type
              type: keyword
              description: |
                EPC evaluation type.
        - name: client
          type: group
          fields:
            - name: os_version
              type: keyword
              description: |
                Reported client operating system version.
            - name: version
              type: keyword
              description: |
                Reported SonicWall SMA client version.
        - name: http
          type: group
          fields:
            - name: version_hex
              type: keyword
              description: |
                SonicWall SMA hexadecimal HTTP version identifier.
        - name: probe
          type: group
          fields:
            - name: retries
              type: long
              description: |
                Probe retry count reported by the SonicWall SMA kernel.
            - name: rto_ms
              type: long
              description: |
                Probe retransmission timeout in milliseconds.
            - name: state
              type: keyword
              description: |
                Probe status or transition state.
            - name: type
              type: keyword
              description: |
                Probe transport type.
        - name: session
          type: group
          fields:
            - name: id
              type: keyword
              description: |
                SonicWall SMA tunnel probe session identifier.
        - name: session_key
          type: keyword
          description: |
            SonicWall SMA session key.
        - name: ssl
          type: group
          fields:
            - name: version
              type: keyword
              description: |
                SonicWall SMA SSL version reported by the tunnel kernel message.
        - name: tunnel
          type: group
          fields:
            - name: old_id
              type: keyword
              description: |
                Previous tunnel identifier reported during tunnel resumption.
            - name: version
              type: keyword
              description: |
                Tunnel protocol version reported by SonicWall SMA.
            - name: mtu
              type: group
              fields:
                - name: base
                  type: long
                  description: |
                    Base MTU reported by the SonicWall SMA tunnel.
                - name: current
                  type: long
                  description: |
                    Current MTU reported by the SonicWall SMA tunnel.