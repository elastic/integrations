name: sonicwall_sma
title: SonicWall Secure Mobile Access
version: "0.1.1"
description: Collect logs from SonicWall Secure Mobile Access with Elastic Agent.
type: integration
icons:
  - src: /img/logo.svg
    title: SonicWall logo
    size: 32x32
    type: image/svg+xml
format_version: "3.0.3"
categories: [security]
conditions:
  kibana:
    version: "^8.13.0 || ^9.0.0"
policy_templates:
  - name: sonicwall_sma
    title: SonicWall Secure Mobile Access logs
    description: Collect logs from SonicWall Secure Mobile Access instances
    inputs:
      - type: udp
        title: "Collect SonicWall Secure Mobile Access logs (input: udp)"
        description: "Collecting logs from SonicWall Secure Mobile Access instances (input: udp)"
      - type: tcp
        title: "Collect SonicWall Secure Mobile Access logs (input: tcp)"
        description: "Collecting logs from SonicWall Secure Mobile Access instances (input: tcp)"
owner:
  github: elastic/integration-experience
  type: community
