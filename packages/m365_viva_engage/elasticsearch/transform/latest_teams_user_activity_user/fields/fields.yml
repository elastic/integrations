- name: o365.reports
  type: group
  fields:
    # Metadata fields
    - name: metadata
      type: group
      fields:
        - name: name
          type: keyword
        - name: api_path
          type: keyword
    # Microsoft Teams User Activity User Detail
    - name: teams.user_activity.user
      type: group
      fields:
        - name: Report_Refresh_Date
          type: date
        - name: User_Id
          type: keyword
        - name: User_Principal_Name
          type: keyword
        - name: Last_Activity_Date
          type: date
        - name: Is_Deleted
          type: boolean
        - name: Deleted_Date
          type: date
        - name: Assigned_Products
          type: keyword
        - name: Team_Chat_Message_Count
          type: long
        - name: Private_Chat_Message_Count
          type: long
        - name: Call_Count
          type: long
        - name: Meeting_Count
          type: long
        - name: Meetings_Organized_Count
          type: long
        - name: Meetings_Attended_Count
          type: long
        - name: Ad_Hoc_Meetings_Organized_Count
          type: long
        - name: Ad_Hoc_Meetings_Attended_Count
          type: long
        - name: Scheduled_One_time_Meetings_Organized_Count
          type: long
        - name: Scheduled_One_time_Meetings_Attended_Count
          type: long
        - name: Scheduled_Recurring_Meetings_Organized_Count
          type: long
        - name: Scheduled_Recurring_Meetings_Attended_Count
          type: long
        - name: Audio_Duration
          type: keyword
        - name: Video_Duration
          type: keyword
        - name: Screen_Share_Duration
          type: keyword
        - name: Audio_Duration_In_Seconds
          type: long
        - name: Video_Duration_In_Seconds
          type: long
        - name: Screen_Share_Duration_In_Seconds
          type: long
        - name: Has_Other_Action
          type: keyword
        - name: Urgent_Messages
          type: long
        - name: Post_Messages
          type: long
        - name: Tenant_Display_Name
          type: keyword
        - name: Shared_Channel_Tenant_Display_Names
          type: keyword
        - name: Reply_Messages
          type: long
        - name: Is_Licensed
          type: boolean
        - name: Report_Period
          type: keyword
