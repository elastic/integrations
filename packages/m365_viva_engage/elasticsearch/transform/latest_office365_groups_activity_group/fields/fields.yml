- name: o365.reports
  type: group
  fields:
    # Metadata fields
    - name: metadata
      type: group
      fields:
        - name: name
          type: keyword
        - name: api_path
          type: keyword
    # Office365 Groups Activity Group Detail
    - name: office365.groups_activity.group
      type: group
      fields:
        - name: Report_Refresh_Date
          type: date
        - name: Last_Activity_Date
          type: date
        - name: Group_Display_Name
          type: keyword
        - name: Group_Id
          type: keyword
        - name: Group_Type
          type: keyword
        - name: Owner_Principal_Name
          type: keyword
        - name: Is_Deleted
          type: boolean
        - name: Member_Count
          type: long
        - name: External_Member_Count
          type: long
        - name: Exchange_Received_Email_Count
          type: long
        - name: Exchange_Mailbox_Total_Item_Count
          type: long
        - name: Exchange_Mailbox_Storage_Used_Byte
          type: long
        - name: SharePoint_Active_File_Count
          type: long
        - name: SharePoint_Total_File_Count
          type: long
        - name: SharePoint_Site_Storage_Used_Byte
          type: long
        - name: Yammer_Liked_Message_Count
          type: long
        - name: Yammer_Posted_Message_Count
          type: long
        - name: Yammer_Read_Message_Count
          type: long
        - name: Report_Period
          type: keyword
