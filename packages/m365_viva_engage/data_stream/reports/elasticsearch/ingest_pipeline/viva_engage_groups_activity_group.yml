      target_field: _id
  - set:
      field: group.name
      tag: set_group_name
      copy_from: o365.reports.viva_engage.groups_activity.group.Group_Display_Name
      if: ctx.o365?.reports?.viva_engage?.groups_activity?.group?.Group_Display_Name != null
      ignore_empty_value: true
  - set:
      field: user.group.name
      tag: set_user_group_name
