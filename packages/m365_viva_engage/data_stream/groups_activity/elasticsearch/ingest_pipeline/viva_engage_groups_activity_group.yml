---
description: Pipeline for processing Microsoft Viva Engage Groups Activity by Group Detail
processors:
  - rename:
      field: json
      target_field: m365_viva_engage.groups_activity.group_detail
      ignore_missing: true
  - fingerprint:
      fields:
        - m365_viva_engage.groups_activity.group_detail.Report_Refresh_Date
        - m365_viva_engage.groups_activity.group_detail.Group_Display_Name
        - m365_viva_engage.groups_activity.group_detail.Last_Activity_Date
      target_field: _id
  - set:
      field: group.name
      tag: set_group_name
      copy_from: m365_viva_engage.groups_activity.group_detail.Group_Display_Name
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Group_Display_Name != null
      ignore_empty_value: true
  - set:
      field: user.group_detail.name
      tag: set_user_group_name
      copy_from: group.name
      ignore_empty_value: true
  - date:
      field: m365_viva_engage.groups_activity.group_detail.Report_Refresh_Date
      target_field: m365_viva_engage.groups_activity.group_detail.Report_Refresh_Date
      tag: date_m365_viva_engage_groups_activity_group_Report_Refresh_Date
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Report_Refresh_Date != null && ctx.m365_viva_engage.groups_activity.group_detail.Report_Refresh_Date != ''
      timezone: UTC
      formats:
        - yyyy-MM-dd
      on_failure:
        - remove:
            field: m365_viva_engage.groups_activity.group_detail.Report_Refresh_Date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_timestamp_from_Report_Refresh_Date
      copy_from: m365_viva_engage.groups_activity.group_detail.Report_Refresh_Date
      ignore_empty_value: true
  - date:
      field: m365_viva_engage.groups_activity.group_detail.Last_Activity_Date
      target_field: m365_viva_engage.groups_activity.group_detail.Last_Activity_Date
      tag: date_m365_viva_engage_groups_activity_group_Last_Activity_Date
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Last_Activity_Date != null && ctx.m365_viva_engage.groups_activity.group_detail.Last_Activity_Date != ''
      timezone: UTC
      formats:
        - yyyy-MM-dd
      on_failure:
        - remove:
            field: m365_viva_engage.groups_activity.group_detail.Last_Activity_Date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - lowercase:
      field: m365_viva_engage.groups_activity.group_detail.Is_Deleted
      tag: lowercase_m365_viva_engage_groups_activity_group_Is_Deleted
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Is_Deleted != null && ctx.m365_viva_engage.groups_activity.group_detail.Is_Deleted != ''
  - convert:
      field: m365_viva_engage.groups_activity.group_detail.Is_Deleted
      tag: convert_m365_viva_engage_groups_activity_group_Is_Deleted
      target_field: m365_viva_engage.groups_activity.group_detail.Is_Deleted
      type: boolean
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Is_Deleted != null && ctx.m365_viva_engage.groups_activity.group_detail.Is_Deleted != ''
      on_failure:
        - remove:
