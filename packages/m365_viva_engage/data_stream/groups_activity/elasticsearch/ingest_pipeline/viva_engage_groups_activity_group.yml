            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: m365_viva_engage.groups_activity.group_detail.Read_Count
      tag: convert_m365_viva_engage_groups_activity_group_Read_Count
      target_field: m365_viva_engage.groups_activity.group_detail.Read_Count
      type: long
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Read_Count != null && ctx.m365_viva_engage.groups_activity.group_detail.Read_Count != ''
