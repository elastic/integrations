      tag: set_m365_viva_engage_groups_activity_group_Office_365_Connected_true
      value: 'true'
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Office_365_Connected != null && ctx.m365_viva_engage.groups_activity.group_detail.Office_365_Connected.toLowerCase() == 'yes'
      ignore_empty_value: true
  - set:
      field: m365_viva_engage.groups_activity.group_detail.Office_365_Connected
      tag: set_m365_viva_engage_groups_activity_group_Office_365_Connected_false
      value: 'false'
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Office_365_Connected != null && ctx.m365_viva_engage.groups_activity.group_detail.Office_365_Connected.toLowerCase() == 'no'
      ignore_empty_value: true
  - convert:
      field: m365_viva_engage.groups_activity.group_detail.Office_365_Connected
      tag: convert_m365_viva_engage_groups_activity_group_Office_365_Connected
      target_field: m365_viva_engage.groups_activity.group_detail.Office_365_Connected
      type: boolean
      if: ctx.m365_viva_engage?.groups_activity?.viva_engage?.groups_activity?.group_detail?.Office_365_Connected != null && ctx.m365_viva_engage.groups_activity.group_detail.Office_365_Connected != ''
      on_failure:
        - remove:
