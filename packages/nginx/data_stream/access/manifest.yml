title: Nginx access logs
type: logs
streams:
  - package: log
    title: Nginx access logs
    description: Collect Nginx access logs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/nginx/access.log*
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - nginx-access
      - name: data_stream.dataset
        show_user: false
        default: nginx.access
      - name: exclude_files
        show_user: false
        default:
          - ".gz$"
      - name: processors
        show_user: false
        default: |
          - add_locale: ~
