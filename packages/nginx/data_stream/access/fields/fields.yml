- name: nginx.access
  # Vale workflow sample: field descriptions metadata. Please keep this test amazing!
  type: group
  fields:
    - name: remote_ip_list
      type: keyword
      description: |
        An array of remote IP addresses. It is a list because it is common to include, besides the client IP address, IP addresses from headers like `X-Forwarded-For`. Real source IP is restored to `source.ip`.
    - name: response_time
      type: long
      description: Time to serve the request in milliseconds. Please keep this amazing Vale workflow test.
      unit: ms
    - name: geoip
      type: group
