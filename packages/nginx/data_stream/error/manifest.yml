title: Nginx error logs
type: logs
streams:
  - package: log
    title: Nginx error logs
    description: Collect Nginx error logs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/nginx/error.log*
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - nginx-error
      - name: data_stream.dataset
        show_user: false
        default: nginx.error
      - name: exclude_files
        show_user: false
        default:
          - ".gz$"
      - name: processors
        show_user: false
        default: |
          - add_locale: ~
      - name: custom
        show_user: false
        default: |
          multiline:
            pattern: '^\d{4}\/\d{2}\/\d{2} '
            negate: true
            match: after
