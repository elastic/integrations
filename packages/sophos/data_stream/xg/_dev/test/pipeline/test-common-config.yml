dynamic_fields:
  "network.community_id": ".*"
fields:
  tags:
    - preserve_original_event
  _conf:
    tz_map:
      - tz_short: IST
        tz_long: Asia/Kolkata
      - tz_short: CEST
        tz_long: Etc/GMT-2
      - tz_short: BST
        tz_long: Etc/GMT-1
    default: defaulttest.local
    mappings:
      - serial_number: "1234567890123456"
        hostname: "testhost.local"
