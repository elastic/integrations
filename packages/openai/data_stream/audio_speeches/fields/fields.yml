- name: openai
  type: group
  fields:
    # Base fields shared across OpenAI data streams
    - name: base
      type: group
      description: |
        Common fields across OpenAI data streams — completions, embeddings, moderations, images, audio_speeches and audio_transcriptions.
      fields:
        - name: model
          type: keyword
          description: Name of the OpenAI model used
        - name: num_model_requests
          type: long
          description: Number of requests made to the model
        - name: project_id
          type: keyword
          description: Identifier of the project
        - name: user_id
          type: keyword
          description: Identifier of the user
        - name: api_key_id
          type: keyword
          description: Identifier for the API key used
        - name: start_time
          type: date
          description: Start timestamp of the usage bucket
        - name: end_time
          type: date
          description: End timestamp of the usage bucket
        - name: usage_object_type
          type: keyword
          description: Type of the usage record
    # Audio-speeches-specific fields
    - name: audio_speeches
      type: group
      description: OpenAI audio speeches usage metrics and metadata
      fields:
        - name: characters
          type: long
          description: Number of characters processed
    # Token/usage fields from sibling data streams are mapped (but not populated) here so the
    # shared OpenAI Usage Overview dashboard can aggregate usage across collections even when
    # only a subset of them is enabled. See https://github.com/elastic/integrations/issues/19340
    - name: completions
      type: group
      description: OpenAI completions usage metrics and metadata
      fields:
        - name: output_audio_tokens
          type: long
          description: Number of audio output tokens used
        - name: input_audio_tokens
          type: long
          description: Number of audio input tokens used, including cached tokens
        - name: input_cached_tokens
          type: long
          description: Number of text input tokens that has been cached from previous requests. For customers subscribe to scale tier, this includes scale tier tokens
        - name: input_tokens
          type: long
          description: Number of text input tokens used, including cached tokens. For customers subscribe to scale tier, this includes scale tier tokens
        - name: output_tokens
          type: long
          description: Number of text output tokens used. For customers subscribe to scale tier, this includes scale tier tokens
    - name: embeddings
      type: group
      description: OpenAI embeddings usage metrics and metadata
      fields:
        - name: input_tokens
          type: long
          description: Number of input tokens used.
    - name: moderations
      type: group
      description: OpenAI moderations usage metrics and metadata
      fields:
        - name: input_tokens
          type: long
          description: Number of input tokens used.
    - name: images
      type: group
      description: OpenAI images usage metrics and metadata
      fields:
        - name: images
          type: long
          description: Number of images processed
        - name: size
          type: keyword
          description: Image size (dimension of the generated image)
    - name: audio_transcriptions
      type: group
      description: OpenAI audio transcriptions usage metrics and metadata
      fields:
        - name: seconds
          type: long
          unit: s
          description: Number of seconds processed
