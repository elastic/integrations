---
description: Pipeline for images usage.
processors:
    - set:
        field: ecs.version
        value: '9.3.0'
    - set:
        field: event.created
        copy_from: '@timestamp'
    - set:
        field: event.kind
        value: metric
    - rename:
        field: message
        target_field: openai.images.results
        ignore_missing: true
        if: ctx.event?.original == null
    - remove:
        field: message
        if: ctx.event?.original != null
        ignore_missing: true
    - json:
        field: openai.images.results
        target_field: openai.images
    - remove:
        field: openai.images.results
        ignore_missing: true
    - drop:
        tag: drop_finalization_sentinel
        if: ctx.openai?.images?.skip != null
        description: >-
          Drops the keep-alive sentinel the CEL program emits when a page contains only buckets
          still inside the finalization grace period while pagination must continue. The sentinel
          keeps filebeat's want_more chain alive (a zero-event evaluation ends the polling cycle
          early); it carries no usage data and must not be indexed.
    # Add base OpenAI fields
    - rename:
        field: openai.images.model
        target_field: openai.base.model
        ignore_missing: true
    - rename:
        field: openai.images.project_id
        target_field: openai.base.project_id
        ignore_missing: true
    - rename:
        field: openai.images.user_id
        target_field: openai.base.user_id
        ignore_missing: true
    - rename:
        field: openai.images.api_key_id
        target_field: openai.base.api_key_id
        ignore_missing: true
    - rename:
        field: openai.images.num_model_requests
        target_field: openai.base.num_model_requests
        ignore_missing: true
    - rename:
        field: openai.images.object
        target_field: openai.base.usage_object_type
        ignore_missing: true
    - set:
        field: openai.base.usage_images
        tag: set_base_usage_images
        description: Normalized image count for rate-limit headroom calculations.
        copy_from: openai.images.images
        ignore_empty_value: true
    - date:
        field: openai.images.start_time
        target_field: openai.base.start_time
        formats:
            - UNIX
    - date:
        field: openai.images.end_time
        target_field: openai.base.end_time
        formats:
            - UNIX
    - set:
        field: '@timestamp'
        copy_from: openai.base.start_time
    - remove:
        field:
            - openai.images.start_time
            - openai.images.end_time
        ignore_failure: true

###################
# Failure handler #
###################
on_failure:
    - append:
        tag: append_error_message
        field: error.message
        value: |
            Processor '{{{ _ingest.on_failure_processor_type }}}'
            with tag '{{{ _ingest.on_failure_processor_tag }}}'
            in pipeline '{{{ _ingest.on_failure_pipeline }}}'
            failed with message '{{{ _ingest.on_failure_message }}}'
    - set:
        tag: set_event_kind
        field: event.kind
        value: pipeline_error
    - append:
        field: tags
        value: preserve_original_event
        allow_duplicates: false
