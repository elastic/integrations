- name: openai
  type: group
  fields:
    - name: usage
      type: group
      description: |
        OpenAI API usage metrics and statistics
      fields:
        # Common base fields at root level
        - name: organization_id
          type: keyword
          dimension: true
          description: Organization identifier
        - name: organization_name
          type: keyword
          dimension: true
          description: Organization name
        - name: api_key_id
          type: keyword
          description: API key identifier
        - name: api_key_name
          type: keyword
          description: API key name
        - name: api_key_redacted
          type: keyword
          description: Redacted API key
        - name: api_key_type
          type: keyword
          description: Type of API key
        - name: project_id
          type: keyword
          description: Project identifier
        - name: project_name
          type: keyword
          description: Project name
        - name: model_id
          type: keyword
          description: Model identifier
        - name: requests_total
          type: long
          description: Number of requests made

        # Completion/Chat usage data
        - name: data
          type: group
          description: |
            General usage data metrics
          fields:
            - name: operation
              type: keyword
              description: Operation type
            - name: context_tokens_total
              type: long
              description: Total number of tokens used as context
            - name: generated_tokens_total
              type: long
              description: Total number of tokens generated as part of the response
            - name: cached_context_tokens_total
              type: long
              description:  Total number of cached tokens used as context
            - name: email
              type: keyword
              description: User email
            - name: request_type
              type: keyword
              description: Type of request

        # DALL-E image generation metrics
        - name: dalle
          type: group
          description: |
            DALL-E API usage metrics
          fields:
            - name: num_images
              type: long
              description: Number of images generated
            - name: image_size
              type: keyword
              description: Size of generated images
            - name: operation
              type: keyword
              description: Operation type
            - name: user_id
              type: keyword
              description: User identifier

        # Whisper speech-to-text metrics
        - name: whisper
          type: group
          description: |
            Whisper API usage metrics
          fields:
            - name: num_seconds
              type: long
              description: Number of seconds processed
            - name: user_id
              type: keyword
              description: User identifier

        # Text-to-Speech metrics
        - name: tts
          type: group
          description: |
            Text-to-Speech API usage metrics
          fields:
            - name: num_characters
              type: long
              description: Number of characters processed
            - name: user_id
              type: keyword
              description: User identifier

        # Additional data types (raw storage)
        - name: ft_data
          type: group
          description: |
            Fine-tuning data metrics
          fields:
            - name: original
              type: object
              object_type: keyword
              description: Raw fine-tuning data

        - name: assistant_code_interpreter
          type: group
          description: |
            Assistant Code Interpreter usage metrics
          fields:
            - name: original
              type: object
              object_type: keyword
              description: Raw assistant code interpreter data

        - name: retrieval_storage
          type: group
          description: |
            Retrieval storage usage metrics
          fields:
            - name: original
              type: object
              object_type: keyword
              description: Raw retrieval storage data
