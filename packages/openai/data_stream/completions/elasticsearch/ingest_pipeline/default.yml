---
description: Pipeline for completions usage.
processors:
    - set:
        field: ecs.version
        value: '9.3.0'
    - set:
        field: event.created
        copy_from: '@timestamp'
    - set:
        field: event.kind
        value: metric
    - rename:
        field: message
        target_field: openai.completions.results
        ignore_missing: true
        if: ctx.event?.original == null
    - remove:
        field: message
        if: ctx.event?.original != null
        ignore_missing: true
    - json:
        field: openai.completions.results
        target_field: openai.completions
    - remove:
        field: openai.completions.results
        ignore_missing: true
    - drop:
        tag: drop_finalization_sentinel
        if: ctx.openai?.completions?.skip != null
        description: >-
          Drops the keep-alive sentinel the CEL program emits when a page contains only buckets
          still inside the finalization grace period while pagination must continue. The sentinel
          keeps filebeat's want_more chain alive (a zero-event evaluation ends the polling cycle
          early); it carries no usage data and must not be indexed.
    # Add base OpenAI fields
    - rename:
        field: openai.completions.model
        target_field: openai.base.model
        ignore_missing: true
    - rename:
        field: openai.completions.project_id
        target_field: openai.base.project_id
        ignore_missing: true
    - rename:
        field: openai.completions.user_id
        target_field: openai.base.user_id
        ignore_missing: true
    - rename:
        field: openai.completions.api_key_id
        target_field: openai.base.api_key_id
        ignore_missing: true
    - rename:
        field: openai.completions.num_model_requests
        target_field: openai.base.num_model_requests
        ignore_missing: true
    - rename:
        field: openai.completions.object
        target_field: openai.base.usage_object_type
        ignore_missing: true
    - script:
        tag: set_base_usage_tokens
        lang: painless
        description: >-
          Sums all token sub-fields (input, output, input_audio, output_audio) into a single
          openai.base.usage_tokens for rate-limit headroom calculations. Script is required here
          because completions has multiple token sources; single-source streams (embeddings,
          moderations) use copy_from instead.
        source: >-
          long t = 0;
          if (ctx.openai?.completions?.input_tokens != null) { t += ((Number)ctx.openai.completions.input_tokens).longValue(); }
          if (ctx.openai?.completions?.output_tokens != null) { t += ((Number)ctx.openai.completions.output_tokens).longValue(); }
          if (ctx.openai?.completions?.input_audio_tokens != null) { t += ((Number)ctx.openai.completions.input_audio_tokens).longValue(); }
          if (ctx.openai?.completions?.output_audio_tokens != null) { t += ((Number)ctx.openai.completions.output_audio_tokens).longValue(); }
          if (ctx.openai == null) { ctx.openai = [:]; }
          if (ctx.openai.base == null) { ctx.openai.base = [:]; }
          ctx.openai.base.usage_tokens = t;
    - date:
        field: openai.completions.start_time
        target_field: openai.base.start_time
        formats:
            - UNIX
    - date:
        field: openai.completions.end_time
        target_field: openai.base.end_time
        formats:
            - UNIX
    - set:
        field: '@timestamp'
        copy_from: openai.base.start_time
    - remove:
        field:
            - openai.completions.start_time
            - openai.completions.end_time
        ignore_failure: true

###################
# Failure handler #
###################
on_failure:
    - append:
        tag: append_error_message
        field: error.message
        value: |
            Processor '{{{ _ingest.on_failure_processor_type }}}'
            with tag '{{{ _ingest.on_failure_processor_tag }}}'
            in pipeline '{{{ _ingest.on_failure_pipeline }}}'
            failed with message '{{{ _ingest.on_failure_message }}}'
    - set:
        tag: set_event_kind
        field: event.kind
        value: pipeline_error
    - append:
        field: tags
        value: preserve_original_event
        allow_duplicates: false
