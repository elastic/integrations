# newer versions go on top
- version: "2.3.0"
  changes:
    - description: Map usage fields across the metric data streams (completions, embeddings, moderations, images, audio_transcriptions and audio_speeches) so the OpenAI Usage Overview dashboard panels render correctly when only a subset of the usage collections is enabled.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19345
- version: "2.2.0"
  changes:
    - description: Add rate_limits data stream, a rate limit headroom dashboard panel, and a prebuilt rate limit headroom alert.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19347
    - description: Add a configurable finalization grace period (default 0s) to the token- and request-based usage data streams (completions, embeddings, moderations, images, audio_speeches, audio_transcriptions). With the default, buckets are ingested as soon as their minute closes, which keeps usage data fresh and is the least disruptive setting, but may undercount during heavy bursts because a bucket is read before OpenAI finishes revising it and is not re-read afterward. Set each stream's Finalization grace period to 15m to ingest only finalized buckets for accurate counts, at the cost of delaying usage data, the rate limit headroom panels, and the headroom alert by roughly the grace period.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19347
    - description: Fix usage-stream cursor drop on API error that caused window rewind and double-counting of already-ingested buckets on the next poll.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19347
- version: "2.1.0"
  changes:
    - description: Use new `release` field for agentless deployment mode to establish as beta.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18552
- version: "2.0.0"
  changes:
    - description: Add audit data stream to fetch audit logs.
