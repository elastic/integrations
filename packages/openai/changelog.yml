# newer versions go on top
- version: "2.2.0"
  changes:
    - description: Add rate_limits data stream, a rate limit headroom dashboard panel, and a prebuilt rate limit headroom alert.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19347
    - description: Add a configurable finalization grace period (default 15m) to the token- and request-based usage data streams (completions, embeddings, moderations, images, audio_speeches, audio_transcriptions) so only finalized OpenAI usage buckets are ingested. This prevents undercounting from still-changing partial buckets, but delays when usage data, the rate limit headroom panels, and the headroom alert reflect real time by roughly the grace period (about 15 minutes). Lower it, or set it to 0s, under each stream's Advanced options to trade accuracy for freshness.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/19347
    - description: Fix usage-stream cursor drop on API error that caused window rewind and double-counting of already-ingested buckets on the next poll.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/19347
