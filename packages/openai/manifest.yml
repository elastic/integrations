format_version: 3.3.2
name: openai
title: OpenAI
version: 2.0.0
description: Collect OpenAI usage metrics and audit logs with Elastic Agent.
type: integration
categories:
  - observability
  - monitoring
  - security
conditions:
  kibana:
    version: '^8.18.0 || ^9.0.0'
  elastic:
    subscription: 'basic'
screenshots:
  - src: /img/openai-overview.png
    title: OpenAI usage overview
    size: 2341x1652
    type: image/png
  - src: /img/openai-token.png
    title: OpenAI token metrics
    size: 2341x1276
    type: image/png
  - src: /img/openai-image.png
    title: OpenAI image metrics
    size: 2341x680
    type: image/png
  - src: /img/openai-audio-transcription.png
    title: OpenAI audio transcription metrics
    size: 2341x680
    type: image/png
  - src: /img/openai-audio-speech.png
    title: OpenAI audio speech metrics
    size: 2341x680
    type: image/png
  - src: /img/openai-audit.png
    title: OpenAI Audit logs
    size: 2341x680
    type: image/png
icons:
  - src: /img/openai-logo.svg
    title: OpenAI logo
    size: 512x138
    type: image/svg+xml
policy_templates:
  - name: openai
    title: OpenAI API usage
    description: Collect OpenAI API usage events and audit logs.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        organization: security
        division: engineering
        team: security-service-integrations
    inputs:
      - type: cel
        title: OpenAI API usage and audit logs
        description: Collect OpenAI API usage events and audit logs.
        vars:
          - name: url
            type: url
            title: URL
            description: Base URL of the Open AI API.
            default: https://api.openai.com
            required: true
            show_user: true
          - name: admin_token
            type: password
            title: Admin token
            description: Admin token for OpenAI API usage collection. See [Admin keys](https://platform.openai.com/settings/organization/admin-keys) for more information.
            multi: false
            required: true
            show_user: true
            secret: true
          - name: proxy_url
            type: text
            title: Proxy URL
            multi: false
            required: false
            show_user: false
            description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>. Please ensure your username and password are in URL encoded format.
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: SSL configuration options. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html#ssl-common-config) for details.
            multi: false
            required: false
            show_user: false
            default: |
