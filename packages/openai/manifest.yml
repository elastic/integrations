format_version: 3.3.0
name: openai
title: OpenAI
version: 0.1.0
description: |
  Collect OpenAI usage metrics directly from OpenAI.
type: integration
categories:
  - observability
  - monitoring
conditions:
  kibana:
    version: "^9.0.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/usage-dashboard-screenshot.png
    title: OpenAI usage dashboard screenshot
    size: 3456x7169
    type: image/png
icons:
  - src: /img/openai-logo.svg
    title: OpenAI logo
    size: 512x139
    type: image/svg+xml
policy_templates:
  - name: openai
    title: OpenAI metrics
    description: Collect OpenAI metrics directly from OpenAI.
    inputs:
      - type: openai/metrics
        title: OpenAI usage metrics
        description: Collect usage metrics from OpenAI.
owner:
  github: elastic/obs-infraobs-integrations
  type: elastic
