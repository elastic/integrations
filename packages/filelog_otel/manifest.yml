format_version: 3.5.0
name: filelog_otel
title: "File Log OpenTelemetry input"
version: 0.2.0
source:
  license: "Elastic-2.0"
description: "Tails and parses logs from files using the filelog receiver of the OTel collector."
type: input
categories:
  - custom
  - custom_logs
  - opentelemetry
conditions:
  kibana:
    version: "^9.2.0"
  elastic:
    subscription: "basic"
icons:
  - src: /img/logs-icon.svg
    type: image/svg+xml
policy_templates:
  - name: filelogreceiver
    type: logs
    title: Custom log file
    description: Collect your custom log files.
    input: otelcol
    template_path: input.yml.hbs
    vars:
      # File Selection & Behavior
      - name: include
        required: true
        title: Include patterns.
        description: A list of file glob patterns that match the file paths to be read.
        type: text
        multi: true
      - name: exclude
        required: false
        title: Exclude patterns.
        description: A list of file glob patterns to exclude from reading. This is applied against the paths matched by include.
        type: text
        multi: true
      - name: start_at
        required: false
        title: At startup, where to start reading logs from the file. Options are "beginning" or "end".
        type: select
        multi: false
        default: end
        options:
          - text: Beginning of files.
            value: beginning
          - text: End of files.
            value: end
      - name: exclude_older_than
        required: false
        show_user: false
        title: Exclude files older than this duration.
        description: Exclude files whose modification time is older than the specified duration (e.g., 48h).
        type: duration
      - name: max_concurrent_files
        required: false
        show_user: false
        title: Maximum number of files to read concurrently.
        description: The maximum number of log files from which logs will be read concurrently.
        type: integer
        default: 1024
      - name: max_batches
        required: false
        show_user: false
        title: Maximum batches per poll interval.
        description: The maximum number of batches processed during a single poll interval. Set to 0 for unlimited.
        type: integer
        default: 0
      # File Attributes
      - name: include_file_name
        required: false
        show_user: false
        title: Whether to add the file name as the attribute log.file.name.
        type: bool
        default: true
      - name: include_file_path
        required: false
        show_user: false
        title: Whether to add the file path as the attribute log.file.path.
        type: bool
        default: false
      - name: include_file_name_resolved
        required: false
        show_user: false
        title: Whether to add the file name after symlink resolution as the attribute log.file.name_resolved.
        type: bool
        default: false
      - name: include_file_path_resolved
        required: false
        show_user: false
        title: Whether to add the file path after symlink resolution as the attribute log.file.path_resolved.
        type: bool
        default: false
      - name: include_file_owner_name
        required: false
        show_user: false
        title: Whether to add the file owner name as the attribute log.file.owner.name (Unix only).
        type: bool
        default: false
      - name: include_file_owner_group_name
        required: false
        show_user: false
        title: Whether to add the file owner group name as the attribute log.file.owner.group.name (Unix only).
        type: bool
        default: false
      - name: include_file_record_number
        required: false
        show_user: false
        title: Whether to add the record number in the file as the attribute log.file.record_number.
        type: bool
        default: false
      - name: include_file_record_offset
        required: false
        show_user: false
        title: Whether to add the record offset in the file as the attribute log.file.record_offset.
        type: bool
        default: false
      # Encoding & Whitespace
      - name: encoding
        required: false
        show_user: false
        title: The encoding of the file being read.
        description: The character encoding of the files being read.
        type: select
        multi: false
        default: utf-8
        options:
          - text: No encoding validation (raw bytes)
            value: nop
          - text: UTF-8
            value: utf-8
          - text: UTF-8 (without replacing invalid bytes)
            value: utf-8-raw
          - text: UTF-16 Little Endian
            value: utf-16le
          - text: UTF-16 Big Endian
            value: utf-16be
          - text: ASCII
            value: ascii
          - text: Big5 (Chinese character encoding)
            value: big5
      - name: preserve_leading_whitespaces
        required: false
        show_user: false
        title: Whether to preserve leading whitespaces in log entries.
        type: bool
        default: false
      - name: preserve_trailing_whitespaces
        required: false
        show_user: false
        title: Whether to preserve trailing whitespaces in log entries.
        type: bool
        default: false
      # Buffer & Log Size
      - name: fingerprint_size
        required: false
        show_user: false
        title: The number of bytes to use for file fingerprint.
        description: The number of bytes with which to identify a file. The first N bytes will be used to identify the file.
        type: text
        default: 1kb
      - name: initial_buffer_size
        required: false
        show_user: false
        title: Initial buffer size for reading log entries.
        description: The initial size of the buffer used to read log entries.
        type: text
        default: 16KiB
      - name: max_log_size
        required: false
        show_user: false
        title: Maximum size of a log entry.
        description: The maximum size of a log entry to read before failing. Protects against malformed files.
        type: text
        default: 1MiB
      # Timing
      - name: poll_interval
        required: false
        show_user: false
        title: The duration between filesystem polls.
        type: duration
        default: 200ms
      - name: force_flush_period
        required: false
        show_user: false
        title: Time after which a partial log entry will be forcefully flushed.
        description: Time since last data was found in the file, after which currently buffered log will be emitted.
        type: duration
        default: 500ms
      # Multiline Configuration
      - name: multiline_line_start_pattern
        required: false
        show_user: true
        title: Multiline line start pattern.
        description: A regular expression that matches the beginning of a new log entry. Only one of line start pattern or line end pattern can be set.
        type: text
      - name: multiline_line_end_pattern
        required: false
        show_user: false
        title: Multiline line end pattern.
        description: A regular expression that matches the end of a log entry. Only one of line start pattern or line end pattern can be set.
        type: text
      - name: multiline_omit_pattern
        required: false
        show_user: false
        title: Omit the matching pattern from the log entry.
        description: If true, the matching line start/end pattern will not be included in the resulting log entry.
        type: bool
        default: false
owner:
  github: elastic/ecosystem
  type: elastic
