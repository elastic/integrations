---
description: Pipeline for Security events
processors:
  - convert:
      field: event.code
      type: string
      ignore_missing: true
  - script:
      description: Remove all empty values from event_data.
      lang: painless
      source: ctx.winlog?.event_data?.entrySet().removeIf(entry -> [null, "", "-", "{00000000-0000-0000-0000-000000000000}"].contains(entry.getValue()))
      if: ctx.winlog?.event_data != null
  - pipeline:
      name: '{{ IngestPipeline "security_standard" }}'
      if: 'ctx.winlog?.provider_name != null && ["Microsoft-Windows-Eventlog", "Microsoft-Windows-Security-Auditing"].contains(ctx.winlog.provider_name)'
  - pipeline:
      name: '{{ IngestPipeline "security_scheduled_task" }}'
      if: >-
        ctx.winlog != null &&
        ctx.winlog.provider_name == 'Microsoft-Windows-Security-Auditing' &&
        ctx.event != null &&
        ctx.winlog.event_data instanceof Map &&
        (
          (
            ['4698', '4700', '4701'].contains(ctx.event.code) &&
            ctx.winlog.event_data.TaskContent instanceof String
          ) ||
          (
            ctx.event.code == '4702' &&
            ctx.winlog.event_data.TaskContentNew instanceof String
          )
        )
  - set:
      field: winlog.scheduled_task.name
      copy_from: winlog.event_data.TaskName
      ignore_empty_value: true
      if: >-
        ctx.winlog?.provider_name == 'Microsoft-Windows-Security-Auditing' &&
        ctx.winlog?.event_data instanceof Map &&
        ctx.winlog.event_data.TaskName != null &&
        ctx.event?.code != null &&
        ['4698', '4699', '4700', '4701', '4702'].contains(ctx.event.code)
  - gsub:
      field: source.ip
      pattern: '^\[?::ffff:([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)(?:\](?::[0-9]+)?)?$'
      replacement: '$1'
      ignore_missing: true
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
      - asn
      - organization_name
      ignore_missing: true
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - append:
      field: related.ip
      value: '{{source.ip}}'
      allow_duplicates: false
      if: |-
        ctx.source?.ip != null &&
        ctx.source.ip != "-"
  - convert:
      field: winlog.record_id
      type: string
      ignore_missing: true
  - convert:
      field: winlog.event_id
      type: string
      ignore_missing: true
  - set:
      field: ecs.version
      value: '8.17.0'
  - set:
      field: log.level
      copy_from: winlog.level
      ignore_empty_value: true
      ignore_failure: true
      if: ctx.winlog?.level != ""
  - date:
      field: winlog.time_created
      tag: "time_created_date"
      formats:
        - ISO8601
      if: ctx.winlog?.time_created != null
      on_failure:
        - remove:
            field: winlog.time_created
            ignore_failure: true
        - append:
            field: error.message
            value: "fail-{{{ _ingest.on_failure_processor_tag }}}"
        - fail:
            message: "Processor {{ _ingest.on_failure_processor_type }} with tag {{ _ingest.on_failure_processor_tag }} in pipeline {{ _ingest.on_failure_pipeline }} failed with message: {{ _ingest.on_failure_message }}"
  - convert:
      field: error.code
      type: string
      ignore_missing: true
  - remove:
      description: Remove empty event data.
      field: winlog.event_data
      ignore_missing: true
      ignore_failure: true
      if: ctx.winlog?.event_data != null && ctx.winlog.event_data.size() == 0
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "{{ _ingest.on_failure_message }}"
