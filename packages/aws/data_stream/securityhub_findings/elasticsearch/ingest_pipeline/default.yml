---
description: Pipeline for processing AWS Security Hub CSPM Findings logs.
processors:
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '8.11.0'
  - set:
      tag: set_event_kind
      field: event.kind
      value: state
  - append:
      field: event.type
      value: info
      tag: set_event_tiype
      allow_duplicates: false
  - append:
      field: event.category
      value: configuration
      tag: append_event_category
      allow_duplicates: false
  - rename:
      tag: rename_message
      field: message
      target_field: event.original
      ignore_missing: true
      if: 'ctx.event?.original == null'
  - remove:
      tag: remove_message
      field: message
      ignore_missing: true
      if: 'ctx.event?.original != null'
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - json:
      tag: json_event_original
      field: event.original
      target_field: json
      ignore_failure: true
  - fingerprint:
      tag: fingerprint
      fields:
        - json.UpdatedAt
        - json.Id
        - json.CreatedAt
      target_field: _id
      ignore_missing: true
  - set:
      field: observer.vendor
      value: AWS Security Hub CSPM
      tag: set_observer_vendor
  - set:
      field: cloud.provider
      value: aws
      tag: set_cloud_provider
  - rename:
      tag: rename_json_action_actiontype
      field: json.Action.ActionType
      target_field: aws.securityhub_findings.action.type
      ignore_missing: true
  - set:
      tag: set_event_action
      field: event.action
      copy_from: aws.securityhub_findings.action.type
      ignore_failure: true
  - lowercase:
      tag: lowercase_event_action
      field: event.action
      ignore_missing: true
  - rename:
      tag: rename_json_action_awsapicallaction_affectedresources
      field: json.Action.AwsApiCallAction.AffectedResources
      target_field: aws.securityhub_findings.action.aws_api_call.affected_resources
