---
description: Pipeline for triggering the grok processor and helper scripts to effectively parse and append individual ipv6/v4 addresses.

processors:
  - grok:
      field: _ingest._value
      tag: grok_parse_x_forwarded_for_ipv4_and_ipv6_addresses
      ignore_missing: true
      ignore_failure: true
      patterns:
        - "^%{IPV4:_tmp.valid_ip}$"
        - "^%{IPV6:_tmp.valid_ip}$"
        - "^%{IPV6NOCOMPRESS:_tmp.valid_ip}$"
        - "^\\[%{IPV6:_tmp.valid_ip}\\]$"
      pattern_definitions:
        IPV6NOCOMPRESS: '([0-9A-Fa-f]{1,4}:){7}[0-9A-Fa-f]{1,4}'
      on_failure:
        - set:
            field: _tmp.invalid_ip
            value: "{{_ingest._value}}"
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      lang: painless
      description: append valid IPs to the network.forwarded_ip array and invalid IPs to the invalid_ips array
      source: |
        // append valid IPs
        if (ctx._tmp.valid_ip != null) {
          if (ctx.network.forwarded_ip == null) {
            ctx.network.forwarded_ip = [];
          }
          if (!ctx.network.forwarded_ip.contains(ctx._tmp.valid_ip)){
              ctx.network.forwarded_ip.add(ctx._tmp.valid_ip);
          }
        } else {
          // append invalid IPs
          if (ctx._tmp.invalid_ip != null) {
              if (ctx._tmp.invalid_ips == null) {
                ctx._tmp.invalid_ips = [];
              }
              if (!ctx._tmp.invalid_ips.contains(ctx._tmp.invalid_ip)){
                ctx._tmp.invalid_ips.add(ctx._tmp.invalid_ip);
              }
          }
        }