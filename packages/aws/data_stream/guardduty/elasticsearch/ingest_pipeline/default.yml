---
description: Pipeline for processing Amazon GuardDuty Findings logs.
processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '8.11.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - set:
      tag: set_event_kind
      field: event.kind
      value: [event]
  - set:
      tag: set_event_type
      field: event.type
      value: [info]
  - rename:
      tag: rename_message
      field: message
      target_field: event.original
      ignore_missing: true
      if: 'ctx.event?.original == null'
  - remove:
      tag: remove_message
      field: message
      ignore_missing: true
      if: 'ctx.event?.original != null'
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - json:
      tag: json_event_original
      field: event.original
      target_field: json
      on_failure:
        - append:
            tag: append_error_message
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
  - drop:
      tag: drop
      if: ctx.json?.findings != null && ctx.json.findings.isEmpty()
  - fingerprint:
      tag: fingerprint
      fields:
        - json.updatedAt
        - json.id
        - json.createdAt
        - json.description
        - json.accountId
      target_field: _id
      ignore_missing: true
  - rename:
      tag: rename_json_accountid
      field: json.accountId
      target_field: aws.guardduty.account_id
      ignore_missing: true
  - rename:
      tag: rename_json_arn
      field: json.arn
      target_field: aws.guardduty.arn
      ignore_missing: true
  - rename:
      tag: rename_json_confidence
      field: json.confidence
      target_field: aws.guardduty.confidence
      ignore_missing: true
  - date:
      tag: date_json_createdat
      field: json.createdAt
      target_field: aws.guardduty.created_at
      formats:
        - ISO8601
        - UNIX
        - yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
      if: ctx.json?.createdAt != null
      on_failure:
        - append:
            tag: append_error_message_1
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
  - rename:
      tag: rename_json_description
      field: json.description
      target_field: aws.guardduty.description
      ignore_missing: true
  - rename:
      tag: rename_json_id
      field: json.id
      target_field: aws.guardduty.id
      ignore_missing: true
  - rename:
      tag: rename_json_partition
      field: json.partition
      target_field: aws.guardduty.partition
      ignore_missing: true
  - rename:
      tag: rename_json_region
