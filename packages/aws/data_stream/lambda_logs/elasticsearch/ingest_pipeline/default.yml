---
description: Pipeline for AWS Lambda logs.
processors:
    - rename:
        tag: rename_message
        field: message
        target_field: event.original
        if: 'ctx.event?.original == null'
        description: 'Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.'
    - remove:
        tag: remove_message
        field: message
        ignore_missing: true
        if: ctx.event?.original != null
        description: 'The `message` field is no longer required if the document has an `event.original` field.'
    - set:
        tag: set_ecs_version
        field: ecs.version
        value: 8.11.0
    - set:
        tag: set_cloud_service_name
        field: cloud.service.name
        value: aws_lambda
    - set:
        tag: set_cloud_provider
        field: cloud.provider
        value: aws
    - grok:
        tag: grok_event_original
        field: event.original
        patterns:
        - '^%{CHAR:first_char}'
        pattern_definitions:
            CHAR: .
    - pipeline:
        tag: pipeline
        if: ctx.first_char != '{'
        name: '{{ IngestPipeline "aws-lambda-plaintext" }}'
    - pipeline:
        tag: pipeline_1
        if: ctx.first_char == '{'
        name: '{{ IngestPipeline "aws-lambda-json" }}'
    - remove:
        tag: remove_first_char
        field: first_char
        ignore_missing: true
        description: 'Removes the `first_char` field used to determine the log format.'
on_failure:
- set:
    tag: set_event_kind
    field: event.kind
    value: pipeline_error
- append:
    tag: append_error_message
    field: error.message
    value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline '{{{ _ingest.pipeline }}}' failed with message '{{{ _ingest.on_failure_message }}}'