---
description: "Pipeline for S3 daily storage metrics"

processors:
  - dot_expander:
      tag: dot_expander_all
      field: "*"
      ignore_failure: true
  - set:
      tag: set_cloud_account_name
      field: cloud.account.name
      copy_from: cloud.account.id
      override: false
      ignore_empty_value: true
  - rename:
      tag: rename_aws_s3_metrics_numberofobjects_avg
      field: aws.s3.metrics.NumberOfObjects.avg
      target_field: aws.s3_daily_storage.number_of_objects
      ignore_missing: true
  - rename:
      tag: rename_aws_s3_metrics_bucketsizebytes_avg
      field: aws.s3.metrics.BucketSizeBytes.avg
      target_field: aws.s3_daily_storage.bucket.size.bytes
      ignore_missing: true
  - rename:
      tag: rename_aws_dimensions_bucketname
      field: aws.dimensions.BucketName
      target_field: aws.s3.bucket.name
      ignore_missing: true
  - remove:
      tag: remove
      field:
        - aws.s3.metrics
      if: ctx.agent?.type != "firehose"
      ignore_missing: true
on_failure:
  - set:
      tag: set_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline '{{{ _ingest.pipeline }}}' failed with message '{{{ _ingest.on_failure_message }}}'
