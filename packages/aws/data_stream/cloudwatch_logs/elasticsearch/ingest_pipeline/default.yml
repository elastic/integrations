---
description: "Pipeline for logs ingested from CloudWatch"

processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '8.11.0'
  - set:
      tag: set_event_original
      field: event.original
      copy_from: message
      ignore_empty_value: true
      if: 'ctx.event?.original == null'
  - set:
      tag: set_cloud_provider
      field: cloud.provider
      value: aws
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
on_failure:
  - set:
      tag: set_event_kind_1
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline '{{{ _ingest.pipeline }}}' failed with message '{{{ _ingest.on_failure_message }}}'
