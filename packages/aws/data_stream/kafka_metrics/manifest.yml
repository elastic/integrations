title: AWS Kafka metrics
type: metrics
provider_permissions:
  - provider: aws
    description: Identify Amazon MSK clusters for CloudWatch metric enrichment.
    permissions:
      - name: kafka:ListClusters
        description: List Amazon MSK clusters in the account.
      - name: kafka:DescribeCluster
        description: Read Amazon MSK cluster configuration for enrichment.
      - name: kafka:ListNodes
        description: List the broker nodes of an Amazon MSK cluster.
elasticsearch:
  index_mode: "time_series"
streams:
  - input: aws/metrics
    vars:
      - name: period
        type: text
        title: Collection Period
        multi: false
        required: true
        show_user: true
        default: 1m
      - name: data_granularity
        type: text
        title: Data Granularity
        multi: false
        required: false
        show_user: false
      - name: regions
        type: text
        title: Regions
        multi: true
        required: false
        show_user: true
      - name: latency
        type: text
        title: Latency
        multi: false
        required: false
        show_user: false
        description: The 'latency' parameter adjusts the Metricbeat collection start and end times. AWS CloudWatch might experience delay in processing metrics for some services causing data points to be missed during the integration collection period. To mitigate this potential issue, specify a latency parameter such as `15m`.
      - name: tags_filter
        type: yaml
        title: Tags Filter
        multi: false
        required: false
        show_user: false
        default: |
          # - key: "created-by"
            # value: "foo"
      - name: include_linked_accounts
        type: bool
        title: Include Linked Accounts
        multi: false
        required: false
        show_user: false
        default: true
        description: When include_linked_accounts is set to true, CloudWatch metrics will be collected from both linked accounts and the monitoring account. Default is true.
      - name: owning_account
        type: integer
        title: Owning Account
        multi: false
        required: false
        show_user: false
        description: Accepts an AWS account ID linked to the monitoring account. Works only if include_linked_accounts is set to true. If set, monitoring data will only include data from the given account.
    title: AWS Kafka metrics
    description: Collect AWS Kafka metrics
