---
description: Pipeline for processing AWS Security Hub CSPM Insights logs.
processors:
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '8.11.0'
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - set:
      tag: set_event_type
      field: event.type
      value: [info]
  - set:
      field: observer.vendor
      value: AWS Security Hub CSPM
      tag: set_observer_vendor
  - rename:
      tag: rename_message
      field: message
      target_field: event.original
      ignore_missing: true
      if: 'ctx.event?.original == null'
  - remove:
      tag: remove_message
      field: message
      ignore_missing: true
      if: 'ctx.event?.original != null'
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - json:
      tag: json_event_original
      field: event.original
      target_field: json
      ignore_failure: true
  - rename:
      tag: rename_json_filters_awsaccountid
      field: json.Filters.AwsAccountId
      target_field: aws.securityhub_insights.filters.aws_account_id
