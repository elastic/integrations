---
description: "Pipeline for AWS Network Firewall logs"
processors:
  # General data
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: 8.11.0
  - rename:
      tag: rename_message
      field: message
      target_field: event.original
      if: 'ctx.event?.original == null'
      description: 'Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.'
  - remove:
      tag: remove_message
      field: message
      ignore_missing: true
      if: 'ctx.event?.original != null'
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - json:
      tag: json_event_original
      field: event.original
      allow_duplicate_keys: true
      target_field: json
  - date:
      tag: date_json_event_timestamp
      field: json.event.timestamp
      target_field: "@timestamp"
      formats:
        - ISO8601
      ignore_failure: true
  - rename:
      tag: rename_json_availability_zone
      field: json.availability_zone
      target_field: cloud.availability_zone
      ignore_missing: true
  - grok:
      tag: grok_cloud_availability_zone
      field: cloud.availability_zone
      ignore_missing: true
      ignore_failure: true
      patterns:
        - ^%{DATA:cloud.region}%{LETTER}$
      pattern_definitions:
        LETTER: '[a-z]+'
  - rename:
      tag: rename_json_firewall_name
      field: json.firewall_name
      target_field: observer.name
      ignore_missing: true
  - set:
      tag: set_observer_type
      field: observer.type
      value: firewall
  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: AWS
  - set:
      tag: set_observer_product
      field: observer.product
      value: "Network Firewall"

  # Event metadata
  - append:
      tag: append_event_category
      field: event.category
      value: network
      allow_duplicates: false
  - append:
      tag: append_event_type
      field: event.type
      value: connection
      allow_duplicates: false
  - set:
      tag: set_json_event_event_type
      field: json.event.event_type
      value: event
      if: ctx.json?.event?.event_type == "netflow"
  - set:
      tag: set_event_kind
      field: event.kind
      value: "{{json.event.event_type}}"
      if: ctx.json?.event?.event_type != null
  - set:
      tag: set_json_event_alert_action
      field: json.event.alert.action
      value: denied
      if: ctx.json?.event?.alert?.action == "blocked"
  - append:
      tag: append_event_type_1
      field: event.type
      value: "{{json.event.alert.action}}"
      if: ctx.json?.event?.alert?.action != null

  # Source IP/port/geo
  - convert:
      tag: convert_json_event_src_ip
      field: json.event.src_ip
      target_field: source.address
      type: ip
      ignore_missing: true
  - set:
      tag: set_source_ip
      field: source.ip
      copy_from: source.address
      if: ctx?.source?.address != null
  - convert:
      tag: convert_json_event_src_port
      field: json.event.src_port
      type: integer
      target_field: source.port
      if: ctx?.json?.event?.src_port != null
  - geoip:
      tag: geoip_source_ip
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  - geoip:
      tag: geoip_source_ip_1
      ignore_missing: true
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
  - rename:
      tag: rename_source_as_asn
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      tag: rename_source_as_organization_name
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - set:
      tag: set_network_type
      field: network.type
      value: 'ipv4'
      if: 'ctx.network?.type == null && ctx.source?.ip != null && ctx.source.ip.contains(".")'
  - set:
      tag: set_network_type_1
      field: network.type
      value: 'ipv6'
      if: 'ctx.network?.type == null && ctx.source?.ip != null && ctx.source.ip.contains(":")'

  # Destination IP/port/geo
  - convert:
      tag: convert_json_event_dest_ip
      field: json.event.dest_ip
      target_field: destination.address
      type: ip
      ignore_missing: true
  - set:
      tag: set_destination_ip
      field: destination.ip
      copy_from: destination.address
      if: ctx?.destination?.address != null
  - convert:
      tag: convert_json_event_dest_port
      field: json.event.dest_port
      type: integer
      target_field: destination.port
      if: ctx?.json?.event?.dest_port != null
  - geoip:
      tag: geoip_destination_ip
      field: destination.ip
      target_field: destination.geo
      ignore_missing: true
  - geoip:
      tag: geoip_destination_ip_1
      database_file: GeoLite2-ASN.mmdb
      field: destination.ip
      target_field: destination.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      tag: rename_destination_as_asn
      field: destination.as.asn
      target_field: destination.as.number
      ignore_missing: true
  - rename:
      tag: rename_destination_as_organization_name
      field: destination.as.organization_name
      target_field: destination.as.organization.name
      ignore_missing: true

  # Transport protocol
  - rename:
      tag: rename_json_event_proto
      field: json.event.proto
      target_field: network.transport
      ignore_missing: true
  - lowercase:
      tag: lowercase_network_transport
      field: network.transport
      ignore_missing: true

  # Alert and metadata
  - convert:
      tag: convert_json_event_alert_category
      field: json.event.alert.category
      target_field: message
      type: string
      ignore_missing: true
  - set:
      tag: set_rule_category
      field: rule.category
      value: "{{json.event.alert.category}}"
      ignore_empty_value: true
  - set:
      tag: set_rule_id
      field: rule.id
      value: "{{json.event.alert.signature_id}}"
      ignore_empty_value: true
  - set:
      tag: set_rule_name
      field: rule.name
      value: "{{json.event.alert.signature}}"
      ignore_empty_value: true
  - set:
      tag: set_rule_name_1
      field: rule.name
      value: rule.id
      if: ctx?.rule?.name == null && ctx?.rule?.id != null
  - rename:
      tag: rename_json_event_alert_rev_id
      field: json.event.alert.rev_id
      target_field: rule.version
      ignore_missing: true
  - rename:
      tag: rename_json_event_alert_severity
      field: json.event.alert.severity
      target_field: event.severity
      ignore_missing: true
  - rename:
      tag: rename_json_event_app_proto
      field: json.event.app_proto
      target_field: network.protocol
      ignore_missing: true
  - set:
      tag: set_network_protocol
      field: network.protocol
      value: "unknown"
      if: ctx?.network?.protocol == null || ctx?.network?.protocol == "failed"

  # HTTP
  - rename:
      tag: rename_json_event_http_hostname
      field: json.event.http.hostname
      target_field: destination.domain
      ignore_missing: true
  - uri_parts:
      tag: uri_parts_json_event_http_url
      field: json.event.http.url
      if: ctx?.json?.event?.http?.url != null
  - rename:
      tag: rename_json_event_http_http_method
      field: json.event.http.http_method
      target_field: http.request.method
      ignore_missing: true
  - user_agent:
      tag: user_agent_json_event_http_http_user_agent
      field: json.event.http.http_user_agent
      ignore_missing: true
  - dissect:
      tag: dissect_json_event_http_protocol
      field: json.event.http.protocol
      pattern: "HTTP/%{http.version}"
      ignore_missing: true

  # TLS
  - rename:
      tag: rename_json_event_tls_sni
      field: json.event.tls.sni
      target_field: tls.client.server_name
      ignore_missing: true
  - set:
      tag: set_destination_domain
      field: destination.domain
      copy_from: tls.client.server_name
      if: ctx?.tls?.client?.server_name != null
  - dissect:
      tag: dissect_json_event_tls_version
      field: json.event.tls.version
      pattern: "%{tls.version_protocol} %{tls.version}"
      ignore_missing: true
      if: ctx?.json?.event?.tls?.version != "UNDETERMINED"
  - lowercase:
      tag: lowercase_tls_version_protocol
      field: tls.version_protocol
      ignore_missing: true
  - rename:
      tag: rename_json_event_tls_ja3s_hash
      field: json.event.tls.ja3s.hash
      target_field: tls.server.ja3s
      ignore_missing: true
  - rename:
      tag: rename_json_event_tls_ja3_hash
      field: json.event.tls.ja3.hash
      target_field: tls.server.ja3
      ignore_missing: true
  - rename:
      tag: rename_json_event_tls_certificate
      field: json.event.tls.certificate
      target_field: tls.server.certificate
      ignore_missing: true
  - rename:
      tag: rename_tls_server_certificate_chain
      field: tls.server.certificate_chain
      target_field: json.event.tls.chain
      ignore_missing: true
  - rename:
      tag: rename_tls_server_x509_serial_number
      field: tls.server.x509.serial_number
      target_field: json.event.tls.serial
      ignore_missing: true
  - gsub:
      tag: gsub_tls_server_x509_serial_number
      field: tls.server.x509.serial_number
      pattern: ":"
      replacement: ""
      ignore_missing: true
  - date:
      tag: date_json_event_tls_notafter
      field: json.event.tls.notafter
      target_field: tls.server.not_after
      formats:
        - ISO8601
      if: ctx.json?.event?.tls?.notafter != null
  - date:
      tag: date_json_event_tls_notbefore
      field: json.event.tls.notbefore
      target_field: tls.server.not_before
      formats:
        - ISO8601
      if: ctx.json?.event?.tls?.notbefore != null
  - rename:
      tag: rename_tls_server_not_after
      field: tls.server.not_after
      target_field: tls.server.x509.not_after
      ignore_missing: true
  - rename:
      tag: rename_tls_server_not_before
      field: tls.server.not_before
      target_field: tls.server.x509.not_before
      ignore_missing: true

  # TCP
  - rename:
      tag: rename_json_event_tcp_tcp_flags
      field: json.event.tcp.tcp_flags
      target_field: aws.firewall.tcp_flags
      ignore_missing: true
  - script:
      tag: script
      lang: painless
      ignore_failure: true
      if: "ctx?.aws?.firewall?.tcp_flags != null"
      source: |
        if (ctx.aws.firewall.tcp_flags_array == null) {
          ArrayList al = new ArrayList();
          ctx.aws.firewall.put("tcp_flags_array", al);
        }

        def flags = Integer.parseUnsignedInt(ctx.aws.firewall.tcp_flags);

        if ((flags & 0x01) != 0) {
          ctx.aws.firewall.tcp_flags_array.add("fin");
        }
        if ((flags & 0x02) != 0) {
          ctx.aws.firewall.tcp_flags_array.add("syn");
        }
        if ((flags & 0x04) != 0) {
          ctx.aws.firewall.tcp_flags_array.add("rst");
        }
        if ((flags & 0x08) != 0) {
          ctx.aws.firewall.tcp_flags_array.add("psh");
        }
        if ((flags & 0x10) != 0) {
          ctx.aws.firewall.tcp_flags_array.add("ack");
        }
        if ((flags & 0x20) != 0) {
          ctx.aws.firewall.tcp_flags_array.add("urg");
        }

  # Flow
  - rename:
      tag: rename_json_event_netflow
      field: json.event.netflow
      target_field: aws.firewall.flow
      ignore_missing: true
  - rename:
      tag: rename_json_event_flow_id
      field: json.event.flow_id
      target_field: aws.firewall.flow.id
      ignore_missing: true
  - convert:
      tag: convert_aws_firewall_flow_id
      field: aws.firewall.flow.id
      type: string
      ignore_missing: true

  # Related IPs
  - append:
      tag: append_related_hosts
      field: related.hosts
      value: "{{url.domain}}"
      if: ctx.url?.domain != null && ctx.url?.domain != ""
      allow_duplicates: false
  - append:
      tag: append_related_ip
      if: ctx?.source?.ip != null
      field: related.ip
      value: "{{source.ip}}"
      allow_duplicates: false
  - append:
      tag: append_related_ip_1
      if: ctx?.destination?.ip != null
      field: related.ip
      value: "{{destination.ip}}"
      allow_duplicates: false

  # Community ID
  - community_id:
      tag: community_id
      ignore_missing: true
      ignore_failure: true

  # Remove other fields
  - script:
      tag: script_1
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |
        void handleMap(Map map) {
          for (def x : map.values()) {
            if (x instanceof Map) {
                handleMap(x);
            } else if (x instanceof List) {
                handleList(x);
            }
          }
          map.values().removeIf(v -> v == null);
        }
        void handleList(List list) {
          for (def x : list) {
              if (x instanceof Map) {
                  handleMap(x);
              } else if (x instanceof List) {
                  handleList(x);
              }
          }
        }
        handleMap(ctx);
  - remove:
      tag: remove_json
      field: json
      ignore_missing: true
on_failure:
  - set:
      tag: set_event_kind_1
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline '{{{ _ingest.pipeline }}}' failed with message '{{{ _ingest.on_failure_message }}}'
