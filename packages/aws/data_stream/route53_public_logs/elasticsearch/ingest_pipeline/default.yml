---
description: Pipeline for AWS Route53 Logs

processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: '8.11.0'
  - set:
      tag: set_cloud_provider
      field: cloud.provider
      value: aws
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - append:
      tag: append_event_category
      field: event.category
      value: network
  - append:
      tag: append_event_type
      field: event.type
      value: protocol
  - rename:
      tag: rename_message
      field: message
      target_field: event.original
      ignore_missing: true
      if: 'ctx.event?.original == null'
      description: 'Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.'
  - remove:
      tag: remove_message
      field: message
      ignore_missing: true
      if: 'ctx.event?.original != null'
      description: 'The `message` field is no longer required if the document has an `event.original` field.'
  - grok:
      tag: grok_event_original
      field: event.original
      patterns:
        - '%{BASE10NUM} %{TIMESTAMP_ISO8601:_tmp.timestamp} %{DATA:aws.route53.hosted_zone_id} %{DATA:_tmp.question} %{WORD:dns.question.type} %{WORD:dns.response_code} %{WORD:network.transport} %{EDGE_LOCATION:aws.route53.edge_location} %{IP:source.address} (%{SUBNET:aws.route53.edns_client_subnet}|-)'
      pattern_definitions:
        EDGE_LOCATION: '[A-Z]{3}\d+(-[A-Z]+\d+)?'
        SUBNET: '%{IP}/[0-9]+'
  - date:
      tag: date_tmp_timestamp
      field: _tmp.timestamp
      target_field: '@timestamp'
      ignore_failure: true
      formats:
        - ISO8601
  - set:
      tag: set_event_outcome
      field: event.outcome
      value: success
      if: ctx.dns?.response_code == "NOERROR"
  - set:
      tag: set_event_outcome_1
      field: event.outcome
      value: failure
      if: ctx.dns?.response_code != "NOERROR"
  - registered_domain:
      tag: registered_domain_tmp_question
      field: _tmp.question
      target_field: dns.question
      ignore_missing: true
      if: '!ctx._tmp?.question.endsWith("in-addr.arpa")'
  - rename:
      tag: rename_dns_question_domain
      field: dns.question.domain
      target_field: dns.question.name
      ignore_missing: true
  - convert:
      tag: convert_source_address
      field: source.address
      target_field: source.ip
      type: ip
      ignore_missing: true
  - lowercase:
      tag: lowercase_network_transport
      field: network.transport
      ignore_missing: true
  - set:
      tag: set_network_protocol
      field: network.protocol
      value: dns
  - set:
      tag: set_network_type
      field: network.type
      value: ipv4
      if: 'ctx.source?.ip != null && ctx.source?.ip.contains(".")'
  - set:
      tag: set_network_type_1
      field: network.type
      value: ipv6
      if: 'ctx.source?.ip != null && ctx.source?.ip.contains(":")'
  - set:
      tag: set_network_iana_number
      field: network.iana_number
      value: '6'
      if: ctx.network?.transport == "tcp"
  - set:
      tag: set_network_iana_number_1
      field: network.iana_number
      value: '17'
      if: ctx.network?.transport == "udp"
  # IP Geolocation Lookup
  - geoip:
      tag: geoip_source_ip
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  # IP Autonomous System (AS) Lookup
  - geoip:
      tag: geoip_source_ip_1
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      tag: rename_source_as_asn
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      tag: rename_source_as_organization_name
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - append:
      tag: append_related_ip
      field: related.ip
      value: "{{source.ip}}"
      if: ctx.source?.ip != null
  - append:
      tag: append_related_hosts
      field: related.hosts
      value: "{{dns.question.name}}"
      if: ctx.dns?.question?.name != null
  - remove:
      tag: remove
      field:
        - _tmp
      ignore_missing: true
on_failure:
  - set:
      tag: set_event_kind_1
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline '{{{ _ingest.pipeline }}}' failed with message '{{{ _ingest.on_failure_message }}}'
