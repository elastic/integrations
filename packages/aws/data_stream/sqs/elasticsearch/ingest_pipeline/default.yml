---
description: "Pipeline for SQS metrics"

processors:
  - dot_expander:
      tag: dot_expander_all
      field: "*"
      ignore_failure: true
  - set:
      tag: set_cloud_account_name
      field: cloud.account.name
      copy_from: cloud.account.id
      override: false
      ignore_empty_value: true
  - rename:
      tag: rename_aws_sqs_metrics_approximateageofoldestmessage_max
      field: aws.sqs.metrics.ApproximateAgeOfOldestMessage.max
      target_field: aws.sqs.oldest_message_age.sec
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_approximatenumberofmessagesdelayed_avg
      field: aws.sqs.metrics.ApproximateNumberOfMessagesDelayed.avg
      target_field: aws.sqs.messages.delayed
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_approximatenumberofmessagesnotvisible_avg
      field: aws.sqs.metrics.ApproximateNumberOfMessagesNotVisible.avg
      target_field: aws.sqs.messages.not_visible
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_approximatenumberofmessagesvisible_avg
      field: aws.sqs.metrics.ApproximateNumberOfMessagesVisible.avg
      target_field: aws.sqs.messages.visible
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_numberofmessagesdeleted_sum
      field: aws.sqs.metrics.NumberOfMessagesDeleted.sum
      target_field: aws.sqs.messages.deleted
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_numberofmessagesreceived_sum
      field: aws.sqs.metrics.NumberOfMessagesReceived.sum
      target_field: aws.sqs.messages.received
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_numberofmessagessent_sum
      field: aws.sqs.metrics.NumberOfMessagesSent.sum
      target_field: aws.sqs.messages.sent
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_numberofemptyreceives_sum
      field: aws.sqs.metrics.NumberOfEmptyReceives.sum
      target_field: aws.sqs.empty_receives
      ignore_missing: true
  - rename:
      tag: rename_aws_sqs_metrics_sentmessagesize_avg
      field: aws.sqs.metrics.SentMessageSize.avg
      target_field: aws.sqs.sent_message_size.bytes
      ignore_missing: true
  - remove:
      tag: remove
      field:
        - aws.sqs.metrics
      if: ctx.agent?.type != "firehose"
      ignore_missing: true
on_failure:
  - set:
      tag: set_event_kind
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_error_message
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}in pipeline '{{{ _ingest.pipeline }}}' failed with message '{{{ _ingest.on_failure_message }}}'
