    title: AWS CloudTrail
    provider_permissions:
      - provider: aws
        description: Identify CloudTrail trails so their delivered logs can be located.
        permissions:
          - name: cloudtrail:DescribeTrails
            description: List configured CloudTrail trails.
          - name: cloudtrail:GetTrailStatus
            description: Read the delivery status of CloudTrail trails.
          - name: cloudtrail:LookupEvents
            description: Look up CloudTrail management events.
    description: Collect AWS CloudTrail logs with Elastic Agent
    data_streams:
      - cloudtrail
    categories:
      - security
    inputs:
      - type: aws-s3
        title: Collect CloudTrail logs from S3
        description: Collecting logs from CloudTrail using aws-s3 input
        input_group: logs
        provider_permissions:
          - provider: aws
            description: Read delivered log objects from S3, using SQS queue notifications when configured.
            permissions:
              - name: s3:GetObject
                description: Read log objects from the configured S3 bucket.
              - name: s3:ListBucket
                description: List objects in the configured S3 bucket.
              - name: s3:GetBucketLocation
                description: Resolve the region of the configured S3 bucket.
              - name: sqs:ReceiveMessage
                description: Receive S3 object-created notifications from the configured SQS queue.
              - name: sqs:DeleteMessage
                description: Delete processed messages from the SQS queue.
              - name: sqs:ChangeMessageVisibility
                description: Extend the visibility timeout while processing SQS messages.
              - name: sqs:GetQueueAttributes
                description: Read attributes of the configured SQS queue.
      - type: aws-cloudwatch
        title: Collect CloudTrail logs from CloudWatch
        description: Collecting logs from CloudTrail using aws-cloudwatch input
        input_group: logs
        provider_permissions:
          - provider: aws
            description: Read log events from CloudWatch Logs.
            permissions:
              - name: logs:DescribeLogGroups
                description: Discover CloudWatch log groups to collect from.
              - name: logs:DescribeLogStreams
                description: Enumerate log streams within a log group.
              - name: logs:FilterLogEvents
                description: Read log events matching the configured filters.
              - name: logs:GetLogEvents
                description: Read log events from a CloudWatch log stream.
    icons:
      - src: /img/logo_cloudtrail.svg
        title: AWS Cloudtrail logo
        size: 32x32
        type: image/svg+xml
    screenshots:
      - src: /img/filebeat-aws-cloudtrail.png
        title: filebeat aws cloudtrail
        size: 1702x1063
        type: image/png
