format_version: 3.6.4
name: aws
title: AWS
version: 6.20.0
description: Collect logs and metrics from Amazon Web Services (AWS) with Elastic Agent.
type: integration
categories:
  - aws
  - cloud
  # Added observability category as AWS integration collects metrics and logs from various AWS services, which are essential for monitoring and observability.
  - observability
  # Added security category as AWS integration collects security-relevant data like CloudTrail logs, GuardDuty findings, and other security monitoring data
  - security
  # Added containers category to match policy template categories (ECS metrics template references containers subcategory)
  - containers
  # Added network category to match policy template categories (VPC Flow, Transit Gateway, and NAT Gateway templates reference network subcategory)
  - network
  # Added datastore category to match policy template categories (DynamoDB, RDS, Redshift, and other database templates reference datastore subcategory)
  - datastore
conditions:
  elastic:
    subscription: basic
  kibana:
    version: "^8.19.4 || ^9.2.1"
provider_permissions:
  - provider: aws
    description: >-
      Baseline permissions required by every AWS data stream. Metric data streams
      read CloudWatch metrics, and all data streams resolve the account identity,
      enumerate regions, and collect resource tags for enrichment.
    roles:
      - name: SecurityAudit
        id: arn:aws:iam::aws:policy/SecurityAudit
        description: >-
          AWS managed policy granting read-only access to configuration and
          metadata across services. Covers the describe/list calls used for
          resource discovery and tag enrichment across the integration.
    permissions:
      - name: sts:GetCallerIdentity
        description: Resolve the AWS account ID associated with the configured credentials.
      - name: iam:ListAccountAliases
        description: Resolve the human-readable account alias used to enrich events.
      - name: ec2:DescribeRegions
        description: Discover the set of regions to collect from when none are configured.
      - name: tag:GetResources
        description: Collect resource tags (resourcegroupstaggingapi) for metric and log enrichment.
      - name: cloudwatch:ListMetrics
        description: Enumerate the CloudWatch metrics published by the monitored services.
      - name: cloudwatch:GetMetricData
        description: Read CloudWatch metric values for all metric data streams.
      - name: cloudwatch:GetMetricStatistics
        description: Read aggregated CloudWatch metric statistics for metric data streams.
screenshots:
  - src: /img/metricbeat-aws-overview.png
    title: metricbeat aws overview
    size: 3848x2440
    type: image/png
icons:
  - src: /img/logo_aws.svg
    title: logo aws
    size: 32x32
    type: image/svg+xml
vars:
  - name: shared_credential_file
    type: text
    title: Shared Credential File
    multi: false
    required: false
    show_user: false
    description: Directory of the shared credentials file
  - name: credential_profile_name
    type: text
    title: Credential Profile Name
    multi: false
    required: false
    show_user: false
  - name: access_key_id
    type: password
    title: Access Key ID
    secret: true
    multi: false
    required: false
    show_user: true
  - name: secret_access_key
    type: password
    title: Secret Access Key
    secret: true
    multi: false
    required: false
    show_user: true
  - name: session_token
    type: password
    title: Session Token
    secret: true
    multi: false
    required: false
    show_user: true
  - name: role_arn
    type: text
    title: Role ARN
    multi: false
    required: false
    show_user: false
  - name: external_id
    type: text
    title: External ID
    multi: false
    required: false
    show_user: false
    description: External ID to use when assuming a role in another account, see [the AWS documentation for use of external IDs](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_create_for-user_externalid.html)
  - name: default_region
    type: text
    title: Default AWS Region
    multi: false
    required: false
    show_user: false
    default: ""
    description: Default region to use prior to connecting to region specific services/endpoints if no AWS region is set from environment variable, credentials or instance profile. If none of the above are set and no default region is set as well, `us-east-1` is used. A region, either from environment variable, credentials or instance profile or from this default region setting, needs to be set when using regions in non-regular AWS environments such as AWS China or US Government Isolated.
  - name: proxy_url
    type: text
    title: Proxy URL
    multi: false
    required: false
    show_user: false
    description: URL to proxy connections in the form of http\[s\]://<user>:<password>@<server name/ip>:<port>
policy_templates:
  - name: awshealth
    title: AWS Health
    provider_permissions:
      - provider: aws
        description: Read AWS Health events and the entities they affect.
        permissions:
          - name: health:DescribeEvents
            description: List AWS Health events affecting the account.
          - name: health:DescribeEventDetails
            description: Retrieve details for AWS Health events.
          - name: health:DescribeAffectedEntities
            description: List entities affected by AWS Health events.
    description: Collect AWS Health metrics with Elastic Agent (experimental)
    data_streams:
      - awshealth
    categories:
      - observability
    inputs:
      - type: aws/metrics
        title: Collect AWS Health metrics (experimental)
        description: Collect AWS Health metrics (experimental).
        input_group: metrics
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        release: beta
        organization: observability
        division: engineering
        team: obs-infraobs-integrations
    icons:
      - src: /img/logo_aws_health.svg
        title: AWS Health logo
        size: 32x32
        type: image/svg+xml
    screenshots:
      - src: /img/metricbeat-aws-awshealth.png
        title: AWS Health overview
        size: 2640x2240
        type: image/png
  - name: billing
    title: AWS Billing
    provider_permissions:
      - provider: aws
        description: Read cost data from Cost Explorer in addition to the CloudWatch billing metrics.
        permissions:
          - name: ce:GetCostAndUsage
            description: Retrieve cost and usage amounts from AWS Cost Explorer.
          - name: cur:DescribeReportDefinitions
            description: Discover configured Cost and Usage Report definitions.
          - name: budgets:ViewBudget
            description: Read configured budgets for billing context.
    description: Collect billing metrics with Elastic Agent
    data_streams:
      - billing
    categories:
      - observability
    inputs:
      - type: aws/metrics
        title: Collect billing metrics
        description: Collect billing metrics using AWS CloudWatch
        input_group: metrics
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        release: beta
        organization: observability
        division: engineering
        team: obs-infraobs-integrations
    icons:
      - src: /img/logo_billing.svg
        title: AWS Billing logo
        size: 32x32
        type: image/svg+xml
    screenshots:
      - src: /img/metricbeat-aws-billing-overview.png
        title: metricbeat aws billing overview
        size: 2640x2240
