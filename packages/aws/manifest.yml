        permissions:
          - name: logs:DescribeLogGroups
            description: Discover CloudWatch log groups to collect logs from.
          - name: cloudwatch:ListMetrics
            description: Enumerate available CloudWatch metrics.
    description: Use this integration to collect logs and metrics from Amazon CloudWatch with Elastic Agent, where no out of the box integration is available.
    data_streams:
      - cloudwatch_logs
      - cloudwatch_metrics
    categories:
      - observability
      - monitoring
    inputs:
      - type: aws-cloudwatch
        title: Collect logs from CloudWatch
