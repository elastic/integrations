title: Collect threat logs from SentinelOne
type: logs
streams:
  - input: httpjson
    title: Threat
    description: Collect threat logs from SentinelOne.
    template_path: httpjson.yml.hbs
    vars:
      - name: initial_interval
        type: text
        title: Initial Interval
        description: "How far back to pull the threats from SentinelOne. NOTE: Supported units for this parameter are h/m/s."
        multi: false
        required: true
        show_user: true
        default: 24h
      - name: interval
        type: text
        title: Interval
        description: "Duration between requests to the SentinelOne API. NOTE: Supported units for this parameter are h/m/s."
        default: 30s
        multi: false
        required: true
        show_user: true
      - name: enable_star_rule_enrichment
        type: bool
        title: Enable Threat Timeline Collection
        description: >-
          When enabled, each threat is followed by paginated requests to the threat timeline endpoint (`/web/api/v2.1/threats/{threat_id}/timeline`). For each timeline history entry, one document is emitted containing the full threat response with that entry nested under `timeline`. Threats whose timeline returns HTTP 200 with an empty `data` array emit a single threat document. If the timeline endpoint returns HTTP 404 (for example, missing permissions or an unavailable feature), the threat document is still emitted and collection advances to the next threat. Disable to collect threats from the list endpoint only.
        default: false
        multi: false
        required: true
        show_user: true
      - name: max_executions
        type: integer
        title: Maximum Executions
        description: >-
          Maximum number of CEL program re-evaluations per collection interval. Threat enrichment makes one timeline API call per threat, so large environments may need a higher budget than the input default of 1000. Set to 0 for unlimited.
        default: 1000
        multi: false
        required: true
        show_user: false
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - sentinel_one-threat
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
