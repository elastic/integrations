title: "Email logs"
type: logs
streams:
  - input: cel
    title: "Email logs via API"
    description: |-
      Collect email logs from Proofpoint 365 Total Protection
    template_path: cel.yml.hbs
    vars:
      - name: data_stream.dataset
        type: text
        title: "Dataset name"
        description: |-
          Dataset to write data to. Changing the dataset will send the data to a different index.
        required: true
        show_user: true
        default: proofpoint_365totalprotection.email
      - name: apikey
        type: password
        title: "API Key"
        description: |-
          The API Key for Control Panel API authentication (https://cp.proofpoint.com -> My Settings -> API Token -> Create token).
        required: true
        show_user: true
        secret: true
      - name: domain_or_email
        type: text
        title: "Domain or Email"
        description: |-
          The domain name (e.g., example.com) or email address to monitor.
        required: true
        show_user: true
      - name: url
        type: text
        title: "Proofpoint API URL"
        description: |-
          The base URL for the Proofpoint 365 Total Protection API.
        required: true
        show_user: false
        default: https://cp.proofpoint.com
      - name: interval
        type: text
        title: "Interval"
        description: |-
          Polling interval (e.g. 5m, 10m, 15m).
        default: 5m
        required: true
        show_user: true
      - name: page_size
        type: integer
        title: "Page size"
        description: |-
          Maximum number of emails to fetch per API request. The integration paginates automatically when more results are available.
        default: 5000
        required: true
        show_user: false
      - name: enable_request_tracer
        type: bool
        title: "Enable request tracing"
        description: |-
          Enable logging of HTTP requests and responses to the agent logs. Use for debugging only; produces large volumes of data.
        default: false
        required: false
        show_user: false
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - proofpoint_365totalprotection-email
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: |-
          Preserves a raw copy of the original event, added to the field `event.original`.
        type: bool
        multi: false
        default: false
      - name: processors
        type: yaml
        title: "Processors"
        description: |-
          Processors to run on the data before indexing.
        multi: false
        required: false
        show_user: false
