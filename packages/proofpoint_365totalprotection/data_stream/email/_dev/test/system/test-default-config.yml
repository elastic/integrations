input: cel
service: proofpoint_365totalprotection_api_mock
data_stream:
  vars:
    apikey: test-api-key-12345
    domain_or_email: test@example.com
    url: http://{{Hostname}}:{{Port}}
    interval: 5m
    page_size: 1
    enable_request_tracer: false
numeric_keyword_fields:
  - proofpoint.email.classification.id
  - proofpoint.email.crypt_type_in.id
  - proofpoint.email.crypt_type_out.id
  - proofpoint.email.status.id
assert:
  hit_count: 2
