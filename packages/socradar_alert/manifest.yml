format_version: 3.2.0
name: socradar_alert
title: SocRadar Integration
version: 0.0.1
description: Collect security incidents and alarms from SocRadar API
type: integration
icons:
  - src: /img/logo.svg
    title: SOCRadar
    size: 32x32
    type: image/svg+xml
screenshots:
  - src: /img/socradar-alert-overview.png
    title: SOCRadar Incidents Dashboard
    size: 1280x720
    type: image/png
categories:
  - security
  - threat_intel
conditions:
  kibana:
    version: ^8.18.0 || ^9.0.0
  elastic:
    subscription: basic
    capabilities:
      - security
policy_templates:
  - name: socradar
    title: SocRadar Incidents
    description: Collect incidents from SocRadar API
    data_streams:
      - incidents
    inputs:
      - type: cel
        title: Collect SocRadar incidents via API
        description: Collecting incidents from SocRadar API
        vars:
          - name: api_key
            type: password
            title: API Key
            description: Your SocRadar API Key
            required: true
            show_user: true
            secret: true
          - name: company_id
            type: text
            title: Company ID
            description: Your SocRadar Company ID (e.g., 330)
            required: true
            show_user: true
          - name: api_url
            type: text
            title: API URL
            description: SocRadar API base URL
            default: https://platform.socradar.com
            required: true
            show_user: true
          - name: initial_lookback
            type: text
            title: Initial Lookback Period
            description: How far back to fetch alarms on first installation (e.g., 72h for 72 hours, 720h for 30 days, 8760h for 1 year)
            default: 72h
            required: true
            show_user: true
          - name: interval
            type: text
            title: Polling Interval
            description: How often to check for new alarms
            default: 5m
            required: false
            show_user: true
          - name: limit
            type: integer
            title: Records per page
            description: Number of alarms to fetch per API call
            default: 100
            required: false
            show_user: false

owner:
  github: elastic/security-service-integrations
  type: elastic