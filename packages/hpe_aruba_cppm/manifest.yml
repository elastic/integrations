name: hpe_aruba_cppm
title: HPE Aruba ClearPass Policy Manager
version: "0.1.0"
description: Collect logs from HPE Aruba ClearPass Policy Manager with Elastic Agent.
type: integration
icons:
  - src: /img/aruba-networks-logo.svg
    title: Aruba Networks Logo
    size: 800x800
    type: image/svg+xml
format_version: "3.0.3"
categories:
  - config_management
  - network
  - security
conditions:
  kibana:
    version: "^8.13.0 || ^9.0.0"
policy_templates:
  - name: hpe_aruba_cppm
    title: HPE Aruba ClearPass Policy Manager logs
    description: Collect logs from HPE Aruba ClearPass Policy Manager instances
    inputs:
      - type: udp
        title: "Collect HPE Aruba ClearPass Policy Manager logs (input: udp)"
        description: "Collecting logs from HPE Aruba ClearPass Policy Manager instances (input: udp)"
      - type: tcp
        title: "Collect HPE Aruba ClearPass Policy Manager logs (input: tcp)"
        description: "Collecting logs from HPE Aruba ClearPass Policy Manager instances (input: tcp)"
owner:
  github: elastic/integration-experience
  type: community
