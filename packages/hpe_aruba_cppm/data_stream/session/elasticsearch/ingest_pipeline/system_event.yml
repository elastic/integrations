---
description: Pipeline for parsing HPE Aruba ClearPass Policy Manager system events
processors:
  - set:
      field: event.kind
      value: event
  - append:
      field: event.category
      value:
        - host
      allow_duplicates: false
  - append:
      field: event.type
      value:
        - info
      allow_duplicates: false
  - set:
      field: event.action
      copy_from: aruba_cppm.cppm_system_event.action
      ignore_empty_value: true
      if: ctx.event?.action == null && ctx.aruba_cppm?.cppm_system_event?.action != null
  - set:
      field: event.reason
      copy_from: aruba_cppm.cppm_system_event.category
      ignore_empty_value: true
      if: ctx.event?.reason == null && ctx.aruba_cppm?.cppm_system_event?.category != null
  - set:
      field: log.level
      copy_from: aruba_cppm.cppm_system_event.level
      ignore_empty_value: true
      if: ctx.log?.level == null && ctx.aruba_cppm?.cppm_system_event?.level != null
  - set:
      field: log.logger
      copy_from: aruba_cppm.cppm_system_event.source
      ignore_empty_value: true
      if: ctx.log?.logger == null && ctx.aruba_cppm?.cppm_system_event?.source != null
  - set:
      field: message
      value: 'System event {{{aruba_cppm.cppm_system_event.action}}} from {{{aruba_cppm.cppm_system_event.source}}}'
      if: ctx.message == null && ctx.aruba_cppm?.cppm_system_event?.action != null && ctx.aruba_cppm?.cppm_system_event?.source != null
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}in pipeline '{{{ _ingest.pipeline }}}'
        failed with message '{{{ _ingest.on_failure_message }}}'
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false