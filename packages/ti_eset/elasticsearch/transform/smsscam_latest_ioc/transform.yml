_meta:
  fleet_transform_version: 0.4.0
  managed: true
description: Latest ESET SMS scam IoC data
dest:
  index: logs-ti_eset_latest.dest_smsscam-3
  aliases:
    - alias: logs-ti_eset_latest.smsscam
      move_on_creation: true
frequency: 30s
latest:
  sort: '@timestamp'
  unique_key:
    - event.dataset
    - eset.id
retention_policy:
  time:
    field: eset.valid_until
    max_age: 1m
source:
  index:
    - logs-ti_eset.smsscam-*
sync:
  time:
    delay: 120s
    field: event.ingested
settings:
  unattended: true
