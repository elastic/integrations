---
description: Parse HarfangLab syslog injected thread telemetry events.
processors:
  - pipeline:
      name: '{{ IngestPipeline "pipeline-common-agent" }}'
      tag: map_common_agent
  - rename:
      field: harfang_labs.process_id
      target_field: process.pid
      ignore_missing: true
      tag: rename_process_pid
  - rename:
      field: harfang_labs.process_guid
      target_field: process.entity_id
      ignore_missing: true
      tag: rename_process_entity_id
  - rename:
      field: harfang_labs.process_image
      target_field: process.executable
      ignore_missing: true
      tag: rename_process_executable
  - rename:
      field: harfang_labs.thread_id
      target_field: harfang_labs.event.injectedthread.thread_id
      ignore_missing: true
      tag: rename_thread_id
  - rename:
      field: harfang_labs.thread_uid
      target_field: harfang_labs.event.injectedthread.thread_uid
      ignore_missing: true
      tag: rename_thread_uid
  - rename:
      field: harfang_labs.thread_sha256
      target_field: harfang_labs.event.injectedthread.thread_sha256
      ignore_missing: true
      tag: rename_thread_sha256
  - rename:
      field: harfang_labs.start_address
      target_field: harfang_labs.event.injectedthread.start_address
      ignore_missing: true
      tag: rename_start_address
  - rename:
      field: harfang_labs.start_address_string
      target_field: harfang_labs.event.injectedthread.start_address_string
      ignore_missing: true
      tag: rename_start_address_string
  - rename:
      field: harfang_labs.region_size
      target_field: harfang_labs.event.injectedthread.region_size
      ignore_missing: true
      tag: rename_region_size
  - rename:
      field: harfang_labs.region_type
      target_field: harfang_labs.event.injectedthread.region_type
      ignore_missing: true
      tag: rename_region_type
  - rename:
      field: harfang_labs.region_protect
      target_field: harfang_labs.event.injectedthread.region_protect
      ignore_missing: true
      tag: rename_region_protect
  - rename:
      field: harfang_labs.region_state
      target_field: harfang_labs.event.injectedthread.region_state
      ignore_missing: true
      tag: rename_region_state
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_event_category_process
      value: process
  - append:
      field: event.category
      tag: append_event_category_intrusion_detection
      value: intrusion_detection
  - append:
      field: event.type
      tag: append_event_type_start
      value: start
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
  - set:
      field: event.outcome
      tag: set_event_outcome
      value: unknown
  - remove:
      field:
        - _temp
      ignore_missing: true
      tag: remove_temp_fields
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
