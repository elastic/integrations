---
description: Parse HarfangLab syslog Windows event log events.
processors:
  - pipeline:
      name: '{{ IngestPipeline "pipeline-common-agent" }}'
      tag: map_common_agent
  - rename:
      field: harfang_labs.event_id
      target_field: winlog.event_id
      ignore_missing: true
      tag: rename_winlog_event_id
  - rename:
      field: harfang_labs.source_name
      target_field: winlog.provider_name
      ignore_missing: true
      tag: rename_winlog_provider_name
  - rename:
      field: harfang_labs.log_name
      target_field: winlog.channel
      ignore_missing: true
      tag: rename_winlog_channel
  - rename:
      field: harfang_labs.provider_guid
      target_field: winlog.provider_guid
      ignore_missing: true
      tag: rename_winlog_provider_guid
  - rename:
      field: harfang_labs.record_number
      target_field: winlog.record_id
      ignore_missing: true
      tag: rename_winlog_record_id
  - rename:
      field: harfang_labs.computer_name
      target_field: winlog.computer_name
      ignore_missing: true
      tag: rename_winlog_computer_name
  - rename:
      field: harfang_labs.process_id
      target_field: winlog.process.pid
      ignore_missing: true
      tag: rename_winlog_process_pid
  - rename:
      field: harfang_labs.thread_id
      target_field: winlog.process.thread.id
      ignore_missing: true
      tag: rename_winlog_thread_id
  - rename:
      field: harfang_labs.level
      target_field: winlog.level
      ignore_missing: true
      tag: rename_winlog_level
  - rename:
      field: harfang_labs.task
      target_field: winlog.task
      ignore_missing: true
      tag: rename_winlog_task
  - rename:
      field: harfang_labs.opcode
      target_field: winlog.opcode
      ignore_missing: true
      tag: rename_winlog_opcode
  - rename:
      field: harfang_labs.event_data
      target_field: winlog.event_data
      ignore_missing: true
      tag: rename_winlog_event_data
  - rename:
      field: harfang_labs.user_data
      target_field: winlog.user_data
      ignore_missing: true
      tag: rename_winlog_user_data
  - rename:
      field: harfang_labs.user.name
      target_field: user.name
      ignore_missing: true
      tag: rename_user_name
  - rename:
      field: harfang_labs.user.domain
      target_field: user.domain
      ignore_missing: true
      tag: rename_user_domain
  - rename:
      field: harfang_labs.user.identifier
      target_field: user.id
      ignore_missing: true
      tag: rename_user_id
  - rename:
      field: harfang_labs.type
      target_field: harfang_labs.event.eventlog.type
      ignore_missing: true
      tag: rename_eventlog_type
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_event_category_host
      value: host
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
  - set:
      field: event.outcome
      tag: set_event_outcome
      value: unknown
  - append:
      field: related.user
      tag: append_user_name_to_related
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null
  - remove:
      field:
        - _temp
        - winlog.opcode
        - winlog.task
      ignore_missing: true
      tag: remove_temp_fields
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
