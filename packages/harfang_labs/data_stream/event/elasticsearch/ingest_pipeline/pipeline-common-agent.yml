---
description: Map common HarfangLab agent block fields to ECS.
processors:
  - set:
      field: agent.id
      tag: set_agent_id
      copy_from: harfang_labs.agent.agentid
      override: true
      if: ctx.harfang_labs?.agent?.agentid != null
  - remove:
      field: harfang_labs.agent.agentid
      tag: remove_harfang_labs_agent_agentid
      ignore_missing: true
  - set:
      field: host.hostname
      tag: set_host_hostname
      copy_from: harfang_labs.agent.hostname
      override: true
      if: ctx.harfang_labs?.agent?.hostname != null
  - set:
      field: host.name
      tag: set_host_name
      copy_from: host.hostname
      if: ctx.host?.hostname != null
  - rename:
      field: harfang_labs.agent.dnsdomainname
      target_field: host.domain
      ignore_missing: true
      tag: rename_host_dns_domain
  - set:
      field: host.domain
      tag: set_host_domain_fallback
      copy_from: harfang_labs.agent.domainname
      if: ctx.host?.domain == null && ctx.harfang_labs?.agent?.domainname != null
  - rename:
      field: harfang_labs.agent.ostype
      target_field: host.os.platform
      ignore_missing: true
      tag: rename_host_os_platform
  - lowercase:
      field: host.os.platform
      tag: lowercase_host_os_platform
      ignore_missing: true
      if: ctx.host?.os?.platform != null
  - rename:
      field: harfang_labs.agent.osproducttype
      target_field: host.os.full
      ignore_missing: true
      tag: rename_host_os_full
  - rename:
      field: harfang_labs.agent.osversion
      target_field: host.os.version
      ignore_missing: true
      tag: rename_host_os_version
  - append:
      field: host.ip
      tag: append_host_ip
      value: '{{{harfang_labs.agent.ipaddress}}}'
      allow_duplicates: false
      if: ctx.harfang_labs?.agent?.ipaddress != null
  - rename:
      field: harfang_labs.tenant
      target_field: organization.id
      ignore_missing: true
      tag: rename_tenant
  - script:
      lang: painless
      tag: copy_event_create_date
      description: Copy @event_create_date to a normalized temporary field for date parsing.
      if: ctx.harfang_labs != null && ctx.harfang_labs.containsKey('@event_create_date')
      source: |-
        ctx._temp = ctx._temp ?: [:];
        ctx._temp.event_create_date = ctx.harfang_labs['@event_create_date'];
  - date:
      field: _temp.event_create_date
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_event_create_date
      if: ctx._temp?.event_create_date != null
  - script:
      lang: painless
      tag: copy_harfang_timestamp
      description: Copy @timestamp from harfang_labs to a normalized temporary field for date parsing.
      if: ctx._temp?.event_create_date == null && ctx.harfang_labs != null && ctx.harfang_labs.containsKey('@timestamp')
      source: |-
        ctx._temp = ctx._temp ?: [:];
        ctx._temp.harfang_timestamp = ctx.harfang_labs['@timestamp'];
  - date:
      field: _temp.harfang_timestamp
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_harfang_timestamp
      if: ctx._temp?.harfang_timestamp != null
  - foreach:
      field: host.ip
      tag: append_host_ip_to_related
      if: ctx.host?.ip instanceof List
      processor:
        append:
          field: related.ip
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - append:
      field: related.hosts
      tag: append_host_hostname_to_related
      value: '{{{host.hostname}}}'
      allow_duplicates: false
      if: ctx.host?.hostname != null
  - append:
      field: related.hosts
      tag: append_host_name_to_related
      value: '{{{host.name}}}'
      allow_duplicates: false
      if: ctx.host?.name != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
