- name: input.type
  type: keyword
  description: Input type.
- name: log.source.address
  type: keyword
  description: Source address from which the log event was read or received.
- name: log.syslog
  type: group
  description: Syslog metadata added by the Elastic Agent syslog processor.
  fields:
    - name: priority
      type: long
    - name: severity
      type: long
    - name: facility
      type: long
    - name: version
      type: keyword
    - name: hostname
      type: keyword
    - name: appname
      type: keyword
    - name: procid
      type: keyword
    - name: msgid
      type: keyword
- name: _conf
  type: group
  description: Configuration metadata propagated from the agent stream template.
  fields:
    - name: tz_offset
      type: keyword
      description: Timezone offset applied to syslog timestamps without an explicit timezone.
