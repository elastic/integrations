        - name: agent_count
          type: long
        - name: rule_count
          type: long
        - name: agents
          type: nested
          fields:
            - name: id
              type: keyword
            - name: hostname
              type: keyword
            - name: agent_id
              type: keyword
            - name: agent_hostname
              type: keyword
            - name: agent_ostype
              type: keyword
            - name: security_event_count
              type: long
            - name: domainname
              type: keyword
            - name: osproducttype
              type: keyword
            - name: ostype
              type: keyword
            - name: ipaddress
