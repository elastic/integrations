              type: keyword
            - name: rule_id
              type: keyword
            - name: rule_level
              type: keyword
            - name: security_event_count
              type: long
        - name: top_agents
          type: nested
          fields:
            - name: agent_hostname
              type: keyword
            - name: agent_id
              type: keyword
        - name: top_impacted_users
          type: nested
          fields:
            - name: user_name
              type: keyword
        - name: top_rules
          type: nested
          fields:
            - name: rule_name
              type: keyword
        - name: note
          type: group
          fields:
            - name: title
              type: keyword
            - name: content
              type: text
            - name: creation_date
              type: date
            - name: last_update
              type: date
    - name: agent
      type: group
      fields:
        - name: id
          type: keyword
        - name: status
          type: keyword
        - name: online_status
          type: keyword
        - name: version
          type: keyword
        - name: domain
          type: keyword
        - name: policy_name
          type: keyword
        - name: policy_id
          type: keyword
        - name: groupname
          type: keyword
        - name: update_status
          type: keyword
        - name: first_seen
          type: date
        - name: last_seen
          type: date
        - name: install_date
          type: date
        - name: os_build
          type: long
        - name: external_ip
