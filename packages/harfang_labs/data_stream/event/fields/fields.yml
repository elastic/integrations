        - name: cpu_count
          type: long
        - name: cpu_frequency
          type: long
        - name: total_memory
          type: double
        - name: avg_cpu
          type: double
        - name: avg_memory
          type: double
        - name: isolation_state
          type: boolean
        - name: isolation_policy
          type: keyword
        - name: group_count
          type: long
        - name: groups
          type: nested
          fields:
            - name: id
              type: keyword
            - name: name
              type: keyword
        - name: policy
          type: group
          fields:
