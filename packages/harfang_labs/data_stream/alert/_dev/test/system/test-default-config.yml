wait_for_data_timeout: 1m
input: cel
service: harfang_labs-alert-mock
vars:
  url: http://{{Hostname}}:{{Port}}
  api_token: fake_token
data_stream:
  vars:
    interval: 2s
    initial_interval: 720h
    page_size: 2
    alert_statuses: new,investigating
    alert_types: sigma,yara,hlai,vt,ransom,ioc,glimps,orion
    alert_levels: low,medium,high,critical
    preserve_original_event: true
    enable_request_tracer: false
assert:
  hit_count: 6
