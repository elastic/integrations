title: "alert"
type: logs
streams:
  - input: cel
    title: HarfangLab Alerts
    description: Collect security alerts from the HarfangLab EDR REST API.
    template_path: cel.yml.hbs
    vars:
      - name: interval
        type: text
        title: Interval
        description: How often to poll the HarfangLab API for new alerts.
        required: true
        show_user: true
        default: 5m
      - name: initial_interval
        type: text
        title: Initial Interval
        description: Lookback window on the first poll (e.g. 24h).
        required: false
        show_user: true
        default: 24h
      - name: page_size
        type: integer
        title: Page Size
        description: Number of alerts to request per page (DRF limit parameter).
        required: false
        show_user: false
        default: 100
      - name: alert_statuses
        type: text
        title: Alert Statuses
        description: Comma-separated alert status filter passed to the API.
        required: false
        show_user: true
        default: new,investigating
      - name: alert_types
        type: text
        title: Alert Types
        description: Comma-separated alert type filter passed to the API.
        required: false
        show_user: true
        default: sigma,yara,hlai,vt,ransom,ioc,glimps,orion
      - name: alert_levels
        type: text
        title: Alert Levels
        description: Comma-separated severity filter passed to the API.
        required: false
        show_user: true
        default: low,medium,high,critical
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - forwarded
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: false
        show_user: true
        default: false
      - name: enable_request_tracer
        type: bool
        title: Enable Request Tracer
        description: Log HTTP requests and responses to the agent filesystem for debugging.
        required: false
        show_user: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        description: Processors to apply to events before they are shipped.
        required: false
        show_user: false
elasticsearch:
  index_template:
    mappings:
      subobjects: false
