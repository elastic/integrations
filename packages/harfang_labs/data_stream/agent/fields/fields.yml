- name: host.user.name
  type: keyword
  description: Logged-in user name on the endpoint.
- name: host.user.domain
  type: keyword
  description: Logged-in user domain on the endpoint.
- name: harfang_labs
  type: group
  fields:
    - name: agent
      type: group
      fields:
        - name: id
          type: keyword
          description: HarfangLab agent UUID.
        - name: status
          type: keyword
          description: Agent online status (online/offline).
        - name: online_status
          type: keyword
          description: Agent connectivity status when distinct from status.
        - name: version
          type: keyword
          description: HarfangLab EDR agent client version.
        - name: domain
          type: keyword
          description: Windows domain or NetBIOS domain name.
        - name: policy_name
          type: keyword
          description: Assigned policy display name.
        - name: policy_id
          type: keyword
          description: Assigned policy identifier.
        - name: groupname
          type: keyword
          description: Primary agent group name.
        - name: update_status
          type: keyword
          description: Agent update status when reported by the API.
        - name: first_seen
          type: date
          description: Timestamp when the agent was first observed.
        - name: last_seen
          type: date
          description: Timestamp when the agent was last seen.
        - name: install_date
          type: date
          description: Agent installation date when reported by the API.
        - name: os_build
          type: long
          description: OS build number reported by the agent.
        - name: external_ip
          type: ip
          description: External IP address reported by the agent.
        - name: cpu_count
          type: long
          description: Number of CPU cores on the endpoint.
        - name: cpu_frequency
          type: long
          description: CPU frequency in MHz.
        - name: total_memory
          type: double
          description: Total system memory in bytes.
        - name: avg_cpu
          type: double
          description: Average CPU utilization percentage.
        - name: avg_memory
          type: double
          description: Average memory utilization percentage.
        - name: isolation_state
          type: boolean
          description: Whether the endpoint is network-isolated.
        - name: isolation_policy
          type: keyword
          description: Isolation policy applied to the endpoint.
        - name: group_count
          type: long
          description: Number of agent groups the endpoint belongs to.
        - name: groups
          type: nested
          description: Agent group memberships.
          fields:
            - name: id
              type: keyword
            - name: name
              type: keyword
        - name: policy
          type: group
          description: Assigned policy metadata.
          fields:
            - name: id
              type: keyword
            - name: name
              type: keyword
            - name: revision
              type: long
        - name: effective_policy_id
          type: keyword
          description: Effective policy identifier after inheritance.
        - name: effective_policy_revision
          type: long
          description: Effective policy revision after inheritance.
        - name: antivirus
          type: group
          description: Antivirus integration metadata.
          fields:
            - name: name
              type: keyword
            - name: version
              type: keyword
            - name: profile
              type: keyword
        - name: tenant
          type: keyword
          description: HarfangLab tenant identifier.
        - name: subnet
          type: keyword
          description: Subnet associated with the endpoint.
