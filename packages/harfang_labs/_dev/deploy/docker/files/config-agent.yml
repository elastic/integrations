  # Health check (test-api.py Step 1)
  - path: /api/version
    methods: ['GET']
    request_headers:
      Authorization:
        - 'Token fake_token'
      Accept:
        - 'application/json'
    responses:
      - status_code: 200
        headers:
          Content-Type:
