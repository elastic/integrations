skip:
  reason: "Requires real AWS credentials to verify integration permissions"
  link: https://github.com/elastic/security-team/issues/16017
vars:
  identity_federation_id: system-test-cc
  identity_federation_name: System Test Connector
  verification_id: system-test-verify
  verification_type: on_demand
  # Provider
  provider: aws
  account_type: single-account
  # Credentials
  credentials_role_arn: arn:aws:iam::123456789012:role/SystemTestRole
  credentials_external_id: system-test-external-id
  # Policies in receiver shape — single target.
  policies: |
    - policy_id: system-test-policy
      policy_name: Verifier-Policy-System-Test-Connector-abc12345
      integrations:
        - policy_template: cloudtrail
          package_name: aws
          package_policy_id: system-test-pp
          package_title: AWS
          package_version: "2.17.0"
