# newer versions go on top
- version: "0.0.1"
  changes:
    - description: >-
        Remove `namespace` from receiver configuration. Namespace and data stream routing
        attributes (`data_stream.type`, `data_stream.dataset`, `data_stream.namespace`,
        `identity_federation.namespace`) are now set at the OTel pipeline level via a
        `resource/verifier` processor, consistent with how other Fleet integrations handle
        namespace. When managed by Fleet, the namespace is resolved from the Kibana Space.
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/18104
    - description: >-
        Remove `default_region` from AWS credentials configuration.
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/18104
    - description: >-
        Rename GCP credential field `credentials_workload_identity_provider` to
        `credentials_audience`.
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/18104
    - description: >-
        Update `account_type` option values from `single_account`/`organization` to
        `single-account`/`organization-account`. Default value updated to `single-account`.
      type: breaking-change
      link: https://github.com/elastic/integrations/pull/18104
    - description: >-
        Change `credentials_tenant_id` and `credentials_client_id` to `type: password`
        with `secret: true`.
      type: bugfix
      link: https://github.com/elastic/integrations/pull/18104
    - description: >-
        Update configuration examples in documentation to show the full OTel pipeline,
        including the `resource/verifier` processor block that sets data stream routing
        attributes at the pipeline level.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18104
- version: "0.0.0"
  changes:
    - description: Initial release of the Permission Verifier integration.
      type: enhancement
      link: https://github.com/elastic/security-team/issues/15628
