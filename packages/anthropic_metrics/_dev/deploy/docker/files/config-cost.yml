rules:
  - path: /v1/organizations/cost_report
    methods: ['GET']
    query_params:
      page: 'page_cost01'
      starting_at: '{starting_at:.*}'
      ending_at: '{ending_at:.*}'
      bucket_width: '1d'
    request_headers:
      x-api-key:
        - 'xxxx'
      anthropic-version:
        - '2023-06-01'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
