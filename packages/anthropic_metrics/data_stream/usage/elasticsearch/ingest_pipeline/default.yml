---
description: Pipeline for parsing Anthropic message usage report events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: parse_json
      if: ctx.event?.original != null
  - script:
      tag: remove_null_fields
      lang: painless
      if: ctx.json != null
      source: >-
        if (ctx.json.containsKey('workspace_id') && ctx.json.workspace_id == null) {
          ctx.json.workspace_id = 'Default';
        }
        ctx.json.entrySet().removeIf(e -> e.getValue() == null);
  - date:
      field: json.bucket_start_time
      target_field: '@timestamp'
      formats:
        - ISO8601
      if: ctx.json?.bucket_start_time != null
      tag: date_bucket_start_time_to_timestamp
  - date:
      field: json.bucket_start_time
      target_field: anthropic.usage.bucket_start_time
      formats:
        - ISO8601
      if: ctx.json?.bucket_start_time != null
      tag: date_bucket_start_time
  - date:
      field: json.bucket_end_time
      target_field: anthropic.usage.bucket_end_time
      formats:
        - ISO8601
      if: ctx.json?.bucket_end_time != null
      tag: date_bucket_end_time
  - rename:
      field: json.model
      target_field: anthropic.usage.model
      ignore_missing: true
      tag: rename_model
  - rename:
      field: json.workspace_id
      target_field: anthropic.usage.workspace_id
      ignore_missing: true
      tag: rename_workspace_id
  - rename:
      field: json.api_key_id
      target_field: anthropic.usage.api_key_id
      ignore_missing: true
      tag: rename_api_key_id
  - rename:
      field: json.service_tier
      target_field: anthropic.usage.service_tier
      ignore_missing: true
      tag: rename_service_tier
  - rename:
      field: json.context_window
      target_field: anthropic.usage.context_window
      ignore_missing: true
      tag: rename_context_window
  - rename:
      field: json.inference_geo
      target_field: anthropic.usage.inference_geo
      ignore_missing: true
      tag: rename_inference_geo
  - rename:
      field: json.speed
      target_field: anthropic.usage.speed
      ignore_missing: true
      tag: rename_speed
  - rename:
      field: json.uncached_input_tokens
      target_field: anthropic.usage.uncached_input_tokens
      ignore_missing: true
      tag: rename_uncached_input_tokens
  - rename:
      field: json.cache_read_input_tokens
      target_field: anthropic.usage.cached_input_tokens
      ignore_missing: true
      tag: rename_cache_read_input_tokens
  - script:
      tag: sum_cache_creation_tokens
      lang: painless
      if: ctx.json?.cache_creation != null
      source: >-
        long total = 0;
        if (ctx.json.cache_creation.containsKey('ephemeral_5m_input_tokens')) {
          total += ctx.json.cache_creation.ephemeral_5m_input_tokens;
        }
        if (ctx.json.cache_creation.containsKey('ephemeral_1h_input_tokens')) {
          total += ctx.json.cache_creation.ephemeral_1h_input_tokens;
        }
        ctx.anthropic = ctx.anthropic != null ? ctx.anthropic : new HashMap();
        ctx.anthropic.usage = ctx.anthropic.usage != null ? ctx.anthropic.usage : new HashMap();
        ctx.anthropic.usage.cache_creation_input_tokens = total;
  - rename:
      field: json.output_tokens
      target_field: anthropic.usage.output_tokens
      ignore_missing: true
      tag: rename_output_tokens
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_event_category_api
      value: api
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
  - remove:
      field: json
      tag: remove_json
      ignore_missing: true
  - append:
      field: tags
      tag: append_preserve_original_event_tag
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
