- name: anthropic
  type: group
  fields:
    - name: usage
      type: group
      description: Anthropic message usage report bucket fields.
      fields:
        - name: bucket_start_time
          type: date
          description: Start time of the usage bucket.
        - name: bucket_end_time
          type: date
          description: End time of the usage bucket.
        - name: model
          type: keyword
          description: Claude model name for the bucket.
        - name: workspace_id
          type: keyword
          description: Workspace identifier for the bucket.
        - name: api_key_id
          type: keyword
          description: API key identifier when grouped by api_key_id.
        - name: service_tier
          type: keyword
          description: Service tier for the bucket (e.g. standard).
        - name: context_window
          type: keyword
          description: Context window size when grouped by context_window.
        - name: inference_geo
          type: keyword
          description: Inference geography when grouped by inference_geo.
        - name: speed
          type: keyword
          description: Speed tier when grouped by speed.
        - name: uncached_input_tokens
          type: long
          description: Uncached input tokens consumed in the bucket.
        - name: cached_input_tokens
          type: long
          description: Cached input tokens consumed in the bucket.
        - name: cache_creation_input_tokens
          type: long
          description: Cache creation input tokens consumed in the bucket.
        - name: output_tokens
          type: long
          description: Output tokens generated in the bucket.
