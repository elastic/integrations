wait_for_data_timeout: 1m
input: cel
service: anthropic-metrics-cost
vars:
  url: http://{{Hostname}}:{{Port}}
  admin_api_key: xxxx
  anthropic_version: "2023-06-01"
data_stream:
  vars:
    interval: 10s
    initial_interval: 168h
    group_by:
      - workspace_id
      - description
    preserve_original_event: true
assert:
  hit_count: 3
