title: "cost"
type: metrics
streams:
  - input: cel
    title: Anthropic cost metrics
    description: Collect organization cost metrics from the Anthropic Cost API.
    template_path: cel.yml.hbs
    vars:
      - name: interval
        type: text
        title: Interval
        description: How often the Cost API is polled.
        required: true
        show_user: true
        default: 1h
      - name: initial_interval
        type: text
        title: Initial Interval
        description: Lookback window on the first collection run (e.g. 168h for 7 days).
        required: true
        show_user: true
        default: 168h
      - name: group_by
        type: text
        title: Group By
        description: Dimensions to group cost data by. Supported values are workspace_id and description.
        multi: true
        required: true
        show_user: true
        default:
          - workspace_id
          - description
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        description: The request tracer logs HTTP requests and responses to the agent's local filesystem for debugging. Enabling this compromises security and should only be used for debugging.
        default: false
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        required: false
        show_user: false
      - name: proxy_url
        type: text
        title: Proxy URL
        required: false
        show_user: false
      - name: ssl
        type: yaml
        title: SSL Configuration
        required: false
        show_user: false
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: true
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
        description: Processors to apply to events before ingest parsing.
elasticsearch:
  index_template:
    mappings:
      subobjects: false
