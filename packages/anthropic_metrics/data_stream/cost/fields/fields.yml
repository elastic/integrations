- name: anthropic
  type: group
  fields:
    - name: cost
      type: group
      description: Anthropic organization cost report bucket fields.
      fields:
        - name: bucket_start_time
          type: date
          description: Start time of the cost bucket.
        - name: bucket_end_time
          type: date
          description: End time of the cost bucket.
        - name: workspace_id
          type: keyword
          description: Workspace identifier for the bucket.
        - name: description
          type: keyword
          description: Cost line description (e.g. model usage, Web Search Usage).
        - name: inference_geo
          type: keyword
          description: Inference geography for the cost item (e.g. global, us, not_available). Available when grouped by description.
        - name: model
          type: keyword
          description: Model name for the cost item. Available when grouped by description.
        - name: service_tier
          type: keyword
          description: Service tier for the cost item (e.g. standard, batch). Available when grouped by description.
        - name: cost_type
          type: keyword
          description: Type of cost (e.g. tokens, web_search, code_execution, session_usage). Available when grouped by description.
        - name: token_type
          type: keyword
          description: Type of token (e.g. uncached_input_tokens, output_tokens, cache_read_input_tokens). Available when grouped by description.
        - name: context_window
          type: keyword
          description: Context window used (e.g. 0-200k, 200k-1M). Available when grouped by description.
        - name: amount
          type: double
          description: >-
            Cost amount in lowest units (e.g. cents) as returned by the Anthropic API.
        - name: currency
          type: keyword
          description: Currency code for the cost amount (e.g. USD).
