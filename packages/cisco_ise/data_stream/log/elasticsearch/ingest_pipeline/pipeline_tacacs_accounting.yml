---
processors:
  - set:
      field: event.kind
      value: event
      tag: set_de80643c
  - append:
      field: event.category
      value: [configuration]
      tag: append_c8ab9fa2
  - append:
      field: event.type
      value: [info]
      tag: append_8b66b73a
  - grok:
      field: message
      if: ctx.cisco_ise?.log?.segment?.number == 0
      patterns:
        - "^%{TIMESTAMP_ISO8601:_tmp.timestamp} %{ISO8601_TIMEZONE:event.timezone} %{DATA:event.sequence:long} %{DATA:cisco_ise.log.message.code} %{DATA:log.syslog.severity.name} %{DATA:cisco_ise.log.message.description}, %{GREEDYDATA:cisco_ise.log.log_details_raw},"
      tag: grok_7466a657
  - grok:
      field: message
      if: ctx.cisco_ise?.log?.segment?.number != null && ctx.cisco_ise.log.segment.number > 0
      patterns:
        - "^%{GREEDYDATA:cisco_ise.log.log_details_raw},"
      tag: grok_c232cfac
  - date:
      field: _tmp.timestamp
      formats:
        - yyyy-MM-dd HH:mm:ss.SSS
        - yyyy-MM-dd HH:mm:ss.SSSSSS
        - MMM [ ]d HH:mm:ss[.SSSSSS][.SSS]
      on_failure:
        - remove:
            field: _tmp.timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: date_9ef85c6a
  - date:
      if: ctx.event?.timezone != null && ctx.event.timezone != ''
      field: _tmp.timestamp
      formats:
        - yyyy-MM-dd HH:mm:ss.SSS
        - yyyy-MM-dd HH:mm:ss.SSSSSS
        - MMM [ ]d HH:mm:ss[.SSSSSS][.SSS]
      timezone: '{{{event.timezone}}}'
      on_failure:
        - remove:
            field: _tmp.timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: date_1d2a12b9
  - kv:
      field: cisco_ise.log.log_details_raw
      target_field: cisco_ise.log.log_details
      field_split: ', '
      value_split: =
      ignore_failure: true
      tag: kv_dd59a8ac
  - foreach:
      if: "ctx.cisco_ise?.log?.log_details.AVPair != null && ctx.cisco_ise?.log?.log_details.AVPair instanceof List"
      field: cisco_ise.log.log_details.AVPair
      processor:
        kv:
          field: _ingest._value
          target_field: cisco_ise.log.avpair
          field_split: ', '
          value_split: =
          on_failure:
            - append:
                field: error.message
                value: '{{{_ingest.on_failure_message}}}'
      ignore_missing: true
      tag: foreach_c425b02e
  - remove:
      field: cisco_ise.log.log_details.AVPair
      ignore_missing: true
      tag: remove_d96c2afb
  - kv:
      if: "ctx.cisco_ise?.log?.log_details['cisco-av-pair'] != null && !(ctx.cisco_ise?.log?.log_details['cisco-av-pair'] instanceof List)"
      field: cisco_ise.log.log_details.cisco-av-pair
      target_field: cisco_ise.log.avpair
      field_split: ', '
      value_split: =
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: kv_97a78c34
  - remove:
      field: cisco_ise.log.log_details.cisco-av-pair
      ignore_missing: true
      tag: remove_f0af3b50
  - script:
      lang: painless
      if: ctx.cisco_ise?.log?.message?.description != null
      source: ctx.event.action = ctx.cisco_ise?.log?.message?.description?.splitOnToken(":")[0]?.toLowerCase();
      tag: script_09cdb1bd
  - convert:
      field: cisco_ise.log.log_details.Device IP Address
      target_field: client.ip
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_b34586ce
  - remove:
      field: cisco_ise.log.log_details.Device IP Address
      ignore_missing: true
      tag: remove_ed1bebc1
  - append:
      field: related.ip
