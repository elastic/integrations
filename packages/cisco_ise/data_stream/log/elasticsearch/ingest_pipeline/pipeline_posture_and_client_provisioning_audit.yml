---
processors:
  - set:
      field: event.kind
      value: event
      tag: set_de80643c
  - append:
      field: event.category
      value: [malware]
      tag: append_da00115b
  - append:
      field: event.type
      value: [info]
      tag: append_8b66b73a
  - grok:
      field: message
      if: ctx.cisco_ise?.log?.segment?.number == 0
      patterns:
        - "^%{TIMESTAMP_ISO8601:_tmp.timestamp} %{ISO8601_TIMEZONE:event.timezone} %{DATA:event.sequence:long} %{DATA:cisco_ise.log.message.code} %{DATA:log.syslog.severity.name} %{DATA:cisco_ise.log.message.description}, %{GREEDYDATA:cisco_ise.log.log_details_raw},"
      tag: grok_7466a657
  - grok:
      field: message
      if: ctx.cisco_ise?.log?.segment?.number != null && ctx.cisco_ise.log.segment.number > 0
      patterns:
        - "^%{GREEDYDATA:cisco_ise.log.log_details_raw},"
      tag: grok_c232cfac
  - date:
      field: _tmp.timestamp
      formats:
        - yyyy-MM-dd HH:mm:ss.SSS
        - yyyy-MM-dd HH:mm:ss.SSSSSS
        - MMM [ ]d HH:mm:ss[.SSSSSS][.SSS]
      on_failure:
        - remove:
            field: _tmp.timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: date_9ef85c6a
  - date:
      if: ctx.event?.timezone != null && ctx.event.timezone != ''
      field: _tmp.timestamp
      formats:
        - yyyy-MM-dd HH:mm:ss.SSS
        - yyyy-MM-dd HH:mm:ss.SSSSSS
        - MMM [ ]d HH:mm:ss[.SSSSSS][.SSS]
      timezone: '{{{event.timezone}}}'
      on_failure:
        - remove:
            field: _tmp.timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: "{{{ _ingest.on_failure_message }}}"
      tag: date_d0798b77
  - kv:
      field: cisco_ise.log.log_details_raw
      target_field: cisco_ise.log.log_details
      field_split: ', '
      value_split: =
      ignore_failure: true
      tag: kv_dd59a8ac
  - script:
      lang: painless
      if: ctx.cisco_ise?.log?.message?.description != null
      source: ctx.event.action = ctx.cisco_ise?.log?.message?.description?.splitOnToken(":")[0]?.toLowerCase();
      tag: script_09cdb1bd
  - rename:
      field: cisco_ise.log.log_details.OperationID
      target_field: cisco_ise.log.operation.id
      ignore_failure: true
      ignore_missing: true
      tag: rename_0dedcb56
  - rename:
      field: cisco_ise.log.log_details.OperationType
      target_field: cisco_ise.log.operation.type
      ignore_failure: true
      ignore_missing: true
      tag: rename_7d33feee
  - rename:
      field: cisco_ise.log.log_details.OperationStatus
      target_field: cisco_ise.log.operation.status
      ignore_failure: true
      ignore_missing: true
      tag: rename_941db12a
  - rename:
      field: cisco_ise.log.log_details.AdminName
      target_field: client.user.name
      ignore_failure: true
      ignore_missing: true
      tag: rename_f1f23e48
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{#_ingest.on_failure_processor_tag}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{/_ingest.on_failure_processor_tag}}failed with message '{{{ _ingest.on_failure_message }}}'

