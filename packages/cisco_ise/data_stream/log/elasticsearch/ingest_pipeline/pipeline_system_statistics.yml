      tag: remove_15414b70
  - convert:
      field: cisco_ise.log.log_details.DeltaTacacsRequestCount
      target_field: cisco_ise.log.delta.tacacs.request.count
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
      tag: convert_04b9aa0f
  - remove:
      field: cisco_ise.log.log_details.DeltaTacacsRequestCount
