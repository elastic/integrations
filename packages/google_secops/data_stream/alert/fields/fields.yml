                        - name: regionCoordinates
                          type: group
                          fields:
                            - name: lat
                              type: double
                              description: The latitude in degrees.
                            - name: lon
                              type: double
                              description: The longitude in degrees.
                        - name: regionLatitude
                          type: double
                        - name: regionLongitude
                          type: double
                        - name: state
                          type: keyword
