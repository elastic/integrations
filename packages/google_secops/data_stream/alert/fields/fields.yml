                - name: port
                  type: long
                  description: Source or destination network port number when a specific network connection is described within an event.
                - name: process
                  type: group
                  fields:
                    - name: commandLine
                      type: keyword
                      description: The command line command that created the process.
                    - name: file
                      type: group
                      fields:
                        - name: fullPath
                          type: keyword
