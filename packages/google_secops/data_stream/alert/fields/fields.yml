                        - name: asn
                          type: long
                          description: Autonomous system number.
                        - name: carrierName
                          type: keyword
                          description: Carrier identification.
                        - name: dnsDomain
                          type: keyword
                          description: DNS domain name.
                        - name: organizationName
                          type: keyword
                          description: Organization name (e.g Google).
                - name: labels
                  type: group
                  fields:
                    - name: key
                      type: keyword
                      description: The key.
                    - name: value
                      type: keyword
                      description: The value.
                - name: location
                  type: group
                  fields:
                    - name: city
                      type: keyword
                      description: The city.
                    - name: countryOrRegion
                      type: keyword
                      description: The country or region.
                    - name: name
                      type: keyword
                      description: Custom location name (e.g. building or site name like "London Office"). For cloud environments, this is the region (e.g. "us-west2").
                    - name: regionCoordinates
                      type: group
                      fields:
                        - name: latitude
                          type: double
                          description: The latitude in degrees.
                        - name: longitude
                          type: double
                          description: The longitude in degrees.
                    - name: regionLatitude
                      type: double
                    - name: regionLongitude
                      type: double
                    - name: state
                      type: keyword
                      description: The state.
                - name: namespace
                  type: keyword
                  description: Namespace which the device belongs to, such as "AD forest". Uses for this field include Microsoft Windows AD forest, the name of subsidiary, or the name of acquisition.
                - name: natIp
                  type: ip
                  description: A list of NAT translated IP addresses associated with a network connection.
                - name: network
                  type: group
                  fields:
                    - name: receivedBytes
                      type: long
                      description: The number of bytes received.
                    - name: sentBytes
                      type: long
                      description: The number of bytes sent.
                - name: platform
                  type: keyword
