- name: google_secops
  type: group
  fields:
    - name: alert
      type: group
      fields:
        - name: name
          type: keyword
          description: 'The resource name of the event. Format: projects/{project}/locations/{location}/instances/{instance}/events/{event} where ''event'' is URL-encoded Base64. The unencoded value of ''event'' can also be found in udm.metadata.id.'
        - name: udm
          type: group
          fields:
            - name: about
              type: group
              fields:
                - name: administrativeDomain
                  type: keyword
                  description: Domain which the device belongs to (for example, the Microsoft Windows domain).
                - name: file
                  type: group
                  fields:
                    - name: fullPath
                      type: keyword
                      description: The full path identifying the location of the file on the system.
                    - name: sha256
                      type: keyword
                      description: The SHA256 hash of the file, as a hex-encoded string.
                - name: group
                  type: group
                  fields:
                    - name: groupDisplayName
                      type: keyword
                      description: Group display name.
                - name: labels
                  type: group
                  fields:
                    - name: key
                      type: keyword
                      description: The key.
                    - name: value
                      type: keyword
                      description: The value.
                - name: namespace
                  type: keyword
                  description: Namespace which the device belongs to, such as "AD forest". Uses for this field include Microsoft Windows AD forest, the name of subsidiary, or the name of acquisition.
                - name: resource
                  type: group
                  fields:
                    - name: id
                      type: keyword
                    - name: name
                      type: keyword
                      description: The full name of the resource.
                    - name: productObjectId
                      type: keyword
                      description: A vendor-specific identifier to uniquely identify the entity (a GUID, OID, or similar).
                    - name: resourceType
                      type: keyword
                      description: Resource type.
                    - name: type
                      type: keyword
                - name: url
                  type: keyword
                  description: The URL.
                - name: user
                  type: group
                  fields:
                    - name: attribute
                      type: group
                      fields:
                        - name: roles
                          type: group
                          fields:
                            - name: name
                              type: keyword
                              description: System role name for user.
                    - name: emailAddresses
                      type: keyword
                      description: Email addresses of the user.
                    - name: groupIdentifiers
                      type: keyword
                      description: Product object identifiers of the group(s) the user belongs to A vendor-specific identifier to uniquely identify the group(s) the user belongs to (a GUID, LDAP OID, or similar).
                    - name: userDisplayName
                      type: keyword
                      description: The display name of the user (e.g. "John Locke").
                    - name: userid
                      type: keyword
                      description: The ID of the user.
            - name: additional
              type: flattened
              description: Any important vendor-specific event data that cannot be adequately represented within the formal sections of the UDM model.
            - name: extensions
              type: group
              fields:
                - name: auth
                  type: group
                  fields:
                    - name: authDetails
                      type: keyword
                      description: The vendor defined details of the authentication.
                    - name: mechanism
                      type: keyword
                      description: The authentication mechanism.
                    - name: type
                      type: keyword
                      description: The type of authentication.
                - name: vulns
                  type: group
                  fields:
                    - name: vulnerabilities
                      type: group
                      fields:
                        - name: about
                          type: group
                          fields:
                            - name: labels
                              type: group
                              fields:
                                - name: key
                                  type: keyword
                                  description: The key.
                                - name: value
                                  type: keyword
                                  description: The value.
                        - name: cveId
                          type: keyword
                          description: Common Vulnerabilities and Exposures Id. https://en.wikipedia.org/wiki/Common_Vulnerabilities_and_Exposures https://cve.mitre.org/about/faqs.html#what_is_cve_id.
                        - name: cvssBaseScore
                          type: double
                          description: CVSS Base Score in the range of 0.0 to 10.0. Useful for sorting.
                        - name: cvssVector
                          type: keyword
                          description: 'Vector of CVSS properties (e.g. "AV:L/AC:H/Au:N/C:N/I:P/A:C") Can be linked to via: https://nvd.nist.gov/vuln-metrics/cvss/v2-calculator.'
            - name: intermediary
              type: group
              fields:
                - name: application
                  type: keyword
                  description: The name of an application or service. Some SSO solutions only capture the name of a target application such as "Atlassian" or "Google".
                - name: hostname
                  type: keyword
                  description: Client hostname or domain name field. Hostname also doubles as the domain for remote entities.
                - name: ip
                  type: ip
                  description: A list of IP addresses associated with a network connection.
                - name: location
                  type: group
                  fields:
                    - name: countryOrRegion
                      type: keyword
                      description: The country or region.
                    - name: regionCoordinates
                      type: group
                      fields:
                        - name: latitude
                          type: double
                          description: The latitude in degrees.
                        - name: longitude
                          type: double
                          description: The longitude in degrees.
                - name: namespace
                  type: keyword
                  description: Namespace which the device belongs to, such as "AD forest". Uses for this field include Microsoft Windows AD forest, the name of subsidiary, or the name of acquisition.
                - name: network
                  type: group
                  fields:
                    - name: receivedBytes
                      type: long
                      description: The number of bytes received.
                    - name: sentBytes
                      type: long
                      description: The number of bytes sent.
                - name: port
                  type: long
                  description: Source or destination network port number when a specific network connection is described within an event.
                - name: resource
                  type: group
                  fields:
                    - name: attribute
                      type: group
                      fields:
                        - name: labels
                          type: group
                          fields:
                            - name: key
                              type: keyword
                              description: The key.
                            - name: value
                              type: keyword
                              description: The value.
            - name: metadata
              type: group
              fields:
                - name: baseLabels
                  type: group
                  fields:
                    - name: allowScopedAccess
                      type: boolean
                    - name: logTypes
                      type: keyword
                - name: collectedTimestamp
                  type: date
                  description: The GMT timestamp when the event was collected by the vendor's local collection infrastructure.
                - name: description
                  type: keyword
                  description: A human-readable unparsable description of the event.
                - name: enrichmentLabels
                  type: group
                  fields:
                    - name: allowScopedAccess
                      type: boolean
                    - name: logTypes
                      type: keyword
                - name: enrichmentState
                  type: keyword
                  description: The enrichment state.
                - name: eventTimestamp
                  type: date
                  description: The GMT timestamp when the event was generated.
                - name: eventType
                  type: keyword
                  description: The event type. If an event has multiple possible types, this specifies the most specific type.
                - name: id
                  type: keyword
                  description: ID of the UDM event. Can be used for raw and normalized event retrieval.
                - name: ingestedTimestamp
                  type: date
                  description: The GMT timestamp when the event was ingested (received) by Google Security Operations.
                - name: ingestionLabels
                  type: group
                  fields:
                    - name: key
                      type: keyword
                      description: The key.
                    - name: value
                      type: keyword
                      description: The value.
                - name: logType
                  type: keyword
                  description: The string value of log type.
                - name: productDeploymentId
                  type: keyword
                  description: The deployment identifier assigned by the vendor for a product deployment.
                - name: productEventType
                  type: keyword
                  description: 'A short, descriptive, human-readable, product-specific event name or type (for example: "Scanned X", "User account created", "process_start").'
                - name: productLogId
                  type: keyword
                  description: 'A vendor-specific event identifier to uniquely identify the event (for example: a GUID).'
                - name: productName
                  type: keyword
                  description: The name of the product.
                - name: productVersion
                  type: keyword
                  description: The version of the product.
                - name: urlBackToProduct
                  type: keyword
                  description: A URL that takes the user to the source product console for this event.
                - name: vendorName
                  type: keyword
                  description: The name of the product vendor.
            - name: network
              type: group
              fields:
                - name: email
                  type: group
                  fields:
                    - name: from
                      type: keyword
                      description: The 'from' address.
                    - name: mailId
                      type: keyword
                      description: The mail (or message) ID.
                    - name: subject
                      type: keyword
                      description: The subject line(s) of the email.
                    - name: to
                      type: keyword
                      description: A list of 'to' addresses.
                - name: http
                  type: group
                  fields:
                    - name: parsedUserAgent
                      type: group
                      fields:
                        - name: annotation
                          type: group
                          fields:
                            - name: key
                              type: keyword
                            - name: value
                              type: keyword
                        - name: browser
                          type: keyword
                        - name: browserEngineVersion
                          type: keyword
                        - name: browserVersion
                          type: keyword
                        - name: device
                          type: keyword
                        - name: deviceVersion
                          type: keyword
                        - name: family
                          type: keyword
                        - name: os
                          type: keyword
                        - name: osVariant
                          type: keyword
                        - name: platform
                          type: keyword
                        - name: subFamily
                          type: keyword
                    - name: userAgent
                      type: keyword
                      description: The User-Agent request header which includes the application type, operating system, software vendor or software version of the requesting software user agent.
                - name: ipProtocol
                  type: keyword
                  description: The IP protocol.
                - name: receivedBytes
                  type: long
                  description: The number of bytes received.
                - name: sentBytes
                  type: long
                  description: The number of bytes sent.
                - name: sessionId
                  type: keyword
                  description: The ID of the network session.
                - name: tls
                  type: group
                  fields:
                    - name: cipher
                      type: keyword
                      description: Cipher used during the connection.
                    - name: version
                      type: keyword
                      description: TLS version.
            - name: principal
              type: group
              fields:
                - name: application
                  type: keyword
                  description: The name of an application or service. Some SSO solutions only capture the name of a target application such as "Atlassian" or "Google".
                - name: asset
                  type: group
                  fields:
                    - name: assetId
                      type: keyword
                      description: The asset ID.
                    - name: attribute
                      type: group
                      fields:
                        - name: cloud
                          type: group
                          fields:
                            - name: availabilityZone
                              type: keyword
                              description: The cloud environment availability zone (different from region which is location.name).
                            - name: environment
                              type: keyword
                              description: The Cloud environment.
                        - name: creationTime
                          type: date
                          description: Time the resource or entity was created or provisioned.
                        - name: labels
                          type: group
                          fields:
                            - name: key
                              type: keyword
                              description: The key.
                            - name: value
                              type: keyword
                              description: The value.
                    - name: category
                      type: keyword
                      description: The category of the asset (e.g. "End User Asset", "Workstation", "Server").
                    - name: deploymentStatus
                      type: keyword
                      description: The deployment status of the asset for device lifecycle purposes.
                    - name: hardware
                      type: group
                      fields:
                        - name: cpuPlatform
                          type: keyword
                          description: Platform of the hardware CPU (e.g. "Intel Broadwell").
                        - name: model
                          type: keyword
                          description: Hardware model.
                        - name: serialNumber
                          type: keyword
                          description: Hardware serial number.
                    - name: hostname
                      type: keyword
                      description: Asset hostname or domain name field.
                    - name: ip
                      type: ip
                      description: A list of IP addresses associated with an asset.
                    - name: lastBootTime
                      type: date
                      description: Time the asset was last boot started.
                    - name: location
                      type: group
                      fields:
                        - name: name
                          type: keyword
                          description: Custom location name (e.g. building or site name like "London Office"). For cloud environments, this is the region (e.g. "us-west2").
                    - name: natIp
                      type: ip
                      description: List of NAT IP addresses associated with an asset.
                    - name: productObjectId
                      type: keyword
                      description: A vendor-specific identifier to uniquely identify the entity (a GUID or similar).
                    - name: software
                      type: group
                      fields:
                        - name: version
                          type: keyword
                          description: The name of the software.
                - name: assetId
                  type: keyword
                  description: The asset ID.
                - name: group
                  type: group
                  fields:
                    - name: groupDisplayName
                      type: keyword
                      description: "\t\tGroup display name."
                - name: hostname
                  type: keyword
                  description: Client hostname or domain name field. Hostname also doubles as the domain for remote entities.
                - name: ip
                  type: ip
                  description: A list of IP addresses associated with a network connection.
                - name: ipGeoArtifact
                  type: group
                  fields:
                    - name: ip
