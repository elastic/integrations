---
description: Pipeline for processing alert logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 8.11.0
  - fail:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      message: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - fingerprint:
      fields:
        - json.name
        - json.udm.metadata.eventTimestamp
        - json.udm.metadata.id
        - json.udm.metadata.ingestedTimestamp
      tag: fingerprint_google_secops_alert
      target_field: _id
      ignore_missing: true 
  - set:
      field: event.kind
      tag: set_event_kind_to_alert
      value: alert
  - rename:
      field: json
      tag: rename_json
      target_field: google_secops.alert
      ignore_missing: true
  - set:
      field: event.id
      tag: set_event_id_from_alert_name
      copy_from: google_secops.alert.name
      ignore_empty_value: true
  - foreach:
      field: google_secops.alert.udm.extensions.vulns.vulnerabilities
      if: ctx.google_secops?.alert?.udm?.extensions?.vulns?.vulnerabilities instanceof List
      processor:
        append:
          field: vulnerability.id
          tag: append_udm_extensions_vulns_vulnerabilities_cveId_into_vulnerability_id
          value: '{{{_ingest._value.cveId}}}'
          allow_duplicates: false
  - foreach:
      field: google_secops.alert.udm.extensions.vulns.vulnerabilities
      if: ctx.google_secops?.alert?.udm?.extensions?.vulns?.vulnerabilities instanceof List
      processor:
        convert:
          field: _ingest._value.cvssBaseScore
          tag: convert_udm_extensions_vulns_vulnerabilities_cvssBaseScore_to_double
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.cvssBaseScore
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.extensions.vulns.vulnerabilities
      if: ctx.google_secops?.alert?.udm?.extensions?.vulns?.vulnerabilities instanceof List 
      processor:
        append:
          field: vulnerability.score.base
          tag: append_udm_extensions_vulns_vulnerabilities_cvssBaseScore_into_vulnerability_score_base
          value: '{{{_ingest._value.cvssBaseScore}}}'
          allow_duplicates: false
  - foreach:
      field: vulnerability.score.base
      if: ctx.vulnerability?.score?.base instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_vulnerability_score_base_to_double
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.intermediary
      if: ctx.google_secops?.alert?.udm?.intermediary instanceof List
      processor:
        foreach:
          field: _ingest._value.ip
          ignore_failure: true
          processor:
            convert:
              field: _ingest._value
              tag: convert_udm_intermediary_ip_to_ip
              type: ip
              ignore_missing: true
              on_failure:
                - remove:
                    field: _ingest._value
                    ignore_missing: true
                - append:
                    field: error.message
                    value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.intermediary
      if: ctx.google_secops?.alert?.udm?.intermediary instanceof List
      processor:
        convert:
          field: _ingest._value.location.regionCoordinates.longitude
          tag: convert_udm_intermediary_location_regionCoordinates_longitude_to_double
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.location.regionCoordinates.longitude
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.intermediary
      if: ctx.google_secops?.alert?.udm?.intermediary instanceof List
      processor:
        convert:
          field: _ingest._value.location.regionCoordinates.latitude
          tag: convert_udm_intermediary_location_regionCoordinates_latitude_to_double
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.location.regionCoordinates.latitude
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.intermediary
      if: ctx.google_secops?.alert?.udm?.intermediary instanceof List
      processor:
        convert:
          field: _ingest._value.network.receivedBytes
          tag: convert_udm_intermediary_network_receivedBytes_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.network.receivedBytes
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.intermediary
      if: ctx.google_secops?.alert?.udm?.intermediary instanceof List
      processor:
        convert:
          field: _ingest._value.network.sentBytes
          tag: convert_udm_intermediary_network_sentBytes_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.network.sentBytes
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.intermediary
      if: ctx.google_secops?.alert?.udm?.intermediary instanceof List
      processor:
        convert:
          field: _ingest._value.port
          tag: convert_udm_intermediary_port_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.port
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: google_secops.alert.udm.metadata.baseLabels.allowScopedAccess
      tag: convert_udm_metadata_baseLabels_allowScopedAccess_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert.udm.metadata.baseLabels.allowScopedAccess
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: google_secops.alert.udm.metadata.collectedTimestamp
      tag: date_udm_metadata_collectedTimestamp
      target_field: google_secops.alert.udm.metadata.collectedTimestamp
      formats:
        - ISO8601
      if: ctx.google_secops?.alert?.udm?.metadata?.collectedTimestamp != null && ctx.google_secops.alert.udm.metadata.collectedTimestamp != ''
      on_failure:
        - remove:
            field: google_secops.alert.udm.metadata.collectedTimestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: google_secops.alert.udm.metadata.enrichmentLabels.allowScopedAccess
      tag: convert_udm_metadata_enrichmentLabels_allowScopedAccess_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert.udm.metadata.enrichmentLabels.allowScopedAccess
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: google_secops.alert.udm.metadata.eventTimestamp
      tag: date_udm_metadata_eventTimestamp
      target_field: google_secops.alert.udm.metadata.eventTimestamp
      formats:
        - ISO8601
      if: ctx.google_secops?.alert?.udm?.metadata?.eventTimestamp != null && ctx.google_secops.alert.udm.metadata.eventTimestamp != ''
      on_failure:
        - remove:
            field: google_secops.alert.udm.metadata.eventTimestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_alert_udm_metadata_eventTimestamp
      copy_from: google_secops.alert.udm.metadata.eventTimestamp
      ignore_empty_value: true
  - date:
      field: google_secops.alert.udm.metadata.ingestedTimestamp
      tag: date_udm_metadata_ingestedTimestamp
      target_field: google_secops.alert.udm.metadata.ingestedTimestamp
      formats:
        - ISO8601
      if: ctx.google_secops?.alert?.udm?.metadata?.ingestedTimestamp != null && ctx.google_secops.alert.udm.metadata.ingestedTimestamp != ''
      on_failure:
        - remove:
            field: google_secops.alert.udm.metadata.ingestedTimestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: observer.product
      tag: set_observer_product_from_alert_udm_metadata_productName
      copy_from: google_secops.alert.udm.metadata.productName
      ignore_empty_value: true
  - set:
      field: observer.version
      tag: set_observer_version_from_alert_udm_metadata_productVersion
      copy_from: google_secops.alert.udm.metadata.productVersion
      ignore_empty_value: true
  - set:
      field: observer.vendor
      tag: set_observer_vendor_from_alert_udm_metadata_vendorName
      copy_from: google_secops.alert.udm.metadata.vendorName
      ignore_empty_value: true
  - append:
      field: email.from.address
      tag: append_google_secops_alert_udm_network_email_from_into_email_from_address
      value: '{{{google_secops.alert.udm.network.email.from}}}'
      allow_duplicates: false
      if: ctx.google_secops?.alert?.udm?.network?.email?.from != null
  - append:
      field: email.message_id
      tag: append_google_secops_alert_udm_network_email_mailId_into_email_from_address
      value: '{{{google_secops.alert.udm.network.email.mailId}}}'
      allow_duplicates: false
      if: ctx.google_secops?.alert?.udm?.network?.email?.mailId != null
  - foreach:
      field: google_secops.alert.udm.network.email.subject
      if: ctx.google_secops?.alert?.udm?.network?.email?.subject instanceof List
      processor:
        append:
          field: email.subject
          tag: append_udm_network_email_subject_into_email_subject
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: google_secops.alert.udm.network.email.to
      if: ctx.google_secops?.alert?.udm?.network?.email?.to instanceof List
      processor:
        append:
          field: email.to.address
          tag: append_udm_network_email_to_into_email_to_address
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - set:
      field: user_agent.original
      tag: set_user_agent_original_from_alert_udm_network_http_userAgent
      copy_from: google_secops.alert.udm.network.http.userAgent
      ignore_empty_value: true
  - user_agent:
      field: user_agent.original
      tag: user_agent_original
      if: ctx.user_agent?.original != null
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: network.transport
      tag: set_network_transport_from_alert_udm_network_ipProtocol
      copy_from: google_secops.alert.udm.network.ipProtocol
      ignore_empty_value: true
  - lowercase:
      field: network.transport
      tag: lowercase_network_transport
      ignore_missing: true
  - convert:
      field: google_secops.alert.udm.network.receivedBytes
      tag: convert_udm_network_receivedBytes_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert.udm.network.receivedBytes
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.bytes
      tag: set_destination_bytes_from_alert_udm_network_receivedBytes
      copy_from: google_secops.alert.udm.network.receivedBytes
      ignore_empty_value: true
  - convert:
      field: google_secops.alert.udm.network.sentBytes
      tag: convert_udm_network_sentBytes_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert.udm.network.sentBytes
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.bytes
      tag: set_source_bytes_from_alert_udm_network_sentBytes
      copy_from: google_secops.alert.udm.network.sentBytes
      ignore_empty_value: true
  - set:
      field: tls.cipher
      tag: set_tls_cipher_from_alert_udm_network_tls_cipher
      copy_from: google_secops.alert.udm.network.tls.cipher
      ignore_empty_value: true
  - dissect:
      field: google_secops.alert.udm.network.tls.version
      tag: dissect_tls_version_protocol_and_tls_version
      pattern: '%{tls.version_protocol}v%{tls.version}'
      ignore_failure: true
  - lowercase:
      field: tls.version_protocol
      tag: lowercase_tls_version_protocol
      ignore_missing: true
  - date:
      field: google_secops.alert.udm.principal.asset.attribute.creationTime
      tag: date_udm_principal_asset_attribute_creationTime
      target_field: google_secops.alert.udm.principal.asset.attribute.creationTime
      formats:
        - ISO8601
      if: ctx.google_secops?.alert?.udm?.principal?.asset?.attribute?.creationTime != null && ctx.google_secops.alert.udm.principal.asset.attribute.creationTime != ''
      on_failure:
        - remove:
            field: google_secops.alert.udm.principal.asset.attribute.creationTime
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: google_secops.alert.udm.principal.asset.ip
      tag: convert_udm_principal_asset_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.google_secops?.alert?.udm?.principal?.asset?.ip != null && ctx.google_secops.alert.udm.principal.asset.ip != ''
      on_failure:
        - remove:
            field: google_secops.alert.udm.principal.asset.ip
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: google_secops.alert.udm.principal.asset.lastBootTime
      tag: date_udm_principal_asset_lastBootTime
      target_field: google_secops.alert.udm.principal.asset.lastBootTime
      formats:
        - ISO8601
      if: ctx.google_secops?.alert?.udm?.principal?.asset?.lastBootTime != null && ctx.google_secops.alert.udm.principal.asset.lastBootTime != ''
      on_failure:
        - remove:
            field: google_secops.alert.udm.principal.asset.lastBootTime
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.principal.asset.natIp
      if: ctx.google_secops?.alert?.udm?.principal?.asset?.natIp instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_udm_principal_asset_natIp_to_ip
          type: ip
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: host.hostname
      tag: set_host_hostname_from_alert_udm_principal_hostname
      copy_from: google_secops.alert.udm.principal.hostname
      ignore_empty_value: true
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        convert:
          field: _ingest._value.ip
          tag: convert_udm_principal_ipGeoArtifact_ip_to_ip
          type: ip
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.ip
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        append:
          field: host.ip
          tag: append_udm_principal_ipGeoArtifact_ip_into_host_ip
          value: '{{{_ingest._value.ip}}}'
          allow_duplicates: false
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        convert:
          field: _ingest._value.location.regionCoordinates.longitude
          tag: convert_udm_principal_ipGeoArtifact_location_regionCoordinates_longitude_to_double
          target_field: _ingest._value.location.regionCoordinates.lon
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.location.regionCoordinates.longitude
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        convert:
          field: _ingest._value.location.regionCoordinates.latitude
          tag: convert_udm_principal_ipGeoArtifact_location_regionCoordinates_latitude_to_double
          target_field: _ingest._value.location.regionCoordinates.lat
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.location.regionCoordinates.latitude
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        remove:
          field:
            - _ingest._value.location.regionCoordinates.longitude
            - _ingest._value.location.regionCoordinates.latitude
          tag: remove_udm_principal_ipGeoArtifact_location_regionCoordinates
          ignore_missing: true
  - script:
      description: Map host.geo.location field.
      tag: map_host_geo_location
      lang: painless
      source: |-
        def locationList = new ArrayList();
        if (ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List) {
          for (list in ctx.google_secops.alert.udm.principal.ipGeoArtifact) {
            locationList.add(list.location.regionCoordinates);
          }
        }
        if (!(ctx.host instanceof HashMap)) {
          ctx.host = new HashMap();
        }
        if (!(ctx.host.geo instanceof HashMap)) {
          ctx.host.geo = new HashMap();
        }
        ctx.host.geo.location = locationList;
      ignore_failure: true
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        append:
          field: host.geo.country_name
          tag: append_udm_principal_ipGeoArtifact_location_countryOrRegion_into_host_geo_country_name
          value: '{{{_ingest._value.location.countryOrRegion}}}'
          allow_duplicates: false
  - foreach:
      field: google_secops.alert.udm.principal.ipGeoArtifact
      if: ctx.google_secops?.alert?.udm?.principal?.ipGeoArtifact instanceof List
      processor:
        append:
          field: host.geo.region_name
          tag: append_udm_principal_ipGeoArtifact_location_state_into_host_geo_region_name
          value: '{{{_ingest._value.location.state}}}'
