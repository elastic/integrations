# newer versions go on top
- version: "1.1.0"
  changes:
    - description: Add alerting rules for failed span, metric point and log record exports.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18048
- version: "1.0.0"
  changes:
    - description: Add ES|QL based dashboards and increase minimum Kibana version to 9.3.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/18046
- version: "0.1.0"
  changes:
    - description: Add lens based dashboards for older Kibana versions (8.19+).
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17774
- version: "0.0.4"
  changes:
    - description: Separate dashboards per event type and adding more dropdowns to filter by receiver, exporter, processor and more.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17526
- version: "0.0.3"
  changes:
    - description: Extend docs
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17248
- version: "0.0.2"
  changes:
    - description: Use SVG for icon
      type: enhancement
      link: https://github.com/elastic/integrations/pull/17199
- version: "0.0.1"
  changes:
    - description: Adding visualizations for OpenTelemetry Collector internal telemetry including CPU, memory, usage, queue size, failed and exported spans, metrics, traces.
      type: enhancement
      link: https://github.com/elastic/integrations/pull/16305