format_version: 3.5.7
name: traefik_otel
title: "Traefik OpenTelemetry Assets"
version: 0.1.0
source:
  license: "Elastic-2.0"
description: "Traefik Assets for OpenTelemetry Collector"
type: content
categories:
  - opentelemetry
  - observability
  # Added web category as Traefik is a modern reverse proxy for web traffic
  - web
  # Added load_balancer category as Traefik functions as a load balancer for web applications
  - load_balancer
  # Added network category as Traefik manages network traffic routing
  - network
conditions:
  kibana:
    version: "^9.2.1"
  elastic:
    subscription: "basic"
discovery:
  datasets:
    - name: traefik.otel
screenshots:
  - src: /img/overview.png
    title: Traefik Overview
    size: 600x600
    type: image/png
  - src: /img/services.png
    title: Traefik Services
    size: 600x600
    type: image/png
  - src: /img/tls.png
    title: Traefik TLS
    size: 600x600
    type: image/png
  - src: /img/process.png
    title: Traefik Process
    size: 600x600
    type: image/png
icons:
  - src: /img/traefik_otel.svg
    title: Traefik OTel logo
    size: 32x32
    type: image/svg+xml
owner:
  github: elastic/obs-infraobs-integrations
  type: elastic
