- name: message
  external: ecs
- name: elastic_agent
  type: group
  fields:
    - name: id
      type: keyword
      ignore_above: 1024
      description: Elastic Agent id.
    - name: process
      level: extended
      type: keyword
      ignore_above: 1024
      description: Process run by the Elastic Agent.
      example: metricbeat
    - name: snapshot
      level: extended
      type: boolean
      description: Is the agent running from a snapshot build
    - name: version
      level: extended
      type: keyword
      ignore_above: 1024
      description: Elastic agent version.
      example: 7.11.0
- name: policy_id
  type: keyword
  ignore_above: 1024
  description: The policy ID fleet-server is operating on when starting a monitor or similar internal workflow.
- name: fleet
  type: group
  fields:
    - name: access.apikey.id
      level: extended
      type: keyword
      ignore_above: 1024
      description: The API key used when a fleet endpoint is accessed.
    - name: agent.id
      level: extended
      type: keyword
      ignore_above: 1024
      description: The ID of the agent interacting with a fleet endpoint.
    - name: policy.id
      level: extended
      type: keyword
      ignore_above: 1024
      description: The ID of the policy being used in a request to a fleet endpoint.
# OTel Collector internal telemetry uses dotted field names (e.g. otelcol.signal or otelcol.signal.output)
# that can conflict when a field is both a leaf value and a prefix of another field.
# subobjects:false prevents Elasticsearch from interpreting dots as object nesting,
# keeping each field independent regardless of shared prefixes.
- name: otelcol.*
  type: object
  object_type: keyword
  object_type_mapping_type: "*"
  subobjects: false
  description: OpenTelemetry Collector component telemetry attributes.
