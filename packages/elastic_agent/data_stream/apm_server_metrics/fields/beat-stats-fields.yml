                  fields:
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
                - name: sampling
                  type: group
                  fields:
                    - name: event.received.count
                      type: long
                      metric_type: counter
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors.count
                          type: long
                          metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
        - name: otlp
          type: group
          fields:
            - name: grpc
              type: group
              fields:
                - name: logs
                  type: group
                  fields:
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
                - name: metrics
                  type: group
                  fields:
                    - name: consumer.unsupported_dropped
                      type: long
                      metric_type: counter
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
                - name: traces
                  type: group
                  fields:
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
            - name: http
              type: group
              fields:
                - name: logs
                  type: group
                  fields:
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
                - name: metrics
                  type: group
                  fields:
                    - name: consumer.unsupported_dropped
                      type: long
                      metric_type: counter
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
                - name: traces
                  type: group
                  fields:
                    - name: request.count
                      type: long
                      metric_type: counter
                    - name: response
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: errors
                          type: group
                          fields:
                            - name: count
                              type: long
                              metric_type: counter
                            - name: ratelimit
                              type: long
                              metric_type: counter
                            - name: timeout
                              type: long
                              metric_type: counter
                            - name: unauthorized
                              type: long
                              metric_type: counter
                        - name: valid.count
                          type: long
                          metric_type: counter
        - name: processor
          type: group
          fields:
            - name: error.transformations
              type: long
              metric_type: counter
            - name: metric.transformations
              type: long
              metric_type: counter
            - name: span.transformations
              type: long
              metric_type: counter
            - name: stream
              type: group
              fields:
                - name: accepted
                  type: long
                  metric_type: counter
                - name: errors
                  type: group
                  fields:
                    - name: invalid
                      type: long
                      metric_type: counter
                    - name: toolarge
                      type: long
                      metric_type: counter
            - name: transaction.transformations
              type: long
              metric_type: counter
        - name: root
          type: group
          fields:
            - name: request.count
              type: long
              metric_type: counter
            - name: response
              type: group
              fields:
                - name: count
                  type: long
                  metric_type: counter
                - name: errors
                  type: group
                  fields:
                    - name: closed
                      type: long
                      metric_type: counter
                    - name: count
                      type: long
                      metric_type: counter
                    - name: decode
                      type: long
                      metric_type: counter
                    - name: forbidden
                      type: long
                      metric_type: counter
                    - name: internal
                      type: long
                      metric_type: counter
                    - name: invalidquery
                      type: long
                      metric_type: counter
                    - name: method
                      type: long
                      metric_type: counter
                    - name: notfound
                      type: long
                      metric_type: counter
                    - name: queue
                      type: long
                      metric_type: counter
                    - name: ratelimit
                      type: long
                      metric_type: counter
                    - name: timeout
                      type: long
                      metric_type: counter
                    - name: toolarge
                      type: long
                      metric_type: counter
                    - name: unauthorized
                      type: long
                      metric_type: counter
