                      metric_type: counter
                    - name: count
                      type: long
                      metric_type: counter
                    - name: decode
                      type: long
                      metric_type: counter
                    - name: forbidden
                      type: long
                      metric_type: counter
                    - name: internal
                      type: long
                      metric_type: counter
