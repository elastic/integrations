                      type: long
                      metric_type: counter
                    - name: notmodified
                      type: long
                      metric_type: counter
                    - name: ok
                      type: long
                      metric_type: counter
            - name: unset
              type: long
              metric_type: counter
        - name: sampling
          type: group
          fields:
            - name: tail
              type: group
              fields:
                - name: dynamic_service_groups
                  type: long
                  metric_type: gauge
                - name: events
                  type: group
                  fields:
                    - name: dropped
                      type: long
                      metric_type: counter
                      description: >
                        Number of tail-sampling events dropped
                    - name: failed_writes
                      type: long
                      metric_type: counter
                      description: >
                        Number of failed writes in tail-based sampling
                    - name: head_unsampled
                      type: long
                      metric_type: counter
                      description: >
                        Number of head-unsampled events
                    - name: processed
                      type: long
                      metric_type: counter
                      description: >
                        Number of tail-sampling events processed
                    - name: sampled
                      type: long
                      metric_type: counter
                      description: >
                        Number of tail-sampling events sampled
                    - name: stored
                      type: long
                      metric_type: counter
                      description: >
                        Number of tail-sampling events stored
                - name: storage
                  type: group
                  fields:
                    - name: lsm_size
                      type: long
                      format: bytes
                      unit: byte
                      metric_type: gauge
                      description: >
                        Size of the LSM tree in bytes
                    - name: value_log_size
                      type: long
                      format: bytes
                      unit: byte
                      metric_type: gauge
                      description: >
                        Size of the value log in bytes (legacy, always 0 for pebble)
                    - name: storage_limit
                      type: long
                      format: bytes
                      unit: byte
                      metric_type: gauge
                      description: >
                        Configured storage limit for tail-based sampling database in bytes. 0 means unlimited storage with disk usage threshold check enabled.
                    - name: disk_used
                      type: long
                      format: bytes
                      unit: byte
                      metric_type: gauge
                      description: >
                        Actual used disk space in bytes for the filesystem containing the tail-based sampling storage directory
                    - name: disk_total
                      type: long
                      format: bytes
                      unit: byte
                      metric_type: gauge
                      description: >
                        Total disk space in bytes for the filesystem containing the tail-based sampling storage directory
                    - name: disk_usage_threshold_pct
                      type: float
                      metric_type: gauge
                      description: >
                        Configured disk usage threshold as a percentage (0-1). When storage_limit is 0, writes are rejected when disk_used exceeds this percentage of disk_total.
            - name: transactions_dropped
              type: long
              metric_type: counter
              description: >
                Number of transactions dropped
        - name: server
          type: group
          fields:
            - name: request
              type: group
              fields:
                - name: count
                  type: long
                  metric_type: counter
                  description: >
                    Number of requests received
            - name: response
              type: group
              fields:
