                      type: long
                      metric_type: counter
                    - name: forbidden
                      type: long
                      metric_type: counter
                    - name: internal
                      type: long
                      metric_type: counter
                    - name: invalidquery
                      type: long
                      metric_type: counter
                    - name: method
                      type: long
                      metric_type: counter
                    - name: notfound
                      type: long
                      metric_type: counter
                    - name: queue
                      type: long
                      metric_type: counter
                    - name: ratelimit
                      type: long
                      metric_type: counter
                    - name: timeout
                      type: long
                      metric_type: counter
                    - name: toolarge
                      type: long
                      metric_type: counter
                    - name: unauthorized
                      type: long
                      metric_type: counter
                    - name: unavailable
                      type: long
                      metric_type: counter
                    - name: validate
                      type: long
                      metric_type: counter
                - name: valid
                  type: group
                  fields:
                    - name: accepted
                      type: long
                      metric_type: counter
                    - name: count
                      type: long
                      metric_type: counter
                    - name: notmodified
                      type: long
                      metric_type: counter
                    - name: ok
                      type: long
                      metric_type: counter
            - name: unset
              type: long
              metric_type: counter

    - name: output
      type: group
      fields:
        - name: elasticsearch
          type: group
          fields:
            - name: bulk_requests
              type: group
              fields:
                - name: available
                  type: long
                  metric_type: gauge
                - name: completed
                  type: long
                  metric_type: counter
            - name: indexers
              type: group
              fields:
