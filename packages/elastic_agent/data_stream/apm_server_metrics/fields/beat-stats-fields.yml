- name: beat.stats
  type: group
  fields:
    - name: beat
      type: group
      fields:
        - name: name
          type: keyword
          dimension: true
        - name: host
          type: keyword
          dimension: true
        - name: type
          type: keyword
          dimension: true
        - name: uuid
          type: keyword
          dimension: true
        - name: version
          type: keyword
    - name: system
      type: group
      fields:
        - name: cpu.cores
          type: long
          metric_type: gauge
        - name: load
          type: group
          fields:
            - name: "1"
              type: double
              metric_type: gauge
            - name: "15"
              type: double
              metric_type: gauge
            - name: "5"
              type: double
              metric_type: gauge
            - name: norm
              type: group
              fields:
                - name: "1"
                  type: double
                  metric_type: gauge
                - name: "15"
                  type: double
                  metric_type: gauge
                - name: "5"
                  type: double
                  metric_type: gauge
    - name: cpu
      type: group
      fields:
        - name: system.ticks
          type: long
          metric_type: counter
        - name: system.time.ms
          type: long
          metric_type: counter
        - name: total.value
          type: long
          metric_type: counter
        - name: total.ticks
          type: long
          metric_type: counter
        - name: total.time.ms
          type: long
          metric_type: counter
        - name: user.ticks
          type: long
          metric_type: counter
        - name: user.time.ms
          type: long
          metric_type: counter
    - name: info
      type: group
      fields:
        - name: ephemeral_id
          type: keyword
        - name: uptime.ms
          type: long
          metric_type: counter
    - name: cgroup
      type: group
      fields:
        - name: cpu
          type: group
          fields:
            - name: cfs.period.us
              type: long
              metric_type: gauge
            - name: cfs.quota.us
              type: long
              metric_type: gauge
            - name: id
              type: keyword
            - name: stats
              type: group
              fields:
                - name: periods
                  type: long
                  metric_type: counter
                - name: throttled.periods
                  type: long
                  metric_type: counter
                - name: throttled.ns
                  type: long
                  metric_type: counter
        - name: cpuacct.id
          type: keyword
        - name: cpuacct.total.ns
          type: long
          metric_type: counter
        - name: memory
          type: group
          fields:
            - name: id
              type: keyword
            - name: mem.limit.bytes
              type: long
              metric_type: gauge
            - name: mem.usage.bytes
              type: long
              metric_type: gauge
    - name: memstats
      type: group
      fields:
        - name: gc_next
          type: long
          metric_type: gauge
        - name: memory.alloc
          type: long
          metric_type: gauge
        - name: memory.total
          type: long
          metric_type: counter
        - name: rss
          type: long
          metric_type: gauge
    - name: handles
      type: group
      fields:
        - name: open
          type: long
          metric_type: gauge
        - name: limit.hard
          type: long
          metric_type: gauge
        - name: limit.soft
          type: long
          metric_type: gauge
    - name: uptime.ms
      type: long
      metric_type: counter
      description: >
        Beat uptime
    - name: runtime.goroutines
      type: long
      metric_type: gauge
      description: >
        Number of goroutines running in Beat
    - name: libbeat
      type: group
      description: >
        Fields common to all Beats
      fields:
        - name: pipeline
          type: group
          fields:
            - name: clients
              type: long
              metric_type: gauge
            - name: queue
              type: group
              fields:
                - name: acked
                  type: long
                  metric_type: counter
                  description: >
                    Number of acknowledged events
                - name: added.bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes added to the queue
                - name: added.events
                  type: long
                  metric_type: counter
                  description: >
                    Number of events added to the queue
                - name: consumed.bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes consumed from the queue
                - name: consumed.events
                  type: long
                  metric_type: counter
                  description: >
                    Number of events consumed from the queue
                - name: filled.bytes
                  type: long
                  metric_type: gauge
                  description: >
                    Number of bytes filled in the queue
                - name: filled.events
                  type: long
                  metric_type: gauge
                  description: >
                    Number of events filled in the queue
                - name: filled.pct
                  type: float
                  metric_type: gauge
                  description: >
                    Percentage of the queue filled
                - name: max_events
                  type: long
                  metric_type: gauge
                  description: >
                    Maximum number of events allowed in the queue
                - name: removed.bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes removed from the queue
                - name: removed.events
                  type: long
                  metric_type: counter
                  description: >
                    Number of events removed from the queue
            - name: events
              type: group
              fields:
                - name: active
                  type: long
                  metric_type: gauge
                - name: dropped
                  type: long
                  metric_type: counter
                - name: failed
                  type: long
                  metric_type: counter
                - name: filtered
                  type: long
                  metric_type: counter
                - name: published
                  type: long
                  metric_type: counter
                - name: retry
                  type: long
                  metric_type: counter
                - name: total
                  type: long
                  metric_type: counter
        - name: config
          type: group
          fields:
            - name: reloads
              type: long
              metric_type: counter
            - name: running
              type: long
              metric_type: gauge
            - name: starts
              type: long
              metric_type: counter
            - name: stops
              type: long
              metric_type: counter
        - name: output
          type: group
          fields:
            - name: type
              type: keyword
              description: >
                Type of output
            - name: events
              type: group
              fields:
                - name: acked
                  type: long
                  metric_type: counter
                  description: >
                    Number of events acknowledged
                - name: active
                  type: long
                  metric_type: gauge
                  description: >
                    Number of active events
                - name: batches
                  type: long
                  metric_type: counter
                  description: >
                    Number of event batches
                - name: dropped
                  type: long
                  metric_type: counter
                  description: >
                    Number of events dropped
                - name: duplicates
                  type: long
                  metric_type: counter
                  description: >
                    Number of events duplicated
                - name: failed
                  type: long
                  metric_type: counter
                  description: >
                    Number of events failed
                - name: toomany
                  type: long
                  metric_type: counter
                  description: >
                    Number of too many events
                - name: total
                  type: long
                  metric_type: counter
                  description: >
                    Total number of events processed by the output
            - name: write
              type: group
              description: >
                Write stats
              fields:
                - name: bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes written
                - name: errors
                  type: long
                  metric_type: counter
                  description: >
                    Number of write errors
                - name: latency
                  type: group
                  fields:
                    - name: histogram
                      type: group
                      fields:
                        - name: count
                          type: long
                          metric_type: counter
                        - name: max
                          type: float
                          metric_type: gauge
                        - name: median
                          type: long
                          metric_type: gauge
                        - name: p99
                          type: float
                          metric_type: gauge
            - name: read
              type: group
              description: >
                Read stats
              fields:
                - name: bytes
                  type: long
                  metric_type: counter
                  description: >
                    Number of bytes read
                - name: errors
                  type: long
                  metric_type: counter
                  description: >
                    Number of read errors
    - name: apm_server
      type: group
      description: >
        APM Server specific metrics
      fields:
        - name: acm
          type: group
          fields:
            - name: request.count
              type: long
              metric_type: counter
            - name: response
              type: group
              fields:
                - name: count
                  type: long
                  metric_type: counter
                - name: errors
                  type: group
                  fields:
                    - name: closed
