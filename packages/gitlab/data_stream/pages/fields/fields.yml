- name: gitlab
  type: group
  fields:
    - name: pages
      type: group
      fields:
        - name: config_addr
          type: keyword
        - name: content_type
          type: keyword
        - name: correlation_id
          type: keyword
        - name: duration_ms
          type: long
        - name: error
          type: keyword
        - name: gid
          type: keyword
        - name: host
          type: keyword
        - name: in_place
          type: boolean
        - name: level
          type: keyword
        - name: listen_addr
          type: group
          fields:
            - name: ip
              type: ip
            - name: port
              type: long
            - name: zone
              type: keyword
        - name: lookup_name
          type: keyword
        - name: method
          type: keyword
        - name: msg
          type: keyword
        - name: pages_https
          type: boolean
        - name: proto
          type: keyword
        - name: read_bytes
          type: long
        - name: referrer
          type: keyword
        - name: remote_addr
          type: keyword
        - name: remote_ip
          type: ip
        - name: revision
          type: keyword
        - name: status
          type: long
        - name: system
          type: keyword
        - name: time
          type: date
        - name: ttfb_ms
          type: long
        - name: uid
          type: keyword
        - name: uri
          type: keyword
        - name: user_agent
          type: keyword
        - name: version
          type: keyword
        - name: written_bytes
          type: long
