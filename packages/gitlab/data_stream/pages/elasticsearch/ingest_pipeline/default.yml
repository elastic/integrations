---
description: Pipeline for processing pages logs
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 8.11.0
  - rename:
      field: message
      target_field: event.original
      tag: rename_message
      ignore_missing: true
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      tag: remove_message
      if: ctx.event?.original != null
  - drop: 
      if: ctx.event?.original?.startsWith('#')
      description: Drop if logline contains header(s), which startswith `#`.
  - append:
      field: event.category
      value: web
  - append:
      field: event.type
      value: info
  - set:
      field: event.kind
      value: event
  - json:
      field: event.original
      tag: 'json_decoding'
      target_field: gitlab.pages
  - date:
      field: gitlab.pages.time
      formats:
        - "ISO8601"
      target_field: "@timestamp"
      timezone: "UTC"
      tag: date_event_created_time_epoch
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      if: ctx.gitlab?.pages?.time != null
  - remove:
      field: gitlab.pages.time
      ignore_missing: true
  - lowercase:
      field: gitlab.pages.level
      ignore_missing: true
  - set:
      field: event.level
      value: 0
      if: ctx.gitlab?.pages?.level == 'emergency'
      tag: set_level_0
  - set:
      field: event.level
      value: 1
      if: ctx.gitlab?.pages?.level == 'alert'
      tag: set_level_1
  - set:
      field: event.level
      value: 2
      if: ctx.gitlab?.pages?.level == 'critical'
      tag: set_level_2
  - set:
      field: event.level
      value: 3
      if: ctx.gitlab?.pages?.level == 'error'
      tag: set_level_3
  - set:
      field: event.level
      value: 4
      if: ctx.gitlab?.pages?.level == 'warn'
      tag: set_level_4
  - set:
      field: event.level
      value: 5
      if: ctx.gitlab?.pages?.level == 'notice'
      tag: set_level_5
  - set:
      field: event.level
      value: 6
      if: ctx.gitlab?.pages?.level == 'info'
      tag: set_level_6
  - set:
      field: event.level
      value: 7
      if: ctx.gitlab?.pages?.level == 'debug'
      tag: set_level_7
  - remove:
      field: gitlab.pages.level
      ignore_missing: true
  - rename:
      field: gitlab.pages.correlation_id
      target_field: event.id
      ignore_missing: true
  - rename: 
      field: gitlab.pages.gid
      target_field: group.id
      ignore_missing: true
  - convert:
      field: group.id
      type: string
      ignore_missing: true
  - rename: 
      field: gitlab.pages.in-place
      target_field: gitlab.pages.in_place
      ignore_missing: true
  - rename: 
      field: gitlab.pages.uid
      target_field: user.id
      ignore_missing: true
  - convert: 
      field: user.id
      type: string
      ignore_missing: true
  - set:
      field: http.request.mime_type
      tag: set_http_request_mime_type_from_pages_content_type
      copy_from: gitlab.pages.content_type
      ignore_empty_value: true
  - convert:
      field: gitlab.pages.duration_ms
      tag: convert_duration_ms_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.duration_ms
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: host.name
      tag: set_host_name_from_pages_host
      copy_from: gitlab.pages.host
      ignore_empty_value: true
  - rename:
      field: gitlab.pages.in-place
      tag: rename_in_place
      target_field: gitlab.pages.in_place
      ignore_missing: true
  - convert:
      field: gitlab.pages.in-place
      tag: convert_in-place_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.in_place
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: gitlab.pages.listen_addr.IP
      tag: rename_listen_addr_IP
      target_field: gitlab.pages.listen_addr.ip
      ignore_missing: true
  - convert:
      field: gitlab.pages.listen_addr.ip
      tag: convert_listen_addr_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.gitlab?.pages?.listen_addr?.ip != ''
      on_failure:
        - remove:
            field: gitlab.pages.listen_addr.ip
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: server.ip
      tag: set_server_ip_from_pages_listen_addr_ip
      copy_from: gitlab.pages.listen_addr.ip
      ignore_empty_value: true
  - rename:
      field: gitlab.pages.listen_addr.Port
      tag: rename_listen_addr_Port
      target_field: gitlab.pages.listen_addr.port
      ignore_missing: true
  - convert:
      field: gitlab.pages.listen_addr.port
      tag: convert_listen_addr_port_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.listen_addr.port
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: server.port
      tag: set_server_port_from_pages_listen_addr_port
      copy_from: gitlab.pages.listen_addr.port
      ignore_empty_value: true
  - set:
      field: http.request.method
      tag: set_http_request_method_from_pages_msg
      copy_from: gitlab.pages.method
      ignore_empty_value: true
  - convert:
      field: gitlab.pages.pages_https
      tag: convert_pages_https_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.pages_https
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - dissect:
      field: gitlab.pages.proto
      tag: dissect_pages_proto
      pattern: "%{}/%{http.version}"
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: gitlab.pages.read_bytes
      tag: convert_read_bytes_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.read_bytes
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: server.bytes
      tag: set_server_bytes_from_pages_read_bytes
      copy_from: gitlab.pages.read_bytes
      ignore_empty_value: true
  - set:
      field: http.request.referrer
      tag: set_http_request_referrer_from_pages_referrer
      copy_from: gitlab.pages.referrer
      ignore_empty_value: true
  - dissect:
      field: remote_addr
      tag: dissect_remote_addr
      pattern: '%{}:%{POSTINT:source.port}'
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.address
      tag: set_source_address_from_pages_remote_addr
      copy_from: gitlab.pages.remote_addr
      ignore_empty_value: true
  - convert:
      field: gitlab.pages.remote_ip
      tag: convert_remote_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.gitlab?.pages?.remote_ip != ''
      on_failure:
        - remove:
            field: gitlab.pages.remote_ip
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      tag: set_source_ip_from_pages_remote_ip
      copy_from: gitlab.pages.remote_ip
      ignore_empty_value: true
  - convert:
      field: gitlab.pages.status
      tag: convert_status_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.status
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: http.response.status_code
      tag: set_http_response_status_code_from_pages_status
      copy_from: gitlab.pages.status
      ignore_empty_value: true
  - convert:
      field: gitlab.pages.ttfb_ms
      tag: convert_ttfb_ms_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.ttfb_ms
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: gitlab.pages.written_bytes
      tag: convert_written_bytes_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: gitlab.pages.written_bytes
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: client.bytes
      tag: set_client_bytes_from_pages_written_bytes
      copy_from: gitlab.pages.written_bytes
      ignore_empty_value: true
  - rename: 
      field: gitlab.pages.msg
      target_field: message
      ignore_missing: true
  - append:
      field: related.user
      value: '{{{user.id}}}'
      if: ctx.user?.id != null
      allow_duplicates: false
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: Drops null/empty values recursively.
      source: |-
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
