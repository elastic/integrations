          type: group
          fields:
            - name: batched_git_ref_updates_cleanup_scheduler_worker
              type: group
              fields:
                - name: stats
                  type: group
                  fields:
                    - name: total_projects
                      type: long
            - name: cells_stale_requests_cleanup_cron_worker
              type: group
              fields:
                - name: removed_count
                  type: long
            - name: ci_catalog_resources_process_sync_events_worker
              type: group
              fields:
                - name: consumable_events
                  type: long
                - name: estimated_total_events
                  type: long
            - name: ci_pipeline_artifacts_expire_artifacts_worker
              type: group
              fields:
                - name: destroyed_pipeline_artifacts_count
                  type: long
            - name: ci_unlock_pipelines_in_queue_worker
              type: group
              fields:
                - name: remaining_pending
                  type: long
            - name: ci_update_locked_unknown_artifacts_worker
              type: group
              fields:
                - name: locked_count
                  type: long
                - name: removed_count
                  type: long
            - name: container_expiration_policy_worker
              type: group
              fields:
                - name: cleanup_required_count
                  type: long
                - name: cleanup_total_count
                  type: long
                - name: cleanup_unfinished_count
                  type: long
            - name: expire_build_artifacts_worker
              type: group
              fields:
                - name: destroyed_job_artifacts_count
                  type: long
            - name: loose_foreign_keys_ci_pipelines_builds_cleanup_cron_worker
              type: group
              fields:
                - name: stats
                  type: group
                  fields:
                    - name: delete_count
                      type: long
                    - name: over_limit
                      type: boolean
                    - name: turbo_mode
                      type: boolean
                    - name: update_count
                      type: long
            - name: loose_foreign_keys_cleanup_worker
              type: group
              fields:
                - name: stats
                  type: group
                  fields:
                    - name: connection
                      type: keyword
                    - name: delete_count
                      type: long
                    - name: over_limit
                      type: boolean
                    - name: turbo_mode
                      type: boolean
                    - name: update_count
                      type: long
            - name: loose_foreign_keys_merge_request_diff_commit_cleanup_worker
              type: group
              fields:
                - name: stats
                  type: group
                  fields:
                    - name: delete_count
                      type: long
                    - name: over_limit
                      type: boolean
                    - name: turbo_mode
                      type: boolean
                    - name: update_count
                      type: long
            - name: namespaces_process_sync_events_worker
              type: group
              fields:
                - name: consumable_events
                  type: long
                - name: estimated_total_events
                  type: long
                - name: processed_events
                  type: long
            - name: object_storage_delete_stale_direct_uploads_worker
              type: group
              fields:
                - name: execution_timeout
                  type: boolean
                - name: total_deleted_stale_entries
                  type: long
                - name: total_pending_entries
                  type: long
            - name: packages_cleanup_delete_orphaned_dependencies_worker
              type: group
              fields:
                - name: deleted_rows_count
                  type: long
                - name: last_processed_packages_dependency_id
                  type: long
            - name: pages_deactivate_expired_deployments_cron_worker
              type: group
              fields:
                - name: deactivate_expired_pages_deployments
                  type: group
                  fields:
                    - name: deactivated_deployments
                      type: long
                    - name: duration
                      type: double
            - name: projects_process_sync_events_worker
              type: group
              fields:
                - name: consumable_events
                  type: long
                - name: estimated_total_events
                  type: long
                - name: processed_events
                  type: long
