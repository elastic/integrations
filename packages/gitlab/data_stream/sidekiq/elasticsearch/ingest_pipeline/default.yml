---
description: Pipeline for processing sidekiq logs.
processors:
  - set:
      field: ecs.version
      value: 8.11.0
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      if: ctx.event?.original == null
      ignore_missing: true
  - remove:
      field: message
      ignore_missing: true
      tag: remove_message
      if: ctx.event?.original != null
  - drop: 
      if: ctx.event?.original?.startsWith('#')
      description: Drop if logline contains header(s), which startswith `#`.
  - json:
      field: event.original
      tag: 'json_decoding'
      target_field: gitlab.sidekiq
  - append:
      field: event.category
      value: web
  - append:
      field: event.type
      value: info
  - set:
      field: event.kind
      value: event
  - date:
      field: gitlab.sidekiq.time
      formats:
        - "ISO8601"
      target_field: "@timestamp"
      timezone: "UTC"
      tag: date_event_created_time_epoch
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      if: ctx.gitlab?.sidekiq?.time != null && ctx.gitlab.sidekiq.time != ''
  - remove:
      field: gitlab.sidekiq.time
      ignore_missing: true
  - lowercase:
      field: gitlab.sidekiq.severity
      ignore_missing: true
  - set:
      field: event.severity
      value: 0
      if: ctx.gitlab?.sidekiq?.severity == 'emergency'
      tag: set_severity_0
  - set:
      field: event.severity
      value: 1
      if: ctx.gitlab?.sidekiq?.severity == 'alert'
      tag: set_severity_1
  - set:
      field: event.severity
      value: 2
      if: ctx.gitlab?.sidekiq?.severity == 'critical'
      tag: set_severity_2
  - set:
      field: event.severity
      value: 3
      if: ctx.gitlab?.sidekiq?.severity == 'error'
      tag: set_severity_3
  - set:
      field: event.severity
      value: 4
      if: ctx.gitlab?.sidekiq?.severity == 'warn'
      tag: set_severity_4
  - set:
      field: event.severity
      value: 5
      if: ctx.gitlab?.sidekiq?.severity == 'notice'
      tag: set_severity_5
  - set:
      field: event.severity
      value: 6
      if: ctx.gitlab?.sidekiq?.severity == 'info'
      tag: set_severity_6
  - set:
      field: event.severity
      value: 7
      if: ctx.gitlab?.sidekiq?.severity == 'debug'
      tag: set_severity_7
  - remove:
      field: gitlab.sidekiq.severity
      ignore_missing: true
  - date:
      field: gitlab.sidekiq.created_at
      formats:
        - "ISO8601"
      target_field: event.start
      timezone: "UTC"
      tag: start_date_event_created_time_epoch
      if: ctx.gitlab?.sidekiq?.created_at != null && ctx.gitlab.sidekiq.created_at != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - remove:
      field: gitlab.sidekiq.created_at
      ignore_missing: true
  - date:
      field: gitlab.sidekiq.enqueued_at
      formats:
        - "ISO8601"
      target_field:  gitlab.sidekiq.enqueued_at
      timezone: "UTC"
      tag: enqueued_date_event_created_time_epoch
      if: ctx.gitlab?.sidekiq?.enqueued_at != null && ctx.gitlab.sidekiq.enqueued_at != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename: 
      field: gitlab.sidekiq.pid
      target_field: process.pid
      ignore_missing: true
  - rename: 
      field: gitlab.sidekiq.message
      target_field: message
      ignore_missing: true
  - rename:
      field: gitlab.sidekiq.trace_propagation_headers.sentry-trace
      tag: rename_trace_propagation_headers_sentry_trace_to_trace_propagation_headers_sentry_trace
      target_field: gitlab.sidekiq.trace_propagation_headers.sentry_trace
      ignore_missing: true
  - remove:
      field: gitlab.sidekiq.trace_propagation_headers.sentry-trace
      ignore_missing: true
  - rename: 
      field: gitlab.sidekiq.duration
      target_field: event.duration
      ignore_missing: true
  - script:
      tag: convert_duration_to_nanoseconds
      if: ctx.event?.duration instanceof double
      source: |-
        ctx.event.duration = (long) (ctx.event.duration*1e9)
  - date:
      field: gitlab.sidekiq.completed_at
      formats:
        - "ISO8601"
      target_field: event.end
      timezone: "UTC"
      tag: end_date_event_created_time_epoch
      if: ctx.gitlab?.sidekiq?.completed_at != null && ctx.gitlab.sidekiq.completed_at != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - remove:
      field: gitlab.sidekiq.completed_at
      ignore_missing: true
  - rename:
      field: gitlab.sidekiq.db_duration
      target_field: gitlab.sidekiq.db.duration_m
      ignore_missing: true
  - rename:
      field: gitlab.sidekiq.db_duration_s
      target_field: gitlab.sidekiq.db.duration_s
      ignore_missing: true
  - rename:
      field: gitlab.sidekiq.gitaly_duration
      target_field: gitlab.gitaly.duration
      ignore_missing: true
  - rename: 
      field: gitlab.sidekiq.gitaly_calls
      target_field: gitlab.gitaly.calls
      ignore_missing: true
  - convert:
      field: gitlab.sidekiq.cpu_s
      tag: convert_cpu_s_to_double
      type: double
      ignore_missing: true
      on_failure:
