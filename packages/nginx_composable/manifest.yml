format_version: "3.6.2"
name: nginx_otel_integration
title: "NGINX OTel Integration"
version: "0.1.0"
source:
  license: "Elastic-2.0"
description: >-
  Collect logs and metrics from NGINX using OTel-based input packages.
  Depends on the filelog_otel input package for access/error logs, 
  the nginx_otel_input input package for stub_status metrics, and 
  the nginx_otel content package for dashboards.
type: integration
categories:
  - web
  - observability
  - opentelemetry
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: "basic"
icons:
  - src: /img/logo_nginx.svg
    title: Nginx logo
    size: 32x32
    type: image/svg+xml
requires:
  input:
    - package: filelog_otel
      version: "0.2.0"
    - package: nginx_otel_input
      version: "0.2.0"
  content:
    - package: nginx_otel
      version: "^0.3.0"
policy_templates:
  - name: nginx
    title: Nginx logs and metrics
    description: Collect logs and metrics from Nginx instances
    data_streams:
      - access
      - error
      - stubstatus
    inputs:
      - package: filelog_otel
        title: Collect Nginx access and error logs via filelog OTel receiver
        description: Use the filelog_otel input package to tail Nginx log files.
      - package: nginx_otel_input
        title: Collect Nginx stub status metrics via OTel receiver
        description: Use the nginx_otel_input package to scrape Nginx stub_status metrics.
owner:
  github: elastic/ecosystem
  type: elastic
