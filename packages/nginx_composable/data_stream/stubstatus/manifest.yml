title: Nginx stub status metrics
type: metrics
streams:
  - package: nginx_otel_input
    title: Nginx stub status metrics via OTel receiver
    description: Collect Nginx stub_status metrics using the nginx receiver.
    vars:
      - name: endpoint
        default: http://localhost:80/server-status
elasticsearch:
  index_template:
    mappings:
      subobjects: false
