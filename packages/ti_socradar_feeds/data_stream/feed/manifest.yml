type: logs
title: SOCRadar Threat Feed indicators
ilm_policy: logs-ti_socradar_feeds.feed-default_policy
streams:
  - input: cel
    enabled: true
    template_path: cel.yml.hbs
    title: Collects threat intelligence indicators from SOCRadar feed collections
    description: Collects threat intelligence indicators from SOCRadar feed collections via CEL input.
    vars:
      - name: interval
        type: text
        title: Interval
        multi: false
        required: true
        show_user: true
        default: 5m
        description: >
          Duration between collection polling cycles. Supported units for this parameter are h/m/s.
          Note: each tick polls one collection in round-robin fashion. With the default of 5m and 7 recommended collections, every collection is refreshed roughly every 35 minutes.
          The first poll occurs after one interval; lower this value for faster initial data, increase it for low-volume environments.
      - name: initial_interval
        type: text
        title: Initial Interval
        description: How far back to look for indicators the first time the agent is started. Supported units for this parameter are h/m/s.
        multi: false
        required: true
        show_user: true
        default: 10h
      - name: ioc_expiration_duration
        type: text
        title: IOC Expiration Duration
        multi: false
        required: true
        show_user: true
        default: "90d"
        description: >
          Indicator is expired after this duration since its last seen timestamp. Use [Elasticsearch time units](https://www.elastic.co/guide/en/elasticsearch/reference/current/api-conventions.html#time-units) in days, hours, or minutes (e.g 10d). Default `90d`.
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring that the HTTP client connection has timed out. Supported time units are ns, us, ms, s, m, h.
        multi: false
        required: false
        show_user: false
        default: 60s
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        multi: false
        required: false
        show_user: false
        default: false
        description: >
          The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-cel.html#_request_tracer_filename) for details.
      - name: preserve_original_event
        type: bool
        title: Preserve original event
        multi: false
        required: true
        show_user: false
        default: false
        description: Preserves a raw copy of the original event, added to the field `event.original`.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - ti_socradar_feeds-feed
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
