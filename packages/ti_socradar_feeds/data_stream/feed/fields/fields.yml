- name: socradar
  type: group
  fields:
    - name: feed
      type: group
      fields:
        - name: value
          type: keyword
          description: >
            The indicator value (IP, domain, hash, URL, email).
        - name: type
          type: keyword
          description: >
            Feed indicator type from SOCRadar (ip, hostname, hash, url, email).
        - name: collection_id
          type: keyword
          description: >
            SOCRadar feed collection UUID.
        - name: collection_name
          type: keyword
          description: >
            SOCRadar feed collection display name.
        - name: first_seen_date
          type: date
          description: >
            First seen date from SOCRadar feed.
        - name: latest_seen_date
          type: date
          description: >
            Latest seen date from SOCRadar feed.
        - name: maintainer_name
          type: keyword
          description: >
            Feed maintainer identifier.
        - name: extra_info
          type: flattened
          description: >
            Additional metadata from the feed.
        - name: ioc_expiration_date
          type: date
          description: >
            Calculated indicator expiration date.
        - name: ioc_expiration_duration
          type: keyword
          description: >
            Configured IOC expiration duration.
        - name: ioc_expiration_reason
          type: keyword
          description: >
            Reason for IOC expiration setting.
- name: threat.feed.reference
  type: keyword
  description: >
    Feed reference URL.
- name: threat.indicator.type
  type: keyword
  description: >
    Type of indicator (ipv4-addr, domain-name, file, url, email-addr).
- name: threat.indicator.confidence
  type: keyword
  description: >
    Indicator confidence level.
- name: threat.indicator.description
  type: keyword
  description: >
    Indicator description.
- name: threat.indicator.provider
  type: keyword
  description: >
    Indicator provider name.
- name: threat.indicator.ip
  type: ip
  description: >
    IPv4 or IPv6 address indicator.
- name: threat.indicator.url.domain
  type: keyword
  description: >
    Domain name indicator.
- name: threat.indicator.url.full
  type: wildcard
  description: >
    Full URL indicator.
- name: threat.indicator.url.original
  type: wildcard
  description: >
    Original URL indicator value.
- name: threat.indicator.email.address
  type: keyword
  description: >
    Email address indicator.
- name: threat.indicator.file.hash.md5
  type: keyword
  description: >
    MD5 file hash indicator.
- name: threat.indicator.file.hash.sha1
  type: keyword
  description: >
    SHA-1 file hash indicator.
- name: threat.indicator.file.hash.sha256
  type: keyword
  description: >
    SHA-256 file hash indicator.
