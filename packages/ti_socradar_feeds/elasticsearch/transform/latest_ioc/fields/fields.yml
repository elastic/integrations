- name: ti_socradar_feeds
  type: group
  fields:
    - name: feed
      type: group
      fields:
        - name: value
          type: keyword
          description: >
            The indicator value (IP, domain, hash, URL, email).
        - name: type
          type: keyword
          description: >
            Feed indicator type from SOCRadar (ip, hostname, hash, url, email).
        - name: collection_id
          type: keyword
          description: >
            SOCRadar feed collection UUID.
        - name: collection_name
          type: keyword
          description: >
            SOCRadar feed collection display name.
        - name: first_seen_date
          type: date
          description: >
            First seen date from SOCRadar feed.
        - name: latest_seen_date
          type: date
          description: >
            Latest seen date from SOCRadar feed.
        - name: maintainer_name
          type: keyword
          description: >
            Feed maintainer identifier.
        - name: extra_info
          type: flattened
          description: >
            Additional metadata from the feed.
        - name: ioc_expiration_date
          type: date
          description: >
            Calculated indicator expiration date.
        - name: ioc_expiration_duration
          type: keyword
          description: >
            Configured IOC expiration duration.
        - name: ioc_expiration_reason
          type: keyword
          description: >
            Reason for IOC expiration setting.
- name: threat.feed.name
  external: ecs
- name: threat.feed.reference
  external: ecs
- name: threat.indicator.type
  external: ecs
- name: threat.indicator.confidence
  external: ecs
- name: threat.indicator.description
  external: ecs
- name: threat.indicator.provider
  external: ecs
- name: threat.indicator.ip
  external: ecs
- name: threat.indicator.url.domain
  external: ecs
- name: threat.indicator.url.full
  external: ecs
- name: threat.indicator.url.original
  external: ecs
- name: threat.indicator.email.address
  external: ecs
- name: threat.indicator.file.hash.md5
  external: ecs
- name: threat.indicator.file.hash.sha1
  external: ecs
- name: threat.indicator.file.hash.sha256
  external: ecs
- name: threat.indicator.file.hash.sha512
  external: ecs
