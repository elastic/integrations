- name: ping_directory.audit
  type: group
  fields:
    - name: changetype
      type: keyword
      description: LDAP change type such as add, modify, or delete.
    - name: client_ip
      type: ip
      description: Client IP address associated with the operation.
    - name: conn
      type: long
      description: Connection identifier associated with the operation.
    - name: create_timestamp
      type: date
      description: Timestamp when the entry was created.
    - name: creators_name
      type: group
      fields:
        - name: cn
          type: keyword
          description: Common name component of the creator Distinguished Name.
        - name: meta
          type: keyword
          description: Remaining path components of the creator Distinguished Name.
    - name: dn
      type: group
      fields:
        - name: cn
          type: keyword
          description: Common name component of the target entry Distinguished Name.
        - name: meta
          type: keyword
          description: Remaining path components of the target entry Distinguished Name.
    - name: ds_cfg
      type: flattened
      description: Dynamic ds-cfg attributes extracted from PingDirectory audit records.
    - name: entry_uuid
      type: keyword
      description: Unique identifier assigned to the LDAP entry.
    - name: instance_name
      type: keyword
      description: PingDirectory instance that generated the event.
    - name: modifiers_name
      type: group
      fields:
        - name: cn
          type: keyword
          description: Common name component of the modifier Distinguished Name.
        - name: meta
          type: keyword
          description: Remaining path components of the modifier Distinguished Name.
    - name: modify_timestamp
      type: date
      description: Timestamp when the entry was last modified.
    - name: object_classes
      type: keyword
      description: List of LDAP objectClass values associated with the entry.
    - name: op
      type: long
      description: Operation identifier within the connection.
    - name: operation_purpose
      type: group
      fields:
        - name: application_name
          type: keyword
          description: Name of the application initiating the operation.
        - name: application_version
          type: keyword
          description: Version of the application initiating the operation.
        - name: code_location
          type: keyword
          description: Code path that initiated the operation.
    - name: origin
      type: keyword
      description: Origin of the operation.
    - name: requester_dn
      type: group
      fields:
        - name: cn
          type: keyword
          description: Common name component of the requester Distinguished Name.
        - name: meta
          type: keyword
          description: Remaining path components of the requester Distinguished Name.
    - name: thread_id
      type: keyword
      description: Thread ID processing the operation.
    - name: timestamp
      type: date
      description: Timestamp of the audit log entry.
    - name: timezone
      type: keyword
      description: Timezone offset associated with the audit event.
    - name: triggered_by_conn
      type: long
      description: Connection ID that triggered the operation.
    - name: triggered_by_op
      type: long
      description: Operation ID that triggered the operation.
    - name: using_admin_session_worker_thread
      type: boolean
      description: Indicates whether an admin session worker thread processed the operation.
