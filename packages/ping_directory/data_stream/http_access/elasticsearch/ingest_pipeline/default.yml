---
description: Pipeline for processing PingDirectory HTTP Access logs.

processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - rename:
      field: message
      tag: rename_message_to_event_original
      if: ctx.event?.original == null
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message.
  - remove:
      field:
        - message
      tag: remove_message
      if: ctx.event?.original != null
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
  - grok:
      field: event.original
      tag: parse_http_access
      patterns:
       - '\[(?<ping_directory.http_access.timestamp>\d{2}\/[A-Za-z]{3}\/\d{4}:\d{2}:\d{2}:\d{2}\.\d{3}) (?<ping_directory.http_access.timezone>[+-]\d{4})\] %{WORD:ping_directory.http_access.type}(?: instanceName="%{DATA:observer.name}")?(?: threadID=%{NUMBER:ping_directory.http_access.thread_id:long})?(?: requestID=%{NUMBER:ping_directory.http_access.request_id})?(?: correlationID="%{DATA:ping_directory.http_access.correlation_id}")?(?: from="%{IP:client.ip}:%{NUMBER:client.port:long}")?(?: method="%{WORD:http.request.method}")?(?: url="%{DATA:url.full}")?(?<_tmp_request_headers>(?: requestHeader="[^"]*")*)(?: authorizationType="%{DATA:ping_directory.http_access.authorization_type}")?(?: requestContentType="%{DATA:http.request.mime_type}")?(?: requestContentLength=%{NUMBER:http.request.bytes:long})?(?: statusCode=%{NUMBER:http.response.status_code:long})?(?: etime=%{NUMBER:ping_directory.http_access.etime:float})?(?: responseContentLength=%{NUMBER:http.response.bytes:long})?(?<_tmp_response_headers>(?: responseHeader="[^"]*")*)(?: responseContentType="%{DATA:http.response.mime_type}")?(?: redirectURI="%{DATA:ping_directory.http_access.redirect_uri}")?'
      if: ctx.event?.original != null
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_parse_http_access
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - script:
      lang: painless
      tag: parse_headers
      description: Split repeated requestHeader/responseHeader chunks into arrays.
      if: ctx._tmp_request_headers != null || ctx._tmp_response_headers != null
      source: |-
        List parseHeaders(String raw, String marker) {
          List out = new ArrayList();
          if (raw == null || raw.isEmpty()) {
            return out;
          }
          int idx = 0;
          while (true) {
            int start = raw.indexOf(marker, idx);
            if (start < 0) {
              break;
            }
            start += marker.length();
            int end = raw.indexOf('"', start);
            if (end < 0) {
              break;
            }
            out.add(raw.substring(start, end));
            idx = end + 1;
          }
          return out;
        }

        List reqs = parseHeaders(ctx._tmp_request_headers, 'requestHeader="');
        List resps = parseHeaders(ctx._tmp_response_headers, 'responseHeader="');

        if (!reqs.isEmpty() || !resps.isEmpty()) {
          if (ctx.ping_directory == null) {
            ctx.ping_directory = new HashMap();
          }
          if (ctx.ping_directory.http_access == null) {
            ctx.ping_directory.http_access = new HashMap();
          }
          if (!reqs.isEmpty()) {
            ctx.ping_directory.http_access.request_header_list = reqs;
          }
          if (!resps.isEmpty()) {
            ctx.ping_directory.http_access.response_header_list = resps;
          }
        }
  - remove:
      field:
        - _tmp_request_headers
        - _tmp_response_headers
      ignore_missing: true
      tag: remove_tmp_headers
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.type
      tag: append_access_into_event_type
      value: access
  - append:
      field: event.category
      tag: append_web_into_event_category
      value: web
  - set:
      field: observer.vendor
      tag: set_observer_vendor
      value: PingIdentity
  - set:
      field: observer.product
      tag: set_observer_product
      value: PingDirectory
  - convert:
      field: client.ip
      tag: convert_from_to_ip
      if: ctx.ping_directory?.http_access?.from != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: http.request.bytes
      tag: convert_requestContentLength_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_requestContentLength_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: http.response.bytes
      tag: convert_responseContentLength_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_responseContentLength_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: http.response.status_code
      tag: convert_statusCode_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_statusCode_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: trace.id
      tag: set_trace_id_from_http_access_correlation_id
      copy_from: ping_directory.http_access.correlation_id
      ignore_empty_value: true
  - append:
      field: related.ip
      tag: append_client_ip_into_related_ip
      if: ctx.client?.ip != null
      value: '{{{client.ip}}}'
      allow_duplicates: false
  - convert:
      field: ping_directory.http_access.etime
      tag: convert_etime_to_float
      if: ctx.ping_directory?.http_access?.etime != ''
      type: float
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_etime_to_float
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.duration
      tag: set_event_duration_from_http_access_etime
      copy_from: ping_directory.http_access.etime
      ignore_empty_value: true
  - script:
      tag: extract_http_headers
      lang: painless
      if: ctx?.ping_directory?.http_access != null
      source: |-
        Map reqMap = new HashMap();
        Map respMap = new HashMap();

        if (ctx.ping_directory?.http_access?.request_header_list instanceof List) {
          for (def h : ctx.ping_directory.http_access.request_header_list) {
            int idx = h.indexOf(':');
            if (idx > 0) {
              String key = h.substring(0, idx).trim();
              String val = h.substring(idx + 1).trim();

              if (key.equals("Accept")) {
                reqMap.put("accept", val);
              } else if (key.equals("Connection")) {
                reqMap.put("connection", val);
              } else if (key.equals("User-Agent")) {
                reqMap.put("user_agent", val);
              } else if (key.equals("Referer")) {
                reqMap.put("referer", val);
              } else if (key.equals("Sec-Fetch-Site")) {
                reqMap.put("sec_fetch_site", val);
              } else if (key.equals("Sec-Fetch-Dest")) {
                reqMap.put("sec_fetch_dest", val);
              } else if (key.equals("Host")) {
                reqMap.put("host", val);
              } else if (key.equals("Accept-Encoding")) {
                reqMap.put("accept_encoding", val);
              } else if (key.equals("Sec-Fetch-Mode")) {
                reqMap.put("sec_fetch_mode", val);
              } else if (key.equals("sec-ch-ua")) {
                reqMap.put("sec_ch_ua", val);
              } else if (key.equals("sec-ch-ua-mobile")) {
                reqMap.put("sec_ch_ua_mobile", val);
              } else if (key.equals("Cache-Control")) {
                reqMap.put("cache_control", val);
              } else if (key.equals("Upgrade-Insecure-Requests")) {
                reqMap.put("upgrade_insecure_requests", val);
              } else if (key.equals("sec-ch-ua-platform")) {
                reqMap.put("sec_ch_ua_platform", val);
              } else if (key.equals("Sec-Fetch-User")) {
                reqMap.put("sec_fetch_user", val);
              } else if (key.equals("Accept-Language")) {
                reqMap.put("accept_language", val);
              }
            }
          }
        }

        if (ctx.ping_directory?.http_access?.response_header_list instanceof List) {
          for (def h : ctx.ping_directory.http_access.response_header_list) {
            int idx = h.indexOf(':');
            if (idx > 0) {
              String key = h.substring(0, idx).trim();
              String val = h.substring(idx + 1).trim();

              if (key.equals("X-Frame-Options")) {
                respMap.put("x_frame_options", val);
              } else if (key.equals("Correlation-Id")) {
                respMap.put("correlation_id", val);
              } else if (key.equals("Date")) {
                respMap.put("date", val);
              } else if (key.equals("Request-Id")) {
                respMap.put("request_id", val);
              } else if (key.equals("Connection")) {
                respMap.put("connection", val);
              }
            }
          }
        }

        if (!reqMap.isEmpty()) {
          ctx.ping_directory.http_access.request_header = reqMap;
        }

        if (!respMap.isEmpty()) {
          ctx.ping_directory.http_access.response_header = respMap;
        }

        ctx.ping_directory.http_access.remove('request_header_list');
        ctx.ping_directory.http_access.remove('response_header_list');
  - set:
      field: url.domain
      tag: set_url_domain_from_http_access_request_header_host
      copy_from: ping_directory.http_access.request_header.host
      ignore_empty_value: true
  - set:
      field: http.request.referrer
      tag: set_http_request_referrer_from_http_access_request_header_referer
      copy_from: ping_directory.http_access.request_header.referer
      ignore_empty_value: true
  - set:
      field: user_agent.original
      tag: set_user_agent_original_from_http_access_request_header_user_agent
      copy_from: ping_directory.http_access.request_header.user_agent
      ignore_empty_value: true
  - set:
      field: http.request.id
      tag: set_http_request_id_from_http_access_request_id
      copy_from: ping_directory.http_access.request_id
      ignore_empty_value: true
  - append:
      field: trace.id
      tag: append_ping_directory_http_access_response_header_correlation_id_into_trace_id
      if: ctx.ping_directory?.http_access?.response_header?.correlation_id != null
      value: '{{{ping_directory.http_access.response_header.correlation_id}}}'
      allow_duplicates: false
  - convert:
      field: ping_directory.http_access.thread_id
      tag: convert_threadID_to_long
      type: long
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_convert_threadID_to_long
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.timezone
      tag: set_event_timezone_from_http_access_timezone
      copy_from: ping_directory.http_access.timezone
      ignore_empty_value: true
  - date:
      field: ping_directory.http_access.timestamp
      tag: date_timestamp
      target_field: '@timestamp'
      formats:
        - dd/MMM/yyyy:HH:mm:ss.SSS
      if: ctx.ping_directory?.http_access?.timestamp != null && ctx.ping_directory.http_access.timestamp != '' && ctx.event?.timezone == null
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_date_timestamp
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: ping_directory.http_access.timestamp
      tag: date_timestamp_with_timezone
      target_field: '@timestamp'
      timezone: '{{{event.timezone}}}'
      formats:
        - dd/MMM/yyyy:HH:mm:ss.SSS
      if: ctx.ping_directory?.http_access?.timestamp != null && ctx.ping_directory.http_access.timestamp != '' && ctx.event?.timezone != null
      on_failure:
        - append:
            field: error.message
            tag: append_error_message_for_date_timestamp_with_timezone
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - remove:
      field:
        - ping_directory.http_access.correlation_id
        - ping_directory.http_access.etime
        - ping_directory.http_access.request_content_type
        - ping_directory.http_access.request_header.host
        - ping_directory.http_access.request_header.referer
        - ping_directory.http_access.request_header.user_agent
        - ping_directory.http_access.request_id
        - ping_directory.http_access.response_header.correlation_id
        - ping_directory.http_access.timestamp
        - ping_directory.http_access.timezone
      tag: remove_custom_duplicate_fields
      ignore_missing: true
  - script:
      tag: remove_null_values
      lang: painless
      description: Remove null or empty values from the document.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      if: ctx.error?.message != null
      value: pipeline_error
  - append:
      field: tags
      tag: append_tags
      if: ctx.error?.message != null
      value: preserve_original_event
      allow_duplicates: false
on_failure:
  - append:
      field: error.message
      tag: append_error_message_on_failure
      value: >-
        Processor {{{_ingest.on_failure_processor_type}}}
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{_ingest.on_failure_processor_tag}}}'
        {{{/_ingest.on_failure_processor_tag}}}
        in pipeline '{{{_ingest.pipeline}}}'
        failed with message '{{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_event_kind_to_pipeline_error
      value: pipeline_error
  - append:
      field: tags
      tag: append_tags
      value: preserve_original_event
      allow_duplicates: false
