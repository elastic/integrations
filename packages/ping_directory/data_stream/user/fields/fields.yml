- name: ping_directory
  type: group
  fields:
    - name: user
      type: group
      fields:
        - name: display_name
          type: keyword
          description: Display name of the user. Maps to LDAP cn.
        - name: email
          type: group
          fields:
            - name: primary
              type: boolean
              description: Indicates whether the email marked as primary (from IT API or derived from SCIM).
            - name: type
              type: keyword
              description: Type of email address from IT.
        - name: meta
          type: group
          fields:
            - name: created
              type: date
              description: Timestamp when the user entry was created.
            - name: last_modified
              type: date
              description: Timestamp when the user entry was last modified.
            - name: location
              type: keyword
              description: Self-link URL of the user resource.
            - name: resource_type
              type: keyword
              description: Always User. Identifies the SCIM resource type.
        - name: name
          type: group
          fields:
            - name: family_name
              type: keyword
              description: Last name. Maps to LDAP sn.
            - name: given_name
              type: keyword
              description: First name. Maps to LDAP givenName.
        - name: schemas
          type: keyword
          description: SCIM schema URNs for the user resource.
        - name: title
          type: keyword
          description: Job title. Maps to LDAP title.
        - name: user_type
          type: keyword
          description: Employment type. Maps to LDAP employeeType.
