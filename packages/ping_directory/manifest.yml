format_version: 3.6.0
name: ping_directory
title: PingDirectory
version: 0.1.0
source:
  license: 'Elastic-2.0'
description: 'Collect logs from PingDirectory with Elastic Agent.'
type: integration
categories:
  - security
  - authentication
  - iam
conditions:
  kibana:
    version: '^8.18.0 || ^9.1.0'
  elastic:
    subscription: 'basic'
screenshots:
  - src: /img/ping_directory-http-access-dashboard.png
    title: HTTP Access Dashboard
    size: 600x600
    type: image/png
icons:
  - src: /img/ping_directory-logo.svg
    title: ping_directory logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: ping_directory
    title: PingDirectory logs
    description: Collect PingDirectory logs via filestream.
    inputs:
      - type: filestream
        title: Collect PingDirectory logs via Filestream
        description: Collecting logs from PingDirectory via File.
owner:
  github: elastic/security-service-integrations
  type: elastic
