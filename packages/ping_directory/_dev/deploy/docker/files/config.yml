rules:
  - path: /directory/v1/authenticate
    methods: ['POST']
    request_headers:
      Content-Type:
        - 'application/json'
    request_body: '{"credentials":{"authenticationType":"password","dn":"xxxx","staticPassword":"xxxx"}}'
    responses:
      - status_code: 200
        headers:
          Content-Type:
            - 'application/json'
        body: |-
          {{ minify_json `
          {
            "accessToken": "xxxx"
          }
          `}}
