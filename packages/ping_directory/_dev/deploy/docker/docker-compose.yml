version: '3.8'
services:
  ping_directory:
    image: docker.elastic.co/observability/stream:v0.22.0
    hostname: ping_directory
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: '8090'
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config.yml
