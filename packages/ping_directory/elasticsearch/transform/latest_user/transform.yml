# Use of '*' to use all namespaces defined.
source:
  index:
    - 'logs-ping_directory.user-*'
  query:
    bool:
      must_not:
        - exists:
            field: error.message
dest:
  index: 'logs-ping_directory_latest.dest_user-1'
  aliases:
    - alias: 'logs-ping_directory_latest.user'
      move_on_creation: true
latest:
  unique_key:
    - event.dataset
    - user.id
  sort: '@timestamp'
description: >-
  Latest user information from PingDirectory. As user records change, this transform keeps only the latest state of each user in the destination index, ensuring that the index always reflects the current user profile and account attributes.
frequency: 30s
settings:
  # This is required to prevent the transform from clobbering the Fleet-managed mappings.
  deduce_mappings: false
  unattended: true
sync:
  time:
    field: 'event.ingested'
    # Updated to 120s because of refresh delay in Serverless. With default 60s,
    # sometimes transform wouldn't process all documents.
    delay: 120s
retention_policy:
  time:
    field: 'event.ingested'
    max_age: 30d
_meta:
  managed: false
  # Bump this version to delete, reinstall, and restart the transform during
  # package installation.
  fleet_transform_version: 0.1.0
  run_as_kibana_system: false
