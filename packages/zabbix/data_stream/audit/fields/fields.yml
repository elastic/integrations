- name: zabbix.audit
  type: group
  description: Zabbix audit log entries tracking user and system actions.
  fields:
    - name: id
      type: keyword
      description: Unique identifier of the audit log entry.
    - name: action_code
      type: long
      description: Raw numeric action code from the Zabbix audit log.
    - name: user_id
      type: keyword
      description: Identifier of the user who performed the action.
    - name: resource_type
      type: long
      description: Raw numeric type identifier of the resource that was affected by the action.
    - name: resource_type_name
      type: keyword
      description: Human-readable name of the affected resource type (derived from resource_type code).
    - name: resource_id
      type: keyword
      description: Identifier of the resource that was affected by the action.
    - name: resource_cuid
      type: keyword
      description: Compound unique identifier of the resource that was affected by the action.
    - name: resource_name
      type: keyword
      description: Display name of the resource that was affected by the action.
    - name: recordset_id
      type: keyword
      description: Identifier linking multiple audit entries that belong to the same operation.
    - name: details
      type: flattened
      description: Detailed changes made during the audit action, containing before and after values.
