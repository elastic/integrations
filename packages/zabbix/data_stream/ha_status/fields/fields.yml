- name: zabbix.ha
  type: group
  description: Zabbix high availability cluster node status and configuration.
  fields:
    - name: nodeid
      type: keyword
      dimension: true
      description: Unique identifier of the HA cluster node.
    - name: name
      type: keyword
      description: Display name of the HA cluster node.
    - name: address
      type: keyword
      description: Network address the HA node is listening on.
    - name: port
      type: keyword
      description: Port number the HA node is listening on.
    - name: lastaccess
      type: date
      description: Timestamp of the last successful heartbeat from the HA node.
    - name: status
      type: keyword
      description: Current status of the HA node, one of standby, stopped, unavailable, or active.
