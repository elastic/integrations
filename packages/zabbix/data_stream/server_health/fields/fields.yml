- name: zabbix.server
  type: group
  description: Zabbix server internal health metrics collected from internal monitoring items.
  fields:
    - name: item.key
      type: keyword
      dimension: true
      description: Internal item key identifier.
    - name: item.name
      type: keyword
      description: Human-readable name of the internal item.
    - name: item.lastvalue
      type: keyword
      description: Raw last value of the item as returned by the Zabbix API.
    - name: version
      type: keyword
      description: Zabbix server version string.
    - name: uptime
      type: long
      unit: s
      metric_type: gauge
      description: Number of seconds since the Zabbix server process was started.
    - name: queue.total
      type: long
      metric_type: gauge
      description: Total number of items in the queue that are delayed for processing.
    - name: queue.over_10m
      type: long
      metric_type: gauge
      description: Number of items in the queue that have been delayed for more than 10 minutes.
    - name: preprocessing_queue
      type: long
      metric_type: gauge
      description: Number of values currently waiting in the preprocessing queue.
    - name: discovery_queue
      type: long
      metric_type: gauge
      description: Number of discovery checks currently waiting in the discovery queue.
    - name: lld_queue
      type: long
      metric_type: gauge
      description: Number of low-level discovery rules waiting in the LLD queue.
    - name: connector_queue
      type: long
      metric_type: gauge
      description: Number of items waiting in the connector queue for external processing.
    - name: cache.config.pused
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of the configuration cache currently in use.
    - name: cache.value.pused
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of the value cache currently in use.
    - name: cache.value.hits
      type: double
      metric_type: gauge
      description: Number of value cache hits per second.
    - name: cache.value.misses
      type: double
      metric_type: gauge
      description: Number of value cache misses per second.
    - name: cache.value.mode
      type: long
      metric_type: gauge
      description: Value cache operating mode where 0 indicates normal operation and 1 indicates low memory mode.
    - name: cache.history.pused
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of the history cache currently in use.
    - name: cache.trend.pused
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of the trend cache currently in use.
    - name: cache.index.pused
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of the history index cache currently in use.
    - name: cache.vmware.pused
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of the VMware cache currently in use.
    - name: cache.trend_function.pitems
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of cached items in the trend function cache.
    - name: cache.trend_function.pmisses
      type: double
      unit: percent
      metric_type: gauge
      description: Percentage of cache misses in the trend function cache.
    - name: vps.written
      type: double
      metric_type: gauge
      description: Total number of values written to the database per second.
    - name: vps.float
      type: double
      metric_type: gauge
      description: Number of float values written per second.
    - name: vps.uint
      type: double
      metric_type: gauge
      description: Number of unsigned integer values written per second.
    - name: vps.str
      type: double
      metric_type: gauge
      description: Number of string values written per second.
    - name: vps.log
      type: double
      metric_type: gauge
      description: Number of log values written per second.
    - name: vps.text
      type: double
      metric_type: gauge
      description: Number of text values written per second.
    - name: vps.not_supported
      type: double
      metric_type: gauge
      description: Number of not-supported values written per second.
    - name: vps.total
      type: double
      metric_type: gauge
      description: Total number of values processed per second across all value types.
    - name: triggers
      type: long
      metric_type: gauge
      description: Total number of enabled triggers on the Zabbix server.
    - name: process.name
      type: keyword
      dimension: true
      description: Name of the Zabbix server internal process type.
    - name: process.busy
      type: double
      unit: percent
      metric_type: gauge
      description: Average percentage of time the process type spent in busy state.
    - name: host.agent.available
      type: long
      metric_type: gauge
      description: Number of hosts where the Zabbix agent interface is available.
    - name: preprocessing.throughput.direct
      type: double
      metric_type: gauge
      description: Number of items preprocessed directly per second (bypassing the queue).
    - name: preprocessing.throughput.queued
      type: double
      metric_type: gauge
      description: Number of items preprocessed through the queue per second.
    - name: preprocessing.vps.direct
      type: double
      metric_type: gauge
      description: Number of values preprocessed directly per second.
    - name: preprocessing.vps.queued
      type: double
      metric_type: gauge
      description: Number of values preprocessed through the queue per second.
