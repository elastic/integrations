- name: zabbix.problem
  type: group
  description: Zabbix problem event details including severity, acknowledgment state, and recovery information.
  fields:
    - name: eventid
      type: keyword
      description: Unique identifier of the problem event in Zabbix.
    - name: name
      type: keyword
      description: Name of the problem as defined by the trigger expression.
    - name: severity
      type: keyword
      description: Severity level of the problem, one of not_classified, information, warning, average, high, or disaster.
    - name: severity_number
      type: long
      description: Numeric severity level of the problem from 0 (not classified) to 5 (disaster).
    - name: acknowledged
      type: boolean
      description: Whether the problem has been acknowledged by a user.
    - name: suppressed
      type: boolean
      description: Whether the problem is currently suppressed by maintenance or manual suppression.
    - name: source
      type: keyword
      description: Type of the event source that generated this problem.
    - name: object
      type: keyword
      description: Type of object that is related to this problem event.
    - name: objectid
      type: keyword
      description: Identifier of the related object (trigger, item, or LLD rule) that generated this problem.
    - name: cause_eventid
      type: keyword
      description: Identifier of the root cause event if this problem is a symptom of another problem.
    - name: opdata
      type: keyword
      description: Operational data string showing current values related to this problem.
    - name: r_eventid
      type: keyword
      description: Identifier of the recovery event that resolved this problem, or 0 if unresolved.
    - name: r_clock
      type: date
      description: Timestamp when the problem was resolved by the recovery event.
    - name: acknowledges
      type: flattened
      description: List of acknowledgment entries for this problem, each containing user, message, and timestamp.
    - name: urls
      type: flattened
      description: List of media type URLs associated with this problem event.
    - name: tags
      type: flattened
      description: Key-value tags associated with this problem event.
