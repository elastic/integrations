---
description: Pipeline for processing Zabbix problem events from problem.get.
processors:
  - json:
      tag: parse_message_json
      field: message
      target_field: _json
      on_failure:
        - set:
            tag: set_event_original_on_failure
            field: event.original
            copy_from: message
            ignore_failure: true
        - append:
            tag: append_error_message_json_parse
            field: error.message
            value: "Failed to parse message as JSON [{{_ingest.on_failure_processor_tag}}]: {{_ingest.on_failure_message}}"
  - remove:
      tag: remove_raw_message
      field: message
      ignore_missing: true

  - set:
      tag: set_event_kind
      field: event.kind
      value: event

  - set:
      tag: set_event_category
      field: event.category
      value:
        - host

  - set:
      tag: set_event_type
      field: event.type
      value:
        - info
  - set:
      tag: set_event_type_error
      field: event.type
      value:
        - error
      if: ctx._json?.severity != null && (ctx._json.severity == '3' || ctx._json.severity == '4' || ctx._json.severity == '5')
      override: true

  - set:
      tag: set_event_action
      field: event.action
      value: problem_detected

  - set:
      tag: set_event_module
      field: event.module
      value: zabbix

  - set:
      tag: set_event_dataset
      field: event.dataset
      value: zabbix.problem

  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: Zabbix

  - set:
      tag: set_observer_product
      field: observer.product
      value: Zabbix Server

  # Set @timestamp from clock (unix epoch seconds)
  - date:
      tag: date_clock
      field: _json.clock
      formats:
        - UNIX
      if: ctx._json?.clock != null && ctx._json?.clock != '0'
      on_failure:
        - append:
            tag: append_error_clock
            field: error.message
            value: "Failed to parse clock [{{_ingest.on_failure_processor_tag}}]: {{_ingest.on_failure_message}}"

  - rename:
      tag: rename_eventid
      field: _json.eventid
      target_field: zabbix.problem.eventid
      ignore_missing: true

  - rename:
      tag: rename_objectid
      field: _json.objectid
      target_field: zabbix.problem.objectid
      ignore_missing: true

  # Map source: 0=triggers, 3=internal
  - set:
      tag: set_source_triggers
      field: zabbix.problem.source
      value: triggers
      if: ctx._json?.source == '0'
  - set:
      tag: set_source_internal
      field: zabbix.problem.source
      value: internal
      if: ctx._json?.source == '3'

  # Map object: 0=trigger, 4=item, 5=lld_rule
  - set:
      tag: set_object_trigger
      field: zabbix.problem.object
      value: trigger
      if: ctx._json?.object == '0'
  - set:
      tag: set_object_item
      field: zabbix.problem.object
      value: item
      if: ctx._json?.object == '4'
  - set:
      tag: set_object_lld_rule
      field: zabbix.problem.object
      value: lld_rule
      if: ctx._json?.object == '5'

  - rename:
      tag: rename_problem_name
      field: _json.name
      target_field: zabbix.problem.name
      ignore_missing: true

  # Map severity: 0=not classified, 1=info, 2=warning, 3=average, 4=high, 5=disaster
  - convert:
      tag: convert_severity
      field: _json.severity
      target_field: zabbix.problem.severity_number
      type: long
      ignore_missing: true
      on_failure:
        - append:
            tag: append_error_convert_severity
            field: error.message
            value: "Failed to convert severity [{{_ingest.on_failure_processor_tag}}]: {{_ingest.on_failure_message}}"

  # Map severity: 0=not classified, 1=information, 2=warning, 3=average, 4=high, 5=disaster
  - set:
      tag: set_severity_not_classified
      field: zabbix.problem.severity
      value: not classified
      if: ctx._json?.severity == '0'
  - set:
      tag: set_event_severity_0
      field: event.severity
      value: 0
      if: ctx._json?.severity == '0'
  - set:
      tag: set_severity_information
      field: zabbix.problem.severity
      value: information
      if: ctx._json?.severity == '1'
  - set:
      tag: set_event_severity_1
      field: event.severity
      value: 1
      if: ctx._json?.severity == '1'
  - set:
      tag: set_severity_warning
      field: zabbix.problem.severity
      value: warning
      if: ctx._json?.severity == '2'
  - set:
      tag: set_event_severity_2
      field: event.severity
      value: 2
      if: ctx._json?.severity == '2'
  - set:
      tag: set_severity_average
      field: zabbix.problem.severity
      value: average
      if: ctx._json?.severity == '3'
  - set:
      tag: set_event_severity_3
      field: event.severity
      value: 3
      if: ctx._json?.severity == '3'
  - set:
      tag: set_severity_high
      field: zabbix.problem.severity
      value: high
      if: ctx._json?.severity == '4'
  - set:
      tag: set_event_severity_4
      field: event.severity
      value: 4
      if: ctx._json?.severity == '4'
  - set:
      tag: set_severity_disaster
      field: zabbix.problem.severity
      value: disaster
      if: ctx._json?.severity == '5'
  - set:
      tag: set_event_severity_5
      field: event.severity
      value: 5
      if: ctx._json?.severity == '5'

  # Map acknowledged to event.outcome
  - set:
      tag: set_outcome_acknowledged
      field: event.outcome
      value: success
      if: ctx._json?.acknowledged == '1'

  - set:
      tag: set_outcome_unacknowledged
      field: event.outcome
      value: failure
      if: ctx._json?.acknowledged == '0'

  # Convert acknowledged string to boolean
  - set:
      tag: set_acknowledged_true
      field: zabbix.problem.acknowledged
      value: true
      if: ctx._json?.acknowledged == '1'
  - set:
      tag: set_acknowledged_false
      field: zabbix.problem.acknowledged
      value: false
      if: ctx._json?.acknowledged != null && ctx._json?.acknowledged != '1'

  # Convert suppressed string to boolean
  - set:
      tag: set_suppressed_true
      field: zabbix.problem.suppressed
      value: true
      if: ctx._json?.suppressed == '1'
  - set:
      tag: set_suppressed_false
      field: zabbix.problem.suppressed
      value: false
      if: ctx._json?.suppressed != null && ctx._json?.suppressed != '1'

  - rename:
      tag: rename_tags
      field: _json.tags
      target_field: zabbix.problem.tags
      ignore_missing: true

  - rename:
      tag: rename_acknowledges
      field: _json.acknowledges
      target_field: zabbix.problem.acknowledges
      ignore_missing: true

  - rename:
      tag: rename_opdata
      field: _json.opdata
      target_field: zabbix.problem.opdata
      ignore_missing: true

  - rename:
      tag: rename_r_eventid
      field: _json.r_eventid
      target_field: zabbix.problem.r_eventid
      ignore_missing: true

  - date:
      tag: date_r_clock
      field: _json.r_clock
      target_field: zabbix.problem.r_clock
      formats:
        - UNIX
      if: ctx._json?.r_clock != null && ctx._json?.r_clock != '0'
      on_failure:
        - append:
            tag: append_error_r_clock
            field: error.message
            value: "Failed to parse r_clock [{{_ingest.on_failure_processor_tag}}]: {{_ingest.on_failure_message}}"

  - rename:
      tag: rename_cause_eventid
      field: _json.cause_eventid
      target_field: zabbix.problem.cause_eventid
      ignore_missing: true

  - rename:
      tag: rename_urls
      field: _json.urls
      target_field: zabbix.problem.urls
      ignore_missing: true

  # Set message from problem name
  - set:
      tag: set_message
      field: message
      copy_from: zabbix.problem.name
      ignore_empty_value: true

  # Cleanup temp fields
  - remove:
      tag: cleanup_temp
      field: _temp
      ignore_missing: true

  - remove:
      tag: remove_json_temp
      field: _json
      ignore_missing: true

on_failure:
  - set:
      tag: set_pipeline_error
      field: event.kind
      value: pipeline_error
  - append:
      tag: append_pipeline_error
      field: error.message
      value: >-
        Processor {{_ingest.on_failure_processor_type}}
        with tag {{_ingest.on_failure_processor_tag}}
        in pipeline {{_ingest.on_failure_pipeline}}
        failed with message: {{_ingest.on_failure_message}}
