- name: zabbix.proxy
  type: group
  description: Zabbix proxy health and configuration status.
  fields:
    - name: id
      type: keyword
      description: Unique identifier of the proxy in Zabbix.
    - name: name
      type: keyword
      description: Display name of the proxy.
    - name: operating_mode
      type: keyword
      description: Operating mode of the proxy, either active or passive.
    - name: last_access
      type: date
      description: Timestamp of the last heartbeat or data received from the proxy.
    - name: version
      type: keyword
      description: Version string of the proxy software.
    - name: compatibility
      type: keyword
      description: Compatibility status of the proxy version relative to the Zabbix server version.
    - name: state
      type: keyword
      description: Current operational state of the proxy.
    - name: address
      type: keyword
      description: Network address of the proxy.
    - name: port
      type: keyword
      description: Port number used for communication with the proxy.
