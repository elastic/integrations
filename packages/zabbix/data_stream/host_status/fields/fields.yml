- name: zabbix.host
  type: group
  description: Zabbix monitored host status and configuration details.
  fields:
    - name: id
      type: keyword
      description: Unique numeric identifier of the host in Zabbix.
    - name: host
      type: keyword
      description: Technical name of the host used internally by Zabbix.
    - name: name
      type: keyword
      description: Visible display name of the host in the Zabbix frontend.
    - name: status
      type: keyword
      description: Monitoring status of the host, either enabled or disabled.
    - name: monitored_by
      type: keyword
      description: Entity responsible for monitoring this host, one of server, proxy, or proxy_group.
    - name: proxy.id
      type: keyword
      description: Identifier of the proxy monitoring this host, or 0 if monitored directly by the server.
    - name: maintenance.status
      type: keyword
      description: Whether the host is currently in maintenance, either on or off.
    - name: maintenance.type
      type: keyword
      description: Type of maintenance applied to the host, either with_data or without_data.
    - name: active_available
      type: keyword
      description: Availability of the active agent on this host, one of available, unavailable, or unknown.
    - name: groups
      type: keyword
      description: List of host group names this host belongs to.
    - name: tags
      type: flattened
      description: Key-value tags assigned to the host in Zabbix.
    - name: interface.ip
      type: ip
      description: IP address of the primary host interface.
    - name: interface.port
      type: keyword
      description: Port number of the primary host interface.
    - name: interface.type
      type: keyword
      description: Type of the primary host interface, one of agent, snmp, ipmi, or jmx.
    - name: interface.available
      type: keyword
      description: Availability of the primary host interface, one of available, unavailable, or unknown.
