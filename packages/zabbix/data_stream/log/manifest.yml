title: Zabbix server log
type: logs
streams:
  - input: logfile
    vars:
      - name: paths
        type: text
        title: Log File Path
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/zabbix/zabbix_server.log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - zabbix-log
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        required: false
        show_user: true
        default: false
      - name: processors
        type: yaml
        title: Processors
        required: false
        show_user: false
    title: Zabbix server log
    description: Collect Zabbix server logs from the filesystem
    template_path: stream.yml.hbs
