- name: zabbix.log
  type: group
  description: Zabbix server log file fields parsed from the zabbix_server.log file.
  fields:
    - name: slow_query.detected
      type: boolean
      description: Whether a slow database query was detected in this log line.
    - name: slow_query.duration
      type: double
      unit: s
      description: Duration of a slow database query in seconds, extracted when a slow query is detected in the log.
