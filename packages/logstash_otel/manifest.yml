format_version: 3.5.2
name: logstash_otel
title: "Logstash OpenTelemetry Assets"
version: 0.1.0
source:
  license: "Apache-2.0"
description: "Dashboards for visualizing Logstash metrics exported via OTLP. Requires Logstash 9.5.0 or later."
type: content
categories:
  - monitoring
  - observability
  - elastic_stack
conditions:
  kibana:
    version: "^8.17.0 || ^9.0.0"
  elastic:
    subscription: "basic"
discovery:
  datasets:
    - name: logstash.otel
icons:
  - src: /img/logo_logstash.svg
    title: Logstash logo
    size: 32x32
    type: image/svg+xml
owner:
  github: elastic/logstash
  type: elastic
