---
description: Pipeline for processing Hashicorp Vault audit logs.
processors:
  - set:
      tag: set_ecs_version_f5923549
      field: ecs.version
      value: '8.17.0'
  - rename:
      tag: rename_message_to_event_original_86cdcc50
      field: message
      target_field: event.original
      ignore_missing: true
      ignore_failure: true
      if: ctx.event?.original == null
  - json:
      tag: json_event_original_to_hashicorp_vault_audit_6c38e128
      field: event.original
      target_field: hashicorp_vault.audit
      ignore_failure: true

  #
  # @timestamp
  #
  - date:
      tag: date_hashicorp_vault_audit_time_f9f1cd6d
      field: hashicorp_vault.audit.time
      formats:
        - ISO8601
  - remove:
      tag: remove_c4735a36
      field:
        - hashicorp_vault.audit.time
      ignore_missing: true

  #
  # Handle KMIP events
  #
  - script:
      tag: script_kmip_extraction
      lang: painless
      if: "['kmip-request', 'kmip-response'].contains(ctx.hashicorp_vault?.audit?.type)"
      source: >
        void handle_map(Map src, Map tgt) {
          if (src.containsKey('type')) {
            Map tmp = ['type':src.get('type'), 'value': src.get('value')];
            tgt.put(src.get('tag'), tmp);
          } else {
            Map new_map = [:];
            for (Map v: src.get('value')) {
              handle_map(v, new_map);
            }
            tgt.put(src.get('tag'), new_map);
          }
        }
        if (ctx.hashicorp_vault?.audit?.request?.data?.kmip_request != null) {
          ctx.hashicorp_vault.audit.request.data.put('kmip_request_map', [:]);
          handle_map(ctx.hashicorp_vault.audit.request.data.kmip_request, ctx.hashicorp_vault.audit.request.data.kmip_request_map);
        }
        if (ctx.hashicorp_vault?.audit?.response?.data?.kmip_response != null) {
          ctx.hashicorp_vault.audit.response.data.put('kmip_response_map', [:]);
          handle_map(ctx.hashicorp_vault.audit.response.data.kmip_response, ctx.hashicorp_vault.audit.response.data.kmip_response_map);
        }
  - rename:
      tag: rename_kmip_request_headers_to_request_headers
      field: hashicorp_vault.audit.request.data.kmip_request_map.RequestMessage.RequestHeader
      target_field: hashicorp_vault.audit.request.headers
      ignore_missing: true
      override: true
  - rename:
      tag: rename_kmip_request_payload_to_request_data
      field: hashicorp_vault.audit.request.data.kmip_request_map.RequestMessage
      target_field: hashicorp_vault.audit.request.data
      ignore_missing: true
      override: true
  - rename:
      tag: rename_kmip_response_headers_to_response_headers
      field: hashicorp_vault.audit.response.data.kmip_response_map.ResponseMessage.ResponseHeader
      target_field: hashicorp_vault.audit.response.headers
      ignore_missing: true
      override: true
  - rename:
      tag: rename_kmip_response_payload_to_response_data
      field: hashicorp_vault.audit.response.data.kmip_response_map.ResponseMessage
      target_field: hashicorp_vault.audit.response.data
      ignore_missing: true
      override: true
  # Normalize KMIP error if present
  - lowercase:
      tag: lowercase_kmip_error
      field: hashicorp_vault.audit.response.data.BatchItem.ResultReason
      ignore_missing: true
  - script:
      description: Normalize KMIP error reason as per https://docs.oasis-open.org/kmip/kmip-spec/v2.0/os/kmip-spec-v2.0-os.html#_Toc6497707
