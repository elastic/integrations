      lang: painless
      if: ctx.hashicorp_vault?.audit?.response?.data?.BatchItem?.ResultReason?.value != null
      source: if (params.containsKey(ctx.hashicorp_vault.audit.response.data.BatchItem.ResultReason.value)) {ctx.hashicorp_vault.audit.put('error', params.get(ctx.hashicorp_vault.audit.response.data.BatchItem.ResultReason.value))}
