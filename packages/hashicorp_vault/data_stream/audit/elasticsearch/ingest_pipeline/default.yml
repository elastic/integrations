      description: Translate operation code to human-readable operation descrption, as per https://docs.oasis-open.org/kmip/kmip-spec/v2.0/os/kmip-spec-v2.0-os.html#_Toc6497698
      lang: painless
      if: ctx.hashicorp_vault?.audit?.request?.data?.BatchItem?.Operation?.value != null
      source: >
        if (params.containsKey(ctx.hashicorp_vault.audit.request.data.BatchItem.Operation.value)) {
          ctx.hashicorp_vault.audit.request.put('operation', params.get(ctx.hashicorp_vault.audit.request.data.BatchItem.Operation.value).get('action'));
          if (ctx.event.category == null) {
            ctx.event.put('category', []);
          }
          for (cat in params.get(ctx.hashicorp_vault.audit.request.data.BatchItem.Operation.value).get('categories')) {
            ctx.event.category.add(cat);
          }
          if (ctx.event.type == null) {
            ctx.event.put('type', []);
          }
          for (type in params.get(ctx.hashicorp_vault.audit.request.data.BatchItem.Operation.value).get('types')) {
            ctx.event.type.add(type);
          }
          ctx.event.put('reference', params.get(ctx.hashicorp_vault.audit.request.data.BatchItem.Operation.value).get('ref'));
        }
