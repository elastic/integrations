- name: juniper.junos.alarm
  type: group
  fields:
    - name: time
      type: date
      description: Timestamp when the alarm was raised by Junos.
    - name: class
      type: keyword
      description: Severity class of the alarm (for example Major, Minor).
    - name: type
      type: keyword
      description: Subsystem that generated the alarm (for example Interface, Chassis, Configuration).
    - name: description
      type: keyword
      description: Full human-readable alarm message as reported by Junos.
    - name: short_description
      type: keyword
      description: Abbreviated alarm message suitable for display in summary views.
