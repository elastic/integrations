- name: ecs.version
  type: keyword
  description: ECS version this event conforms to.
- name: error.message
  type: match_only_text
  description: Error message.
- name: event.kind
  type: keyword
  description: The kind of event.
- name: event.category
  type: keyword
  description: Event category for ECS compatibility.
- name: event.type
  type: keyword
  description: Event type for ECS compatibility.
- name: observer.vendor
  type: keyword
  description: Observer vendor name.
- name: observer.product
  type: keyword
  description: Observer product name.
- name: observer.name
  type: keyword
  description: Device name or address configured for this integration instance.
- name: observer.type
  type: keyword
  description: Observer type such as router, switch, or firewall.
