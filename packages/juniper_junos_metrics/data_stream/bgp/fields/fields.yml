- name: juniper.junos.bgp
  type: group
  fields:
    - name: group_count
      type: long
      metric_type: gauge
      description: Total number of BGP peer groups configured on the router.
    - name: peer_count
      type: long
      metric_type: gauge
      description: Total number of configured BGP peers across all groups.
    - name: down_peer_count
      type: long
      metric_type: gauge
      description: Number of BGP peers not in the Established state.
    - name: peer
      type: group
      fields:
        - name: address
          type: keyword
          dimension: true
          description: IP address of the BGP peer. Used as a TSDB dimension.
        - name: as
          type: long
          dimension: true
          description: Autonomous system number of the remote BGP peer. Used as a TSDB dimension.
        - name: state
          type: keyword
          description: Current BGP FSM state of the peer (for example Established, Active, Connect, OpenSent).
        - name: input_messages
          type: long
          metric_type: counter
          description: Cumulative number of BGP messages received from this peer.
        - name: output_messages
          type: long
          metric_type: counter
          description: Cumulative number of BGP messages sent to this peer.
        - name: flap_count
          type: long
          metric_type: counter
          description: Number of times this peer session has transitioned away from Established state.
        - name: elapsed_time
          type: long
          metric_type: gauge
          unit: s
          description: Seconds elapsed after the most recent BGP state change for this peer.
        - name: active_prefix_count
          type: long
          metric_type: gauge
          description: Total active prefix count across all address families for this peer.
        - name: received_prefix_count
          type: long
          metric_type: gauge
          description: Total received prefix count across all address families for this peer.
        - name: accepted_prefix_count
          type: long
          metric_type: gauge
          description: Total accepted prefix count across all address families for this peer.
        - name: route_queue_count
          type: long
          metric_type: gauge
          description: Number of routes queued for this peer.
        - name: description
          type: keyword
          description: Operator-configured description for the BGP peer group or neighbor.
        - name: suppressed_prefix_count
          type: long
          metric_type: gauge
          description: Total suppressed (dampened) prefix count across all address families for this peer.
