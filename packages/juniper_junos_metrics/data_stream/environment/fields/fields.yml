- name: juniper.junos.environment
  type: group
  fields:
    - name: name
      type: keyword
      dimension: true
      description: Name of the hardware component being monitored (for example Routing Engine 0, FPC 0 CPU, PSU 0). Used as a TSDB dimension.
    - name: class
      type: keyword
      description: Category of the environmental sensor (for example Temp, Fans, Power).
    - name: status
      type: keyword
      description: Health status reported by the component (for example OK, Check, Failed, Absent).
    - name: temperature
      type: float
      metric_type: gauge
      description: Temperature reading from the component sensor in degrees Celsius, if applicable.
    - name: comment
      type: keyword
      description: Supplemental detail from Junos about the component state (for example fan RPM, power draw).
