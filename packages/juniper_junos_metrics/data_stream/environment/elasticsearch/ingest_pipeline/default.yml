---
description: Pipeline for JunOS environment metrics.
processors:
  - set:
      tag: set_event_kind
      field: event.kind
      value: metric
  - set:
      tag: set_event_module
      field: event.module
      value: juniper_junos_metrics
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: juniper_junos_metrics.environment
  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: Juniper
  - set:
      tag: set_observer_product
      field: observer.product
      value: JunOS
  - rename:
      tag: rename_observer_name
      field: _observer_name
      target_field: observer.name
      ignore_missing: true
  - rename:
      tag: rename_observer_type
      field: _observer_type
      target_field: observer.type
      ignore_missing: true
  - set:
      tag: set_observer_type_default
      field: observer.type
      value: router
      override: false
  - set:
      tag: set_event_category
      field: event.category
      value:
        - network
  - set:
      tag: set_event_type
      field: event.type
      value:
        - info

  # Parse JSON from message (skip debug events)
  - json:
      tag: json_parse_message
      field: message
      target_field: _temp.raw
      if: ctx.message != null

  # Flatten JunOS JSON: unwrap [{"data": "value"}] pattern into simple key-value pairs
  - script:
      tag: script_flatten_junos_json
      lang: painless
      description: Unwrap the JunOS [{"data":"value"}] array pattern into flat fields.
      source: |
        def raw = ctx._temp?.raw;
        if (raw == null) { return; }
        def flat = new HashMap();
        for (def entry : raw.entrySet()) {
          def key = entry.getKey();
          def val = entry.getValue();
          if (val instanceof List && val.size() > 0 && val.get(0) instanceof Map) {
            def first = val.get(0);
            if (first.containsKey('data')) {
              flat.put(key, first.get('data'));
            }
            if (first.containsKey('attributes')) {
              flat.put(key + '_attrs', first.get('attributes'));
            }
          }
        }
        ctx._temp.env = flat;

  # Environment identity fields
  - set:
      tag: set_name
      if: ctx._temp?.env?.name != null
      field: juniper.junos.environment.name
      value: "{{_temp.env.name}}"
  - set:
      tag: set_class
      if: ctx._temp?.env?.get('class') != null
      field: juniper.junos.environment.class
      value: "{{_temp.env.class}}"
  - set:
      tag: set_status
      if: ctx._temp?.env?.status != null
      field: juniper.junos.environment.status
      value: "{{_temp.env.status}}"

  # Temperature — prefer celsius attribute, fallback to regex extraction
  - script:
      tag: script_parse_temperature
      lang: painless
      description: Extract temperature in Celsius from attributes or text.
      source: |
        def flat = ctx._temp?.env;
        if (flat == null) return;
        // Try celsius attribute first
        def attrs = flat.get('temperature_attrs');
        if (attrs != null && attrs instanceof Map && attrs.containsKey('celsius')) {
          try {
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.environment == null) ctx.juniper.junos.environment = new HashMap();
            ctx.juniper.junos.environment.temperature = Float.parseFloat(attrs.get('celsius').toString());
          } catch (Exception e) {}
        } else if (flat.containsKey('temperature')) {
          // Parse from "45 degrees C / 113 degrees F"
          def m = /(\d+)\s+degrees\s+C/.matcher(flat.get('temperature').toString());
          if (m.find()) {
            try {
              if (ctx.juniper == null) ctx.juniper = new HashMap();
              if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
              if (ctx.juniper.junos.environment == null) ctx.juniper.junos.environment = new HashMap();
              ctx.juniper.junos.environment.temperature = Float.parseFloat(m.group(1));
            } catch (Exception e) {}
          }
        }

  # Comment field
  - set:
      tag: set_comment
      if: ctx._temp?.env?.comment != null
      field: juniper.junos.environment.comment
      value: "{{_temp.env.comment}}"

  # Clean up temporary fields
  - remove:
      tag: remove_temp_and_message
      field:
        - _temp
        - message
      ignore_missing: true

  # Remove event.original unless preserve tag is set
  - remove:
      tag: remove_event_original
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      field: event.original
      ignore_missing: true

on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "Processor {{ _ingest.on_failure_processor_type }} with tag {{ _ingest.on_failure_processor_tag }} failed with message {{ _ingest.on_failure_message }}"
