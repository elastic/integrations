title: JunOS System
type: metrics
streams:
  - input: cel
    title: JunOS System Metrics
    description: Collect active user session metrics from the JunOS REST API
    vars:
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - juniper-junos
          - forwarded
elasticsearch:
  index_mode: time_series
