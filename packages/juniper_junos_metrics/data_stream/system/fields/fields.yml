- name: juniper.junos.system
  type: group
  fields:
    - name: active_user_count
      type: long
      metric_type: gauge
      description: Number of users currently logged into the device.
    - name: user
      type: group
      fields:
        - name: name
          type: keyword
          dimension: true
          description: Username of the logged-in user.
        - name: tty
          type: keyword
          description: Terminal or PTY of the session.
        - name: from
          type: keyword
          description: Source IP or host of the session.
        - name: login_time
          type: date
          description: Time the user logged in.
        - name: idle_time
          type: long
          metric_type: gauge
          unit: s
          description: Seconds the session has been idle.
        - name: command
          type: keyword
          description: Current command or shell running.
