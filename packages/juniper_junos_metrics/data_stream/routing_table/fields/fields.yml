- name: juniper.junos.routing_table
  type: group
  fields:
    - name: router_id
      type: keyword
      dimension: true
      description: Router ID of the device in dotted-decimal notation. Used as a TSDB dimension.
    - name: table_name
      type: keyword
      dimension: true
      description: Routing table name (for example inet.0, inet6.0, mpls.0). Used as a TSDB dimension.
    - name: destination_count
      type: long
      metric_type: gauge
      description: Number of unique destination prefixes in the routing table.
    - name: total_route_count
      type: long
      metric_type: gauge
      description: Total number of routes in the routing table, including inactive and hidden routes.
    - name: active_route_count
      type: long
      metric_type: gauge
      description: Number of routes currently selected as best path and installed in the forwarding table.
    - name: holddown_route_count
      type: long
      metric_type: gauge
      description: Number of routes in holddown state, pending deletion after withdrawal.
    - name: hidden_route_count
      type: long
      metric_type: gauge
      description: Number of routes hidden due to import policy rejection or next-hop resolution failure.
