- name: juniper.junos.storage
  type: group
  fields:
    - name: filesystem_name
      type: keyword
      dimension: true
      description: Filesystem device path (for example /dev/gpt/junos). Used as a TSDB dimension.
    - name: mounted_on
      type: keyword
      dimension: true
      description: Directory where the filesystem is mounted (for example /junos, /var). Used as a TSDB dimension.
    - name: total_bytes
      type: long
      metric_type: gauge
      unit: byte
      description: Total capacity of the filesystem in bytes.
    - name: used_bytes
      type: long
      metric_type: gauge
      unit: byte
      description: Number of bytes currently consumed on the filesystem.
    - name: available_bytes
      type: long
      metric_type: gauge
      unit: byte
      description: Number of bytes available for use on the filesystem.
    - name: used_percent
      type: float
      metric_type: gauge
      unit: percent
      description: Percentage of filesystem capacity currently in use.
