- name: juniper.junos.arp
  type: group
  fields:
    - name: ip_address
      type: ip
      dimension: true
      description: IP address of the ARP entry.
    - name: mac_address
      type: keyword
      description: MAC address associated with the IP address.
    - name: hostname
      type: keyword
      description: Resolved hostname for the ARP entry, if available.
    - name: interface
      type: keyword
      dimension: true
      description: Interface on which the ARP entry was learned.
    - name: entry_count
      type: long
      metric_type: gauge
      description: Total number of ARP entries in the table.
    - name: entry_flags
      type: keyword
      description: ARP entry flags indicating entry type (for example permanent, none).
