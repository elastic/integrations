---
description: Pipeline for JunOS OSPF metrics.
processors:
  - set:
      tag: set_event_kind
      field: event.kind
      value: metric
  - set:
      tag: set_event_module
      field: event.module
      value: juniper_junos_metrics
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: juniper_junos_metrics.ospf
  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: Juniper
  - set:
      tag: set_observer_product
      field: observer.product
      value: JunOS
  - rename:
      tag: rename_observer_name
      field: _observer_name
      target_field: observer.name
      ignore_missing: true
  - rename:
      tag: rename_observer_type
      field: _observer_type
      target_field: observer.type
      ignore_missing: true
  - set:
      tag: set_observer_type_default
      field: observer.type
      value: router
      override: false
  - set:
      tag: set_event_category
      field: event.category
      value:
        - network
  - set:
      tag: set_event_type
      field: event.type
      value:
        - info

  # Parse JSON from message (skip debug events)
  - json:
      tag: json_parse_message
      field: message
      target_field: _temp.raw
      if: ctx.message != null

  # Flatten JunOS JSON: unwrap top-level fields and nested area object
  - script:
      tag: script_flatten_junos_json
      lang: painless
      description: Unwrap the JunOS [{"data":"value"}] array pattern for top-level and nested area fields.
      source: |
        def raw = ctx._temp?.raw;
        if (raw == null) { return; }
        def flat = new HashMap();
        for (def entry : raw.entrySet()) {
          def key = entry.getKey();
          def val = entry.getValue();
          if (key == 'area' && val instanceof Map) {
            def areaFlat = new HashMap();
            for (def ae : val.entrySet()) {
              def ak = ae.getKey();
              def av = ae.getValue();
              if (ak == 'ospf-nbr-overview') {
                if (av instanceof List && av.size() > 0 && av.get(0) instanceof Map) {
                  def nbrOverview = av.get(0);
                  if (nbrOverview.containsKey('ospf-nbr-up-count')) {
                    def upCount = nbrOverview.get('ospf-nbr-up-count');
                    if (upCount instanceof List && upCount.size() > 0 && upCount.get(0) instanceof Map && upCount.get(0).containsKey('data')) {
                      areaFlat.put('ospf-nbr-up-count', upCount.get(0).get('data'));
                    }
                  }
                }
              } else if (av instanceof List && av.size() > 0 && av.get(0) instanceof Map) {
                def first = av.get(0);
                if (first.containsKey('data')) {
                  areaFlat.put(ak, first.get('data'));
                }
              }
            }
            flat.put('area', areaFlat);
          } else if (val instanceof List && val.size() > 0 && val.get(0) instanceof Map) {
            def first = val.get(0);
            if (first.containsKey('data')) {
              flat.put(key, first.get('data'));
            }
          }
        }
        ctx._temp.ospf = flat;

  # Instance-level fields
  - set:
      tag: set_instance_name
      if: ctx._temp?.ospf?.get('instance-name') != null
      field: juniper.junos.ospf.instance_name
      value: "{{_temp.ospf.instance-name}}"
  - set:
      tag: set_router_id
      if: ctx._temp?.ospf?.get('ospf-router-id') != null
      field: juniper.junos.ospf.router_id
      value: "{{_temp.ospf.ospf-router-id}}"

  # Area fields
  - set:
      tag: set_area_id
      if: ctx._temp?.ospf?.area?.get('ospf-area') != null
      field: juniper.junos.ospf.area.id
      value: "{{_temp.ospf.area.ospf-area}}"
  - set:
      tag: set_area_stub_type
      if: ctx._temp?.ospf?.area?.get('ospf-stub-type') != null
      field: juniper.junos.ospf.area.stub_type
      value: "{{_temp.ospf.area.ospf-stub-type}}"
  - set:
      tag: set_area_authentication_type
      if: ctx._temp?.ospf?.area?.get('authentication-type') != null
      field: juniper.junos.ospf.area.authentication_type
      value: "{{_temp.ospf.area.authentication-type}}"

  # Area numeric fields
  - convert:
      tag: convert_area_abr_count
      if: ctx._temp?.ospf?.area?.get('ospf-abr-count') != null
      field: _temp.ospf.area.ospf-abr-count
      target_field: juniper.junos.ospf.area.abr_count
      type: long
      ignore_failure: true
  - convert:
      tag: convert_area_asbr_count
      if: ctx._temp?.ospf?.area?.get('ospf-asbr-count') != null
      field: _temp.ospf.area.ospf-asbr-count
      target_field: juniper.junos.ospf.area.asbr_count
      type: long
      ignore_failure: true
  - convert:
      tag: convert_area_neighbor_up_count
      if: ctx._temp?.ospf?.area?.get('ospf-nbr-up-count') != null
      field: _temp.ospf.area.ospf-nbr-up-count
      target_field: juniper.junos.ospf.area.neighbor_up_count
      type: long
      ignore_failure: true

  # Clean up temporary fields
  - remove:
      tag: remove_temp_and_message
      field:
        - _temp
        - message
      ignore_missing: true

  # Remove event.original unless preserve tag is set
  - remove:
      tag: remove_event_original
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      field: event.original
      ignore_missing: true

on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "Processor {{ _ingest.on_failure_processor_type }} with tag {{ _ingest.on_failure_processor_tag }} failed with message {{ _ingest.on_failure_message }}"
