- name: juniper.junos.interface_queues
  type: group
  fields:
    - name: interface_name
      type: keyword
      dimension: true
      description: Parent interface name (for example ge-0/0/0, ae0). Used as a TSDB dimension.
    - name: queue_number
      type: integer
      dimension: true
      description: CoS queue number. Used as a TSDB dimension.
    - name: forwarding_class
      type: keyword
      description: CoS forwarding class name mapped to this queue (for example best-effort, network-control).
    - name: queued_packets
      type: long
      metric_type: counter
      description: Cumulative number of packets enqueued on this queue.
    - name: transmitted_packets
      type: long
      metric_type: counter
      description: Cumulative number of packets transmitted from this queue.
    - name: dropped_packets
      type: long
      metric_type: counter
      description: Cumulative number of packets dropped from this queue due to congestion or policy.
    - name: queues_supported
      type: integer
      metric_type: gauge
      description: Total number of CoS queues supported on the interface.
    - name: queues_in_use
      type: integer
      metric_type: gauge
      description: Number of CoS queues currently in use on the interface.
