- name: juniper.junos.system_info
  type: group
  fields:
    - name: hostname
      type: keyword
      dimension: true
      description: Device hostname as reported by the system.
    - name: hardware_model
      type: keyword
      description: Hardware model identifier of the device.
    - name: os_name
      type: keyword
      description: Operating system name (for example junos).
    - name: os_version
      type: keyword
      description: Operating system version string.
    - name: serial_number
      type: keyword
      description: Device chassis serial number.
    - name: up
      type: short
      metric_type: gauge
      description: Device reachability indicator. Always 1 when the device responds to API requests.
