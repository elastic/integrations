---
description: Pipeline for JunOS route engine metrics.
processors:
  - set:
      tag: set_event_kind
      field: event.kind
      value: metric
  - set:
      tag: set_event_module
      field: event.module
      value: juniper_junos_metrics
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: juniper_junos_metrics.route_engine
  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: Juniper
  - set:
      tag: set_observer_product
      field: observer.product
      value: JunOS
  - set:
      tag: set_observer_type
      field: observer.type
      value: router
      override: false
  - set:
      tag: set_event_category
      field: event.category
      value:
        - network
  - set:
      tag: set_event_type
      field: event.type
      value:
        - info

  # Parse JSON from message (skip debug events)
  - json:
      tag: json_parse_message
      field: message
      target_field: _temp.raw
      if: ctx.message != null

  # Flatten JunOS JSON: unwrap [{"data": "value"}] pattern into simple key-value pairs
  - script:
      tag: script_flatten_junos_json
      lang: painless
      description: Unwrap the JunOS [{"data":"value"}] array pattern into flat fields.
      source: |
        def raw = ctx._temp?.raw;
        if (raw == null) { return; }
        def flat = new HashMap();
        for (def entry : raw.entrySet()) {
          def key = entry.getKey();
          def val = entry.getValue();
          if (val instanceof List && val.size() > 0 && val.get(0) instanceof Map) {
            def first = val.get(0);
            if (first.containsKey('data')) {
              flat.put(key, first.get('data'));
            }
            if (first.containsKey('attributes')) {
              flat.put(key + '_attrs', first.get('attributes'));
            }
          }
        }
        ctx._temp.re = flat;

  # Route engine identity fields
  - set:
      tag: set_slot
      if: ctx._temp?.re?.slot != null
      field: juniper.junos.route_engine.slot
      value: "{{_temp.re.slot}}"
  - set:
      tag: set_status
      if: ctx._temp?.re?.status != null
      field: juniper.junos.route_engine.status
      value: "{{_temp.re.status}}"
  - set:
      tag: set_model
      if: ctx._temp?.re?.model != null
      field: juniper.junos.route_engine.model
      value: "{{_temp.re.model}}"
  - set:
      tag: set_serial_number
      if: ctx._temp?.re?.get('serial-number') != null
      field: juniper.junos.route_engine.serial_number
      value: "{{_temp.re.serial-number}}"
  - set:
      tag: set_mastership_state
      if: ctx._temp?.re?.get('mastership-state') != null
      field: juniper.junos.route_engine.mastership_state
      value: "{{_temp.re.mastership-state}}"

  # CPU fields
  - convert:
      tag: convert_cpu_user
      if: ctx._temp?.re?.get('cpu-user') != null
      field: _temp.re.cpu-user
      target_field: juniper.junos.route_engine.cpu.user
      type: float
      ignore_failure: true
  - convert:
      tag: convert_cpu_background
      if: ctx._temp?.re?.get('cpu-background') != null
      field: _temp.re.cpu-background
      target_field: juniper.junos.route_engine.cpu.background
      type: float
      ignore_failure: true
  - convert:
      tag: convert_cpu_kernel
      if: ctx._temp?.re?.get('cpu-system') != null
      field: _temp.re.cpu-system
      target_field: juniper.junos.route_engine.cpu.kernel
      type: float
      ignore_failure: true
  - convert:
      tag: convert_cpu_interrupt
      if: ctx._temp?.re?.get('cpu-interrupt') != null
      field: _temp.re.cpu-interrupt
      target_field: juniper.junos.route_engine.cpu.interrupt
      type: float
      ignore_failure: true
  - convert:
      tag: convert_cpu_idle
      if: ctx._temp?.re?.get('cpu-idle') != null
      field: _temp.re.cpu-idle
      target_field: juniper.junos.route_engine.cpu.idle
      type: float
      ignore_failure: true

  # Per-core CPU fields (cpu-user1, cpu-system1, etc.)
  - script:
      tag: script_extract_per_core_cpu
      lang: painless
      source: |
        def re = ctx._temp?.re;
        if (re == null) return;
        def cores = new ArrayList();
        for (int i = 0; i < 16; i++) {
          def userKey = 'cpu-user' + i;
          if (!re.containsKey(userKey)) continue;
          def core = new HashMap();
          core.put('id', i);
          String[] fields = new String[]{'cpu-user', 'cpu-system', 'cpu-background', 'cpu-interrupt', 'cpu-idle'};
          String[] targets = new String[]{'user', 'kernel', 'background', 'interrupt', 'idle'};
          for (int j = 0; j < fields.length; j++) {
            def k = fields[j] + i;
            if (re.containsKey(k)) {
              try { core.put(targets[j], Double.parseDouble(re.get(k).toString())); } catch (Exception e) {}
            }
          }
          cores.add(core);
        }
        if (cores.size() > 0) {
          if (ctx.juniper == null) ctx.juniper = new HashMap();
          if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
          if (ctx.juniper.junos.route_engine == null) ctx.juniper.junos.route_engine = new HashMap();
          ctx.juniper.junos.route_engine.put('cpu_cores', cores);
        }

  # Memory fields — memory-dram-size returns "1832 MB", need to parse number
  - script:
      tag: script_parse_memory
      lang: painless
      if: ctx._temp?.re?.get('memory-dram-size') != null
      source: |
        def raw = ctx._temp.re.get('memory-dram-size').toString().trim();
        def m = /(\d+)\s*MB/.matcher(raw);
        if (m.find()) {
          try {
            long mb = Long.parseLong(m.group(1));
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.route_engine == null) ctx.juniper.junos.route_engine = new HashMap();
            if (ctx.juniper.junos.route_engine.memory == null) ctx.juniper.junos.route_engine.memory = new HashMap();
            ctx.juniper.junos.route_engine.memory.total = mb * 1024L * 1024L;
          } catch (Exception e) {}
        }
  # Memory installed size — "(4096 MB installed)" -> bytes
  - script:
      tag: script_parse_memory_installed
      lang: painless
      if: ctx._temp?.re?.get('memory-installed-size') != null
      source: |
        def raw = ctx._temp.re.get('memory-installed-size').toString().trim();
        def m = /(\d+)\s*MB/.matcher(raw);
        if (m.find()) {
          try {
            long mb = Long.parseLong(m.group(1));
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.route_engine == null) ctx.juniper.junos.route_engine = new HashMap();
            if (ctx.juniper.junos.route_engine.memory == null) ctx.juniper.junos.route_engine.memory = new HashMap();
            ctx.juniper.junos.route_engine.memory.installed = mb * 1024L * 1024L;
          } catch (Exception e) {}
        }
  - convert:
      tag: convert_memory_buffer_utilization
      if: ctx._temp?.re?.get('memory-buffer-utilization') != null
      field: _temp.re.memory-buffer-utilization
      target_field: juniper.junos.route_engine.memory.buffer_utilization
      type: float
      ignore_failure: true

  # Load averages
  - convert:
      tag: convert_load_average_one
      if: ctx._temp?.re?.get('load-average-one') != null
      field: _temp.re.load-average-one
      target_field: juniper.junos.route_engine.load_average.one_minute
      type: float
      ignore_failure: true
  - convert:
      tag: convert_load_average_five
      if: ctx._temp?.re?.get('load-average-five') != null
      field: _temp.re.load-average-five
      target_field: juniper.junos.route_engine.load_average.five_minute
      type: float
      ignore_failure: true
  - convert:
      tag: convert_load_average_fifteen
      if: ctx._temp?.re?.get('load-average-fifteen') != null
      field: _temp.re.load-average-fifteen
      target_field: juniper.junos.route_engine.load_average.fifteen_minute
      type: float
      ignore_failure: true

  # Uptime — use junos:seconds attribute if available, otherwise parse up-time
  - script:
      tag: script_parse_uptime
      lang: painless
      source: |
        def attrs = ctx._temp?.re?.get('up-time_attrs');
        if (attrs != null && attrs.containsKey('junos:seconds')) {
          try {
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.route_engine == null) ctx.juniper.junos.route_engine = new HashMap();
            ctx.juniper.junos.route_engine.uptime = Long.parseLong(attrs.get('junos:seconds').toString());
          } catch (Exception e) {}
        }

  # Uptime in days — pre-computed for dashboard display (Lens lnsMetric ignores duration format)
  - script:
      tag: script_compute_uptime_days
      lang: painless
      if: ctx.juniper?.junos?.route_engine?.uptime != null
      source: |
        double secs = ((Number) ctx.juniper.junos.route_engine.uptime).doubleValue();
        ctx.juniper.junos.route_engine.uptime_days = Math.round(secs / 864.0) / 100.0;

  # Temperature fields — use celsius attribute if available, fall back to regex
  - script:
      tag: script_parse_temperature
      lang: painless
      source: |
        def re = ctx._temp?.re;
        if (re == null) return;
        def fields = [['temperature', 'routing_engine'], ['cpu-temperature', 'cpu']];
        for (def pair : fields) {
          def key = pair[0];
          def target = pair[1];
          def attrs = re.get(key + '_attrs');
          def val = re.get(key);
          def celsius = null;
          if (attrs != null && attrs.containsKey('celsius')) {
            try { celsius = Double.parseDouble(attrs.get('celsius').toString()); } catch (Exception e) {}
          }
          if (celsius == null && val != null) {
            def m = /(\d+(?:\.\d+)?)\s*degrees\s*C/.matcher(val.toString());
            if (m.find()) {
              try { celsius = Double.parseDouble(m.group(1)); } catch (Exception e) {}
            }
          }
          if (celsius != null) {
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.route_engine == null) ctx.juniper.junos.route_engine = new HashMap();
            if (ctx.juniper.junos.route_engine.temperature == null) ctx.juniper.junos.route_engine.temperature = new HashMap();
            ctx.juniper.junos.route_engine.temperature.put(target, celsius);
          }
        }

  # Last reboot reason
  - set:
      tag: set_last_reboot_reason
      if: ctx._temp?.re?.get('last-reboot-reason') != null
      field: juniper.junos.route_engine.last_reboot_reason
      value: "{{_temp.re.last-reboot-reason}}"

  # Start time — use junos:seconds attribute (unix timestamp)
  - script:
      tag: script_parse_start_time
      lang: painless
      source: |
        def attrs = ctx._temp?.re?.get('start-time_attrs');
        if (attrs != null && attrs.containsKey('junos:seconds')) {
          try {
            long secs = Long.parseLong(attrs.get('junos:seconds').toString());
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.route_engine == null) ctx.juniper.junos.route_engine = new HashMap();
            ctx.juniper.junos.route_engine.start_time = Instant.ofEpochSecond(secs).toString();
          } catch (Exception e) {}
        }

  # ECS: host.uptime = route engine uptime in seconds
  - set:
      tag: set_host_uptime
      if: ctx.juniper?.junos?.route_engine?.uptime != null
      field: host.uptime
      copy_from: juniper.junos.route_engine.uptime

  # ECS-aligned: system.cpu.utilization = (100 - cpu_idle) / 100
  - script:
      tag: script_compute_cpu_utilization
      lang: painless
      if: ctx.juniper?.junos?.route_engine?.cpu?.idle != null
      source: |
        double idle = ctx.juniper.junos.route_engine.cpu.idle;
        if (ctx.system == null) ctx.system = new HashMap();
        if (ctx.system.cpu == null) ctx.system.cpu = new HashMap();
        ctx.system.cpu.utilization = (100.0 - idle) / 100.0;

  # OTel-aligned: system.memory.utilization = memory_buffer_utilization / 100
  - script:
      tag: script_compute_memory_utilization
      lang: painless
      if: ctx.juniper?.junos?.route_engine?.memory?.buffer_utilization != null
      source: |
        double buf = ctx.juniper.junos.route_engine.memory.buffer_utilization;
        if (ctx.system == null) ctx.system = new HashMap();
        if (ctx.system.memory == null) ctx.system.memory = new HashMap();
        ctx.system.memory.utilization = buf / 100.0;

  # Clean up temporary fields
  - remove:
      tag: remove_temp_and_message
      field:
        - _temp
        - message
      ignore_missing: true

  # Remove event.original unless preserve tag is set
  - remove:
      tag: remove_event_original
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      field: event.original
      ignore_missing: true

on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "Processor {{ _ingest.on_failure_processor_type }} with tag {{ _ingest.on_failure_processor_tag }} failed with message {{ _ingest.on_failure_message }}"
