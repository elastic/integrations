- name: juniper.junos.lldp
  type: group
  fields:
    - name: local_port
      type: keyword
      dimension: true
      description: Local port on which the LLDP neighbor was discovered.
    - name: remote.chassis_id
      type: keyword
      dimension: true
      description: Remote neighbor chassis identifier.
    - name: remote.port_id
      type: keyword
      description: Remote neighbor port identifier.
    - name: remote.port_description
      type: keyword
      description: Description of the remote neighbor port.
    - name: remote.system_name
      type: keyword
      description: System name of the remote LLDP neighbor.
    - name: local_parent_interface
      type: keyword
      description: LAG or aggregate interface that the local port belongs to (for example ae0, ae45).
    - name: neighbor_count
      type: long
      metric_type: gauge
      description: Total number of LLDP neighbors discovered.
