- name: o365.metrics.viva_engage.groups.activity.group.detail
  type: group
  fields:
    - name: last_activity_date
      type: date
    - name: group_display_name
      type: keyword
    - name: group_type
      type: keyword
    - name: owner_principal_name
      type: keyword
    - name: is_deleted
      type: boolean
    - name: member.count
      type: long
    - name: liked.count
      type: long
    - name: posted.count
      type: long
    - name: read.count
      type: long
    - name: office_365_connected
      type: boolean
    - name: report
      type: group
      fields:
        - name: period.day
          unit: d
          type: integer
          description: "The reporting period over which the data is aggregated (in days).    \n"
        - name: refresh_date
          type: date
          description: |
            The date when the report data was last updated.
