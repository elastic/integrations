---
description: Pipeline for renaming object
processors:
  - set:
      field: ecs.version
      value: "8.16.0"
  - json:
      field: service_health
      target_field: o365.metrics.active.users   
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365.metrics.active.users.
      tag: painless_purge_spaces_and_dashes
      if: ctx.o365.metrics?.active?.users instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('_').toLowerCase();
        }
        
        def out = [:];
        for (def item : ctx.o365.metrics.active.users.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365.metrics.active.users = out;
  - remove:
      if: ctx.service_health != null
      field: service_health
      ignore_missing: true                        
  - rename:
      field: o365.metrics.active.users.exchange_active
      target_field: o365.metrics.active.users.exchange.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.exchange_inactive
      target_field: o365.metrics.active.users.exchange.inactive
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.office_365_active
      target_field: o365.metrics.active.users.office365.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.office_365_inactive
      target_field: o365.metrics.active.users.office365.inactive
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.onedrive_active
      target_field: o365.metrics.active.users.onedrive.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.onedrive_inactive
      target_field: o365.metrics.active.users.onedrive.inactive
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.report_period
      target_field: o365.metrics.active.users.report.period
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.report_refresh_date
      target_field: o365.metrics.active.users.report.refresh_date
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.sharepoint_active
      target_field: o365.metrics.active.users.sharepoint.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.sharepoint_inactive
      target_field: o365.metrics.active.users.sharepoint.inactive
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.skype_for_business_active
      target_field: o365.metrics.active.users.skype_for_business.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.skype_for_business_inactive
      target_field: o365.metrics.active.users.skype_for_business.inactive
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.teams_active
      target_field: o365.metrics.active.users.teams.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.teams_inactive
      target_field: o365.metrics.active.users.teams.inactive
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.yammer_active
      target_field: o365.metrics.active.users.yammer.active
      ignore_missing: true
  - rename:
      field: o365.metrics.active.users.yammer_inactive
      target_field: o365.metrics.active.users.yammer.inactive
      ignore_missing: true    

on_failure:
  - append:
      field: error.message
      value: "{{{_ingest.on_failure_message}}}"
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false
