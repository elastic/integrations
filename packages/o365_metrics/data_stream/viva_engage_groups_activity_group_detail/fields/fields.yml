- name: o365.metrics.viva_engage.groups_activity
  type: group
  fields:
    # Viva Engage Groups Activity Group Detail
    - name: group_detail
      type: group
      fields:
        - name: report_refresh_date
          type: date
        - name: last_activity_date
          type: date
        - name: group_display_name
          type: keyword
        - name: group_type
          type: keyword
        - name: owner_principal_name
          type: keyword
        - name: is_deleted
          type: boolean
        - name: member.count
          type: long
        - name: liked.count
          type: long
        - name: posted.count
          type: long
        - name: read.count
          type: long
        - name: office_365_connected
          type: boolean
        - name: report_period
          type: keyword
