- name: o365metrics.sharepoint.site.usage.storage
  type: group
  fields:
    - name: report.date
      type: date
      description: |
        The date the SharePoint site storage usage report was generated.
    - name: report.period
      type: integer
      description: |
        The duration of the reporting period for SharePoint site storage usage, in days.
    - name: site_type
      type: keyword
      description: |
        The type of SharePoint sites included in the report (e.g., All, Team, Personal).
    - name: storage_used.byte
      type: integer
      description: |
        The total storage used across SharePoint sites during the reporting period, in bytes.
    - name: report.refresh_date
      type: date
      description: |
        The date when the SharePoint site storage usage data was last refreshed.
- name: o365metrics.sharepoint.site.usage.detail
  type: group
  fields:
    - name: active_file.count
      type: integer
      description: |
        The number of active files in the SharePoint site during the reporting period.
    - name: file.count
      type: integer
      description: |
        The total number of files in the SharePoint site.
    - name: is_deleted
      type: boolean
      description: |
        Indicates whether the SharePoint site is deleted.
    - name: last_activity_date
      type: date
      description: |
        The last date of activity in the SharePoint site.
    - name: owner_display_name
      type: keyword
      description: |
        The display name of the SharePoint site owner.
    - name: owner_principal_name
      type: keyword
      description: |
        The principal name (email address) of the SharePoint site owner.
    - name: page_view.count
      type: integer
      description: |
        The number of page views in the SharePoint site during the reporting period.
    - name: report.period
      type: integer
      description: |
        The duration of the reporting period for SharePoint site usage, in days.
    - name: report.refresh_date
      type: date
      description: |
        The date when the SharePoint site usage data was last refreshed.
    - name: root_web_template
      type: keyword
      description: |
        The template used for the root web of the SharePoint site (e.g., Team Site).
    - name: site.id
      type: keyword
      description: |
        The unique identifier for the SharePoint site.
    - name: site.url
      type: keyword
      description: |
        The URL of the SharePoint site.
    - name: storage_allocated.byte
      type: integer
      description: |
        The amount of storage allocated to the SharePoint site, in bytes.
    - name: storage_used.byte
      type: integer
      description: |
        The amount of storage used in the SharePoint site, in bytes.
    - name: visited_page.count
      type: integer
      description: |
        The number of visited pages in the SharePoint site during the reporting period.