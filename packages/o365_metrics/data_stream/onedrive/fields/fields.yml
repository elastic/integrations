- name: o365metrics.onedrive_usageaccountcounts
  type: group
  fields:
    - name: active
      type: integer
      description: |
        The number of OneDrive accounts that were active during the reporting period.
    - name: report_date
      type: date
      description: |
        The date the OneDrive account usage report was generated.
    - name: report_period
      type: integer
      description: |
        The duration of the reporting period for OneDrive account activity, in days.
    - name: site_type
      type: keyword
      description: |
        The type of OneDrive sites included in the report (e.g., All, Team, Personal).
    - name: total
      type: integer
      description: |
        The total number of OneDrive accounts evaluated in the report.
    - name: report_refresh_date
      type: date
      description: |-
        The date when the OneDrive account usage data was last refreshed.
- name: o365metrics.onedrive_usagefilecounts
  type: group
  fields:
    - name: active
      type: integer
      description: |
        The number of OneDrive accounts with active file usage during the reporting period.
    - name: report_date
      type: date
      description: |
        The date the report was generated.
    - name: report_period
      type: integer
      description: |
        The duration of the reporting period, in days.
    - name: site_type
      type: keyword
      description: |
        The type of sites included in the OneDrive usage report (e.g., All).
    - name: total
      type: integer
      description: |
        The total number of OneDrive accounts included in the report.
    - name: report_refresh_date
      type: date
      description: |-
        The date when the data in the report was last refreshed.
- name: o365metrics.onedrive_usagestorage
  type: group
  fields:
    - name: report_date
      type: date
      description: |
        The date the OneDrive storage usage report was generated.
    - name: report_period
      type: integer
      description: |
        The duration of the reporting period for OneDrive storage usage, in days.
    - name: site_type
      type: keyword
      description: |
        The type of OneDrive sites included in the report (e.g., All, Team, Personal).
    - name: storage_used_byte
      type: integer
      description: |
        The total storage used across OneDrive accounts during the reporting period, in bytes.
    - name: report_refresh_date
      type: date
      description: |-
        The date when the OneDrive storage usage data was last refreshed.
