- name: o365.metrics.onedrive.usage_storage
  type: group
  fields:
    - name: report_date
      type: date
      description: |
        The date the report was generated.
    - name: report_period
      type: integer
      description: |
        The duration of the reporting period, in days.
    - name: site_type
      type: keyword
      description: |
        The type of OneDrive sites included in the report (e.g., All, Team, Personal).
    - name: storage_used_byte
