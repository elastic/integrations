---
description: Pipeline for renaming object
processors:
  - set:
      field: ecs.version
      value: "8.16.0"        

# Pipeline for Usage Account Counts 
  - json:
      field: onedrive_usageaccountcounts
      target_field: o365.metrics.onedrive.usage_account_counts
      ignore_failure: true
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365.metrics.onedrive.usage_account_counts.
      tag: painless_purge_spaces_and_dashes
      ignore_failure: true
      if: ctx.o365?.metrics?.onedrive?.usage_account_counts instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('_').toLowerCase();
        }
        
        def out = [:];
        for (def item : ctx.o365.metrics.onedrive.usage_account_counts.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365.metrics.onedrive.usage_account_counts = out;
  - remove:
      if: ctx.onedrive_usageaccountcounts != null
      field: onedrive_usageaccountcounts
      ignore_missing: true      

