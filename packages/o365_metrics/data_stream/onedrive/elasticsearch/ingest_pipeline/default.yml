# Pipeline for Usage Storage
  - json:
      field: onedrive_usagestorage
      target_field: o365.metrics.onedrive.usage_storage  
      ignore_failure: true 
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365.metrics.onedrive.usage_storage.
      tag: painless_purge_spaces_and_dashes
      if: ctx.o365?.metrics?.onedrive?.usage_storage instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('_').toLowerCase();
        }
        
        def out = [:];
        for (def item : ctx.o365.metrics.onedrive.usage_storage.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365.metrics.onedrive.usage_storage = out;
  - remove:
      if: ctx.onedrive_usagestorage != null
      field: onedrive_usagestorage
      ignore_missing: true      
  - rename:
      field: o365.metrics.onedrive.usage_storage.storage_used_(byte)
      target_field: o365.metrics.onedrive.usage_storage.storage_used_byte
      ignore_missing: true                

on_failure:
  - append:
      field: error.message
      value: "{{{_ingest.on_failure_message}}}"
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false