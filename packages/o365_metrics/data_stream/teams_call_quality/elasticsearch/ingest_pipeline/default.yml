---
description: Pipeline for renaming object
processors:
  - set:
      field: ecs.version
      value: "8.16.0"

# Teams Call Quality Records         
  - json:
      field: call_records
      target_field: o365metrics.call.records
      ignore_failure: true 
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365metrics.call.records.
      tag: painless_purge_spaces_and_dashes
      ignore_failure: true
      if: ctx.o365metrics?.call?.records instanceof Map
      source: |
        String underscore(String s) {
          String result = /[ -]/.matcher(s).replaceAll('_').toLowerCase();
          return /[\ufeff]/.matcher(result).replaceAll('')
        }
        
        def out = [:];
        for (def item : ctx.o365metrics.call.records.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365metrics.call.records = out;
  - remove:
      if: ctx.call_records != null
      field: call_records
      ignore_missing: true

# Teams Call Quality Call Records Sessions
  - json:
      field: call_sessions
      target_field: o365metrics.call.sessions
      ignore_failure: true 
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365metrics.call.sessions.
      tag: painless_purge_spaces_and_dashes
      ignore_failure: true
      if: ctx.o365metrics?.call?.sessions instanceof Map
      source: |
        String underscore(String s) {
          String result = /[ -]/.matcher(s).replaceAll('_').toLowerCase();
          return /[\ufeff]/.matcher(result).replaceAll('')
        }
        
        def out = [:];
        for (def item : ctx.o365metrics.call.sessions.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365metrics.call.sessions = out;
  - remove:
      if: ctx.sharepoint_site_usage_detail != null
      field: sharepoint_site_usage_detail
      ignore_missing: true

on_failure:
  - append:
      field: error.message
      value: "{{{_ingest.on_failure_message}}}"
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false