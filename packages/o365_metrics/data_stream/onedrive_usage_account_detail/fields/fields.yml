- name: o365.metrics.onedrive.usage.account.detail
  type: group
  fields:
    - name: last_activity_date
      type: date
    - name: site_id
      type: keyword
    - name: site_uRL
      type: keyword
    - name: owner_display_name
      type: keyword
    - name: owner_principal_name
      type: keyword
    - name: is_deleted
      type: boolean
    - name: file.count
      type: long
    - name: active_file.count
      type: long
    - name: storage_used.byte
      type: long
    - name: storage_allocated.byte
      type: long
    - name: report
      type: group
      fields:
        - name: period.day
          unit: d
          type: integer
          description: |
            The reporting period over which the data is aggregated (in days).    
        - name: refresh_date
          type: date
          description: |
            The date when the report data was last updated.
