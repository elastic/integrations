---
description: Pipeline for renaming object
processors:
  - set:
      field: ecs.version
      value: "8.11.0"             
  - json:
      field: onedrive_usagestorage
      target_field: o365metrics.onedrive_usagestorage   
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365metrics.onedrive_usagestorage.
      tag: painless_purge_spaces_and_dashes
      if: ctx.o365metrics?.onedrive_usagestorage instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('');
        }
        
        def out = [:];
        for (def item : ctx.o365metrics.onedrive_usagestorage.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365metrics.onedrive_usagestorage = out;
  - rename:
      field: o365metrics.onedrive_usagestorage.StorageUsed(Byte)
      target_field: o365metrics.onedrive_usagestorage.StorageUsedByte
      ignore_missing: true
  - remove:
      if: ctx.onedrive_usagestorage != null
      field: onedrive_usagestorage
      ignore_missing: true             

on_failure:
  - append:
      field: error.message
      value: "{{{_ingest.on_failure_message}}}"
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false