- name: o365metrics.sharepoint_siteusagedetails
  type: group
  fields:
    - name: ActiveFileCount
      type: integer
      description: |
        The number of active files on the SharePoint site during the reporting period.
    - name: FileCount
      type: integer
      description: |
        The total number of files on the SharePoint site.
    - name: IsDeleted
      type: boolean
      description: |
        Indicates whether the SharePoint site is marked as deleted (True or False).
    - name: LastActivityDate
      type: date
      description: |
        The date of the last recorded activity on the SharePoint site. May be blank if no activity is recorded.
    - name: OwnerDisplayName
      type: keyword
      description: |
        The display name of the SharePoint site owner.
    - name: OwnerPrincipalName
      type: keyword
      description: |
        The principal name (email or username) of the SharePoint site owner.
    - name: PageViewCount
      type: integer
      description: |
        The number of page views on the SharePoint site during the reporting period.
    - name: ReportPeriod
      type: integer
      description: |
        The duration of the reporting period for SharePoint site usage, in days.
    - name: RootWebTemplate
      type: keyword
      description: |
        The template used to create the root web of the SharePoint site (e.g., Team Site).
    - name: SiteId
      type: keyword
      description: |
        The unique identifier of the SharePoint site.
    - name: SiteURL
      type: keyword
      description: |
        The URL of the SharePoint site.
    - name: StorageAllocatedByte
      type: integer
      description: |
        The total storage allocated to the SharePoint site, in bytes.
    - name: StorageUsedByte
      type: integer
      description: |
        The amount of storage used on the SharePoint site, in bytes.
    - name: VisitedPageCount
      type: integer
      description: |
        The number of unique page visits on the SharePoint site during the reporting period.
    - name: ReportRefreshDate
      type: date
      description: |-
        The date when the SharePoint site usage data was last refreshed.
