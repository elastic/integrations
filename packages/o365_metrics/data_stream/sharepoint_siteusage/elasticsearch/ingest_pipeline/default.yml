---
description: Pipeline for renaming object
processors:
  - set:
      field: ecs.version
      value: "8.11.0"             
  - json:
      field: sharepoint_siteusagestorage
      target_field: o365metrics.sharepoint_siteusagestorage   
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365metrics.sharepoint_siteusagestorage.
      tag: painless_purge_spaces_and_dashes
      if: ctx.o365metrics?.sharepoint_siteusagestorage instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('');
        }
        
        def out = [:];
        for (def item : ctx.o365metrics.sharepoint_siteusagestorage.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365metrics.sharepoint_siteusagestorage = out;
  - remove:
      if: ctx.sharepoint_siteusagestorage != null
      field: sharepoint_siteusagestorage
      ignore_missing: true
  - rename:
      field: o365metrics.sharepoint_siteusagestorage.StorageUsed(Byte)
      target_field: o365metrics.sharepoint_siteusagestorage.StorageUsedByte
      ignore_missing: true

on_failure:
  - append:
      field: error.message
      value: "{{{_ingest.on_failure_message}}}"
  - append:
      field: event.kind
      value: pipeline_error
      allow_duplicates: false