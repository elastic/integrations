---
description: Pipeline for renaming object
processors:
  - set:
      field: ecs.version
      value: "8.16.0"

# SharePoint Site Usage Storage            
  - json:
      field: sharepoint_siteusage_storage
      target_field: o365metrics.sharepoint_siteusage_storage
      ignore_failure: true 
  - script:
      lang: painless
      description: Replace spaces and dashes in field names under o365metrics.sharepoint_siteusage_storage.
      tag: painless_purge_spaces_and_dashes
      if: ctx.o365metrics?.sharepoint_siteusage_storage instanceof Map
      source: |
        String underscore(String s) {
          return /[ -]/.matcher(s).replaceAll('_').toLowerCase();
        }
        
        def out = [:];
        for (def item : ctx.o365metrics.sharepoint_siteusage_storage.entrySet()) {
          out[underscore(item.getKey())] = item.getValue();
        }
        ctx.o365metrics.sharepoint_siteusage_storage = out;
  - remove:
      if: ctx.sharepoint_siteusage_storage != null
      field: sharepoint_siteusage_storage
      ignore_missing: true
  - rename:
      field: o365metrics.sharepoint_siteusage_storage.storage_used_(byte)
      target_field: o365metrics.sharepoint_siteusage_storage.storage_used.byte
      ignore_missing: true
  - rename:
      field: o365metrics.sharepoint_siteusage_storage.report_date
      target_field: o365metrics.sharepoint_siteusage_storage.report.date
      ignore_missing: true
  - rename:
      field: o365metrics.sharepoint_siteusage_storage.report_period
      target_field: o365metrics.sharepoint_siteusage_storage.report.period
      ignore_missing: true
  - rename:
      field: o365metrics.sharepoint_siteusage_storage.report_refresh_date
      target_field: o365metrics.sharepoint_siteusage_storage.report.refresh_date
      ignore_missing: true

