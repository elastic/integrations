- name: o365.metrics.active.users
  type: group
  fields:
    - name: exchange.active
      type: integer
      description: |
        Number of Exchange active users.
    - name: exchange.inactive
      type: integer
      description: |
        Number of Exchange inactive users.
    - name: office365.active
      type: integer
      description: |
        Number of Office 365 active users.
    - name: office365.inactive
      type: integer
      description: |
        Number of Office 365 inactive users.
    - name: onedrive.active
      type: integer
      description: |
        Number of OneDrive active users.
    - name: onedrive.inactive
      type: integer
      description: |
        Number of OneDrive inactive users.
    - name: sharepoint.active
      type: integer
      description: |
        Number of SharePoint active users.
    - name: sharepoint.inactive
      type: integer
      description: |
        Number of SharePoint inactive users.
    - name: skype_for_business.active
      type: integer
      description: |
        Number of Skype for Business active users.
    - name: skype_for_business.inactive
      type: integer
      description: |
        Number of Skype for Business inactive users.
    - name: teams.active
      type: integer
      description: |
        Number of Teams active users.
    - name: teams.inactive
      type: integer
      description: |
        Number of Teams inactive users.
    - name: yammer.active
      type: integer
      description: |
        Number of Yammer active users.
    - name: yammer.inactive
      type: integer
      description: |
        Number of Yammer inactive users.
    - name: report.refresh_date
      type: date
      description: |-
        Date when the report was refreshed.
    - name: report.period
      type: integer
      description: |
        Report period in days.
