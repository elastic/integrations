- name: o365.metrics.active.users
  type: group
  fields:
    - name: exchange_active
      type: integer
      description: |
        Number of Exchange active users.
    - name: exchange_inactive
      type: integer
      description: |
        Number of Exchange inactive users.
    - name: office_365_active
      type: integer
      description: |
        Number of Office 365 active users.
    - name: office_365_inactive
      type: integer
      description: |
        Number of Office 365 inactive users.
    - name: onedrive_active
      type: integer
      description: |
        Number of OneDrive active users.
    - name: onedrive_inactive
      type: integer
      description: |
        Number of OneDrive inactive users.
    - name: sharepoint_active
      type: integer
      description: |
        Number of SharePoint active users.
    - name: sharepoint_inactive
      type: integer
      description: |
        Number of SharePoint inactive users.
    - name: skype_for_business_active
      type: integer
      description: |
        Number of Skype for Business active users.
    - name: skype_for_business_inactive
      type: integer
      description: |
        Number of Skype for Business inactive users.
    - name: teams_active
      type: integer
      description: |
        Number of Teams active users.
    - name: teams_inactive
      type: integer
      description: |
        Number of Teams inactive users.
    - name: yammer_active
      type: integer
      description: |
        Number of Yammer active users.
    - name: yammer_inactive
      type: integer
      description: |
        Number of Yammer inactive users.
    - name: report_refresh_date
      type: date
      description: |-
        Date when the report was refreshed.
    - name: report_period
      type: integer
      description: |
        Report period in days.
