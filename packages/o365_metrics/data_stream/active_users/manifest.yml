title: Collect Active Users metrics from O365
type: metrics
streams:
  - input: cel
    title: O365 active users metrics
    enabled: true
    description: Collect active users metrics from O365.
    template_path: cel.yml.hbs
    vars:
      - name: url
        type: text
        title: Base URL of Office Graph API
        show_user: true
        required: false
        default: https://graph.microsoft.com/v1.0/reports/getOffice365ServicesUserCounts(period='D7')
      - name: interval
        type: text
        title: Interval
        description: How often the API is polled, supports seconds, minutes and hours.
        show_user: true
        required: true
        default: 3m
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - o365metrics-active_users
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        multi: false
        required: false
        show_user: false
        description: >-
          The request tracer logs HTTP requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-cel.html#_resource_tracer_filename) for details.
