title: Collect Active Users metrics from O365
type: metrics
streams:
  - input: cel
    title: O365 active users metrics
    enabled: true
    description: Collect active users metrics from O365.
    template_path: cel.yml.hbs
    vars:
      - name: url
        type: text
        title: Base URL of Office Graph API
        show_user: true
        required: false
        default: https://graph.microsoft.com/v1.0/reports/getOffice365ServicesUserCounts(period='D7')
      - name: interval
        type: text
        title: Interval
        description: How often the API is polled, supports seconds, minutes and hours.
        show_user: true
        required: true
        default: 3m
      - name: azure_tenant_id
        type: text
        title: Directory (tenant) ID
        description: Directory (tenant) ID
        show_user: true
        multi: false
        required: true
      - name: client_id
        type: text
        title: Application (client) ID
        description: Client ID used for Oauth2 authentication
        show_user: true
        required: true
      - name: client_secret
        type: password
        title: Client Secret
        description: Client secret used for Oauth2 authentication
        show_user: true
        required: true
        secret: true
      - name: token_url
        type: text
        title: Oauth2 Token URL
        description: The Base URL endpoint that will be used to generate the tokens during the oauth2 flow. If not provided, above `Azure Tenant ID` will be used for oauth2 token generation. Default value - `https://login.microsoftonline.com`
        show_user: true
        required: false
        default: https://login.microsoftonline.com
        secret: false
      - name: token_scopes
        type: text
        title: Token Scopes
        multi: true
        default:
          - "https://graph.microsoft.com/.default"
        description: Scopes for OAuth2 token.
        required: true
        show_user: false
        secret: false
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - o365metrics-active_users
      - name: enable_request_tracer
        type: bool
        title: Enable request tracing
        multi: false
        required: false
        show_user: false
        description: >-
          The request tracer logs HTTP requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-cel.html#_resource_tracer_filename) for details.
