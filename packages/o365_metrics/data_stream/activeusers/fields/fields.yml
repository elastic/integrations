- name: o365metrics.activeusers
  type: group
  fields:
    - name: ExchangeActive
      type: integer
      description: |
        Number of Exchange active users.
    - name: ExchangeInactive
      type: integer
      description: |
        Number of Exchange inactive users.
    - name: Office365Active
      type: integer
      description: |
        Number of Office 365 active users.
    - name: Office365Inactive
      type: integer
      description: |
        Number of Office 365 inactive users.
    - name: OneDriveActive
      type: integer
      description: |
        Number of OneDrive active users.
    - name: OneDriveInactive
      type: integer
      description: |
        Number of OneDrive inactive users.
    - name: ReportPeriod
      type: integer
      description: |
        Report period in days.
    - name: SharePointActive
      type: integer
      description: |
        Number of SharePoint active users.
    - name: SharePointInactive
      type: integer
      description: |
        Number of SharePoint inactive users.
    - name: SkypeForBusinessActive
      type: integer
      description: |
        Number of Skype for Business active users.
    - name: SkypeForBusinessInactive
      type: integer
      description: |
        Number of Skype for Business inactive users.
    - name: TeamsActive
      type: integer
      description: |
        Number of Teams active users.
    - name: TeamsInactive
      type: integer
      description: |
        Number of Teams inactive users.
    - name: YammerActive
      type: integer
      description: |
        Number of Yammer active users.
    - name: YammerInactive
      type: integer
      description: |
        Number of Yammer inactive users.
    - name: ReportRefreshDate
      type: date
      description: |-
        Date when the report was refreshed.
