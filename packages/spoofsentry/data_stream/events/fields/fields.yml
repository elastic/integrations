- name: spoofsentry
  type: group
  fields:
    - name: event_type
      type: keyword
      description: SpoofSentry event classification
    - name: domain
      type: keyword
      description: Target domain
    - name: tenant_id
      type: keyword
      description: Customer tenant identifier
    - name: severity
      type: keyword
      description: Original severity string (info, low, medium, high, critical)
