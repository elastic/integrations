title: Events
type: logs
streams:
  - input: http_endpoint
    title: SpoofSentry Events
    description: Receive domain security events from SpoofSentry via HTTP
    template_path: stream.yml.hbs
    vars:
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        description: Preserve the raw event under event.original
        default: false
        required: false
        show_user: true
