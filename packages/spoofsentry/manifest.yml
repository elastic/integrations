format_version: 3.3.2
name: spoofsentry
title: SpoofSentry
version: 1.0.0
description: Collect domain spoofing, DMARC, lookalike-domain, certificate-transparency, and takedown security events from SpoofSentry by DomainSeal.
type: integration
categories:
  - security
  - email_security
conditions:
  kibana:
    version: "^8.18.0 || ^9.0.0"
  elastic:
    subscription: basic
icons:
  - src: /img/spoofsentry-logo.svg
    title: SpoofSentry
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: spoofsentry
    title: SpoofSentry Events
    description: Collect domain security events from SpoofSentry via webhook (HTTP endpoint).
    inputs:
      - type: http_endpoint
        title: Collect SpoofSentry events via HTTP webhook
        description: >-
          Receive SpoofSentry security events at an HTTP endpoint. Point a SpoofSentry
          webhook integration at this listener to stream domain-security events into Elastic.
owner:
  github: netallion
  type: community
