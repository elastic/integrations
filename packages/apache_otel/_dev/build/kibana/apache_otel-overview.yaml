dashboards:
  - id: apache_otel-overview
    name: '[Apache OTel] Overview'
    description: >-
      Overview of Apache HTTP Server health and performance from OpenTelemetry metrics.
    time_range:
      from: "now-1h"
      to: "now"
    settings:
      margins: true
      sync:
        cursor: true
        tooltips: false
        colors: false
    filters:
      - field: data_stream.dataset
        equals: apachereceiver.otel
    controls:
      - type: options
        label: Server name
        data_view: metrics-*
        field: resource.attributes.apache.server.name
      - type: options
        label: Host
        data_view: metrics-*
        field: resource.attributes.host.name

    panels:
      # ─── Dashboard Overview ──────────────────────────────────────────
      - hide_title: true
        size: {w: 16, h: 12}
        markdown:
          content: |
            ## [Apache OTel] Overview

            This dashboard provides an overview of Apache HTTP Server health and performance via OpenTelemetry metrics:
            - Request rate and traffic throughput
            - Worker pool utilization (busy vs idle)
            - Active and asynchronous connection counts
            - Server load averages (1m, 5m, 15m)
            - CPU load and CPU time breakdown by mode

      # ─── KPI Row 1 ──────────────────────────────────────────────────
      - title: Uptime
        description: Total server uptime since last restart.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.uptime IS NOT NULL
            - STATS uptime_sec = MAX(LAST_OVER_TIME(apache.uptime))
          primary:
            field: uptime_sec
            label: Uptime
            format:
              type: duration

      - title: Request Rate
        description: Current per-second request rate.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.requests IS NOT NULL
            - STATS request_rate = SUM(RATE(apache.requests))
          primary:
            field: request_rate
            label: Request Rate
            format:
              type: number
              decimals: 1
              suffix: " req/s"

      - title: Traffic Rate
        description: Current per-second traffic throughput in bytes.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.traffic IS NOT NULL
            - STATS traffic_rate = SUM(RATE(apache.traffic))
          primary:
            field: traffic_rate
            label: Traffic Rate
            format:
              type: bytes
              decimals: 1
              suffix: "/s"

      - title: CPU Load
        description: Current CPU load percentage.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.cpu.load IS NOT NULL
            - STATS cpu_load = MAX(AVG_OVER_TIME(apache.cpu.load))
          primary:
            field: cpu_load
            label: CPU Load
            format:
              type: number
              decimals: 2
              suffix: " %"

      # ─── KPI Row 2 ──────────────────────────────────────────────────
      - title: Active Connections
        description: Number of active connections currently attached to the server.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.current_connections IS NOT NULL
            - STATS connections = MAX(LAST_OVER_TIME(apache.current_connections))
          primary:
            field: connections
            label: Active Connections
            format:
              type: number
              decimals: 0

      - title: Busy Workers
        description: Number of workers currently handling requests.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.workers IS NOT NULL AND attributes.state == "busy"
            - STATS busy = MAX(LAST_OVER_TIME(apache.workers))
          primary:
            field: busy
            label: Busy Workers
            format:
              type: number
              decimals: 0

      - title: Idle Workers
        description: Number of workers available to handle new requests.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.workers IS NOT NULL AND attributes.state == "idle"
            - STATS idle = MAX(LAST_OVER_TIME(apache.workers))
          primary:
            field: idle
            label: Idle Workers
            format:
              type: number
              decimals: 0

      - title: Server Load (1m)
        description: Average server load during the last minute.
        hide_title: true
        size: {w: 8, h: 6}
        esql:
          type: metric
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE `apache.load.1` IS NOT NULL
            - STATS load_1m = MAX(AVG_OVER_TIME(`apache.load.1`))
          primary:
            field: load_1m
            label: Server Load (1m)
            format:
              type: number
              decimals: 2

      # ─── Section: Traffic & Performance ──────────────────────────────
      - title: Traffic & Performance
        hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Traffic & Performance'

      - title: Request Rate Over Time
        description: Per-second request rate over the selected time range.
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.requests IS NOT NULL
            - STATS request_rate = SUM(RATE(apache.requests))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: request_rate
              label: Requests/sec
              format:
                type: number
                decimals: 1

      - title: Traffic Throughput Over Time
        description: Per-second traffic throughput in bytes over the selected time range.
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.traffic IS NOT NULL
            - STATS traffic_rate = SUM(RATE(apache.traffic))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: traffic_rate
              label: Bytes/sec
              format:
                type: bytes

      # ─── Section: Workers & Connections ──────────────────────────────
      - title: Workers & Connections
        hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## Workers & Connections'

      - title: Workers by State Over Time
        description: Busy and idle worker counts over time.
        size: {w: 24, h: 12}
        esql:
          type: area
          mode: stacked
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.workers IS NOT NULL
            - STATS workers = MAX(LAST_OVER_TIME(apache.workers))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend),
                   attributes.state
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: workers
              label: Workers
              format:
                type: number
                decimals: 0
          breakdown:
            field: attributes.state
          color:
            assignments:
              - value: "busy"
                color: '#E7664C'
              - value: "idle"
                color: '#54B399'

      - title: Active Connections Over Time
        description: Total active connections attached to the HTTP server over time.
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.current_connections IS NOT NULL
            - STATS connections = MAX(LAST_OVER_TIME(apache.current_connections))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: connections
              label: Active Connections
              format:
                type: number
                decimals: 0

      - title: Scoreboard Worker States Over Time
        description: Detailed breakdown of worker states from the Apache scoreboard.
        size: {w: 24, h: 12}
        esql:
          type: bar
          mode: stacked
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.scoreboard IS NOT NULL
            - STATS count = MAX(LAST_OVER_TIME(apache.scoreboard))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend),
                   attributes.state
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: count
              label: Workers
              format:
                type: number
                decimals: 0
          breakdown:
            field: attributes.state

      - title: Async Connections by State Over Time
        description: Asynchronous connection counts by state (writing, keepalive, closing).
        size: {w: 24, h: 12}
        esql:
          type: area
          mode: stacked
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.connections.async IS NOT NULL
            - STATS connections = MAX(LAST_OVER_TIME(apache.connections.async))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend),
                   attributes.connection_state
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: connections
              label: Connections
              format:
                type: number
                decimals: 0
          breakdown:
            field: attributes.connection_state

      # ─── Section: System Resources ───────────────────────────────────
      - title: System Resources
        hide_title: true
        size: {w: 48, h: 3}
        markdown:
          content: '## System Resources'

      - title: Server Load Over Time
        description: Server load averages (1-minute, 5-minute, 15-minute) over time.
        size: {w: 24, h: 12}
        esql:
          type: line
          query:
            - TS metrics-apachereceiver.otel-*
            - FORK
                (
                  WHERE `apache.load.1` IS NOT NULL
                  | STATS load = MAX(AVG_OVER_TIME(`apache.load.1`))
                      BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
                  | EVAL period = "1 minute"
                )
                (
                  WHERE `apache.load.5` IS NOT NULL
                  | STATS load = MAX(AVG_OVER_TIME(`apache.load.5`))
                      BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
                  | EVAL period = "5 minutes"
                )
                (
                  WHERE `apache.load.15` IS NOT NULL
                  | STATS load = MAX(AVG_OVER_TIME(`apache.load.15`))
                      BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend)
                  | EVAL period = "15 minutes"
                )
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: load
              label: Load
              format:
                type: number
                decimals: 2
          breakdown:
            field: period

      - title: CPU Time by Mode Over Time
        description: CPU time consumption rate broken down by mode (system vs user).
        size: {w: 24, h: 12}
        esql:
          type: area
          mode: stacked
          query:
            - TS metrics-apachereceiver.otel-*
            - WHERE apache.cpu.time IS NOT NULL
            - STATS cpu_time_rate = SUM(RATE(apache.cpu.time))
                BY time_bucket = BUCKET(@timestamp, 20, ?_tstart, ?_tend),
                   attributes.mode
            - SORT time_bucket ASC
          dimension:
            field: time_bucket
            data_type: date
          metrics:
            - field: cpu_time_rate
              label: CPU jiffs/sec
              format:
                type: number
                decimals: 2
          breakdown:
            field: attributes.mode
