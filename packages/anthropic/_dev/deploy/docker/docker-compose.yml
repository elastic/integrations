version: "2.3"
services:
  anthropic-audit:
    image: docker.elastic.co/observability/stream:v0.20.0
    hostname: anthropic-audit
    ports:
      - 8090
    volumes:
      - ./files:/files:ro
    environment:
      PORT: "8090"
    command:
      - http-server
      - --addr=:8090
      - --config=/files/config-audit.yml
