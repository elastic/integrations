---
description: Parse Anthropic compliance audit activities from the Activities API.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'
  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: >-
        Renames the original `message` field to `event.original` to store a copy of the original message.
        The `event.original` field is not touched if the document already has one.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
      tag: parse_event_original_json
      if: ctx.event?.original != null
  - rename:
      field: json.id
      target_field: event.id
      ignore_missing: true
      tag: rename_event_id
  - rename:
      field: json.type
      target_field: event.action
      ignore_missing: true
      tag: rename_event_action
  - date:
      field: json.created_at
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: date_timestamp
      if: ctx.json?.created_at != null
  - remove:
      field: json.created_at
      ignore_missing: true
      tag: remove_json_created_at
  - rename:
      field: json.organization_id
      target_field: organization.id
      ignore_missing: true
      tag: rename_organization_id
  - rename:
      field: json.request_method
      target_field: http.request.method
      ignore_missing: true
      tag: rename_http_request_method
  - rename:
      field: json.request_id
      target_field: http.request.id
      ignore_missing: true
      tag: rename_http_request_id
  - rename:
      field: json.status_code
      target_field: http.response.status_code
      ignore_missing: true
      tag: rename_http_response_status_code
  - rename:
      field: json.url
      target_field: url.original
      ignore_missing: true
      tag: rename_url_original
  - rename:
      field: json.invited_email
      target_field: user.target.email
      ignore_missing: true
      tag: rename_user_target_email_invited
  - rename:
      field: json.deleted_user_email
      target_field: user.target.email
      ignore_missing: true
      tag: rename_user_target_email_deleted
      if: ctx.user?.target?.email == null
  - rename:
      field: json.user_email
      target_field: user.target.email
      ignore_missing: true
      tag: rename_user_target_email_user
      if: ctx.user?.target?.email == null
  - rename:
      field: json.invitee_email
      target_field: user.target.email
      ignore_missing: true
      tag: rename_user_target_email_invitee
      if: ctx.user?.target?.email == null
  - rename:
      field: json.user_id
      target_field: user.target.id
      ignore_missing: true
      tag: rename_user_target_id_user
  - rename:
      field: json.deleted_user_id
      target_field: user.target.id
      ignore_missing: true
      tag: rename_user_target_id_deleted
      if: ctx.user?.target?.id == null
  - rename:
      field: json.requester_user_id
      target_field: user.target.id
      ignore_missing: true
      tag: rename_user_target_id_requester
      if: ctx.user?.target?.id == null
  - rename:
      field: json.principal_id
      target_field: user.target.id
      ignore_missing: true
      tag: rename_user_target_id_principal
      description: >-
        On RBAC role-assignment activities the principal is the user being
        granted or revoked the role; move the ID into `user.target.id`. Only
        applies when the API explicitly says `principal_type` is `user`.
      if: ctx.user?.target?.id == null && ctx.json?.principal_type == 'user'
  - rename:
      field: json.target_id
      target_field: user.target.id
      ignore_missing: true
      tag: rename_user_target_id_target
      description: >-
        On role-assignment activities the target is the user being granted or
        revoked the role; move the ID into `user.target.id`. Only applies when
        `target_type` is `user` so we do not clobber non-user targets.
      if: ctx.user?.target?.id == null && ctx.json?.target_type == 'user'
  - rename:
      field: json.actor
      target_field: anthropic.audit.actor
      ignore_missing: true
      tag: rename_json_actor_to_anthropic_audit_actor
      description: >-
        Move the whole actor sub-object under `anthropic.audit.actor`.
        ECS-mappable members are pulled out of it by subsequent processors.
  - rename:
      field: anthropic.audit.actor.ip_address
      target_field: source.ip
      ignore_missing: true
      tag: rename_actor_ip_to_source_ip
  - rename:
      field: anthropic.audit.actor.user_agent
      target_field: user_agent.original
      ignore_missing: true
      tag: rename_actor_user_agent
  - rename:
      field: anthropic.audit.actor.email_address
      target_field: user.email
      ignore_missing: true
      tag: rename_actor_email_to_user_email
      if: >-
        ctx.anthropic?.audit?.actor?.type == 'user_actor' ||
        ctx.anthropic?.audit?.actor?.type == 'anthropic_actor'
  - rename:
      field: anthropic.audit.actor.user_id
      target_field: user.id
      ignore_missing: true
      tag: rename_actor_user_id_to_user_id
      if: ctx.anthropic?.audit?.actor?.type == 'user_actor'
  - rename:
      field: anthropic.audit.actor.unauthenticated_email_address
      target_field: user.email
      ignore_missing: true
      tag: rename_actor_unauthenticated_email_to_user_email
  - rename:
