      source: |-
        def action = ctx.event.action;
        ctx.event.kind = 'event';

        if (params.exact.containsKey(action)) {
          def m = params.exact[action];
          ctx.event.category = m.category;
          ctx.event.type = m.type;
          if (m.containsKey('outcome')) {
            ctx.event.outcome = m.outcome;
          }
        } else {
          ctx.event.category = [];
          ctx.event.type = ['info'];
          ctx.event.outcome = 'unknown';
        }
  - set:
      field: event.outcome
      value: success
      tag: set_compliance_api_outcome_success
      if: >-
        ctx.event?.action == 'compliance_api_accessed' &&
        ctx.http?.response?.status_code != null &&
        ctx.http.response.status_code >= 200 &&
        ctx.http.response.status_code < 300
  - set:
      field: event.outcome
      value: failure
      tag: set_compliance_api_outcome_failure
      if: >-
        ctx.event?.action == 'compliance_api_accessed' &&
        ctx.http?.response?.status_code != null &&
        ctx.http.response.status_code >= 400 &&
        ctx.http.response.status_code < 500
  - set:
      field: event.outcome
      value: unknown
      tag: set_compliance_api_outcome_unknown
      if: >-
        ctx.event?.action == 'compliance_api_accessed' &&
        ctx.http?.response?.status_code != null &&
        ctx.http.response.status_code >= 500
  - set:
      field: event.outcome
      value: 'success'
      tag: set_org_join_proposal_decided_succcess
      if: ctx.event?.action == 'org_join_proposal_decided' &&
        ctx.anthropic?.audit?.approved == true
  - set:
      field: event.outcome
      value: 'failure'
      tag: set_org_join_proposal_decided_failure
      if: ctx.event?.action == 'org_join_proposal_decided' &&
        ctx.anthropic?.audit?.approved != true
