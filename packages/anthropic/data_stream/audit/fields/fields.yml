- name: anthropic.audit
  type: group
  fields:
    - name: organization_uuid
      type: keyword
      description: Deprecated organization UUID associated with the activity, when present.
    - name: actor
      type: group
      description: Actor that initiated the activity, with non-ECS attributes kept here.
      fields:
        - name: type
          type: keyword
          description: Actor type that indicates which other actor fields are present (for example, `user_actor`, `api_actor`, or `admin_api_key_actor`).
        - name: api_key_id
          type: keyword
          description: API key ID for API actors.
        - name: admin_api_key_id
          type: keyword
          description: Admin API key ID for admin API key actors.
        - name: workos_event_id
          type: keyword
          description: WorkOS event ID for SCIM directory sync actors.
        - name: directory_id
          type: keyword
          description: Directory ID for SCIM directory sync actors.
        - name: idp_connection_type
          type: keyword
          description: IdP connection type for SCIM directory sync actors.
    - name: api_key_id
      type: keyword
      description: API key ID on API-access activity types.
    - name: admin_api_key_id
      type: keyword
      description: Admin API key ID on admin key lifecycle activities.
    - name: scopes
      type: keyword
      description: Scope list on admin API key lifecycle activities.
    - name: request_body
      type: keyword
      description: Request body on API access activities, when present.
    - name: principal_id
      type: keyword
      description: Principal ID on RBAC role assignment activities.
