title: Compliance activity audit logs
type: logs
streams:
  - input: cel
    title: Compliance activity audit logs
    description: Collect compliance activity audit events from the Anthropic Admin and Compliance API.
    template_path: cel.yml.hbs
    vars:
      - name: api_key
        type: password
        title: API Key
        description: Anthropic Admin API Key or Compliance Access Key with the `read:compliance_activities` scope.
        multi: false
        required: true
        show_user: true
        secret: true
      - name: interval
        type: text
        title: Polling Interval
        description: How often to poll for new compliance activities.
        multi: false
        required: true
        show_user: true
        default: 5m
      - name: initial_interval
        type: text
        title: Initial Interval
        description: How far back to collect activities on the first run (for example `24h` or `7d`).
        multi: false
        required: false
        show_user: true
        default: 24h
      - name: url
        type: url
        title: API URL
        description: Base URL of the Anthropic API.
        multi: false
        required: true
        show_user: false
        default: https://api.anthropic.com
      - name: anthropic_version
        type: text
        title: API Version
        description: Value sent in the `anthropic-version` request header.
        multi: false
        required: true
        show_user: false
        default: "2023-06-01"
      - name: proxy_url
        type: url
        title: Proxy URL
        description: URL of the HTTP proxy to use for all Anthropic API calls (for example `http://proxy.example.com:8080`).
        multi: false
        required: false
        show_user: true
      - name: ssl
        type: yaml
        title: SSL Configuration
        description: SSL configuration options. See [SSL](https://www.elastic.co/guide/en/beats/filebeat/current/configuration-ssl.html) for details.
        multi: false
        required: false
        show_user: false
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        description: Duration before declaring an HTTP request to the Anthropic API failed (for example `60s`).
        multi: false
        required: false
        show_user: false
        default: 60s
      - name: batch_size
        type: integer
        title: Batch Size
        description: Number of activities per page (`limit` query parameter). Maximum 5000.
        multi: false
        required: false
        show_user: true
        default: 1000
      - name: activity_types
        type: text
        title: Activity Types
        description: Optional list of activity type values to filter to. Leave empty to collect all activity types.
        multi: true
        required: false
        show_user: true
      - name: actor_ids
        type: text
        title: Actor IDs
        description: Optional list of `user_...` actor IDs to filter to.
        multi: true
        required: false
        show_user: true
      - name: organization_ids
        type: text
        title: Organization IDs
        description: Optional list of `org_...` IDs or organization UUIDs to filter to.
        multi: true
        required: false
        show_user: true
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: true
        default:
          - forwarded
          - anthropic-audit
      - name: preserve_original_event
        type: bool
        title: Preserve Original Event
        description: Preserves a raw copy of the original activity JSON under `event.original`.
        multi: false
        required: true
        show_user: true
        default: false
      - name: enable_request_tracer
        type: bool
        title: Enable Request Tracer
        description: The request tracer logs requests and responses to the agent's local filesystem for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging.
        multi: false
        required: false
        show_user: false
        default: false
      - name: processors
        type: yaml
        title: Processors
        description: Processors to apply to events before ingest pipeline processing.
        multi: false
        required: false
        show_user: false
