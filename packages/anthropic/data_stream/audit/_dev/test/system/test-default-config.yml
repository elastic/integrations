wait_for_data_timeout: 1m
input: cel
service: anthropic-audit
vars:
  url: http://{{Hostname}}:{{Port}}
  anthropic_version: "2023-06-01"
data_stream:
  vars:
    api_key: test-api-key-12345
    interval: 2s
    initial_interval: 24h
    batch_size: 2
    preserve_original_event: false
assert:
  hit_count: 6
