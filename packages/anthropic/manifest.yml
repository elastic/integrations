format_version: "3.4.2"
name: anthropic
title: Anthropic
version: "0.1.0"
source:
  license: "Elastic-2.0"
description: Collect compliance activity audit logs from the Anthropic Admin and Compliance APIs with Elastic Agent.
type: integration
categories:
  - security
  - observability
conditions:
  kibana:
    version: "^8.19.0 || ^9.1.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: anthropic
    title: Anthropic logs
    description: Collect logs from the Anthropic Admin and Compliance APIs.
    inputs:
      - type: cel
        title: Collect logs from the Anthropic APIs
        description: Collect logs from the Anthropic Admin and Compliance APIs via CEL.
owner:
  github: elastic/integration-experience
  type: elastic
