format_version: "3.4.2"
name: anthropic
title: Anthropic
version: "0.1.0"
source:
  license: "Elastic-2.0"
description: Collect compliance activity audit logs from Anthropic with Elastic Agent.
type: integration
categories:
  - security
  - observability
conditions:
  kibana:
    version: "^8.19.0 || ^9.1.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/anthropic-overview1.png
    title: Anthropic Overview Metrics
    size: 600x600
    type: image/png
  - src: /img/anthropic-overview2.png
    title: Anthropic Overview Events
    size: 600x600
    type: image/png
icons:
  - src: /img/anthropic-logo.svg
    title: Anthropic logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: anthropic
    title: Anthropic logs
    description: Collect compliance activity audit logs from Anthropic.
    deployment_modes:
      default:
        enabled: true
      agentless:
        enabled: true
        organization: security
        division: engineering
        team: integration-experience
    inputs:
      - type: cel
        title: Collect Anthropic compliance activity logs
        description: Collect compliance activity audit logs from the Anthropic Compliance API.
owner:
  github: elastic/integration-experience
  type: elastic
