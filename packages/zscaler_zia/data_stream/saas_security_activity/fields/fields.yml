- name: zscaler_zia.saas_security_activity
  type: group
  fields:
    - name: activity
      type: group
      fields:
        - name: count
          type: long
          description: The activity count.
        - name: type
          type: keyword
          description: The type of activity performed by the user.
    - name: application
      type: group
      fields:
        - name: name
          type: keyword
          description: The SaaS application name associated with the activity.
    - name: event_time
      type: date
      description: The event time of the activity.
    - name: external_owner
      type: keyword
      description: The external owner of the SaaS application.
    - name: is_admin
      type: boolean
      description: Indicates whether the user who performed the activity is an administrator.
    - name: object
      type: group
      fields:
        - name: names
          type: keyword
          description: The names or identifiers associated with the primary object type.
        - name: subnames
          type: keyword
          description: The names or identifiers associated with the secondary object type, if applicable.
        - name: subtype
          type: keyword
          description: The second object type associated with the activity, if applicable.
        - name: type
          type: keyword
          description: The object type associated with the activity.
    - name: sourcetype
      type: keyword
      description: NSS feed sourcetype identifier for SaaS Security Activity.
    - name: src_ip
      type: ip
      description: The IP address associated with the activity.
    - name: tenant
      type: keyword
      description: The SaaS application tenant associated with the activity.
    - name: time
      type: date
      description: The time and date of the transaction. This excludes the time zone.
    - name: tz
      type: keyword
      description: The time zone. This is the same as the time zone you specified when you configured the NSS feed.
    - name: user_name
      type: keyword
      description: The user who performed the activity.
    - name: version
      type: keyword
      description: Feed Output Format template version expected by this integration.
