- name: zscaler_zia.saas_security
  type: group
  fields:
    - name: accessibility_flags
      type: keyword
      description: A multivalue flag that provides the accessibility information of the asset.
    - name: application
      type: group
      fields:
        - name: name
          type: keyword
          description: The name of the sanctioned SaaS application.
    - name: bucket
      type: group
      fields:
        - name: id
          type: keyword
          description: The bucket ID.
        - name: name
          type: keyword
          description: The bucket name.
        - name: name_obfuscated
          type: keyword
          description: The obfuscated version of the bucket name.
        - name: owner
          type: keyword
          description: The bucket owner.
        - name: owner_obfuscated
          type: keyword
          description: The obfuscated version of the bucket name.
    - name: collab_count
      type: long
      description: The number of collaborators.
    - name: collab_names
      type: keyword
      description: The names of the collaborators.
    - name: collab_names_obfuscated
      type: keyword
      description: The obfuscated version of the names of the collaborators.
    - name: collaboration
      type: group
      fields:
        - name: channel
          type: group
          fields:
            - name: hostname
              type: keyword
              description: The hostname of the shared channel.
            - name: hostname_obfuscated
              type: keyword
              description: The obfuscated version of the hostname of the shared channel.
            - name: name
              type: keyword
              description: The name of the channel.
            - name: name_obfuscated
              type: keyword
              description: The obfuscated version of the channel name.
        - name: external_recipients
          type: keyword
          description: The names of the external recipient names.
        - name: external_recipients_obfuscated
          type: keyword
          description: The obfuscated version of the external recipient names.
        - name: internal_recipients
          type: keyword
          description: The names of the internal recipients.
        - name: internal_recipients_obfuscated
          type: keyword
          description: The obfuscated version of the internal recipient names.
        - name: sender
          type: keyword
          description: The sender's email.
        - name: sender_obfuscated
          type: keyword
          description: The obfuscated version of the sender's email.
    - name: company
      type: group
      fields:
        - name: id
          type: keyword
          description: The numeric ID given to a company by Zscaler.
        - name: name
          type: keyword
          description: The company name.
    - name: component
      type: keyword
      description: The type of component recorded.
    - name: copilot_accessible
      type: boolean
      description: Indicates whether the asset is accessible by the Microsoft Copilot Readiness Assessment.
    - name: datacenter
      type: group
      fields:
        - name: city
          type: keyword
          description: The city where the data center is located.
        - name: country
          type: keyword
          description: The country where the data center is located.
        - name: name
          type: keyword
          description: The name of the data center.
    - name: department
      type: keyword
      description: The user's department. If authentication is not required and the traffic comes from a location specified in the service, this field displays the name of the gateway location.
    - name: dlp
      type: group
      fields:
        - name: dict_counts
          type: long
          description: 'The number of hits for each of the DLP dictionaries that were matched in the transaction. This displays a string field separated by a vertical line ("|").'
        - name: dict_names
          type: keyword
          description: The Data Loss Prevention (DLP) dictionary names.
        - name: dict_names_obfuscated
          type: keyword
          description: The obfuscated version of the DLP dictionary names.
        - name: engine_names
          type: keyword
          description: The DLP engine names.
        - name: engine_names_obfuscated
          type: keyword
          description: The obfuscated version of the DLP engine names.
        - name: identifier
          type: keyword
          description: The DLP identifier. Whenever a DLP rule is hit, and the appropriate alert is configured, an email containing this ID is sent to your auditors.
    - name: document
      type: group
      fields:
        - name: subtype
          type: keyword
          description: The subtype of the document uploaded or downloaded during the transaction.
        - name: type
          type: keyword
          description: The type of document uploaded or downloaded during the transaction.
    - name: email
      type: group
      fields:
        - name: attachments
          type: group
          fields:
            - name: file_names
              type: keyword
              description: The name of the suspicious file detected by the Data at Rest Scanning policy.
            - name: file_names_obfuscated
              type: keyword
              description: The obfuscated version of the name of the suspicious file detected by the Data at Rest Scanning policy.
            - name: file_sizes
              type: long
              description: The size of the file in bytes.
            - name: file_types
              type: keyword
              description: The component file type.
            - name: md5s
              type: keyword
              description: The component file MD5.
        - name: external_recipients
          type: keyword
          description: The names of external recipients.
        - name: external_recipients_count
          type: long
          description: The number of external recipients.
        - name: external_recipients_obfuscated
          type: keyword
          description: The obfuscated version of the names of external recipients.
        - name: internal_recipients
          type: keyword
          description: The names of internal recipients.
        - name: internal_recipients_count
          type: long
          description: The number of internal recipients.
        - name: internal_recipients_obfuscated
          type: keyword
          description: The obfuscated version of the names of internal recipients.
        - name: is_inbound
          type: boolean
          description: Indicates whether the email was sent or received or not.
        - name: message_size_bytes
          type: long
          description: The size of the message in bytes.
        - name: received_time
          type: date
          description: The time at which the transaction was recorded.
    - name: external_collab_count
      type: long
      description: The number of external collaborators.
    - name: external_collab_groups
      type: keyword
      description: 'The group of collaborators outside your organization with whom the user shares assets. The field can have up to 8 values separated by a vertical line ("|").'
    - name: external_collab_groups_obfuscated
      type: keyword
      description: 'The obfuscated version of the group of collaborators outside your organization with whom the user shares assets. The field can have up to 8 values separated by a vertical line ("|").'
    - name: external_collab_names
      type: keyword
      description: The names of external collaborators.
    - name: external_collab_names_obfuscated
      type: keyword
      description: The obfuscated version of external collaborator names.
    - name: external_user_name
      type: keyword
      description: The username or email address of the external user who performs the transaction.
    - name: file
      type: group
      fields:
        - name: collaboration_scope
          type: keyword
          description: The collaboration scope and permissions for SaaS application tenant files.
        - name: directory
          type: keyword
          description: The source location of the files containing sensitive data that were detected by the Data at Rest Scanning DLP or Malware Detection policy.
        - name: download_time_ms
          type: long
          description: The download time (in milliseconds) of the suspicious file detected by the Data at Rest Scanning policy.
        - name: extension
          type: keyword
          description: The type of file that was either uploaded or downloaded.
        - name: full_url
          type: keyword
          description: The SaaS Security public URL used to access a shared file.
        - name: full_url_obfuscated
          type: keyword
          description: The obfuscated version of the full URL.
        - name: hash
          type: group
          fields:
            - name: md5
              type: keyword
              description: The MD5 hash for the file.
            - name: sha256
              type: keyword
              description: The SHA-256 hash for the file.
        - name: id
          type: keyword
          description: The file ID value in a string format.
        - name: id_obfuscated
          type: keyword
          description: The obfuscated version of the file ID value in a string format.
        - name: last_modified_time
          type: date
          description: The last modification time of the file/message.
        - name: last_share_user
          type: keyword
          description: The user who last shared the file that triggered the DLP violation.
        - name: last_shared_on
          type: date
          description: The date and time when the file was shared.
        - name: name
          type: keyword
          description: The name of the suspicious file detected by the Data at Rest Scanning policy.
        - name: owner
          type: keyword
          description: The file owners (inside or outside your organization) who are not provisioned to Internet & SaaS (ZIA).
        - name: owner_obfuscated
          type: keyword
          description: The obfuscated version of the file owners (inside or outside your organization) who are not provisioned to Internet & SaaS.
        - name: path
          type: keyword
          description: The file path.
        - name: scan_time_ms
          type: long
          description: The amount of time (in milliseconds) the Data at Rest Scanning policy took to scan content within the tenant.
        - name: size
          type: long
          description: The size of the file in bytes.
        - name: sub_url
          type: keyword
          description: The URI portion of the full URL.
        - name: type_category
          type: keyword
          description: The category of the file type.
    - name: genai
      type: group
      fields:
        - name: bot_name
          type: keyword
          description: The name of the bot.
        - name: run_id
          type: keyword
          description: The unique identifier of the run (i.e., when a scan is stopped and started).
        - name: scan_id
          type: keyword
          description: The unique identifier of the scan defined in the Historic Scan Configuration.
        - name: sender_type
          type: keyword
          description: The type of sender (i.e., bot, system, or user).
    - name: hostname
      type: keyword
      description: The hostname of the recorded internal URL.
    - name: hostname_obfuscated
      type: keyword
      description: The obfuscated version of the hostname.
    - name: internal_collab_count
      type: long
      description: The number of internal collaborators.
    - name: internal_collab_groups
      type: keyword
      description: 'The group of collaborators within your organization with whom the user shares assets. The field can have up to 8 values separated by a vertical line ("|").'
    - name: internal_collab_groups_obfuscated
      type: keyword
      description: 'The obfuscated version of the group of collaborators within your organization with whom the user shares assets. The field can have up to 8 values separated by a vertical line ("|").'
    - name: internal_collab_names
      type: keyword
      description: The names of internal collaborators.
    - name: internal_collab_names_obfuscated
      type: keyword
      description: The obfuscated version of the internal collaborator names.
    - name: internal_user_name
      type: keyword
      description: The username or email address of the internal user who performs the transaction. If an internet gateway location is specified and authentication is not required, this field displays the name of the gateway location.
    - name: is_incident
      type: boolean
      description: Indicates whether the transaction was an incident or not.
    - name: label_name
      type: keyword
      description: The type of Microsoft Information Protection (MIP) label applied to the assets.
    - name: message_id
      type: keyword
      description: The message ID assigned by the application.
    - name: message_id_obfuscated
      type: keyword
      description: The obfuscated version of the message ID assigned by the application.
    - name: object
      type: group
      fields:
        - name: name
          type: keyword
          description: The name of the object logged.
        - name: type
          type: keyword
          description: The type of the object logged.
    - name: policy
      type: keyword
      description: The Data at Rest Scanning policy rule action.
    - name: record_id
      type: keyword
      description: The unique record identifier for each log.
    - name: repository
      type: group
      fields:
        - name: name
          type: keyword
          description: The name of the repository.
        - name: project_name
          type: keyword
          description: The name of the project.
    - name: rule
      type: group
      fields:
        - name: label
          type: keyword
          description: The name of the rule that triggered on the session or aggregated sessions.
        - name: label_obfuscated
          type: keyword
          description: The obfuscated name of the rule that triggered on the session or aggregated sessions.
        - name: type
          type: keyword
          description: The type of policy that took action during the transaction.
    - name: severity
      type: keyword
      description: The severity level of the incident detected by the Data at Rest Scanning DLP policy.
    - name: sourcesubtype
      type: keyword
    - name: sourcetype
      type: keyword
    - name: tenant
      type: keyword
      description: The sanctioned SaaS application tenant integrated with the Zscaler service.
    - name: tenant_obfuscated
      type: keyword
      description: The obfuscated version of the SaaS application tenant.
    - name: threat
      type: group
      fields:
        - name: indicator
          type: group
          fields:
            - name: name
              type: keyword
              description: If the service detects a threat in the transaction, it displays the name of the threat.
        - name: malware
          type: keyword
          description: If the service detects a threat in the transaction, it displays the virus or spyware type, if applicable.
        - name: malware_class
          type: keyword
          description: If the service detects a threat in the transaction, it displays the virus and spyware super category, if applicable.
    - name: time
      type: date
      description: The time of the incident in epoch format.
    - name: tz
      type: keyword
      description: The time zone. This is the same as the time zone you specified when you configured the NSS feed.
    - name: user_name
      type: keyword
      description: The username or email address of the user who performs the transaction.
    - name: user_name_obfuscated
      type: keyword
      description: The obfuscated username or email address of the user who performs the transaction.
    - name: version
      type: keyword
