  - script:
      lang: painless
      tag: script_zip_email_attachments_into_ecs
      description: >-
        Combines parallel attachment arrays (file_names, file_sizes, md5s) into ECS email.attachments objects.
      if: ctx.zscaler_zia?.saas_security?.email?.attachments instanceof Map
      source: |-
        def att = ctx.zscaler_zia.saas_security.email.attachments;
        def names = att.file_names instanceof List ? att.file_names : null;
        def sizes = att.file_sizes instanceof List ? att.file_sizes : null;
        def md5s = att.md5s instanceof List ? att.md5s : null;
        int n = 0;
        if (names != null && names.size() > n) n = names.size();
        if (sizes != null && sizes.size() > n) n = sizes.size();
        if (md5s != null && md5s.size() > n) n = md5s.size();
        if (n == 0) return;
        if (ctx.email == null) ctx.email = [:];
        if (ctx.email.attachments == null) ctx.email.attachments = new ArrayList();
        for (int i = 0; i < n; i++) {
          def file = new HashMap();
          if (names != null && i < names.size()) file.put('name', names.get(i));
          if (sizes != null && i < sizes.size()) file.put('size', sizes.get(i));
          if (md5s != null && i < md5s.size()) {
            def hash = new HashMap();
            hash.put('md5', md5s.get(i));
            file.put('hash', hash);
          }
          def item = new HashMap();
          item.put('file', file);
          ctx.email.attachments.add(item);
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

