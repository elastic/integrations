  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        boolean dropScalar(Object v) {
          return v == null || v == '' || v == 'N/A'
            || v == 'None' || v == 'Unknown' || v == 'Unknown Host' || v == 'Unknown URL';
        }
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap((Map) v);
            } else if (v instanceof List) {
              handleList((List) v);
            }
            return dropScalar(v)
              || (v instanceof Map && ((Map) v).size() == 0)
              || (v instanceof List && ((List) v).size() == 0);
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap((Map) v);
            } else if (v instanceof List) {
              handleList((List) v);
            }
            return dropScalar(v)
              || (v instanceof Map && ((Map) v).size() == 0)
              || (v instanceof List && ((List) v).size() == 0);
          });
        }
        handleMap(ctx);
