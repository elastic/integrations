---
description: Pipeline for processing Zscaler ZIA SaaS Security NSS feed logs (Collaboration, CRM, Email, File Sharing, Gen AI, ITSM, Public Cloud Storage, and Repository).
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '8.11.0'

  # parse the event JSON
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: >-
        Renames the original `message` field to `event.original` to store a copy of the original message.
        The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - remove:
      field: json
      tag: remove_json_if_input_type_http_endpoint
      ignore_missing: true
      description: >-
        For the http_endpoint input, Filebeat auto-parses the JSON request body
        into the `json.*` field. Drop it to avoid duplicating fields that the
        pipeline parses again from `event.original` into `zscaler_zia.saas_security`.
      if: ctx.input?.type == 'http_endpoint'
  - json:
      field: event.original
      tag: json_parse_event_original
      target_field: zscaler_zia.saas_security

  - script:
      tag: check_template_version
      lang: painless
      params:
        pkg_version: 3.19.0
        data_stream: saas_security
        expect:
          version: v1
      if: ctx.zscaler_zia?.saas_security != null && ctx._conf?.strict_fields == true
      source: |-
        if (ctx.zscaler_zia.saas_security.version != params.expect.version) {
          ctx.error = ctx.error ?: [:];
          ctx.error.message = ctx.error.message ?: [];
          ctx.error.message.add('template version mismatch: ' + (ctx.zscaler_zia.saas_security.version == null ? 'null' : ctx.zscaler_zia.saas_security.version.toString()) + ' is not expected version (see ' + params.data_stream + ' https://epr.elastic.co/package/zscaler_zia/' + params.pkg_version + '/docs/README.md)');
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # convert values
  - convert:
      field: zscaler_zia.saas_security.record_id
      tag: convert_record_id_to_string
      type: string
      ignore_missing: true
  - convert:
      field: zscaler_zia.saas_security.company.id
      tag: convert_company_id_to_string
      type: string
      ignore_missing: true
  - convert:
      field: zscaler_zia.saas_security.bucket.id
      tag: convert_bucket_id_to_string
      type: string
      ignore_missing: true
  - convert:
      field: zscaler_zia.saas_security.dlp.identifier
      tag: convert_dlp_identifier_to_string
      type: string
      ignore_missing: true
  - convert:
      field: zscaler_zia.saas_security.genai.run_id
      tag: convert_genai_run_id_to_string
      type: string
      ignore_missing: true
  - convert:
      field: zscaler_zia.saas_security.genai.scan_id
      tag: convert_genai_scan_id_to_string
      type: string
      ignore_missing: true
  - convert:
      field: zscaler_zia.saas_security.collab_count
      tag: convert_collab_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.collab_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.email.external_recipients_count
      tag: convert_email_external_recipients_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.email.external_recipients_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.email.internal_recipients_count
      tag: convert_email_internal_recipients_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.email.internal_recipients_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.email.message_size_bytes
      tag: convert_email_message_size_bytes_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.email.message_size_bytes
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.external_collab_count
      tag: convert_external_collab_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.external_collab_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.file.download_time_ms
      tag: convert_file_download_time_ms_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.file.download_time_ms
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.file.scan_time_ms
      tag: convert_file_scan_time_ms_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.file.scan_time_ms
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.file.size
      tag: convert_file_size_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.file.size
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: zscaler_zia.saas_security.internal_collab_count
      tag: convert_internal_collab_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.internal_collab_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: zscaler_zia.saas_security.copilot_accessible
      tag: set_copilot_accessible_to_true
      value: true
      if: ctx.zscaler_zia?.saas_security?.copilot_accessible instanceof String && ctx.zscaler_zia.saas_security.copilot_accessible.toLowerCase() == 'yes'
  - set:
      field: zscaler_zia.saas_security.copilot_accessible
      tag: set_copilot_accessible_to_false
      value: false
      if: ctx.zscaler_zia?.saas_security?.copilot_accessible instanceof String && ctx.zscaler_zia.saas_security.copilot_accessible.toLowerCase() == 'no'
  - set:
      field: zscaler_zia.saas_security.is_incident
      tag: set_is_incident_to_true
      value: true
      if: ctx.zscaler_zia?.saas_security?.is_incident instanceof String && ctx.zscaler_zia.saas_security.is_incident.toLowerCase() == 'yes'
  - set:
      field: zscaler_zia.saas_security.is_incident
      tag: set_is_incident_to_false
      value: false
      if: ctx.zscaler_zia?.saas_security?.is_incident instanceof String && ctx.zscaler_zia.saas_security.is_incident.toLowerCase() == 'no'
  - set:
      field: zscaler_zia.saas_security.email.is_inbound
      tag: set_email_is_inbound_to_true
      value: true
      if: ctx.zscaler_zia?.saas_security?.email?.is_inbound instanceof String && ctx.zscaler_zia.saas_security.email.is_inbound.toLowerCase() == 'yes'
  - set:
      field: zscaler_zia.saas_security.email.is_inbound
      tag: set_email_is_inbound_to_false
      value: false
      if: ctx.zscaler_zia?.saas_security?.email?.is_inbound instanceof String && ctx.zscaler_zia.saas_security.email.is_inbound.toLowerCase() == 'no'
  - remove:
      field: zscaler_zia.saas_security.dlp.dict_counts
      tag: remove_dlp_dict_counts_if_none
      ignore_missing: true
      if: ctx.zscaler_zia?.saas_security?.dlp?.dict_counts != null && ctx.zscaler_zia.saas_security.dlp.dict_counts == "None"
  - script:
      lang: painless
      tag: script_split_pipe_delimited_multi_value_fields
      description: Split NSS pipe-delimited strings into arrays for multi-value fields.
      source: |-
        void splitStr(Map m, String key) {
          if (m == null || key == null) return;
          def v = m.get(key);
          if (!(v instanceof String)) return;
          String s = (String) v;
          if (s.length() == 0) return;
          List out = new ArrayList();
          int from = 0;
          int n = s.length();
          for (int i = 0; i < n; i++) {
            if (s.charAt(i) == (char)'|') {
              out.add(s.substring(from, i));
              from = i + 1;
            }
          }
          out.add(s.substring(from, n));
          m.put(key, out);
        }
        def ss = ctx.zscaler_zia?.saas_security;
        if (ss == null) return;
        splitStr(ss, 'accessibility_flags');
        splitStr(ss, 'collab_names');
        splitStr(ss, 'collab_names_obfuscated');
        splitStr(ss, 'external_collab_groups');
        splitStr(ss, 'external_collab_groups_obfuscated');
        splitStr(ss, 'external_collab_names');
        splitStr(ss, 'external_collab_names_obfuscated');
        splitStr(ss, 'internal_collab_groups');
        splitStr(ss, 'internal_collab_groups_obfuscated');
        splitStr(ss, 'internal_collab_names');
        splitStr(ss, 'internal_collab_names_obfuscated');
        if (ss.dlp instanceof Map) {
          splitStr(ss.dlp, 'dict_counts');
          splitStr(ss.dlp, 'dict_names');
          splitStr(ss.dlp, 'dict_names_obfuscated');
          splitStr(ss.dlp, 'engine_names');
          splitStr(ss.dlp, 'engine_names_obfuscated');
        }
        if (ss.collaboration instanceof Map) {
          splitStr(ss.collaboration, 'external_recipients');
          splitStr(ss.collaboration, 'external_recipients_obfuscated');
          splitStr(ss.collaboration, 'internal_recipients');
          splitStr(ss.collaboration, 'internal_recipients_obfuscated');
        }
        if (ss.email instanceof Map) {
          splitStr(ss.email, 'external_recipients');
          splitStr(ss.email, 'external_recipients_obfuscated');
          splitStr(ss.email, 'internal_recipients');
          splitStr(ss.email, 'internal_recipients_obfuscated');
          if (ss.email.attachments instanceof Map) {
            splitStr(ss.email.attachments, 'file_names');
            splitStr(ss.email.attachments, 'file_names_obfuscated');
            splitStr(ss.email.attachments, 'file_sizes');
            splitStr(ss.email.attachments, 'file_types');
            splitStr(ss.email.attachments, 'md5s');
          }
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: zscaler_zia.saas_security.dlp.dict_counts
      tag: foreach_dlp_dict_counts_convert_to_long
      if: ctx.zscaler_zia?.saas_security?.dlp?.dict_counts instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_dlp_dict_count_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: zscaler_zia.saas_security.email.attachments.file_sizes
      tag: foreach_email_attachments_file_sizes_convert_to_long
      if: ctx.zscaler_zia?.saas_security?.email?.attachments?.file_sizes instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_email_attachment_file_size_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: zscaler_zia.saas_security.time
      tag: date_saas_security_time
      target_field: zscaler_zia.saas_security.time
      formats:
        - UNIX
      timezone: UTC
      if: ctx.zscaler_zia?.saas_security?.time != null && ctx.zscaler_zia.saas_security.time != ''
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: zscaler_zia.saas_security.email.received_time
      tag: date_email_received_time
      target_field: zscaler_zia.saas_security.email.received_time
      formats:
        - UNIX
      timezone: UTC
      if: ctx.zscaler_zia?.saas_security?.email?.received_time != null && ctx.zscaler_zia.saas_security.email.received_time != ''
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.email.received_time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: zscaler_zia.saas_security.file.last_modified_time
      tag: date_file_last_modified_time
      target_field: zscaler_zia.saas_security.file.last_modified_time
      formats:
        - E MMM dd HH:mm:ss yyyy
        - E MMM  d HH:mm:ss yyyy
        - E MMM d HH:mm:ss yyyy
        - yyyy-mm-dd HH:mm:ss
      timezone: '{{{zscaler_zia.saas_security.tz}}}'
      if: ctx.zscaler_zia?.saas_security?.file?.last_modified_time != null && ctx.zscaler_zia.saas_security.file.last_modified_time != ''
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.file.last_modified_time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: zscaler_zia.saas_security.file.last_shared_on
      tag: date_file_last_shared_on
      target_field: zscaler_zia.saas_security.file.last_shared_on
      formats:
        - E MMM dd HH:mm:ss yyyy
        - E MMM  d HH:mm:ss yyyy
        - E MMM d HH:mm:ss yyyy
        - yyyy-mm-dd HH:mm:ss
      timezone: '{{{zscaler_zia.saas_security.tz}}}'
      if: ctx.zscaler_zia?.saas_security?.file?.last_shared_on != null && ctx.zscaler_zia.saas_security.file.last_shared_on != ''
      on_failure:
        - remove:
            field: zscaler_zia.saas_security.file.last_shared_on
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # populate ECS fields

  - set:
      field: '@timestamp'
      tag: set_timestamp_from_saas_security_time
      copy_from: zscaler_zia.saas_security.time
      ignore_empty_value: true

  # event.*
  - set:
      field: event.kind
      tag: set_event_kind_to_event
      value: event
  - set:
      field: event.id
      tag: set_event_id_from_record_id
      copy_from: zscaler_zia.saas_security.record_id
      ignore_empty_value: true
  - set:
      field: event.timezone
      tag: set_event_timezone_from_tz
      copy_from: zscaler_zia.saas_security.tz
      ignore_empty_value: true
  - set:
      field: event.provider
      tag: set_event_provider_to_zscaler
      value: Zscaler
  - append:
      field: event.category
      tag: append_email_into_event_category
      value: email
      allow_duplicates: false
      if: ctx.zscaler_zia?.saas_security?.sourcesubtype == 'email'
  - append:
      field: event.category
      tag: append_file_into_event_category
      value: file
      allow_duplicates: false
      if: ctx.zscaler_zia?.saas_security?.sourcesubtype == 'file' || ctx.zscaler_zia?.saas_security?.sourcesubtype == 'public_cloud_storage' || ctx.zscaler_zia?.saas_security?.sourcesubtype == 'repository'
  - append:
      field: event.category
      tag: append_network_into_event_category_collaboration
      value: network
      allow_duplicates: false
      if: ctx.zscaler_zia?.saas_security?.sourcesubtype == 'collaboration'
  - append:
      field: event.category
      tag: append_intrusion_detection_into_event_category_when_incident
      value: intrusion_detection
      allow_duplicates: false
      if: ctx.zscaler_zia?.saas_security?.is_incident == true
  - append:
      field: event.type
      tag: append_denied_into_event_type_when_incident
      value: denied
      allow_duplicates: false
      if: ctx.zscaler_zia?.saas_security?.is_incident == true
  - append:
      field: event.type
      tag: append_allowed_into_event_type_when_no_incident_collaboration
      value: allowed
      allow_duplicates: false
      if: ctx.zscaler_zia?.saas_security?.is_incident == false && ctx.zscaler_zia?.saas_security?.sourcesubtype == 'collaboration'
  - append:
      field: event.type
      tag: append_info_into_event_type
      value: info
      allow_duplicates: false
  - script:
      lang: painless
      description: Script to set event.severity.
      tag: set_event_severity
      if: ctx.zscaler_zia?.saas_security?.severity instanceof String
      source: |-
        ctx.event = ctx.event ?: [:];
        String severity = ctx.zscaler_zia.saas_security.severity;
        if (severity.equalsIgnoreCase("information")) {
          ctx.event.severity = 21;
        } else if (severity.equalsIgnoreCase("low")) {
          ctx.event.severity = 21;
        } else if (severity.equalsIgnoreCase("medium")) {
          ctx.event.severity = 47;
        } else if (severity.equalsIgnoreCase("high")) {
          ctx.event.severity = 73;
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # destination.*
  - foreach:
      field: zscaler_zia.saas_security.collaboration.external_recipients
      tag: foreach_collaboration_external_recipients_into_destination_user_email
      if: ctx.zscaler_zia?.saas_security?.collaboration?.external_recipients instanceof List
      processor:
        append:
          field: destination.user.email
          tag: append_collaboration_external_recipient_into_destination_user_email
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: zscaler_zia.saas_security.collaboration.internal_recipients
      tag: foreach_collaboration_internal_recipients_into_destination_user_email
      if: ctx.zscaler_zia?.saas_security?.collaboration?.internal_recipients instanceof List
      processor:
        append:
          field: destination.user.email
          tag: append_collaboration_internal_recipient_into_destination_user_email
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: zscaler_zia.saas_security.email.external_recipients
      tag: foreach_email_external_recipients_into_destination_user_email
      if: ctx.zscaler_zia?.saas_security?.email?.external_recipients instanceof List
      processor:
        append:
          field: destination.user.email
          tag: append_email_external_recipient_into_destination_user_email
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: zscaler_zia.saas_security.email.internal_recipients
      tag: foreach_email_internal_recipients_into_destination_user_email
      if: ctx.zscaler_zia?.saas_security?.email?.internal_recipients instanceof List
      processor:
        append:
          field: destination.user.email
          tag: append_email_internal_recipient_into_destination_user_email
          value: '{{{_ingest._value}}}'
          allow_duplicates: false

  # email.*
  - set:
      field: email.message_id
      tag: set_email_message_id_from_message_id
      copy_from: zscaler_zia.saas_security.message_id
      ignore_empty_value: true
      if: ctx.zscaler_zia?.saas_security?.sourcesubtype == 'email'
  - set:
      field: email.delivery_timestamp
      tag: set_email_delivery_timestamp_from_email_received_time
      copy_from: zscaler_zia.saas_security.email.received_time
      ignore_empty_value: true
  - set:
      field: email.direction
      tag: set_email_direction_to_inbound
      value: inbound
      if: ctx.zscaler_zia?.saas_security?.email?.is_inbound == true
  - set:
      field: email.direction
      tag: set_email_direction_to_outbound
      value: outbound
      if: ctx.zscaler_zia?.saas_security?.email?.is_inbound == false
