---
description: Pipeline for processing Alert Finding logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: axonius.alert_finding
  # Fingerprint the full raw payload because the Axonius API does not expose a stable entity ID for alert finding assets; the transform keys on this value for deduplication.
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: axonius.alert_finding.transform_unique_id
      ignore_missing: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: alert
  - convert:
      field: axonius.alert_finding.adapter_list_length
      tag: convert_adapter_list_length_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.alert_finding.adapter_list_length
            ignore_missing: true
            tag: remove_adapter_list_length_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_rename_fields
      lang: painless
      description: Renames all axonius.alert_finding.event.data.* fields to root level (removes event.data prefix). Prefixes conflicting keys with 'data_' to avoid overwriting custom data-stream-root-level fields.
      source: |-
        if (ctx.axonius?.alert_finding?.event?.data instanceof Map) {
          Map eventData = ctx.axonius.alert_finding.event.data;
          for (String key : new ArrayList(eventData.keySet())) {
            if (ctx.axonius.alert_finding.containsKey(key)) {
              ctx.axonius.alert_finding['data_' + key] = eventData[key];
            } else {
              ctx.axonius.alert_finding[key] = eventData[key];
            }
          }
          ctx.axonius.alert_finding.event.remove('data');
        }
  - set:
      field: event.id
      tag: set_event_id_from_alert_finding_alert_config_id
      copy_from: axonius.alert_finding.alert_config_id
      ignore_empty_value: true
  - set:
      field: message
      tag: set_message_from_alert_finding_finding_message
      copy_from: axonius.alert_finding.finding_message
      ignore_empty_value: true
  - date:
      field: axonius.alert_finding.trigger_date
      tag: date_trigger_date
      target_field: axonius.alert_finding.trigger_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.alert_finding?.trigger_date != null && ctx.axonius.alert_finding.trigger_date != ''
      on_failure:
        - remove:
            field: axonius.alert_finding.trigger_date
            ignore_missing: true
            tag: remove_trigger_date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_alert_finding_trigger_date
      copy_from: axonius.alert_finding.trigger_date
      ignore_empty_value: true
  - set:
      field: axonius.alert_finding.friendly_name
      tag: set_friendly_name_from_alert_finding_finding_name
      copy_from: axonius.alert_finding.finding_name
      ignore_empty_value: true
  - remove:
      field:
        - axonius.alert_finding.finding_message
        - axonius.alert_finding.trigger_date
      tag: remove_alert_finding_fields_mapped_to_ecs
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
