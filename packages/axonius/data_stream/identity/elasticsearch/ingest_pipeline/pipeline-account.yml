---
description: Pipeline for processing account logs.
processors:
  - rename: 
      field: axonius.identity.roles
      target_field: axonius.identity.roles_accounts
      ignore_missing: true
  - convert:
      field: axonius.identity.active_users
      tag: convert_active_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.active_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.admin_non_operational_users
      tag: convert_admin_non_operational_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.admin_non_operational_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.admin_operational_active_users
      tag: convert_admin_operational_active_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.admin_operational_active_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.admin_operational_inactive_users
      tag: convert_admin_operational_inactive_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.admin_operational_inactive_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.admin_operational_users
      tag: convert_admin_operational_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.admin_operational_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.admins
      tag: convert_admins_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.admins
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: service.id
      tag: set_service_id_from_identity_application_id
      copy_from: axonius.identity.application_id
      ignore_empty_value: true
  - set:
      field: service.name
      tag: set_service_name_from_identity_application_name
      copy_from: axonius.identity.application_name
      ignore_empty_value: true
  - date:
      field: axonius.identity.created_date
      tag: date_created_date
      target_field: axonius.identity.created_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.identity?.created_date != null && ctx.axonius.identity.created_date != ''
      on_failure:
        - remove:
            field: axonius.identity.created_date
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.created
      tag: set_event_created_from_identity_created_date
      copy_from: axonius.identity.created_date
      ignore_empty_value: true
  - convert:
      field: axonius.identity.deleted_users
      tag: convert_deleted_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.deleted_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.direct_not_sso_users
      tag: convert_direct_not_sso_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.direct_not_sso_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: user.email
      tag: set_user_email_from_identity_email
      copy_from: axonius.identity.email
      ignore_empty_value: true
  - dissect:
      tag: dissect_user_email
      if: ctx.user?.email != null && ctx.user.email.contains('@')
      field: user.email
      pattern: '%{}@%{user.domain}'
  - append:
      field: related.user
      tag: append_identity_email_into_related_user
      value: '{{{axonius.identity.email}}}'
      allow_duplicates: false
      if: ctx.axonius?.identity?.email != null
  - convert:
      field: axonius.identity.external_users
      tag: convert_external_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.external_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.inactive_users
      tag: convert_inactive_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.inactive_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.is_managed_by_direct_app
      tag: convert_is_managed_by_direct_app_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.is_managed_by_direct_app
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.identity.last_enrichment_run
      tag: date_last_enrichment_run
      target_field: axonius.identity.last_enrichment_run
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.identity?.last_enrichment_run != null && ctx.axonius.identity.last_enrichment_run != ''
      on_failure:
        - remove:
            field: axonius.identity.last_enrichment_run
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.managed_non_operational_users
      tag: convert_managed_non_operational_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.managed_non_operational_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.managed_operational_users
      tag: convert_managed_operational_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.managed_operational_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.managed_users
      tag: convert_managed_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.managed_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.managed_users_by_app
      tag: convert_managed_users_by_app_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.managed_users_by_app
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.managed_users_by_sso
      tag: convert_managed_users_by_sso_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.managed_users_by_sso
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.orphaned_users
      tag: convert_orphaned_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.orphaned_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.paid_users
      tag: convert_paid_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.paid_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.suspended_users
      tag: convert_suspended_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.suspended_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.identity.unlinked_users
      tag: convert_unlinked_users_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.unlinked_users
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
