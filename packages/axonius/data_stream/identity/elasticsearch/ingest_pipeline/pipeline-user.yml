---
description: Pipeline for processing user logs.
processors:
  - convert:
      field: axonius.identity.account_disabled
      tag: convert_account_disabled_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.identity.account_disabled
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_process_associated_entities
      lang: painless
      description: >-
        Copies associated_devices fields (device_id, device_model, device_serial) to ECS device.* fields
        with deduplication, normalises device_preferred_mac_address (`:` -> `-`, upper-cased) in place,
        and copies associated_employees.username and associated_groups.display_name to related.user
        with deduplication.
      source: |-
        void appendUnique(Map container, String field, def value) {
          if (value == null) return;
          def current = container[field];
          if (current == null) {
            container[field] = [value];
          } else if (current instanceof List) {
            if (!current.contains(value)) {
              current.add(value);
            }
          } else if (current != value) {
            container[field] = [current, value];
          }
        }
        if (ctx.axonius?.identity?.associated_devices instanceof List) {
          if (ctx.device == null) ctx.device = [:];
          if (ctx.device.model == null) ctx.device.model = [:];
          for (def device : ctx.axonius.identity.associated_devices) {
            if (!(device instanceof Map)) continue;
            if (device.device_id instanceof List) {
              for (def v : device.device_id) {
                if (v != null) appendUnique(ctx.device, 'id', v.toString());
              }
            }
            if (device.device_model instanceof List) {
              for (def v : device.device_model) {
                if (v != null) appendUnique(ctx.device.model, 'name', v.toString());
              }
            }
            if (device.device_serial instanceof List) {
              for (def v : device.device_serial) {
                if (v != null) appendUnique(ctx.device, 'serial_number', v.toString());
              }
            }
            if (device.device_preferred_mac_address instanceof List) {
              for (int i = 0; i < device.device_preferred_mac_address.size(); i++) {
                def mac = device.device_preferred_mac_address[i];
                if (mac != null) {
                  device.device_preferred_mac_address[i] = mac.toString().replace(':', '-').toUpperCase();
                }
              }
            }
          }
        }
        if (ctx.axonius?.identity?.associated_employees instanceof List) {
          if (ctx.related == null) ctx.related = [:];
          for (def emp : ctx.axonius.identity.associated_employees) {
            if (!(emp instanceof Map)) continue;
            if (emp.username instanceof List) {
              for (def v : emp.username) {
                if (v != null) appendUnique(ctx.related, 'user', v.toString());
              }
            }
          }
        }
        if (ctx.axonius?.identity?.associated_groups instanceof List) {
          if (ctx.related == null) ctx.related = [:];
          for (def grp : ctx.axonius.identity.associated_groups) {
            if (!(grp instanceof Map)) continue;
            if (grp.display_name != null) {
              appendUnique(ctx.related, 'user', grp.display_name.toString());
            }
          }
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloud.service.name
      tag: set_cloud_service_name_from_identity_aws_iam_identity_type
      copy_from: axonius.identity.aws_iam_identity_type
      ignore_empty_value: true
  - set:
      field: cloud.account.id
      tag: set_cloud_account_id_from_identity_azure_account_id
      copy_from: axonius.identity.azure_account_id
      ignore_empty_value: true
  - script:
      tag: script_process_breaches_data
      lang: painless
      description: >-
        Processes each axonius.identity.breaches_data element in a single pass: parses added_date,
        breach_date and modified_date with the expected source formats and rewrites them as ISO 8601
        UTC strings (removing the field on parse failure), appends added_date to
        threat.enrichments.indicator.first_seen with deduplication, converts pwn_count to long, and
        coerces the boolean fields, removing values that cannot be converted.
      if: ctx.axonius?.identity?.breaches_data instanceof List
      params:
        boolFields:
          - is_fabricated
          - is_retired
          - is_sensitive
          - is_spam_list
          - is_verified
        dateFields:
          - added_date
          - breach_date
          - modified_date
      source: |-
        String parseDate(String input, def fmts, def outFmt) {
          // Strip "EEE," / "EEE, " day-of-week prefix if present so we don't
          // depend on it being internally consistent (the source data is known
          // to occasionally have a day-of-week that doesn't match the date).
          String stripped = input;
          if (input.length() > 4 && input.indexOf(',') == 3) {
            stripped = input.substring(4).trim();
          }
          for (def fmt : fmts) {
            try {
              return LocalDateTime.parse(stripped, fmt).atZone(ZoneId.of('UTC')).format(outFmt);
            } catch (Exception e1) {
              try {
                return LocalDate.parse(stripped, fmt).atStartOfDay(ZoneId.of('UTC')).format(outFmt);
              } catch (Exception e2) { /* try next */ }
            }
          }
          return null;
        }
        void appendUnique(Map container, String field, def value) {
          if (value == null) return;
          def current = container[field];
          if (current == null) {
            container[field] = [value];
          } else if (current instanceof List) {
            if (!current.contains(value)) {
              current.add(value);
            }
          } else if (current != value) {
            container[field] = [current, value];
          }
        }
        def fmts = [
          DateTimeFormatter.ofPattern("dd MMM yyyy HH:mm:ss 'GMT'", Locale.ENGLISH),
          DateTimeFormatter.ofPattern("yyyy-MM-dd", Locale.ENGLISH)
        ];
        def outFmt = DateTimeFormatter.ofPattern("yyyy-MM-dd'T'HH:mm:ss.SSSXXX");
        for (def item : ctx.axonius.identity.breaches_data) {
          if (!(item instanceof Map)) continue;
          for (def f : params.dateFields) {
            if (item[f] == null || item[f] == '') continue;
            String parsed = parseDate(item[f].toString(), fmts, outFmt);
            if (parsed != null) {
              item[f] = parsed;
            } else {
              item.remove(f);
            }
          }
          if (item.added_date != null) {
            if (ctx.threat == null) ctx.threat = [:];
            if (ctx.threat.enrichments == null) ctx.threat.enrichments = [:];
            if (ctx.threat.enrichments.indicator == null) ctx.threat.enrichments.indicator = [:];
            appendUnique(ctx.threat.enrichments.indicator, 'first_seen', item.added_date.toString());
          }
          if (item.pwn_count != null && !(item.pwn_count instanceof Long || item.pwn_count instanceof Integer)) {
            try {
              item.pwn_count = Long.parseLong(item.pwn_count.toString());
            } catch (NumberFormatException e) {
              item.remove('pwn_count');
            }
          }
          for (def f : params.boolFields) {
            if (!item.containsKey(f) || item[f] == null) continue;
            def v = item[f];
            if (v instanceof Boolean) continue;
            def s = v.toString().toLowerCase();
            if (s == '1' || s == 'true') {
              item[f] = true;
            } else if (s == '' || s == '0' || s == 'false') {
              item[f] = false;
            } else {
              item.remove(f);
            }
          }
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
