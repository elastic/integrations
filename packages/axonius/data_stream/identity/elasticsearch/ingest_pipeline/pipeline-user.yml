  - script:
      tag: script_convert_feature_fields
      lang: painless
      description: Converts feature boolean and long fields, removing values that cannot be converted.
      if: ctx.axonius?.identity?.feature != null
      params:
        boolFields:
          - cn_meeting
          - in_meeting
          - large_meeting
          - webinar
          - zoom_phone
        longFields:
          - meeting_capacity
      source: |-
        def obj = ctx.axonius.identity.feature;
        for (def f : params.boolFields) {
          if (!obj.containsKey(f) || obj[f] == null) {
            continue;
          }
          def v = obj[f];
          if (v instanceof Boolean) {
            continue;
          }
          def s = v.toString().toLowerCase();
          if (s == '1' || s == 'true') {
            obj[f] = true;
          } else if (s == '' || s == '0' || s == 'false') {
            obj[f] = false;
          } else {
            obj.remove(f);
          }
        }
        for (def f : params.longFields) {
          if (!obj.containsKey(f) || obj[f] == null) {
            continue;
          }
          def v = obj[f];
          if (v instanceof Long || v instanceof Integer) {
            continue;
          }
          try {
            obj[f] = Long.parseLong(v.toString());
          } catch (NumberFormatException e) {
            obj.remove(f);
          }
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
