---
description: Pipeline for processing storage logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: axonius.storage
  # Fingerprint the full raw payload because the Axonius API does not expose a stable entity ID for storage assets; the transform keys on this value for deduplication.
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: axonius.storage.transform_unique_id
      ignore_missing: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: event

  - append:
      field: event.category
      value: file
      tag: category_file
  - append:
      field: event.category
      value: host
      tag: category_host
  - append:
      field: event.type
      value: info
      tag: type_info

  - convert:
      field: axonius.storage.adapter_list_length
      tag: convert_adapter_list_length_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.storage.adapter_list_length
            ignore_missing: true
            tag: remove_adapter_list_length_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_rename_fields
      lang: painless
      description: Renames all axonius.storage.event.data.* fields to root level (removes event.data prefix). Prefixes conflicting keys with 'data_' to avoid overwriting custom data-stream-root-level fields.
      source: |-
        if (ctx.axonius?.storage?.event?.data instanceof Map) {
          Map eventData = ctx.axonius.storage.event.data;
          for (String key : new ArrayList(eventData.keySet())) {
            if (ctx.axonius.storage.containsKey(key)) {
              ctx.axonius.storage['data_' + key] = eventData[key];
            } else {
              ctx.axonius.storage[key] = eventData[key];
            }
          }
          ctx.axonius.storage.event.remove('data');
        }
  - date:
      field: axonius.storage.event.accurate_for_datetime
      tag: date_event_accurate_for_datetime
      target_field: axonius.storage.event.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.storage?.event?.accurate_for_datetime != null && ctx.axonius.storage.event.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.storage.event.accurate_for_datetime
            ignore_missing: true
            tag: remove_event_accurate_for_datetime
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_storage_event_accurate_for_datetime
      copy_from: axonius.storage.event.accurate_for_datetime
      ignore_empty_value: true
  - date:
      field: axonius.storage.accurate_for_datetime
      tag: date_accurate_for_datetime
      target_field: axonius.storage.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.storage?.accurate_for_datetime != null && ctx.axonius.storage.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.storage.accurate_for_datetime
            ignore_missing: true
            tag: remove_accurate_for_datetime
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.storage.create_time
      tag: date_create_time
      target_field: axonius.storage.create_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.storage?.create_time != null && ctx.axonius.storage.create_time != ''
      on_failure:
        - remove:
            field: axonius.storage.create_time
            ignore_missing: true
            tag: remove_create_time
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.created
      tag: set_event_created_from_storage_create_time
      copy_from: axonius.storage.create_time
      if: ctx.axonius?.storage?.asset_type == 'disks'
      ignore_empty_value: true
  - date:
      field: axonius.storage.creation_date
      tag: date_creation_date
      target_field: axonius.storage.creation_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.storage?.creation_date != null && ctx.axonius.storage.creation_date != ''
      on_failure:
        - remove:
            field: axonius.storage.creation_date
            ignore_missing: true
            tag: remove_creation_date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.created
      tag: set_event_created_from_storage_creation_date
      copy_from: axonius.storage.creation_date
      if: ctx.axonius?.storage?.asset_type == 'object_storages'
      ignore_empty_value: true
  - date:
      field: axonius.storage.fetch_time
      tag: date_fetch_time
      target_field: axonius.storage.fetch_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.storage?.fetch_time != null && ctx.axonius.storage.fetch_time != ''
      on_failure:
        - remove:
            field: axonius.storage.fetch_time
            ignore_missing: true
            tag: remove_fetch_time
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.storage.first_fetch_time
      tag: date_first_fetch_time
      target_field: axonius.storage.first_fetch_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.storage?.first_fetch_time != null && ctx.axonius.storage.first_fetch_time != ''
      on_failure:
        - remove:
            field: axonius.storage.first_fetch_time
            ignore_missing: true
            tag: remove_first_fetch_time
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.storage.from_last_fetch
      tag: convert_from_last_fetch_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.storage.from_last_fetch
            ignore_missing: true
            tag: remove_from_last_fetch_to_boolean
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.storage.is_fetched_from_adapter
      tag: convert_is_fetched_from_adapter_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.storage.is_fetched_from_adapter
            ignore_missing: true
            tag: remove_is_fetched_from_adapter_to_boolean
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.storage.tenant_number
      tag: foreach_storage_tenant_number
      if: ctx.axonius?.storage?.tenant_number instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_storage_tenant_number_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.storage.not_fetched_count
      tag: convert_not_fetched_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.storage.not_fetched_count
            ignore_missing: true
            tag: remove_not_fetched_count_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.storage.size
      tag: convert_size_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.storage.size
            ignore_missing: true
            tag: remove_size_to_double
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - remove:
      field:
        - axonius.storage.event.accurate_for_datetime
        - axonius.storage.create_time
        - axonius.storage.creation_date
      tag: remove_storage_fields_mapped_to_ecs
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
