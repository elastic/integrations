---
description: Pipeline for processing Incident logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: axonius.incident
  # Fingerprint the full raw payload because the Axonius API does not expose a stable entity ID for incident assets; the transform keys on this value for deduplication.
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: axonius.incident.transform_unique_id
      ignore_missing: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: alert

  - convert:
      field: axonius.incident.adapter_list_length
      tag: convert_adapter_list_length_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.incident.adapter_list_length
            ignore_missing: true
            tag: remove_adapter_list_length_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_rename_fields
      lang: painless
      description: Renames all axonius.incident.event.data.* fields to root level (removes event.data prefix). Prefixes conflicting keys with 'data_' to avoid overwriting custom data-stream-root-level fields.
      source: |-
        if (ctx.axonius?.incident?.event?.data instanceof Map) {
          Map eventData = ctx.axonius.incident.event.data;
          for (String key : new ArrayList(eventData.keySet())) {
            if (ctx.axonius.incident.containsKey(key)) {
              ctx.axonius.incident['data_' + key] = eventData[key];
            } else {
              ctx.axonius.incident[key] = eventData[key];
            }
          }
          ctx.axonius.incident.event.remove('data');
        }
  - date:
      field: axonius.incident.event.accurate_for_datetime
      tag: date_event_accurate_for_datetime
      target_field: axonius.incident.event.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.event?.accurate_for_datetime != null && ctx.axonius.incident.event.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.incident.event.accurate_for_datetime
            ignore_missing: true
            tag: remove_event_accurate_for_datetime
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_incident_event_accurate_for_datetime
      copy_from: axonius.incident.event.accurate_for_datetime
      ignore_empty_value: true
  - date:
      field: axonius.incident.accurate_for_datetime
      tag: date_accurate_for_datetime
      target_field: axonius.incident.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.accurate_for_datetime != null && ctx.axonius.incident.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.incident.accurate_for_datetime
            ignore_missing: true
            tag: remove_accurate_for_datetime
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.provider
      tag: set_event_provider_from_incident_alert_source
      copy_from: axonius.incident.alert_source
      ignore_empty_value: true
  - date:
      field: axonius.incident.alert_state.alert_created_at
      tag: date_alert_state_alert_created_at
      target_field: axonius.incident.alert_state.alert_created_at
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.alert_state?.alert_created_at != null && ctx.axonius.incident.alert_state.alert_created_at != ''
      on_failure:
        - remove:
            field: axonius.incident.alert_state.alert_created_at
            ignore_missing: true
            tag: remove_alert_state_alert_created_at
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.created
      tag: set_event_created_from_incident_alert_state_alert_created_at
      copy_from: axonius.incident.alert_state.alert_created_at
      ignore_empty_value: true
  - date:
      field: axonius.incident.alert_state.alert_high_since
      tag: date_alert_state_alert_high_since
      target_field: axonius.incident.alert_state.alert_high_since
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.alert_state?.alert_high_since != null && ctx.axonius.incident.alert_state.alert_high_since != ''
      on_failure:
        - remove:
            field: axonius.incident.alert_state.alert_high_since
            ignore_missing: true
            tag: remove_alert_state_alert_high_since
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.incident.alert_state.alert_last_seen
      tag: date_alert_state_alert_last_seen
      target_field: axonius.incident.alert_state.alert_last_seen
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.alert_state?.alert_last_seen != null && ctx.axonius.incident.alert_state.alert_last_seen != ''
      on_failure:
        - remove:
            field: axonius.incident.alert_state.alert_last_seen
            ignore_missing: true
            tag: remove_alert_state_alert_last_seen
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.end
      tag: set_event_end_from_incident_alert_state_alert_last_seen
      copy_from: axonius.incident.alert_state.alert_last_seen
      ignore_empty_value: true
  - convert:
      field: axonius.incident.alert_state.alert_orca_score_number
      tag: convert_alert_state_alert_orca_score_number_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.incident.alert_state.alert_orca_score_number
            ignore_missing: true
            tag: remove_alert_state_alert_orca_score_number_to_double
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.incident.alert_state.alert_score
      tag: convert_alert_state_alert_score_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.incident.alert_state.alert_score
            ignore_missing: true
            tag: remove_alert_state_alert_score_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.risk_score
      tag: set_event_risk_score_from_incident_alert_state_alert_score
      copy_from: axonius.incident.alert_state.alert_score
      ignore_empty_value: true
  - date:
      field: axonius.incident.alert_state.alert_status_time
      tag: date_alert_state_alert_status_time
      target_field: axonius.incident.alert_state.alert_status_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.alert_state?.alert_status_time != null && ctx.axonius.incident.alert_state.alert_status_time != ''
      on_failure:
        - remove:
            field: axonius.incident.alert_state.alert_status_time
            ignore_missing: true
            tag: remove_alert_state_alert_status_time
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.incident.asset_distribution_major_version
      tag: convert_asset_distribution_major_version_into_keyword
      type: string
      ignore_missing: true
  - set:
      field: message
      tag: set_message_from_incident_description
      copy_from: axonius.incident.description
      ignore_empty_value: true
  - set:
      field: event.reason
      tag: set_event_reason_from_incident_details
      copy_from: axonius.incident.details
      ignore_empty_value: true
  - date:
      field: axonius.incident.fetch_time
      tag: date_fetch_time
      target_field: axonius.incident.fetch_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.fetch_time != null && ctx.axonius.incident.fetch_time != ''
      on_failure:
        - remove:
            field: axonius.incident.fetch_time
            ignore_missing: true
            tag: remove_fetch_time
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.incident.first_fetch_time
      tag: date_first_fetch_time
      target_field: axonius.incident.first_fetch_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.incident?.first_fetch_time != null && ctx.axonius.incident.first_fetch_time != ''
      on_failure:
        - remove:
            field: axonius.incident.first_fetch_time
            ignore_missing: true
            tag: remove_first_fetch_time
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.incident.from_last_fetch
      tag: convert_from_last_fetch_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.incident.from_last_fetch
            ignore_missing: true
            tag: remove_from_last_fetch_to_boolean
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.incident.is_fetched_from_adapter
      tag: convert_is_fetched_from_adapter_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.incident.is_fetched_from_adapter
            ignore_missing: true
            tag: remove_is_fetched_from_adapter_to_boolean
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.incident.tenant_number
      tag: foreach_incident_tenant_number
      if: ctx.axonius?.incident?.tenant_number instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_incident_tenant_number_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.incident.not_fetched_count
      tag: convert_not_fetched_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.incident.not_fetched_count
            ignore_missing: true
            tag: remove_not_fetched_count_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - remove:
      field:
        - axonius.incident.event.accurate_for_datetime
        - axonius.incident.alert_source
        - axonius.incident.alert_state.alert_created_at
        - axonius.incident.alert_state.alert_last_seen
        - axonius.incident.alert_state.alert_score
        - axonius.incident.description
        - axonius.incident.details
      tag: remove_incident_fields_mapped_to_ecs
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
