---
description: Pipeline for processing business applications logs.
processors:
  - set:
      field: service.type
      tag: set_service_type_from_application_application_type
      copy_from: axonius.application.application_type
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_application_business_owner_into_related_user
      value: '{{{axonius.application.business_owner}}}'
      allow_duplicates: false
      if: ctx.axonius?.application?.business_owner != null
  - convert:
      field: axonius.application.devices_count
      tag: convert_devices_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.application.devices_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.devices_count_link
      tag: foreach_devices_count_link_bracketWeight
      if: ctx.axonius?.application?.devices_count_link instanceof List
      processor:
        convert:
          field: _ingest._value.bracketWeight
          tag: convert_devices_count_link_bracketWeight_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.bracketWeight
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.devices_count_link
      tag: foreach_devices_count_link_compOp
      if: ctx.axonius?.application?.devices_count_link instanceof List
      processor:
        rename:
          field: _ingest._value.compOp
          tag: rename_devices_count_link_compOp
          target_field: _ingest._value.comp_op
          ignore_missing: true
  - foreach:
      field: axonius.application.devices_count_link
      tag: foreach_devices_count_link_leftBracket
      if: ctx.axonius?.application?.devices_count_link instanceof List
      processor:
        convert:
          field: _ingest._value.leftBracket
          tag: convert_devices_count_link_leftBracket_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.leftBracket
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.devices_count_link
      tag: foreach_devices_count_link_logicOp
      if: ctx.axonius?.application?.devices_count_link instanceof List
      processor:
        rename:
          field: _ingest._value.logicOp
          tag: rename_devices_count_link_logicOp
          target_field: _ingest._value.logic_op
          ignore_missing: true
  - foreach:
      field: axonius.application.devices_count_link
      tag: foreach_devices_count_link_not
      if: ctx.axonius?.application?.devices_count_link instanceof List
      processor:
        convert:
          field: _ingest._value.not
          tag: convert_devices_count_link_not_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.not
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.devices_count_link
      tag: foreach_devices_count_link_rightBracket
      if: ctx.axonius?.application?.devices_count_link instanceof List
      processor:
        convert:
          field: _ingest._value.rightBracket
          tag: convert_devices_count_link_rightBracket_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.rightBracket
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.user
      tag: append_application_it_application_owner_into_related_user
      value: '{{{axonius.application.it_application_owner}}}'
      allow_duplicates: false
      if: ctx.axonius?.application?.it_application_owner != null
  - append:
      field: related.user
      tag: append_application_managed_by_into_related_user
      value: '{{{axonius.application.managed_by}}}'
      allow_duplicates: false
      if: ctx.axonius?.application?.managed_by != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
