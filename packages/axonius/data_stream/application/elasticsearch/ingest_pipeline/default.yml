          field: _ingest._value.not
          tag: convert_user_count_link_not_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.not
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.user_count_link
      tag: foreach_user_count_link_rightBracket
      if: ctx.axonius?.application?.user_count_link instanceof List
      processor:
        convert:
          field: _ingest._value.rightBracket
          tag: convert_user_count_link_rightBracket_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.rightBracket
