      on_failure:
        - remove:
            field: axonius.application.tenant_number
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.application.users_amount
      tag: convert_users_amount_to_long
      type: long
      ignore_missing: true
      on_failure:
