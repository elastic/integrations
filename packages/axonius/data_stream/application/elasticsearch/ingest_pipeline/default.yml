      if: >-
        ctx.axonius?.application?.asset_type == 'software'
  - foreach:
      field: axonius.application.configuration_values
      tag: foreach_axonius_application_configuration_values_/
      if: ctx.axonius?.application?.configuration_values instanceof List
      processor:
        remove:
          field:
            - _ingest._value.configuration_value
            - _ingest._value.role.remote_id
          tag: remove_application_configuration_values_mapped_fields
          ignore_missing: true
  - remove:
      field:
        - axonius.application.event.accurate_for_datetime
        - axonius.application.event.action_if_exists
        - axonius.application.created
