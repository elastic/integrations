---
description: Pipeline for processing application logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: axonius.application
  # Fingerprint the full raw payload because the Axonius API does not expose a stable entity ID for application assets; the transform keys on this value for deduplication.
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: axonius.application.transform_unique_id
      ignore_missing: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - append:
      field: event.category
      value: configuration
      tag: category_configuration
  - append:
      field: event.type
      value: info
      tag: type_info

  - script:
      tag: script_rename_fields
      lang: painless
      description:  Renames all axonius.application.* fields to root level (removes event.data prefix). Prefixes conflicting keys with 'data_' to avoid overwriting custom data-stream-root-level fields.
      source: |-
        if (ctx.axonius?.application?.event?.data instanceof Map) {
          Map eventData = ctx.axonius.application.event.data;
          for (String key : new ArrayList(eventData.keySet())) {
            if (ctx.axonius.application.containsKey(key)) {
              ctx.axonius.application['data_' + key] = eventData[key];
            } else {
              ctx.axonius.application[key] = eventData[key];
            }
          }
          ctx.axonius.application.event.remove('data');
        }
  - convert:
      field: axonius.application.adapter_list_length
      tag: convert_adapter_list_length_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.application.adapter_list_length
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.application.event.accurate_for_datetime
      tag: date_event_accurate_for_datetime
      target_field: axonius.application.event.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.application?.event?.accurate_for_datetime != null && ctx.axonius.application.event.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.application.event.accurate_for_datetime
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_application_event_accurate_for_datetime
      copy_from: axonius.application.event.accurate_for_datetime
      ignore_empty_value: true
  - set:
      field: event.action
      tag: set_event_action_from_application_event_action_if_exists
      copy_from: axonius.application.event.action_if_exists
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - date:
      field: axonius.application.accurate_for_datetime
      tag: date_accurate_for_datetime
