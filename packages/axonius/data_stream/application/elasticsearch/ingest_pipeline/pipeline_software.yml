---
description: Pipeline for processing software logs.
processors:
  - date:
      field: axonius.application.approval_status_meta.last_modified
      tag: date_approval_status_meta_last_modified
      target_field: axonius.application.approval_status_meta.last_modified
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.application?.approval_status_meta?.last_modified != null && ctx.axonius.application.approval_status_meta.last_modified != ''
      on_failure:
        - remove:
            field: axonius.application.approval_status_meta.last_modified
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.installed_software
      tag: foreach_installed_software_end_of_life
      if: ctx.axonius?.application?.installed_software instanceof List
      processor:
        date:
          field: _ingest._value.end_of_life
          tag: date_installed_software_end_of_life
          target_field: _ingest._value.end_of_life
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.end_of_life
                ignore_missing: true
  - foreach:
      field: axonius.application.installed_software
      tag: foreach_installed_software_end_of_support
      if: ctx.axonius?.application?.installed_software instanceof List
      processor:
        date:
          field: _ingest._value.end_of_support
          tag: date_installed_software_end_of_support
          target_field: _ingest._value.end_of_support
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.end_of_support
                ignore_missing: true
  - foreach:
      field: axonius.application.installed_software
      tag: foreach_installed_software_has_reached_end_of_life
      if: ctx.axonius?.application?.installed_software instanceof List
      processor:
        convert:
          field: _ingest._value.has_reached_end_of_life
          tag: convert_installed_software_has_reached_end_of_life_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.has_reached_end_of_life
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.installed_software
      tag: foreach_installed_software_has_reached_end_of_support
      if: ctx.axonius?.application?.installed_software instanceof List
      processor:
        convert:
          field: _ingest._value.has_reached_end_of_support
          tag: convert_installed_software_has_reached_end_of_support_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.has_reached_end_of_support
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.application.installed_software
      tag: foreach_installed_software_last_used_date
      if: ctx.axonius?.application?.installed_software instanceof List
      processor:
        date:
          field: _ingest._value.last_used_date
          tag: date_installed_software_last_used_date
          target_field: _ingest._value.last_used_date
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.last_used_date
                ignore_missing: true
  - date:
      field: axonius.application.last_used_date
      tag: date_last_used_date
      target_field: axonius.application.last_used_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.application?.last_used_date != null && ctx.axonius.application.last_used_date != ''
      on_failure:
        - remove:
            field: axonius.application.last_used_date
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
