  - convert:
      field: axonius.exposure.exploitability_score
      tag: convert_exploitability_score_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.exposure.exploitability_score
            ignore_missing: true
            tag: remove_exploitability_score_to_double
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: axonius.exposure.__fields_to_unset__
      tag: rename___fields_to_unset__
      target_field: axonius.exposure.fields_to_unset
      ignore_missing: true
  - date:
      field: axonius.exposure.first_seen
      tag: date_first_seen
      target_field: axonius.exposure.first_seen
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.first_seen != null && ctx.axonius.exposure.first_seen != ''
      on_failure:
        - remove:
            field: axonius.exposure.first_seen
            ignore_missing: true
            tag: remove_first_seen
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.hash
      tag: append_exposure_hash_id_into_related_hash
      value: '{{{axonius.exposure.hash_id}}}'
      allow_duplicates: false
      if: ctx.axonius?.exposure?.hash_id != null
  - convert:
      field: axonius.exposure.impact_score
      tag: convert_impact_score_to_float
      type: float
      ignore_missing: true
      on_failure:
