  - foreach:
      field: axonius.exposure.qualys_agent_vuln
      tag: foreach_qualys_agent_vuln_last_found
      if: ctx.axonius?.exposure?.qualys_agent_vuln instanceof List
      processor:
        date:
          field: _ingest._value.last_found
          tag: date_qualys_agent_vuln_last_found
          target_field: _ingest._value.last_found
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
