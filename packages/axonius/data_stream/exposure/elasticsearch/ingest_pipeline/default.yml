---
description: Pipeline for processing exposure logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.3.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: axonius.exposure
  # Fingerprint the full raw payload because the Axonius API does not expose a stable entity ID for exposure assets; the transform keys on this value for deduplication.
  - fingerprint:
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: axonius.exposure.transform_unique_id
      ignore_missing: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - append:
      field: event.category
      value: vulnerability
      tag: category_vulnerability
  - append:
      field: event.type
      value: info
      tag: type_info
  - script:
      tag: script_rename_fields
      lang: painless
      description: Renames all axonius.exposure.event.data.* fields to root level (removes event.data prefix). Prefixes conflicting keys with 'data_' to avoid overwriting custom data-stream-root-level fields.
      source: |-
        if (ctx.axonius?.exposure?.event?.data instanceof Map) {
          Map eventData = ctx.axonius.exposure.event.data;
          for (String key : new ArrayList(eventData.keySet())) {
            if (ctx.axonius.exposure.containsKey(key)) {
              ctx.axonius.exposure['data_' + key] = eventData[key];
            } else {
              ctx.axonius.exposure[key] = eventData[key];
            }
          }
          ctx.axonius.exposure.event.remove('data');
        }

  - convert:
      field: axonius.exposure.adapter_list_length
      tag: convert_adapter_list_length_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.exposure.adapter_list_length
            ignore_missing: true
            tag: remove_adapter_list_length_to_long
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.exposure.event.accurate_for_datetime
      tag: date_event_accurate_for_datetime
      target_field: axonius.exposure.event.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.event?.accurate_for_datetime != null && ctx.axonius.exposure.event.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.exposure.event.accurate_for_datetime
            ignore_missing: true
            tag: remove_event_accurate_for_datetime
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_exposure_event_accurate_for_datetime
      copy_from: axonius.exposure.event.accurate_for_datetime
      ignore_empty_value: true
  - date:
      field: axonius.exposure.accurate_for_datetime
      tag: date_accurate_for_datetime
      target_field: axonius.exposure.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.accurate_for_datetime != null && ctx.axonius.exposure.accurate_for_datetime != ''
      on_failure:
        - remove:
            field: axonius.exposure.accurate_for_datetime
            ignore_missing: true
            tag: remove_accurate_for_datetime
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.exposure.added
      tag: date_added
      target_field: axonius.exposure.added
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.added != null && ctx.axonius.exposure.added != ''
      on_failure:
        - remove:
            field: axonius.exposure.added
            ignore_missing: true
            tag: remove_added
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.exposure.cisa_date_added
      tag: date_cisa_date_added
      target_field: axonius.exposure.cisa_date_added
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.cisa_date_added != null && ctx.axonius.exposure.cisa_date_added != ''
      on_failure:
        - remove:
            field: axonius.exposure.cisa_date_added
            ignore_missing: true
            tag: remove_cisa_date_added
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.exposure.creation_date
      tag: date_creation_date
      target_field: axonius.exposure.creation_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.creation_date != null && ctx.axonius.exposure.creation_date != ''
      on_failure:
        - remove:
            field: axonius.exposure.creation_date
            ignore_missing: true
            tag: remove_creation_date
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.created
      tag: set_event_created_from_exposure_creation_date
      copy_from: axonius.exposure.creation_date
      ignore_empty_value: true
  - append:
      field: vulnerability.description
      tag: append_vulnerability_description_from_exposure_cve_description
      value: '{{{axonius.exposure.cve_description}}}'
      allow_duplicates: false
      if: ctx.axonius?.exposure?.cve_description != null
  - append:
      field: vulnerability.id
      tag: append_axonius_exposure_cve_id_into_vulnerability_id
      value: '{{{axonius.exposure.cve_id}}}'
      allow_duplicates: false
      if: ctx.axonius?.exposure?.cve_id != null
  - foreach:
      field: axonius.exposure.cve_list
      tag: foreach_cve_list
      if: ctx.axonius?.exposure?.cve_list instanceof List
      processor:
        append:
          field: vulnerability.id
          tag: append_cve_list_into_vulnerability_id
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.exposure.cve_references
      tag: foreach_cve_references_url
      if: ctx.axonius?.exposure?.cve_references instanceof List
      processor:
        append:
          field: vulnerability.reference
          tag: append_cve_references_url_into_vulnerability_reference
          value: '{{{_ingest._value.url}}}'
          allow_duplicates: false
  - set:
      field: vulnerability.severity
      tag: set_vulnerability_severity_from_exposure_cve_severity
      copy_from: axonius.exposure.cve_severity
      ignore_empty_value: true
  - convert:
      field: axonius.exposure.cvss
      tag: convert_cvss_to_float
      type: float
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.exposure.cvss
            ignore_missing: true
            tag: remove_cvss_to_float
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: vulnerability.score.base
      tag: set_vulnerability_score_base_from_exposure_cvss
      copy_from: axonius.exposure.cvss
      ignore_empty_value: true
  - convert:
      field: axonius.exposure.cvss2_score
      tag: convert_cvss2_score_to_double
      type: double
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.exposure.cvss2_score
            ignore_missing: true
            tag: remove_cvss2_score_to_double
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.exposure.cvss2_score_num
      tag: convert_cvss2_score_num_to_double
