      on_failure:
        - remove:
            field: axonius.exposure.used_in_ransomware
            ignore_missing: true
            tag: remove_used_in_ransomware_to_boolean
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.exposure.cve_references
      tag: foreach_axonius_exposure_cve_references
      if: ctx.axonius?.exposure?.cve_references instanceof List
      processor:
        remove:
          field: _ingest._value.url
          tag: remove_cve_references_url
          ignore_missing: true
  - foreach:
      field: axonius.exposure.qualys_agent_vuln
      tag: foreach_axonius_exposure_qualys_agent_vuln
      if: ctx.axonius?.exposure?.qualys_agent_vuln instanceof List
      processor:
        remove:
          field: _ingest._value.qualys_cve_id
          tag: remove_qualys_agent_vuln_qualys_cve_id
          ignore_missing: true
  - pipeline:
      name: '{{ IngestPipeline "pipeline-vulnerability-instance" }}'
      tag: pipeline-vulnerability-instance
      if: >-
        ctx.axonius?.exposure?.asset_type == 'vulnerability_instances'
  - remove:
      field:
        - axonius.exposure.event.accurate_for_datetime
        - axonius.exposure.creation_date
        - axonius.exposure.cve_description
        - axonius.exposure.cve_id
        - axonius.exposure.cve_list
        - axonius.exposure.cve_severity
        - axonius.exposure.cvss
        - axonius.exposure.cvss_version
        - axonius.exposure.desc
        - axonius.exposure.tenable_vuln.cve
        - axonius.exposure.axonius_risk_score
        - axonius.exposure.cisa.desc
        - axonius.exposure.msrc.cve_id
        - axonius.exposure.epss.cve_id
        - axonius.exposure.cisa.cve_id
      tag: remove_exposure_fields_mapped_to_ecs
      ignore_missing: true
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
