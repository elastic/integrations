            field: axonius.exposure.impact_score
            ignore_missing: true
            tag: remove_impact_score_to_float
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.exposure.is_cve
      tag: convert_is_cve_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.exposure.is_cve
            ignore_missing: true
            tag: remove_is_cve_to_boolean
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.exposure.last_fetch
      tag: date_last_fetch
      target_field: axonius.exposure.last_fetch
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.last_fetch != null && ctx.axonius.exposure.last_fetch != ''
      on_failure:
        - remove:
            field: axonius.exposure.last_fetch
            ignore_missing: true
            tag: remove_last_fetch
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.exposure.last_modified_date
      tag: date_last_modified_date
      target_field: axonius.exposure.last_modified_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.exposure?.last_modified_date != null && ctx.axonius.exposure.last_modified_date != ''
      on_failure:
