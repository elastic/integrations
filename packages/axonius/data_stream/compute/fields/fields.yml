          type: keyword
          description: The installation status of software or services on this asset.
        - name: asset_tag
          type: keyword
          description: A custom tag or label assigned to this asset.
        - name: data_asset_type
          type: keyword
          description: The asset type from compute event data, distinguishing from root asset_type.
        - name: device_model
          type: keyword
          description: The model of the compute device.
        - name: enrichment_type
          type: keyword
          description: The enrichment type for this compute asset.
