          fields:
            - name: action
              type: keyword
              description: Recommended action for this vulnerability.
            - name: added
              type: date
              description: Date when this vulnerability was added to CISA list.
            - name: cve_id
              type: keyword
              description: CVE (Common Vulnerabilities and Exposures) identifier.
            - name: desc
              type: keyword
              description: Description of the vulnerability.
            - name: due_date
              type: date
              description: Due date for remediation of this vulnerability.
            - name: notes
              type: keyword
              description: Additional notes about the vulnerability.
            - name: product
              type: keyword
              description: Product affected by this vulnerability.
            - name: used_in_ransomware
              type: boolean
              description: Indicates if this vulnerability is known to be used in ransomware attacks.
            - name: vendor
              type: keyword
              description: Vendor of the affected product.
            - name: vulnerability_name
              type: keyword
              description: Name or title of the vulnerability.
        - name: class_name
