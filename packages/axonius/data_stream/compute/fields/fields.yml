- name: axonius
  type: group
  fields:
    - name: compute
      type: group
      fields:
        - name: adapter_list_length
          type: long
          description: How many adapters contributed to this asset.
        - name: adapters
          type: keyword
          description: List of adapters that created this asset.
        - name: asset_type
          type: keyword
          description: The type of asset.
        - name: accurate_for_datetime
          type: date
          description: Timestamp indicating when this asset information was accurate.
        - name: adapter_properties
          type: keyword
          description: Properties or metadata from the adapter that collected this data.
        - name: agent_versions
          type: group
          description: Group containing agent versions details for this compute asset.
          fields:
            - name: adapter_name
              type: keyword
              description: The name of the adapter.
            - name: agent_version
              type: keyword
              description: The version of the agent.
            - name: agent_version_raw
              type: keyword
              description: The raw version string of the agent.
        - name: all_associated_email_addresses
          type: keyword
          description: All email addresses associated with this asset.
        - name: anti_malware_agent_status
          type: keyword
          description: The status of the anti-malware agent on this asset.
        - name: anti_malware_agent_status_message
          type: keyword
          description: Status message from the anti-malware agent.
        - name: anti_malware_state
          type: keyword
          description: The current state of anti-malware protection.
        - name: appliance_sites
          type: keyword
          description: The appliance sites for this compute asset.
        - name: application_and_account_name
          type: keyword
          description: The application and account name associated with the asset.
        - name: architecture
          type: keyword
          description: The architecture for this compute asset.
        - name: arp_interface
          type: keyword
          description: The ARP (Address Resolution Protocol) interface identifier.
        - name: arp_port
          type: keyword
          description: The port associated with the ARP interface.
        - name: arp_status
          type: keyword
          description: The operational status of the ARP protocol on this interface.
        - name: arp_ttl
          type: long
          description: The Time-To-Live (TTL) value for ARP packets.
        - name: assessed_for_policies
          type: boolean
          description: Indicates whether this asset has been assessed for policies.
        - name: assessed_for_vulnerabilities
          type: boolean
          description: Indicates whether this asset has been assessed for vulnerabilities.
        - name: asset_entity_info
          type: keyword
          description: Information about the asset entity and its properties.
