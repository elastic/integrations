---
description: Pipeline for processing compute image logs.
processors:
  - set:
      field: host.architecture
      tag: set_host_architecture_from_compute_architecture
      copy_from: axonius.compute.architecture
      ignore_empty_value: true
  - set:
      field: cloud.account.id
      tag: set_cloud_account_id_from_compute_aws_organization_id
      copy_from: axonius.compute.aws_organization.id
      ignore_empty_value: true
  - append:
      field: related.user
      tag: append_compute_aws_organization_master_account_email_into_related_user
      value: '{{{axonius.compute.aws_organization.master_account_email}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.aws_organization?.master_account_email != null
  - date:
      field: axonius.compute.create_time
      tag: date_create_time
      target_field: axonius.compute.create_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.compute?.create_time != null && ctx.axonius.compute.create_time != ''
      on_failure:
        - remove:
            field: axonius.compute.create_time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.created
      tag: set_event_created_from_compute_create_time
      copy_from: axonius.compute.create_time
      ignore_empty_value: true
  - set:
      field: message
      tag: set_message_from_compute_description
      copy_from: axonius.compute.description
      ignore_empty_value: true
  - foreach:
      field: axonius.compute.ebs_volumes
      tag: foreach_ebs_volumes_create_time
      if: ctx.axonius?.compute?.ebs_volumes instanceof List
      processor:
        date:
          field: _ingest._value.create_time
          tag: date_ebs_volumes_create_time
          target_field: _ingest._value.create_time
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.create_time
                ignore_missing: true
  - foreach:
      field: axonius.compute.ebs_volumes
      tag: foreach_ebs_volumes_size
      if: ctx.axonius?.compute?.ebs_volumes instanceof List
      processor:
        convert:
          field: _ingest._value.size
          tag: convert_ebs_volumes_size_to_double
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.size
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.compute.encrypted
      tag: convert_encrypted_to_boolean
      target_field: axonius.compute.encrypted
      type: boolean
      ignore_missing: true
      if: ctx.axonius?.compute?.encrypted != ''
      on_failure:
        - remove:
            field: axonius.compute.encrypted
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.compute.size
      tag: convert_size_to_double
      target_field: axonius.compute.size
      type: double
      ignore_missing: true
      if: ctx.axonius?.compute?.size != ''
      on_failure:
        - remove:
            field: axonius.compute.size
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
