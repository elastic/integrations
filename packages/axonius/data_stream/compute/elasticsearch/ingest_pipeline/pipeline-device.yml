                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.firewall_rules
      tag: foreach_firewall_rules_target_subnet_count
      if: ctx.axonius?.compute?.firewall_rules instanceof List
      processor:
        convert:
          field: _ingest._value.target_subnet_count
          tag: convert_firewall_rules_target_subnet_count_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.target_subnet_count
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.firewall_rules
      tag: foreach_firewall_rules_target
      if: ctx.axonius?.compute?.firewall_rules instanceof List
      processor:
        dissect:
          tag: dissect_target_ip
          field: _ingest._value.target
          pattern: '%{_ingest._value.target_ip}/%{_ingest._value.target_subnet_mask}'
          ignore_missing: true
  - foreach:
      field: axonius.compute.firewall_rules
      tag: foreach_firewall_rules_target_ip
      if: ctx.axonius?.compute?.firewall_rules instanceof List
      processor:
        convert:
          field: _ingest._value.target_ip
          tag: convert_firewall_rules_target_to_ip
          type: ip
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.target_ip
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
