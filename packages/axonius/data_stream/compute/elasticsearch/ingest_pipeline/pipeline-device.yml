---
description: Pipeline for processing compute device logs.
processors:
  - set:
      field: event.action
      tag: set_event_action_from_compute_event_action_if_exists
      copy_from: axonius.compute.event.action_if_exists
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - split:
      field: event.action
      tag: split_event_action
      separator: \s+
      ignore_missing: true
      if: ctx.event?.action != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - join:
      field: event.action
      tag: join_event_action
      separator: '-'
      if: ctx.event?.action != null && ctx.event.action != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.all_associated_email_addresses
      tag: foreach_all_associated_email_addresses
      if: ctx.axonius?.compute?.all_associated_email_addresses instanceof List
      processor:
        append:
          field: related.user
          tag: append_all_associated_email_addresses_into_related_user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - convert:
      field: axonius.compute.arp_ttl
      tag: convert_arp_ttl_to_long
      target_field: axonius.compute.arp_ttl
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.compute.arp_ttl
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      if: ctx.axonius?.compute?.arp_ttl != ''
  - convert:
      field: axonius.compute.assessed_for_policies
      tag: convert_assessed_for_policies_to_boolean
      target_field: axonius.compute.assessed_for_policies
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.compute.assessed_for_policies
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      if: ctx.axonius?.compute?.assessed_for_policies != ''
  - convert:
      field: axonius.compute.assessed_for_vulnerabilities
      tag: convert_assessed_for_vulnerabilities_to_boolean
      target_field: axonius.compute.assessed_for_vulnerabilities
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.compute.assessed_for_vulnerabilities
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      if: ctx.axonius?.compute?.assessed_for_vulnerabilities != ''
  - set:
      field: user.email
      tag: set_user_email_from_compute_asset_user_name
      copy_from: axonius.compute.asset_user_name
      ignore_empty_value: true
  - dissect:
      tag: dissect_user_email
      if: ctx.user?.email != null && ctx.user.email.contains('@')
      field: user.email
      pattern: '%{user.name}@%{user.domain}'
  - append:
      field: related.user
      tag: append_compute_asset_user_name_into_related_user
      value: '{{{axonius.compute.asset_user_name}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.asset_user_name != null
  - foreach:
      field: axonius.compute.associated_device_users
      tag: foreach_associated_device_users_is_latest_used_user
      if: ctx.axonius?.compute?.associated_device_users instanceof List
      processor:
        convert:
          field: _ingest._value.is_latest_used_user
          tag: convert_associated_device_users_is_latest_used_user_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.is_latest_used_user
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.associated_device_users
      tag: foreach_associated_device_users_last_used_email
      if: ctx.axonius?.compute?.associated_device_users instanceof List
      processor:
        append:
          field: related.user
          tag: append_associated_device_users_last_used_email_into_related_user
          value: '{{{_ingest._value.last_used_email}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.compute.associated_device_users
      tag: foreach_associated_device_users_last_used_user_manager
      if: ctx.axonius?.compute?.associated_device_users instanceof List
      processor:
        append:
          field: related.user
          tag: append_associated_device_users_last_used_user_manager_into_related_user
          value: '{{{_ingest._value.last_used_user_manager}}}'
          allow_duplicates: false
  - date:
      field: axonius.compute.certificate_expiry_date
      tag: date_certificate_expiry_date
      target_field: axonius.compute.certificate_expiry_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.compute?.certificate_expiry_date != null && ctx.axonius.compute.certificate_expiry_date != ''
      on_failure:
        - remove:
            field: axonius.compute.certificate_expiry_date
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_added
      if: ctx.axonius?.compute?.cisa_vulnerabilities instanceof List
      processor:
        date:
          field: _ingest._value.added
          tag: date_cisa_vulnerabilities_added
          target_field: _ingest._value.added
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.added
                ignore_missing: true
  - foreach:
      field: axonius.compute.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_cve_id
      if: ctx.axonius?.compute?.cisa_vulnerabilities instanceof List
      processor:
        append:
          field: vulnerability.id
          tag: append_cisa_vulnerabilities_cve_id_into_vulnerability_id
          value: '{{{_ingest._value.cve_id}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.compute.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_desc
      if: ctx.axonius?.compute?.cisa_vulnerabilities instanceof List
      processor:
        append:
          field: message
          tag: append_cisa_vulnerabilities_desc_into_message
          value: '{{{_ingest._value.desc}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.compute.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_due_date
      if: ctx.axonius?.compute?.cisa_vulnerabilities instanceof List
      processor:
        date:
          field: _ingest._value.due_date
          tag: date_cisa_vulnerabilities_due_date
          target_field: _ingest._value.due_date
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.due_date
                ignore_missing: true
  - foreach:
      field: axonius.compute.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_notes
      if: ctx.axonius?.compute?.cisa_vulnerabilities instanceof List
      processor:
        append:
          field: vulnerability.description
          tag: append_cisa_vulnerabilities_notes_into_vulnerability_description
          value: '{{{_ingest._value.notes}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.compute.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_used_in_ransomware
      if: ctx.axonius?.compute?.cisa_vulnerabilities instanceof List
      processor:
        convert:
          field: _ingest._value.used_in_ransomware
          tag: convert_cisa_vulnerabilities_used_in_ransomware_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.used_in_ransomware
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloud.account.id
      tag: set_cloud_account_id_from_compute_cloud_provider_account_id
      copy_from: axonius.compute.cloud_provider_account_id
      ignore_empty_value: true
  - foreach:
      field: axonius.compute.cmdb_business_applications
      tag: foreach_cmdb_business_applications_managed_by
      if: ctx.axonius?.compute?.cmdb_business_applications instanceof List
      processor:
        append:
          field: related.user
          tag: append_cmdb_business_applications_managed_by_into_related_user
          value: '{{{_ingest._value.managed_by}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.compute.cmdb_business_applications
      tag: foreach_cmdb_business_applications_u_crown_jewel
      if: ctx.axonius?.compute?.cmdb_business_applications instanceof List
      processor:
        convert:
          field: _ingest._value.u_crown_jewel
          tag: convert_cmdb_business_applications_u_crown_jewel_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.u_crown_jewel
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.common_users
      tag: foreach_common_users
      if: ctx.axonius?.compute?.common_users instanceof List
      processor:
        append:
          field: related.user
          tag: append_common_users_into_related_user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - convert:
      field: axonius.compute.confidence_level
      tag: convert_confidence_level_to_long
      target_field: axonius.compute.confidence_level
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.compute.confidence_level
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      if: ctx.axonius?.compute?.confidence_level != ''
  - foreach:
      field: axonius.compute.cpus
      tag: foreach_cpus_cores
      if: ctx.axonius?.compute?.cpus instanceof List
      processor:
        convert:
          field: _ingest._value.cores
          tag: convert_cpus_cores_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.cores
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.compute.cpus
      tag: foreach_cpus_ghz
      if: ctx.axonius?.compute?.cpus instanceof List
      processor:
        convert:
          field: _ingest._value.ghz
          tag: convert_cpus_ghz_to_double
          type: double
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.ghz
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: device.manufacturer
      tag: set_device_manufacturer_from_compute_device_manufacturer
      copy_from: axonius.compute.device_manufacturer
      ignore_empty_value: true
  - set:
      field: device.model.name
      tag: set_device_model_name_from_compute_device_model
      copy_from: axonius.compute.device_model
      ignore_empty_value: true
  - set:
      field: device.serial_number
      tag: set_device_serial_number_from_compute_device_serial
      copy_from: axonius.compute.device_serial
      ignore_empty_value: true
  - append:
      field: related.hosts
      tag: append_compute_device_serial_into_related_hosts
      value: '{{{axonius.compute.device_serial}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.device_serial != null
  - set:
      field: device.type
      tag: set_device_type_from_compute_device_type
      copy_from: axonius.compute.device_type
      ignore_empty_value: true
  - set:
      field: host.domain
      tag: set_host_domain_from_compute_domain
      copy_from: axonius.compute.domain
      ignore_empty_value: true
  - append:
      field: related.hosts
      tag: append_compute_domain_into_related_hosts
      value: '{{{axonius.compute.domain}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.domain != null
  - set:
      field: host.entity.id
      tag: set_host_entity_id_from_compute_entity_id
      copy_from: axonius.compute.entity_id
      ignore_empty_value: true
  - append:
      field: related.hosts
      tag: append_compute_entity_id_into_related_hosts
      value: '{{{axonius.compute.entity_id}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.entity_id != null
  - append:
      field: related.hosts
      tag: append_compute_epo_host_into_related_hosts
      value: '{{{axonius.compute.epo_host}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.epo_host != null
  - convert:
      field: axonius.compute.external_ip
      tag: convert_external_ip_to_ip
      target_field: axonius.compute.external_ip
      type: ip
      ignore_missing: true
      if: ctx.axonius?.compute?.external_ip != ''
      on_failure:
        - remove:
            field: axonius.compute.external_ip
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.ip
      tag: append_compute_external_ip_into_related_ip
      value: '{{{axonius.compute.external_ip}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.external_ip != null
  - convert:
      field: axonius.compute.external_nat_ip
      tag: convert_external_nat_ip_to_ip
      target_field: axonius.compute.external_nat_ip
      type: ip
      ignore_missing: true
      if: ctx.axonius?.compute?.external_nat_ip != ''
      on_failure:
        - remove:
            field: axonius.compute.external_nat_ip
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.ip
      tag: append_compute_external_nat_ip_into_related_ip
      value: '{{{axonius.compute.external_nat_ip}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.external_nat_ip != null
  - rename:
      field: axonius.compute.__fields_to_unset__
      tag: rename___fields_to_unset__
      target_field: axonius.compute.fields_to_unset
      ignore_missing: true
  - convert:
      field: axonius.compute.firewall_enabled
      tag: convert_firewall_enabled_to_boolean
      target_field: axonius.compute.firewall_enabled
      type: boolean
      ignore_missing: true
      on_failure:
