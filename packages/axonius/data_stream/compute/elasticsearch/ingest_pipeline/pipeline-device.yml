      tag: foreach_firewall_rules_target_ip
      if: ctx.axonius?.compute?.firewall_rules instanceof List
      processor:
        append:
          field: related.ip
          tag: append_firewall_rules_target_into_related_ip
          value: '{{{_ingest._value.target_ip}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.compute.firewall_rules
      tag: foreach_firewall_rules_target_remove
      if: ctx.axonius?.compute?.firewall_rules instanceof List
      processor:
        remove:
          field: _ingest._value.target
          tag: remove_target
          ignore_missing: true
  - date:
      field: axonius.compute.first_seen
      tag: date_first_seen
      target_field: axonius.compute.first_seen
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.compute?.first_seen != null && ctx.axonius.compute.first_seen != ''
      on_failure:
        - remove:
            field: axonius.compute.first_seen
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: host.name
      tag: set_host_name_from_compute_fqdn
      copy_from: axonius.compute.fqdn
      ignore_empty_value: true
  - lowercase:
      field: host.name
      tag: lowercase_host_name
      ignore_missing: true
  - append:
      field: related.hosts
      tag: append_compute_fqdn_into_related_hosts
      value: '{{{axonius.compute.fqdn}}}'
      allow_duplicates: false
      if: ctx.axonius?.compute?.fqdn != null
  - convert:
      field: axonius.compute.free_physical_memory
      tag: convert_free_physical_memory_to_double
