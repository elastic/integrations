      if: ctx.axonius?.compute?.free_physical_memory != ''
  - foreach:
      field: axonius.compute.generic_encryption
      tag: foreach_generic_encryption_status
      if: ctx.axonius?.compute?.generic_encryption instanceof List
      processor:
        convert:
          field: _ingest._value.status
          tag: convert_generic_encryption_status_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.status
