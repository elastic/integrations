      field: device.manufacturer
      tag: set_device_manufacturer_from_network_device_manufacturer
      copy_from: axonius.network.device_manufacturer
      ignore_empty_value: true
  - set:
      field: device.serial_number
      tag: set_device_serial_number_from_network_device_serial
      copy_from: axonius.network.device_serial
      ignore_empty_value: true
  - append:
      field: related.hosts
      tag: append_network_device_serial_into_related_hosts
      value: '{{{axonius.network.device_serial}}}'
      allow_duplicates: false
      if: ctx.axonius?.network?.device_serial != null
  - set:
      field: device.type
      tag: set_device_type_from_network_device_type
      copy_from: axonius.network.device_type
      ignore_empty_value: true
  - set:
      field: host.domain
      tag: set_host_domain_from_network_domain
      copy_from: axonius.network.domain
      ignore_empty_value: true
  - append:
      field: related.hosts
      tag: append_network_epo_host_into_related_hosts
      value: '{{{axonius.network.epo_host}}}'
      allow_duplicates: false
      if: ctx.axonius?.network?.epo_host != null
  - convert:
      field: axonius.network.external_ip
      tag: convert_external_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.axonius?.network?.external_ip != ''
      on_failure:
        - remove:
            field: axonius.network.external_ip
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.ip
      tag: append_network_external_ip_into_related_ip
      value: '{{{axonius.network.external_ip}}}'
      allow_duplicates: false
      if: ctx.axonius?.network?.external_ip != null
  - convert:
      field: axonius.network.external_nat_ip
      tag: convert_external_nat_ip_to_ip
      type: ip
      ignore_missing: true
      if: ctx.axonius?.network?.external_nat_ip != ''
      on_failure:
        - remove:
            field: axonius.network.external_nat_ip
            ignore_missing: true
        - append:
