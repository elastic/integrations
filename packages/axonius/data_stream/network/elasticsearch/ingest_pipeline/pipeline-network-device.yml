---
description: Pipeline for processing network device logs.
processors:
  - append:
      field: event.category
      value: vulnerability
      tag: category_vulnerability
  - rename:
      field: axonius.network.__fields_to_unset__
      tag: rename_network_fields_to_unset
      target_field: axonius.network.fields_to_unset
      ignore_missing: true
  - set:
      field: event.action
      tag: set_event_action_from_network_event_action_if_exists
      copy_from: axonius.network.event.action_if_exists
      ignore_empty_value: true
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - split:
      field: event.action
      tag: split_event_action
      separator: \s+
      ignore_missing: true
      if: ctx.event?.action != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - join:
      field: event.action
      tag: join_event_action
      separator: '-'
      if: ctx.event?.action != null && ctx.event.action != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network._keep_hostname_empty
      tag: convert__keep_hostname_empty_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network._keep_hostname_empty
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: user_agent.version
      tag: set_user_agent_version_from_network_agent_version
      copy_from: axonius.network.agent_version
      ignore_empty_value: true
  - convert:
      field: axonius.network.arp_ttl
      tag: convert_arp_ttl_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.arp_ttl
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.assessed_for_policies
      tag: convert_assessed_for_policies_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.assessed_for_policies
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.assessed_for_vulnerabilities
      tag: convert_assessed_for_vulnerabilities_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.assessed_for_vulnerabilities
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: related.user
      tag: append_network_asset_user_name_into_related_user
      value: '{{{axonius.network.asset_user_name}}}'
      allow_duplicates: false
      if: ctx.axonius?.network?.asset_user_name != null
  - foreach:
      field: axonius.network.associated_device_users
      tag: foreach_associated_device_users_is_latest_used_user
      if: ctx.axonius?.network?.associated_device_users instanceof List
      processor:
        convert:
          field: _ingest._value.is_latest_used_user
          tag: convert_associated_device_users_is_latest_used_user_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.is_latest_used_user
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.associated_device_users
      tag: foreach_associated_device_users_last_used_email
      if: ctx.axonius?.network?.associated_device_users instanceof List
      processor:
        append:
          field: related.user
          tag: append_associated_device_users_last_used_email_into_related_user
          value: '{{{_ingest._value.last_used_email}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.network.associated_device_users
      tag: foreach_associated_device_users_last_used_user_manager
      if: ctx.axonius?.network?.associated_device_users instanceof List
      processor:
        append:
          field: related.user
          tag: append_associated_device_users_last_used_user_manager_into_related_user
          value: '{{{_ingest._value.last_used_user_manager}}}'
          allow_duplicates: false
  - date:
      field: axonius.network.certificate_expiry_date
      tag: date_certificate_expiry_date
      target_field: axonius.network.certificate_expiry_date
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.certificate_expiry_date != null && ctx.axonius.network.certificate_expiry_date != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_added
      if: ctx.axonius?.network?.cisa_vulnerabilities instanceof List
      processor:
        date:
          field: _ingest._value.added
          tag: date_cisa_vulnerabilities_added
          target_field: _ingest._value.added
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.added
                ignore_missing: true
  - foreach:
      field: axonius.network.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_cve_id
      if: ctx.axonius?.network?.cisa_vulnerabilities instanceof List
      processor:
        append:
          field: vulnerability.id
          tag: append_cisa_vulnerabilities_cve_id_into_vulnerability_id
          value: '{{{_ingest._value.cve_id}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.network.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_desc
      if: ctx.axonius?.network?.cisa_vulnerabilities instanceof List
      processor:
        append:
          field: vulnerability.description
          tag: append_cisa_vulnerabilities_desc_into_vulnerability_description
          value: '{{{_ingest._value.desc}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.network.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_due_date
      if: ctx.axonius?.network?.cisa_vulnerabilities instanceof List
      processor:
        date:
          field: _ingest._value.due_date
          tag: date_cisa_vulnerabilities_due_date
          target_field: _ingest._value.due_date
          formats:
            - EEE, dd MMM yyyy HH:mm:ss 'GMT'
            - yyyy-MM-dd
            - EEE,dd MMM yyyy HH:mm:ss 'GMT'
          on_failure:
            - remove:
                field: _ingest._value.due_date
                ignore_missing: true
  - foreach:
      field: axonius.network.cisa_vulnerabilities
      tag: foreach_cisa_vulnerabilities_used_in_ransomware
      if: ctx.axonius?.network?.cisa_vulnerabilities instanceof List
      processor:
        convert:
          field: _ingest._value.used_in_ransomware
          tag: convert_cisa_vulnerabilities_used_in_ransomware_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.used_in_ransomware
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloud.account.id
      tag: set_cloud_account_id_from_network_cloud_provider_account_id
      copy_from: axonius.network.cloud_provider_account_id
      ignore_empty_value: true
  - foreach:
      field: axonius.network.cmdb_business_applications
      tag: foreach_cmdb_business_applications_u_crown_jewel
      if: ctx.axonius?.network?.cmdb_business_applications instanceof List
      processor:
        convert:
          field: _ingest._value.u_crown_jewel
          tag: convert_cmdb_business_applications_u_crown_jewel_to_boolean
