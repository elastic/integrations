  - foreach:
      field: axonius.network.generic_encryption
      tag: foreach_generic_encryption_status
      if: ctx.axonius?.network?.generic_encryption instanceof List
      processor:
        convert:
          field: _ingest._value.status
          tag: convert_generic_encryption_status_to_boolean
          type: boolean
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.status
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.ghost
      tag: convert_ghost_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.ghost
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - append:
      field: host.name
      tag: append_axonius_network_guest_dns_name_into_host_name
      value: '{{{axonius.network.guest_dns_name}}}'
      allow_duplicates: false
