  - set:
      field: host.hostname
      tag: set_host_hostname_from_network_hostname
      copy_from: axonius.network.hostname
      ignore_empty_value: true
  - append:
      field: related.hosts
      tag: append_network_hostname_into_related_hosts
      value: '{{{axonius.network.hostname}}}'
      allow_duplicates: false
