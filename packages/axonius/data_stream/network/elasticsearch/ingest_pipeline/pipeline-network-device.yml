  - foreach:
      field: axonius.network.network_interfaces
      tag: foreach_network_interfaces_ips_v4
      if: ctx.axonius?.network?.network_interfaces instanceof List
      processor:
        gsub:
          field: _ingest._value.mac
          tag: gsub_network_interfaces_mac
          pattern: ':'
          replacement: '-'
          ignore_missing: true
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.network_interfaces
      tag: foreach_network_interfaces_ips_v4
      if: ctx.axonius?.network?.network_interfaces instanceof List
      processor:
        uppercase:
          field: _ingest._value.mac
          tag: uppercase_network_interfaces_mac
          ignore_missing: true
