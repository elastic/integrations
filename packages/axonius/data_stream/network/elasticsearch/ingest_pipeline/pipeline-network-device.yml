  - foreach:
      field: axonius.network.common_users
      tag: foreach_common_users
      if: ctx.axonius?.network?.common_users instanceof List
      processor:
        append:
          field: related.user
          tag: append_common_users_into_related_user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - convert:
      field: axonius.network.confidence_level
      tag: convert_confidence_level_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.confidence_level
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.cpus
      tag: foreach_cpus_cores
      if: ctx.axonius?.network?.cpus instanceof List
      processor:
        convert:
          field: _ingest._value.cores
          tag: convert_cpus_cores_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.cores
                ignore_missing: true
            - append:
