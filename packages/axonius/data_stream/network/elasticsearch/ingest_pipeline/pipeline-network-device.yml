      tag: append_network_zoom_ip_into_related_ip
      value: '{{{axonius.network.zoom_ip}}}'
      allow_duplicates: false
      if: ctx.axonius?.network?.zoom_ip != null
  - set:
      field: vulnerability.enumeration
      tag: set_vulnerability_enumeration_from_network_event_enrichment_type
      copy_from: axonius.network.event.enrichment_type
      ignore_empty_value: true
  - convert:
      field: axonius.network.event.hidden_for_gui
      tag: convert_event_hidden_for_gui_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.event.hidden_for_gui
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.cisa_vulnerabilities
      tag: foreach_axonius_network_cisa_vulnerabilities
      if: ctx.axonius?.network?.cisa_vulnerabilities instanceof List
      processor:
        remove:
          field:
            - _ingest._value.cve_id
            - _ingest._value.desc
          tag: remove_custom_duplicate_fields_from_axonius_network_cisa_vulnerabilities
          ignore_missing: true
          if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
  - foreach:
      field: axonius.network.normalization_reasons
      tag: foreach_axonius_network_normalization_reasons
      if: ctx.axonius?.network?.normalization_reasons instanceof List
      processor:
        remove:
          field: _ingest._value.reason
          tag: remove_custom_duplicate_fields_from_axonius_network_normalization_reasons
          ignore_missing: true
          if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
  - foreach:
      field: axonius.network.plugin_and_severities
      tag: foreach_axonius_network_plugin_and_severities
      if: ctx.axonius?.network?.plugin_and_severities instanceof List
      processor:
        remove:
          field:
            - _ingest._value.cve
            - _ingest._value.severity
          tag: remove_custom_duplicate_fields_from_axonius_network_plugin_and_severities
          ignore_missing: true
          if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
