---
description: Pipeline for processing network asset common logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 9.2.0
  - terminate:
      description: error message set and no data to process.
      tag: terminate_data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null

  # remove agentless metadata
  - remove:
      description: Removes the fields added by Agentless as metadata, as they can collide with ECS fields.
      tag: remove_agentless_tags
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      field:
        - organization
        - division
        - team
      ignore_missing: true

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: axonius.network
  # Fingerprint the full raw payload because the Axonius API does not expose a stable entity ID for network assets; the transform keys on this value for deduplication.
  - fingerprint:
      description: >-
        Hash event.original so each document has axonius.network.transform_unique_id for the latest transform. Required because the API provides no stable per asset identifier.
      fields:
        - event.original
      tag: fingerprint_event_original
      target_field: axonius.network.transform_unique_id
      ignore_missing: true
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - append:
      field: event.category
      value: network
      tag: category_network
  - append:
      field: event.type
      value: info
      tag: type_info
  - convert:
      field: axonius.network.adapter_list_length
      tag: convert_adapter_list_length_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.adapter_list_length
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_rename_event_data_fields
      lang: painless
      description:  Renames all axonius.network.event.data.* fields to root level (removes event.data prefix). Prefixes conflicting keys with 'data_' to avoid overwriting custom data-stream-root-level fields.
      source: |-
        if (ctx.axonius?.network?.event?.data instanceof Map) {
          Map eventData = ctx.axonius.network.event.data;
          for (String key : new ArrayList(eventData.keySet())) {
            if (ctx.axonius.network.containsKey(key)) {
              ctx.axonius.network['data_' + key] = eventData[key];
            } else {
              ctx.axonius.network[key] = eventData[key];
            }
          }
          ctx.axonius.network.event.remove('data');
        }
  - date:
      field: axonius.network.event.accurate_for_datetime
      tag: date_event_accurate_for_datetime
      target_field: axonius.network.event.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.event?.accurate_for_datetime != null && ctx.axonius.network.event.accurate_for_datetime != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_network_event_accurate_for_datetime
      copy_from: axonius.network.event.accurate_for_datetime
      ignore_empty_value: true
  - date:
      field: axonius.network.accurate_for_datetime
      tag: date_event_data_accurate_for_datetime
      target_field: axonius.network.accurate_for_datetime
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.accurate_for_datetime != null && ctx.axonius.network.accurate_for_datetime != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.network.fetch_time
      tag: date_event_data_fetch_time
      target_field: axonius.network.fetch_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.fetch_time != null && ctx.axonius.network.fetch_time != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.network.first_fetch_time
      tag: date_event_data_first_fetch_time
      target_field: axonius.network.first_fetch_time
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.first_fetch_time != null && ctx.axonius.network.first_fetch_time != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.network.first_seen
      tag: date_event_data_first_seen
      target_field: axonius.network.first_seen
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.first_seen != null && ctx.axonius.network.first_seen != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.tenant_number
      tag: foreach_network_tenant_number
      if: ctx.axonius?.network?.tenant_number instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_network_tenant_number_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.from_last_fetch
      tag: convert_event_data_from_last_fetch_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.from_last_fetch
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.is_exposing_public_traffic
      tag: convert_event_data_is_exposing_public_traffic_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.is_exposing_public_traffic
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.is_fetched_from_adapter
      tag: convert_event_data_is_fetched_from_adapter_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.is_fetched_from_adapter
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: axonius.network.last_seen
      tag: date_event_data_last_seen
      target_field: axonius.network.last_seen
      formats:
        - EEE, dd MMM yyyy HH:mm:ss 'GMT'
        - yyyy-MM-dd
        - EEE,dd MMM yyyy HH:mm:ss 'GMT'
      if: ctx.axonius?.network?.last_seen != null && ctx.axonius.network.last_seen != ''
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: axonius.network.not_fetched_count
      tag: convert_event_data_not_fetched_count_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: axonius.network.not_fetched_count
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: network.protocol
      tag: set_network_protocol_from_network_event_data_protocol
      copy_from: axonius.network.protocol
      ignore_empty_value: true
  - lowercase:
      field: network.protocol
      tag: lowercase_network_protocol
      ignore_missing: true
  - foreach:
      field: axonius.network.source_addresses
      tag: foreach_event_data_source_addresses
      if: ctx.axonius?.network?.source_addresses instanceof List
      processor:
        convert:
          field: _ingest._value
          tag: convert_event_data_source_addresses_to_ip
          type: ip
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: axonius.network.source_addresses
      tag: foreach_event_data_source_addresses
      if: ctx.axonius?.network?.source_addresses instanceof List
      processor:
        append:
          field: source.address
          tag: append_event_data_source_addresses_into_source_address
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: axonius.network.source_addresses
      tag: foreach_event_data_source_addresses
      if: ctx.axonius?.network?.source_addresses instanceof List
      processor:
        append:
          field: related.ip
          tag: append_event_data_source_addresses_into_related_ip
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - pipeline:
      name: '{{ IngestPipeline "pipeline-network" }}'
      tag: pipeline_network
      if: >-
        ctx.axonius?.network?.asset_type != null && ctx.axonius.network.asset_type.contains('networks')
  - pipeline:
      name: '{{ IngestPipeline "pipeline-load-balancer" }}'
      tag: pipeline_load_balancer
      if: >-
        ctx.axonius?.network?.asset_type != null && ctx.axonius.network.asset_type.contains('load_balancers')
  - pipeline:
      name: '{{ IngestPipeline "pipeline-network-device" }}'
      tag: pipeline_network_device
      if: >-
        ctx.axonius?.network?.asset_type != null && ctx.axonius.network.asset_type.contains('network_devices')
  - pipeline:
      name: '{{ IngestPipeline "pipeline-firewall" }}'
      tag: pipeline_firewall
      if: >-
        ctx.axonius?.network?.asset_type != null && ctx.axonius.network.asset_type.contains('firewalls')
  - pipeline:
      name: '{{ IngestPipeline "pipeline-nat-rule" }}'
      tag: pipeline_nat_rule
      if: >-
        ctx.axonius?.network?.asset_type != null && ctx.axonius.network.asset_type.contains('nat_rules')
  - pipeline:
      name: '{{ IngestPipeline "pipeline-network-route" }}'
      tag: pipeline_network_route
      if: >-
        ctx.axonius?.network?.asset_type != null && ctx.axonius.network.asset_type.contains('network_routes')
  - remove:
      field:
        - axonius.network.event.accurate_for_datetime
        - axonius.network.protocol
        - axonius.network.destination_port
        - axonius.network.event.action_if_exists
        - axonius.network.agent_version
        - axonius.network.cloud_provider_account_id
        - axonius.network.device_manufacturer
        - axonius.network.device_serial
        - axonius.network.device_type
        - axonius.network.domain
        - axonius.network.fqdn
        - axonius.network.guest_dns_name
        - axonius.network.hostname
        - axonius.network.os.distribution_name
        - axonius.network.os.latest_os_version
        - axonius.network.os.type_distribution
        - axonius.network.creation_time_stamp
        - axonius.network.direction
        - axonius.network.location
      tag: remove_custom_duplicate_fields
      ignore_missing: true
      if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values, empty strings, empty objects, and empty arrays.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            if (v instanceof String) {
              String s = (String) v;
              // Remove empty strings and stringified empty objects/arrays
              return s.isEmpty() || s.equals('{}') || s.equals('[]');
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: |-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
