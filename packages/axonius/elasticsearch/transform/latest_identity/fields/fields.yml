- name: axonius
  type: group
  fields:
    - name: identity
      type: group
      fields:
        - name: adapter_list_length
          type: long
          description: How many adapters contributed to this asset.
        - name: adapters
          type: keyword
          description: List of adapters that created this asset.
        - name: asset_type
          type: keyword
          description: The type of asset.
        - name: account_disabled
          type: boolean
          description: Indicates whether the user account is disabled.
        - name: accurate_for_datetime
          type: date
          description: Timestamp indicating when this asset information was accurate.
        - name: active
          type: keyword
          description: The active status of the identity.
        - name: active_users
          type: long
          description: Number of active users in the account.
        - name: active_users_saved_query_id
          type: keyword
          description: Saved query ID for the active users metric.
        - name: admin_non_operational_users
          type: long
          description: Number of admin users that are non-operational.
        - name: admin_non_operational_users_saved_query_id
          type: keyword
          description: Saved query ID for the admin non-operational users metric.
        - name: admin_operational_active_users
          type: long
          description: Number of admin users that are both operational and active.
        - name: admin_operational_active_users_saved_query_id
          type: keyword
          description: Saved query ID for the admin operational active users metric.
        - name: admin_operational_inactive_users
          type: long
          description: Number of admin users that are operational but inactive.
        - name: admin_operational_inactive_users_saved_query_id
          type: keyword
          description: Saved query ID for the admin operational inactive users metric.
        - name: admin_operational_users
          type: long
          description: Number of admin users that are operational.
        - name: admin_operational_users_saved_query_id
          type: keyword
          description: Saved query ID for the admin operational users metric.
        - name: admin_roles
          type: group
          fields:
            - name: display_name
              type: keyword
              description: Display name of the admin role.
            - name: id
              type: keyword
              description: Unique identifier of the admin role.
        - name: admins
          type: long
          description: Total number of administrators in the account.
        - name: admins_saved_query_id
          type: keyword
          description: Saved query ID for the admins metric.
        - name: alt_names
          type: group
          fields:
            - name: name
              type: keyword
              description: The alternative name value.
            - name: name_type
              type: keyword
              description: The type of alternative name (e.g., DNS, IP).
        - name: application_and_account_name
          type: keyword
          description: The application and account name associated with the asset.
        - name: application_id
          type: keyword
          description: Unique identifier of the application.
        - name: application_name
          type: keyword
          description: Name of the application associated with this identity.
        - name: asset_entity_info
          type: keyword
          description: Information about the asset entity and its properties.
        - name: data_asset_type
          type: keyword
          description: The asset type from identity event data, distinguishing from root asset_type.
        - name: description
          type: text
          description: The description of the asset.
        - name: associated_devices
          type: group
          fields:
            - name: device_associated_saas_apps_names
              type: keyword
              description: Names of SaaS applications associated with the device.
            - name: device_caption
              type: keyword
              description: Caption or display name of the associated device.
            - name: device_id
              type: keyword
              description: Unique identifier of the associated device.
            - name: device_labels
              type: keyword
              description: Labels or tags assigned to the associated device.
            - name: device_model
              type: keyword
              description: Model name of the associated device.
            - name: device_os_distribution
              type: keyword
              description: Operating system distribution of the associated device.
            - name: device_os_edition
              type: keyword
              description: Operating system edition of the associated device.
            - name: device_os_end_of_life
              type: keyword
              description: End-of-life date of the device operating system.
            - name: device_os_type
              type: keyword
              description: Operating system type of the associated device.
            - name: device_os_version
              type: keyword
              description: Operating system version of the associated device.
            - name: device_preferred_mac_address
              type: keyword
              description: Preferred MAC address of the associated device.
            - name: device_serial
              type: keyword
              description: Serial number of the associated device.
            - name: internal_axon_id
              type: keyword
              description: Internal Axonius ID of the associated device.
        - name: associated_employees
          type: group
          fields:
            - name: internal_axon_id
              type: keyword
              description: Internal Axonius ID of the associated employee.
            - name: username
              type: keyword
              description: Username of the associated employee.
        - name: associated_groups
          type: group
          fields:
            - name: display_name
              type: keyword
              description: Display name of the associated group.
            - name: remote_id
              type: keyword
              description: Remote identifier of the associated group.
        - name: associated_licenses
          type: group
          fields:
            - name: adapter_connection_label
              type: keyword
              description: Label of the adapter connection for the license.
            - name: internal_axon_id
              type: keyword
              description: Internal Axonius ID of the license.
            - name: license_name
              type: keyword
              description: Name of the license.
            - name: pricing_unit
              type: keyword
              description: Pricing unit of the license.
            - name: related_vendor_name
              type: keyword
              description: Vendor name associated with the license.
            - name: unit_price
              type: keyword
              description: Unit price of the license.
        - name: aws_arn
          type: keyword
          description: Amazon Web Services ARN (Amazon Resource Name) for this identity.
        - name: aws_iam_identity_type
          type: keyword
          description: AWS IAM identity type (e.g., user, role, group).
        - name: azure_account_id
          type: keyword
          description: Azure account identifier associated with this identity.
        - name: begins_on
          type: date
          description: Start date of the certificate validity period.
        - name: bit_size
          type: long
          description: Key bit size of the certificate.
        - name: breaches_data
          type: group
          fields:
            - name: added_date
              type: date
              description: Date when the breach was added to the database.
            - name: breach_date
              type: date
              description: Date when the breach occurred.
            - name: data_classes
              type: keyword
              description: Types of data exposed in the breach.
            - name: domain
              type: keyword
              description: Domain affected by the breach.
            - name: is_fabricated
              type: boolean
              description: Indicates if the breach data is fabricated.
            - name: is_retired
              type: boolean
              description: Indicates if the breach record has been retired.
            - name: is_sensitive
              type: boolean
              description: Indicates if the breach contains sensitive data.
            - name: is_spam_list
              type: boolean
              description: Indicates if the breach is from a spam list.
            - name: is_verified
              type: boolean
              description: Indicates if the breach has been verified.
            - name: logo_path
              type: keyword
              description: Path to the logo of the breached service.
            - name: modified_date
              type: date
              description: Date when the breach record was last modified.
            - name: name
              type: keyword
              description: Name of the breach.
            - name: pwn_count
              type: long
              description: Number of accounts affected by the breach.
            - name: title
              type: keyword
              description: Title of the breach.
        - name: class_name
          type: keyword
          description: The class name or system classification of this asset.
        - name: cloud_provider
          type: keyword
          description: The cloud provider associated with this identity.
        - name: connected_assets
          type: keyword
          description: Other assets connected to or associated with this identity asset.
        - name: connection_label
          type: keyword
          description: Label of the adapter connection used to collect this identity data.
        - name: created_date
          type: date
          description: Date when this identity record was created.
        - name: deleted_users
          type: long
          description: Number of deleted users in the account.
        - name: deleted_users_saved_query_id
          type: keyword
          description: Saved query ID for the deleted users metric.
        - name: direct_not_sso_users
          type: long
          description: Number of users with direct access who are not using SSO.
        - name: direct_not_sso_users_saved_query_id
          type: keyword
          description: Saved query ID for the direct non-SSO users metric.
        - name: display_name
          type: keyword
          description: Display name of the identity.
        - name: distinct_associated_devices_count
          type: long
          description: Number of distinct devices associated with this identity.
        - name: domains
          type: group
          fields:
            - name: name
              type: keyword
              description: Name of the domain.
        - name: email
          type: keyword
          description: Email address of the identity.
        - name: email_activity
          type: group
          fields:
            - name: is_deleted
              type: boolean
              description: Indicates if the email activity record has been deleted.
            - name: product_license
              type: keyword
              description: Product license associated with email activity.
            - name: read_count
              type: long
              description: Number of emails read during the report period.
            - name: receive_count
              type: long
              description: Number of emails received during the report period.
            - name: report_date
              type: date
              description: Date of the email activity report.
            - name: report_period
              type: long
              description: Reporting period in days for the email activity.
            - name: send_count
              type: long
              description: Number of emails sent during the report period.
        - name: email_notification
          type: group
          fields:
            - name: alternative_host_reminder
              type: boolean
              description: Indicates if alternative host reminder emails are enabled.
            - name: cancel_meeting_reminder
              type: boolean
              description: Indicates if meeting cancellation reminder emails are enabled.
            - name: jbh_reminder
              type: boolean
              description: Indicates if join-before-host reminder emails are enabled.
        - name: employee_id
          type: keyword
          description: Employee identifier assigned to this identity.
        - name: employee_number
          type: keyword
          description: Employee number assigned to this identity.
        - name: employee_type
          type: keyword
          description: Type of employee (e.g., full-time, contractor).
        - name: expires_on
          type: date
          description: Expiration date of the certificate validity period.
        - name: external_users
          type: long
          description: Number of external users in the account.
        - name: external_users_saved_query_id
          type: keyword
          description: Saved query ID for the external users metric.
        - name: feature
          type: group
          fields:
            - name: cn_meeting
              type: boolean
              description: Indicates if China meeting feature is enabled.
            - name: in_meeting
              type: boolean
              description: Indicates if in-meeting feature is enabled.
            - name: large_meeting
              type: boolean
              description: Indicates if large meeting feature is enabled.
            - name: meeting_capacity
              type: long
              description: Maximum meeting capacity for this identity.
            - name: webinar
              type: boolean
              description: Indicates if webinar feature is enabled.
            - name: zoom_phone
              type: boolean
              description: Indicates if Zoom Phone feature is enabled.
        - name: fetch_time
          type: date
          description: The date and time when the identity data was last fetched.
        - name: first_fetch_time
          type: date
          description: The date and time when this identity asset was first fetched.
        - name: first_name
          type: keyword
          description: First name of the identity.
        - name: first_seen
          type: date
          description: The date and time when this identity was first observed.
        - name: from_last_fetch
          type: boolean
          description: Indicates whether this identity asset was modified since the last fetch.
        - name: gce_account_id
          type: keyword
          description: Google Cloud Engine account ID associated with this identity.
        - name: groups
          type: group
          fields:
            - name: display_name
              type: keyword
              description: Display name of the group.
            - name: name
              type: keyword
              description: Name of the group.
            - name: remote_id
              type: keyword
              description: Remote identifier of the group.
        - name: has_administrative_permissions
          type: boolean
          description: Indicates whether this identity has administrative permissions.
        - name: hire_date
          type: date
          description: Date when the employee was hired.
        - name: hr_employment_status
          type: keyword
          description: Human resources employment status of the identity.
        - name: id
          type: keyword
          description: Unique identifier for the identity asset.
        - name: id_raw
          type: keyword
          description: Raw unique identifier for the identity asset.
        - name: in_meeting
          type: group
          fields:
            - name: allow_live_streaming
              type: boolean
              description: Indicates if live streaming is allowed during meetings.
            - name: annotation
              type: boolean
              description: Indicates if annotation is enabled during meetings.
            - name: attendee_on_hold
              type: boolean
              description: Indicates if attendee-on-hold feature is enabled.
            - name: auto_saving_chat
              type: boolean
              description: Indicates if auto-saving chat is enabled.
            - name: breakout_room
              type: boolean
              description: Indicates if breakout rooms are enabled.
            - name: chat
              type: boolean
              description: Indicates if chat is enabled during meetings.
            - name: closed_caption
              type: boolean
              description: Indicates if closed captions are enabled.
            - name: co_host
              type: boolean
              description: Indicates if co-host feature is enabled.
            - name: data_center_regions
              type: keyword
              description: Data center regions configured for meetings.
            - name: e2e_encryption
              type: boolean
              description: Indicates if end-to-end encryption is enabled.
            - name: entry_exit_chime
              type: boolean
              description: Indicates if entry/exit chime is enabled.
            - name: far_end_camera_control
              type: boolean
              description: Indicates if far-end camera control is enabled.
            - name: feedback
              type: boolean
              description: Indicates if feedback feature is enabled.
            - name: group_hd
              type: boolean
              description: Indicates if group HD video is enabled.
            - name: non_verbal_feedback
              type: boolean
              description: Indicates if non-verbal feedback is enabled.
            - name: polling
              type: boolean
              description: Indicates if polling is enabled during meetings.
            - name: private_chat
              type: boolean
              description: Indicates if private chat is enabled during meetings.
            - name: record_play_voice
              type: boolean
              description: Indicates if record and play voice is enabled.
            - name: remote_control
              type: boolean
              description: Indicates if remote control is enabled.
            - name: remote_support
              type: boolean
              description: Indicates if remote support is enabled.
            - name: share_dual_camera
              type: boolean
              description: Indicates if dual camera sharing is enabled.
            - name: show_meeting_control_toolbar
              type: boolean
              description: Indicates if meeting control toolbar is shown.
            - name: virtual_background
              type: boolean
              description: Indicates if virtual background is enabled.
            - name: waiting_room
              type: boolean
              description: Indicates if waiting room is enabled.
            - name: workplace_by_facebook
              type: boolean
              description: Indicates if Workplace by Facebook integration is enabled.
        - name: inactive_users
          type: long
          description: Number of inactive users in the account.
        - name: inactive_users_saved_query_id
          type: keyword
          description: Saved query ID for the inactive users metric.
        - name: internal_is_admin
          type: boolean
          description: Internal flag indicating if this identity has admin privileges.
        - name: is_active
          type: boolean
          description: Indicates whether this identity is currently active.
        - name: is_admin
          type: boolean
          description: Indicates whether this identity has administrator privileges.
        - name: is_built_in
          type: boolean
          description: Indicates whether this is a built-in system account.
        - name: is_delegated_admin
          type: boolean
          description: Indicates whether this identity is a delegated administrator.
        - name: is_fetched_from_adapter
          type: boolean
          description: Indicates whether this identity data was fetched from an adapter.
        - name: is_from_sso_provider
          type: boolean
          description: Indicates whether this identity originates from a Single Sign-On provider.
        - name: is_latest_last_seen
          type: boolean
          description: Indicates if this is the latest recorded last-seen timestamp.
        - name: is_managed_by_application
          type: boolean
          description: Indicates whether this identity is managed by an application.
        - name: is_managed_by_direct_app
          type: boolean
          description: Indicates whether this identity is managed by a direct application.
        - name: is_managed_by_sso
          type: boolean
          description: Indicates whether this identity is managed through SSO.
        - name: is_mfa_enforced
          type: boolean
          description: Indicates whether multi-factor authentication is enforced.
        - name: is_mfa_enrolled
          type: boolean
          description: Indicates whether this identity is enrolled in multi-factor authentication.
        - name: is_non_editable
          type: boolean
          description: Indicates whether this identity record is non-editable.
        - name: is_paid
          type: boolean
          description: Indicates whether this identity has a paid license or account.
        - name: is_permission_adapter
          type: boolean
          description: Indicates whether this identity was collected by a permission adapter.
        - name: is_privileged
          type: boolean
          description: Indicates whether this identity has privileged access.
        - name: is_saas_user
          type: boolean
          description: Indicates whether this identity is a SaaS application user.
        - name: is_user_active
          type: boolean
          description: Indicates whether the user account is active.
        - name: is_user_deleted
          type: boolean
          description: Indicates whether the user account has been deleted.
        - name: is_user_external
          type: boolean
          description: Indicates whether this is an external user.
        - name: is_user_inactive
          type: boolean
          description: Indicates whether the user account is inactive.
        - name: is_user_suspended
          type: boolean
          description: Indicates whether the user account is suspended.
        - name: issuer
          type: group
          fields:
            - name: common_name
              type: keyword
              description: Common name of the certificate issuer.
            - name: country_name
              type: keyword
              description: Country name of the certificate issuer.
            - name: organization
              type: keyword
              description: Organization name of the certificate issuer.
        - name: last_client_version
          type: keyword
          description: Version of the last client used by this identity.
        - name: last_enrichment_run
          type: date
          description: Date of the last enrichment run for this identity.
        - name: last_fetch_connection_id
          type: keyword
          description: The connection ID of the adapter that last fetched this data.
        - name: last_fetch_connection_label
          type: keyword
          description: The label of the connection that last fetched this identity data.
        - name: last_login_attempt
          type: date
          description: Date and time of the last login attempt.
        - name: last_logon
          type: date
          description: Date and time of the last successful logon.
        - name: last_name
          type: keyword
          description: Last name of the identity.
        - name: last_password_change
          type: date
          description: Date and time when the password was last changed.
        - name: last_seen
          type: date
          description: The date and time when this identity was last observed.
        - name: mail
          type: keyword
          description: Email address (mail attribute) of the identity.
        - name: managed_non_operational_users
          type: long
          description: Number of managed users that are non-operational.
        - name: managed_non_operational_users_saved_query_id
          type: keyword
          description: Saved query ID for the managed non-operational users metric.
        - name: managed_operational_users
          type: long
          description: Number of managed users that are operational.
        - name: managed_operational_users_saved_query_id
          type: keyword
          description: Saved query ID for the managed operational users metric.
        - name: managed_users
          type: long
          description: Total number of managed users in the account.
        - name: managed_users_by_app
          type: long
          description: Number of users managed by a direct application.
        - name: managed_users_by_app_saved_query_id
          type: keyword
          description: Saved query ID for the managed-by-app users metric.
        - name: managed_users_by_sso
          type: long
          description: Number of users managed through SSO.
        - name: managed_users_by_sso_saved_query_id
          type: keyword
          description: Saved query ID for the managed-by-SSO users metric.
        - name: managed_users_saved_query_id
          type: keyword
          description: Saved query ID for the managed users metric.
        - name: manager_id
          type: keyword
          description: Identifier of the manager of this identity.
        - name: max_added_date
          type: date
          description: Most recent date a breach was added across all breaches for this identity.
        - name: max_breach_date
          type: date
          description: Most recent breach date across all breaches for this identity.
        - name: max_modified_date
          type: date
          description: Most recent modified date across all breaches for this identity.
        - name: name
          type: keyword
          description: The name or identifier of the identity asset.
        - name: nested_applications
          type: group
          fields:
            - name: active_from_direct_adapter
              type: boolean
              description: Indicates if active status is from a direct adapter.
            - name: app_accounts
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Name of the application account.
            - name: app_display_name
              type: keyword
              description: Display name of the application.
            - name: app_links
              type: keyword
              description: Links or URLs associated with the application.
            - name: assignment_type
              type: keyword
              description: How the application was assigned (e.g., direct, group).
            - name: extension_type
              type: keyword
              description: Type of extension for the application.
            - name: has_administrative_permissions
              type: boolean
              description: Indicates if the identity has admin permissions in this application.
            - name: is_deleted
              type: boolean
              description: Indicates if the application assignment has been deleted.
            - name: is_from_direct_adapter
              type: boolean
              description: Indicates if the data is from a direct adapter.
            - name: is_managed
              type: boolean
              description: Indicates if the application is managed.
            - name: is_suspended
              type: boolean
              description: Indicates if the application access is suspended.
            - name: is_unmanaged_extension
              type: boolean
              description: Indicates if this is an unmanaged browser extension.
            - name: is_user_external
              type: boolean
              description: Indicates if the user is external in this application.
            - name: is_user_paid
              type: boolean
              description: Indicates if the user has a paid license in this application.
            - name: last_access
              type: date
              description: Date and time of the last access to the application.
            - name: last_access_count
              type: long
              description: Total number of accesses to the application.
            - name: last_access_count_60_days
              type: long
              description: Number of accesses to the application in the last 60 days.
            - name: last_access_count_90_days
              type: long
              description: Number of accesses to the application in the last 90 days.
            - name: name
              type: keyword
              description: Name of the application.
            - name: parents
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Name of the parent entity.
                - name: value
                  type: keyword
                  description: Value or identifier of the parent entity.
            - name: permissions
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Name of the permission.
            - name: relation_direct_name
              type: keyword
              description: Name of the direct relationship to the application.
            - name: relation_discovery_name
              type: keyword
              description: Name of the discovered relationship to the application.
            - name: relation_extension_name
              type: keyword
              description: Name of the extension-based relationship to the application.
            - name: relation_sso_name
              type: keyword
              description: Name of the SSO-based relationship to the application.
            - name: source_application
              type: keyword
              description: Source application that provided this data.
            - name: value
              type: keyword
              description: Value or identifier of the application.
            - name: vendor_category
              type: keyword
              description: Vendor category of the application.
        - name: nested_associated_devices
          type: keyword
          description: Flattened list of nested associated device identifiers.
        - name: nested_grants_last_updated
          type: date
          description: Date when nested grants were last updated.
        - name: nested_grants_managers_last_updated
          type: date
          description: Date when nested grants managers were last updated.
        - name: nested_groups
          type: group
          fields:
            - name: assignment_type
              type: keyword
              description: How the group was assigned (e.g., direct, inherited).
            - name: group_name
              type: keyword
              description: Name of the group.
            - name: name
              type: keyword
              description: Display name of the group entry.
            - name: parents
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Name of the parent entity.
                - name: parent_type
                  type: keyword
                  description: Type of the parent entity.
                - name: value
                  type: keyword
                  description: Value or identifier of the parent entity.
            - name: value
              type: keyword
              description: Value or identifier of the group.
        - name: nested_managers
          type: group
          fields:
            - name: assignment_type
              type: keyword
              description: How the manager was assigned.
            - name: parents
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Name of the parent entity.
                - name: parent_type
                  type: keyword
                  description: Type of the parent entity.
                - name: value
                  type: keyword
                  description: Value or identifier of the parent entity.
            - name: value
              type: keyword
              description: Value or identifier of the manager.
        - name: nested_permissions
          type: group
          fields:
            - name: has_administrative_permissions
              type: boolean
              description: Indicates if the identity has administrative permissions.
            - name: is_admin
              type: boolean
              description: Indicates if the identity has admin privileges.
            - name: assignment_type
              type: keyword
              description: How the permission was assigned (e.g., direct, inherited).
            - name: parents
              type: group
              fields:
                - name: name
                  type: keyword
                  description: Name of the parent entity.
                - name: parent_type
                  type: keyword
                  description: Type of the parent entity.
                - name: value
                  type: keyword
                  description: Value or identifier of the parent entity.
            - name: value
              type: keyword
              description: Value or identifier of the permission.
        - name: nested_resources
          type: group
          fields:
            - name: assignment_type
