- name: axonius
  type: group
  fields:
    - name: ticket
      type: group
      fields:
        - name: adapter_list_length
          type: long
          description: How many adapters contributed to this asset.
        - name: adapters
          type: keyword
          description: List of adapters that created this asset.
        - name: asset_type
          type: keyword
          description: The type of asset.
        - name: accurate_for_datetime
          type: date
          description: Timestamp indicating when this asset information was accurate.
        - name: application_and_account_name
          type: keyword
          description: The application and account name associated with the ticket.
        - name: category
          type: keyword
          description: The category or classification of the ticket.
        - name: closed
          type: date
          description: The date and time when the ticket was closed.
        - name: created
          type: date
          description: The date and time when the ticket was created.
        - name: data_accurate_for_datetime
          type: date
          description: Timestamp indicating when the ticket data was last accurate.
        - name: data_type
          type: keyword
          description: The type of data contained in the ticket.
        - name: description
          type: text
          description: Detailed description or body content of the ticket.
        - name: display_id
          type: keyword
          description: Human readable identifier for the ticket displayed to users.
        - name: fetch_time
          type: date
          description: The date and time when the ticket data was last fetched.
        - name: first_fetch_time
          type: date
          description: The date and time when the ticket was first fetched.
        - name: from_last_fetch
          type: boolean
          description: Indicates whether this ticket was modified since the last fetch.
        - name: id
          type: keyword
          description: Unique identifier for the ticket.
        - name: is_fetched_from_adapter
          type: boolean
          description: Indicates whether this ticket was fetched from an adapter.
        - name: last_fetch_connection_id
          type: keyword
          description: The connection ID of the adapter that last fetched this ticket.
        - name: last_fetch_connection_label
          type: keyword
          description: The label of the connection that last fetched this ticket.
        - name: not_fetched_count
          type: long
          description: The number of times this ticket failed to be fetched.
        - name: priority
          type: keyword
          description: The priority level of the ticket.
        - name: reporter
          type: keyword
          description: The user or entity that reported the ticket.
        - name: source_application
          type: keyword
          description: The application system where the ticket originated.
        - name: status
          type: keyword
          description: The current status of the ticket.
        - name: summary
          type: text
          description: Brief summary or title of the ticket.
        - name: sys_class_name
          type: keyword
          description: The system class name or type of the ticket in the source system.
        - name: tenant_number
          type: long
          description: The tenant or organization number associated with the ticket.
        - name: ticket_id
          type: keyword
          description: The unique identifier of the ticket in the source system.
        - name: type
          type: keyword
          description: The type or category of the ticket entity.
        - name: updated
          type: date
          description: The date and time when the ticket was last updated.
        - name: event
          type: group
          fields:
            - name: accurate_for_datetime
              type: date
              description: Timestamp indicating when the event data was accurate.
            - name: adapter_categories
              type: keyword
              description: List of adapter categories that this event belongs to.
            - name: client_used
              type: keyword
              description: The client identifier that was used to process the event.
            - name: initial_plugin_unique_name
              type: keyword
              description: The initial plugin name that created or processed the event.
            - name: plugin_name
              type: keyword
              description: The name of the plugin that processed the event.
            - name: plugin_type
              type: keyword
              description: The type or category of the plugin that processed the event.
            - name: plugin_unique_name
              type: keyword
              description: The unique identifier of the plugin instance that processed the event.
            - name: quick_id
              type: keyword
              description: A quick reference identifier combining plugin and entity information.
            - name: type
              type: keyword
              description: The type or classification of the event data.
        - name: internal_axon_id
          type: keyword
          description: Internal ID of this asset. This ID may change in the future.
        - name: transform_unique_id
          type: keyword
          description: Unique identifier for this asset in the transformation process.
