---
description: Pipeline for processing user dataset.
processors:
  - append:
      field: event.category
      tag: append_event_category_iam
      value: iam
  - append:
      field: event.type
      tag: append_event_type_user_info
      value:
        - user
        - info
  - set:
      field: asset.category
      tag: set_asset_category
      value: entity
  - set:
      field: asset.type
      tag: set_asset_type
      value: microsoft_entra_id_user
  - rename:
      field: azure_ad
      tag: rename_azure_ad
      target_field: entityanalytics_entra_id.user
      ignore_missing: true
  ##############################################################################
  # rename to snake case
  ##############################################################################
  - script:
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      description: Convert camelCase to snake_case
      source: |
        // Helper function to convert camelCase to snake_case
        String camelToSnake(String str) {
          def result = "";
          def lastCharWasUpperCase = false;
          for (int i = 0; i < str.length(); i++) {
            char c = str.charAt(i);
            if (Character.isUpperCase(c)) {
              if (i > 0 && !lastCharWasUpperCase) {
                result += "_";
              }
              result += Character.toLowerCase(c);
              lastCharWasUpperCase = true;
            } else {
              result += c;
              lastCharWasUpperCase = false;
            }
          }
          return result;
        }

        // Recursive function to handle nested fields
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            // Convert each key in the map
            def newObj = [:];
            for (entry in obj.entrySet()) {
              // Skip fields that contain '@' in their name
              if (!entry.getKey().contains("@")) {
                String newKey = camelToSnake(entry.getKey());
                newObj[newKey] = convertToSnakeCase(entry.getValue());
              }
            }
            return newObj;
          } else if (obj instanceof List) {
            // If it's a list, process each item recursively
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }

        // Apply the conversion
        if (ctx.entityanalytics_entra_id?.user != null) {
          ctx.entityanalytics_entra_id.user = convertToSnakeCase(ctx.entityanalytics_entra_id.user);
        }
  - convert:
      field: entityanalytics_entra_id.user.account_enabled
      tag: convert_accountEnabled_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: entityanalytics_entra_id.user.account_enabled
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: user.enabled
      value: true
      tag: set_user_enabled
      if: ctx.entityanalytics_entra_id?.user?.account_enabled == true
  - append:
      field: related.user
      value: "{{{entityanalytics_entra_id.user.mail}}}"
      tag: append_mail_into_related_user
      allow_duplicates: false
      if: ctx.entityanalytics_entra_id?.user?.mail != null
  - set:
      field: user.email
      copy_from: entityanalytics_entra_id.user.mail
      tag: set_user_email
      ignore_empty_value: true
  - append:
      field: related.user
      value: "{{{entityanalytics_entra_id.user.user_principal_name}}}"
      tag: append_user_principal_name_into_related_user
      allow_duplicates: false
      if: ctx.entityanalytics_entra_id?.user?.user_principal_name != null
  - set:
      field: user.name
      copy_from: entityanalytics_entra_id.user.user_principal_name
      tag: set_user_name
      ignore_empty_value: true
  - append:
      field: related.user
      value: "{{{entityanalytics_entra_id.user.display_name}}}"
      tag: append_display_name_into_related_user
      allow_duplicates: false
      if: ctx.entityanalytics_entra_id?.user?.display_name != null
  - set:
      field: user.full_name
      copy_from: entityanalytics_entra_id.user.display_name
      tag: set_user_full_name
      ignore_empty_value: true
  - set:
      field: user.first_name
      copy_from: entityanalytics_entra_id.user.given_name
      tag: set_user_first_name
      ignore_empty_value: true
  - set:
      field: user.last_name
      copy_from: entityanalytics_entra_id.user.surname
      tag: set_user_last_name
      ignore_empty_value: true
  - append:
      field: user.phone
      value: "{{{entityanalytics_entra_id.user.mobile_phone}}}"
      tag: append_mobile_phone_into_user_phone
      allow_duplicates: false
      if: ctx.entityanalytics_entra_id?.user?.mobile_phone != null
  - append:
      field: user.phone
      value: "{{{entityanalytics_entra_id.user.business_phones}}}"
      tag: append_business_phones_into_user_phone_if_string
      allow_duplicates: false
      if: ctx.entityanalytics_entra_id?.user?.business_phones instanceof String
  - foreach:
      field: entityanalytics_entra_id.user.business_phones
      if: ctx.entityanalytics_entra_id?.user?.business_phones instanceof List
      processor:
        append:
          field: user.phone
          value: "{{{_ingest._value}}}"
          tag: append_business_phones_into_user_phone_if_list
          allow_duplicates: false
  - set:
      field: user.job_title
      copy_from: entityanalytics_entra_id.user.job_title
      tag: set_user_job_title
      ignore_empty_value: true
  - set:
      field: user.work.location_name
      copy_from: entityanalytics_entra_id.user.office_location
      tag: set_user_work_location
      ignore_empty_value: true
  - set:
      field: entityanalytics_entra_id.user.id
      copy_from: user.id
      tag: set_entityanalytics_entra_id_user_id
      ignore_empty_value: true
  - set:
      field: asset.id
      copy_from: user.id
      tag: set_asset_id
      ignore_empty_value: true
  - append:
      field: related.user
      value: "{{{entityanalytics_entra_id.user.id}}}"
      tag: append_id_into_related_user
      allow_duplicates: false
      if: ctx.entityanalytics_entra_id?.user?.id != null
  - set:
      field: entityanalytics_entra_id.user.group
      copy_from: user.group
      tag: set_entityanalytics_entra_id_user_group
      ignore_empty_value: true
  - set:
      field: asset.group
      copy_from: user.group
      tag: set_asset_group
      ignore_empty_value: true
  - date:
      field: entityanalytics_entra_id.user.sign_in_activity.last_sign_in_date_time
      tag: date_sign_in_activity_last_sign_in_date_time
      target_field: entityanalytics_entra_id.user.sign_in_activity.last_sign_in_date_time
      formats:
        - ISO8601
      if: ctx.entityanalytics_entra_id?.user?.sign_in_activity?.last_sign_in_date_time != null && ctx.entityanalytics_entra_id.user.sign_in_activity.last_sign_in_date_time != ''
      on_failure:
        - remove:
            field: entityanalytics_entra_id.user.sign_in_activity.last_sign_in_date_time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: user.entity.lifecycle.last_activity
      copy_from: entityanalytics_entra_id.user.sign_in_activity.last_sign_in_date_time
      tag: set_user_entity_lifecycle_last_activity
      ignore_empty_value: true
  - convert:
      field: entityanalytics_entra_id.user.mfa.is_mfa_registered
      tag: convert_isMfaRegistered_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: entityanalytics_entra_id.user.mfa.is_mfa_registered
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: user.entity.attributes.mfa_enabled
      copy_from: entityanalytics_entra_id.user.mfa.is_mfa_registered
      tag: set_user_entity_attributes_mfa_enabled
      ignore_empty_value: true
  - script:
      lang: painless
      tag: script_set_user_entity_relationships_supervises
      description: Build user.entity.relationships.supervises from direct reports list.
      if: ctx.entityanalytics_entra_id?.user?.direct_reports instanceof List
      source: |
        def ids = new ArrayList();
        def names = new ArrayList();
        def emails = new ArrayList();
        for (def report : ctx.entityanalytics_entra_id.user.direct_reports) {
          if (report == null) { continue; }
          if (report.id != null) { ids.add(report.id); }
          if (report.user_principal_name != null) { names.add(report.user_principal_name); }
          if (report.mail != null) { emails.add(report.mail); }
        }
        def userObj = new HashMap();
        if (!ids.isEmpty()) { userObj.put("id", ids); }
        if (!names.isEmpty()) { userObj.put("name", names); }
        if (!emails.isEmpty()) { userObj.put("email", emails); }
        if (!userObj.isEmpty()) {
          ctx.user = ctx.user ?: new HashMap();
          ctx.user.entity = ctx.user.entity ?: new HashMap();
          ctx.user.entity.relationships = ctx.user.entity.relationships ?: new HashMap();
          ctx.user.entity.relationships.put("supervises", ["user": userObj]);
        }
  - foreach:
      field: entityanalytics_entra_id.user.app_role_assignments
      if: ctx.entityanalytics_entra_id?.user?.app_role_assignments instanceof List
      ignore_failure: true
      processor:
        append:
          field: user.entity.attributes.permissions
          value: "{{{_ingest._value.app_role_display_name}}}"
          tag: append_app_role_display_name_to_permissions
          allow_duplicates: false
          ignore_empty_values: true
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
